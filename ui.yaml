message_briefing_documents_will_get_notification:
  bg: Ще получите известие, когато потребителят потвърди, че е прочел, изтеглил и разбрал документите.
  ca: Rebreu una notificació quan l'usuari hagi confirmat que ha llegit, descarregat i comprès els documents.
  cs: Dostanete oznámení, jakmile uživatel potvrdí, že dokumenty přečetl, stáhl a pochopil.
  cy: Byddwch yn derbyn hysbysiad pan fydd y defnyddiwr wedi cadarnhau ei fod wedi darllen, lawrlwytho a deall y dogfennau.
  da: Du vil modtage en notifikation, når brugeren har bekræftet at have læst, downloadet og forstået dokumenterne.
  de: Sie erhalten eine Benachrichtigung, wenn der Benutzer bestätigt hat, die Dokumente gelesen, heruntergeladen und verstanden zu haben.
  el: Θα λάβετε ειδοποίηση όταν ο χρήστης επιβεβαιώσει ότι έχει διαβάσει, κατεβάσει και κατανοήσει τα έγγραφα.
  en: You will receive a notification when the user has confirmed to have read, downloaded and understood the documents.
  es: Recibirá una notificación cuando el usuario haya confirmado haber leído, descargado y comprendido los documentos.
  et: Saate teavituse, kui kasutaja on kinnitanud, et on dokumendid lugenud, alla laadinud ja mõistnud.
  fi: Saat ilmoituksen, kun käyttäjä on vahvistanut lukeneensa, ladanneensa ja ymmärtäneensä asiakirjat.
  fr: Vous recevrez une notification lorsque l'utilisateur aura confirmé avoir lu, téléchargé et compris les documents.
  ga: Gheobhaidh tú fógra nuair a dheimhneoidh an t-úsáideoir go bhfuil na doiciméid léite, íoslódáilte agus tuigthe acu.
  he: תקבל התראה כאשר המשתמש יאשר שקרא, הוריד והבין את המסמכים.
  hr: Primit ćete obavijest kada korisnik potvrdi da je pročitao, preuzeo i razumio dokumente.
  hu: Értesítést kap, amikor a felhasználó megerősítette, hogy elolvasta, letöltötte és megértette a dokumentumokat.
  is: Þú munt fá tilkynningu þegar notandinn hefur staðfest að hann hafi lesið, hlaðið niður og skilið skjölin.
  it: Riceverai una notifica quando l'utente avrà confermato di aver letto, scaricato e compreso i documenti.
  lt: Gausite pranešimą, kai naudotojas patvirtins, kad perskaitė, atsisiuntė ir suprato dokumentus.
  lv: Jūs saņemsiet paziņojumu, kad lietotājs apstiprinās, ka ir izlasījis, lejupielādējis un sapratis dokumentus.
  mt: Tirċievi notifika meta l-utent ikun ikkonferma li qara, niżżel u fehem id-dokumenti.
  nl: U ontvangt een melding wanneer de gebruiker heeft bevestigd de documenten te hebben gelezen, gedownload en begrepen.
  nl_BE: U ontvangt een melding wanneer de gebruiker heeft bevestigd de documenten te hebben gelezen, gedownload en begrepen.
  nl_be: U ontvangt een melding wanneer de gebruiker heeft bevestigd de documenten te hebben gelezen, gedownload en begrepen.
  'no': Du vil motta et varsel når brukeren har bekreftet å ha lest, lastet ned og forstått dokumentene.
  pl: Otrzymasz powiadomienie, gdy użytkownik potwierdzi, że przeczytał, pobrał i zrozumiał dokumenty.
  pt: Receberá uma notificação quando o utilizador confirmar ter lido, transferido e compreendido os documentos.
  ro: Veți primi o notificare când utilizatorul a confirmat că a citit, descărcat și înțeles documentele.
  ru: Вы получите уведомление, когда пользователь подтвердит, что прочитал, загрузил и понял документы.
  sk: Dostanete upozornenie, keď používateľ potvrdí, že si dokumenty prečítal, stiahol a pochopil ich obsah.
  sl: Prejmete obvestilo, ko bo uporabnik potrdil, da je dokumente prebral, prenesel in razumel.
  sq: Do të merrni një njoftim kur përdoruesi të ketë konfirmuar se i ka lexuar, shkarkuar dhe kuptuar dokumentet.
  sr: Dobićete obaveštenje kada korisnik potvrdi da je pročitao, preuzeo i razumeo dokumente.
  sv: Du får ett meddelande när användaren har bekräftat att hen har läst, laddat ned och förstått dokumenten.
  uk: Ви отримаєте сповіщення, коли користувач підтвердить, що прочитав, завантажив та зрозумів документи.
message_certificate_incentive:
  bg: В определени европейски страни този сертификат може да се използва за кандидатстване за данъчен бонус или намалена застрахователна премия.
  ca: En determinats països europeus, aquest certificat es pot utilitzar per sol·licitar un bonus fiscal o una tarifa d'assegurança reduïda.
  cs: V některých evropských zemích lze tento certifikát použít k žádosti o daňový bonus nebo sníženou pojistnou prémii.
  cy: Mewn rhai gwledydd Ewropeaidd gellir defnyddio'r dystysgrif hon i wneud cais am fonws treth neu ffi yswiriant ostyngol.
  da: I visse europæiske lande kan dette certifikat bruges til at ansøge om en skattefordel eller en reduceret forsikringspræmie.
  de: In bestimmten europäischen Ländern kann dieses Zertifikat zur Beantragung eines Steuerbonus oder einer reduzierten Versicherungsprämie verwendet werden.
  el: Σε ορισμένες ευρωπαϊκές χώρες, αυτό το πιστοποιητικό μπορεί να χρησιμοποιηθεί για την αίτηση φορολογικής έκπτωσης ή μειωμένης ασφαλιστικής εισφοράς.
  en: In certain European countries this certificate may be used to apply for a tax bonus or a reduced insurance fee.
  es: En ciertos países europeos, este certificado puede utilizarse para solicitar un bono fiscal o una tarifa de seguro reducida.
  et: Teatud Euroopa riikides võib seda sertifikaati kasutada maksusoodustuse või vähendatud kindlustusmaksu taotlemiseks.
  fi: Tietyissä Euroopan maissa tätä todistusta voidaan käyttää veroedun tai alennetun vakuutusmaksun hakemiseen.
  fr: Dans certains pays européens, ce certificat peut être utilisé pour demander un bonus fiscal ou une réduction de cotisation d'assurance.
  ga: I dtíortha áirithe Eorpacha, féadtar an deimhniú seo a úsáid chun iarratas a dhéanamh ar bhónas cánach nó ar tháille árachais laghdaithe.
  he: במדינות אירופיות מסוימות, ניתן להשתמש בתעודה זו כדי לבקש בונוס מס או דמי ביטוח מופחתים.
  hr: U određenim europskim zemljama ova se potvrda može koristiti za prijavu poreznog bonusa ili smanjene premije osiguranja.
  hu: Egyes európai országokban ez a tanúsítvány felhasználható adókedvezmény vagy csökkentett biztosítási díj igénylésére.
  is: Í ákveðnum Evrópulöndum má nota þetta skírteini til að sækja um skattaívilnun eða lægra tryggingagjald.
  it: In alcuni paesi europei questo certificato può essere utilizzato per richiedere un bonus fiscale o una tariffa assicurativa ridotta.
  lt: Tam tikrose Europos šalyse šis sertifikatas gali būti naudojamas siekiant gauti mokesčių lengvatą arba sumažintą draudimo įmoką.
  lv: Dažās Eiropas valstīs šo sertifikātu var izmantot, lai pieteiktos nodokļu bonusam vai samazinātai apdrošināšanas maksai.
  mt: F'ċerti pajjiżi Ewropej dan iċ-ċertifikat jista' jintuża biex tapplika għal bonus tat-taxxa jew tariffa tal-assigurazzjoni mnaqqsa.
  nl: In bepaalde Europese landen kan dit certificaat worden gebruikt om aanspraak te maken op een belastingvoordeel of een verlaagde verzekeringspremie.
  nl_BE: In bepaalde Europese landen kan dit certificaat worden gebruikt om aanspraak te maken op een belastingvoordeel of een verlaagde verzekeringspremie.
