explanation_session_locked:
  bg: Ако искате да направите промени в тази оценка на риска, трябва първо да я отключите.
  ca: Si voleu fer canvis en aquesta avaluació de riscos, primer heu de desbloquejar-la.
  cs: Pokud chcete provést jakékoli změny v tomto hodnocení rizik, měli byste ho nejprve odemknout.
  cy: Os ydych chi am wneud unrhyw newidiadau i'r asesiad risg hwn, yna dylech ei ddatgloi yn gyntaf.
  da: Hvis du vil foretage ændringer i denne risikovurdering, skal du først låse den op.
  de: Falls Sie Änderungen vornehmen möchten, müssen Sie die GBU erst entsperren.
  el: Εάν θέλετε να κάνετε αλλαγές σε αυτή την αξιολόγηση κινδύνου, θα πρέπει πρώτα να την ξεκλειδώσετε.
  en: If you want to make any changes to this risk assessment, then you should unlock it first.
  es: Si deseas realizar cambios en esta evaluación de riesgos, primero debes desbloquearla.
  et: Kui soovite selles riskihinnangus muudatusi teha, peaksite selle esmalt lukust avama.
  fi: Jos haluat tehdä muutoksia tähän riskiarvioon, sinun on ensin avattava sen lukitus.
  fr: Si vous souhaitez apporter des modifications à cette évaluation des risques, vous devez d'abord la déverrouiller.
  ga: Más mian leat aon athruithe a dhéanamh ar an measúnú riosca seo, ba chóir duit é a díghlasáil ar dtús.
  he: אם ברצונך לבצע שינויים בהערכת הסיכון זו, עליך לבטל את נעילתה תחילה.
  hr: Ako želite napraviti bilo kakve promjene u ovoj procjeni rizika, trebali biste je prvo otključati.
  hu: Ha módosításokat szeretne végrehajtani ezen a kockázatértékelésen, először fel kell oldania a zárolást.
  is: Ef þú vilt gera breytingar á þessu áhættumati ættir þú fyrst að opna það.
  it: Se desideri apportare modifiche a questa valutazione del rischio, devi prima sbloccarla.
  lt: Jei norite atlikti pakeitimus šiame rizikos vertinime, pirmiausia turite jį atrakinti.
  lv: Ja vēlaties veikt izmaiņas šajā riska novērtējumā, vispirms tas jāatbloķē.
  mt: Jekk trid tagħmel xi tibdiliet f'din il-valutazzjoni tar-riskju, għandek l-ewwel tiftaħha.
  nl: Als u wijzigingen wilt aanbrengen in deze risicobeoordeling, moet u deze eerst ontgrendelen.
  nl_BE: Als u wijzigingen wilt aanbrengen in deze risicobeoordeling, moet u deze eerst ontgrendelen.
  nl_be: Als u wijzigingen wilt aanbrengen in deze risicobeoordeling, moet u deze eerst ontgrendelen.
  'no': Hvis du vil gjøre endringer i denne risikovurderingen, må du låse den opp først.
  pl: Jeśli chcesz wprowadzić zmiany w tej ocenie ryzyka, musisz najpierw ją odblokować.
  pt: Se pretender fazer alterações a esta avaliação de risco, deve primeiro desbloqueá-la.
  ro: Dacă doriți să efectuați modificări la această evaluare a riscurilor, ar trebui să o deblocați mai întâi.
  ru: Если вы хотите внести изменения в эту оценку рисков, сначала необходимо её разблокировать.
  sk: Ak chcete vykonať akékoľvek zmeny v tomto hodnotení rizika, mali by ste ho najskôr odomknúť.
  sl: Če želite narediti kakršne koli spremembe te ocene tveganja, jo morate najprej odkleniti.
  sq: Nëse doni të bëni ndryshime në këtë vlerësim rreziku, duhet ta zhbllokoni fillimisht.
  sr: Ako želite da unesete bilo kakve izmene u ovu procenu rizika, najpre je trebate otključati.
  sv: Om du vill göra några ändringar i den här riskbedömningen bör du låsa upp den först.
  uk: Якщо ви хочете внести будь-які зміни до цієї оцінки ризику, спочатку слід її розблокувати.
