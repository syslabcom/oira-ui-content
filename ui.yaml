  sk: Aká je pravdepodobnosť výskytu tohto rizika?
  sl: Verjetnost
  cy: Beth yw'r siawns y bydd y risg hon yn digwydd?
  da: Hvad er sandsynligheden for, at denne risiko opstår?
  et: Kui suur on tõenäosus, et see risk realiseerub?
  ga: Cad é an seans go dtarlóidh an riosca seo?
  he: מה הסיכוי שסיכון זה יתרחש?
