  lt: Jei rizikos išvengti negalima, kaip ją galima sumažinti, kad nekiltų pavojus sveikatai ir saugai?
  lv: Ja no dažiem riskiem nevar izvairīties, kā tos varētu samazināt līdz tādam līmenim, lai netiktu apdraudēta tiem pakļauto darbinieku veselība un drošība?
  mt: Jekk ċerti riskji mhumiex evitabbli, kif jistgħu jitnaqqsu għal livell fejn is-saħħa u s-sigurtà ta' dawk esposti ma jiġux kompromessi?
  nl: Als het risico toch niet te vermijden is, bekijk dan of het risico niveau waaraan de werknemer wordt blootgesteld verlaagd kan worden.
  nl_BE: Als bepaalde risico's niet kunnen worden vermeden, hoe kunnen ze dan worden verlaagd tot een niveau waarop de gezondheid en veiligheid van diegenen die aan het risico worden blootgesteld niet in gevaar wordt gebracht?
  nl_be: Als bepaalde risico's niet vermijdbaar zijn, hoe kunnen ze dan worden teruggebracht tot een niveau waarop de gezondheid en veiligheid van de blootgestelden niet in gevaar wordt gebracht?
  'no': Hvis visse risikoer ikke er unngåelige, hvordan kan de reduseres til et nivå der helsen og sikkerheten til de eksponerte ikke er kompromittert?
  pl: Jeśli pewnych zagrożeń nie można uniknąć, jak można je ograniczyć do poziomu, przy którym zdrowie i bezpieczeństwo osób narażonych nie będzie zagrożone?
  pt: Se alguns riscos não são de todo evitáveis, como poderemos reduzir estes riscos para que não comprometam a saúde e a segurança dos trabalhadores?
  ro: Dacă anumite riscuri nu pot fi evitate, cum pot fi reduse la un nivel la care sănătatea și siguranța persoanelor expuse să nu fie compromise?
  ru: Если определённые риски неизбежны, как их можно снизить до уровня, при котором здоровье и безопасность подвергающихся им лиц не будут поставлены под угрозу?
  sk: Ak sa niektorým rizikám nedá vyhnúť, ako sa dajú znížiť na úroveň, pri ktorej nedochádza k ohrozeniu zdravia a bezpečnosti osôb, ktoré sú im vystavené?
  sl: Če se določenim tveganjem ni mogoče izogniti, kako bi jih bilo mogoče zmanjšati na raven, na kateri varnost in zdravje izpostavljenih ne bi bila ogrožana?
  sq: Nëse rreziqe të caktuara nuk janë të shmangshme, si mund të reduktohen në një nivel në të cilin shëndeti dhe siguria e atyre të ekspozuarve të mos komprometohet?
  sr: Ako određeni rizici nisu izbeživi, kako se mogu smanjiti na nivo na kojem zdravlje i bezbednost izloženih lica neće biti ugroženi?
  sv: Om vissa risker inte är undvikbara, hur kan de minskas till en nivå där hälsa och säkerhet för dem som utsätts inte äventyras?
  uk: Якщо певні ризики неминучі, як їх можна знизити до рівня, при якому здоров'я та безпека осіб, що зазнають їх впливу, не будуть поставлені під загрозу?
expl_actionplan_7:
  bg: След като решите как да елиминирате или намалите определен риск, тогава описвате конкретните действия, които се изискват, за да се постигне това. Трябва също да включите подробности относно експертното ниво и/или други изисквания, които са необходими, за да бъдат ефективни тези действия.
  ca: Un cop ha decidit com eliminar o reduir un risc determinat, pot descriure les accions concretes que es requereixen per aconseguir-ho. També hauria d'incloure informació sobre el nivell de competència i/o altres requisits necessaris per a l'eficàcia d'aquestes accions.
  cs: Jakmile se rozhodnete, jakým způsobem riziko odstranit nebo snížit, popište jednotlivé kroky potřebné k realizaci. Popište opatření, stanovte odpovědnou osobu, míru potřebných znalostí, lhůtu k provedení opatření a rozpočet.
  cy: Unwaith y byddwch wedi penderfynu sut i ddileu neu leihau risg benodol, yna rydych chi'n disgrifio'r camau gweithredu penodol sydd eu hangen i gyflawni hyn. Dylech hefyd gynnwys manylion am lefel yr arbenigedd a/neu ofynion eraill sydd eu hangen i'r camau hynny fod yn effeithiol.
  da: Når du har besluttet, hvordan du vil eliminere eller reducere en bestemt risiko, beskriver du de specifikke handlinger, der kræves for at opnå dette. Du bør også inkludere detaljer om niveauet af ekspertise og/eller andre krav, der er nødvendige for, at disse handlinger er effektive.
  de: Sobald Sie entschieden haben, wie ein bestimmtes Risiko beseitigt oder reduziert werden soll, beschreiben Sie die spezifischen Maßnahmen, die dazu erforderlich sind. Sie sollten auch Angaben zum erforderlichen Fachwissen und/oder anderen Anforderungen machen, die notwendig sind, damit diese Maßnahmen wirksam sind.
  el: Μόλις ληφθεί απόφαση για το  πώς θα εξαλειφθεί ή θα μειωθεί ένας συγκεκριμένος κίνδυνος, τότε μπορεί πλέον να περιγραφούν οι συγκεκριμένες  ενέργειες  που απαιτούνται για να επιτευχθεί κάτι τέτοιο. Θα πρέπει επίσης να συμπεριληφθούν λεπτομέρειες για το επίπεδο τεχνογνωσίας ή/και τις υπόλοιπες προϋποθέσεις που απαιτούνται ώστε αυτές οι ενέργειες να είναι αποτελεσματικές.
  en: Once you have decided how to eliminate or reduce a particular risk, then you describe the specific action(s) required to achieve this. You should also include details of the level of expertise and/or other requirements needed for those actions to be effective.
  es: Una vez que haya decidido cómo eliminar o reducir un riesgo particular, describa las acciones específicas necesarias para lograrlo. Deberá incluir además detalles sobre el nivel de experiencia y/u otros requisitos necesarios para que dichas acciones sean efectivas.
  et: Kui olete otsustanud, kuidas konkreetset riski kõrvaldada või vähendada, kirjeldage selle saavutamiseks vajalikke konkreetseid meetmeid. Peaksite lisama ka üksikasju vajaliku ekspertiisi taseme ja/või muude nõuete kohta, mis on vajalikud, et need meetmed oleksid tõhusad.
  fi: Kuvaa toimintasuunnitelmaan kaikki ne toimenpiteet, joilla kunkin arvioimasi riskin voi poistaa tai sen aiheuttamaa haittaa pienentää. Muista myös mainita näihin toimenpiteisiin tarvittava asiantuntemuksen taso ja/tai muut vaatimukset. Toimintasuunnitelmaa luodessasi voit käyttää apunasi sovelluksen tarjoamia toimenpiteitä, muokata niitä tarpeen mukaan tai kirjata muita tarvittavia toimenpiteitä.
  fr: <p>Vous pouvez définir vos propres mesures de prévention ou utiliser, (et éventuellement adapter), celles qui vous sont proposées dans l’outil (menu déroulant <strong>[pré-remplir]</strong>).</p><p>Pour intégrer une mesure, vous devez :</p><ul><li>Soit la choisir dans le menu « pré-remplir » (vous pourrez ensuite l’adapter)</li><li>Soit la renseigner vous-même en :<ul><li>précisant les actions à mettre en place pour la rendre effective (2ème champ)</li><li>indiquant les  compétences spécifiques nécessaires pour l’appliquer ou préciser quelle(s) fonction(s) de l'entreprise est (sont) à mobiliser (3ème champ).</li></ul></li></ul><p>Vous pouvez intégrer plusieurs mesures pour un même risque.</p>
  ga: Nuair a shocraigh tú conas riosca áirithe a dhíchur nó a laghdú, déanann tú cur síos ar na gníomhartha sonracha atá ag teastáil chun é seo a bhaint amach. Ba cheart duit freisin sonraí a chur san áireamh faoi leibhéal an saineolais agus/nó riachtanais eile atá ag teastáil chun na gníomhartha sin a bheith éifeachtach.
  he: לאחר שהחלטת כיצד לבטל סיכון מסוים או להפחיתו, תאר את הפעולות הספציפיות הנדרשות להשגת מטרה זו. כמו כן, עליך לכלול פרטים לגבי רמת המומחיות ו/או דרישות אחרות הנחוצות כדי שפעולות אלו יהיו אפקטיביות.
  hr: Čim odlučite kako eliminirati ili smanjiti neki određeni rizik, odmah opišite konkretnu(e) aktivnost(i) potrebnu(e) da bi se to postiglo. Osim toga unesite i detalje o razini stručnosti i/ili ostalim potrebnim zahtjevima kako bi te aktivnosti bile učinkovite.
  hu: Miután eldöntötte, hogy milyen módon küszöböli ki vagy csökkenti az adott kockázatot, írja le, hogy milyen konkrét lépés(ek)re van szükség ennek eléréséhez. Ezen kívül meg kell adnia a lépések hatékonyságához szükséges szakértelem szintjét és/vagy egyéb követelményeket is.
  is: Þegar þetta liggur fyrir er hægt að lýsa því hvernig best er að framkvæma úrbæturnar eða þær aðgerðir sem þarf til þess að hafa stjórn á greindri áhættu. Það er mikilvægt að lýsingin sé leiðbeinandi um atriði sem geta verið flókin eða á annan hátt valdið misskilningi. Einnig er mikilvægt að fram komi hvaða þekkingu eða jafnvel réttindi þarf til að framkvæma aðgerðirnar.
  it: ' '
  lt: Nustatę, kaip konkrečią riziką reikia šalinti arba sumažinti, nurodykite konkrečius veiksmus, kaip tą padaryti. Taip pat turėtumėte nurodyti reikalingų žinių ir (arba) reikalavimų lygį, kurio reikia, kad veiksmai būtų atlikti veiksmingai.
  lv: Kad esat izlēmis par noteikta riska novēršanas vai samazināšanas veidu, jums jāapraksta specifiskas darbības, kas šim nolūkam jāizmanto. Jums arī jāiekļauj informācija par nepieciešamo pieredzes līmeni un/vai citām prasībām, kas jāizpilda, lai riska novēršanas darbības būtu efektīvas.
  mt: Ladarba tkun iddeċidejt kif telimina jew tnaqqas riskju partikolari, imbagħad tiddeskrivi l-azzjoni(jiet) speċifika/speċifiċi meħtieġa biex jinkiseb dan. Għandek ukoll tinkludi dettalji tal-livell ta' kompetenza u/jew rekwiżiti oħra meħtieġa biex dawk l-azzjonijiet ikunu effettivi.
  nl: Als u besloten heeft hoe het risico aan te pakken, beschrijft u wat u hier voor gaat doen. Daarbij beschrijft u ook wat er voor nodig is. Zowel ik kennis/expertise als in materialen en eventuele andere vereisten.
  nl_BE: Nadat u heeft beslist hoe een bepaald risico kan worden verholpen of verlaagd,  beschrijft u de specifieke actie(s) die nodig is/zijn om dit te bereiken. U moet ook informatie over het niveau van de vakkennis en/of andere vereisten vermelden die nodig zijn om die acties effectief te laten worden.
  nl_be: Nadat u heeft besloten hoe u een specifiek risico wilt elimineren of verminderen, beschrijft u de specifieke actie(s) die nodig zijn om dit te bereiken. U dient ook details op te nemen over het vereiste deskundigheidsniveau en/of andere vereisten die nodig zijn om die acties effectief te laten zijn.
  'no': Når du har bestemt deg for hvordan du skal eliminere eller redusere en bestemt risiko, beskriver du de spesifikke handlingene som kreves for å oppnå dette. Du bør også inkludere detaljer om ekspertisenivå og/eller andre krav som er nødvendige for at disse handlingene skal være effektive.
  pl: Po podjęciu decyzji o tym, jak wyeliminować lub ograniczyć dane ryzyko, należy opisać konkretne działania wymagane do osiągnięcia tego celu. Należy również uwzględnić szczegóły dotyczące wymaganego poziomu wiedzy specjalistycznej i/lub innych wymagań niezbędnych do skuteczności tych działań.
  pt: Após ter decidido como eliminar ou reduzir um determinado risco, deve descrever as ações específicas que são requeridas. Deve também mencionar o nível de competência e os requisitos necessários para que tais ações sejam eficazes.
  ro: Odată ce ați decis cum să eliminați sau să reduceți un anumit risc, descrieți acțiunea (acțiunile) specifice necesare pentru a realiza acest lucru. Ar trebui să includeți, de asemenea, detalii despre nivelul de expertiză și/sau alte cerințe necesare pentru ca acele acțiuni să fie eficiente.
  ru: Как только вы решили, как устранить или снизить конкретный риск, опишите конкретные действия, необходимые для его достижения. Вы также должны включить сведения об уровне квалификации и/или других требованиях, необходимых для эффективности этих действий.
  sk: Keď sa rozhodnete, akým spôsobom odstránite alebo znížite príslušné riziko, opíšte konkrétne kroky potrebné na ich dosiahnutie. Mali by ste uviesť aj podrobné údaje o znalostiach a/alebo iné požiadavky potrebné, aby boli takéto kroky účinné.
  sl: Ko se odločite, da odpravite ali zmanjšate določeno tveganje, lahko opišete specifične aktivnosti, ki so. dejanja, potrebna, da to dosežete. Ne pozabite vključiti podrobnosti o ravni potrebne strokovnosti in/ali drugih zahtev, da bi bile te aktivnosti učinkovite.
  sq: Pasi të keni vendosur se si të eliminoni ose reduktoni një rrezik të caktuar, përshkruani veprimet specifike të nevojshme për ta arritur këtë. Duhet gjithashtu të përfshini detaje mbi nivelin e ekspertizës dhe/ose kërkesat e tjera të nevojshme për efektivitetin e atyre veprimeve.
  sr: Nakon što ste odlučili kako da eliminišete ili smanjite određeni rizik, opisujete specifične akcije potrebne za postizanje toga. Takođe treba da uključite detalje o nivou stručnosti i/ili drugim zahtevima potrebnim za efektivnost tih akcija.
  sv: När du har bestämt hur du ska eliminera eller minska en specifik risk, beskriver du de specifika åtgärder som krävs för att uppnå detta. Du bör också inkludera detaljer om den kompetensnivå och/eller andra krav som behövs för att dessa åtgärder ska vara effektiva.
  uk: Після того, як ви вирішили, як усунути або зменшити конкретний ризик, опишіть конкретні дії, необхідні для досягнення цієї мети. Слід також включити відомості про рівень кваліфікації та/або інші вимоги, необхідні для ефективності цих дій.
