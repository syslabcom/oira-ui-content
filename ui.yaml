  et: Teil pole selle riskihinnangu redigeerimisõigusi, kuid saate selle alla laadida erinevates vormingutes <a href='/report-download.html'>allalaadimise jaotisest</a>.
  fi: Sinulla ei ole muokkausoikeuksia tähän riskiarviointiin, mutta voit ladata sen eri muodoissa <a href='/report-download.html'>latausosiosta</a>.
