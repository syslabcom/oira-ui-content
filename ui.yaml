label_archive_ra:
  bg: Архивирайте тази оценка на риска. Тази оценка на риска ще стане само за четене и ще бъде скрита от прегледа в обобщенията, освен ако не се приложи филтърът „показване на архивирани оценки на риска".
  ca: Arxiveu aquesta avaluació de riscos. Aquesta avaluació de riscos es convertirà en només de lectura i estarà oculta a les vistes generals, tret que s'apliqui el filtre 'mostra les avaluacions de riscos arxivades'.
  cs: Archivujte toto hodnocení rizik. Toto hodnocení rizik se stane pouze pro čtení a bude skryto v přehledech, pokud nebude použit filtr 'zobrazit archivovaná hodnocení rizik'.
  cy: Archifwch yr asesiad risg hwn. Bydd yr asesiad risg hwn yn dod yn ddarllen yn unig ac yn gudd o'r golwg mewn trosolygon oni bai bod y hidlydd 'dangos asesiadau risg wedi'u harchifo' yn cael ei gymhwyso.
  da: Arkiver denne risikovurdering. Denne risikovurdering vil blive skrivebeskyttet og skjult fra visningen i oversigter, medmindre filteret 'vis arkiverede risikovurderinger' anvendes.
  de: Diese GBU archivieren. Durch das Archivieren wird die GBU für das Editieren dauerhaft gesperrt und in allen Übersichtsseiten ausgeblendet, außer wenn der Filter “Archivierte Elemente anzeigen” angewendet wird.
  el: Αρχειοθετήστε αυτή την αξιολόγηση κινδύνου. Αυτή η αξιολόγηση κινδύνου θα καταστεί μόνο για ανάγνωση και θα αποκρυφτεί από τις επισκοπήσεις, εκτός αν εφαρμοστεί το φίλτρο 'εμφάνιση αρχειοθετημένων αξιολογήσεων κινδύνου'.
  en: Archive this risk assessment. This risk assessment will become read only and hidden from view in overviews unless the ‘show archived risk assessments’ filter is applied.
  es: Archiva esta evaluación de riesgos. Esta evaluación de riesgos pasará a ser de solo lectura y quedará oculta en las vistas generales, a menos que se aplique el filtro 'mostrar evaluaciones de riesgos archivadas'.
  et: Arhiveerige see riskihinnang. See riskihinnang muutub kirjutuskaitstuks ja peidetakse ülevaadetest, välja arvatud juhul, kui rakendatakse filtrit 'kuva arhiveeritud riskihinnangud'.
  fi: Arkistoi tämä riskiarvio. Tästä riskiarviosta tulee vain luku -tilassa oleva ja se piilotetaan yleiskatsauksista, ellei 'näytä arkistoidut riskiarviot' -suodatinta käytetä.
  fr: Archivez cette évaluation des risques. Cette évaluation des risques deviendra en lecture seule et masquée dans les vues d'ensemble, sauf si le filtre 'afficher les évaluations des risques archivées' est appliqué.
  ga: Cartlannaigh an measúnú riosca seo. Beidh an measúnú riosca seo inléite amháin agus i bhfolach ó radharc sna forbhreathnuithe mura gcuirtear an scagaire 'taispeáin measúnuithe riosca cartlannaithe' i bhfeidhm.
  he: ארכב הערכת סיכון זו. הערכת הסיכון זו תהפוך לקריאה בלבד ותוסתר מהתצוגה בסקירות כלליות אלא אם כן יוחל המסנן 'הצג הערכות סיכון מאורכבות'.
  hr: Arhivirajte ovu procjenu rizika. Ova procjena rizika postaje samo za čitanje i skrivena je iz prikaza u pregledima, osim ako se ne primijeni filtar 'prikaži arhivirane procjene rizika'.
  hu: Archiválja ezt a kockázatértékelést. Ez a kockázatértékelés csak olvashatóvá válik, és az áttekintésekben elrejlik, kivéve ha az 'archivált kockázatértékelések megjelenítése' szűrőt alkalmazzák.
  is: Geymdu þetta áhættumat í skjalasafni. Þetta áhættumat verður aðeins lesanlegt og falt í yfirlitum nema 'sýna geymdar áhættumatskeyrslur' síinn sé notaður.
  it: Archivia questa valutazione del rischio. Questa valutazione del rischio diventerà di sola lettura e nascosta dalla visualizzazione nelle panoramiche a meno che non venga applicato il filtro 'mostra valutazioni del rischio archiviate'.
  lt: Archyvuokite šį rizikos vertinimą. Šis rizikos vertinimas taps tik skaitomas ir bus paslėptas nuo rodinio apžvalgose, nebent bus pritaikytas filtras „rodyti archyvuotus rizikos vertinimus".
  lv: Arhivējiet šo riska novērtējumu. Šis riska novērtējums kļūs tikai lasāms un tiks paslēpts no pārskata skata, ja vien netiks lietots filtrs 'rādīt arhivētos riska novērtējumus'.
  mt: Arċivja din il-valutazzjoni tar-riskju. Din il-valutazzjoni tar-riskju se ssir taqra biss u moħbija mill-fehsa fil-ħarsa ġenerali sakemm ma jiġix applikat il-filtru 'uri l-valutazzjonijiet tar-riskju arċivjati'.
  nl: Archiveer deze risicobeoordeling. Deze risicobeoordeling wordt alleen-lezen en verborgen in overzichten, tenzij het filter 'gearchiveerde risicobeoordelingen weergeven' wordt toegepast.
  nl_BE: Archiveer deze risicobeoordeling. Deze risicobeoordeling wordt alleen-lezen en verborgen in overzichten, tenzij het filter 'gearchiveerde risicobeoordelingen weergeven' wordt toegepast.
  nl_be: Archiveer deze risicobeoordeling. Deze risicobeoordeling wordt alleen-lezen en verborgen in overzichten, tenzij het filter 'gearchiveerde risicobeoordelingen weergeven' wordt toegepast.
  'no': Arkiver denne risikovurderingen. Denne risikovurderingen blir skrivebeskyttet og skjult i oversikter med mindre filteret 'vis arkiverte risikovurderinger' er aktivert.
  pl: Zarchiwizuj tę ocenę ryzyka. Ta ocena ryzyka stanie się tylko do odczytu i będzie ukryta w przeglądach, chyba że zastosowany zostanie filtr „pokaż zarchiwizowane oceny ryzyka".
  pt: Arquivar esta avaliação de risco. Esta avaliação de risco ficará apenas de leitura e oculta nas visões gerais, a menos que o filtro 'mostrar avaliações de risco arquivadas' seja aplicado.
  ro: Arhivați această evaluare a riscurilor. Aceasta va deveni doar pentru citire și ascunsă din vizualizările generale, cu excepția cazului în care filtrul 'afișare evaluări de riscuri arhivate' este aplicat.
  ru: Архивировать эту оценку рисков. Эта оценка рисков станет доступной только для чтения и скрытой из обзоров, если не применён фильтр 'показать архивные оценки рисков'.
  sk: Archivujte toto hodnotenie rizika. Toto hodnotenie rizika sa stane iba na čítanie a bude skryté v prehľadoch, pokiaľ nie je použitý filter 'zobraziť archivované hodnotenia rizika'.
  sl: Arhivirajte to oceno tveganja. Ta ocena tveganja bo postala samo za branje in skrita v pregledih, razen če je uporabljen filter 'pokaži arhivirane ocene tveganja'.
  sq: Arkivoni këtë vlerësim rreziku. Ky vlerësim rreziku do të bëhet vetëm i lexueshëm dhe i fshehur nga pamjet e përgjithshme nëse nuk aplikohet filtri 'trego vlerësimet e rrezikut të arkivuara'.
  sr: Arhivirajte ovu procenu rizika. Ova procena rizika će postati samo za čitanje i biće skrivena u pregledima, osim ako se ne primeni filter 'prikaži arhivirane procene rizika'.
  sv: Arkivera den här riskbedömningen. Den här riskbedömningen kommer att bli skrivskyddad och dold i översikter om inte filtret 'visa arkiverade riskbedömningar' tillämpas.
  uk: Архівуйте цю оцінку ризику. Ця оцінка ризику стане доступною лише для читання та буде прихована в оглядах, якщо не застосовано фільтр 'показати архівовані оцінки ризику'.
