label_download_report:
  bg: Препоръчваме винаги да съхранявате актуализирана разпечатана версия на вашата
    оценка на риска (доклад) във вашето предприятие!
  ca: Es recomana disposar d’una versió impresa i actualitzada de l’avaluació de riscos
    (informe) a la vostra empresa!
  cs: Doporučujeme mít ve vaší společnosti stále k dispozici aktualizovanou vytištěnou
    verzi hodnocení rizik (zprávu)!
  de: Wir empfehlen Ihnen, dass sie stets eine ausgedruckte Fassung Ihres Berichts
    zur Gefährdungsbeurteilung in Ihrem Betrieb zur Hand haben!
  el: Σας συνιστούμε να κρατάτε πάντα  διαθέσιμη στην εταιρεία σας μιαν επικαιροποιημένη
    έντυπη έκδοση της έκθεσης (εκτίμηση κινδύνου)!
  en: We recommend that you always keep an updated printed version of your risk assessment
    (report) available in your company!
  es: Le recomendamos que tenga una versión impresa y actualizada de su evaluación
    de riesgos (informe) disponible en su empresa !
  fi: Suosittelemme pitämään yrityksessäsi jatkuvasti esillä päivitettyä versiota
    riskinarviointiraportistasi !
  fr: Nous vous recommandons de toujours avoir dans votre établissement  une copie
    imprimée et mise à jour de votre évaluation de risques!
  hr: Preporučujemo da u tvrtki uvijek bude dostupan ažurirani ispis verzije procjene
    rizika (izvješće)!
  hu: Azt javasoljuk, hogy a kockázatértékelés (jelentésének) mindig legyen kéznél
    egy frissített, nyomtatott változata a vállalatnál!
  is: Við mælum með því að ávallt sé varðveitt útprentuð útgáfa af áhættumatinu (skýrslunni)
    í fyrirtækinu!
  it: Consigliamo di tenere sempre disponibile nella tua azienda una versione aggiornata
    e stampata del report.
  lt: Rekomenduojame visada turėti aktualią spausdintinę rizikos vertinimo (ataskaitos)
    versiją, su kuria būtų galima susipažinti jūsų įmonėje!
  lv: Iesakām vienmēr izdrukāt darba vides riska novērtējuma (pārskata) atjaunināto
    versiju.
  mt: Nirrakkomandaw li dejjem iżżomm verżjoni aġġornata pprintjata tal-valutazzjoni
    tar-riskji tiegħek (rapport) għad-dispożizzjoni fil-kumpanija tiegħek!
  nl: Wij raden u aan ervoor te zorgen dat er altijd een actuele geprinte versie van
    uw risicoanalyse beschikbaar is in uw bedrijf!
  nl_BE: Wij raden u aan ervoor te zorgen dat er altijd een actuele geprinte versie
    van uw risicoanalyse beschikbaar is in uw bedrijf!
  'no': Vi anbefaler at du alltid har en oppdatert utskrift av risikovurderingen (rapporten)
    tilgjengelig i din bedrift!
  pt: Atenção! Recomendamos que tenha sempre disponível na sua empresa uma versão
    impressa e atualizada da sua avaliação de riscos (relatório).
  sk: Odporúčame, aby ste v spoločnosti vždy mali k dispozícii aktualizovanú vytlačenú
    verziu (správy) z hodnotenia rizík.
  sl: Priporočamo vam, da natisnete posodobljeno različico ocene tveganja (poročilo)
    in jo imate vedno na voljo.
  nl_be: We raden u aan altijd een bijgewerkte gedrukte versie van uw risicobeoordeling
    (rapport) beschikbaar te hebben in uw bedrijf!
  pl: Zalecamy, aby zawsze mieć aktualną wydrukowaną wersję oceny ryzyka (raportu)
    dostępną w swojej firmie!
  ro: Vă recomandăm să păstrați întotdeauna o versiune tipărită actualizată a evaluării
    riscurilor (raportului) disponibilă în compania dumneavoastră!
  ru: Мы рекомендуем всегда иметь актуальную печатную версию вашей оценки рисков (отчёта)
    в вашей компании!
  sq: Ju rekomandojmë të mbani gjithmonë një version të përditësuar të printuar të
    vlerësimit tuaj të riskut (raport) të disponueshëm në kompaninë tuaj!
  sr: Preporučujemo vam da uvek imate dostupnu ažuriranu štampanu verziju vaše procene
    rizika (izveštaja) u vašoj kompaniji!
  sv: Vi rekommenderar att du alltid håller en uppdaterad utskriven version av din
    riskbedömning (rapport) tillgänglig i ditt företag!
  uk: Ми рекомендуємо вам завжди мати в компанії оновлену друковану версію вашої оцінки
    ризику (звіту)!
  cy: Rydym yn argymell eich bod bob amser yn cadw fersiwn printiedig wedi'i diweddaru
    o'ch asesiad risg (adroddiad) ar gael yn eich cwmni!
  da: Vi anbefaler, at du altid har en opdateret udskrevet version af din risikovurdering
    (rapport) tilgængelig i din virksomhed!
  et: Soovitame alati hoida oma ettevõttes kättesaadavana teie riskihinnangu (aruande)
    ajakohastatud trükiversiooni!
  ga: Molaimid go gcoinnítear i gcónaí leagan clóite nuashonraithe de do mheasúnú
    riosca (tuarascáil) ar fáil i do chuideachta!
  he: אנו ממליצים שתשמרו תמיד גרסה מודפסת מעודכנת של הערכת הסיכון שלכם (דוח) זמינה
    בחברתכם!
