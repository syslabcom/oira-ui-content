notice_read_only:
  de: Sie haben keine Berechtigung, um diese GBU zu bearbeiten. Sie können aber die
    verschiedenen Arten von Bericht unter dem <a href='/report-download.html'>Reiter
    “Bericht”</a> herunterladen.
  en: You don't have edit rights for this risk assesment, but you can download this
    risk assessment in various forms in the <a href='/report-download.html'>download
    section</a>.
  bg: Нямате права за редактиране на тази оценка на риска, но можете да я изтеглите
    в различни формати в <a href='/report-download.html'>секцията за изтегляне</a>.
  ca: No teniu drets d'edició per a aquesta avaluació de riscos, però podeu descarregar-la
    en diverses formes a la <a href='/report-download.html'>secció de descàrrega</a>.
  cs: Nemáte práva pro úpravu tohoto hodnocení rizik, ale můžete si ho stáhnout v
    různých formátech v <a href='/report-download.html'>sekci stahování</a>.
  cy: Nid oes gennych hawliau golygu ar gyfer yr asesiad risg hwn, ond gallwch lawrlwytho'r
    asesiad risg hwn mewn ffurfiau amrywiol yn yr <a href='/report-download.html'>adran
    lawrlwytho</a>.
  da: Du har ikke redigeringsrettigheder til denne risikovurdering, men du kan downloade
    denne risikovurdering i forskellige former i <a href='/report-download.html'>downloadsektionen</a>.
  el: Δεν έχετε δικαιώματα επεξεργασίας για αυτήν την αξιολόγηση κινδύνου, αλλά μπορείτε
    να την κατεβάσετε σε διάφορες μορφές από την <a href='/report-download.html'>ενότητα
    λήψης</a>.
  es: No tiene derechos de edición para esta evaluación de riesgos, pero puede descargarla
    en varios formatos en la <a href='/report-download.html'>sección de descargas</a>.
  et: Teil pole selle riskihinnangu redigeerimisõigusi, kuid saate selle alla laadida
    erinevates vormingutes <a href='/report-download.html'>allalaadimise jaotisest</a>.
  fi: Sinulla ei ole muokkausoikeuksia tähän riskiarviointiin, mutta voit ladata sen
    eri muodoissa <a href='/report-download.html'>latausosiosta</a>.
  fr: Vous n'avez pas les droits de modification pour cette évaluation des risques,
    mais vous pouvez la télécharger sous différentes formes dans la <a href='/report-download.html'>section
    de téléchargement</a>.
  ga: Níl cearta eagarthóireachta agat don measúnú riosca seo, ach is féidir leat
    an measúnú riosca seo a íoslódáil i bhfoirmeacha éagsúla sa <a href='/report-download.html'>rannóg
    íoslódála</a>.
  he: אין לך הרשאות עריכה להערכת סיכון זו, אך תוכל להוריד הערכת סיכון זו בצורות שונות
    ב<a href='/report-download.html'>קטע ההורדות</a>.
  hr: Nemate prava uređivanja za ovu procjenu rizika, ali možete preuzeti ovu procjenu
    rizika u različitim oblicima u <a href='/report-download.html'>odjeljku za preuzimanje</a>.
  hu: Nincs szerkesztési jogosultsága ehhez a kockázatértékeléshez, de letöltheti
    ezt a kockázatértékelést különböző formátumokban a <a href='/report-download.html'>letöltési
    részben</a>.
  is: Þú hefur ekki ritstjórnarréttindi fyrir þetta áhættumat, en þú getur hlaðið
    niður þessu áhættumati í ýmsum formum í <a href='/report-download.html'>niðurhalshlutunum</a>.
  it: Non hai i diritti di modifica per questa valutazione del rischio, ma puoi scaricarla
    in varie forme nella <a href='/report-download.html'>sezione di download</a>.
  lt: Jūs neturite teisių redaguoti šio rizikos vertinimo, tačiau galite atsisiųsti
    šį rizikos vertinimą įvairiomis formomis <a href='/report-download.html'>atsisiuntimo
    skyriuje</a>.
  lv: Jums nav tiesību rediģēt šo riska novērtējumu, taču varat lejupielādēt šo riska
    novērtējumu dažādās formās <a href='/report-download.html'>lejupielādes sadaļā</a>.
  mt: M'għandekx drittijiet ta' editjar għal din il-valutazzjoni tar-riskju, iżda
    tista' tniżżel din il-valutazzjoni tar-riskju f'diversi forom fit-<a href='/report-download.html'>taqsima
    tat-tniżżil</a>.
  nl: U heeft geen bewerkingsrechten voor deze risicobeoordeling, maar u kunt deze
    risicobeoordeling in verschillende vormen downloaden in de <a href='/report-download.html'>downloadsectie</a>.
  nl_BE: U heeft geen bewerkingsrechten voor deze risicobeoordeling, maar u kunt deze
    risicobeoordeling in verschillende vormen downloaden in de <a href='/report-download.html'>downloadsectie</a>.
  nl_be: U heeft geen bewerkingsrechten voor deze risicobeoordeling, maar u kunt deze
    risicobeoordeling in verschillende vormen downloaden in de <a href='/report-download.html'>downloadsectie</a>.
  'no': Du har ikke redigeringsrettigheter for denne risikovurderingen, men du kan
    laste ned denne risikovurderingen i ulike former i <a href='/report-download.html'>nedlastingseksjonen</a>.
  pl: Nie masz praw do edycji tej oceny ryzyka, ale możesz pobrać tę ocenę ryzyka
    w różnych formach w <a href='/report-download.html'>sekcji pobierania</a>.
  pt: Não tem direitos de edição para esta avaliação de risco, mas pode descarregar
    esta avaliação de risco em vários formatos na <a href='/report-download.html'>secção
    de download</a>.
  ro: Nu aveți drepturi de editare pentru această evaluare a riscurilor, dar o puteți
    descărca în diverse formate din <a href='/report-download.html'>secțiunea de descărcare</a>.
  ru: У вас нет прав на редактирование этой оценки рисков, но вы можете скачать её
    в различных форматах в <a href='/report-download.html'>разделе загрузки</a>.
  sk: Nemáte práva na úpravu tohto hodnotenia rizík, ale môžete si ho stiahnuť v rôznych
    formách v <a href='/report-download.html'>sekcii na sťahovanie</a>.
  sl: Nimate pravic za urejanje te ocene tveganja, vendar jo lahko prenesete v različnih
    oblikah v <a href='/report-download.html'>razdelku za prenos</a>.
  sq: Nuk keni të drejta redaktimi për këtë vlerësim risku, por mund ta shkarkoni
    në forma të ndryshme në <a href='/report-download.html'>seksionin e shkarkimit</a>.
  sr: Nemate pravo uređivanja za ovu procenu rizika, ali možete preuzeti ovu procenu
    rizika u različitim oblicima u <a href='/report-download.html'>odeljku za preuzimanje</a>.
  sv: Du har inte redigeringsrättigheter för denna riskbedömning, men du kan ladda
    ner denna riskbedömning i olika former i <a href='/report-download.html'>nedladdningssektionen</a>.
  uk: У вас немає прав на редагування цієї оцінки ризику, але ви можете завантажити
