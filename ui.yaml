message_permission_level_edit:
  en: User can take trainings and view and edit all risk assessments.
  bg: Потребителят може да взема обучения и да преглежда и редактира всички оценки
    на риска.
  ca: L'usuari pot fer formacions i visualitzar i editar totes les avaluacions de
    riscos.
  cs: Uživatel může absolvovat školení a prohlížet a upravovat všechna hodnocení rizik.
  cy: Gall y defnyddiwr gymryd hyfforddiant a gweld a golygu pob asesiad risg.
  da: Brugeren kan deltage i kurser og se og redigere alle risikovurderinger.
  de: Der Benutzer kann Schulungen absolvieren sowie alle Risikobewertungen anzeigen
    und bearbeiten.
  el: Ο χρήστης μπορεί να παρακολουθεί εκπαιδεύσεις και να προβάλλει και να επεξεργάζεται
    όλες τις εκτιμήσεις κινδύνου.
  es: El usuario puede realizar formaciones y ver y editar todas las evaluaciones
    de riesgos.
  et: Kasutaja saab läbida koolitusi ning vaadata ja muuta kõiki riskihindamisi.
  fi: Käyttäjä voi suorittaa koulutuksia sekä tarkastella ja muokata kaikkia riskiarviointeja.
  fr: L'utilisateur peut suivre des formations et consulter et modifier toutes les
    évaluations des risques.
  ga: Féadfaidh an t-úsáideoir oiliúint a dhéanamh agus gach measúnú riosca a fheiceáil
    agus a chur in eagar.
  he: המשתמש יכול לבצע הכשרות ולצפות ולערוך את כל הערכות הסיכון.
  hr: Korisnik može pohađati obuke te pregledavati i uređivati sve procjene rizika.
  hu: A felhasználó képzéseken vehet részt, és megtekintheti, szerkesztheti az összes
    kockázatértékelést.
  is: Notandi getur tekið þátt í þjálfunum og skoðað og breytt öllum áhættumatsskrám.
  it: L'utente può seguire le formazioni e visualizzare e modificare tutte le valutazioni
    dei rischi.
  lt: Vartotojas gali dalyvauti mokymuose ir peržiūrėti bei redaguoti visus rizikos
    vertinimus.
  lv: Lietotājs var apmeklēt apmācības un skatīt un rediģēt visus riska novērtējumus.
  mt: L-utent jista' jieħu taħriġ u jara u jeditja l-valutazzjonijiet tar-riskju kollha.
  nl: Gebruiker kan trainingen volgen en alle risicobeoordelingen bekijken en bewerken.
  nl_BE: Gebruiker kan trainingen volgen en alle risicobeoordelingen bekijken en bewerken.
  nl_be: Gebruiker kan trainingen volgen en alle risicobeoordelingen bekijken en bewerken.
  'no': Bruker kan gjennomføre opplæringer og se og redigere alle risikovurderinger.
  pl: Użytkownik może uczestniczyć w szkoleniach oraz przeglądać i edytować wszystkie
    oceny ryzyka.
  pt: O utilizador pode realizar formações e visualizar e editar todas as avaliações
    de risco.
  ro: Utilizatorul poate efectua cursuri de formare și vizualiza și edita toate evaluările
    de risc.
  ru: Пользователь может проходить обучение, а также просматривать и редактировать
    все оценки рисков.
  sk: Používateľ môže absolvovať školenia a prezerať a upravovať všetky hodnotenia
    rizík.
  sl: Uporabnik lahko opravlja usposabljanja ter pregleduje in ureja vse ocene tveganj.
  sq: Përdoruesi mund të marrë trajnime dhe të shikojë dhe modifikojë të gjitha vlerësimet
    e riskut.
  sr: Korisnik može pohađati obuke i pregledati i uređivati sve procene rizika.
  sv: Användaren kan genomföra utbildningar och visa och redigera alla riskbedömningar.
  uk: Користувач може проходити навчання та переглядати і редагувати всі оцінки ризиків.
