report_intro:
  bg: Сега след като завършите определянето на всички рискове във Вашата организация и създадете план за действие, можете да създадете доклад, който изброява всички Ваши резултати. Можете, ако желаете, да добавите допълнителни коментари, които трябва да бъдат включени в този доклад в полето по-долу.
  ca: Un cop identificats tots els riscos de l'organització i un cop creat un pla d'acció, es pot generar un informe amb tots els resultats. Si vol, pot afegir comentaris addicionals a l'informe al camp que trobarà a continuació.
  cs: Po ukončení procesu vyhledání a zhodnocení rizik a vytvoření akčního plánu si můžete vygenerovat závěrečnou zprávu. Do textového pole pod tímto textem můžete napsat vaše komentáře a poznámky, které budou do zprávy zahrnuty
  cy: Nawr eich bod wedi gorffen nodi holl risgiau eich sefydliad a chreu cynllun gweithredu, gallwch greu adroddiad sy'n rhestru'ch holl ganlyniadau. Gallwch, os dymunwch, ychwanegu rhai sylwadau ychwanegol y dylid eu cynnwys yn yr adroddiad hwn yn y maes isod.
  da: Nu da du er færdig med at identificere alle risiciene i din organisation og har oprettet en handlingsplan, kan du oprette en rapport, der viser alle dine resultater. Du kan, hvis du ønsker det, tilføje nogle ekstra kommentarer, der bør inkluderes i denne rapport i feltet nedenfor.
  de: Nachdem Sie alle Gefährdungen im Zusammenhang mit Ihrer Organisation ermittelt und einen Aktionsplan erstellt haben, können Sie nun einen Bericht generieren, in dem alle Ergebnisse aufgeführt sind. Wenn Sie dies wünschen, können Sie zusätzliche Kommentare zur Aufnahme in den Bericht in das untenstehende Feld eingeben.
  el: Τώρα που έχετε ολοκληρώσει την ταυτοποίηση των κινδύνων στην επιχείρησή σας και έχετε καταρτίσει ένα σχέδιο δράσης, μπορείτε να δημιουργήσετε μιαν αναφορά (έκθεση ΕΚ) στην οποία θα παρατίθενται όλα τα αποτελέσματά σας. Μπορείτε, αν θέλετε, να εισάγετε ορισμένα πρόσθετα σχόλια που εκτιμάτε ότι πρέπει να συμπεριλαμβάνονται σε αυτή την αναφορά, στο παρακάτω πεδίο.
  en: Now that you have finished identifying all the risks in your organisation and created an action plan you can create a report which lists all your results. You can, if desired, add some extra comments that should be included in this report in the field below.
  es: Ahora que ha terminado de identificar todos los riesgos en su organización y que ha creado un plan de acción, puede crear un informe con los resultados. Si lo desea, puede agregar algunos comentarios adicionales que deberán incluirse en este informe en el campo de abajo.
  et: Nüüd, kui olete lõpetanud kõigi oma organisatsiooni riskide tuvastamise ja loonud tegevuskava, saate luua aruande, mis loetleb kõik teie tulemused. Soovi korral saate allpool olevale väljale lisada mõned täiendavad kommentaarid, mis tuleks sellesse aruandesse lisada.
  fi: Olet nyt saanut valmiiksi riskien arvioinnin ja laatinut toimintasuunnitelman riskien hallintaan. Sovellus kerää kaikki nämä kirjaamasi tiedot raportiksi, jonka voit ladata omalle tietokoneellesi ja tarvittaessa muokata siellä. Voit halutessasi kirjoittaa alla olevaan kenttään raporttiin lisättäviä kommentteja ja lisätietoja.
  fr: Maintenant que vous avez fini d'identifier tous les risques dans votre organisation et créé un plan d'action, vous pouvez éditer un rapport qui répertorie tous vos résultats ainsi qu’un plan d’action. Vous pouvez, si vous le voulez, ajouter ci-dessous des commentaires supplémentaires qui seront inclus dans ce rapport. Vous pouvez également télécharger ce rapport et l'enregistrer sur votre ordinateur. Vous pourrez ainsi le personnaliser, le compléter et le modifier comme vous le souhaitez.
  ga: Anois agus tú tar éis críochnú ag aithint gach riosca i d'eagraíocht agus plean gníomhaíochta cruthaithe agat, is féidir leat tuarascáil a chruthú ina bhfuil liosta de na torthaí go léir. Is féidir leat, más mian leat, roinnt tráchtanna breise a chur leis ba cheart a bheith san áireamh sa tuarascáil seo sa réimse thíos.
  he: עכשיו שסיימתם לזהות את כל הסיכונים בארגון שלכם ויצרתם תוכנית פעולה, תוכלו ליצור דוח המפרט את כל התוצאות שלכם. תוכלו, אם תרצו, להוסיף כמה הערות נוספות שיש לכלול בדוח זה בשדה שלהלן.
  hr: Sada, kada ste dovršili identifikaciju svih rizika u vašoj organizaciji i oblikovali plan mjera, možete stvoriti izvješće s popisom svih rezultata. Ako želite, u polje ispod možete unijeti dodatne komentare koje bi trebalo uključiti u to izvješće.
  hu: Miután befejezte a szervezetben fellelhető összes kockázat azonosítását, valamint létrehozta a cselekvési tervet, létrehozhatja az összes eredményt felsoroló jelentést. Ha kívánja, az alábbi mezőben megadhat néhány további megjegyzést is, amelyeknek a jelentésben meg kell jelenni.
  is: Nú er aðgerðaáætlun lokið og hægt er að vista skýrslu með öllum niðurstöðum. Hægt er að bæta við athugasemdum í skýrsluna. Setjið þær í reitinn hér fyrir neðan.
  it: '<p>A seguito della identificazione dei pericoli, della valutazione dei rischi e, dopo aver adottato le misure obbligatorie e programmato le misure di miglioramento, si genera progressivamente il documento di valutazione dei rischi.</p>

    <p>ATTENZIONE: PRIMA DI STAMPARE LA VERSIONE FINALE DEL REPORT, CONTROLLARE DI AVER IDENTIFICATO E VALUTATO TUTTI I RISCHI PRESENTI; E’ NECESSARIO ALLEGARE IL DOCUMENTO CON LE FIGURE DELLA PREVENZIONE E TUTTI GLI ALTRI DOCUMENTI CITATI NEL TESTO, APPOSITAMENTI COMPILATI, LADDOVE NECESSARI.</p>

    <p>Il documento deve essere munito di “data certa” o attestata dalla sottoscrizione dello stesso, da parte del datore di lavoro nonché ai soli fini della prova della data, da parte di RSPP, RLS o RLST e del Medico Competente, ove nominato.</p>'
  lt: Kadangi jau baigėte visus jūsų organizacijos rizikų vertinimo procesus ir sukūrėte prevencinių veiksmų planą, galite sukurti ataskaitą su visais rezultatais. Taip pat galite (jei norite) įkelti papildomus komentarus, kuriuos norite įtraukti į žemiau esantį ataskaitos laukelį.
  lv: Tā kā esat beidzis identificēt organizācijā esošos riskus un izveidojis rīcības plānu, tagad varat izveidot pārskatu, kurā būs iekļauti visi rezultāti. Ja vēlaties, tālāk redzamajā laukā varat ierakstīt papildu komentārus, kas jāiekļauj pārskatā.
  mt: Issa li lestejt tidentifika r-riskji kollha fl-organizzazzjoni tiegħek u ħloqt pjan ta' azzjoni, tista' toħloq rapport li jelenka r-riżultati kollha tiegħek. Jekk tixtieq, tista' żżid kummenti addizzjonali li għandhom jiġu inklużi f'dan ir-rapport fil-qasam ta' hawn taħt.
  nl: U heeft alle risico's van de organisatie geïnventariseerd en een plan van aanpak gemaakt. Nu kunt u een plan van aanpak  maken waarin alle resultaten worden opgenomen. U kunt, als u dat wilt, extra tekst plaatsen in het vak dat hieronder staat. Die tekst wordt opgenomen aan het begin van het plan van aanpak.
  nl_BE: Nu dat u klaar bent met het identificeren van alle risico's in uw organisatie en een actieplan heeft gecreëerd, kunt u een rapport opstellen met al uw resultaten. Indien u dat wenst, kunt u extra opmerkingen toevoegen die in het rapport moeten staan door deze in het onderstaande veld in te vullen.
  nl_be: Nu u alle risico's in uw organisatie heeft geïdentificeerd en een actieplan heeft gemaakt, kunt u een rapport opstellen met al uw resultaten. U kunt, indien gewenst, enkele extra opmerkingen toevoegen die in dit rapport moeten worden opgenomen in het onderstaande veld.
  'no': Nå som du har ferdig identifisert alle risikoene i organisasjonen din og opprettet en handlingsplan, kan du lage en rapport som viser alle resultatene dine. Du kan, om ønskelig, legge til ekstra kommentarer som skal inkluderes i denne rapporten i feltet nedenfor.
  pl: Teraz, gdy zidentyfikowałeś wszystkie ryzyka w swojej organizacji i stworzyłeś plan działania, możesz wygenerować raport zawierający wszystkie wyniki. Możesz, jeśli chcesz, dodać dodatkowe komentarze, które powinny być zawarte w tym raporcie w polu poniżej.
  pt: Agora que acabou de avaliar todos os riscos na sua organização e de ter criado um plano de ação, pode criar um relatório que lista todos os seus resultados. Pode, se pretendido, adicionar alguns comentários extra que devem ser incluídos neste relatório no campo em baixo.
  ro: Acum că ați terminat de identificat toate riscurile din organizația dumneavoastră și ați creat un plan de acțiune, puteți crea un raport care listează toate rezultatele dumneavoastră. Puteți, dacă doriți, să adăugați comentarii suplimentare care să fie incluse în acest raport în câmpul de mai jos.
  ru: Теперь, когда вы завершили идентификацию всех рисков в вашей организации и создали план действий, вы можете создать отчёт, в котором перечислены все ваши результаты. При желании вы можете добавить дополнительные комментарии, которые должны быть включены в этот отчёт, в поле ниже.
  sk: Keď ste identifikovali všetky riziká vo svojej organizácii a vytvorili akčný plán, môžete vytvoriť správu, v ktorej budú uvedené všetky vaše výsledky. Ak chcete, do poľa nižšie môžete pridať ďalšie komentáre, ktoré treba zahrnúť do tejto správy.
  sl: Ko ste končali z identifikacijo vseh tveganj v vaši organizaciji in ste ustvarili načrt ukrepov, lahko ustvarite poročilo, ki bo vsebovalo vse vaše rezultate in predloge.
  sq: Tani që keni mbaruar identifikimin e të gjitha rreziqeve në organizatën tuaj dhe keni krijuar një plan veprimi, mund të krijoni një raport që liston të gjitha rezultatet tuaja. Mund të shtoni, nëse dëshironi, disa komente shtesë që duhet të përfshihen në këtë raport në fushën më poshtë.
  sr: Sada kada ste završili sa identifikacijom svih rizika u vašoj organizaciji i kreirali akcioni plan, možete kreirati izveštaj koji navodi sve vaše rezultate. Možete, ako želite, dodati neke dodatne komentare koji treba da budu uključeni u ovaj izveštaj u polju ispod.
  sv: Nu när du har avslutat identifieringen av alla risker i din organisation och skapat en handlingsplan kan du skapa en rapport som listar alla dina resultat. Du kan, om du vill, lägga till några extra kommentarer som ska inkluderas i denna rapport i fältet nedan.
  uk: Тепер, коли ви завершили ідентифікацію всіх ризиків у вашій організації та створили план дій, ви можете створити звіт, який містить усі ваші результати. За бажанням ви можете додати деякі додаткові коментарі, які слід включити до цього звіту, у полі нижче.
