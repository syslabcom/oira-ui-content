label_report_comment:
  bg: Моля, оставете допълнителни коментари, които трябва да бъдат включени  в доклада, в това поле.
  ca: Si us plau, deixeu en aquest camp qualsevol comentari que pugueu tenir sobre la pregunta de dalt.
  cs: Zde můžete přidat poznámky a komentáře.
  cy: Gadewch unrhyw sylwadau ychwanegol y dylid eu cynnwys yn yr adroddiad yn y maes hwn.
  da: Skriv eventuelle ekstra kommentarer, der skal inkluderes i rapporten, i dette felt.
  de: Bitte geben Sie jegliche zusätzliche Kommentare, die in den Bericht aufgenommen werden sollen, in dieses Feld ein.
  el: Παρακαλώ υποβάλλετε στο πεδίο αυτό τυχόν σχόλια σχετικά με την παραπάνω ερώτηση
