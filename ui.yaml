message_report_downloads_intro:
  nl: Sla het rapport op uw computer op en druk het af. U kunt het ook wijzigen of
    meer informatie toevoegen. Houd er rekening mee dat wijzigingen die op uw pc worden
    aangebracht NIET worden opgeslagen in de OiRA-risicobeoordeling.
  en: Save the report on your computer and print it. You can also modify it or add
    more information. Please note that changes made on your pc will NOT be saved in
    the OiRA risk assessment.
  fr: Enregistrez le rapport sur votre ordinateur et imprimez-le. Vous pouvez également
    le modifier ou ajouter plus d'informations. Veuillez noter que les modifications
    effectuées sur votre pc NE seront PAS sauvegardées dans l'évaluation des risques
    OiRA.
  de: Speichern Sie den Bericht auf Ihrem Computer und drucken Sie ihn aus. Sie können
    ihn auch ändern oder weitere Informationen hinzufügen. Bitte beachten Sie, dass
    Änderungen, die auf Ihrem PC vorgenommen werden, NICHT in der OiRA-Risikobewertung
    gespeichert werden.
  es: Guarde el informe en su ordenador e imprímalo. También puede modificarlo o añadir
    más información. Tenga en cuenta que los cambios realizados en su pc NO se guardarán
    en la evaluación de riesgos de OiRA.
  it: Salva il rapporto sul tuo computer e stampalo. Puoi anche modificarlo o aggiungere
    altre informazioni. Si prega di notare che le modifiche apportate sul tuo pc NON
    verranno salvate nella valutazione dei rischi OiRA.
  pt: Guarde o relatório no seu computador e imprima-o. Também pode modificá-lo ou
    adicionar mais informações. Por favor, note que as alterações feitas no seu pc
    NÃO serão salvas na avaliação de risco OiRA.
  pl: Zapisz raport na swoim komputerze i wydrukuj go. Możesz również go zmodyfikować
    lub dodać więcej informacji. Należy pamiętać, że zmiany dokonane na Państwa komputerze
    NIE zostaną zapisane w ocenie ryzyka OiRA.
  hu: Mentse el a jelentést a számítógépére és nyomtassa ki. Módosíthatja is, vagy
    hozzáadhat további információkat. Kérjük, vegye figyelembe, hogy a számítógépén
    végrehajtott módosítások NEM kerülnek mentésre az OiRA kockázatértékelésben.
  sv: Spara rapporten på din dator och skriv ut den. Du kan också ändra den eller
    lägga till mer information. Observera att ändringar som gjorts på din dator INTE
    kommer att sparas i OiRA-riskbedömningen.
  da: Gem rapporten på din computer og udskriv den. Du kan også ændre den eller tilføje
    flere oplysninger. Bemærk venligst, at ændringer foretaget på din pc IKKE vil
    blive gemt i OiRA-risikovurderingen.
  fi: Tallenna raportti tietokoneellesi ja tulosta se. Voit myös muokata sitä tai
    lisätä lisätietoja. Huomaa, että tietokoneellasi tehdyt muutokset EIVÄT tallennu
    OiRA-riskinarviointiin.
  cs: Uložte zprávu do svého počítače a vytiskněte ji. Můžete ji také upravit nebo
    přidat další informace. Vezměte prosím na vědomí, že změny provedené na vašem
    počítači NEBUDOU uloženy v hodnocení rizik OiRA.
  sk: Uložte správu do svojho počítača a vytlačte ju. Môžete ju tiež upraviť alebo
    pridať ďalšie informácie. Upozorňujeme, že zmeny vykonané na vašom počítači NEBUDÚ
    uložené v hodnot
  bg: Запазете доклада на вашия компютър и го отпечатайте. Можете също да го промените
    или да добавите повече информация. Моля, имайте предвид, че промените, направени
    на вашия компютър, НЯМА да бъдат запазени в оценката на риска OiRA.
  ca: Deseu l'informe al vostre ordinador i imprimiu-lo. També podeu modificar-lo
    o afegir més informació. Tingueu en compte que els canvis fets al vostre ordinador
    NO es desaran a l'avaluació de riscos d'OiRA.
  cy: Cadwch yr adroddiad ar eich cyfrifiadur a'i argraffu. Gallwch hefyd ei addasu
    neu ychwanegu mwy o wybodaeth. Sylwch na fydd newidiadau a wneir ar eich cyfrifiadur
    YN cael eu cadw yn asesiad risg OiRA.
  el: Αποθηκεύστε την έκθεση στον υπολογιστή σας και εκτυπώστε την. Μπορείτε επίσης
    να την τροποποιήσετε ή να προσθέσετε περισσότερες πληροφορίες. Σημειώστε ότι οι
    αλλαγές που γίνονται στον υπολογιστή σας ΔΕΝ θα αποθηκευτούν στην αξιολόγηση κινδύνου
    OiRA.
  et: Salvestage aruanne oma arvutisse ja printige see välja. Samuti saate seda muuta
    või lisada rohkem teavet. Pange tähele, et arvutis tehtud muudatusi EI salvestata
    OiRA riskihinnangusse.
  ga: Sábháil an tuarascáil ar do ríomhaire agus priontáil í. Is féidir leat í a mhodhnú
    freisin nó tuilleadh eolais a chur leis. Tabhair faoi deara nach ndéanfar na hathruithe
    a rinneadh ar do ríomhaire a shábháil san measúnú riosca OiRA.
  he: שמור את הדוח במחשב שלך והדפס אותו. תוכל גם לשנות אותו או להוסיף מידע נוסף. שים
    לב שהשינויים שנעשו במחשב שלך לא יישמרו בהערכת הסיכונים של OiRA.
  hr: Spremite izvješće na računalo i ispišite ga. Možete ga i izmijeniti ili dodati
    više informacija. Napominjemo da promjene napravljene na vašem računalu NEĆE biti
    spremljene u OiRA procjeni rizika.
  is: Vistaðu skýrsluna á tölvunni þinni og prentaðu hana. Þú getur líka breytt henni
    eða bætt við frekari upplýsingum. Vinsamlegast athugaðu að breytingar sem gerðar
    eru á tölvunni þinni verða EKKI vistaðar í OiRA áhættumatinu.
  lt: Išsaugokite ataskaitą savo kompiuteryje ir ją atsispausdinkite. Taip pat galite
    ją modifikuoti arba pridėti daugiau informacijos. Atkreipkite dėmesį, kad jūsų
    kompiuteryje atlikti pakeitimai NEBUS išsaugoti OiRA rizikos vertinime.
  lv: Saglabājiet atskaiti savā datorā un izdrukājiet to. Varat arī to modificēt vai
    pievienot papildu informāciju. Lūdzu, ņemiet vērā, ka izmaiņas, kas veiktas jūsu
    datorā, NETIKS saglabātas OiRA riska novērtējumā.
  mt: Issejvja r-rapport fuq il-kompjuter tiegħek u ipprintjah. Tista' wkoll timmodifikah
    jew żżid aktar informazzjoni. Jekk jogħġbok innota li l-bidliet magħmula fuq il-PC
    tiegħek MA jiġux issalvati fil-valutazzjoni tar-riskju OiRA.
  nl_BE: 'Sla het rapport op uw computer op en druk het af. U kunt het ook aanpassen
    of meer informatie toevoegen. Let op: wijzigingen die op uw pc worden aangebracht,
    worden NIET opgeslagen in de OiRA-risicobeoordeling.'
  nl_be: 'Sla het rapport op uw computer op en druk het af. U kunt het ook aanpassen
    of meer informatie toevoegen. Let op: wijzigingen die op uw pc worden aangebracht,
    worden NIET opgeslagen in de OiRA-risicobeoordeling.'
  'no': Lagre rapporten på datamaskinen din og skriv den ut. Du kan også endre den
    eller legge til mer informasjon. Vær oppmerksom på at endringer gjort på din PC
    IKKE vil bli lagret i OiRA-risikovurderingen.
  ro: Salvați raportul pe computerul dvs. și tipăriți-l. Puteți, de asemenea, să îl
    modificați sau să adăugați mai multe informații. Vă rugăm să rețineți că modificările
    efectuate pe computerul dvs. NU vor fi salvate în evaluarea riscurilor OiRA.
  ru: Сохраните отчёт на своём компьютере и распечатайте его. Вы также можете изменить
    его или добавить дополнительную информацию. Обратите внимание, что изменения,
    внесённые на вашем ПК, НЕ будут сохранены в оценке рисков OiRA.
  sl: Poročilo shranite na računalnik in ga natisnite. Lahko ga tudi spremenite ali
    dodate več informacij. Upoštevajte, da spremembe, narejene na vašem računalniku,
    NE bodo shranjene v oceni tveganja OiRA.
  sq: Ruajeni raportin në kompjuterin tuaj dhe printojeni. Mund ta modifikoni gjithashtu
    ose të shtoni më shumë informacion. Ju lutemi vini re se ndryshimet e bëra në
    kompjuterin tuaj NUK do të ruhen në vlerësimin e rrezikut OiRA.
  sr: Sačuvajte izveštaj na svom računaru i odštampajte ga. Takođe ga možete izmeniti
    ili dodati više informacija. Imajte na umu da promene napravljene na vašem računaru
    NEĆE biti sačuvane u OiRA proceni rizika.
  uk: Збережіть звіт на своєму комп'ютері та роздрукуйте його. Ви також можете змінити
    його або додати більше інформації. Зверніть увагу, що зміни, внесені на вашому
    ПК, НЕ будуть збережені в оцінці ризиків OiRA.
