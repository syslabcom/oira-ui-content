message_training_add_questions:
  nl: Voeg hieronder desgewenst vragen toe aan uw tool. De vragen zullen gesteld worden
    aan het einde van de training.
  en: If desired, add questions to your tool below. The questions will be asked at
    the end of the training.
  fr: Si vous le souhaitez, ajoutez des questions à votre outil ci-dessous. Les questions
    seront posées à la fin de la formation.
  de: Fügen Sie bei Bedarf unten Fragen zu Ihrem Tool hinzu. Die Fragen werden am
    Ende der Schulung gestellt.
  es: Si lo desea, agregue preguntas a su herramienta a continuación. Las preguntas
    se harán al final de la capacitación.
  it: Se desiderato, aggiungi domande al tuo strumento di seguito. Le domande verranno
    poste alla fine della formazione.
  pt: Se desejar, adicione perguntas à sua ferramenta abaixo. As perguntas serão feitas
    no final do treinamento.
  pl: Jeśli chcesz, dodaj pytania do swojego narzędzia poniżej. Pytania zostaną zadane
    na końcu szkolenia.
  sv: Om så önskas, lägg till frågor till ditt verktyg nedan. Frågorna kommer att
    ställas i slutet av träningen.
  da: Hvis ønsket, tilføj spørgsmål til dit værktøj nedenfor. Spørgsmålene vil blive
    stillet i slutningen af træningen.
  fi: Jos haluat, lisää kysymyksiä työkaluusi alla. Kysymykset esitetään koulutuksen
    lopussa.
  cs: Pokud chcete, přidejte otázky do svého nástroje níže. Otázky budou položeny
    na konci školení.
  el: Εάν επιθυμείτε, προσθέστε ερωτήσεις στο εργαλείο σας παρακάτω. Οι ερωτήσεις
    θα κατατεθούν στο τέλος της εκπαίδευσης.
  hu: Ha szeretné, adjon hozzá kérdéseket a képzéshez alább. A kérdéseket a képzés
    végén teszik fel.
  ro: Dacă doriți, adăugați întrebări la instrumentul dvs. mai jos. Întrebările vor
    fi puse la sfârșitul instruirii.
  bg: При желание, добавете въпроси към вашия инструмент по-долу. Въпросите ще бъдат
    зададени в края на обучението.
  hr: Ako želite, dodajte pitanja u svoj alat u nastavku. Pitanja će biti postavljena
    na kraju obuke.
  sk: Ak chcete, pridajte otázky do svojho nástroja nižšie. Otázky budú položené na
    konci školenia.
  sl: Če želite, dodajte vprašanja v svoje orodje spodaj. Vprašanja bodo postavljena
    na koncu usposabljanja.
  lt: Jei norite, pridėkite klausimus į savo įrankį žemiau. Klausimai bus užduodami
    mokymo pabaigoje.
  lv: Ja vēlaties, pievienojiet jautājumus savam rīkam zemāk. Jautājumi tiks uzdoti
    apmācības beigās.
  et: Kui soovite, lisage küsimused oma tööriista alla. Küsimused esitatakse koolituse
    lõpus.
  mt: Jekk jogħġbok, żid mistoqsijiet għall-għodda tiegħek hawn taħt. Il-mistoqsijiet
    se jittellgħu fl-aħħar tal-għodda.
  he: אם רוצים, ניתן להוסיף שאלות לכלי שלך למטה. השאלות יוצגו בסוף ההכשרה.
  ca: Si ho desitgeu, afegiu preguntes a la vostra eina a continuació. Les preguntes
    es faran al final de la formació.
  cy: Os dymunir, ychwanegwch gwestiynau at eich offeryn isod. Gofynnir y cwestiynau
    ar ddiwedd yr hyfforddiant.
  ga: Más mian leat, cuir ceisteanna le do uirlis thíos. Cuirfear na ceisteanna ag
    deireadh an oiliúna.
  is: Ef þess er óskað, bættu spurningum við verkfærið þitt hér að neðan. Spurningunum
    verður svarað í lok þjálfunarinnar.
  nl_BE: Voeg indien gewenst vragen toe aan uw tool hieronder. De vragen worden gesteld
    aan het einde van de training.
  nl_be: Voeg indien gewenst vragen toe aan uw hulpmiddel hieronder. De vragen worden
    gesteld aan het einde van de training.
  'no': Legg til spørsmål i verktøyet ditt nedenfor om ønskelig. Spørsmålene vil bli
    stilt på slutten av opplæringen.
  ru: При желании добавьте вопросы в ваш инструмент ниже. Вопросы будут заданы в конце
    обучения.
  sq: Nëse dëshironi, shtoni pyetje në mjetin tuaj më poshtë. Pyetjet do të bëhen
    në fund të trajnimit.
  sr: Ako želite, dodajte pitanja u vaš alat ispod. Pitanja će biti postavljena na
    kraju obuke.
  uk: За бажанням, додайте запитання до вашого інструменту нижче. Запитання будуть
    задані наприкінці навчання.
message_training_author_info:
  nl: Voeg een training toe aan uw tool. De gebruiker krijgt in een automatisch gegenereerde
    presentatie uitleg over eventuele risico's en maatregelen. Gebruikers die risicobeoordelingen
    mogen verrichten kunnen de automatisch gegenereerde training zelf uitbreiden of
    inkorten. U kunt vragen aan de tool toevoegen die aan het eind van de training
    gesteld zullen worden.
  en: Add a training module to your tool. Users will receive an automatically generated
    presentation explaining potential risks and measures. Users authorized to conduct
    risk assessments can extend or shorten the automatically generated training themselves.
    You can add questions to the tool that will be asked at the end of the training.
  fr: Ajoutez un module de formation à votre outil. Les utilisateurs recevront une
    présentation générée automatiquement expliquant les risques potentiels et les
    mesures à prendre. Les utilisateurs autorisés à effectuer des évaluations des
    risques peuvent eux-mêmes prolonger ou raccourcir la formation générée automatiquement.
    Vous pouvez ajouter des questions à l'outil qui seront posées à la fin de la formation.
  de: Fügen Sie Ihrem Tool ein Schulungsmodul hinzu. Die Nutzer erhalten eine automatisch
    erstellte Präsentation, die potenzielle Risiken und Maßnahmen erläutert. Nutzer,
    die Risikobewertungen durchführen dürfen, können die automatisch erstellte Schulung
    selbst erweitern oder verkürzen. Sie können dem Tool Fragen hinzufügen, die am
    Ende der Schulung gestellt werden.
  es: Agregue un módulo de capacitación a su herramienta. Los usuarios recibirán una
    presentación generada automáticamente que explica los riesgos potenciales y las
    medidas. Los usuarios autorizados para realizar evaluaciones de riesgo pueden
    extender o acortar la capacitación generada automáticamente por sí mismos. Puede
    agregar preguntas a la herramienta que se harán al final de la capacitación.
  it: Aggiungi un modulo di formazione al tuo strumento. Gli utenti riceveranno una
    presentazione generata automaticamente che spiega i potenziali rischi e le misure.
    Gli utenti autorizzati a effettuare valutazioni del rischio possono estendere
    o accorciare da soli la formazione generata automaticamente. Puoi aggiungere domande
    allo strumento che verranno poste alla fine della formazione.
  pt: Adicione um módulo de treinamento à sua ferramenta. Os usuários receberão uma
    apresentação gerada automaticamente explicando os riscos potenciais e medidas.
    Usuários autorizados a realizar avaliações de risco podem estender ou encurtar
    o treinamento gerado automaticamente por si mesmos. Você pode adicionar perguntas
    à ferramenta que serão feitas no final do treinamento.
  sv: Lägg till en utbildningsmodul i ditt verktyg. Användarna får en automatgenererad
    presentation som förklarar potentiella risker och åtgärder. Användare som är behöriga
    att genomföra riskbedömningar kan själva förlänga eller förkorta den automatgenererade
    utbildningen. Du kan lägga till frågor i verktyget som kommer att ställas i slutet
    av utbildningen.
  da: Tilføj en træningsmodul til dit værktøj. Brugerne modtager en automatisk genereret
    præsentation, der forklarer potentielle risici og foranstaltninger. Brugere, der
    er autoriserede til at udføre risikovurderinger, kan selv forlænge eller forkorte
    den automatisk genererede træning. Du kan tilføje spørgsmål til værktøjet, som
    vil blive stillet i slutningen af træningen.
  fi: Lisää koulutusmoduuli työkaluusi. Käyttäjät saavat automaattisesti luodun esityksen,
    joka selittää mahdollisia riskejä ja toimenpiteitä. Käyttäjät, jotka ovat valtuutettuja
    suorittamaan riskiarvioita, voivat itse laajentaa tai lyhentää automaattisesti
    luotua koulutusta. Voit lisätä kysymyksiä työkaluun, jotka esitetään koulutuksen
    lopussa.
  cs: Přidejte školicí modul do svého nástroje. Uživatelé obdrží automaticky generovanou
    prezentaci, která vysvětlí potenciální rizika a opatření. Uživatelé oprávnění
    k provádění hodnocení rizik mohou sami prodloužit nebo zkrátit automaticky generované
    školení. Můžete přidat otázky do nástroje, které budou položeny na konci školení.
  el: Προσθέστε ένα εκπαιδευτικό μοντέλο στο εργαλείο σας. Οι χρήστες θα λάβουν αυτόματα
    δημιουργημένη παρουσίαση που εξηγεί τους πιθανούς κινδύνους και τα μέτρα. Οι χρήστες
    που είναι εξουσιοδοτημένοι να πραγματοποιούν αξιολογήσεις κινδύνου μπορούν να
    επεκτείνουν ή να μειώσουν αυτόματα την εκπαίδευση. Μπορείτε να προσθέσετε ερωτήσεις
    στο εργαλείο που θα ρωτηθούν στο τέλος της εκπαίδευσης.
  hu: Adjon hozzá egy képzési modult a képzéshez. A felhasználók automatikusan generált
    bemutatót kapnak, amely magyarázza a potenciális kockázatokat és intézkedéseket.
    Azok a felhasználók, akik jogosultak a kockázatértékelések elvégzésére, saját
    maguk is meghosszabbíthatják vagy lerövidíthetik az automatikusan generált képzést.
    Hozzáadhat kérdéseket a képzéshez, amelyeket a képzés végén fognak feltenni.
  ro: Adăugați un modul de instruire la instrumentul dvs. Utilizatorii vor primi o
    prezentare generată automat care explică riscurile potențiale și măsurile. Utilizatorii
    autorizați să efectueze evaluări de risc pot extinde sau scurta singuri instruirea
    generată automat. Puteți adăuga întrebări la instrument care vor fi puse la sfârșitul
    instruirii.
  bg: Добавете модул за обучение към вашия инструмент. Потребителите ще получат автоматично
    генерирана презентация, която обяснява потенциалните рискове и мерките. Потребителите,
    упълномощени да извършват оценки на риска, могат сами да разширят или съкратят
    автоматично генерираното обучение. Можете да добавите въпроси към инструмента,
    които ще бъдат зададени в края на обучението.
  hr: Dodajte modul obuke svom alatu. Korisnici će dobiti automatski generiranu prezentaciju
    koja objašnjava potencijalne rizike i mjere. Korisnici ovlašteni za provođenje
    procjena rizika mogu sami proširiti ili skratiti automatski generiranu obuku.
    Možete dodati pitanja u alat koja će biti postavljena na kraju obuke.
  sk: Pridajte školiaci modul do vášho nástroja. Užívatelia dostanú automaticky generovanú
    prezentáciu, ktorá vysvetľuje potenciálne riziká a opatrenia. Užívatelia oprávnení
    k vykonávaniu hodnotení rizík môžu sami predĺžiť alebo skrátiť automaticky generovanú
    školenie. Môžete pridať otázky do nástroja, ktoré budú položené na konci školenia.
  sl: Dodajte modul za usposabljanje v svoje orodje. Uporabniki bodo prejeli avtomatsko
    generirano predstavitev, ki pojasnjuje potencialna tveganja in ukrepe. Uporabniki,
    ki so pooblaščeni za izvajanje ocenjevanj tveganja, lahko sami podaljšajo ali
    skrajšajo avtomatsko generirano usposabljanje. Lahko dodate vprašanja v orodje,
    ki bodo postavljena na koncu usposabljanja.
  lt: Pridėkite mokymo modulį į savo įrankį. Vartotojai gaus automatiškai sugeneruotą
    pristatymą, kuriame bus paaiškintos galimos rizikos ir priemonės. Vartotojai,
    turintys teisę atlikti rizikos vertinimus, gali patys pratęsti arba sutrumpinti
    automatiškai sugeneruotą mokymą. Galite pridėti klausimus į įrankį, kurie bus
    užduodami mokymo pabaigoje.
  lv: Pievienojiet apmācības moduli savam rīkam. Lietotāji saņems automātiski ģenerētu
    prezentāciju, kas skaidros potenciālos riskus un pasākumus. Lietotāji, kuriem
    ir atļauja veikt riska novērtējumus, var paši paplašināt vai saīsināt automātiski
    ģenerēto apmācību. Jūs varat pievienot jautājumus rīkam, kas tiks uzdoti apmācības
    beigās.
  et: Lisage koolitusmoodul oma tööriista. Kasutajad saavad automaatselt genereeritud
    esitluse, mis selgitab potentsiaalseid riske ja meetmeid. Riskihindamise õigustega
    kasutajad saavad ise pikendada või lühendada automaatselt genereeritud koolitust.
    Saate lisada tööriista küsimusi, mis esitatakse koolituse lõpus.
  mt: Żid it-taħriġ mal-għodda tiegħek. L-utent jirċievi spjegazzjoni ta' kwalunkwe
    riskju u miżura fi preżentazzjoni ġġenerata awtomatikament. Utenti li jitħallew
    iwettqu valutazzjonijiet tar-riskju jistgħu jestendu jew iqassru t-taħriġ iġġenerat
    awtomatikament huma stess. Tista 'żżid mistoqsijiet mal-għodda li se tintalab
    fi tmiem it-taħriġ.
  he: הוסף מודול הכשרה לכלי שלך. המשתמשים יקבלו מצגת שנוצרה אוטומטית המסבירה על סיכונים
    פוטנציאליים ואמצעים. משתמשים שמורשים לבצע דירוגי סיכון יכולים להרחיב או לקצר את
    ההכשרה שנוצרה אוטומטית באופן עצמאי. ניתן להוסיף שאלות לכלי שישאלו בסוף ההכשרה.
  ca: Afegiu un mòdul de formació a la vostra eina. Els usuaris rebran una presentació
    generada automàticament que explica els riscos potencials i les mesures. Els usuaris
    autoritzats a realitzar avaluacions de riscos poden ampliar o escurçar ells mateixos
    la formació generada automàticament. Podeu afegir preguntes a l'eina que es formularan
    al final de la formació.
  cy: Ychwanegwch fodiwl hyfforddiant at eich offeryn. Bydd defnyddwyr yn derbyn cyflwyniad
    a gynhyrchir yn awtomatig sy'n egluro risgiau a mesurau posibl. Gall defnyddwyr
    sydd wedi'u hawdurdodi i gynnal asesiadau risg ymestyn neu gwtogi'r hyfforddiant
    a gynhyrchir yn awtomatig eu hunain. Gallwch ychwanegu cwestiynau at yr offeryn
    a fydd yn cael eu gofyn ar ddiwedd yr hyfforddiant.
  ga: Cuir modúl oiliúna le d'uirlis. Gheobhaidh úsáideoirí cur i láthair a ghintear
    go huathoibríoch ag míniú rioscaí agus bearta féideartha. Is féidir le húsáideoirí
    atá údaraithe chun measúnuithe riosca a dhéanamh an oiliúint a ghintear go huathoibríoch
    a shíneadh nó a ghiorrú iad féin. Is féidir leat ceisteanna a chur leis an uirlis
    a chuirfear ag deireadh na hoiliúna.
  is: Bættu þjálfunareiningu við verkfærið þitt. Notendur munu fá sjálfvirkt myndað
    kynningarefni sem útskýrir hugsanlegar áhættur og ráðstafanir. Notendur sem hafa
    heimild til að framkvæma áhættumat geta sjálfir lengt eða styttt sjálfvirkt myndaða
    þjálfunina. Þú getur bætt spurningum við verkfærið sem verða lagðar fram í lok
    þjálfunarinnar.
  nl_BE: Voeg een trainingsmodule toe aan uw tool. Gebruikers ontvangen een automatisch
    gegenereerde presentatie die mogelijke risico's en maatregelen toelicht. Gebruikers
    die gemachtigd zijn om risicobeoordelingen uit te voeren, kunnen de automatisch
    gegenereerde training zelf uitbreiden of inkorten. U kunt vragen toevoegen aan
    de tool die aan het einde van de training worden gesteld.
  nl_be: Voeg een trainingsmodule toe aan uw instrument. Gebruikers ontvangen een
    automatisch gegenereerde presentatie die potentiële risico's en maatregelen toelicht.
    Gebruikers die gemachtigd zijn om risicobeoordelingen uit te voeren, kunnen de
    automatisch gegenereerde training zelf uitbreiden of inkorten. U kunt vragen toevoegen
    aan het instrument die aan het einde van de training worden gesteld.
  'no': Legg til en opplæringsmodul i verktøyet ditt. Brukere vil motta en automatisk
    generert presentasjon som forklarer potensielle risikoer og tiltak. Brukere som
    er autorisert til å gjennomføre risikovurderinger, kan selv utvide eller forkorte
    den automatisk genererte opplæringen. Du kan legge til spørsmål i verktøyet som
    vil bli stilt på slutten av opplæringen.
  pl: Dodaj moduł szkoleniowy do swojego narzędzia. Użytkownicy otrzymają automatycznie
    wygenerowaną prezentację wyjaśniającą potencjalne zagrożenia i środki. Użytkownicy
    uprawnieni do przeprowadzania ocen ryzyka mogą samodzielnie rozszerzyć lub skrócić
    automatycznie wygenerowane szkolenie. Możesz dodać pytania do narzędzia, które
    będą zadawane na końcu szkolenia.
  ru: Добавьте модуль обучения в свой инструмент. Пользователи получат автоматически
    сгенерированную презентацию, объясняющую потенциальные риски и меры. Пользователи,
    уполномоченные проводить оценку рисков, могут самостоятельно расширять или сокращать
    автоматически сгенерированное обучение. Вы можете добавлять вопросы в инструмент,
    которые будут задаваться в конце обучения.
  sq: Shtoni një modul trajnimi në mjetin tuaj. Përdoruesit do të marrin një prezantim
    të gjeneruar automatikisht që shpjegon rreziqet dhe masat e mundshme. Përdoruesit
    e autorizuar për të kryer vlerësime të rrezikut mund të zgjasin ose shkurtojnë
    vetë trajnimin e gjeneruar automatikisht. Mund të shtoni pyetje në mjet që do
    të bëhen në fund të trajnimit.
  sr: Dodajte modul za obuku u vaš alat. Korisnici će dobiti automatski generisanu
    prezentaciju koja objašnjava potencijalne rizike i mere. Korisnici ovlašćeni za
    sprovođenje procena rizika mogu sami proširiti ili skratiti automatski generisanu
    obuku. Možete dodati pitanja u alat koja će biti postavljena na kraju obuke.
  uk: Додайте навчальний модуль до свого інструменту. Користувачі отримають автоматично
    згенеровану презентацію, що пояснює потенційні ризики та заходи. Користувачі,
    уповноважені проводити оцінку ризиків, можуть самостійно розширювати або скорочувати
    автоматично згенероване навчання. Ви можете додавати запитання до інструменту,
    які будуть задані наприкінці навчання.
