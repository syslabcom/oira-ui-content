message_you_are_about_to_unlock_consequences:
  de: Nach dem Entsperren müssen Sie die Einweisungsunterlagen erneut zur Bestätigung
    an die Fremdfirma schicken.
  en: After you unlock, you will have to resend the briefing documents to the contractor
    for validation.
  bg: След отключването ще трябва да изпратите отново инструктажните документи на
    изпълнителя за валидиране.
  ca: Després de desbloquejar, haureu de tornar a enviar els documents d'informació
    al contractista per a la seva validació.
  cs: Po odemknutí budete muset znovu odeslat informační dokumenty dodavateli k ověření.
  cy: Ar ôl datgloi, bydd rhaid i chi ail-anfon y dogfennau briffio at y contractwr
    i'w dilysu.
  da: Efter oplåsning skal du sende briefingdokumenterne til entreprenøren igen til
    validering.
  el: Μετά το ξεκλείδωμα, θα πρέπει να αποστείλετε εκ νέου τα έγγραφα ενημέρωσης στον
    εργολάβο για επικύρωση.
  es: Después de desbloquear, tendrá que reenviar los documentos informativos al contratista
    para su validación.
  et: Pärast avamist peate saatma briifingudokumendid töövõtjale kinnitamiseks uuesti.
  fi: Lukituksen avaamisen jälkeen sinun on lähetettävä tiedotusasiakirjat uudelleen
    urakoitsijalle vahvistusta varten.
  fr: Après le déverrouillage, vous devrez renvoyer les documents d'information au
    sous-traitant pour validation.
  ga: Tar éis díghlasála, beidh ort na cáipéisí brífinge a athsheoladh chuig an gconraitheoir
    le haghaidh bailíochtaithe.
  he: לאחר ביטול הנעילה, יהיה עליך לשלוח מחדש את מסמכי הבריפינג לקבלן לאימות.
  hr: Nakon otključavanja, morat ćete ponovno poslati dokumente za informiranje izvođaču
    radi provjere valjanosti.
  hu: A zárolás feloldása után újra el kell küldenie a tájékoztató dokumentumokat
    a vállalkozónak érvényesítés céljából.
  is: Eftir að þú opnar, þarftu að endursenda kynningargögnin til verktakans til staðfestingar.
  it: Dopo aver sbloccato, dovrai inviare nuovamente i documenti di briefing all'appaltatore
    per la validazione.
  lt: Po atrakinimo turėsite iš naujo išsiųsti instruktavimo dokumentus rangovui patvirtinimui.
  lv: Pēc atbloķēšanas jums būs jānosūta instruktāžas dokumenti darbuzņēmējam atkārtoti
    validācijai.
  mt: Wara li tiftaħ, se jkollok tibgħat mill-ġdid id-dokumenti tal-briefing lill-kuntrattur
    għall-validazzjoni.
  nl: Na het ontgrendelen moet u de briefingdocumenten opnieuw naar de aannemer sturen
    ter validatie.
  nl_BE: Na het ontgrendelen moet u de briefingdocumenten opnieuw naar de aannemer
    sturen ter validatie.
  nl_be: Na het ontgrendelen moet u de briefingdocumenten opnieuw naar de aannemer
    sturen ter validatie.
  'no': Etter at du låser opp, må du sende briefingdokumentene på nytt til entrepr\u00enøren
    for validering.
  pl: Po odblokowaniu będziesz musiał ponownie wysłać dokumenty briefingowe do wykonawcy
    w celu zatwierdzenia.
  pt: Após desbloquear, terá de reenviar os documentos de briefing ao empreiteiro
    para validação.
  ro: După deblocare, va trebui să retrimiteți documentele de informare contractantului
    pentru validare.
  ru: После разблокировки вам придётся повторно отправить инструктажные документы
    подрядчику для проверки.
  sk: Po odomknutí budete musieť znova odoslať informačné dokumenty zhotoviteľovi
    na overenie.
  sl: Po odklenitvi boste morali znova poslati informativna gradiva izvajalcu v potrditev.
  sq: Pas zhbllokimit, do t'ju duhet të ridërgoni dokumentet e informimit te kontraktori
