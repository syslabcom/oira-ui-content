message_lesser_experience_no_javascript:
  bg: Използвате остарял уеб браузър. Поради това няма да имате оптимално изживяване. Моля, инсталирайте по-нов браузър, за да използвате оптимално този сайт.
  ca: Esteu utilitzant un navegador web obsolet. A causa d'això, no tindreu una experiència òptima. Instal·leu un navegador més nou per fer un ús òptim d'aquest lloc.
  cs: Používáte zastaralý webový prohlížeč. Z tohoto důvodu nebudete mít optimální zážitek. Nainstalujte si prosím novější prohlížeč, abyste mohli tento web využívat optimálně.
  cy: Rydych chi'n defnyddio porwr gwe hen ffasiwn. Oherwydd hyn ni fyddwch yn cael profiad gorau posibl. Gosodwch borwr newydd er mwyn gwneud defnydd gorau o'r wefan hon.
  da: Du bruger en forældet webbrowser. Derfor vil du ikke få en optimal oplevelse. Installer venligst en nyere browser for at gøre optimal brug af dette websted.
  de: Sie verwenden einen veralteten Webbrowser. Dadurch werden Sie keine optimale Erfahrung haben. Bitte installieren Sie einen neueren Browser, um diese Seite optimal nutzen zu können.
  el: Χρησιμοποιείτε ένα παλαιό πρόγραμμα περιήγησης ιστού. Εξαιτίας αυτού δεν θα έχετε μια βέλτιστη εμπειρία. Παρακαλώ εγκαταστήστε ένα νεότερο πρόγραμμα περιήγησης για να αξιοποιήσετε βέλτιστα αυτόν τον ιστότοπο.
  en: You are using an outdated web browser. Because of this you won't have an optimal experience. Please install a newer browser in order to make optimal use of this site.
  es: Está utilizando un navegador web desactualizado. Por ello, no tendrá una experiencia óptima. Por favor, instale un navegador más reciente para hacer un uso óptimo de este sitio.
  et: Kasutate aegunud veebibrauserit. Seetõttu ei ole teie kasutajakogemus optimaalne. Palun installige uuem brauser, et seda saiti optimaalselt kasutada.
  fi: Käytät vanhentunutta verkkoselainta. Tämän vuoksi käyttökokemuksesi ei ole optimaalinen. Asenna uudempi selain käyttääksesi tätä sivustoa parhaalla mahdollisella tavalla.
  fr: Vous utilisez un navigateur web obsolète. Pour cette raison, vous n'aurez pas une expérience optimale. Veuillez installer un navigateur plus récent afin de profiter pleinement de ce site.
  ga: Tá tú ag úsáid brabhsálaí gréasáin as dáta. Dá bharr sin, ní bheidh taithí optamach agat. Suiteáil brabhsálaí níos nuaí le húsáid is fearr a bhaint as an suíomh seo.
  he: אתה משתמש בדפדפן אינטרנט מיושן. בגלל זה לא תהיה לך חוויה אופטימלית. אנא התקן דפדפן חדש יותר כדי להפיק את המרב מאתר זה.
  hr: Koristite zastarjeli web preglednik. Zbog toga nećete imati optimalno iskustvo. Molimo instalirajte noviji preglednik kako biste optimalno koristili ovo mjesto.
  hu: Elavult webböngészőt használ. Emiatt nem lesz optimális a felhasználói élménye. Kérjük, telepítsen egy újabb böngészőt, hogy a legjobban tudja használni ezt az oldalt.
  is: Þú ert að nota úrelta vafra. Vegna þessa muntu ekki fá sem besta upplifun. Vinsamlegast settu upp nýrri vafra til að nýta þessa síðu sem best.
  it: Stai utilizzando un browser web obsoleto. Per questo motivo non avrai un'esperienza ottimale. Installa un browser più recente per utilizzare al meglio questo sito.
  lt: Naudojate pasenusią naršyklę. Dėl to patirtis nebus optimali. Įdiekite naujesnę naršyklę, kad galėtumėte optimaliai naudotis šia svetaine.
  lv: Jūs izmantojat novecojušu tīmekļa pārlūkprogrammu. Tāpēc jūsu pieredze nebūs optimāla. Lūdzu, instalējiet jaunāku pārlūkprogrammu, lai optimāli izmantotu šo vietni.
  mt: Qed tuża browser tal-web li hu skadut. Minħabba f'hekk ma jkollokx esperjenza ottimali. Jekk jogħġbok installa browser aktar ġdid sabiex tagħmel użu ottimali minn dan is-sit.
  nl: U gebruikt een verouderde webbrowser. Hierdoor heeft u niet de optimale ervaring. Installeer een nieuwere browser om optimaal van deze site gebruik te kunnen blijven maken.
  nl_BE: U gebruikt een verouderde webbrowser. Hierdoor zult u geen optimale ervaring hebben. Installeer een nieuwere browser om optimaal gebruik te maken van deze site.
  nl_be: U gebruikt een verouderde webbrowser. Hierdoor zult u geen optimale ervaring hebben. Installeer een nieuwere browser om optimaal gebruik te maken van deze site.
  'no': Du bruker en utdatert nettleser. På grunn av dette vil du ikke ha en optimal opplevelse. Vennligst installer en nyere nettleser for å gjøre optimal bruk av dette nettstedet.
  pl: Używasz przestarzałej przeglądarki internetowej. Z tego powodu nie będziesz mieć optymalnych wrażeń. Zainstaluj nowszą przeglądarkę, aby optymalnie korzystać z tej witryny.
  pt: Está a utilizar um navegador web desatualizado. Por isso, não terá uma experiência ideal. Instale um navegador mais recente para fazer uso ideal deste site.
  ro: Utilizați un browser web învechit. Din această cauză, nu veți avea o experiență optimă. Vă rugăm să instalați un browser mai nou pentru a utiliza acest site în mod optim.
  ru: Вы используете устаревший веб-браузер. Из-за этого у вас не будет оптимального опыта. Пожалуйста, установите более новый браузер для оптимального использования этого сайта.
  sk: Používate zastaraný webový prehliadač. Z tohto dôvodu nebudete mať optimálny zážitok. Nainštalujte si novší prehliadač, aby ste mohli tento web využívať optimálne.
  sl: Uporabljate zastarel spletni brskalnik. Zaradi tega ne boste imeli optimalne izkušnje. Prosimo, namestite novejši brskalnik za optimalno uporabo tega spletnega mesta.
  sq: Jeni duke përdorur një shfletues interneti të vjetëruar. Për shkak të kësaj nuk do të keni një përvojë optimale. Ju lutemi instaloni një shfletues më të ri për të përdorur këtë faqe në mënyrë optimale.
  sr: Koristite zastareli web pregledač. Zbog toga nećete imati optimalno iskustvo. Molimo instalirajte noviji pregledač kako biste na optimalan način koristili ovaj sajt.
  sv: Du använder en föråldrad webbläsare. På grund av detta kommer du inte att ha en optimal upplevelse. Installera en nyare webbläsare för att använda den här webbplatsen på bästa sätt.
  uk: Ви використовуєте застарілий веб-браузер. Через це ви не матимете оптимального досвіду. Будь ласка, встановіть новіший браузер, щоб оптимально користуватися цим сайтом.
