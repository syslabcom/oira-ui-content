  sr: Neke aplikacije možda neće koristiti novi jezik dok ih ne restartujete.
  sv: Vissa appar kanske inte använder det nya språket förrän du startar om dem.
  uk: Деякі програми можуть не використовувати нову мову, доки ви їх не перезапустите.
message_tool_export_import:
  bg: Функционалността за експорт и импорт на инструменти може да се използва за изпращане на инструмент към агенция за превод, но също и за експортиране и повторен импорт за използване в друга страна.
  ca: La funcionalitat d'exportació i importació d'eines es pot utilitzar per enviar una eina a una agència de traducció, però també per exportar-la i importar-la de nou per utilitzar-la en un altre país.
  cs: Funkce exportu a importu nástroje může být použita k odeslání nástroje překladatelské agentuře, ale také k exportu a opětovnému importu pro použití v jiné zemi.
  cy: Gellir defnyddio swyddogaeth allforio a mewnforio'r offeryn i anfon offeryn at asiantaeth gyfieithu, ond hefyd i'w allforio a'i fewnforio eto i'w ddefnyddio mewn gwlad arall.
  da: Værktøjets eksport- og importfunktionalitet kan bruges til at sende et værktøj til et oversættelsesbureau, men også til at eksportere det og importere det igen til brug i et andet land.
  de: Die Export- und Importfunktionalität für Tools kann verwendet werden, um ein Tool an eine Übersetzungsagentur zu senden, aber auch um es zu exportieren und erneut zu importieren für die Verwendung in einem anderen Land.
  el: Η λειτουργικότητα εξαγωγής και εισαγωγής εργαλείων μπορεί να χρησιμοποιηθεί για την αποστολή ενός εργαλείου σε μεταφραστικό γραφείο, αλλά και για την εξαγωγή και επανεισαγωγή του για χρήση σε άλλη χώρα.
  en: The tool export and import functionality can be used to send a tool to a translation agency, but also to export it and import it again for use in another country.
  es: La funcionalidad de exportación e importación de herramientas se puede utilizar para enviar una herramienta a una agencia de traducción, pero también para exportarla e importarla nuevamente para su uso en otro país.
  et: Tööriista ekspordi- ja impordifunktsionaalsust saab kasutada tööriista saatmiseks tõlkebüroole, aga ka selle eksportimiseks ja uuesti importimiseks kasutamiseks teises riigis.
  fi: Työkalun vienti- ja tuontitoimintoa voidaan käyttää työkalun lähettämiseen käännöstoimistolle, mutta myös sen viemiseen ja uudelleen tuomiseen käytettäväksi toisessa maassa.
  fr: La fonctionnalité d'exportation et d'importation d'outils peut être utilisée pour envoyer un outil à une agence de traduction, mais aussi pour l'exporter et l'importer à nouveau pour une utilisation dans un autre pays.
  ga: Is féidir an fheidhmiúlacht onnmhairí agus iompórtála uirlis a úsáid chun uirlis a sheoladh chuig gníomhaireacht aistriúcháin, ach freisin chun í a onnmhairiú agus a hiompórtáil arís le húsáid i dtír eile.
  he: פונקציונליות ייצוא וייבוא הכלים יכולה לשמש לשליחת כלי לסוכנות תרגום, אך גם לייצא אותו ולייבא אותו שוב לשימוש במדינה אחרת.
  hr: Funkcionalnost izvoza i uvoza alata može se koristiti za slanje alata agenciji za prijevod, ali i za izvoz i ponovni uvoz za korištenje u drugoj zemlji.
  hu: Az eszköz export és import funkciója használható egy eszköz fordítóügynökséghez való küldésére, de arra is, hogy exportálja és újra importálja egy másik országban való használatra.
  is: Útflutnings- og innflutningsvirknin fyrir tól er hægt að nota til að senda tól til þýðingarmiðstöðvar, en einnig til að flytja það út og inn aftur til notkunar í öðru landi.
  it: La funzionalità di esportazione e importazione degli strumenti può essere utilizzata per inviare uno strumento a un'agenzia di traduzione, ma anche per esportarlo e importarlo nuovamente per l'uso in un altro paese.
  lt: Įrankių eksporto ir importo funkcionalumas gali būti naudojamas įrankiui siųsti vertimo agentūrai, bet taip pat jo eksportavimui ir pakartotiniam importavimui naudojimui kitoje šalyje.
  lv: Rīku eksporta un importa funkcionalitāti var izmantot, lai nosūtītu rīku tulkošanas aģentūrai, bet arī lai to eksportētu un atkārtoti importētu lietošanai citā valstī.
  mt: Il-funzjonalità tal-esportazzjoni u l-importazzjoni tal-għodod tista' tintuża biex tibgħat għodda lil aġenzija tat-traduzzjoni, iżda wkoll biex tesportaha u timportaha mill-ġdid għall-użu f'pajjiż ieħor.
  nl: De export- en importfunctionaliteit van het instrument kan worden gebruikt om een instrument naar een vertaalbureau te sturen, maar ook om het te exporteren en opnieuw te importeren voor gebruik in een ander land.
  nl_BE: De export- en importfunctionaliteit voor hulpmiddelen kan worden gebruikt om een hulpmiddel naar een vertaalbureau te sturen, maar ook om het te exporteren en opnieuw te importeren voor gebruik in een ander land.
  nl_be: De export- en importfunctionaliteit voor hulpmiddelen kan worden gebruikt om een hulpmiddel naar een vertaalbureau te sturen, maar ook om het te exporteren en opnieuw te importeren voor gebruik in een ander land.
  'no': Funksjonaliteten for eksport og import av verktøy kan brukes til å sende et verktøy til et oversettingsbyrå, men også til å eksportere det og importere det igjen for bruk i et annet land.
  pl: Funkcjonalność eksportu i importu narzędzi może być używana do wysyłania narzędzia do agencji tłumaczeniowej, ale także do eksportowania go i ponownego importowania do użytku w innym kraju.
  pt: A funcionalidade de exportação e importação de ferramentas pode ser usada para enviar uma ferramenta para uma agência de tradução, mas também para exportá-la e importá-la novamente para uso em outro país.
  ro: Funcționalitatea de export și import a instrumentelor poate fi utilizată pentru a trimite un instrument la o agenție de traducere, dar și pentru a-l exporta și importa din nou pentru utilizare în altă țară.
  ru: Функция экспорта и импорта инструмента может использоваться для отправки инструмента в бюро переводов, а также для его экспорта и повторного импорта для использования в другой стране.
  sk: Funkcia exportu a importu nástrojov môže byť použitá na odoslanie nástroja prekladateľskej agentúre, ale aj na jeho export a opätovný import na použitie v inej krajine.
  sl: Funkcionalnost izvoza in uvoza orodij se lahko uporablja za pošiljanje orodja prevajalski agenciji, pa tudi za izvoz in ponoven uvoz za uporabo v drugi državi.
  sq: Funksionaliteti i eksportimit dhe importimit të mjetit mund të përdoret për t'i dërguar një mjet një agjencie përkthimi, por edhe për ta eksportuar dhe importuar përsëri për përdorim në një vend tjetër.
  sr: Funkcionalnost izvoza i uvoza alata može se koristiti za slanje alata agenciji za prevođenje, ali i za izvoz i ponovni uvoz za korišćenje u drugoj zemlji.
  sv: Verktygets export- och importfunktionalitet kan användas för att skicka ett verktyg till en översättningsbyrå, men också för att exportera det och importera det igen för användning i ett annat land.
  uk: Функція експорту та імпорту інструменту може використовуватися для надсилання інструменту до агентства перекладів, а також для його експорту та повторного імпорту для використання в іншій країні.
message_tool_import:
  bg: Функционалността за импортиране на инструменти може да се използва например за импортиране на инструмент, който е експортиран от друга страна. По този начин създавате копие на оригиналния инструмент, който след това можете да редактирате сами.
  ca: La funcionalitat d'importació d'eines es pot utilitzar, per exemple, per importar una eina que s'hagi exportat d'un altre país. D'aquesta manera, es crea una còpia de l'eina original, que podeu editar vosaltres mateixos.
  cs: Funkce importu nástrojů může být použita například k importu nástroje, který byl exportován z jiné země. Tím vytvoříte kopii původního nástroje, kterou pak můžete sami upravovat.
  cy: Gellir defnyddio'r swyddogaeth mewnforio offeryn, er enghraifft, i fewnforio offeryn sydd wedi'i allforio o wlad arall. Rydych chi felly yn creu copi o'r offeryn gwreiddiol, y gallwch chi wedyn ei olygu eich hun.
  da: Værktøjsimportfunktionen kan for eksempel bruges til at importere et værktøj, der er eksporteret fra et andet land. Du opretter dermed en kopi af det originale værktøj, som du derefter selv kan redigere.
  de: Die Tool-Import-Funktionalität kann beispielsweise verwendet werden, um ein Tool zu importieren, das aus einem anderen Land exportiert wurde. Damit erstellen Sie eine Kopie des ursprünglichen Tools, das Sie anschließend selbst bearbeiten können.
  el: Η λειτουργικότητα εισαγωγής εργαλείων μπορεί να χρησιμοποιηθεί για παράδειγμα για την εισαγωγή ενός εργαλείου που έχει εξαχθεί από άλλη χώρα. Με αυτόν τον τρόπο δημιουργείτε ένα αντίγραφο του αρχικού εργαλείου, το οποίο μπορείτε στη συνέχεια να επεξεργαστείτε μόνοι σας.
  en: The tool import functionality can be used, for example, to import a tool that has been exported from another country. You thereby create a copy of the original tool, which you can then edit yourself.
  es: La funcionalidad de importación de herramientas puede utilizarse, por ejemplo, para importar una herramienta que ha sido exportada desde otro país. De esta manera, creas una copia de la herramienta original, que luego puedes editar tú mismo.
  et: Tööriista importimise funktsionaalsust saab kasutada näiteks tööriista importimiseks, mis on eksporditud teisest riigist. Sellega loote originaaltööriista koopia, mida saate seejärel ise redigeerida.
  fi: Työkalun tuontitoimintoa voidaan käyttää esimerkiksi sellaisen työkalun tuomiseen, joka on viety toisesta maasta. Näin luot kopion alkuperäisestä työkalusta, jota voit sitten itse muokata.
  fr: La fonctionnalité d'importation d'outils peut être utilisée, par exemple, pour importer un outil qui a été exporté d'un autre pays. Vous créez ainsi une copie de l'outil original, que vous pouvez ensuite modifier vous-même.
  ga: Is féidir an fheidhmiúlacht iompórtála uirlisí a úsáid, mar shampla, chun uirlis a iompórtáil a onnmhairiodh ó thír eile. Cruthaíonn tú cóip den uirlis bhunaidh dá bhrí sin, ar féidir leat í a chur in eagar ansin tú féin.
  he: פונקציונליות ייבוא הכלים יכולה לשמש, למשל, לייבא כלי שיוצא ממדינה אחרת. בכך אתה יוצר עותק של הכלי המקורי, שתוכל לערוך אותו בעצמך.
  hr: Funkcionalnost uvoza alata može se koristiti, na primjer, za uvoz alata koji je izvezen iz druge zemlje. Time stvarate kopiju originalnog alata koju zatim možete sami uređivati.
  hu: Az eszköz import funkciója használható például egy másik országból exportált eszköz importálására. Ezzel létrehozza az eredeti eszköz másolatát, amelyet aztán maga szerkeszthet.
  is: Innflutningsvirknin fyrir tól er hægt að nota, til dæmis, til að flytja inn tól sem hefur verið flutt út frá öðru landi. Þannig búðu til afrit af upprunalega tólinu, sem þú getur síðan breytt sjálfur.
  it: La funzionalità di importazione degli strumenti può essere utilizzata, ad esempio, per importare uno strumento che è stato esportato da un altro paese. In questo modo si crea una copia dello strumento originale, che è possibile poi modificare autonomamente.
  lt: Įrankių importo funkcionalumas gali būti naudojamas, pavyzdžiui, įrankiui, kuris buvo eksportuotas iš kitos šalies, importuoti. Taip sukuriate originalaus įrankio kopiją, kurią galite redaguoti patys.
  lv: Rīku importa funkcionalitāti var izmantot, piemēram, lai importētu rīku, kas ir eksportēts no citas valsts. Tādējādi jūs izveidojat oriģinālā rīka kopiju, ko pēc tam varat rediģēt paši.
  mt: Il-funzjonalità tal-importazzjoni tal-għodod tista' tintuża, pereżempju, biex timporta għodda li ġiet esportata minn pajjiż ieħor. B'hekk toħloq kopja tal-għodda oriġinali, li mbagħad tista' teditja int stess.
  nl: De functionaliteit voor het importeren van tools kan bijvoorbeeld worden gebruikt om een tool te importeren die is geëxporteerd vanuit een ander land. U creëert hiermee een kopie van de oorspronkelijke tool, die u vervolgens zelf kunt bewerken.
  nl_BE: De importfunctionaliteit voor hulpmiddelen kan worden gebruikt om bijvoorbeeld een hulpmiddel te importeren dat uit een ander land is geëxporteerd. Hiermee maakt u een kopie van het originele hulpmiddel, dat u vervolgens zelf kunt bewerken.
  nl_be: De importfunctionaliteit voor hulpmiddelen kan worden gebruikt om bijvoorbeeld een hulpmiddel te importeren dat uit een ander land is geëxporteerd. Hiermee maakt u een kopie van het originele hulpmiddel, dat u vervolgens zelf kunt bewerken.
  'no': Funksjonen for verktøyimport kan brukes til for eksempel å importere et verktøy som er eksportert fra et annet land. Du oppretter dermed en kopi av det originale verktøyet, som du deretter kan redigere selv.
  pl: Funkcjonalność importu narzędzi może być używana na przykład do importowania narzędzia, które zostało wyeksportowane z innego kraju. W ten sposób tworzysz kopię oryginalnego narzędzia, którą następnie możesz samodzielnie edytować.
  pt: A funcionalidade de importação de ferramentas pode ser usada, por exemplo, para importar uma ferramenta que foi exportada de outro país. Desta forma, cria uma cópia da ferramenta original, que pode depois editar você mesmo.
  ro: Funcționalitatea de import a instrumentelor poate fi utilizată, de exemplu, pentru a importa un instrument care a fost exportat dintr-o altă țară. Astfel creați o copie a instrumentului original, pe care o puteți edita apoi singur.
  ru: Функция импорта инструмента может использоваться, например, для импорта инструмента, экспортированного из другой страны. Таким образом вы создаёте копию оригинального инструмента, которую затем можете редактировать самостоятельно.
  sk: Funkcia importu nástrojov môže byť použitá napríklad na import nástroja, ktorý bol exportovaný z inej krajiny. Tým vytvoríte kópiu pôvodného nástroja, ktorú potom môžete sami upravovať.
  sl: Funkcionalnost uvoza orodij se lahko uporablja, na primer, za uvoz orodja, ki je bilo izvoženo iz druge države. S tem ustvarite kopijo originalnega orodja, ki jo lahko nato sami urejate.
  sq: Funksionaliteti i importimit të mjetit mund të përdoret, për shembull, për të importuar një mjet që është eksportuar nga një vend tjetër. Kjo krijon një kopje të mjetit origjinal, të cilën mund ta modifikoni vetë.
  sr: Funkcionalnost uvoza alata može se koristiti, na primer, za uvoz alata koji je izvezen iz druge zemlje. Time kreirate kopiju originalnog alata, koju zatim možete sami uređivati.
  sv: Verktygets importfunktionalitet kan användas till exempel för att importera ett verktyg som har exporterats från ett annat land. Därmed skapar du en kopia av det ursprungliga verktyget, som du sedan kan redigera själv.
  uk: Функція імпорту інструменту може використовуватися, наприклад, для імпорту інструменту, експортованого з іншої країни. Таким чином ви створюєте копію оригінального інструменту, яку потім можете редагувати самостійно.
message_training:
  bg: 'Забележка: Това е предварителен преглед. Моля, използвайте PowerPoint за обучение.'
  ca: 'Nota: Aquesta és una vista prèvia. Utilitzeu el PowerPoint per a la formació.'
  cs: 'Poznámka: Toto je náhled. Pro školení prosím použijte PowerPoint.'
  cy: 'Nodyn: Rhagolwg yw hwn. Defnyddiwch y PowerPoint ar gyfer hyfforddiant.'
  da: 'Bemærk: Dette er en forhåndsvisning. Brug venligst PowerPoint til træning.'
  de: 'Hinweis: Dies ist eine Vorschau. Zur Unterweisung PowerPoint verwenden.'
  el: 'Σημείωση: Αυτή είναι μια προεπισκόπηση. Παρακαλώ χρησιμοποιήστε το PowerPoint για εκπαίδευση.'
  en: 'Note: This is a preview. Please use the power point for training.'
  es: 'Nota: Esta es una vista previa. Utilice el PowerPoint para la capacitación.'
  et: 'Märkus: See on eelvaade. Palun kasutage koolituseks PowerPointi.'
  fi: 'Huomio: Tämä on esikatselu. Käytä PowerPointia koulutukseen.'
  fr: 'Note: This is a preview. Please use the power point for training.'
  ga: 'Nóta: Is réamhamharc é seo. Bain úsáid as an PowerPoint le haghaidh oiliúna.'
  he: 'הערה: זוהי תצוגה מקדימה. אנא השתמש בקובץ PowerPoint להכשרה.'
  hr: 'Napomena: Ovo je pregled. Molimo koristite PowerPoint za obuku.'
  hu: 'Megjegyzés: Ez egy előnézet. Kérjük, a képzéshez használja a PowerPoint fájlt.'
  is: 'Athugasemd: Þetta er forskoðun. Vinsamlegast notaðu PowerPoint fyrir þjálfun.'
  it: 'Nota: questa è un''anteprima. Si prega di utilizzare il PowerPoint per la formazione.'
  lt: 'Pastaba: tai peržiūra. Mokymams naudokite „PowerPoint" pristatymą.'
  lv: 'Piezīme: šis ir priekšskatījums. Lūdzu, izmantojiet PowerPoint prezentāciju apmācībai.'
  mt: 'Nota: Din hija previżjoni. Jekk jogħġbok uża l-PowerPoint għat-taħriġ.'
  nl: 'Opgelet: Dit is een voorvertoning. Gebruik de PowerPoint voor trainingsdoeleinden.'
  nl_BE: 'Opmerking: dit is een voorbeeld. Gebruik de PowerPoint-presentatie voor de training.'
  nl_be: 'Opmerking: dit is een voorbeeld. Gebruik de PowerPoint-presentatie voor de training.'
  'no': 'Merk: Dette er en forhåndsvisning. Bruk PowerPoint til opplæring.'
  pl: 'Uwaga: To jest podgląd. Do szkolenia użyj programu PowerPoint.'
  pt: 'Nota: Esta é uma pré-visualização. Utilize o PowerPoint para formação.'
  ro: 'Notă: Aceasta este o previzualizare. Vă rugăm să utilizați prezentarea PowerPoint pentru formare.'
  ru: 'Примечание: это предварительный просмотр. Для обучения используйте файл PowerPoint.'
  sk: 'Poznámka: Toto je náhľad. Prosím, použite PowerPoint na školenie.'
  sl: 'Opomba: To je predogled. Za usposabljanje prosimo uporabite PowerPoint.'
  sq: 'Shënim: Ky është një pamje paraprake. Ju lutemi përdorni PowerPoint për trajnim.'
  sr: 'Napomena: Ovo je pregled. Molimo koristite PowerPoint za obuku.'
  sv: 'Obs: Detta är en förhandsgranskning. Använd PowerPoint för utbildning.'
  uk: 'Примітка: це попередній перегляд. Будь ласка, використовуйте презентацію PowerPoint для навчання.'
message_training_add_questions:
  bg: При желание, добавете въпроси към вашия инструмент по-долу. Въпросите ще бъдат зададени в края на обучението.
  ca: Si ho desitgeu, afegiu preguntes a la vostra eina a continuació. Les preguntes es faran al final de la formació.
  cs: Pokud chcete, přidejte otázky do svého nástroje níže. Otázky budou položeny na konci školení.
  cy: Os dymunir, ychwanegwch gwestiynau at eich offeryn isod. Gofynnir y cwestiynau ar ddiwedd yr hyfforddiant.
  da: Hvis ønsket, tilføj spørgsmål til dit værktøj nedenfor. Spørgsmålene vil blive stillet i slutningen af træningen.
  de: Fügen Sie bei Bedarf unten Fragen zu Ihrem Tool hinzu. Die Fragen werden am Ende der Schulung gestellt.
  el: Εάν επιθυμείτε, προσθέστε ερωτήσεις στο εργαλείο σας παρακάτω. Οι ερωτήσεις θα κατατεθούν στο τέλος της εκπαίδευσης.
  en: If desired, add questions to your tool below. The questions will be asked at the end of the training.
  es: Si lo desea, agregue preguntas a su herramienta a continuación. Las preguntas se harán al final de la capacitación.
  et: Kui soovite, lisage küsimused oma tööriista alla. Küsimused esitatakse koolituse lõpus.
  fi: Jos haluat, lisää kysymyksiä työkaluusi alla. Kysymykset esitetään koulutuksen lopussa.
  fr: Si vous le souhaitez, ajoutez des questions à votre outil ci-dessous. Les questions seront posées à la fin de la formation.
  ga: Más mian leat, cuir ceisteanna le do uirlis thíos. Cuirfear na ceisteanna ag deireadh an oiliúna.
  he: אם רוצים, ניתן להוסיף שאלות לכלי שלך למטה. השאלות יוצגו בסוף ההכשרה.
  hr: Ako želite, dodajte pitanja u svoj alat u nastavku. Pitanja će biti postavljena na kraju obuke.
  hu: Ha szeretné, adjon hozzá kérdéseket a képzéshez alább. A kérdéseket a képzés végén teszik fel.
  is: Ef þess er óskað, bættu spurningum við verkfærið þitt hér að neðan. Spurningunum verður svarað í lok þjálfunarinnar.
  it: Se desiderato, aggiungi domande al tuo strumento di seguito. Le domande verranno poste alla fine della formazione.
  lt: Jei norite, pridėkite klausimus į savo įrankį žemiau. Klausimai bus užduodami mokymo pabaigoje.
  lv: Ja vēlaties, pievienojiet jautājumus savam rīkam zemāk. Jautājumi tiks uzdoti apmācības beigās.
  mt: Jekk jogħġbok, żid mistoqsijiet għall-għodda tiegħek hawn taħt. Il-mistoqsijiet se jittellgħu fl-aħħar tal-għodda.
  nl: Voeg hieronder desgewenst vragen toe aan uw tool. De vragen zullen gesteld worden aan het einde van de training.
  nl_BE: Voeg indien gewenst vragen toe aan uw tool hieronder. De vragen worden gesteld aan het einde van de training.
  nl_be: Voeg indien gewenst vragen toe aan uw hulpmiddel hieronder. De vragen worden gesteld aan het einde van de training.
  'no': Legg til spørsmål i verktøyet ditt nedenfor om ønskelig. Spørsmålene vil bli stilt på slutten av opplæringen.
  pl: Jeśli chcesz, dodaj pytania do swojego narzędzia poniżej. Pytania zostaną zadane na końcu szkolenia.
  pt: Se desejar, adicione perguntas à sua ferramenta abaixo. As perguntas serão feitas no final do treinamento.
  ro: Dacă doriți, adăugați întrebări la instrumentul dvs. mai jos. Întrebările vor fi puse la sfârșitul instruirii.
  ru: При желании добавьте вопросы в ваш инструмент ниже. Вопросы будут заданы в конце обучения.
  sk: Ak chcete, pridajte otázky do svojho nástroja nižšie. Otázky budú položené na konci školenia.
  sl: Če želite, dodajte vprašanja v svoje orodje spodaj. Vprašanja bodo postavljena na koncu usposabljanja.
  sq: Nëse dëshironi, shtoni pyetje në mjetin tuaj më poshtë. Pyetjet do të bëhen në fund të trajnimit.
  sr: Ako želite, dodajte pitanja u vaš alat ispod. Pitanja će biti postavljena na kraju obuke.
  sv: Om så önskas, lägg till frågor till ditt verktyg nedan. Frågorna kommer att ställas i slutet av träningen.
  uk: За бажанням, додайте запитання до вашого інструменту нижче. Запитання будуть задані наприкінці навчання.
message_training_author_info:
  bg: Добавете модул за обучение към вашия инструмент. Потребителите ще получат автоматично генерирана презентация, която обяснява потенциалните рискове и мерките. Потребителите, упълномощени да извършват оценки на риска, могат сами да разширят или съкратят автоматично генерираното обучение. Можете да добавите въпроси към инструмента, които ще бъдат зададени в края на обучението.
  ca: Afegiu un mòdul de formació a la vostra eina. Els usuaris rebran una presentació generada automàticament que explica els riscos potencials i les mesures. Els usuaris autoritzats a realitzar avaluacions de riscos poden ampliar o escurçar ells mateixos la formació generada automàticament. Podeu afegir preguntes a l'eina que es formularan al final de la formació.
  cs: Přidejte školicí modul do svého nástroje. Uživatelé obdrží automaticky generovanou prezentaci, která vysvětlí potenciální rizika a opatření. Uživatelé oprávnění k provádění hodnocení rizik mohou sami prodloužit nebo zkrátit automaticky generované školení. Můžete přidat otázky do nástroje, které budou položeny na konci školení.
  cy: Ychwanegwch fodiwl hyfforddiant at eich offeryn. Bydd defnyddwyr yn derbyn cyflwyniad a gynhyrchir yn awtomatig sy'n egluro risgiau a mesurau posibl. Gall defnyddwyr sydd wedi'u hawdurdodi i gynnal asesiadau risg ymestyn neu gwtogi'r hyfforddiant a gynhyrchir yn awtomatig eu hunain. Gallwch ychwanegu cwestiynau at yr offeryn a fydd yn cael eu gofyn ar ddiwedd yr hyfforddiant.
  da: Tilføj en træningsmodul til dit værktøj. Brugerne modtager en automatisk genereret præsentation, der forklarer potentielle risici og foranstaltninger. Brugere, der er autoriserede til at udføre risikovurderinger, kan selv forlænge eller forkorte den automatisk genererede træning. Du kan tilføje spørgsmål til værktøjet, som vil blive stillet i slutningen af træningen.
  de: Fügen Sie Ihrem Tool ein Schulungsmodul hinzu. Die Nutzer erhalten eine automatisch erstellte Präsentation, die potenzielle Risiken und Maßnahmen erläutert. Nutzer, die Risikobewertungen durchführen dürfen, können die automatisch erstellte Schulung selbst erweitern oder verkürzen. Sie können dem Tool Fragen hinzufügen, die am Ende der Schulung gestellt werden.
  el: Προσθέστε ένα εκπαιδευτικό μοντέλο στο εργαλείο σας. Οι χρήστες θα λάβουν αυτόματα δημιουργημένη παρουσίαση που εξηγεί τους πιθανούς κινδύνους και τα μέτρα. Οι χρήστες που είναι εξουσιοδοτημένοι να πραγματοποιούν αξιολογήσεις κινδύνου μπορούν να επεκτείνουν ή να μειώσουν αυτόματα την εκπαίδευση. Μπορείτε να προσθέσετε ερωτήσεις στο εργαλείο που θα ρωτηθούν στο τέλος της εκπαίδευσης.
  en: Add a training module to your tool. Users will receive an automatically generated presentation explaining potential risks and measures. Users authorized to conduct risk assessments can extend or shorten the automatically generated training themselves. You can add questions to the tool that will be asked at the end of the training.
  es: Agregue un módulo de capacitación a su herramienta. Los usuarios recibirán una presentación generada automáticamente que explica los riesgos potenciales y las medidas. Los usuarios autorizados para realizar evaluaciones de riesgo pueden extender o acortar la capacitación generada automáticamente por sí mismos. Puede agregar preguntas a la herramienta que se harán al final de la capacitación.
  et: Lisage koolitusmoodul oma tööriista. Kasutajad saavad automaatselt genereeritud esitluse, mis selgitab potentsiaalseid riske ja meetmeid. Riskihindamise õigustega kasutajad saavad ise pikendada või lühendada automaatselt genereeritud koolitust. Saate lisada tööriista küsimusi, mis esitatakse koolituse lõpus.
  fi: Lisää koulutusmoduuli työkaluusi. Käyttäjät saavat automaattisesti luodun esityksen, joka selittää mahdollisia riskejä ja toimenpiteitä. Käyttäjät, jotka ovat valtuutettuja suorittamaan riskiarvioita, voivat itse laajentaa tai lyhentää automaattisesti luotua koulutusta. Voit lisätä kysymyksiä työkaluun, jotka esitetään koulutuksen lopussa.
  fr: Ajoutez un module de formation à votre outil. Les utilisateurs recevront une présentation générée automatiquement expliquant les risques potentiels et les mesures à prendre. Les utilisateurs autorisés à effectuer des évaluations des risques peuvent eux-mêmes prolonger ou raccourcir la formation générée automatiquement. Vous pouvez ajouter des questions à l'outil qui seront posées à la fin de la formation.
  ga: Cuir modúl oiliúna le d'uirlis. Gheobhaidh úsáideoirí cur i láthair a ghintear go huathoibríoch ag míniú rioscaí agus bearta féideartha. Is féidir le húsáideoirí atá údaraithe chun measúnuithe riosca a dhéanamh an oiliúint a ghintear go huathoibríoch a shíneadh nó a ghiorrú iad féin. Is féidir leat ceisteanna a chur leis an uirlis a chuirfear ag deireadh na hoiliúna.
  he: הוסף מודול הכשרה לכלי שלך. המשתמשים יקבלו מצגת שנוצרה אוטומטית המסבירה על סיכונים פוטנציאליים ואמצעים. משתמשים שמורשים לבצע דירוגי סיכון יכולים להרחיב או לקצר את ההכשרה שנוצרה אוטומטית באופן עצמאי. ניתן להוסיף שאלות לכלי שישאלו בסוף ההכשרה.
  hr: Dodajte modul obuke svom alatu. Korisnici će dobiti automatski generiranu prezentaciju koja objašnjava potencijalne rizike i mjere. Korisnici ovlašteni za provođenje procjena rizika mogu sami proširiti ili skratiti automatski generiranu obuku. Možete dodati pitanja u alat koja će biti postavljena na kraju obuke.
  hu: Adjon hozzá egy képzési modult a képzéshez. A felhasználók automatikusan generált bemutatót kapnak, amely magyarázza a potenciális kockázatokat és intézkedéseket. Azok a felhasználók, akik jogosultak a kockázatértékelések elvégzésére, saját maguk is meghosszabbíthatják vagy lerövidíthetik az automatikusan generált képzést. Hozzáadhat kérdéseket a képzéshez, amelyeket a képzés végén fognak feltenni.
  is: Bættu þjálfunareiningu við verkfærið þitt. Notendur munu fá sjálfvirkt myndað kynningarefni sem útskýrir hugsanlegar áhættur og ráðstafanir. Notendur sem hafa heimild til að framkvæma áhættumat geta sjálfir lengt eða styttt sjálfvirkt myndaða þjálfunina. Þú getur bætt spurningum við verkfærið sem verða lagðar fram í lok þjálfunarinnar.
  it: Aggiungi un modulo di formazione al tuo strumento. Gli utenti riceveranno una presentazione generata automaticamente che spiega i potenziali rischi e le misure. Gli utenti autorizzati a effettuare valutazioni del rischio possono estendere o accorciare da soli la formazione generata automaticamente. Puoi aggiungere domande allo strumento che verranno poste alla fine della formazione.
  lt: Pridėkite mokymo modulį į savo įrankį. Vartotojai gaus automatiškai sugeneruotą pristatymą, kuriame bus paaiškintos galimos rizikos ir priemonės. Vartotojai, turintys teisę atlikti rizikos vertinimus, gali patys pratęsti arba sutrumpinti automatiškai sugeneruotą mokymą. Galite pridėti klausimus į įrankį, kurie bus užduodami mokymo pabaigoje.
  lv: Pievienojiet apmācības moduli savam rīkam. Lietotāji saņems automātiski ģenerētu prezentāciju, kas skaidros potenciālos riskus un pasākumus. Lietotāji, kuriem ir atļauja veikt riska novērtējumus, var paši paplašināt vai saīsināt automātiski ģenerēto apmācību. Jūs varat pievienot jautājumus rīkam, kas tiks uzdoti apmācības beigās.
  mt: Żid it-taħriġ mal-għodda tiegħek. L-utent jirċievi spjegazzjoni ta' kwalunkwe riskju u miżura fi preżentazzjoni ġġenerata awtomatikament. Utenti li jitħallew iwettqu valutazzjonijiet tar-riskju jistgħu jestendu jew iqassru t-taħriġ iġġenerat awtomatikament huma stess. Tista 'żżid mistoqsijiet mal-għodda li se tintalab fi tmiem it-taħriġ.
  nl: Voeg een training toe aan uw tool. De gebruiker krijgt in een automatisch gegenereerde presentatie uitleg over eventuele risico's en maatregelen. Gebruikers die risicobeoordelingen mogen verrichten kunnen de automatisch gegenereerde training zelf uitbreiden of inkorten. U kunt vragen aan de tool toevoegen die aan het eind van de training gesteld zullen worden.
  nl_BE: Voeg een trainingsmodule toe aan uw tool. Gebruikers ontvangen een automatisch gegenereerde presentatie die mogelijke risico's en maatregelen toelicht. Gebruikers die gemachtigd zijn om risicobeoordelingen uit te voeren, kunnen de automatisch gegenereerde training zelf uitbreiden of inkorten. U kunt vragen toevoegen aan de tool die aan het einde van de training worden gesteld.
  nl_be: Voeg een trainingsmodule toe aan uw instrument. Gebruikers ontvangen een automatisch gegenereerde presentatie die potentiële risico's en maatregelen toelicht. Gebruikers die gemachtigd zijn om risicobeoordelingen uit te voeren, kunnen de automatisch gegenereerde training zelf uitbreiden of inkorten. U kunt vragen toevoegen aan het instrument die aan het einde van de training worden gesteld.
  'no': Legg til en opplæringsmodul i verktøyet ditt. Brukere vil motta en automatisk generert presentasjon som forklarer potensielle risikoer og tiltak. Brukere som er autorisert til å gjennomføre risikovurderinger, kan selv utvide eller forkorte den automatisk genererte opplæringen. Du kan legge til spørsmål i verktøyet som vil bli stilt på slutten av opplæringen.
  pl: Dodaj moduł szkoleniowy do swojego narzędzia. Użytkownicy otrzymają automatycznie wygenerowaną prezentację wyjaśniającą potencjalne zagrożenia i środki. Użytkownicy uprawnieni do przeprowadzania ocen ryzyka mogą samodzielnie rozszerzyć lub skrócić automatycznie wygenerowane szkolenie. Możesz dodać pytania do narzędzia, które będą zadawane na końcu szkolenia.
  pt: Adicione um módulo de treinamento à sua ferramenta. Os usuários receberão uma apresentação gerada automaticamente explicando os riscos potenciais e medidas. Usuários autorizados a realizar avaliações de risco podem estender ou encurtar o treinamento gerado automaticamente por si mesmos. Você pode adicionar perguntas à ferramenta que serão feitas no final do treinamento.
  ro: Adăugați un modul de instruire la instrumentul dvs. Utilizatorii vor primi o prezentare generată automat care explică riscurile potențiale și măsurile. Utilizatorii autorizați să efectueze evaluări de risc pot extinde sau scurta singuri instruirea generată automat. Puteți adăuga întrebări la instrument care vor fi puse la sfârșitul instruirii.
  ru: Добавьте модуль обучения в свой инструмент. Пользователи получат автоматически сгенерированную презентацию, объясняющую потенциальные риски и меры. Пользователи, уполномоченные проводить оценку рисков, могут самостоятельно расширять или сокращать автоматически сгенерированное обучение. Вы можете добавлять вопросы в инструмент, которые будут задаваться в конце обучения.
  sk: Pridajte školiaci modul do vášho nástroja. Užívatelia dostanú automaticky generovanú prezentáciu, ktorá vysvetľuje potenciálne riziká a opatrenia. Užívatelia oprávnení k vykonávaniu hodnotení rizík môžu sami predĺžiť alebo skrátiť automaticky generovanú školenie. Môžete pridať otázky do nástroja, ktoré budú položené na konci školenia.
  sl: Dodajte modul za usposabljanje v svoje orodje. Uporabniki bodo prejeli avtomatsko generirano predstavitev, ki pojasnjuje potencialna tveganja in ukrepe. Uporabniki, ki so pooblaščeni za izvajanje ocenjevanj tveganja, lahko sami podaljšajo ali skrajšajo avtomatsko generirano usposabljanje. Lahko dodate vprašanja v orodje, ki bodo postavljena na koncu usposabljanja.
  sq: Shtoni një modul trajnimi në mjetin tuaj. Përdoruesit do të marrin një prezantim të gjeneruar automatikisht që shpjegon rreziqet dhe masat e mundshme. Përdoruesit e autorizuar për të kryer vlerësime të rrezikut mund të zgjasin ose shkurtojnë vetë trajnimin e gjeneruar automatikisht. Mund të shtoni pyetje në mjet që do të bëhen në fund të trajnimit.
  sr: Dodajte modul za obuku u vaš alat. Korisnici će dobiti automatski generisanu prezentaciju koja objašnjava potencijalne rizike i mere. Korisnici ovlašćeni za sprovođenje procena rizika mogu sami proširiti ili skratiti automatski generisanu obuku. Možete dodati pitanja u alat koja će biti postavljena na kraju obuke.
  sv: Lägg till en utbildningsmodul i ditt verktyg. Användarna får en automatgenererad presentation som förklarar potentiella risker och åtgärder. Användare som är behöriga att genomföra riskbedömningar kan själva förlänga eller förkorta den automatgenererade utbildningen. Du kan lägga till frågor i verktyget som kommer att ställas i slutet av utbildningen.
  uk: Додайте навчальний модуль до свого інструменту. Користувачі отримають автоматично згенеровану презентацію, що пояснює потенційні ризики та заходи. Користувачі, уповноважені проводити оцінку ризиків, можуть самостійно розширювати або скорочувати автоматично згенероване навчання. Ви можете додавати запитання до інструменту, які будуть задані наприкінці навчання.
message_unlock_and_invalidate_by_consultant:
  bg: Предстои ви да обезсилите и отключите тази оценка на риска. Ако искате само да направите някои корекции, не забравяйте да потвърдите отново, когато сте готови.
  ca: Esteu a punt d'invalidar i desbloquejar aquesta avaluació de riscos. Si només voleu fer algunes correccions, no oblideu tornar a validar quan estigueu a punt.
  cs: Chystáte se zneplatnit a odemknout toto hodnocení rizik. Pokud chcete pouze provést některé opravy, nezapomeňte znovu ověřit, až budete připraveni.
  cy: Rydych ar fin dirymu a datgloi'r asesiad risg hwn. Os mai dim ond gwneud rhai cywiriadau yr ydych am ei wneud, peidiwch ag anghofio ail-ddilysu pan fyddwch yn barod.
  da: Du er ved at ugyldiggøre og låse denne risikovurdering op. Hvis du kun ønsker at foretage nogle rettelser, så glem ikke at genvalidere, når du er klar.
  de: Sie sind dabei, diese Risikobewertung zu entwerten und zu entsperren. Wenn Sie nur einige Korrekturen vornehmen möchten, vergessen Sie nicht, sie erneut zu validieren, wenn Sie fertig sind.
  el: Πρόκειται να ακυρώσετε και να ξεκλειδώσετε αυτήν την αξιολόγηση κινδύνου. Εάν θέλετε μόνο να κάνετε ορισμένες διορθώσεις, μην ξεχάσετε να επικυρώσετε εκ νέου όταν είστε έτοιμοι.
  en: You are about to invalidate and unlock this risk assessment. If you only want to make some corrections, then don't forget to re-validate when you're ready.
  es: Está a punto de invalidar y desbloquear esta evaluación de riesgos. Si solo desea hacer algunas correcciones, no olvide volver a validar cuando esté listo.
  et: Olete riskihinnangu kehtetuks tunnistamas ja avamas. Kui soovite teha ainult mõningaid parandusi, ärge unustage uuesti valideerida, kui olete valmis.
  fi: Olet aikeissa mitätöidä ja avata tämän riskiarvioinnin. Jos haluat vain tehdä joitakin korjauksia, muista vahvistaa uudelleen, kun olet valmis.
  fr: Vous êtes sur le point d'invalider et de déverrouiller cette évaluation des risques. Si vous voulez seulement apporter quelques corrections, n'oubliez pas de la revalider lorsque vous êtes prêt.
  ga: Tá tú ar tí an measúnú riosca seo a neamhbhailíú agus a dhíghlasáil. Más mian leat roinnt ceartúchán a dhéanamh, ná déan dearmad é a athbhailíú nuair a bheidh tú réidh.
  he: אתה עומד לבטל ולשחרר את ההערכה הסיכונית הזו. אם אתה רוצה רק לעשות כמה תיקונים, אל תשכח לאמת מחדש כאשר אתה מוכן.
  hr: Upravo ćete poništiti i otključati ovu procjenu rizika. Ako samo želite napraviti neke ispravke, ne zaboravite ponovo potvrditi kada budete spremni.
  hu: Éppen érvényteleníti és feloldja ezt a kockázatértékelést. Ha csak néhány javítást szeretne elvégezni, ne felejtse el újra érvényesíteni, amikor készen áll.
  is: Þú ert að fara að ógilda og opna þessa áhættumat. Ef þú vilt bara gera nokkrar leiðréttingar, gleymdu þá ekki að staðfesta aftur þegar þú ert tilbúinn.
  it: Stai per invalidare e sbloccare questa valutazione del rischio. Se vuoi solo apportare alcune correzioni, non dimenticare di rivalidare quando sei pronto.
  lt: Jūs ketinate panaikinti ir atrakinti šį rizikos vertinimą. Jei norite tik padaryti keletą pataisymų, nepamirškite pakartotinai patvirtinti, kai būsite pasiruošę.
  lv: Jūs gatavojaties anulēt un atbloķēt šo riska novērtējumu. Ja vēlaties tikai veikt dažus labojumus, neaizmirstiet atkārtoti validēt, kad būsiet gatavs.
  mt: Inti dalwaqt se tannulla u tiftaħ din il-valutazzjoni tar-riskju. Jekk trid biss tagħmel xi korrezzjonijiet, tinsix li terġa' tivvalida meta tkun lest.
  nl: U staat op het punt om deze risicobeoordeling ongeldig te maken en te ontgrendelen. Als u slechts enkele correcties wilt aanbrengen, vergeet dan niet opnieuw te valideren wanneer u klaar bent.
  nl_BE: U staat op het punt deze risicobeoordeling ongeldig te maken en te ontgrendelen. Als u alleen enkele correcties wilt aanbrengen, vergeet dan niet opnieuw te valideren wanneer u klaar bent.
  nl_be: U staat op het punt deze risicobeoordeling ongeldig te maken en te ontgrendelen. Als u alleen enkele correcties wilt aanbrengen, vergeet dan niet opnieuw te valideren wanneer u klaar bent.
  'no': Du er i ferd med å ugyldiggjøre og låse opp denne risikovurderingen. Hvis du bare vil gjøre noen korreksjoner, ikke glem å validere på nytt når du er klar.
  pl: Zamierzasz unieważnić i odblokować tę ocenę ryzyka. Jeśli chcesz tylko wprowadzić pewne poprawki, nie zapomnij ponownie zatwierdzić, gdy będziesz gotowy.
  pt: Você está prestes a invalidar e desbloquear esta avaliação de risco. Se desejar apenas fazer algumas correções, não se esqueça de revalidar quando estiver pronto.
  ro: Ești pe cale să invalidezi și să deblochezi această evaluare a riscurilor. Dacă dorești doar să faci unele corecții, nu uita să revalidezi când ești gata.
  ru: Вы собираетесь аннулировать и разблокировать эту оценку рисков. Если вы хотите только внести некоторые исправления, не забудьте повторно подтвердить, когда будете готовы.
  sk: Chystáte sa zneplatniť a odomknúť toto hodnotenie rizika. Ak chcete vykonať len niektoré opravy, nezabudnite ho znovu overiť, keď budete pripravení.
  sl: Nameravate razveljaviti in odkleniti to oceno tveganja. Če želite le narediti nekaj popravkov, ne pozabite znova potrditi, ko boste pripravljeni.
  sq: Jeni duke u përgatitur të pavlefshëm dhe të zhbllokoni këtë vlerësim rreziku. Nëse dëshironi të bëni vetëm disa korrigjime, mos harroni të rivalidoni kur të jeni gati.
  sr: Nameravate da poništite i otključate ovu procenu rizika. Ako samo želite da napravite neke ispravke, ne zaboravite da ponovo potvrdite kada budete spremni.
  sv: Du håller på att ogiltigförklara och låsa upp denna riskbedömning. Om du bara vill göra några korrigeringar, glöm inte att omvalidera när du är redo.
  uk: Ви збираєтесь скасувати та розблокувати цю оцінку ризику. Якщо ви хочете лише внести деякі виправлення, не забудьте повторно підтвердити, коли будете готові.
message_unlock_or_duplicate:
  bg: Ако искате да продължите да работите върху копие на тази оценка, например за отчитане на нова година, можете да използвате опцията 'Дублиране'. Дублирането ще направи пълно копие на вашата оценка, което ще бъде отключено.
  ca: Si voleu continuar treballant en una còpia d'aquesta avaluació, per exemple per informar d'un any nou, podeu utilitzar l'opció 'Duplicar'. La duplicació farà una còpia completa de la vostra avaluació que estarà desblocada.
  cs: Pokud chcete pokračovat v práci na kopii tohoto hodnocení, například pro zprávu za nový rok, můžete použít možnost 'Duplikovat'. Duplikování vytvoří úplnou kopii vašeho hodnocení, která bude odemčena.
  cy: Os hoffech barhau i weithio ar gopi o'r asesiad hwn, er enghraifft i adrodd ar flwyddyn newydd, gallwch ddefnyddio'r opsiwn 'Dyblygu'. Bydd dyblygu yn gwneud copi llawn o'ch asesiad a fydd wedi'i ddatgloi.
  da: Hvis du vil fortsætte med at arbejde på en kopi af denne vurdering, f.eks. for at rapportere om et nyt år, kan du bruge indstillingen 'Dupliker'. Duplikering vil lave en fuld kopi af din vurdering, som vil blive låst op.
  de: Wenn Sie an einer Kopie dieser Bewertung weiterarbeiten möchten, um beispielsweise über ein neues Jahr zu berichten, können Sie die Option „Duplizieren“ verwenden. Beim Duplizieren wird eine vollständige Kopie Ihrer Bewertung erstellt, die entsperrt wird.
  el: Εάν θέλετε να συνεχίσετε να εργάζεστε σε ένα αντίγραφο αυτής της αξιολόγησης, για παράδειγμα για αναφορά σε νέο έτος, τότε μπορείτε να χρησιμοποιήσετε την επιλογή 'Αντιγραφή'. Η αντιγραφή θα δημιουργήσει ένα πλήρες αντίγραφο της αξιολόγησής σας το οποίο θα είναι ξεκλείδωτο.
  en: If you want to continue working on a copy of this assessment, for instance to report on a new year, then you can use the option 'Duplicate'. Duplication will make a full copy of your assessment which will be unlocked.
  es: Si desea continuar trabajando en una copia de esta evaluación, por ejemplo para informar sobre un nuevo año, puede usar la opción 'Duplicar'. La duplicación hará una copia completa de su evaluación que estará desbloqueada.
  et: Kui soovite jätkata tööd selle hinnangu koopial, näiteks uue aasta kohta aruandluseks, saate kasutada valikut 'Dubleeri'. Dubleerimine loob teie hinnangust täieliku koopia, mis on lukustamata.
  fi: Jos haluat jatkaa tämän arvioinnin kopion työstämistä, esimerkiksi raportoidaksesi uudesta vuodesta, voit käyttää 'Kopioi'-vaihtoehtoa. Kopiointi luo täydellisen kopion arviostasi, joka on lukitsematon.
  fr: Si vous souhaitez continuer à travailler sur une copie de cette évaluation, par exemple pour faire un rapport sur une nouvelle année, vous pouvez utiliser l'option 'Dupliquer'. La duplication fera une copie complète de votre évaluation qui sera déverrouillée.
  ga: Más mian leat leanúint ar aghaidh ag obair ar chóip den mheasúnacht seo, mar shampla chun tuairisc a thabhairt ar bhliain nua, is féidir leat an rogha 'Dúblaigh' a úsáid. Déanfaidh an dúbláil cóip iomlán de do mheasúnacht a bheidh díghlasáilte.
  he: אם ברצונך להמשיך לעבוד על עותק של הערכה זו, למשל לדווח על שנה חדשה, תוכל להשתמש באפשרות 'שכפל'. השכפול ייצור עותק מלא של ההערכה שלך שיהיה פתוח לעריכה.
  hr: Ako želite nastaviti raditi na kopiji ove procjene, primjerice za izvješćivanje o novoj godini, možete koristiti opciju 'Dupliciraj'. Dupliciranje će napraviti potpunu kopiju vaše procjene koja će biti otključana.
  hu: Ha folytatni szeretné a munkát ennek az értékelésnek egy másolatán, például egy új évre vonatkozóan, használhatja a 'Duplikálás' lehetőséget. A duplikálás az értékelés teljes másolatát készíti el, amely feloldott állapotban lesz.
  is: Ef þú vilt halda áfram að vinna á afriti af þessu mati, til dæmis til að gera skýrslu um nýtt ár, getur þú notað valkostinn 'Tvöfalda'. Tvöföldun mun gera fulla afrit af matinu þínu sem verður opið.
  it: Se desideri continuare a lavorare su una copia di questa valutazione, ad esempio per riportare un nuovo anno, puoi utilizzare l'opzione 'Duplica'. La duplicazione creerà una copia completa della tua valutazione che sarà sbloccata.
  lt: Jei norite toliau dirbti su šio vertinimo kopija, pavyzdžiui, pateikti ataskaitą už naujus metus, galite naudoti parinktį „Kopijuoti". Kopijavimas sukurs visą jūsų vertinimo kopiją, kuri bus atrakinta.
  lv: Ja vēlaties turpināt strādāt ar šī novērtējuma kopiju, piemēram, ziņot par jaunu gadu, varat izmantot opciju 'Dublēt'. Dublēšana izveidos pilnu jūsu novērtējuma kopiju, kas tiks atbloķēta.
  mt: Jekk trid tkompli taħdem fuq kopja ta' din il-valutazzjoni, pereżempju biex tirrapporta fuq sena ġdida, tista' tuża l-għażla 'Iduplika'. Id-duplikazzjoni se tagħmel kopja sħiħa tal-valutazzjoni tiegħek li tkun miftuħa.
  nl: Als je verder wilt werken aan een kopie van deze aanslag, bijvoorbeeld om te rapporteren over een nieuw jaar, dan kun je de optie 'Dupliceren' gebruiken. Door te dupliceren maakt u een volledige kopie van uw beoordeling die wordt ontgrendeld.
  nl_BE: Als u wilt doorgaan met werken aan een kopie van deze beoordeling, bijvoorbeeld om over een nieuw jaar te rapporteren, kunt u de optie 'Dupliceren' gebruiken. Dupliceren maakt een volledige kopie van uw beoordeling die ontgrendeld zal zijn.
  nl_be: Als u wilt doorgaan met werken aan een kopie van deze beoordeling, bijvoorbeeld om over een nieuw jaar te rapporteren, kunt u de optie 'Dupliceren' gebruiken. Dupliceren maakt een volledige kopie van uw beoordeling die ontgrendeld zal zijn.
  'no': Hvis du ønsker å fortsette å arbeide med en kopi av denne vurderingen, for eksempel for å rapportere for et nytt år, kan du bruke alternativet 'Dupliser'. Duplisering vil lage en fullstendig kopi av vurderingen din som vil bli låst opp.
  pl: Jeśli chcesz kontynuować pracę na kopii tej oceny, na przykład aby sporządzić raport za nowy rok, możesz skorzystać z opcji 'Duplikuj'. Duplikowanie spowoduje utworzenie pełnej kopii oceny, która zostanie odblokowana.
  pt: Se pretender continuar a trabalhar numa cópia desta avaliação, por exemplo para reportar um novo ano, pode usar a opção 'Duplicar'. A duplicação criará uma cópia completa da sua avaliação que ficará desbloqueada.
  ro: Dacă doriți să continuați să lucrați la o copie a acestei evaluări, de exemplu pentru a raporta un nou an, puteți utiliza opțiunea 'Duplicare'. Duplicarea va crea o copie completă a evaluării dvs. care va fi deblocată.
  ru: Если вы хотите продолжить работу с копией этой оценки, например для составления отчёта за новый год, воспользуйтесь функцией «Дублировать». При дублировании создаётся полная копия вашей оценки, которая будет разблокирована.
  sk: Ak chcete pokračovať v práci na kópii tohto hodnotenia, napríklad pre správu za nový rok, môžete použiť možnosť 'Duplikovať'. Duplikácia vytvorí úplnú kópiu vášho hodnotenia, ktorá bude odomknutá.
  sl: Če želite nadaljevati delo na kopiji te ocene, na primer za poročanje o novem letu, lahko uporabite možnost 'Podvoji'. Podvajanje bo ustvarilo popolno kopijo vaše ocene, ki bo odklenjena.
  sq: Nëse dëshironi të vazhdoni të punoni në një kopje të këtij vlerësimi, për shembull për të raportuar për një vit të ri, atëherë mund të përdorni opsionin 'Dupliko'. Duplikimi do të bëjë një kopje të plotë të vlerësimit tuaj e cila do të jetë e zhbllokuar.
  sr: Ako želite da nastavite da radite na kopiji ove procene, na primer da izveštavate za novu godinu, možete koristiti opciju 'Dupliraj'. Dupliranje će napraviti potpunu kopiju vaše procene koja će biti otključana.
  sv: Om du vill fortsätta arbeta med en kopia av denna bedömning, till exempel för att rapportera ett nytt år, kan du använda alternativet 'Duplicera'. Duplicering skapar en fullständig kopia av din bedömning som kommer att vara olåst.
  uk: Якщо ви хочете продовжити роботу над копією цієї оцінки, наприклад для звіту за новий рік, скористайтеся опцією «Дублювати». Дублювання створить повну копію вашої оцінки, яка буде розблокована.
message_unlock_ra:
  bg: Когато отключите тази оценка на риска, тя ще загуби своя валидиран статус. Можете все още да поискате повторно валидиране по-късно.
  ca: Quan desbloquegeu aquesta avaluació de riscos, perdrà el seu estat validat. Encara podreu sol·licitar una re-validació en un moment posterior.
  cs: Když toto hodnocení rizik odemknete, ztratí svůj ověřený stav. Stále můžete požádat o opětovné ověření v pozdějším čase.
  cy: Pan ddatglowch yr asesiad risg hwn, bydd yn colli ei statws dilysiedig. Gallwch dal ofyn am ail-ddilysu ar adeg ddiweddarach.
  da: Når du låser denne risikovurdering op, vil den miste sin validerede status. Du kan stadig anmode om re-validering på et senere tidspunkt.
  de: Wenn Sie diese Risikobewertung entsperren, verliert sie ihren validierten Status. Sie können zu einem späteren Zeitpunkt immer noch eine Rückbestätigung anfordern.
  el: Όταν ξεκλειδώσετε αυτή την αξιολόγηση κινδύνου, θα χάσει την επικυρωμένη κατάστασή της. Μπορείτε ακόμη να ζητήσετε επανεπικύρωση αργότερα.
  en: When you unlock this risk assessment, it will loose its validated status. You can still request for re-validation at a later time.
  es: Cuando desbloquee esta evaluación de riesgos, perderá su estado validado. Todavía puede solicitar una nueva validación en un momento posterior.
  et: Kui avate selle riskihinnangu lukustuse, kaotab see oma kinnitatud staatuse. Saate siiski taotleda uuesti kinnitamist hiljem.
  fi: Kun avaat tämän riskiarvioinnin lukituksen, se menettää vahvistetun tilansa. Voit silti pyytää uudelleenvalidointia myöhemmin.
  fr: Lorsque vous déverrouillez cette évaluation des risques, elle perd son statut validé. Vous pouvez toujours demander une reconfirmation à une date ultérieure.
  ga: Nuair a dhíghlasálann tú an measúnacht riosca seo, caillfidh sí a stádas bailíochtaithe. Is féidir leat fós iarratas a dhéanamh ar athbhailíochtú níos déanaí.
  he: כאשר תבטל את נעילת הערכת הסיכונים הזו, היא תאבד את הסטטוס המאומת שלה. עדיין תוכל לבקש אימות מחדש בשלב מאוחר יותר.
  hr: Kada otključate ovu procjenu rizika, izgubiti će status validiranosti. Još uvijek možete zatražiti ponovnu validaciju u kasnijem trenutku.
  hu: Amikor feloldja ezt a kockázatértékelést, elveszíti hitelesített állapotát. Később még kérheti az újbóli hitelesítést.
  is: Þegar þú opnar þetta áhættumat mun það missa staðfesta stöðu sína. Þú getur enn beðið um endurstaðfestingu síðar.
  it: Quando sblocchi questa valutazione del rischio, perderà il suo stato convalidato. Puoi comunque richiedere una nuova convalida in un secondo momento.
  lt: Kai atrakinsite šį rizikos vertinimą, jis praras patvirtinto statusą. Vėliau vis tiek galite prašyti pakartotinio patvirtinimo.
  lv: Kad atbloķēsiet šo riska novērtējumu, tas zaudēs savu validētā statusu. Jūs joprojām varat pieprasīt atkārtotu validāciju vēlāk.
  mt: Meta tiftaħ din il-valutazzjoni tar-riskju, titlef l-istatus ivvalidat tagħha. Xorta tista' titlob validazzjoni mill-ġdid f'mument ieħor.
  nl: Wanneer u deze risicobeoordeling ontgrendelt, verliest deze zijn gevalideerde status. U kunt op een later tijdstip nog steeds een herbevestiging aanvragen.
  nl_BE: Wanneer u deze risicobeoordeling ontgrendelt, verliest deze de gevalideerde status. U kunt later nog steeds om hervalidatie verzoeken.
  nl_be: Wanneer u deze risicobeoordeling ontgrendelt, verliest deze de gevalideerde status. U kunt later nog steeds om hervalidatie verzoeken.
  'no': Når du låser opp denne risikovurderingen, mister den sin validerte status. Du kan fortsatt be om ny validering på et senere tidspunkt.
  pl: Po odblokowaniu tej oceny ryzyka utraci ona status zatwierdzonej. Nadal możesz złożyć wniosek o ponowne zatwierdzenie w późniejszym czasie.
  pt: Quando desbloquear esta avaliação de risco, ela perderá o seu estado validado. Ainda pode solicitar a revalidação num momento posterior.
  ro: Când deblocați această evaluare a riscului, aceasta va pierde statutul de validată. Puteți în continuare solicita revalidarea ulterior.
  ru: После разблокировки этой оценки рисков она потеряет статус подтверждённой. Вы сможете запросить повторное подтверждение в любое время.
  sk: Keď odomknete toto hodnotenie rizík, stratí svoj overený stav. Môžete stále požiadať o opätovné overenie neskôr.
  sl: Ko odklenete to oceno tveganja, bo izgubila potrjen status. Ponovno potrditev lahko zahtevate pozneje.
  sq: Kur të zhbllokoni këtë vlerësim rreziku, ai do të humbasë statusin e tij të validuar. Ju mund të kërkoni ri-validim në një kohë të mëvonshme.
  sr: Kada otključate ovu procenu rizika, ona će izgubiti validiran status. I dalje možete zatražiti ponovnu validaciju u kasnijem trenutku.
  sv: När du låser upp denna riskbedömning kommer den att förlora sin validerade status. Du kan fortfarande begära omvalidering vid ett senare tillfälle.
  uk: Коли ви розблокуєте цю оцінку ризиків, вона втратить статус затвердженої. Ви зможете надіслати запит на повторне затвердження пізніше.
message_unpublish:
  bg: Премахването от публикация на инструмент ще го скрие от публичния изглед. Инструментът ще остане достъпен във вашия акаунт и можете да го публикувате отново по всяко време.
  ca: Desactivar la publicació d'una eina l'eliminarà de la vista pública. L'eina continuarà estant disponible al vostre compte i podeu tornar a publicar-la en qualsevol moment.
  cs: Zrušení publikování nástroje jej odstraní z veřejného zobrazení. Nástroj bude stále k dispozici ve vašem účtu a můžete jej kdykoli znovu publikovat.
  cy: Bydd dad-gyhoeddi offeryn yn ei dynnu o'r golwg cyhoeddus. Bydd yr offeryn yn dal ar gael yn eich cyfrif, a gallwch ei ail-gyhoeddi ar unrhyw adeg.
  da: Ophævelse af offentliggørelsen af et værktøj fjerner det fra offentlig visning. Værktøjet vil stadig være tilgængeligt på din konto, og du kan genoffentliggøre det når som helst.
  de: Das Zurücknehmen der Veröffentlichung eines Tools entfernt es aus der öffentlichen Ansicht. Das Tool ist weiterhin in Ihrem Konto verfügbar und Sie können es jederzeit erneut veröffentlichen.
  el: Η απόσυρση της δημοσίευσης ενός εργαλείου θα το αφαιρέσει από την δημόσια προβολή. Το εργαλείο θα εξακολουθεί να είναι διαθέσιμο στον λογαριασμό σας και μπορείτε να το δημοσιεύσετε ξανά ανά πάσα στιγμή.
  en: Unpublishing a tool will remove it from public view. The tool will still be available in your account, and you can republish it at any time.
  es: La anulación de la publicación de una herramienta la eliminará de la vista pública. La herramienta seguirá estando disponible en tu cuenta y podrás volver a publicarla en cualquier momento.
  et: Tööriista avaldamise tühistamine eemaldab selle avalikust vaateväljast. Tööriist on endiselt teie kontol saadaval ja saate selle igal ajal uuesti avaldada.
  fi: Työkalun julkaisun peruuttaminen poistaa sen julkisesta näkymästä. Työkalu on edelleen käytettävissä tililläsi, ja voit julkaista sen uudelleen milloin tahansa.
  fr: La désactivation de la publication d'un outil le supprimera de la vue publique. L'outil sera toujours disponible dans votre compte et vous pourrez le republier à tout moment.
  ga: Bainfear uirlis as radharc poiblí má chealófar a fhoilsiú. Beidh an t-uirlis fós ar fáil i do chuntas, agus is féidir leat í a fhoilsiú arís am ar bith.
  he: ביטול פרסום כלי יסיר אותו מהתצוגה הציבורית. הכלי עדיין יהיה זמין בחשבונך, ותוכל לפרסם אותו מחדש בכל עת.
  hr: Poništavanje objavljivanja alata uklonit će ga iz javnog prikaza. Alat će i dalje biti dostupan na vašem računu i možete ga ponovno objaviti u bilo kojem trenutku.
  hu: Az eszköz közzétételének visszavonása eltávolítja azt a nyilvános nézetből. Az eszköz továbbra is elérhető lesz a fiókjában, és bármikor újra közzéteheti.
  is: Að taka tól úr birtingu mun fjarlægja það úr almennri sýn. Tólið verður áfram tiltækt á reikningi þínum og þú getur gefið það út aftur hvenær sem er.
  it: La rimozione della pubblicazione di uno strumento lo rimuoverà dalla visualizzazione pubblica. Lo strumento sarà comunque disponibile nel tuo account e potrai ripubblicarlo in qualsiasi momento.
  lt: Įrankio paskelbimo atšaukimas pašalins jį iš viešojo rodinio. Įrankis vis tiek bus prieinamas jūsų paskyroje, ir jūs jį bet kada galėsite vėl paskelbti.
  lv: Rīka publicēšanas atcelšana to noņems no publiskās apskates. Rīks joprojām būs pieejams jūsu kontā, un jūs to varat jebkurā laikā atkārtoti publicēt.
  mt: Il-pubblikazzjoni ta' għodda se tneħħiha mill-fehma pubblika. L-għodda tibqa' disponibbli fil-kont tiegħek, u tista' terġa' tippubblikaha fi kwalunkwe ħin.
  nl: Het depubliceren van een tool zorgt ervoor dat deze niet langer openbaar zichtbaar is. De tool blijft echter beschikbaar in uw account en u kunt deze op elk moment opnieuw publiceren.
  nl_BE: Het onpubliceren van een tool verwijdert deze uit de openbare weergave. De tool blijft beschikbaar in uw account en u kunt deze op elk moment opnieuw publiceren.
  nl_be: Het onpubliceren van een tool verwijdert deze uit de openbare weergave. De tool blijft beschikbaar in uw account en u kunt deze op elk moment opnieuw publiceren.
  'no': Avpublisering av et verktøy fjerner det fra offentlig visning. Verktøyet vil fortsatt være tilgjengelig i kontoen din, og du kan publisere det på nytt når som helst.
  pl: Anulowanie publikacji narzędzia spowoduje jego usunięcie z widoku publicznego. Narzędzie będzie nadal dostępne na Twoim koncie i możesz je ponownie opublikować w dowolnym momencie.
  pt: A despublicação de uma ferramenta irá removê-la da vista pública. A ferramenta continuará disponível na sua conta e poderá republicá-la a qualquer momento.
  ro: Anularea publicării unui instrument îl va elimina din vizualizarea publică. Instrumentul va fi în continuare disponibil în contul dvs. și îl puteți republica oricând.
  ru: Отмена публикации инструмента удалит его из публичного просмотра. Инструмент по-прежнему будет доступен в вашем аккаунте, и вы сможете повторно опубликовать его в любое время.
  sk: Zrušenie zverejnenia nástroja ho odstráni z verejného zobrazenia. Nástroj bude naďalej k dispozícii vo vašom účte a môžete ho kedykoľvek znova zverejniť.
  sl: Preklic objave orodja ga bo odstranil iz javnega pogleda. Orodje bo še vedno na voljo v vašem računu in ga boste lahko kadar koli znova objavili.
  sq: Çpublikimi i një mjeti do ta heqë atë nga shikimi publik. Mjeti do të jetë ende i disponueshëm në llogarinë tuaj dhe mund ta ripublikoni në çdo kohë.
  sr: Uklanjanjem alata iz objave uklonit ćete ga iz javnog prikaza. Alat će i dalje biti dostupan u vašem nalogu i možete ga ponovo objaviti u bilo kom trenutku.
  sv: Att avpublicera ett verktyg tar bort det från allmän visning. Verktyget kommer fortfarande att vara tillgängligt på ditt konto och du kan publicera det igen när som helst.
  uk: Скасування публікації інструменту видалить його з публічного перегляду. Інструмент залишиться доступним у вашому обліковому записі, і ви зможете повторно опублікувати його будь-коли.
message_update_oira_tool:
  bg: Сигурни ли сте, че искате да актуализирате публикувания инструмент OiRA? Това ще актуализира публикуваната версия с всички ваши промени.
  ca: Esteu segur que voleu actualitzar l'eina OiRA publicada? Això actualitzarà la versió publicada amb tots els vostres canvis.
  cs: Opravdu chcete aktualizovat zveřejněný nástroj OiRA? Tím aktualizujete zveřejněnou verzi o všechny vaše změny.
  cy: Ydych chi'n siŵr eich bod am ddiweddaru'r Offeryn OiRA a gyhoeddwyd? Bydd hyn yn diweddaru'r fersiwn a gyhoeddwyd gyda'ch holl newidiadau.
  da: Er du sikker på, at du vil opdatere det offentliggjorte OiRA-værktøj? Dette opdaterer den offentliggjorte version med alle dine ændringer.
  de: Sind Sie sicher, dass Sie das veröffentlichte OiRA-Tool aktualisieren möchten? Dadurch wird die veröffentlichte Version mit allen Änderungen aktualisiert.
  el: Είστε βέβαιοι ότι θέλετε να ενημερώσετε το δημοσιευμένο εργαλείο OiRA; Αυτό θα ενημερώσει την δημοσιευμένη έκδοση με όλες τις αλλαγές σας.
  en: Are you sure you want to update the published OiRA Tool? This will update the published version with all your changes.
  es: ¿Está seguro de que desea actualizar la herramienta OiRA publicada? Esto actualizará la versión publicada con todos sus cambios.
  et: Kas olete kindel, et soovite avaldatud OiRA-tööriista värskendada? See värskendab avaldatud versiooni kõigi teie muudatustega.
  fi: Haluatko varmasti päivittää julkaistun OiRA-työkalun? Tämä päivittää julkaistun version kaikilla tekemilläsi muutoksilla.
  fr: Êtes-vous sûr de vouloir mettre à jour l’outil OiRA publié ? Cela mettra à jour la version publiée avec toutes vos modifications.
  ga: An bhfuil tú cinnte gur mian leat an uirlis OiRA fhoilsithe a nuashonrú? Nuashonróidh sé seo an leagan foilsithe le do chuid athruithe ar fad.
  he: האם אתה בטוח שברצונך לעדכן את כלי OiRA שפורסם? פעולה זו תעדכן את הגרסה שפורסמה עם כל השינויים שביצעת.
  hr: Jeste li sigurni da želite ažurirati objavljeni OiRA alat? Ovo će ažurirati objavljenu verziju sa svim vašim izmjenama.
  hu: Biztosan frissíteni szeretnéd a közzétett OiRA eszközt? Ez frissíti a közzétett verziót az összes módosításoddal.
  is: Ertu viss um að þú viljir uppfæra birta OiRA tólið? Þetta mun uppfæra birtu útgáfuna með öllum breytingum þínum.
  it: Sei sicuro di voler aggiornare lo strumento OiRA pubblicato? Questo aggiornerà la versione pubblicata con tutte le tue modifiche.
  lt: Ar tikrai norite atnaujinti paskelbtą OiRA priemonę? Tai atnaujins paskelbtą versiją su visais jūsų pakeitimais.
  lv: Vai tiešām vēlaties atjaunināt publicēto OiRA rīku? Tas atjauninās publicēto versiju ar visām jūsu izmaiņām.
  mt: Int żgur li trid taġġorna l-għodda OiRA ppubblikata? Dan jaġġorna l-verżjoni ppubblikata bl-bidliet kollha tiegħek.
  nl: Weet u zeker dat u het gepubliceerde OiRA-instrument wilt bijwerken? Dit zal de gepubliceerde versie bijwerken met al uw wijzigingen.
  nl_BE: Weet u zeker dat u het gepubliceerde OiRA-hulpmiddel wilt bijwerken? Dit zal de gepubliceerde versie bijwerken met al uw wijzigingen.
  nl_be: Weet u zeker dat u het gepubliceerde OiRA-hulpmiddel wilt bijwerken? Dit zal de gepubliceerde versie bijwerken met al uw wijzigingen.
  'no': Er du sikker på at du vil oppdatere det publiserte OiRA-verktøyet? Dette vil oppdatere den publiserte versjonen med alle endringene dine.
  pl: Czy na pewno chcesz zaktualizować opublikowane narzędzie OiRA? Spowoduje to zaktualizowanie opublikowanej wersji wszystkimi zmianami.
  pt: Tem a certeza de que pretende atualizar a ferramenta OiRA publicada? Isto irá atualizar a versão publicada com todas as suas alterações.
  ro: Sunteți sigur că doriți să actualizați instrumentul OiRA publicat? Acest lucru va actualiza versiunea publicată cu toate modificările dumneavoastră.
  ru: Вы уверены, что хотите обновить опубликованный инструмент OiRA? Это обновит опубликованную версию со всеми вашими изменениями.
  sk: Naozaj chcete aktualizovať zverejnený nástroj OiRA? Tým sa aktualizuje zverejnená verzia so všetkými vašimi zmenami.
  sl: Ste prepričani, da želite posodobiti objavljeno orodje OiRA? S tem bo objavljena različica posodobljena z vsemi vašimi spremembami.
  sq: Jeni i sigurt që dëshironi të përditësoni mjetin OiRA të publikuar? Kjo do të përditësojë versionin e publikuar me të gjitha ndryshimet tuaja.
  sr: Da li ste sigurni da želite da ažurirate objavljeni OiRA alat? Ovo će ažurirati objavljenu verziju sa svim vašim izmenama.
  sv: Är du säker på att du vill uppdatera det publicerade OiRA-verktyget? Detta uppdaterar den publicerade versionen med alla dina ändringar.
  uk: Ви впевнені, що хочете оновити опублікований інструмент OiRA? Це оновить опубліковану версію з усіма вашими змінами.
message_waiting_for_confimation:
  bg: Тези оценки на риска чакат потвърждение, че изпълнителят е получил инструктажните документи.
  ca: Aquestes avaluacions de riscos esperen una confirmació que el contractista ha rebut els documents d'informació.
  cs: Tato hodnocení rizik čekají na potvrzení, že dodavatel obdržel informační dokumenty.
  cy: Mae'r asesiadau risg hyn yn aros am gadarnhad bod y contractwr wedi derbyn y dogfennau briffio.
  da: Disse risikovurderinger afventer en bekræftelse på, at entreprenøren har modtaget briefingdokumenterne.
  de: These risk assessments are waiting for a confirmation that the contractor has received the briefing documents.
  el: Αυτές οι εκτιμήσεις κινδύνου αναμένουν επιβεβαίωση ότι ο εργολάβος έχει παραλάβει τα έγγραφα ενημέρωσης.
  en: These risk assessments are waiting for a confirmation that the contractor has received the briefing documents.
  es: Estas evaluaciones de riesgos están esperando una confirmación de que el contratista ha recibido los documentos informativos.
  et: Need riskihinnangud ootavad kinnitust, et töövõtja on briifingudokumendid kätte saanud.
  fi: Nämä riskiarvioinnit odottavat vahvistusta siitä, että urakoitsija on vastaanottanut tiedotusasiakirjat.
  fr: Ces évaluations des risques attendent une confirmation que le sous-traitant a bien reçu les documents d'information.
  ga: Tá na measúnuithe riosca seo ag fanacht le deimhniú go bhfuair an conraitheoir na cáipéisí brífinge.
  he: הערכות סיכון אלה ממתינות לאישור שהקבלן קיבל את מסמכי הבריפינג.
  hr: Ove procjene rizika čekaju potvrdu da je izvođač primio dokumente za informiranje.
  hu: Ezek a kockázatbecslések arra várnak, hogy megerősítsék, hogy a vállalkozó megkapta a tájékoztató dokumentumokat.
  is: Þessar áhættumat bíða eftir staðfestingu þess að verktakinn hafi móttekið kynningargögnin.
  it: Queste valutazioni del rischio sono in attesa di una conferma che l'appaltatore abbia ricevuto i documenti di briefing.
  lt: Šie rizikos vertinimai laukia patvirtinimo, kad rangovas gavo instruktavimo dokumentus.
  lv: Šie riska novērtējumi gaida apstiprinājumu, ka darbuzņēmējs ir saņēmis instruktāžas dokumentus.
  mt: Dawn il-valutazzjonijiet tar-riskju qed jistennew konferma li l-kuntrattur irċieva d-dokumenti tal-briefing.
  nl: Deze risicobeoordelingen wachten op een bevestiging dat de aannemer de briefingdocumenten heeft ontvangen.
  nl_BE: Deze risicobeoordelingen wachten op een bevestiging dat de aannemer de briefingdocumenten heeft ontvangen.
  nl_be: Deze risicobeoordelingen wachten op een bevestiging dat de aannemer de briefingdocumenten heeft ontvangen.
  'no': Disse risikovurderingene venter på en bekreftelse på at entrepr\u00enøren har mottatt briefingdokumentene.
  pl: Te oceny ryzyka oczekują na potwierdzenie, że wykonawca otrzymał dokumenty briefingowe.
  pt: Estas avaliações de risco aguardam confirmação de que o empreiteiro recebeu os documentos de briefing.
  ro: Aceste evaluări de risc așteaptă o confirmare că contractantul a primit documentele de informare.
  ru: Эти оценки рисков ожидают подтверждения того, что подрядчик получил инструктажные документы.
  sk: Tieto hodnotenia rizík čakajú na potvrdenie, že zhotoviteľ dostal informačné dokumenty.
  sl: Te ocene tveganj čakajo na potrditev, da je izvajalec prejel informativna gradiva.
  sq: Këto vlerësime rreziku presin konfirmimin se kontraktori ka marrë dokumentet e informimit.
  sr: Ove procene rizika čekaju potvrdu da je izvođač primio dokumente za brifing.
  sv: Dessa riskbedömningar väntar på en bekräftelse att entreprenören har tagit emot informationsdokumenten.
  uk: Ці оцінки ризику очікують підтвердження того, що підрядник отримав інструктивні документи.
message_warning_locking_after_validation:
  bg: След като вашият консултант валидира тази оценка на риска, тя ще бъде заключена. Ако желаете да редактирате оценката на риска отново, винаги можете да направите дубликат на тази оценка по-късно.
  ca: Després que el vostre consultor hagi validat aquesta avaluació de riscos, quedarà bloquejada. Si voleu tornar a editar l'avaluació de riscos, sempre podeu fer un duplicat d'aquesta avaluació en un moment posterior.
  cs: Poté, co váš poradce toto hodnocení rizik validuje, bude uzamčeno. Pokud budete chtít hodnocení rizik znovu upravit, můžete si vždy vytvořit duplikát tohoto hodnocení v pozdější době.
  cy: Ar ôl i'ch ymgynghorydd ddilysu'r asesiad risg hwn, caiff ei gloi. Os hoffech olygu'r asesiad risg eto, gallwch bob amser wneud copi dyblyg o'r asesiad hwn yn ddiweddarach.
  da: Når din konsulent har valideret denne risikovurdering, vil den blive låst. Skulle du ønske at redigere risikovurderingen igen, kan du altid lave en kopi af denne vurdering på et senere tidspunkt.
  de: Nachdem Ihr Berater diese Risikobewertung validiert hat, wird sie gesperrt. Sollten Sie die Gefährdungsbeurteilung erneut bearbeiten wollen, so können Sie diese jederzeit zu einem späteren Zeitpunkt duplizieren.
  el: Αφού ο σύμβουλός σας επικυρώσει αυτή την εκτίμηση κινδύνου, θα κλειδωθεί. Εάν θέλετε να επεξεργαστείτε ξανά την εκτίμηση κινδύνου, μπορείτε πάντα να δημιουργήσετε ένα αντίγραφο αυτής της εκτίμησης αργότερα.
  en: After your consultant has validated this risk assessment, it will be locked. Should you want to edit the risk assessment again, then you may always make a duplicate of this assessment at a later time.
  es: Una vez que su consultor haya validado esta evaluación de riesgos, quedará bloqueada. Si desea editar la evaluación de riesgos nuevamente, siempre puede hacer un duplicado de esta evaluación en un momento posterior.
  et: Pärast seda, kui teie konsultant on selle riskihinnangu kinnitanud, lukustatakse see. Kui soovite riskihinnangut uuesti muuta, saate alati hiljem sellest hinnangust koopia teha.
  fi: Kun konsulttisi on vahvistanut tämän riskiarvioinnin, se lukitaan. Jos haluat muokata riskiarviointia uudelleen, voit aina myöhemmin tehdä kopion tästä arvioinnista.
  fr: Une fois que votre consultant aura validé cette évaluation des risques, elle sera verrouillée. Si vous souhaitez modifier à nouveau l'évaluation des risques, vous pouvez toujours faire une copie de cette évaluation ultérieurement.
  ga: Tar éis do do chomhairleoir an measúnú riosca seo a bhailíochtú, cuirfear faoi ghlas é. Más mian leat an measúnú riosca a chur in eagar arís, is féidir leat cóip den mheasúnú seo a dhéanamh am ar bith níos déanaí.
  he: לאחר שהיועץ שלך אימת את הערכת הסיכונים, היא תינעל. אם תרצה לערוך את הערכת הסיכונים שוב, תוכל תמיד ליצור העתק של הערכה זו בשלב מאוחר יותר.
  hr: Nakon što vaš savjetnik potvrdi ovu procjenu rizika, bit će zaključana. Ako želite ponovo urediti procjenu rizika, uvijek možete napraviti duplikat ove procjene u kasnijem trenutku.
  hu: Miután tanácsadója érvényesítette ezt a kockázatértékelést, az zárolva lesz. Ha ismét szerkeszteni szeretné a kockázatértékelést, bármikor készíthet egy másolatot erről az értékelésről egy későbbi időpontban.
  is: Eftir að ráðgjafi þinn hefur staðfest þetta áhættumat verður það læst. Ef þú vilt breyta áhættumatinu aftur geturðu alltaf gert afrit af þessu mati síðar.
  it: Dopo che il tuo consulente ha convalidato questa valutazione dei rischi, verrà bloccata. Se desideri modificare nuovamente la valutazione dei rischi, puoi sempre creare un duplicato di questa valutazione in un secondo momento.
  lt: Kai jūsų konsultantas patvirtins šį rizikos vertinimą, jis bus užrakintas. Jei norėsite vėl redaguoti rizikos vertinimą, visada galėsite vėliau sukurti šio vertinimo dublikatą.
  lv: Pēc tam, kad jūsu konsultants apstiprinās šo riska novērtējumu, tas tiks bloķēts. Ja vēlēsieties rediģēt riska novērtējumu atkārtoti, jūs vienmēr varēsiet vēlāk izveidot šī novērtējuma dublikātu.
  mt: Wara li l-konsulent tiegħek jivvalidja din il-valutazzjoni tar-riskju, hija tiġi msakkar. Jekk tixtieq teditja l-valutazzjoni tar-riskju mill-ġdid, dejjem tista' tagħmel duplikat ta' din il-valutazzjoni f'mument ieħor.
  nl: Nadat uw adviseur deze risicobeoordeling heeft gevalideerd, wordt deze vergrendeld. Mocht u de risicobeoordeling opnieuw willen bewerken, dan kunt u op een later tijdstip altijd een duplicaat van deze beoordeling maken.
  nl_BE: Nadat uw preventieadviseur deze risicobeoordeling heeft gevalideerd, wordt deze vergrendeld. Als u de risicobeoordeling opnieuw wilt bewerken, kunt u later altijd een duplicaat van deze beoordeling maken.
  nl_be: Nadat uw preventieadviseur deze risicobeoordeling heeft gevalideerd, wordt deze vergrendeld. Als u de risicobeoordeling opnieuw wilt bewerken, kunt u later altijd een duplicaat van deze beoordeling maken.
  'no': Etter at konsulenten din har validert denne risikovurderingen, vil den bli låst. Hvis du ønsker å redigere risikovurderingen igjen, kan du alltid lage en kopi av denne vurderingen på et senere tidspunkt.
  pl: Po zatwierdzeniu tej oceny ryzyka przez konsultanta zostanie ona zablokowana. Jeśli będziesz chciał(-a) ponownie edytować ocenę ryzyka, zawsze możesz wykonać duplikat tej oceny w późniejszym czasie.
  pt: Depois que seu consultor validar esta avaliação de risco, ela será bloqueada. Caso queira editar a avaliação de risco novamente, você sempre poderá fazer uma cópia desta avaliação posteriormente.
  ro: După ce consultantul dvs. a validat această evaluare a riscurilor, aceasta va fi blocată. Dacă doriți să editați din nou evaluarea riscurilor, puteți oricând să faceți un duplicat al acestei evaluări la un moment ulterior.
  ru: После того как ваш консультант проверит данную оценку рисков, она будет заблокирована. Если вы захотите снова отредактировать оценку рисков, вы всегда сможете создать её дубликат в более позднее время.
  sk: Po tom, čo váš konzultant overí toto hodnotenie rizík, bude uzamknuté. Ak budete chcieť hodnotenie rizík znovu upraviť, môžete vždy vytvoriť duplikát tohto hodnotenia neskôr.
  sl: Ko bo vaš svetovalec potrdil to oceno tveganja, bo zaklenjena. Če boste želeli oceno tveganja znova urediti, lahko kadarkoli pozneje ustvarite dvojnik te ocene.
  sq: Pasi konsulenti juaj të ketë vërtetuar këtë vlerësim risku, ai do të bllokohet. Nëse dëshironi të redaktoni përsëri vlerësimin e riskut, mund të bëni gjithmonë një kopje të këtij vlerësimi në një kohë të mëvonshme.
  sr: Nakon što vaš savetnik potvrdi ovu procenu rizika, ona će biti zaključana. Ako želite ponovo da uredite procenu rizika, uvek možete napraviti duplikat ove procene u kasnijem trenutku.
  sv: När din konsult har validerat denna riskbedömning kommer den att låsas. Om du vill redigera riskbedömningen igen kan du alltid göra en kopia av denna bedömning vid ett senare tillfälle.
  uk: Після того як ваш консультант підтвердить цю оцінку ризиків, вона буде заблокована. Якщо ви захочете знову відредагувати оцінку ризиків, ви завжди зможете створити дублікат цієї оцінки пізніше.
