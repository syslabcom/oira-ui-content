label_certificate_benefits:
  bg: С този сертификат можете да кандидатствате за намаление на ставките по застраховката
  ca: Amb aquest certificat, podeu sol·licitar una reducció de les primes de l'assegurança
  cs: S tímto certifikátem můžete požádat o snížení sazeb pojištění
  cy: Gyda'r dystysgrif hon, gallwch wneud cais am ostyngiad ar gyfraddau yswiriant eich cwmni.
  da: Med dette certifikat kan du ansøge om en reduktion på din virksomheds forsikringssatser.
  de: Mit diesem Zertifikat können Sie eine Reduzierung der Versicherungsprämien beantragen
  el: Με αυτό το πιστοποιητικό μπορείτε να υποβάλετε αίτηση για μείωση των ασφαλιστικών σας εισφορών
  en: With this certificate, you can apply for a reduction on your company's insurance rates.
  es: Con este certificado, puede solicitar una reducción de las primas de su seguro
  et: Selle sertifikaadiga saate taotleda vähendust oma ettevõtte kindlustusmaksetes.
  fi: Tällä todistuksella voit hakea alennusta yrityksesi vakuutusmaksuihin
  fr: Avec ce certificat, vous pouvez demander une réduction
  ga: Leis an teastas seo, is féidir leat iarratas a dhéanamh ar laghdú ar rátaí árachais do chuideachta.
  he: עם תעודה זו, תוכל להגיש בקשה להפחתה בתעריפי הביטוח של חברתך.
  hr: S ovim certifikatom možete zatražiti smanjenje premija osiguranja
  hu: Ezzel a tanúsítvánnyal kérheti a vállalati biztosítási díjak csökkentését
  is: Með þessu vottorði getur þú sótt um lækkun á tryggingargjöldum fyrirtækisins
  it: Con questo certificato, puoi richiedere una riduzione delle tariffe assicurative della tua azienda
  lt: Su šiuo sertifikatu galite kreiptis dėl įmonės draudimo įmokų sumažinimo
  lv: Ar šo sertifikātu jūs varat pieteikties uz uzņēmuma apdrošināšanas maksas samazinājumu
  mt: B'dan iċ-ċertifikat, inti tista' applika għal reduzzjoni fil-prezzijiet tal-iskrut tal-kumpanija tiegħek
  nl: Met dit certificaat kunt u een korting op de verzekeringspremies van uw bedrijf aanvragen
  nl_BE: Met dit certificaat kunt u een korting op de verzekeringspremies van uw bedrijf aanvragen
