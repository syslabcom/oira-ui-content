label_confirm_recipients:
  bg: Потвърдете, че сте получили имейл обратно от един или повече получатели, в който се заявява съгласие с условията.
  ca: Confirmeu que heu rebut un correu electrònic de resposta d'un o més destinataris que indiquen que estan d'acord amb els termes.
  cs: Potvrďte, že jste obdrželi zpětný e-mail od jednoho nebo více příjemců vyjadřujících souhlas s podmínkami.
  cy: Cadarnhewch eich bod wedi derbyn e-bost yn ôl gan un neu fwy o dderbynwyr yn nodi eu bod yn cytuno â'r telerau.
  da: Bekræft, at du har modtaget en e-mail tilbage fra en eller flere modtagere, der angiver at acceptere betingelserne.
  de: Bestätigen Sie, dass Sie von einem oder mehreren der Fremdfirmen-Vertreter eine E-mail mit Bestätigung der Einweisung erhalten haben.
  el: Επιβεβαιώστε ότι έχετε λάβει email από έναν ή περισσότερους παραλήπτες που δηλώνουν ότι συμφωνούν με τους όρους.
  en: Confirm that you've received an e-mail back from one or more recipients stating to agree with the terms.
  es: Confirma que has recibido un correo electrónico de uno o más destinatarios indicando que están de acuerdo con los términos.
  et: Kinnitage, et olete saanud ühelt või mitmelt saajalt e-kirja, milles kinnitatakse tingimustega nõustumist.
  fi: Vahvista, että olet saanut sähköpostin yhdeltä tai useammalta vastaanottajalta, jossa he ilmoittavat hyväksyvänsä ehdot.
  fr: Confirmez que vous avez reçu un e-mail en retour d'un ou plusieurs destinataires indiquant qu'ils acceptent les conditions.
  ga: Deimhnigh go bhfuair tú ríomhphost ar ais ó cheann amháin nó níos mó de na faighteoirí ag rá go n-aontaíonn siad leis na téarmaí.
  he: אשר כי קיבלת דוא"ל חזרה מנמען אחד או יותר המציין הסכמה לתנאים.
  hr: Potvrdite da ste primili povratnu e-poštu od jednog ili više primatelja u kojoj se navodi da se slažu s uvjetima.
  hu: Erősítse meg, hogy visszakapott egy e-mailt egy vagy több címzettől, amelyben jelzik, hogy egyetértenek a feltételekkel.
  is: Staðfestu að þú hafir fengið tölvupóst til baka frá einum eða fleiri viðtakendum þar sem fram kemur að þeir samþykki skilmálana.
  it: Conferma di aver ricevuto un'e-mail di risposta da uno o più destinatari che dichiarano di accettare i termini.
  lt: Patvirtinkite, kad gavote el. laišką iš vieno ar kelių gavėjų, kuriame nurodoma, kad jie sutinka su sąlygomis.
  lv: Apstipriniet, ka esat saņēmis atbildes e-pastu no viena vai vairākiem adresātiem, kuros teikts, ka viņi piekrīt noteikumiem.
  mt: Ikkonferma li rċevejt email lura minn wieħed jew aktar destinatarji li jistqarru li jaqblu mal-kundizzjonijiet.
  nl: Bevestig dat u een e-mail heeft ontvangen van een of meer ontvangers waarin staat dat zij akkoord gaan met de voorwaarden.
  nl_BE: Bevestig dat u een e-mail heeft ontvangen van een of meer ontvangers die aangeven akkoord te gaan met de voorwaarden.
  nl_be: Bevestig dat u een e-mail heeft ontvangen van een of meer ontvangers die aangeven akkoord te gaan met de voorwaarden.
  'no': Bekreft at du har mottatt en e-post fra en eller flere mottakere som bekrefter at de er enige i vilkårene.
  pl: Potwierdź, że otrzymałeś(-aś) wiadomość e-mail od jednego lub więcej odbiorców potwierdzającą zgodę na warunki.
  pt: Confirme que recebeu um e-mail de resposta de um ou mais destinatários a indicar que concordam com os termos.
  ro: Confirmați că ați primit un e-mail de la unul sau mai mulți destinatari care declară că sunt de acord cu termenii.
  ru: Подтвердите, что вы получили ответное электронное письмо от одного или нескольких получателей, в котором говорится о согласии с условиями.
  sk: Potvrďte, že ste dostali e-mail späť od jedného alebo viacerých príjemcov, v ktorom súhlasia s podmienkami.
  sl: Potrdite, da ste prejeli e-pošto od enega ali več prejemnikov, ki navajajo, da se strinjajo s pogoji.
  sq: Konfirmoni që keni marrë një email nga një ose më shumë marrës që deklarojnë se janë dakord me kushtet.
  sr: Potvrdite da ste primili odgovor e-poštom od jednog ili više primalaca u kojoj navode da se slažu s uslovima.
  sv: Bekräfta att du har fått ett e-postsvar från en eller flera mottagare som anger att de godkänner villkoren.
  uk: Підтвердіть, що ви отримали електронного листа від одного або кількох одержувачів із зазначенням згоди з умовами.
