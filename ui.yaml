  'no': ${user} har gjennomgått, validert og låst denne risikovurderingen.
  pl: ${user} przejrzał(-a), zatwierdził(-a) i zablokował(-a) tę ocenę ryzyka.
  pt: ${user} revisou, validou e bloqueou esta avaliação de risco.
  ro: ${user} a revizuit, validat și blocat această evaluare a riscurilor.
  ru: ${user} проверил(а), утвердил(а) и заблокировал(а) данную оценку рисков.
  sk: ${user} preskúmal(a), overil(a) a uzamkol(a) toto hodnotenie rizík.
  sl: ${user} je pregledal(a), potrdil(a) in zaklenil(a) to oceno tveganja.
  sq: ${user} ka shqyrtuar, vërtetuar dhe bllokuar këtë vlerësim risku.
  sr: ${user} je pregledao, potvrdio i zaključao ovu procenu rizika.
  sv: ${user} har granskat, validerat och låst denna riskbedömning.
  uk: ${user} переглянув, підтвердив та заблокував цю оцінку ризиків.
