explanation_ra_archive:
  de: Durch das Archivieren wird diese GBU für das Editieren dauerhaft gesperrt und
    in allen Übersichtsseiten ausgeblendet, außer wenn der Filter “Archivierte Elemente
    anzeigen” angewendet wird.
  en: By archiving this risk assessment it will become read only and hidden from view
    in overviews unless the ‘show archived risk assessments’ filter is applied.
  bg: Чрез архивирането на тази оценка на риска тя ще стане само за четене и ще бъде
    скрита от прегледа в обобщенията, освен ако не се приложи филтърът „показване
    на архивирани оценки на риска".
  ca: En arxivar aquesta avaluació de riscos, es convertirà en només de lectura i
    estarà oculta a les vistes generals, tret que s'apliqui el filtre 'mostra les
    avaluacions de riscos arxivades'.
  cs: Archivací tohoto hodnocení rizik se stane pouze pro čtení a bude skryto v přehledech,
    pokud nebude použit filtr 'zobrazit archivovaná hodnocení rizik'.
  cy: Drwy archifo'r asesiad risg hwn bydd yn dod yn ddarllen yn unig ac yn gudd o'r
    golwg mewn trosolygon oni bai bod y hidlydd 'dangos asesiadau risg wedi'u harchifo'
    yn cael ei gymhwyso.
  da: Ved at arkivere denne risikovurdering vil den blive skrivebeskyttet og skjult
    fra visningen i oversigter, medmindre filteret 'vis arkiverede risikovurderinger'
    anvendes.
  el: Με την αρχειοθέτηση αυτής της αξιολόγησης κινδύνου θα καταστεί μόνο για ανάγνωση
    και θα αποκρυφτεί από τις επισκοπήσεις, εκτός αν εφαρμοστεί το φίλτρο 'εμφάνιση
    αρχειοθετημένων αξιολογήσεων κινδύνου'.
  es: Al archivar esta evaluación de riesgos, pasará a ser de solo lectura y quedará
    oculta en las vistas generales, a menos que se aplique el filtro 'mostrar evaluaciones
    de riesgos archivadas'.
  et: Selle riskihinnangu arhiveerimisel muutub see kirjutuskaitstuks ja peidetakse
    ülevaadetest, välja arvatud juhul, kui rakendatakse filtrit 'kuva arhiveeritud
    riskihinnangud'.
  fi: Arkistoimalla tämä riskiarvio siitä tulee vain luku -tilassa oleva ja se piilotetaan
    yleiskatsauksista, ellei 'näytä arkistoidut riskiarviot' -suodatinta käytetä.
  fr: En archivant cette évaluation des risques, elle deviendra en lecture seule et
    masquée dans les vues d'ensemble, sauf si le filtre 'afficher les évaluations
    des risques archivées' est appliqué.
  ga: Trí an measúnú riosca seo a chartlannú, beidh sé inléite amháin agus i bhfolach
    ó radharc sna forbhreathnuithe mura gcuirtear an scagaire 'taispeáin measúnuithe
    riosca cartlannaithe' i bhfeidhm.
  he: על ידי ארכיון הערכת הסיכון זו היא תהפוך לקריאה בלבד ותוסתר מהתצוגה בסקירות כלליות
    אלא אם כן יוחל המסנן 'הצג הערכות סיכון מאורכבות'.
  hr: Arhiviranjem ove procjene rizika postaje samo za čitanje i skrivena je iz prikaza
    u pregledima, osim ako se ne primijeni filtar 'prikaži arhivirane procjene rizika'.
  hu: A kockázatértékelés archiválásával az csak olvashatóvá válik, és az áttekintésekben
    elrejlik, kivéve ha az 'archivált kockázatértékelések megjelenítése' szűrőt alkalmazzák.
  is: Með því að geyma þessa áhættumat í skjalasafni verður hún aðeins lesanleg og
    falin í yfirlitum nema 'sýna geymdar áhættumatskeyrslur' síinn sé notaður.
  it: Archiviando questa valutazione del rischio diventerà di sola lettura e nascosta
    dalla visualizzazione nelle panoramiche a meno che non venga applicato il filtro
    'mostra valutazioni del rischio archiviate'.
  lt: Suarchyvavus šį rizikos vertinimą, jis taps tik skaitomas ir bus paslėptas nuo
    rodinio apžvalgose, nebent bus pritaikytas filtras „rodyti archyvuotus rizikos
    vertinimus".
  lv: Arhivējot šo riska novērtējumu, tas kļūs tikai lasāms un tiks paslēpts no pārskata
    skata, ja vien netiks lietots filtrs 'rādīt arhivētos riska novērtējumus'.
  mt: Billi tarċivja din il-valutazzjoni tar-riskju se ssir taqra biss u moħbija mill-fehsa
    fil-ħarsa ġenerali sakemm ma jiġix applikat il-filtru 'uri l-valutazzjonijiet
    tar-riskju arċivjati'.
  nl: Door deze risicobeoordeling te archiveren wordt deze alleen-lezen en verborgen
    in overzichten, tenzij het filter 'gearchiveerde risicobeoordelingen weergeven'
    wordt toegepast.
  nl_BE: Door deze risicobeoordeling te archiveren wordt ze alleen-lezen en verborgen
    in overzichten, tenzij het filter 'gearchiveerde risicobeoordelingen weergeven'
    wordt toegepast.
  nl_be: Door deze risicobeoordeling te archiveren wordt ze alleen-lezen en verborgen
    in overzichten, tenzij het filter 'gearchiveerde risicobeoordelingen weergeven'
    wordt toegepast.
  'no': Ved å arkivere denne risikovurderingen blir den skrivebeskyttet og skjult
    i oversikter med mindre filteret 'vis arkiverte risikovurderinger' er aktivert.
  pl: Archiwizacja tej oceny ryzyka spowoduje, że stanie się ona tylko do odczytu
    i będzie ukryta w przeglądach, chyba że zastosowany zostanie filtr „pokaż zarchiwizowane
    oceny ryzyka".
  pt: Ao arquivar esta avaliação de risco, ela ficará apenas de leitura e oculta nas
    visões gerais, a menos que o filtro 'mostrar avaliações de risco arquivadas' seja
    aplicado.
  ro: Prin arhivarea acestei evaluări a riscurilor, aceasta va deveni doar pentru
    citire și ascunsă din vizualizările generale, cu excepția cazului în care filtrul
    'afișare evaluări de riscuri arhivate' este aplicat.
  ru: При архивировании этой оценки рисков она станет доступной только для чтения
    и скрытой из обзоров, если не применён фильтр 'показать архивные оценки рисков'.
  sk: Archivovaním tohto hodnotenia rizika sa stane iba na čítanie a bude skryté v
    prehľadoch, pokiaľ nie je použitý filter 'zobraziť archivované hodnotenia rizika'.
  sl: Z arhiviranjem te ocene tveganja bo postala samo za branje in skrita v pregledih,
    razen če je uporabljen filter 'pokaži arhivirane ocene tveganja'.
  sq: Duke arkivuar këtë vlerësim rreziku ai do të bëhet vetëm i lexueshëm dhe i fshehur
    nga pamjet e përgjithshme nëse nuk aplikohet filtri 'trego vlerësimet e rrezikut
    të arkivuara'.
  sr: Arhiviranjem ove procene rizika ona će postati samo za čitanje i biće skrivena
    u pregledima, osim ako se ne primeni filter 'prikaži arhivirane procene rizika'.
  sv: Genom att arkivera denna riskbedömning kommer den att bli skrivskyddad och dold
    i översikter om inte filtret 'visa arkiverade riskbedömningar' tillämpas.
  uk: Архівуючи цю оцінку ризику, вона стане доступною лише для читання та буде прихована
    в оглядах, якщо не застосовано фільтр 'показати архівовані оцінки ризику'.
explanation_ra_clone:
  bg: Чрез клониране на оценката на риска, ще създадете нова оценка на риска, основана
    на съдържанието на настоящата оценка на риска, като отправна точка.
  ca: Si cloneu una avaluació de riscos, creareu una nova avaluació de riscos basada
    en el contingut d'aquesta avaluació de riscos com a punt de partida.
  cs: Zkopírováním tohoto hodnocení rizika vytvoříte nové hodnocení založené na obsahu
    původního nástroje jako výchozího zdroje.
  de: Durch das Duplizieren einer GBU wird eine neue GBU angelegt, mit allen Antworten
    dieser GBU als Ausgangspunkt.
  el: Αν κατά την έναρξη μιας νέας μελέτης Εκτίμησης Κινδύνου επιλέξετε να χρησιμοποιηθεί
    ένα πιστό αντίγραφο (κλώνος) μιας παλαιότερης μελέτης,  τότε το περιεχόμενο της
    νέας μελέτης σας θα βασιστεί στο περιεχόμενο της παλαιότερης μελέτης.
  en: By duplicating a risk assessment you will create a new risk assessment based
    on the contents of this risk assessment as a starting point.
  es: Clonando una evaluación de riesgos creará una nueva evaluación basada en los
    contenidos de esta evaluación como punto de partida.
  fi: Voit luoda uuden riskinarviointipohjan myös kopioimalla tämän riskinarvioinnin.
    Tällöin uuden riskiarvioinnin työstäminen jatkuu tämän nykyisen pohjalta.
  fr: En duplicant une évaluation des risques, vous pouvez créer une nouvelle évaluation
    reprenant les contenus existants comme base de départ.
  hr: Kloniranjem procjene rizika stvorit ćete novu procjenu rizika koja se temelji
    na sadržaju ove procjene rizika.
  hu: A kockázatértékelés lemásolásával egy új kockázatértékelést hoz létre.
  is: Með því að afrita áhættumat er búið til nýtt áhættumat sem er byggt á gömlu
    mati, þ.e. gamla matið er notað sem uppkast af nýju.
  it: Copiando una valutazione del rischio già realizzata, puoi utilizzarla come base
    di partenza per creare una nuova valutazione dei rischi utilizzando i contenuti
    già predisposti.
  lt: Kopijuodami rizikos vertinimą, Jūs sukursite naują rizikos vertinimą pagal jau
    atlikto vertinimo turinį.
  lv: Klonējot riska novērtējumu, jūs izveidosiet jaunu riska novērtējumu, kura saturs
    sākotnēji būs identisks ar iepriekšējo riska novērtējumu.
  mt: Meta tikkopja evalwazzjoni tar-riskju tkun qiegħed toħloq evalwazzjoni tar-riskju
    ġdida ibbażata fuq il-kontenut ta’ din l-evalwazzjoni tar-riskju bħala punt tat-tluq.
  nl: Door een risicoanalyse te klonen, zal u een nieuwe risicoanalyse creëren gebaseerd
    op de inhoud van deze risicoanalyse als startpunt.
  nl_BE: Door een risicoanalyse te dupliceren, zal u een nieuwe risicoanalyse creëren
    gebaseerd op de inhoud van deze risicoanalyse als startpunt.
  'no': Ved å duplisere en risikovurdering vil du opprette en ny risikovurdering basert
    på innholdet i denne risikovurderingen som et utgangspunkt.
  pt: Ao duplicar uma avaliação de riscos, criará uma nova avaliação de riscos com
    base no conteúdo da avaliação de riscos inicial.
  sk: Vytvorením kópie hodnotenia rizík vytvoríte nové hodnotenie rizík na&nbsp;základe
    obsahu tohto hodnotenia rizík ako počiatočného bodu.
  sl: S kloniranjem ocene tveganja boste ustvarili novo oceno tveganja, ki temelji
    na vsebini te osnovne ocene tveganja.
  cy: Trwy ddyblygu asesiad risg byddwch yn creu asesiad risg newydd yn seiliedig
    ar gynnwys yr asesiad risg hwn fel man cychwyn.
  da: Ved at duplikere en risikovurdering opretter du en ny risikovurdering baseret
    på indholdet af denne risikovurdering som udgangspunkt.
  et: Riskihinnangu dubleerimisel loote uue riskihinnangu, mis põhineb selle riskihinnangu
    sisul lähtepunktina.
  ga: Trí mheasúnú riosca a dhúbailt cruthóidh tú measúnú riosca nua bunaithe ar ábhar
    an mheasúnaithe riosca seo mar phointe tosaigh.
  he: על ידי שכפול הערכת סיכונים תיצור הערכת סיכונים חדשה המבוססת על תוכן הערכת סיכונים
    זו כנקודת התחלה.
  nl_be: Door een risicobeoordeling te dupliceren maakt u een nieuwe risicobeoordeling
    aan op basis van de inhoud van deze risicobeoordeling als startpunt.
  pl: Duplikując ocenę ryzyka, utworzysz nową ocenę ryzyka opartą na zawartości tej
    oceny ryzyka jako punkcie wyjścia.
  ro: Prin duplicarea unei evaluări a riscurilor, veți crea o nouă evaluare a riscurilor
    bazată pe conținutul acestei evaluări ca punct de plecare.
  ru: Дублируя оценку рисков, вы создадите новую оценку рисков на основе содержимого
    данной оценки рисков в качестве отправной точки.
  sq: Duke dyfishuar një vlerësim rreziku, do të krijoni një vlerësim të ri rreziku
    bazuar në përmbajtjen e këtij vlerësimi rreziku si pikënisje.
  sr: Dupliranjem procene rizika kreiraćete novu procenu rizika zasnovanu na sadržaju
    ove procene rizika kao polaznoj tački.
  sv: Genom att duplicera en riskbedömning skapar du en ny riskbedömning baserad på
    innehållet i denna riskbedömning som utgångspunkt.
  uk: Дублюючи оцінку ризику, ви створите нову оцінку ризику на основі вмісту цієї
    оцінки ризику як відправної точки.
explanation_ra_delete:
  de: Mit dieser Aktion wird die GBU 'Kabinenbau Wörth' unwiederbringlich gelöscht.
  en: This action will delete the risk assessment 'Private Security EU'. This cannot
    be reverted.
  bg: Това действие ще изтрие оценката на риска „Private Security EU". Това не може
    да бъде отменено.
  ca: Aquesta acció eliminarà l'avaluació de riscos 'Private Security EU'. Això no
    es pot revertir.
  cs: Tato akce odstraní hodnocení rizik 'Private Security EU'. Tuto akci nelze vrátit
    zpět.
  cy: Bydd y weithred hon yn dileu'r asesiad risg 'Private Security EU'. Ni ellir
    gwrthdroi hyn.
  da: Denne handling vil slette risikovurderingen 'Private Security EU'. Dette kan
    ikke fortrydes.
  el: Αυτή η ενέργεια θα διαγράψει την αξιολόγηση κινδύνου 'Private Security EU'.
    Αυτό δεν μπορεί να αναιρεθεί.
  es: Esta acción eliminará la evaluación de riesgos 'Private Security EU'. Esto no
    se puede revertir.
  et: See toiming kustutab riskihinnangu 'Private Security EU'. Seda ei saa tagasi
    võtta.
  fi: Tämä toiminto poistaa riskiarvion 'Private Security EU'. Tätä ei voi peruuttaa.
  fr: Cette action supprimera l'évaluation des risques 'Private Security EU'. Ceci
    ne peut pas être annulé.
  ga: Scriosfaidh an gníomh seo an measúnú riosca 'Private Security EU'. Ní féidir
    é seo a aisiompú.
  he: פעולה זו תמחק את הערכת הסיכון 'Private Security EU'. לא ניתן לבטל פעולה זו.
  hr: Ova radnja će izbrisati procjenu rizika 'Private Security EU'. Ovo se ne može
    poništiti.
  hu: Ez a művelet törli a 'Private Security EU' kockázatértékelést. Ez nem vonható
    vissza.
  is: Þessi aðgerð mun eyða áhættumatinu 'Private Security EU'. Þetta er óafturkræft.
  it: Questa azione eliminerà la valutazione del rischio 'Private Security EU'. Questa
    azione non può essere annullata.
  lt: Šis veiksmas panaikins rizikos vertinimą „Private Security EU". Šio veiksmo
    negalima atšaukti.
  lv: Šī darbība dzēsīs riska novērtējumu 'Private Security EU'. To nevar atsaukt.
  mt: Din l-azzjoni se tħassar il-valutazzjoni tar-riskju 'Private Security EU'. Dan
    ma jistax jiġi riversat.
  nl: Deze actie verwijdert de risicobeoordeling 'Private Security EU'. Dit kan niet
    ongedaan worden gemaakt.
  nl_BE: Deze actie verwijdert de risicobeoordeling 'Private Security EU'. Dit kan
    niet ongedaan worden gemaakt.
  nl_be: Deze actie verwijdert de risicobeoordeling 'Private Security EU'. Dit kan
    niet ongedaan worden gemaakt.
  'no': Denne handlingen vil slette risikovurderingen 'Private Security EU'. Dette
    kan ikke angres.
  pl: Ta czynność spowoduje usunięcie oceny ryzyka „Private Security EU". Tej operacji
    nie można cofnąć.
  pt: Esta ação irá eliminar a avaliação de risco 'Private Security EU'. Esta operação
    não pode ser revertida.
  ro: Această acțiune va șterge evaluarea riscurilor 'Private Security EU'. Aceasta
    nu poate fi anulată.
  ru: Это действие удалит оценку рисков 'Private Security EU'. Это действие нельзя
    отменить.
  sk: Táto akcia vymaže hodnotenie rizika 'Private Security EU'. Toto nie je možné
    vrátiť späť.
  sl: To dejanje bo izbrisalo oceno tveganja 'Private Security EU'. Tega ni mogoče
    razveljaviti.
  sq: Ky veprim do të fshijë vlerësimin e rrezikut 'Private Security EU'. Kjo nuk
    mund të kthehet mbrapsht.
  sr: Ova radnja će izbrisati procenu rizika 'Private Security EU'. Ovo se ne može
    poništiti.
  sv: Den här åtgärden tar bort riskbedömningen 'Private Security EU'. Detta kan inte
    ångras.
  uk: Ця дія видалить оцінку ризику 'Private Security EU'. Це неможливо скасувати.
