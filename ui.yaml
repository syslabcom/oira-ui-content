message_help_version_name:
  en: This is the name of the version of this tool. The version name is only for editors
    and will never be shown to users of the tool.
  bg: Това е името на версията на този инструмент. Името на версията е само за редактори
    и никога няма да се показва на потребителите на инструмента.
  cs: Toto je název verze tohoto nástroje. Název verze je určen pouze pro editory
    a nikdy se nezobrazí uživatelům nástroje.
  da: Dette er navnet på versionen af dette værktøj. Versionsnavnet er kun til redaktører
    og vil aldrig blive vist for brugere af værktøjet.
  de: Dies ist der Name der Version dieses Tools. Der Versionsname ist nur für Editoren
    bestimmt und wird den Benutzern des Tools niemals angezeigt.
  et: See on selle tööriista versiooni nimi. Versiooninimi on mõeldud ainult toimetajatele
    ega kuvata kunagi tööriista kasutajatele.
  el: Αυτό είναι το όνομα της έκδοσης αυτού του εργαλείου. Το όνομα της έκδοσης είναι
    μόνο για επεξεργαστές και δεν θα εμφανιστεί ποτέ στους χρήστες του εργαλείου.
  es: Este es el nombre de la versión de esta herramienta. El nombre de la versión
    es solo para editores y nunca se mostrará a los usuarios de la herramienta.
  fi: Tämä on tämän työkalun version nimi. Versio nimi on tarkoitettu vain toimittajille
    eikä sitä koskaan näytetä työkalun käyttäjille.
  fr: Il s'agit du nom de la version de cet outil. Le nom de la version est réservé
    aux éditeurs et ne sera jamais affiché aux utilisateurs de l'outil.
  ga: Is é seo ainm an leagan den uirlis seo. Is do eagarthóirí amháin é ainm an leagan
    agus ní thaispeánfar do úsáideoirí an uirlis go deo.
  he: זהו שם גרסה של הכלי הזה. שם הגרסה מיועד רק לעורכים ולעולם לא יוצג למשתמשים של
    הכלי.
  hr: Ovo je naziv verzije ovog alata. Naziv verzije namijenjen je samo urednicima
    i nikada se neće prikazati korisnicima alata.
  hu: Ez a verzió neve ennek az eszköznek. A verzió neve csak szerkesztőknek szól,
    és soha nem jelenik meg az eszköz felhasználóinak.
  it: Questo è il nome della versione di questo strumento. Il nome della versione
    è solo per gli editori e non verrà mai mostrato agli utenti dello strumento.
  lt: Tai yra šio įrankio versijos pavadinimas. Versijos pavadinimas skirtas tik redaktoriams
    ir niekada nebus rodomas įrankio naudotojams.
  lv: Tas ir irīka versijas nosaukums. Versijas nosaukums ir paredzēts tikai redaktoriem
    un nekad netiks rādīts rīka lietotājiem.
  mt: Dan huwa l-isem tal-verżjoni ta 'dan l-għodda. L-isem tal-verżjoni huwa biss
    għall-edituri u qatt ma jidher lill-utenti tal-għodda.
  nl: Dit is de naam van de versie van deze tool. De versienaam is alleen voor redacteuren
    en wordt nooit getoond aan gebruikers van de tool.
  pl: To jest nazwa wersji tego narzędzia. Nazwa wersji jest przeznaczona tylko dla
    redaktorów i nigdy nie będzie wyświetlana użytkownikom narzędzia.
  pt: Este é o nome da versão desta ferramenta. O nome da versão destina-se apenas
    a editores e nunca será mostrado aos usuários da ferramenta.
  ro: Acesta este numele versiunii acestei unelte. Numele versiunii este doar pentru
    editori și nu va fi niciodată afișat utilizatorilor uneltei.
  sk: Toto je názov verzie tohto nástroja. Názov verzie je určený iba pre editorov
    a nikdy sa nezobrazí používateľom nástroja.
  sl: To je ime različice tega orodja. Ime različice je namenjeno samo urednikom in
    nikoli ne bo prikazano uporabnikom orodja.
  sv: Detta är namnet på versionen av detta verktyg. Versionsnamnet är endast för
    redaktörer och kommer aldrig att visas för användare av verktyget.
  ca: Aquest és el nom de la versió d'aquesta eina. El nom de la versió és només per
    als editors i no es mostrarà mai als usuaris de l'eina.
  cy: Dyma enw fersiwn yr offeryn hwn. Dim ond i olygyddion y mae enw'r fersiwn ac
