message_permission_level_validate:
  en: User can take trainings, view and edit all risk assessments and validate risk
    assessments.
  bg: Потребителят може да взема обучения, да преглежда и редактира всички оценки
    на риска и да валидира оценки на риска.
  ca: L'usuari pot fer formacions, visualitzar i editar totes les avaluacions de riscos
    i validar avaluacions de riscos.
  cs: Uživatel může absolvovat školení, prohlížet a upravovat všechna hodnocení rizik
    a validovat hodnocení rizik.
  cy: Gall y defnyddiwr gymryd hyfforddiant, gweld a golygu pob asesiad risg a dilysu
    aseisadau risg.
  da: Brugeren kan deltage i kurser, se og redigere alle risikovurderinger og validere
    risikovurderinger.
  de: Der Benutzer kann Schulungen absolvieren, alle Risikobewertungen anzeigen und
    bearbeiten sowie Risikobewertungen validieren.
  el: Ο χρήστης μπορεί να παρακολουθεί εκπαιδεύσεις, να προβάλλει και να επεξεργάζεται
    όλες τις εκτιμήσεις κινδύνου και να επικυρώνει εκτιμήσεις κινδύνου.
  es: El usuario puede realizar formaciones, ver y editar todas las evaluaciones de
    riesgos y validar evaluaciones de riesgos.
  et: Kasutaja saab läbida koolitusi, vaadata ja muuta kõiki riskihindamisi ning valideerida
    riskihindamisi.
  fi: Käyttäjä voi suorittaa koulutuksia, tarkastella ja muokata kaikkia riskiarviointeja
    sekä validoida riskiarviointeja.
  fr: L'utilisateur peut suivre des formations, consulter et modifier toutes les évaluations
    des risques et valider les évaluations des risques.
  ga: Féadfaidh an t-úsáideoir oiliúint a dhéanamh, gach measúnú riosca a fheiceáil
    agus a chur in eagar agus measúnuithe riosca a bhailíochtú.
  he: המשתמש יכול לבצע הכשרות, לצפות ולערוך את כל הערכות הסיכון ולאמת הערכות סיכון.
  hr: Korisnik može pohađati obuke, pregledavati i uređivati sve procjene rizika te
    ih validirati.
  hu: A felhasználó képzéseken vehet részt, megtekintheti és szerkesztheti az összes
    kockázatértékelést, és jóváhagyhatja a kockázatértékeléseket.
  is: Notandi getur tekið þátt í þjálfunum, skoðað og breytt öllum áhættumatsskrám
    og staðfest áhættumatsskrár.
  it: L'utente può seguire le formazioni, visualizzare e modificare tutte le valutazioni
    dei rischi e validare le valutazioni dei rischi.
  lt: Vartotojas gali dalyvauti mokymuose, peržiūrėti ir redaguoti visus rizikos vertinimus
    ir patvirtinti rizikos vertinimus.
  lv: Lietotājs var apmeklēt apmācības, skatīt un rediģēt visus riska novērtējumus
    un validēt riska novērtējumus.
  mt: L-utent jista' jieħu taħriġ, jara u jeditja l-valutazzjonijiet tar-riskju kollha
    u jivvalida l-valutazzjonijiet tar-riskju.
  nl: Gebruiker kan trainingen volgen, alle risicobeoordelingen bekijken en bewerken
    en risicobeoordelingen valideren.
  nl_BE: Gebruiker kan trainingen volgen, alle risicobeoordelingen bekijken en bewerken
    en risicobeoordelingen valideren.
  nl_be: Gebruiker kan trainingen volgen, alle risicobeoordelingen bekijken en bewerken
    en risicobeoordelingen valideren.
  'no': Bruker kan gjennomføre opplæringer, se og redigere alle risikovurderinger
    og validere risikovurderinger.
  pl: Użytkownik może uczestniczyć w szkoleniach, przeglądać i edytować wszystkie
    oceny ryzyka oraz walidować oceny ryzyka.
  pt: O utilizador pode realizar formações, visualizar e editar todas as avaliações
    de risco e validar avaliações de risco.
  ro: Utilizatorul poate efectua cursuri de formare, vizualiza și edita toate evaluările
    de risc și valida evaluările de risc.
  ru: Пользователь может проходить обучение, просматривать и редактировать все оценки
    рисков и подтверждать оценки рисков.
  sk: Používateľ môže absolvovať školenia, prezerať a upravovať všetky hodnotenia
    rizík a validovať hodnotenia rizík.
  sl: Uporabnik lahko opravlja usposabljanja, pregleduje in ureja vse ocene tveganj
    ter potrjuje ocene tveganj.
  sq: Përdoruesi mund të marrë trajnime, të shikojë dhe modifikojë të gjitha vlerësimet
    e riskut dhe të vërtetojë vlerësimet e riskut.
  sr: Korisnik može pohađati obuke, pregledati i uređivati sve procene rizika i validirati
    procene rizika.
  sv: Användaren kan genomföra utbildningar, visa och redigera alla riskbedömningar
    och validera riskbedömningar.
  uk: Користувач може проходити навчання, переглядати і редагувати всі оцінки ризиків
    та підтверджувати оцінки ризиків.
