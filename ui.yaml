  'no': I visse europeiske land kan dette sertifikatet brukes til å søke om skattefordel eller redusert forsikringspremie.
  pl: W niektórych krajach europejskich certyfikat ten może być wykorzystany do ubiegania się o ulgę podatkową lub obniżoną składkę ubezpieczeniową.
  pt: Em determinados países europeus, este certificado pode ser utilizado para solicitar um bónus fiscal ou uma taxa de seguro reduzida.
  ro: În anumite țări europene, acest certificat poate fi utilizat pentru a solicita un bonus fiscal sau o reducere a primei de asigurare.
  ru: В некоторых европейских странах этот сертификат может быть использован для получения налогового бонуса или сниженного страхового взноса.
  sk: V niektorých európskych krajinách možno tento certifikát použiť na žiadosť o daňový bonus alebo znížený poistný poplatok.
  sl: V nekaterih evropskih državah se ta certifikat lahko uporablja za uveljavljanje davčnega bonusa ali znižane zavarovalne premije.
