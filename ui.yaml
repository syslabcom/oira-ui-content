header_risk_frequency:
  bg: Колко често хора са изложени на риск?
  ca: Amb quina freqüència hi ha persones exposades a aquest risc?
  cs: Jak často dochází k ohrožení?
  cy: Pa mor aml y mae pobl yn agored i'r risg hon?
  da: Hvor ofte udsættes folk for denne risiko?
  de: Wie häufig sind Personen dieser Gefährdung ausgesetzt?
  el: Πόσο συχνά εκτίθενται άνθρωποι σε αυτό τον κίνδυνο;
  en: How often are people exposed to this risk?
  es: ¿Con qué frecuencia está expuesta la gente a este riesgo?
  et: Kui sageli puutuvad inimesed selle riskiga kokku?
  fi: Kuinka usein ihmiset altistuvat tälle riskille?
  fr: À quelle fréquence les gens sont-ils exposés à ce risque ?
  ga: Cé chomh minic a bhíonn daoine nochtaithe don riosca seo?
  he: באיזו תדירות אנשים נחשפים לסיכון זה?
  hr: Koliko su često osobe izložene ovom riziku?
  hu: Milyen gyakran vannak emberek kitéve ennek a kockázatnak?
