label_select_applicable_options:
  bg: Отбележете всички приложими квадратчета или добавете нови записи, ако е необходимо.
  ca: Marqueu totes les caselles aplicables o afegiu noves entrades si cal.
  cs: Zaškrtněte všechna příslušná políčka nebo přidejte nové položky, pokud je to nutné.
  cy: Ticiwch bob blwch sy'n berthnasol, neu ychwanegwch gofnodion newydd os oes angen.
  da: Sæt kryds i alle relevante felter, eller tilføj nye poster, hvis det er nødvendigt.
  de: Markieren Sie alle zutreffenden Checkboxen oder fügen Sie bei Bedarf neue hinzu.
  el: Επιλέξτε όλα τα πλαίσια που ισχύουν ή προσθέστε νέες καταχωρίσεις εάν απαιτείται.
  en: Tick all the boxes that are applicable, or add new entries if requiried.
  es: Marque todas las casillas aplicables o añada nuevas entradas si es necesario.
  et: Märkige kõik kohaldatavad ruudud või lisage vajadusel uued kirjed.
  fi: Valitse kaikki soveltuvat ruudut tai lisää uusia merkintöjä tarvittaessa.
  fr: Cochez toutes les cases applicables ou ajoutez de nouvelles entrées si nécessaire.
  ga: Cuir tic i ngach bosca atá infheidhme, nó cuir iontrálacha nua leis más gá.
  he: סמן את כל התיבות הרלוונטיות, או הוסף רשומות חדשות במידת הצורך.
  hr: Označite sve primjenjive okvire ili dodajte nove unose ako je potrebno.
  hu: Jelölje be az összes vonatkozó négyzetet, vagy adjon hozzá új bejegyzéseket, ha szükséges.
  is: Merktu við alla reiti sem eiga við, eða bættu við nýjum færslum ef þörf krefur.
  it: Spunta tutte le caselle applicabili o aggiungi nuove voci se necessario.
  lt: Pažymėkite visus taikytinus langelius arba pridėkite naujų įrašų, jei reikia.
  lv: Atzīmējiet visas piemērojamās rūtiņas vai pievienojiet jaunus ierakstus, ja nepieciešams.
  mt: Immarka l-kaxxi kollha applikabbli, jew żid entrati ġodda jekk meħtieġ.
  nl: Vink alle toepasselijke vakjes aan of voeg nieuwe vermeldingen toe indien nodig.
  nl_BE: Vink alle toepasselijke vakjes aan, of voeg nieuwe items toe indien nodig.
  nl_be: Vink alle toepasselijke vakjes aan, of voeg nieuwe items toe indien nodig.
  'no': Kryss av alle aktuelle bokser, eller legg til nye oppføringer om nødvendig.
  pl: Zaznacz wszystkie odpowiednie pola lub dodaj nowe wpisy, jeśli jest to wymagane.
  pt: Marque todas as caixas aplicáveis ou adicione novas entradas se necessário.
  ro: Bifați toate căsuțele aplicabile sau adăugați intrări noi dacă este necesar.
  ru: Отметьте все применимые поля или добавьте новые записи, если необходимо.
  sk: Zaškrtnite všetky príslušné políčka alebo pridajte nové záznamy, ak je to potrebné.
  sl: Označite vsa ustrezna polja ali dodajte nove vnose, če je potrebno.
  sq: Kontrolloni të gjitha kutitë e zbatueshme, ose shtoni hyrje të reja nëse kërkohet.
  sr: Označite sve primenljive opcije ili dodajte nove unose ako je potrebno.
  sv: Kryssa i alla tillämpliga rutor eller lägg till nya poster om det behövs.
  uk: Позначте всі відповідні пункти або додайте нові записи, якщо потрібно.
label_select_measure:
