label_add_existing_measures:
  bg: Изберете или добавете мерки, които вече са въведени.
  ca: Seleccioneu o afegiu mesures <strong>ja implementades</strong>.
  cs: Vyberte nebo přidejte opatření, která jsou již zavedena.
  cy: Ychwanegwch unrhyw fesurau sydd <strong>eisoes wedi'u gweithredu</strong>.
  da: Tilføj eventuelle foranstaltninger, der allerede er <strong>implementeret</strong>.
  de: Wählen Sie alle <strong>bereits bestehenden</strong> Schutzmaßnahmen aus oder fügen Sie bei Bedarf neue hinzu.
  el: Επιλέξτε ή προσθέστε τυχόν μέτρα που εφαρμόζονται ήδη.
  en: Add any measures that are <strong>already implemented</strong>.
  es: Seleccione o añada cualquier medida <strong>que ya esté vigente</strong>.
  et: Lisage kõik meetmed, mis on <strong>juba rakendatud</strong>.
  fi: Valitse tai lisää jo käytössä olevat toimenpiteet.
  fr: Sélectionner ou ajouter les mesures <strong>déjà en place</strong>.
  ga: Cuir leis aon bhearta atá <strong>curtha i bhfeidhm cheana féin</strong>.
  he: הוסף כל אמצעים ש<strong>כבר יושמו</strong>.
  hr: Odaberite ili dodajte sve mjere koje su već uvedene.
  hu: Válasszon ki vagy adjon hozzá intézkedéseket, melyek <strong> már bevezetésre kerültek </strong>.
  is: Bættu við ráðstöfunum sem eru <strong>þegar innleiddar</strong>.
  it: Per la gestione adeguata del rischio è necessario aver attuato almeno tutte le misure obbligatorie. <strong>Seleziona o aggiungi tutte le misure attuate.</strong>
  lt: Pasirinkti arba pridėti jau įdiegtas priemones.
  lv: Atlasīt vai pievienot pasākumus, kas jau tiek īstenoti.
  mt: Agħżel jew żid kwalunkwe miżura diġà fis-seħħ.
  nl: Voeg maatregelen toe die al van kracht zijn.
  nl_BE: Voeg maatregelen toe die al van kracht zijn.
  nl_be: Voeg maatregelen toe die <strong>al geïmplementeerd</strong> zijn.
  'no': Legg til tiltak som <strong>allerede er iverksatt</strong>.
  pl: Dodaj wszelkie środki, które są <strong>już wdrożone</strong>.
  pt: Selecione ou adicione medidas já em vigor.
  ro: Adăugați orice măsuri care sunt <strong>deja implementate</strong>.
  ru: Добавьте меры, которые <strong>уже реализованы</strong>.
  sk: Pridajte opatrenia, ktoré sú <strong>už implementované</strong>.
  sl: Izberi ali dodaj ukrepe, ki so že vzpostavljeni.
  sq: Shtoni çdo masë që është <strong>tashmë e zbatuar</strong>.
  sr: Dodajte mere koje su <strong>već implementirane</strong>.
  sv: Lägg till åtgärder som <strong>redan är genomförda</strong>.
  uk: Додайте будь-які заходи, які <strong>вже впроваджені</strong>.
