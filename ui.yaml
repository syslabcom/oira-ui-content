message_email_invite_user_body:
  en: I hereby invite you to join our organisation on OiRA. Once you’ve accepted your
    membership, we can collaborate on risk assessments. \n\n Please log in or register
    via the link below and accept your membership. This link will stay valid for 5
    days.
  bg: С настоящото ви каня да се присъедините към нашата организация в OiRA. След
    като приемете членството си, можем да си сътрудничим при оценките на риска. \n\n
    Моля, влезте в профила си или се регистрирайте чрез връзката по-долу и приемете
    членството си. Тази връзка ще остане валидна 5 дни.
  ca: Per la present, us convido a unir-vos a la nostra organització a OiRA. Un cop
    hàgiu acceptat la vostra adhesió, podrem col·laborar en les avaluacions de riscos.
    \n\n Si us plau, inicieu sessió o registreu-vos mitjançant l'enllaç a continuació
    i accepteu la vostra adhesió. Aquest enllaç serà vàlid durant 5 dies.
  cs: Tímto vás zvu, abyste se připojili k naší organizaci na OiRA. Jakmile přijmete
    své členství, můžeme spolupracovat na hodnoceních rizik. \n\n Přihlaste se nebo
    se zaregistrujte prostřednictvím odkazu níže a přijměte své členství. Tento odkaz
    bude platný po dobu 5 dnů.
  cy: Rwy'n eich gwahodd i ymuno â'n sefydliad ar OiRA. Unwaith i chi dderbyn eich
    aelodaeth, gallwn gydweithio ar aseisadau risg. \n\n Mewngofnodwch neu cofrestrwch
    drwy'r ddolen isod a derbyniwch eich aelodaeth. Bydd y ddolen hon yn ddilys am
    5 diwrnod.
  da: Hermed inviterer jeg dig til at tilslutte dig vores organisation på OiRA. Når
    du har accepteret dit medlemskab, kan vi samarbejde om risikovurderinger. \n\n
    Log ind eller registrer dig via linket nedenfor og accepter dit medlemskab. Dette
    link forbliver gyldigt i 5 dage.
  de: Hiermit lade ich Sie ein, unserer Organisation auf OiRA beizutreten. Sobald
    Sie Ihre Mitgliedschaft akzeptiert haben, können wir gemeinsam an Risikobewertungen
    arbeiten. \n\n Bitte melden Sie sich über den untenstehenden Link an oder registrieren
    Sie sich und akzeptieren Sie Ihre Mitgliedschaft. Dieser Link ist 5 Tage lang
    gültig.
  el: Με το παρόν σας προσκαλώ να εγγραφείτε στον οργανισμό μας στο OiRA. Μόλις αποδεχτείτε
    τη συμμετοχή σας, μπορούμε να συνεργαστούμε σε εκτιμήσεις κινδύνου. \n\n Παρακαλούμε
    συνδεθείτε ή εγγραφείτε μέσω του παρακάτω συνδέσμου και αποδεχτείτε τη συμμετοχή
    σας. Αυτός ο σύνδεσμος θα παραμείνει έγκυρος για 5 ημέρες.
  es: Por medio de la presente le invito a unirse a nuestra organización en OiRA.
    Una vez que haya aceptado su membresía, podremos colaborar en evaluaciones de
    riesgos. \n\n Por favor, inicie sesión o regístrese a través del enlace a continuación
    y acepte su membresía. Este enlace permanecerá válido durante 5 días.
  et: Kutsun teid käesolevaga liituma meie organisatsiooniga OiRA-s. Kui olete oma
    liikmesuse aktsepteerinud, saame koostöös riskihindamisi teha. \n\n Palun logige
    sisse või registreeruge alloleva lingi kaudu ja aktsepteerige oma liikmesus. See
    link on kehtiv 5 päeva.
  fi: Kutsun teidät täten liittymään organisaatioomme OiRA:ssa. Kun olette hyväksynyt
    jäsenyytenne, voimme tehdä yhteistyötä riskiarvioinneissa. \n\n Ole hyvä ja kirjaudu
    sisään tai rekisteröidy alla olevan linkin kautta ja hyväksy jäsenyytesi. Tämä
    linkki pysyy voimassa 5 päivää.
  fr: Je vous invite par la présente à rejoindre notre organisation sur OiRA. Une
    fois votre adhésion acceptée, nous pourrons collaborer sur les évaluations des
    risques. \n\n Veuillez vous connecter ou vous inscrire via le lien ci-dessous
    et accepter votre adhésion. Ce lien restera valide pendant 5 jours.
  ga: Tugaim cuireadh duit anseo ár n-eagraíocht ar OiRA a nascadh. Nuair a bheidh
    do bhallraíocht glactha agat, is féidir linn comhoibriú ar mheasúnuithe riosca.
    \n\n Logáil isteach nó cláraigh trí an nasc thíos agus glac le do bhallraíocht.
    Fanfaidh an nasc seo bailí ar feadh 5 lá.
  he: בזאת אני מזמין אותך להצטרף לארגון שלנו ב-OiRA. לאחר שתקבל את חברותך, נוכל לשתף
    פעולה בהערכות סיכון. \n\n אנא התחבר או הירשם דרך הקישור למטה וקבל את חברותך. קישור
    זה יישאר תקף למשך 5 ימים.
  hr: Ovime Vas pozivam da se pridružite našoj organizaciji na OiRA-i. Kada prihvatite
    članstvo, možemo surađivati na procjenama rizika. \n\n Molimo prijavite se ili
    se registrirajte putem donje poveznice i prihvatite članstvo. Ova veza ostaje
    valjana 5 dana.
  hu: Ezúton meghívom Önt, hogy csatlakozzon szervezetünkhöz az OiRA-n. Miután elfogadta
    tagságát, együttműködhetünk a kockázatértékeléseken. \n\n Kérjük, jelentkezzen
    be vagy regisztráljon az alábbi linken keresztül, és fogadja el tagságát. Ez a
    link 5 napig marad érvényes.
  is: Hér með býð ég þér að ganga í fyrirtækið okkar á OiRA. Þegar þú hefur samþykkt
    aðild þína getum við unnið saman að áhættumatsskrám. \n\n Vinsamlegast skráðu
    þig inn eða skráðu þig í gegnum tengilinn hér að neðan og samþykktu aðild þína.
    Þessi tengill verður gildur í 5 daga.
  it: Con la presente ti invito a unirti alla nostra organizzazione su OiRA. Una volta
    accettata la tua iscrizione, potremo collaborare sulle valutazioni dei rischi.
    \n\n Accedi o registrati tramite il link sottostante e accetta la tua iscrizione.
    Questo link rimarrà valido per 5 giorni.
  lt: Šiuo metu kviečiu jus prisijungti prie mūsų organizacijos OiRA. Kai priimsite
    narystę, galėsime bendradarbiauti rengiant rizikos vertinimus. \n\n Prisijunkite
    arba užsiregistruokite naudodami žemiau esančią nuorodą ir priimkite narystę.
    Ši nuoroda bus galiojanti 5 dienas.
  lv: Ar šo es ielūdzu jūs pievienoties mūsu organizācijai OiRA. Kad būsiet akceptējuši
    dalību, mēs varēsim sadarboties riska novērtējumos. \n\n Lūdzu, piesakieties vai
    reģistrējieties, izmantojot zemāk esošo saiti, un akceptējiet savu dalību. Šī
    saite būs derīga 5 dienas.
  mt: B'dan il-mod qed nistiednek tingħaqad mal-organizzazzjoni tagħna fuq OiRA. Ladarba
    taċċetta l-parteċipazzjoni tiegħek, nistgħu nikkolaboraw fuq il-valutazzjonijiet
    tar-riskju. \n\n Jekk jogħġbok idħol jew irreġistra permezz tal-link hawn taħt
    u aċċetta l-parteċipazzjoni tiegħek. Dan il-link jibqa' validu għal 5 ijiem.
  nl: Hierbij nodig ik u uit om lid te worden van onze organisatie op OiRA. Zodra
    u uw lidmaatschap heeft geaccepteerd, kunnen we samenwerken aan risicobeoordelingen.
    \n\n Meld u aan of registreer u via de onderstaande link en accepteer uw lidmaatschap.
    Deze link blijft 5 dagen geldig.
  nl_BE: Hierbij nodig ik u uit om lid te worden van onze organisatie op OiRA. Zodra
    u uw lidmaatschap heeft geaccepteerd, kunnen we samenwerken aan risicobeoordelingen.
    \n\n Meld u aan of registreer u via de onderstaande link en accepteer uw lidmaatschap.
    Deze link blijft 5 dagen geldig.
  nl_be: Hierbij nodig ik u uit om lid te worden van onze organisatie op OiRA. Zodra
    u uw lidmaatschap heeft geaccepteerd, kunnen we samenwerken aan risicobeoordelingen.
    \n\n Meld u aan of registreer u via de onderstaande link en accepteer uw lidmaatschap.
    Deze link blijft 5 dagen geldig.
  'no': Jeg inviterer deg herved til å bli med i vår organisasjon på OiRA. Når du
    har akseptert medlemskapet ditt, kan vi samarbeide om risikovurderinger. \n\n
    Vennligst logg inn eller registrer deg via lenken nedenfor og aksepter medlemskapet
    ditt. Denne lenken vil være gyldig i 5 dager.
  pl: Niniejszym zapraszam Cię do dołączenia do naszej organizacji na OiRA. Po zaakceptowaniu
    członkostwa będziemy mogli wspólnie pracować nad ocenami ryzyka. \n\n Proszę zalogować
    się lub zarejestrować za pomocą poniższego linku i zaakceptować członkostwo. Ten
    link będzie ważny przez 5 dni.
  pt: Convido-o(a) a juntar-se à nossa organização no OiRA. Assim que aceitar a sua
    adesão, poderemos colaborar nas avaliações de risco. \n\n Por favor, inicie sessão
    ou registe-se através do link abaixo e aceite a sua adesão. Este link permanecerá
    válido durante 5 dias.
  ro: Prin prezenta vă invit să vă alăturați organizației noastre pe OiRA. Odată ce
    ați acceptat calitatea de membru, putem colabora la evaluările de risc. \n\n Vă
    rugăm să vă conectați sau să vă înregistrați prin linkul de mai jos și să acceptați
    calitatea de membru. Acest link va rămâne valabil timp de 5 zile.
  ru: Настоящим приглашаю вас присоединиться к нашей организации на OiRA. После того
    как вы примете членство, мы сможем совместно работать над оценками рисков. \n\n
    Пожалуйста, войдите или зарегистрируйтесь по ссылке ниже и примите членство. Эта
    ссылка будет действительна в течение 5 дней.
  sk: Týmto vás pozývam, aby ste sa pripojili k našej organizácii na OiRA. Po prijatí
    členstva môžeme spolupracovať na hodnoteniach rizík. \n\n Prihláste sa alebo zaregistrujte
    sa pomocou odkazu nižšie a prijmite svoje členstvo. Tento odkaz bude platný 5
    dní.
  sl: Vabim vas, da se pridružite naši organizaciji na OiRA. Ko boste sprejeli članstvo,
    bomo lahko skupaj delali na ocenah tveganj. \n\n Prijavite se ali se registrirajte
    prek spodnje povezave in sprejmite svoje članstvo. Ta povezava bo veljavna 5 dni.
  sq: Me anë të kësaj ju ftoj të bashkoheni me organizatën tonë në OiRA. Pasi të keni
    pranuar anëtarësimin tuaj, mund të bashkëpunojmë për vlerësimet e riskut. \n\n
    Ju lutem identifikohuni ose regjistrohuni përmes lidhjes më poshtë dhe pranoni
    anëtarësimin tuaj. Kjo lidhje do të mbetet e vlefshme për 5 ditë.
  sr: Ovim putem vas pozivam da se pridružite našoj organizaciji na OiRA. Kada prihvatite
    svoje članstvo, možemo sarađivati na procenama rizika. \n\n Molimo vas da se prijavite
    ili registrujete putem linka ispod i prihvatite svoje članstvo. Ovaj link će ostati
    važeći 5 dana.
  sv: Härmed bjuder jag in dig att gå med i vår organisation på OiRA. När du har accepterat
    ditt medlemskap kan vi samarbeta om riskbedömningar. \n\n Vänligen logga in eller
    registrera dig via länken nedan och acceptera ditt medlemskap. Denna länk är giltig
    i 5 dagar.
  uk: Цим запрошую вас приєднатися до нашої організації на OiRA. Після того, як ви
    приймете своє членство, ми зможемо співпрацювати над оцінками ризиків. \n\n Будь
    ласка, увійдіть або зареєструйтеся за посиланням нижче та прийміть своє членство.
    Це посилання залишатиметься дійсним протягом 5 днів.
message_invite_user:
  en: When you click ‘Invite by e-mail’, your e-mail client will open with a new e-mail
    with a link in it that people can use to join your organisation. The link is valid
    for five days and you may send it to as many people as you would like to join
    your organisation.
  nl: Als je op ‘Uitnodigen per e-mail’ klikt, opent je e-mailclient met een nieuwe
    e-mail met daarin een link waarmee mensen lid kunnen worden van je organisatie.
    De link is vijf dagen geldig en u kunt hem naar zoveel mensen sturen als u wilt
    om lid te worden van uw organisatie.
  fr: Lorsque vous cliquez sur "Inviter par e-mail", votre client de messagerie s'ouvre
    avec un nouvel e-mail contenant un lien que les personnes peuvent utiliser pour
    rejoindre votre organisation. Le lien est valable cinq jours et vous pouvez l'envoyer
    à autant de personnes que vous souhaitez rejoindre votre organisation.
  de: Wenn Sie auf „Einladen per E-Mail“ klicken, öffnet sich Ihr E-Mail-Client mit
    einer neuen E-Mail mit einem darin enthaltenen Link, über den Personen Ihrer Organisation
    beitreten können. Der Link ist fünf Tage lang gültig und Sie können ihn an so
    viele Personen senden, wie Sie Ihrer Organisation beitreten möchten.
  bg: Когато щракнете върху 'Покани по имейл', вашият имейл клиент ще се отвори с
    нов имейл с връзка, която хората могат да използват, за да се присъединят към
    вашата организация. Връзката е валидна пет дни и можете да я изпратите на толкова
    хора, колкото желаете да се присъединят към вашата организация.
  ca: Quan feu clic a 'Convidar per correu electrònic', el vostre client de correu
    electrònic s'obrirà amb un nou correu electrònic que conté un enllaç que la gent
    pot utilitzar per unir-se a la vostra organització. L'enllaç és vàlid durant cinc
    dies i podeu enviar-lo a tantes persones com vulgueu que s'uneixin a la vostra
    organització.
  cs: Když kliknete na 'Pozvat e-mailem', váš e-mailový klient se otevře s novým e-mailem
    obsahujícím odkaz, který mohou lidé použít k připojení k vaší organizaci. Odkaz
    je platný pět dní a můžete jej poslat tolika lidem, kolik chcete, aby se připojilo
    k vaší organizaci.
  cy: Pan gliciwch ar 'Gwahodd trwy e-bost', bydd eich cleient e-bost yn agor gydag
    e-bost newydd sy'n cynnwys dolen y gall pobl ei defnyddio i ymuno â'ch sefydliad.
    Mae'r ddolen yn ddilys am bum diwrnod a gallwch ei hanfon at gynifer o bobl ag
    y dymunwch ymuno â'ch sefydliad.
  da: Når du klikker på 'Inviter via e-mail', åbner din e-mail-klient med en ny e-mail
    med et link, som folk kan bruge til at tilmelde sig din organisation. Linket er
    gyldigt i fem dage, og du kan sende det til så mange personer, du ønsker skal
    tilmelde sig din organisation.
  el: Όταν κάνετε κλικ στο 'Πρόσκληση μέσω e-mail', ο πελάτης e-mail σας θα ανοίξει
    με ένα νέο e-mail που περιέχει έναν σύνδεσμο τον οποίο οι άνθρωποι μπορούν να
    χρησιμοποιήσουν για να εγγραφούν στον οργανισμό σας. Ο σύνδεσμος ισχύει για πέντε
    ημέρες και μπορείτε να τον στείλετε σε όσους ανθρώπους θέλετε να εγγραφούν στον
    οργανισμό σας.
  es: Cuando haga clic en 'Invitar por correo electrónico', su cliente de correo electrónico
    se abrirá con un nuevo correo electrónico que contiene un enlace que las personas
    pueden usar para unirse a su organización. El enlace es válido por cinco días
    y puede enviarlo a tantas personas como desee que se unan a su organización.
  et: Kui klõpsate 'Kutsu e-postiga', avab teie e-posti klient uue e-kirja lingiga,
    mida inimesed saavad kasutada teie organisatsiooniga liitumiseks. Link kehtib
    viis päeva ja võite selle saata nii paljudele inimestele kui soovite teie organisatsiooniga
    liituda.
  fi: Kun napsautat 'Kutsu sähköpostitse', sähköpostiohjelmasi avautuu uudella sähköpostiviestillä,
    jossa on linkki, jota ihmiset voivat käyttää liittyäkseen organisaatioosi. Linkki
    on voimassa viisi päivää ja voit lähettää sen niin monelle henkilölle kuin haluat
    liittyvän organisaatioosi.
  ga: Nuair a chliceálann tú 'Cuir cuireadh trí ríomhphost', osclóidh do chliant ríomhphoist
    ríomhphost nua le nasc ann is féidir le daoine a úsáid chun páirt a ghlacadh i
    d'eagraíocht. Tá an nasc bailí ar feadh cúig lá agus féadfaidh tú é a sheoladh
    chuig an oiread daoine agus is mian leat a bheith páirteach in d'eagraíocht.
  he: כאשר תלחץ על 'הזמן בדוא"ל', לקוח הדוא"ל שלך ייפתח עם הודעה חדשה עם קישור שאנשים
    יכולים להשתמש בו כדי להצטרף לארגון שלך. הקישור תקף לחמישה ימים ותוכל לשלוח אותו
    לכמה אנשים שתרצה שיצטרפו לארגונך.
  hr: Kada kliknete 'Pozovi e-poštom', vaš klijent e-pošte otvorit će se s novom e-poštom
    s vezom koju ljudi mogu koristiti za pridruživanje vašoj organizaciji. Veza vrijedi
    pet dana i možete je poslati onoliko ljudi koliko želite da se pridruže vašoj
    organizaciji.
  hu: Amikor az 'E-mailben meghív' gombra kattint, az e-mail kliense megnyílik egy
    új e-maillel, amely tartalmaz egy linket, amelyet az emberek felhasználhatnak
    a szervezetéhez való csatlakozáshoz. A link öt napig érvényes, és elküldheti annyi
    embernek, amennyit szeretne, hogy csatlakozzanak a szervezetéhez.
  is: Þegar þú smellir á 'Bjóða með tölvupósti' mun tölvupóstforritið þitt opnast
    með nýjum tölvupósti með tengli sem fólk getur notað til að ganga í samtökin þín.
    Tengillinn er gildur í fimm daga og þú getur sent hann til eins margra og þú vilt
    ganga í samtökin þín.
  it: Quando fai clic su 'Invita tramite e-mail', il tuo client di posta elettronica
    si aprirà con una nuova e-mail contenente un link che le persone possono usare
    per unirsi alla tua organizzazione. Il link è valido per cinque giorni e puoi
    inviarlo a quante persone desideri che si uniscano alla tua organizzazione.
  lt: Kai spustelėsite „Pakviesti el. paštu
  mt: Meta tikklikkja fuq 'Stieden bl-e-mail', il-klijent tal-e-mail tiegħek jinfetaħ
    b'e-mail ġdid b'link fih li n-nies jistgħu jużaw biex jingħaqdu mal-organizzazzjoni
    tiegħek. Il-link huwa validu għal ħamest ijiem u tista' tibgħatu lil kemm-il persuna
    tixtieq li tingħaqad mal-organizzazzjoni tiegħek.
  nl_BE: Wanneer u op 'Uitnodigen per e-mail' klikt, wordt uw e-mailclient geopend
    met een nieuw e-mailbericht met een link waarmee mensen lid kunnen worden van
    uw organisatie. De link is vijf dagen geldig en u kunt hem naar zoveel mensen
    sturen als u wilt dat zij lid worden van uw organisatie.
  nl_be: Wanneer u op 'Uitnodigen per e-mail' klikt, wordt uw e-mailclient geopend
    met een nieuw e-mailbericht met een link waarmee mensen lid kunnen worden van
    uw organisatie. De link is vijf dagen geldig en u kunt hem naar zoveel mensen
    sturen als u wilt dat zij lid worden van uw organisatie.
  'no': Når du klikker på 'Inviter via e-post', åpnes e-postklienten din med en ny
    e-post med en lenke som folk kan bruke til å bli med i organisasjonen din. Lenken
    er gyldig i fem dager, og du kan sende den til så mange du vil ha med i organisasjonen
    din.
  pl: Po kliknięciu przycisku 'Zaproś e-mailem' otworzy się klient poczty e-mail z
    nową wiadomością zawierającą link, który można wykorzystać do dołączenia do Twojej
    organizacji. Link jest ważny przez pięć dni i możesz go wysłać do tylu osób, ile
    chcesz zaprosić do swojej organizacji.
  pt: Quando clicar em 'Convidar por e-mail', o seu cliente de e-mail abrirá com um
    novo e-mail com um link que as pessoas podem usar para aderir à sua organização.
    O link é válido por cinco dias e pode enviá-lo a tantas pessoas quantas desejar
    que se juntem à sua organização.
  ro: Când faceți clic pe 'Invitați prin e-mail', clientul dvs. de e-mail se va deschide
    cu un e-mail nou care conține un link pe care oamenii îl pot folosi pentru a se
    alătura organizației dvs. Linkul este valabil timp de cinci zile și îl puteți
    trimite oricâtor persoane doriți să se alăture organizației dvs.
  ru: Когда вы нажмёте «Пригласить по электронной почте», откроется ваш почтовый клиент
    с новым письмом, содержащим ссылку, которую люди могут использовать для вступления
    в вашу организацию. Ссылка действительна в течение пяти дней, и вы можете отправить
    её любому количеству людей, которых хотите пригласить в вашу организацию.
  sk: Keď kliknete na 'Pozvať e-mailom', váš e-mailový klient sa otvorí s novým e-mailom,
    ktorý obsahuje odkaz, ktorý môžu ľudia použiť na vstup do vašej organizácie. Odkaz
    je platný päť dní a môžete ho poslať toľkým ľuďom, koľkých chcete pozvať do vašej
    organizácie.
  sl: Ko kliknete 'Povabi po e-pošti', se bo vaš e-poštni odjemalec odprl z novim
    e-poštnim sporočilom s povezavo, ki jo lahko ljudje uporabijo za pridružitev vaši
    organizaciji. Povezava je veljavna pet dni in jo lahko pošljete toliko ljudem,
    kolikor jih želite povabiti v svojo organizacijo.
  sq: Kur klikoni 'Fto me e-mail', klienti juaj i e-mailit do të hapet me një e-mail
    të ri me një lidhje që njerëzit mund ta përdorin për t'u bashkuar me organizatën
    tuaj. Lidhja është e vlefshme për pesë ditë dhe mund ta dërgoni tek aq shumë njerëz
    sa dëshironi të bashkohen me organizatën tuaj.
  sr: Kada kliknete na 'Pozovi e-mailom', vaš e-mail klijent će se otvoriti sa novom
    porukom koja sadrži link koji ljudi mogu koristiti za pridruživanje vašoj organizaciji.
    Link je važeći pet dana i možete ga poslati koliko god ljudi želite da se pridruže
    vašoj organizaciji.
  sv: När du klickar på 'Bjud in via e-post' öppnas din e-postklient med ett nytt
    e-postmeddelande med en länk som folk kan använda för att gå med i din organisation.
    Länken är giltig i fem dagar och du kan skicka den till så många personer du vill
    ska gå med i din organisation.
  uk: Коли ви натиснете «Запросити електронною поштою», ваш поштовий клієнт відкриється
    з новим листом, що містить посилання для вступу до вашої організації. Посилання
    дійсне протягом п'яти днів, і ви можете надіслати його стільком людям, скільки
    бажаєте.
  lv: Kad noklikšķināsiet uz 'Uzaicināt pa e-pastu', jūsu e-pasta klients atvērsies
    ar jaunu e-pastu, kurā būs saite, ko cilvēki var izmantot, lai pievienotos jūsu
    organizācijai. Saite ir derīga piecas dienas, un jūs varat to nosūtīt tik daudziem
    cilvēkiem, cik vēlaties, lai pievienotos jūsu organizācijai.
