message_possible_extra_cost:
  bg: Вашият консултант може да начисли допълнителни разходи.
  ca: El vostre consultor pot cobrar costos addicionals.
  cs: Váš konzultant může účtovat dodatečné náklady.
  cy: Efallai y bydd eich ymgynghorydd yn codi costau ychwanegol.
  da: Din konsulent kan opkræve yderligere omkostninger.
  de: Zusätzliche Kosten können von Ihrem Berater in Rechnung gestellt werden.
  el: Πρόσθετο κόστος ενδέχεται να χρεωθεί από τον σύμβουλό σας.
  en: Additional costs may be charged by your consultant.
  es: Su consultor puede cobrar costos adicionales.
  et: Teie konsultant võib küsida lisatasusid.
  fi: Konsulttisi saattaa veloittaa lisäkustannuksia.
  fr: Des frais supplémentaires peuvent être facturés par votre consultant.
  ga: D'fhéadfadh costais bhreise a ghearradh ag do chomhairleoir.
  he: ייתכן שהיועץ שלך יחייב עלויות נוספות.
  hr: Vaš konzultant može naplatiti dodatne troškove.
  hu: A tanácsadója további díjakat számíthat fel.
  is: Ráðgjafi þinn gæti innheimt viðbótarkostnað.
  it: Il tuo consulente potrebbe addebitare costi aggiuntivi.
  lt: Jūsų konsultantas gali taikyti papildomus mokesčius.
  lv: Jūsu konsultants var piemērot papildu izmaksas.
  mt: Il-konsultant tiegħek jista' jimputa spejjeż addizzjonali.
  nl: Er kunnen extra kosten in rekening gebracht worden door uw adviseur.
  nl_BE: Uw consultant kan extra kosten in rekening brengen.
  nl_be: Uw consultant kan extra kosten in rekening brengen.
  'no': Ytterligere kostnader kan bli belastet av din konsulent.
  pl: Twój konsultant może naliczyć dodatkowe opłaty.
  pt: O seu consultor pode cobrar custos adicionais.
  ro: Consultantul dvs. poate percepe costuri suplimentare.
  ru: Ваш консультант может взимать дополнительную плату.
  sk: Váš konzultant môže účtovať dodatočné náklady.
  sl: Vaš svetovalec lahko zaračuna dodatne stroške.
  sq: Konsulenti juaj mund të ngarkojë kosto shtesë.
  sr: Vaš konsultant može naplatiti dodatne troškove.
  sv: Din konsult kan debitera ytterligare kostnader.
  uk: Ваш консультант може стягнути додаткову плату.
message_read_and_reviewd_assessment_and_approve:
  bg: Прочетох, прегледах и където е необходимо коригирах или подобрих тази оценка на риска и одобрявам нейното съдържание.
  ca: He llegit i revisat i on ha estat necessari he corregit o millorat aquesta avaluació de riscos i n'aprovo el contingut.
  cs: Přečetl/a jsem si toto hodnocení rizik, zkontroloval/a jsem ho a tam, kde bylo nutné, jsem ho opravil/a nebo vylepšil/a, a souhlasím s jeho obsahem.
  cy: Rwyf wedi darllen ac adolygu ac yn ôl yr angen wedi cywiro neu wella'r asesiad risg hwn ac rwy'n cymeradwyo ei gynnwys.
  da: Jeg har læst og gennemgået og om nødvendigt korrigeret eller forbedret denne risikovurdering, og jeg godkender dens indhold.
  de: Ich habe diese Risikobeurteilung gelesen und überprüft und gegebenenfalls korrigiert oder ergänzt und stimme ihrem Inhalt zu.
  el: Έχω διαβάσει και αναθεωρήσει και όπου κρίθηκε απαραίτητο διόρθωσα ή βελτίωσα αυτή την εκτίμηση κινδύνου και εγκρίνω το περιεχόμενό της.
  en: I have read and reviewed and where necessary corrected or enhanced this risk assessment and I approve of its contents.
  es: He leído y revisado y, cuando ha sido necesario, corregido o mejorado esta evaluación de riesgos, y apruebo su contenido.
  et: Olen selle riskihinnangu läbi lugenud ja üle vaadanud ning vajadusel parandanud või täiendanud ning kinnitan selle sisu.
  fi: Olen lukenut ja tarkistanut tämän riskiarvioinnin ja tarvittaessa korjannut tai täydentänyt sitä, ja hyväksyn sen sisällön.
  fr: J'ai lu et revu et si nécessaire corrigé ou amélioré cette évaluation des risques et j'approuve son contenu.
  ga: Tá an measúnú riosca seo léite agus athbhreithnithe agam agus, nuair ba ghá, ceartaithe nó feabhsaithe agam, agus aontaím lena ábhar.
  he: קראתי ובדקתי ובמידת הצורך תיקנתי או שיפרתי הערכת סיכון זו ואני מאשר את תוכנה.
  hr: Pročitao/la sam i pregledao/la te gdje je potrebno ispravio/la ili poboljšao/la ovu procjenu rizika i odobravam njezin sadržaj.
  hu: Elolvastam és átnéztem, és szükség esetén javítottam vagy kiegészítettem ezt a kockázatértékelést, és jóváhagyom annak tartalmát.
  is: Ég hef lesið og farið yfir og þar sem þörf krefur leiðrétt eða bætt þetta áhættumat og samþykki innihald þess.
  it: Ho letto e revisionato e dove necessario corretto o migliorato questa valutazione dei rischi e ne approvo il contenuto.
  lt: Perskaičiau ir peržiūrėjau šį rizikos vertinimą, o kur reikėjo – pataisiau arba patobulinau, ir pritariu jo turiniui.
  lv: Esmu izlasījis un pārskatījis šo riska novērtējumu un, kur nepieciešams, to labojis vai uzlabojis, un apstiprinu tā saturu.
  mt: Qrajt u rrevidjajt u fejn meħtieġ kkoreġejt jew tejjabt din il-valutazzjoni tar-riskju u naqbel mal-kontenut tagħha.
  nl: Ik heb deze risicobeoordeling gelezen en beoordeeld en waar nodig gecorrigeerd of verbeterd en ik keur de inhoud ervan goed.
  nl_BE: Ik heb deze risicobeoordeling gelezen en beoordeeld en waar nodig gecorrigeerd of verbeterd, en ik keur de inhoud ervan goed.
  nl_be: Ik heb deze risicobeoordeling gelezen en beoordeeld en waar nodig gecorrigeerd of verbeterd, en ik keur de inhoud ervan goed.
  'no': Jeg har lest og gjennomgått, og der det var nødvendig korrigert eller forbedret denne risikovurderingen, og jeg godkjenner innholdet.
  pl: Przeczytałem(-am) i przejrzałem(-am), a tam gdzie było to konieczne, poprawiłem(-am) lub uzupełniłem(-am) tę ocenę ryzyka i zatwierdzam jej treść.
  pt: Li e revisei e, onde necessário, corrigi ou aprimorei esta avaliação de risco e aprovo seu conteúdo.
  ro: Am citit și revizuit și, acolo unde a fost necesar, am corectat sau îmbunătățit această evaluare a riscurilor și aprob conținutul acesteia.
  ru: Я прочитал(а) и проверил(а) данную оценку рисков, при необходимости исправил(а) или дополнил(а) её и одобряю её содержание.
  sk: Prečítal(a) som a preskúmal(a) a kde bolo potrebné, opravil(a) alebo vylepšil(a) toto hodnotenie rizík a schvaľujem jeho obsah.
  sl: Prebral/a sem in pregledal/a to oceno tveganja ter jo po potrebi popravil/a ali izboljšal/a in odobrim njeno vsebino.
  sq: Kam lexuar dhe shqyrtuar dhe ku ka qenë e nevojshme korrigjuar ose përmirësuar këtë vlerësim të rreziqeve dhe miratoj përmbajtjen e tij.
  sr: Pročitao/la sam i pregledao/la i, gde je bilo potrebno, ispravio/la ili poboljšao/la ovu procenu rizika i odobravam njen sadržaj.
  sv: Jag har läst och granskat och vid behov korrigerat eller förbättrat denna riskbedömning och jag godkänner dess innehåll.
  uk: Я прочитав та переглянув, а де необхідно — виправив або вдосконалив цю оцінку ризиків, і схвалюю її зміст.
message_register_onsite_inspection:
  bg: Регистрирайте проверка на място за тази оценка на риска.
  ca: Registreu una inspecció in situ per a aquesta avaluació de riscos.
  cs: Zaregistrujte kontrolu na místě pro toto hodnocení rizik.
  cy: Cofrestrwch archwiliad ar y safle ar gyfer yr asesiad risg hwn.
  da: Registrer en inspektion på stedet for denne risikovurdering.
  de: Einsatzbezogenen Gefährdungsbeurteilung für diese GBU eintragen.
  el: Καταχωρίστε μια επιτόπια επιθεώρηση για αυτή την εκτίμηση κινδύνου.
  en: Register an on-site inspection for this risk assessment.
  es: Registre una inspección in situ para esta evaluación de riesgos.
  et: Registreerige selle riskihinnangu kohapealne ülevaatus.
  fi: Rekisteröi tämän riskiarvioinnin paikan päällä tehtävä tarkastus.
  fr: Enregistrez une inspection sur site pour cette évaluation des risques.
  ga: Cláraigh cigireacht ar láthair don mheasúnú riosca seo.
  he: רשום בדיקה באתר עבור הערכת סיכון זו.
  hr: Registrirajte inspekciju na licu mjesta za ovu procjenu rizika.
  hu: Helyszíni ellenőrzés rögzítése ehhez a kockázatbecsléshez.
  is: Skráðu vettvangsskoðun fyrir þessa áhættumat.
  it: Registra un'ispezione in loco per questa valutazione del rischio.
  lt: Užregistruokite patikrinimą vietoje šiam rizikos vertinimui.
  lv: Reģistrēt klātienes pārbaudi šim riska novērtējumam.
  mt: Irreġistra spezzjoni fuq il-post għal din il-valutazzjoni tar-riskju.
  nl: Registreer een plaatselijke inspectie voor deze risicobeoordeling.
  nl_BE: Een plaatselijke inspectie registreren voor deze risicobeoordeling.
  nl_be: Een plaatselijke inspectie registreren voor deze risicobeoordeling.
  'no': Registrer en stedlig inspeksjon for denne risikovurderingen.
  pl: Zarejestruj inspekcję na miejscu dla tej oceny ryzyka.
  pt: Registar uma inspeção no local para esta avaliação de risco.
  ro: Înregistrați o inspecție la fața locului pentru această evaluare de risc.
  ru: Зарегистрировать проверку на месте для этой оценки рисков.
  sk: Zaregistrovať kontrolu na mieste pre toto hodnotenie rizík.
  sl: Registrirajte inšpekcijo na kraju samem za to oceno tveganja.
  sq: Regjistroni një inspektim në vend për këtë vlerësim rreziku.
  sr: Registrujte inspekciju na licu mesta za ovu procenu rizika.
  sv: Registrera en platskontroll för den här riskbedömningen.
  uk: Зареєструйте перевірку на місці для цієї оцінки ризику.
message_register_sample:
  bg: Регистрирайте вземане на проба за тази оценка на риска.
  ca: Registreu el mostreig d'aquesta avaluació de riscos.
  cs: Zaregistrujte vzorkování tohoto hodnocení rizik.
  cy: Cofrestrwch samplu'r asesiad risg hwn.
  da: Registrer stikprøvetagning af denne risikovurdering.
  de: Stichprobe für diese GBU eintragen
  el: Καταχωρίστε δειγματοληψία αυτής της εκτίμησης κινδύνου.
  en: Register sampling this risk assessment.
  es: Registre el muestreo de esta evaluación de riesgos.
  et: Registreerige selle riskihinnangu proovivõtmine.
  fi: Rekisteröi tämän riskiarvioinnin näytteenotto.
  fr: Enregistrez l'échantillonnage de cette évaluation des risques.
  ga: Cláraigh sampláil an mheasúnaithe riosca seo.
  he: רשום דגימה של הערכת סיכון זו.
  hr: Registrirajte uzorkovanje ove procjene rizika.
  hu: A kockázatbecslés mintavételének rögzítése.
  is: Skráðu sýnatöku á þessari áhættumat.
  it: Registra il campionamento di questa valutazione del rischio.
  lt: Užregistruokite šio rizikos vertinimo ėminį.
  lv: Reģistrēt šī riska novērtējuma paraugu ņemšanu.
  mt: Irreġistra l-kampjunar ta' din il-valutazzjoni tar-riskju.
  nl: Registreer de bemonstering van deze risicobeoordeling.
  nl_BE: Steekproef registreren voor deze risicobeoordeling.
  nl_be: Steekproef registreren voor deze risicobeoordeling.
  'no': Registrer prøvetaking for denne risikovurderingen.
  pl: Zarejestruj pobieranie próbek dla tej oceny ryzyka.
  pt: Registar amostragem desta avaliação de risco.
  ro: Înregistrați eșantionarea acestei evaluări de risc.
  ru: Зарегистрировать выборку этой оценки рисков.
  sk: Zaregistrovať vzorkovanie tohto hodnotenia rizík.
  sl: Registrirajte vzorčenje te ocene tveganja.
  sq: Regjistroni kampionimin e këtij vlerësimi rreziku.
  sr: Registrujte uzorkovanje ove procene rizika.
  sv: Registrera provtagning för den här riskbedömningen.
  uk: Зареєструйте відбір зразків для цієї оцінки ризику.
message_remove_document:
  bg: Предстои да премахнете този документ. Това действие е необратимо.
  ca: Esteu a punt d'eliminar aquest document. Aquesta acció és irreversible.
  cs: Chystáte se odebrat tento dokument. Tato akce je nevratná.
  cy: Rydych ar fin dileu'r ddogfen hon. Mae'r weithred hon yn anadferadwy.
  da: Du er ved at fjerne dette dokument. Denne handling er uigenkaldelig.
  de: Sie sind dabei, dieses Dokument zu löschen. Diese Aktion ist irreversibel.
  el: Πρόκειται να καταργήσετε αυτό το έγγραφο. Αυτή η ενέργεια είναι μη αναστρέψιμη.
  en: You are about to remove this document. This action is irreversable.
  es: Está a punto de eliminar este documento. Esta acción es irreversible.
  et: Olete selle dokumendi eemaldamas. See toiming on pöördumatu.
  fi: Olet poistamassa tämän asiakirjan. Tätä toimintoa ei voi peruuttaa.
  fr: Vous êtes sur le point de supprimer ce document. Cette action est irréversible.
  ga: Tá tú ar tí an doiciméad seo a bhaint. Ní féidir an gníomh seo a aisiompú.
  he: אתה עומד להסיר מסמך זה. פעולה זו אינה הפיכה.
  hr: Upravo ćete ukloniti ovaj dokument. Ova radnja je nepovratna.
  hu: Éppen eltávolítja ezt a dokumentumot. Ez a művelet visszafordíthatatlan.
  is: Þú ert að fara að fjarlægja þetta skjal. Þessi aðgerð er óafturkræf.
  it: Stai per rimuovere questo documento. Questa azione è irreversibile.
  lt: Jūs ketinate pašalinti šį dokumentą. Šio veiksmo negalima atšaukti.
  lv: Jūs gatavojaties noņemt šo dokumentu. Šī darbība ir neatgriezeniska.
  mt: Inti ser tneħħi dan id-dokument. Din l-azzjoni hija irreversibbli.
  nl: U staat op het punt dit document te verwijderen. Deze handeling is onomkeerbaar.
  nl_BE: U staat op het punt dit document te verwijderen. Deze actie kan niet ongedaan worden gemaakt.
  nl_be: U staat op het punt dit document te verwijderen. Deze actie kan niet ongedaan worden gemaakt.
  'no': Du er i ferd med å fjerne dette dokumentet. Denne handlingen kan ikke angres.
  pl: Zamierzasz usunąć ten dokument. Ta czynność jest nieodwracalna.
  pt: Está prestes a remover este documento. Esta ação é irreversível.
  ro: Urmează să eliminați acest document. Această acțiune este ireversibilă.
  ru: Вы собираетесь удалить этот документ. Это действие необратимо.
  sk: Chystáte sa odstrániť tento dokument. Táto akcia je nezvratná.
  sl: Pravkar boste odstranili ta dokument. To dejanje je nepopravljivo.
  sq: Jeni duke fshirë këtë dokument. Ky veprim është i pakthyeshëm.
  sr: Upravo ćete ukloniti ovaj dokument. Ova radnja je nepovrativa.
  sv: Du håller på att ta bort det här dokumentet. Denna åtgärd kan inte ångras.
  uk: Ви збираєтесь видалити цей документ. Ця дія є незворотною.
message_report_downloads_intro:
  bg: Запазете доклада на вашия компютър и го отпечатайте. Можете също да го промените или да добавите повече информация. Моля, имайте предвид, че промените, направени на вашия компютър, НЯМА да бъдат запазени в оценката на риска OiRA.
  ca: Deseu l'informe al vostre ordinador i imprimiu-lo. També podeu modificar-lo o afegir més informació. Tingueu en compte que els canvis fets al vostre ordinador NO es desaran a l'avaluació de riscos d'OiRA.
  cs: Uložte zprávu do svého počítače a vytiskněte ji. Můžete ji také upravit nebo přidat další informace. Vezměte prosím na vědomí, že změny provedené na vašem počítači NEBUDOU uloženy v hodnocení rizik OiRA.
  cy: Cadwch yr adroddiad ar eich cyfrifiadur a'i argraffu. Gallwch hefyd ei addasu neu ychwanegu mwy o wybodaeth. Sylwch na fydd newidiadau a wneir ar eich cyfrifiadur YN cael eu cadw yn asesiad risg OiRA.
  da: Gem rapporten på din computer og udskriv den. Du kan også ændre den eller tilføje flere oplysninger. Bemærk venligst, at ændringer foretaget på din pc IKKE vil blive gemt i OiRA-risikovurderingen.
  de: Speichern Sie den Bericht auf Ihrem Computer und drucken Sie ihn aus. Sie können ihn auch ändern oder weitere Informationen hinzufügen. Bitte beachten Sie, dass Änderungen, die auf Ihrem PC vorgenommen werden, NICHT in der OiRA-Risikobewertung gespeichert werden.
  el: Αποθηκεύστε την έκθεση στον υπολογιστή σας και εκτυπώστε την. Μπορείτε επίσης να την τροποποιήσετε ή να προσθέσετε περισσότερες πληροφορίες. Σημειώστε ότι οι αλλαγές που γίνονται στον υπολογιστή σας ΔΕΝ θα αποθηκευτούν στην αξιολόγηση κινδύνου OiRA.
  en: Save the report on your computer and print it. You can also modify it or add more information. Please note that changes made on your pc will NOT be saved in the OiRA risk assessment.
  es: Guarde el informe en su ordenador e imprímalo. También puede modificarlo o añadir más información. Tenga en cuenta que los cambios realizados en su pc NO se guardarán en la evaluación de riesgos de OiRA.
  et: Salvestage aruanne oma arvutisse ja printige see välja. Samuti saate seda muuta või lisada rohkem teavet. Pange tähele, et arvutis tehtud muudatusi EI salvestata OiRA riskihinnangusse.
  fi: Tallenna raportti tietokoneellesi ja tulosta se. Voit myös muokata sitä tai lisätä lisätietoja. Huomaa, että tietokoneellasi tehdyt muutokset EIVÄT tallennu OiRA-riskinarviointiin.
  fr: Enregistrez le rapport sur votre ordinateur et imprimez-le. Vous pouvez également le modifier ou ajouter plus d'informations. Veuillez noter que les modifications effectuées sur votre pc NE seront PAS sauvegardées dans l'évaluation des risques OiRA.
  ga: Sábháil an tuarascáil ar do ríomhaire agus priontáil í. Is féidir leat í a mhodhnú freisin nó tuilleadh eolais a chur leis. Tabhair faoi deara nach ndéanfar na hathruithe a rinneadh ar do ríomhaire a shábháil san measúnú riosca OiRA.
  he: שמור את הדוח במחשב שלך והדפס אותו. תוכל גם לשנות אותו או להוסיף מידע נוסף. שים לב שהשינויים שנעשו במחשב שלך לא יישמרו בהערכת הסיכונים של OiRA.
  hr: Spremite izvješće na računalo i ispišite ga. Možete ga i izmijeniti ili dodati više informacija. Napominjemo da promjene napravljene na vašem računalu NEĆE biti spremljene u OiRA procjeni rizika.
  hu: Mentse el a jelentést a számítógépére és nyomtassa ki. Módosíthatja is, vagy hozzáadhat további információkat. Kérjük, vegye figyelembe, hogy a számítógépén végrehajtott módosítások NEM kerülnek mentésre az OiRA kockázatértékelésben.
  is: Vistaðu skýrsluna á tölvunni þinni og prentaðu hana. Þú getur líka breytt henni eða bætt við frekari upplýsingum. Vinsamlegast athugaðu að breytingar sem gerðar eru á tölvunni þinni verða EKKI vistaðar í OiRA áhættumatinu.
  it: Salva il rapporto sul tuo computer e stampalo. Puoi anche modificarlo o aggiungere altre informazioni. Si prega di notare che le modifiche apportate sul tuo pc NON verranno salvate nella valutazione dei rischi OiRA.
  lt: Išsaugokite ataskaitą savo kompiuteryje ir ją atsispausdinkite. Taip pat galite ją modifikuoti arba pridėti daugiau informacijos. Atkreipkite dėmesį, kad jūsų kompiuteryje atlikti pakeitimai NEBUS išsaugoti OiRA rizikos vertinime.
  lv: Saglabājiet atskaiti savā datorā un izdrukājiet to. Varat arī to modificēt vai pievienot papildu informāciju. Lūdzu, ņemiet vērā, ka izmaiņas, kas veiktas jūsu datorā, NETIKS saglabātas OiRA riska novērtējumā.
  mt: Issejvja r-rapport fuq il-kompjuter tiegħek u ipprintjah. Tista' wkoll timmodifikah jew żżid aktar informazzjoni. Jekk jogħġbok innota li l-bidliet magħmula fuq il-PC tiegħek MA jiġux issalvati fil-valutazzjoni tar-riskju OiRA.
  nl: Sla het rapport op uw computer op en druk het af. U kunt het ook wijzigen of meer informatie toevoegen. Houd er rekening mee dat wijzigingen die op uw pc worden aangebracht NIET worden opgeslagen in de OiRA-risicobeoordeling.
  nl_BE: 'Sla het rapport op uw computer op en druk het af. U kunt het ook aanpassen of meer informatie toevoegen. Let op: wijzigingen die op uw pc worden aangebracht, worden NIET opgeslagen in de OiRA-risicobeoordeling.'
  nl_be: 'Sla het rapport op uw computer op en druk het af. U kunt het ook aanpassen of meer informatie toevoegen. Let op: wijzigingen die op uw pc worden aangebracht, worden NIET opgeslagen in de OiRA-risicobeoordeling.'
  'no': Lagre rapporten på datamaskinen din og skriv den ut. Du kan også endre den eller legge til mer informasjon. Vær oppmerksom på at endringer gjort på din PC IKKE vil bli lagret i OiRA-risikovurderingen.
  pl: Zapisz raport na swoim komputerze i wydrukuj go. Możesz również go zmodyfikować lub dodać więcej informacji. Należy pamiętać, że zmiany dokonane na Państwa komputerze NIE zostaną zapisane w ocenie ryzyka OiRA.
  pt: Guarde o relatório no seu computador e imprima-o. Também pode modificá-lo ou adicionar mais informações. Por favor, note que as alterações feitas no seu pc NÃO serão salvas na avaliação de risco OiRA.
  ro: Salvați raportul pe computerul dvs. și tipăriți-l. Puteți, de asemenea, să îl modificați sau să adăugați mai multe informații. Vă rugăm să rețineți că modificările efectuate pe computerul dvs. NU vor fi salvate în evaluarea riscurilor OiRA.
  ru: Сохраните отчёт на своём компьютере и распечатайте его. Вы также можете изменить его или добавить дополнительную информацию. Обратите внимание, что изменения, внесённые на вашем ПК, НЕ будут сохранены в оценке рисков OiRA.
  sk: Uložte správu do svojho počítača a vytlačte ju. Môžete ju tiež upraviť alebo pridať ďalšie informácie. Upozorňujeme, že zmeny vykonané na vašom počítači NEBUDÚ uložené v hodnot
  sl: Poročilo shranite na računalnik in ga natisnite. Lahko ga tudi spremenite ali dodate več informacij. Upoštevajte, da spremembe, narejene na vašem računalniku, NE bodo shranjene v oceni tveganja OiRA.
  sq: Ruajeni raportin në kompjuterin tuaj dhe printojeni. Mund ta modifikoni gjithashtu ose të shtoni më shumë informacion. Ju lutemi vini re se ndryshimet e bëra në kompjuterin tuaj NUK do të ruhen në vlerësimin e rrezikut OiRA.
  sr: Sačuvajte izveštaj na svom računaru i odštampajte ga. Takođe ga možete izmeniti ili dodati više informacija. Imajte na umu da promene napravljene na vašem računaru NEĆE biti sačuvane u OiRA proceni rizika.
  sv: Spara rapporten på din dator och skriv ut den. Du kan också ändra den eller lägga till mer information. Observera att ändringar som gjorts på din dator INTE kommer att sparas i OiRA-riskbedömningen.
  uk: Збережіть звіт на своєму комп'ютері та роздрукуйте його. Ви також можете змінити його або додати більше інформації. Зверніть увагу, що зміни, внесені на вашому ПК, НЕ будуть збережені в оцінці ризиків OiRA.
message_request_validation:
  bg: Кликнете върху 'Изпрати заявка за валидиране', за да помолите избрания консултант по БЗР да прегледа и валидира вашата оценка на риска.
  ca: Feu clic a 'Envia sol·licitud de validació' per demanar al consultor de SST seleccionat que revisi i validi la vostra avaluació de riscos.
  cs: Klikněte na 'Odeslat žádost o validaci' a požádejte vybraného poradce BOZP o přezkoumání a validaci vašeho hodnocení rizik.
  cy: Cliciwch ar 'Anfon cais am ddilysu' i ofyn i'r ymgynghorydd ISD a ddewiswyd adolygu a dilysu eich asesiad risg.
  da: Klik på 'Send valideringsanmodning' for at bede den valgte OSH-konsulent om at gennemgå og validere din risikovurdering.
  de: Klicken Sie auf „Validierungsanfrage senden“, um den ausgewählten OSH-Berater zu bitten, Ihre Risikobewertung zu überprüfen und zu validieren.
  el: Κάντε κλικ στο 'Αποστολή αιτήματος επικύρωσης' για να ζητήσετε από τον επιλεγμένο σύμβουλο ΕΑΥ να αναθεωρήσει και να επικυρώσει την εκτίμηση κινδύνου σας.
  en: Click on 'Send validation request' to ask the selected OSH consultant to review and validate your risk assessment.
  es: Haga clic en 'Enviar solicitud de validación' para pedir al consultor de SST seleccionado que revise y valide su evaluación de riesgos.
  et: Klõpsake nupul 'Saada kinnitamistaotlus', et paluda valitud tööohutuse konsultandil teie riskihinnang üle vaadata ja kinnitada.
  fi: Napsauta 'Lähetä vahvistuspyyntö' pyytääksesi valittua työturvallisuuskonsulttia tarkistamaan ja vahvistamaan riskiarviointisi.
  fr: Cliquez sur 'Envoyer la demande de validation' pour demander au consultant OSH sélectionné d'examiner et de valider votre évaluation des risques.
  ga: Cliceáil ar 'Seol iarratas bailíochtaithe' chun iarraidh ar an gcomhairleoir OSH roghnaithe d'measúnú riosca a athbhreithniú agus a bhailíochtú.
  he: לחץ על 'שלח בקשת אימות' כדי לבקש מיועץ בטיחות ובריאות תעסוקתית שנבחר לבדוק ולאמת את הערכת הסיכונים שלך.
  hr: Kliknite na 'Pošalji zahtjev za validaciju' kako biste zamolili odabranog savjetnika za ZNR da pregleda i potvrdi vašu procjenu rizika.
  hu: Kattintson az 'Érvényesítési kérés küldése' gombra, hogy megkérje a kiválasztott munkahelyi egészségvédelmi és biztonsági tanácsadót az Ön kockázatértékelésének áttekintésére és jóváhagyására.
  is: Smelltu á 'Senda staðfestingarbeiðni' til að biðja valinn ráðgjafa um vinnuvernd að fara yfir og staðfesta áhættumat þitt.
  it: Fai clic su 'Invia richiesta di validazione' per chiedere al consulente SSL selezionato di esaminare e convalidare la tua valutazione dei rischi.
  lt: Spustelėkite „Siųsti patvirtinimo užklausą
  lv: Noklikšķiniet uz „Sūtīt apstiprināšanas pieprasījumu
  mt: Ikklikkja fuq 'Ibgħat talba ta' validazzjoni' biex titlob lill-konsulent tas-SSO magħżul biex jirrevedi u jivvalidja l-valutazzjoni tar-riskju tiegħek.
  nl: Klik op 'Verstuur validatieverzoek' om de geselecteerde OSH-consultant te vragen uw risicobeoordeling te beoordelen en te valideren.
  nl_BE: Klik op 'Validatieverzoek verzenden' om de geselecteerde preventieadviseur te vragen uw risicobeoordeling te beoordelen en te valideren.
  nl_be: Klik op 'Validatieverzoek verzenden' om de geselecteerde preventieadviseur te vragen uw risicobeoordeling te beoordelen en te valideren.
  'no': Klikk på 'Send valideringsforespørsel' for å be den valgte HMS-konsulenten om å gjennomgå og validere risikovurderingen din.
  pl: Kliknij 'Wyślij prośbę o walidację', aby poprosić wybranego konsultanta BHP o sprawdzenie i zatwierdzenie twojej oceny ryzyka.
  pt: Clique em 'Enviar solicitação de validação' para pedir ao consultor de SST selecionado que revise e valide sua avaliação de risco.
  ro: Faceți clic pe 'Trimiteți cererea de validare' pentru a cere consultantului SSM selectat să revizuiască și să valideze evaluarea dvs. de riscuri.
  ru: Нажмите «Отправить запрос на проверку», чтобы попросить выбранного консультанта по ОТ проверить и утвердить вашу оценку рисков.
  sk: Kliknite na 'Odoslať žiadosť o validáciu' a požiadajte vybraného konzultanta BOZP o preskúmanie a validáciu vášho hodnotenia rizík.
  sl: Kliknite na 'Pošlji zahtevo za potrditev', da prosite izbranega svetovalca za varnost in zdravje pri delu, da pregleda in potrdi vašo oceno tveganja.
  sq: Klikoni mbi 'Dërgo kërkesën e vërtetimit' për të kërkuar nga konsulenti i zgjedhur i OSH-it të shqyrtojë dhe vërtetojë vlerësimin tuaj të riskut.
  sr: Kliknite na 'Pošalji zahtev za validaciju' da zamolite izabranog savetnika za zaštitu na radu da pregleda i validuje vašu procenu rizika.
  sv: Klicka på 'Skicka valideringsbegäran' för att be den valda OSH-konsulten att granska och validera din riskbedömning.
  uk: Натисніть «Надіслати запит на підтвердження», щоб попросити вибраного консультанта з ОП переглянути та підтвердити вашу оцінку ризиків.
message_role_administrator:
  bg: Администраторите могат да създават, редактират и премахват потребителски акаунти. Администраторите могат също да извършват оценки на риска и да редактират съществуващи такива, да заключват оценки на риска, да създават обучения и да участват в обучения.
  ca: Els administradors poden crear, editar i eliminar comptes d'usuari. Els administradors també poden fer avaluacions de riscos i editar-ne les existents, bloquejar avaluacions de riscos, crear formacions i fer formacions.
  cs: Správci mohou vytvářet, upravovat a odstraňovat uživatelské účty. Správci mohou také provádět hodnocení rizik a upravovat stávající, uzamykat hodnocení rizik, vytvářet školení a absolvovat školení.
  cy: Gall gweinyddwyr greu, golygu a dileu cyfrifon defnyddwyr. Gall gweinyddwyr hefyd wneud asesiadau risg a golygu rhai presennol, cloi asesiadau risg, creu hyfforddiant a chymryd hyfforddiant.
  da: Administratorer kan oprette, redigere og fjerne brugerkonti. Administratorer kan også foretage risikovurderinger og redigere eksisterende, låse risikovurderinger, oprette kurser og deltage i kurser.
  de: Administratoren können Benutzerkonten erstellen, bearbeiten und entfernen. Administratoren können außerdem Risikobewertungen erstellen und vorhandene bearbeiten, Risikobewertungen sperren, Schulungen erstellen und an Schulungen teilnehmen.
  el: Οι διαχειριστές μπορούν να δημιουργούν, να επεξεργάζονται και να αφαιρούν λογαριασμούς χρηστών. Οι διαχειριστές μπορούν επίσης να πραγματοποιούν εκτιμήσεις κινδύνου και να επεξεργάζονται υπάρχουσες, να κλειδώνουν εκτιμήσεις κινδύνου, να δημιουργούν εκπαιδεύσεις και να συμμετέχουν σε εκπαιδεύσεις.
  en: Administrators can create, edit and remove user accounts. Administrators can also make risk assessments and edit existing ones, lock risk assessments, create trainings and take trainings.
  es: Los administradores pueden crear, editar y eliminar cuentas de usuario. Los administradores también pueden realizar evaluaciones de riesgos y editar las existentes, bloquear evaluaciones de riesgos, crear formaciones y realizarlas.
  et: Administraatorid saavad luua, muuta ja eemaldada kasutajakontosid. Administraatorid saavad ka teha riskihinnanguid ja muuta olemasolevaid, lukustada riskihinnanguid, luua koolitusi ja koolitustel osaleda.
  fi: Järjestelmänvalvojat voivat luoda, muokata ja poistaa käyttäjätilejä. Järjestelmänvalvojat voivat myös tehdä riskiarviointeja ja muokata olemassa olevia, lukita riskiarviointeja, luoda koulutuksia ja osallistua koulutuksiin.
  fr: Les administrateurs peuvent créer, modifier et supprimer des comptes d'utilisateurs. Les administrateurs peuvent également effectuer des évaluations des risques et modifier celles qui existent déjà, verrouiller les évaluations des risques, créer des formations et suivre des formations.
  ga: Is féidir le riarthóirí cuntais úsáideoirí a chruthú, a chur in eagar agus a bhaint. Is féidir le riarthóirí freisin measúnuithe riosca a dhéanamh agus cinn atá ann cheana a chur in eagar, measúnuithe riosca a ghlasáil, oiliúintí a chruthú agus oiliúintí a dhéanamh.
  he: מנהלי מערכת יכולים ליצור, לערוך ולהסיר חשבונות משתמשים. מנהלי מערכת יכולים גם לבצע הערכות סיכונים ולערוך קיימות, לנעול הערכות סיכונים, ליצור הדרכות ולהשתתף בהן.
  hr: Administratori mogu stvarati, uređivati i uklanjati korisničke račune. Administratori također mogu izrađivati procjene rizika i uređivati postojeće, zaključavati procjene rizika, kreirati obuke i pohađati obuke.
  hu: A rendszergazdák létrehozhatnak, szerkeszthetnek és eltávolíthatnak felhasználói fiókokat. A rendszergazdák kockázatértékeléseket is készíthetnek és szerkeszthetnek, zárolhatják a kockázatértékeléseket, képzéseket hozhatnak létre és vehetnek részt rajtuk.
  is: Stjórnendur geta búið til, breytt og fjarlægt notendareikninga. Stjórnendur geta einnig gert áhættumat og breytt þeim sem fyrir eru, læst áhættumatum, búið til þjálfanir og tekið þjálfanir.
  it: Gli amministratori possono creare, modificare e rimuovere account utente. Gli amministratori possono anche effettuare valutazioni del rischio e modificare quelle esistenti, bloccare le valutazioni del rischio, creare formazioni e partecipare a formazioni.
  lt: Administratoriai gali kurti, redaguoti ir šalinti vartotojų paskyras. Administratoriai taip pat gali atlikti rizikos vertinimus ir redaguoti esamus, užrakinti rizikos vertinimus, kurti mokymus ir dalyvauti mokymuose.
  lv: Administratori var izveidot, rediģēt un dzēst lietotāju kontus. Administratori var arī veikt riska novērtējumus un rediģēt esošos, bloķēt riska novērtējumus, veidot apmācības un apmācīties.
  mt: L-amministraturi jistgħu joħolqu, jeditjaw u jneħħu kontijiet tal-utenti. L-amministraturi jistgħu wkoll jagħmlu valutazzjonijiet tar-riskju u jeditjaw dawk eżistenti, jiblokkaw valutazzjonijiet tar-riskju, joħolqu taħriġ u jieħdu taħriġ.
  nl: Beheerders kunnen gebruikersaccounts maken, bewerken en verwijderen. Beheerders kunnen ook risicobeoordelingen maken en bestaande bewerken, risicobeoordelingen vergrendelen, trainingen maken en trainingen volgen.
  nl_BE: Beheerders kunnen gebruikersaccounts aanmaken, bewerken en verwijderen. Beheerders kunnen ook risicobeoordelingen maken en bestaande bewerken, risicobeoordelingen vergrendelen, opleidingen aanmaken en opleidingen volgen.
  nl_be: Beheerders kunnen gebruikersaccounts aanmaken, bewerken en verwijderen. Beheerders kunnen ook risicobeoordelingen maken en bestaande bewerken, risicobeoordelingen vergrendelen, opleidingen aanmaken en opleidingen volgen.
  'no': Administratorer kan opprette, redigere og fjerne brukerkontoer. Administratorer kan også lage risikovurderinger og redigere eksisterende, låse risikovurderinger, opprette opplæringer og delta i opplæringer.
  pl: Administratorzy mogą tworzyć, edytować i usuwać konta użytkowników. Administratorzy mogą również tworzyć oceny ryzyka i edytować istniejące, blokować oceny ryzyka, tworzyć szkolenia i uczestniczyć w szkoleniach.
  pt: Os administradores podem criar, editar e remover contas de usuários. Os administradores também podem elaborar avaliações de risco e editar as existentes, bloquear avaliações de risco, criar treinamentos e participar de treinamentos.
  ro: Administratorii pot crea, edita și elimina conturi de utilizatori. Administratorii pot, de asemenea, să elaboreze evaluări ale riscurilor și să editeze cele existente, să blocheze evaluările de riscuri, să creeze cursuri de formare și să participe la acestea.
  ru: Администраторы могут создавать, редактировать и удалять учётные записи пользователей. Администраторы также могут создавать оценки рисков и редактировать существующие, блокировать оценки рисков, создавать тренинги и проходить тренинги.
  sk: Správcovia môžu vytvárať, upravovať a odstraňovať používateľské účty. Správcovia môžu tiež vykonávať hodnotenia rizík a upravovať existujúce, zamykať hodnotenia rizík, vytvárať školenia a absolvovať školenia.
  sl: Skrbniki lahko ustvarjajo, urejajo in odstranjujejo uporabniške račune. Skrbniki lahko tudi izvajajo ocene tveganj in urejajo obstoječe, zaklepajo ocene tveganj, ustvarjajo usposabljanja in se udeležujejo usposabljanj.
  sq: Administratorët mund të krijojnë, modifikojnë dhe heqin llogaritë e përdoruesve. Administratorët mund gjithashtu të bëjnë vlerësime të rrezikut dhe të modifikojnë ato ekzistuese, të bllokojnë vlerësimet e rrezikut, të krijojnë trajnime dhe të marrin trajnime.
  sr: Administratori mogu da kreiraju, uređuju i uklanjaju korisničke naloge. Administratori takođe mogu da vrše procene rizika i uređuju postojeće, zaključavaju procene rizika, kreiraju obuke i pohađaju obuke.
  sv: Administratörer kan skapa, redigera och ta bort användarkonton. Administratörer kan också göra riskbedömningar och redigera befintliga, låsa riskbedömningar, skapa utbildningar och delta i utbildningar.
  uk: Адміністратори можуть створювати, редагувати та видаляти облікові записи користувачів. Адміністратори також можуть проводити оцінки ризиків та редагувати наявні, блокувати оцінки ризиків, створювати навчання та проходити їх.
message_role_consultant:
  bg: Консултантите могат да извършват и редактират оценки на риска, да валидират и одобряват оценки на риска и да създават обучения.
  ca: Els consultors poden fer i editar avaluacions de riscos, validar i aprovar avaluacions de riscos i crear formacions.
  cs: Konzultanti mohou vytvářet a upravovat hodnocení rizik, ověřovat a schvalovat hodnocení rizik a vytvářet školení.
  cy: Gall ymgynghorwyr wneud a golygu asesiadau risg, dilysu a chymeradwyo asesiadau risg a chreu hyfforddiant.
  da: Konsulenter kan foretage og redigere risikovurderinger, validere og godkende risikovurderinger og oprette kurser.
  de: Berater können Risikobewertungen erstellen und bearbeiten, Risikobewertungen validieren und genehmigen und Schulungen erstellen.
  el: Οι σύμβουλοι μπορούν να πραγματοποιούν και να επεξεργάζονται εκτιμήσεις κινδύνου, να επικυρώνουν και να εγκρίνουν εκτιμήσεις κινδύνου και να δημιουργούν εκπαιδεύσεις.
  en: Consultants can make and edit risk assessments, validate and approve risk assessments and create trainings.
  es: Los consultores pueden realizar y editar evaluaciones de riesgos, validar y aprobar evaluaciones de riesgos y crear formaciones.
  et: Konsultandid saavad teha ja muuta riskihinnanguid, valideerida ja kinnitada riskihinnanguid ning luua koolitusi.
  fi: Konsultit voivat tehdä ja muokata riskiarviointeja, validoida ja hyväksyä riskiarviointeja sekä luoda koulutuksia.
  fr: Les consultants peuvent effectuer et modifier des évaluations des risques, valider et approuver les évaluations des risques et créer des formations.
  ga: Is féidir le comhairleoirí measúnuithe riosca a dhéanamh agus a chur in eagar, measúnuithe riosca a bhailíochtú agus a fhaomhadh agus oiliúintí a chruthú.
  he: יועצים יכולים לבצע ולערוך הערכות סיכונים, לאמת ולאשר הערכות סיכונים וליצור הדרכות.
  hr: Konzultanti mogu izrađivati i uređivati procjene rizika, potvrđivati i odobravati procjene rizika te kreirati obuke.
  hu: A tanácsadók kockázatértékeléseket készíthetnek és szerkeszthetnek, érvényesíthetik és jóváhagyhatják a kockázatértékeléseket, valamint képzéseket hozhatnak létre.
  is: Ráðgjafar geta gert og breytt áhættumatum, staðfest og samþykkt áhættumat og búið til þjálfanir.
  it: I consulenti possono effettuare e modificare valutazioni del rischio, convalidare e approvare le valutazioni del rischio e creare formazioni.
  lt: Konsultantai gali kurti ir redaguoti rizikos vertinimus, patvirtinti ir aprobuoti rizikos vertinimus bei kurti mokymus.
  lv: Konsultanti var veidot un rediģēt riska novērtējumus, validēt un apstiprināt riska novērtējumus un veidot apmācības.
  mt: Il-konsulenti jistgħu jagħmlu u jeditjaw valutazzjonijiet tar-riskju, jivvalidaw u japprovaw valutazzjonijiet tar-riskju u joħolqu taħriġ.
  nl: Adviseurs kunnen risicobeoordelingen maken en bewerken, risicobeoordelingen valideren en goedkeuren en trainingen creëren.
  nl_BE: Consultants kunnen risicobeoordelingen maken en bewerken, risicobeoordelingen valideren en goedkeuren en opleidingen aanmaken.
  nl_be: Consultants kunnen risicobeoordelingen maken en bewerken, risicobeoordelingen valideren en goedkeuren en opleidingen aanmaken.
  'no': Konsulenter kan lage og redigere risikovurderinger, validere og godkjenne risikovurderinger og opprette opplæringer.
  pl: Konsultanci mogą tworzyć i edytować oceny ryzyka, walidować i zatwierdzać oceny ryzyka oraz tworzyć szkolenia.
  pt: Os consultores podem criar e editar avaliações de risco, validar e aprovar avaliações de risco e criar treinamentos.
  ro: Consultanții pot elabora și edita evaluări ale riscurilor, valida și aproba evaluări ale riscurilor și crea cursuri de formare.
  ru: Консультанты могут создавать и редактировать оценки рисков, проверять и утверждать оценки рисков, а также создавать тренинги.
  sk: Konzultanti môžu vytvárať a upravovať hodnotenia rizík, overovať a schvaľovať hodnotenia rizík a vytvárať školenia.
  sl: Svetovalci lahko ustvarjajo in urejajo ocene tveganj, potrjujejo in odobravajo ocene tveganj ter ustvarjajo usposabljanja.
  sq: Konsulentët mund të bëjnë dhe modifikojnë vlerësimet e rrezikut, të vërtetojnë dhe miratojnë vlerësimet e rrezikut dhe të krijojnë trajnime.
  sr: Konsultanti mogu da vrše i uređuju procene rizika, validiraju i odobravaju procene rizika i kreiraju obuke.
  sv: Konsulter kan göra och redigera riskbedömningar, validera och godkänna riskbedömningar samt skapa utbildningar.
  uk: Консультанти можуть проводити та редагувати оцінки ризиків, перевіряти та схвалювати оцінки ризиків, а також створювати навчання.
