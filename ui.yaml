  ga: 'Tá tú ar tí an measúnú riosca <strong>"Einweisung Fremdfirmen: Reinigungskräfte"</strong> a dhíghlasáil.'
  he: 'אתה עומד לבטל את נעילת הערכת הסיכון <strong>"Einweisung Fremdfirmen: Reinigungskräfte"</strong>.'
