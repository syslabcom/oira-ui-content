message_tool_import:
  bg: Функционалността за импортиране на инструменти може да се използва например
    за импортиране на инструмент, който е експортиран от друга страна. По този начин
    създавате копие на оригиналния инструмент, който след това можете да редактирате
    сами.
  cs: Funkce importu nástrojů může být použita například k importu nástroje, který
    byl exportován z jiné země. Tím vytvoříte kopii původního nástroje, kterou pak
    můžete sami upravovat.
  da: Værktøjsimportfunktionen kan for eksempel bruges til at importere et værktøj,
    der er eksporteret fra et andet land. Du opretter dermed en kopi af det originale
    værktøj, som du derefter selv kan redigere.
  de: Die Tool-Import-Funktionalität kann beispielsweise verwendet werden, um ein
    Tool zu importieren, das aus einem anderen Land exportiert wurde. Damit erstellen
    Sie eine Kopie des ursprünglichen Tools, das Sie anschließend selbst bearbeiten
    können.
  el: Η λειτουργικότητα εισαγωγής εργαλείων μπορεί να χρησιμοποιηθεί για παράδειγμα
    για την εισαγωγή ενός εργαλείου που έχει εξαχθεί από άλλη χώρα. Με αυτόν τον τρόπο
    δημιουργείτε ένα αντίγραφο του αρχικού εργαλείου, το οποίο μπορείτε στη συνέχεια
    να επεξεργαστείτε μόνοι σας.
  en: The tool import functionality can be used, for example, to import a tool that
    has been exported from another country. You thereby create a copy of the original
    tool, which you can then edit yourself.
  es: La funcionalidad de importación de herramientas puede utilizarse, por ejemplo,
    para importar una herramienta que ha sido exportada desde otro país. De esta manera,
    creas una copia de la herramienta original, que luego puedes editar tú mismo.
  et: Tööriista importimise funktsionaalsust saab kasutada näiteks tööriista importimiseks,
    mis on eksporditud teisest riigist. Sellega loote originaaltööriista koopia, mida
    saate seejärel ise redigeerida.
  fi: Työkalun tuontitoimintoa voidaan käyttää esimerkiksi sellaisen työkalun tuomiseen,
    joka on viety toisesta maasta. Näin luot kopion alkuperäisestä työkalusta, jota
    voit sitten itse muokata.
  fr: La fonctionnalité d'importation d'outils peut être utilisée, par exemple, pour
    importer un outil qui a été exporté d'un autre pays. Vous créez ainsi une copie
    de l'outil original, que vous pouvez ensuite modifier vous-même.
  ga: Is féidir an fheidhmiúlacht iompórtála uirlisí a úsáid, mar shampla, chun uirlis
    a iompórtáil a onnmhairiodh ó thír eile. Cruthaíonn tú cóip den uirlis bhunaidh
    dá bhrí sin, ar féidir leat í a chur in eagar ansin tú féin.
  he: פונקציונליות ייבוא הכלים יכולה לשמש, למשל, לייבא כלי שיוצא ממדינה אחרת. בכך
    אתה יוצר עותק של הכלי המקורי, שתוכל לערוך אותו בעצמך.
  hr: Funkcionalnost uvoza alata može se koristiti, na primjer, za uvoz alata koji
    je izvezen iz druge zemlje. Time stvarate kopiju originalnog alata koju zatim
    možete sami uređivati.
  hu: Az eszköz import funkciója használható például egy másik országból exportált
    eszköz importálására. Ezzel létrehozza az eredeti eszköz másolatát, amelyet aztán
    maga szerkeszthet.
  it: La funzionalità di importazione degli strumenti può essere utilizzata, ad esempio,
    per importare uno strumento che è stato esportato da un altro paese. In questo
    modo si crea una copia dello strumento originale, che è possibile poi modificare
    autonomamente.
  lt: Įrankių importo funkcionalumas gali būti naudojamas, pavyzdžiui, įrankiui, kuris
    buvo eksportuotas iš kitos šalies, importuoti. Taip sukuriate originalaus įrankio
    kopiją, kurią galite redaguoti patys.
  lv: Rīku importa funkcionalitāti var izmantot, piemēram, lai importētu rīku, kas
    ir eksportēts no citas valsts. Tādējādi jūs izveidojat oriģinālā rīka kopiju,
    ko pēc tam varat rediģēt paši.
  mt: Il-funzjonalità tal-importazzjoni tal-għodod tista' tintuża, pereżempju, biex
    timporta għodda li ġiet esportata minn pajjiż ieħor. B'hekk toħloq kopja tal-għodda
    oriġinali, li mbagħad tista' teditja int stess.
  nl: De functionaliteit voor het importeren van tools kan bijvoorbeeld worden gebruikt
    om een tool te importeren die is geëxporteerd vanuit een ander land. U creëert
    hiermee een kopie van de oorspronkelijke tool, die u vervolgens zelf kunt bewerken.
  pl: Funkcjonalność importu narzędzi może być używana na przykład do importowania
    narzędzia, które zostało wyeksportowane z innego kraju. W ten sposób tworzysz
    kopię oryginalnego narzędzia, którą następnie możesz samodzielnie edytować.
  pt: A funcionalidade de importação de ferramentas pode ser usada, por exemplo, para
    importar uma ferramenta que foi exportada de outro país. Desta forma, cria uma
    cópia da ferramenta original, que pode depois editar você mesmo.
  ro: Funcționalitatea de import a instrumentelor poate fi utilizată, de exemplu,
    pentru a importa un instrument care a fost exportat dintr-o altă țară. Astfel
    creați o copie a instrumentului original, pe care o puteți edita apoi singur.
  sk: Funkcia importu nástrojov môže byť použitá napríklad na import nástroja, ktorý
    bol exportovaný z inej krajiny. Tým vytvoríte kópiu pôvodného nástroja, ktorú
    potom môžete sami upravovať.
  sl: Funkcionalnost uvoza orodij se lahko uporablja, na primer, za uvoz orodja, ki
    je bilo izvoženo iz druge države. S tem ustvarite kopijo originalnega orodja,
    ki jo lahko nato sami urejate.
  sv: Verktygets importfunktionalitet kan användas till exempel för att importera
    ett verktyg som har exporterats från ett annat land. Därmed skapar du en kopia
    av det ursprungliga verktyget, som du sedan kan redigera själv.
  ca: La funcionalitat d'importació d'eines es pot utilitzar, per exemple, per importar
    una eina que s'hagi exportat d'un altre país. D'aquesta manera, es crea una còpia
    de l'eina original, que podeu editar vosaltres mateixos.
  cy: Gellir defnyddio'r swyddogaeth mewnforio offeryn, er enghraifft, i fewnforio
    offeryn sydd wedi'i allforio o wlad arall. Rydych chi felly yn creu copi o'r offeryn
    gwreiddiol, y gallwch chi wedyn ei olygu eich hun.
  is: Innflutningsvirknin fyrir tól er hægt að nota, til dæmis, til að flytja inn
    tól sem hefur verið flutt út frá öðru landi. Þannig búðu til afrit af upprunalega
    tólinu, sem þú getur síðan breytt sjálfur.
  nl_BE: De importfunctionaliteit voor hulpmiddelen kan worden gebruikt om bijvoorbeeld
    een hulpmiddel te importeren dat uit een ander land is geëxporteerd. Hiermee maakt
    u een kopie van het originele hulpmiddel, dat u vervolgens zelf kunt bewerken.
  nl_be: De importfunctionaliteit voor hulpmiddelen kan worden gebruikt om bijvoorbeeld
    een hulpmiddel te importeren dat uit een ander land is geëxporteerd. Hiermee maakt
    u een kopie van het originele hulpmiddel, dat u vervolgens zelf kunt bewerken.
  'no': Funksjonen for verktøyimport kan brukes til for eksempel å importere et verktøy
    som er eksportert fra et annet land. Du oppretter dermed en kopi av det originale
    verktøyet, som du deretter kan redigere selv.
  ru: Функция импорта инструмента может использоваться, например, для импорта инструмента,
    экспортированного из другой страны. Таким образом вы создаёте копию оригинального
    инструмента, которую затем можете редактировать самостоятельно.
  sq: Funksionaliteti i importimit të mjetit mund të përdoret, për shembull, për të
    importuar një mjet që është eksportuar nga një vend tjetër. Kjo krijon një kopje
    të mjetit origjinal, të cilën mund ta modifikoni vetë.
  sr: Funkcionalnost uvoza alata može se koristiti, na primer, za uvoz alata koji
    je izvezen iz druge zemlje. Time kreirate kopiju originalnog alata, koju zatim
    možete sami uređivati.
  uk: Функція імпорту інструменту може використовуватися, наприклад, для імпорту інструменту,
    експортованого з іншої країни. Таким чином ви створюєте копію оригінального інструменту,
    яку потім можете редагувати самостійно.
message_tool_export_import:
  bg: Функционалността за експорт и импорт на инструменти може да се използва за изпращане
    на инструмент към агенция за превод, но също и за експортиране и повторен импорт
    за използване в друга страна.
  cs: Funkce exportu a importu nástroje může být použita k odeslání nástroje překladatelské
    agentuře, ale také k exportu a opětovnému importu pro použití v jiné zemi.
  da: Værktøjets eksport- og importfunktionalitet kan bruges til at sende et værktøj
    til et oversættelsesbureau, men også til at eksportere det og importere det igen
    til brug i et andet land.
  de: Die Export- und Importfunktionalität für Tools kann verwendet werden, um ein
    Tool an eine Übersetzungsagentur zu senden, aber auch um es zu exportieren und
    erneut zu importieren für die Verwendung in einem anderen Land.
  el: Η λειτουργικότητα εξαγωγής και εισαγωγής εργαλείων μπορεί να χρησιμοποιηθεί
    για την αποστολή ενός εργαλείου σε μεταφραστικό γραφείο, αλλά και για την εξαγωγή
    και επανεισαγωγή του για χρήση σε άλλη χώρα.
  en: The tool export and import functionality can be used to send a tool to a translation
    agency, but also to export it and import it again for use in another country.
  es: La funcionalidad de exportación e importación de herramientas se puede utilizar
    para enviar una herramienta a una agencia de traducción, pero también para exportarla
    e importarla nuevamente para su uso en otro país.
  et: Tööriista ekspordi- ja impordifunktsionaalsust saab kasutada tööriista saatmiseks
    tõlkebüroole, aga ka selle eksportimiseks ja uuesti importimiseks kasutamiseks
    teises riigis.
  fi: Työkalun vienti- ja tuontitoimintoa voidaan käyttää työkalun lähettämiseen käännöstoimistolle,
    mutta myös sen viemiseen ja uudelleen tuomiseen käytettäväksi toisessa maassa.
  fr: La fonctionnalité d'exportation et d'importation d'outils peut être utilisée
    pour envoyer un outil à une agence de traduction, mais aussi pour l'exporter et
    l'importer à nouveau pour une utilisation dans un autre pays.
  ga: Is féidir an fheidhmiúlacht onnmhairí agus iompórtála uirlis a úsáid chun uirlis
    a sheoladh chuig gníomhaireacht aistriúcháin, ach freisin chun í a onnmhairiú
    agus a hiompórtáil arís le húsáid i dtír eile.
  he: פונקציונליות ייצוא וייבוא הכלים יכולה לשמש לשליחת כלי לסוכנות תרגום, אך גם לייצא
    אותו ולייבא אותו שוב לשימוש במדינה אחרת.
  hr: Funkcionalnost izvoza i uvoza alata može se koristiti za slanje alata agenciji
    za prijevod, ali i za izvoz i ponovni uvoz za korištenje u drugoj zemlji.
  hu: Az eszköz export és import funkciója használható egy eszköz fordítóügynökséghez
    való küldésére, de arra is, hogy exportálja és újra importálja egy másik országban
    való használatra.
  it: La funzionalità di esportazione e importazione degli strumenti può essere utilizzata
    per inviare uno strumento a un'agenzia di traduzione, ma anche per esportarlo
    e importarlo nuovamente per l'uso in un altro paese.
  lt: Įrankių eksporto ir importo funkcionalumas gali būti naudojamas įrankiui siųsti
    vertimo agentūrai, bet taip pat jo eksportavimui ir pakartotiniam importavimui
    naudojimui kitoje šalyje.
  lv: Rīku eksporta un importa funkcionalitāti var izmantot, lai nosūtītu rīku tulkošanas
    aģentūrai, bet arī lai to eksportētu un atkārtoti importētu lietošanai citā valstī.
  mt: Il-funzjonalità tal-esportazzjoni u l-importazzjoni tal-għodod tista' tintuża
    biex tibgħat għodda lil aġenzija tat-traduzzjoni, iżda wkoll biex tesportaha u
    timportaha mill-ġdid għall-użu f'pajjiż ieħor.
  nl: De export- en importfunctionaliteit van het instrument kan worden gebruikt om
    een instrument naar een vertaalbureau te sturen, maar ook om het te exporteren
    en opnieuw te importeren voor gebruik in een ander land.
  pl: Funkcjonalność eksportu i importu narzędzi może być używana do wysyłania narzędzia
    do agencji tłumaczeniowej, ale także do eksportowania go i ponownego importowania
    do użytku w innym kraju.
  pt: A funcionalidade de exportação e importação de ferramentas pode ser usada para
    enviar uma ferramenta para uma agência de tradução, mas também para exportá-la
    e importá-la novamente para uso em outro país.
  ro: Funcționalitatea de export și import a instrumentelor poate fi utilizată pentru
    a trimite un instrument la o agenție de traducere, dar și pentru a-l exporta și
    importa din nou pentru utilizare în altă țară.
  sk: Funkcia exportu a importu nástrojov môže byť použitá na odoslanie nástroja prekladateľskej
    agentúre, ale aj na jeho export a opätovný import na použitie v inej krajine.
  sl: Funkcionalnost izvoza in uvoza orodij se lahko uporablja za pošiljanje orodja
    prevajalski agenciji, pa tudi za izvoz in ponoven uvoz za uporabo v drugi državi.
  sv: Verktygets export- och importfunktionalitet kan användas för att skicka ett
    verktyg till en översättningsbyrå, men också för att exportera det och importera
    det igen för användning i ett annat land.
  ca: La funcionalitat d'exportació i importació d'eines es pot utilitzar per enviar
    una eina a una agència de traducció, però també per exportar-la i importar-la
    de nou per utilitzar-la en un altre país.
  cy: Gellir defnyddio swyddogaeth allforio a mewnforio'r offeryn i anfon offeryn
    at asiantaeth gyfieithu, ond hefyd i'w allforio a'i fewnforio eto i'w ddefnyddio
    mewn gwlad arall.
  is: Útflutnings- og innflutningsvirknin fyrir tól er hægt að nota til að senda tól
    til þýðingarmiðstöðvar, en einnig til að flytja það út og inn aftur til notkunar
    í öðru landi.
  nl_BE: De export- en importfunctionaliteit voor hulpmiddelen kan worden gebruikt
    om een hulpmiddel naar een vertaalbureau te sturen, maar ook om het te exporteren
    en opnieuw te importeren voor gebruik in een ander land.
  nl_be: De export- en importfunctionaliteit voor hulpmiddelen kan worden gebruikt
    om een hulpmiddel naar een vertaalbureau te sturen, maar ook om het te exporteren
    en opnieuw te importeren voor gebruik in een ander land.
  'no': Funksjonaliteten for eksport og import av verktøy kan brukes til å sende et
    verktøy til et oversettingsbyrå, men også til å eksportere det og importere det
    igjen for bruk i et annet land.
  ru: Функция экспорта и импорта инструмента может использоваться для отправки инструмента
    в бюро переводов, а также для его экспорта и повторного импорта для использования
    в другой стране.
  sq: Funksionaliteti i eksportimit dhe importimit të mjetit mund të përdoret për
    t'i dërguar një mjet një agjencie përkthimi, por edhe për ta eksportuar dhe importuar
    përsëri për përdorim në një vend tjetër.
  sr: Funkcionalnost izvoza i uvoza alata može se koristiti za slanje alata agenciji
    za prevođenje, ali i za izvoz i ponovni uvoz za korišćenje u drugoj zemlji.
  uk: Функція експорту та імпорту інструменту може використовуватися для надсилання
    інструменту до агентства перекладів, а також для його експорту та повторного імпорту
    для використання в іншій країні.
