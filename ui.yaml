message_author_training_question_answer_order_notice:
  en: During the training, the questions will be arranged in a randomised order. Furthermore,
    the answers for each question will also be presented in a random sequence for
    enhanced learning engagement.
  fr: Pendant la formation, les questions seront organisées dans un ordre aléatoire.
    De plus, les réponses à chaque question seront également présentées dans une séquence
    aléatoire pour améliorer l'engagement d'apprentissage.
  de: Während des Trainings werden die Fragen in einer zufälligen Reihenfolge angeordnet.
    Darüber hinaus werden die Antworten auf jede Frage auch in einer zufälligen Sequenz
    präsentiert, um die Lernbeteiligung zu verbessern.
  es: Durante el entrenamiento, las preguntas se organizarán en un orden aleatorio.
    Además, las respuestas para cada pregunta también se presentarán en una secuencia
    aleatoria para mejorar el compromiso con el aprendizaje.
  it: Durante la formazione, le domande saranno disposte in un ordine casuale. Inoltre,
    le risposte per ogni domanda saranno presentate in una sequenza casuale per migliorare
    l'coinvolgimento nell'apprendimento.
  pt: Durante o treinamento, as perguntas serão organizadas em uma ordem aleatória.
    Além disso, as respostas para cada pergunta também serão apresentadas em uma sequência
    aleatória para aumentar o engajamento no aprendizado.
  nl: Tijdens de training zullen de vragen in willekeurige volgorde worden gerangschikt.
    Bovendien zullen de antwoorden op elke vraag ook in een willekeurige volgorde
    worden gepresenteerd om de betrokkenheid bij het leren te verhogen.
  sv: Under träningen kommer frågorna att ordnas i en slumpmässig ordning. Dessutom
    kommer svaren på varje fråga också att presenteras i en slumpmässig sekvens för
    att öka engagemanget i lärandet.
  fi: Koulutuksen aikana kysymykset järjestetään satunnaiseen järjestykseen. Lisäksi
    kunkin kysymyksen vastaukset esitetään myös satunnaisessa järjestyksessä, mikä
    lisää oppimisen sitoutumista.
  da: Under træningen vil spørgsmålene blive arrangeret i en tilfældig rækkefølge.
    Desuden vil svarene på hvert spørgsmål også blive præsenteret i en tilfældig sekvens
    for at forbedre læringsengagementet.
  et: Koolituse ajal paigutatakse küsimused juhuslikku järjekorda. Lisaks esitatakse
    iga küsimuse vastused samuti juhuslikus järjestuses, et suurendada õppimise kaasatust.
  lv: Apmācības laikā jautājumi tiks sakārtoti nejaušā secībā. Turklāt katras jautājuma
    atbildes tiks arī izklāstītas nejaušā secībā, lai uzlabotu mācīšanās iesaistīšanos.
  lt: Mokymo metu klausimai bus išdėstyti atsitiktine tvarka. Be to, kiekvieno klausimo
    atsakymai taip pat bus pateikti atsitiktine seka, siekiant padidinti mokymosi
    įtraukimą.
  mt: Matul it-taħriġ, il-mistoqsijiet jiġu organizzati f'ordni każwali. Barra minn
    hekk, it-tweġibiet għal kull mistoqsija se jiġu ppreżentati wkoll f'sekwenza każwali
    biex jiġi msaħħaħ l-impenn fl-apprendiment.
  ga: Le linn an oiliúna, beidh na ceisteanna eagraithe i ndiaidh a chéile go randamach.
    Ina theannta sin, cuirfear na freagraí ar gach ceist i láthair i sraith randamach
    chun rannpháirtíocht foghlama a fheabhsú.
  el: Κατά τη διάρκεια της εκπαίδευσης, οι ερωτήσεις θα οργανωθούν σε τυχαία σειρά.
    Επιπλέον, οι απαντήσεις για κάθε ερώτηση θα παρουσιαστούν επίσης σε τυχαία ακολουθία
    για ενισχυμένη συμμετοχή στη μάθηση.
  hu: Az oktatás során a kérdéseket véletlenszerű sorrendben rendezik. Emellett minden
    kérdésre adott válaszok is véletlenszerű sorrendben lesznek bemutatva a fokozott
    tanulási elkötelezettség érdekében.
  ro: În timpul instruirii, întrebările vor fi aranjate într-o ordine aleatorie. În
    plus, răspunsurile la fiecare întrebare vor fi prezentate, de asemenea, într-o
    secvență aleatorie pentru angajamentul sporit în învățare.
  bg: По време на обучението въпросите ще бъдат подредени в произволен ред. Освен
    това, отговорите на всеки въпрос също ще бъдат представени в произволна последователност
    за подобрено учебно ангажиране.
  hr: Tijekom obuke, pitanja će biti raspoređena u nasumičnom redoslijedu. Nadalje,
    odgovori na svako pitanje također će biti prikazani u nasumičnom slijedu za poboljšanu
    uključenost u učenje.
  sk: Počas tréningu budú otázky usporiadané v náhodnom poradí. Okrem toho budú odpovede
    na každú otázku tiež prezentované v náhodnej sekvencii pre zvýšené angažovanie
    pri učení.
  sl: Med usposabljanjem bodo vprašanja razporejena v naključnem vrstnem redu. Poleg
    tega bodo odgovori na vsako vprašanje prav tako predstavljeni v naključnem zaporedju
    za povečano vključevanje v učenje.
  pl: Podczas szkolenia pytania będą ułożone w losowej kolejności. Ponadto odpowiedzi
    na każde pytanie będą również prezentowane w losowej kolejności, co zwiększy zaangażowanie
    w uczenie się.
  he: במהלך האימון, השאלות יועברו בסדר כלשהו. בנוסף, התשובות לכל שאלה יוצגו גם בסדר
    כלשהו על מנת לשפר את ההתמקדות בלמידה.
  ca: Durant la formació, les preguntes s'ordenaran de manera aleatòria. A més, les
    respostes de cada pregunta també es presentaran en una seqüència aleatòria per
    a una major implicació en l'aprenentatge.
  cs: Během školení budou otázky uspořádány v náhodném pořadí. Kromě toho budou odpovědi
    na každou otázku také prezentovány v náhodném pořadí pro lepší zapojení do učení.
  cy: Yn ystod yr hyfforddiant, bydd y cwestiynau'n cael eu trefnu mewn trefn ar hap.
    Ar ben hynny, bydd yr atebion ar gyfer pob cwestiwn hefyd yn cael eu cyflwyno
    mewn dilyniant ar hap er mwyn gwella ymgysylltiad dysgu.
  is: Á meðan á þjálfuninni stendur verða spurningarnar raðaðar í handahófskennda
    röð. Að auki verða svörin við hverri spurningu einnig sett fram í handahófskenndri
    röð til að auka námsþátttöku.
  nl_BE: Tijdens de opleiding worden de vragen in een willekeurige volgorde gerangschikt.
    Bovendien worden de antwoorden op elke vraag ook in een willekeurige volgorde
    gepresenteerd voor een betere leerervaring.
  nl_be: Tijdens de training worden de vragen in een willekeurige volgorde gerangschikt.
    Bovendien worden de antwoorden voor elke vraag ook in een willekeurige volgorde
    gepresenteerd voor een verbeterde leerervaring.
  'no': Under opplæringen vil spørsmålene bli arrangert i tilfeldig rekkefølge. Videre
    vil svarene for hvert spørsmål også bli presentert i en tilfeldig rekkefølge for
    økt læringsengasjement.
  ru: Во время обучения вопросы будут расставлены в случайном порядке. Кроме того,
    ответы на каждый вопрос также будут представлены в случайной последовательности
    для повышения вовлечённости в процесс обучения.
  sq: Gjatë trajnimit, pyetjet do të renditen në një rend të rastësishëm. Për më tepër,
    përgjigjet për çdo pyetje gjithashtu do të paraqiten në një sekuencë të rastësishme
    për angazhim më të mirë në të nxënë.
  sr: Tokom obuke, pitanja će biti raspoređena nasumičnim redosledom. Pored toga,
    odgovori za svako pitanje takođe će biti prikazani u nasumičnom nizu radi boljeg
    angažovanja u učenju.
  uk: Під час навчання питання будуть розташовані у випадковому порядку. Крім того,
    відповіді на кожне запитання також будуть представлені у випадковій послідовності
    для підвищення залученості до навчання.
