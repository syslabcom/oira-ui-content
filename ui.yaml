explanation_password_reminder:
  de: Bitte geben Sie Ihre E-mailadresse ein. Sie erhalten eine E-mail mit einer Anleitung,
    wie Sie Ihr Passwort zurücksetzen können.
  en: Please enter your email address. You will receive an e-mail with instructions
    for resetting your password.
  bg: Моля, въведете вашия имейл адрес. Ще получите имейл с инструкции за нулиране
    на паролата ви.
  ca: Introduïu la vostra adreça de correu electrònic. Rebreu un correu electrònic
    amb instruccions per restablir la vostra contrasenya.
  cs: Zadejte prosím svou e-mailovou adresu. Obdržíte e-mail s pokyny pro obnovení
    hesla.
  cy: Rhowch eich cyfeiriad e-bost. Byddwch yn derbyn e-bost gyda chyfarwyddiadau
    ar gyfer ailosod eich cyfrinair.
  da: Indtast venligst din e-mailadresse. Du vil modtage en e-mail med instruktioner
    til nulstilling af din adgangskode.
  el: Παρακαλώ εισάγετε τη διεύθυνση email σας. Θα λάβετε ένα email με οδηγίες για
    την επαναφορά του κωδικού πρόσβασής σας.
  es: Por favor, introduce tu dirección de correo electrónico. Recibirás un correo
    electrónico con instrucciones para restablecer tu contraseña.
  et: Palun sisestage oma e-posti aadress. Saate e-kirja koos juhistega parooli lähtestamiseks.
  fi: Anna sähköpostiosoitteesi. Saat sähköpostin, jossa on ohjeet salasanan nollaamiseen.
  fr: Veuillez saisir votre adresse e-mail. Vous recevrez un e-mail avec des instructions
    pour réinitialiser votre mot de passe.
  ga: Iontráil do sheoladh ríomhphoist le do thoil. Gheobhaidh tú ríomhphost le treoracha
    chun do phasfhocal a athshocrú.
  he: אנא הזן את כתובת הדוא"ל שלך. תקבל דוא"ל עם הוראות לאיפוס הסיסמה שלך.
  hr: Unesite svoju adresu e-pošte. Primit ćete e-poštu s uputama za resetiranje lozinke.
  hu: Kérjük, adja meg e-mail címét. E-mailt fog kapni a jelszó visszaállítására vonatkozó
    utasításokkal.
  is: Vinsamlegast sláðu inn netfangið þitt. Þú munt fá tölvupóst með leiðbeiningum
    um endurstillingu lykilorðsins þíns.
  it: Inserisci il tuo indirizzo email. Riceverai un'e-mail con le istruzioni per
    reimpostare la tua password.
  lt: Įveskite savo el. pašto adresą. Gausite el. laišką su instrukcijomis, kaip atstatyti
    slaptažodį.
  lv: Lūdzu, ievadiet savu e-pasta adresi. Jūs saņemsiet e-pastu ar norādījumiem paroles
    atiestatīšanai.
  mt: Jekk jogħġbok daħħal l-indirizz tal-email tiegħek. Tirċievi email b'istruzzjonijiet
    biex tirrestawra l-password tiegħek.
  nl: Voer uw e-mailadres in. U ontvangt een e-mail met instructies voor het opnieuw
    instellen van uw wachtwoord.
  nl_BE: Voer uw e-mailadres in. U ontvangt een e-mail met instructies voor het opnieuw
    instellen van uw wachtwoord.
  nl_be: Voer uw e-mailadres in. U ontvangt een e-mail met instructies voor het opnieuw
    instellen van uw wachtwoord.
  'no': Skriv inn e-postadressen din. Du vil motta en e-post med instruksjoner for
    å tilbakestille passordet ditt.
  pl: Wprowadź swój adres e-mail. Otrzymasz wiadomość e-mail z instrukcjami dotyczącymi
    resetowania hasła.
  pt: Por favor, introduza o seu endereço de e-mail. Receberá um e-mail com instruções
    para redefinir a sua palavra-passe.
  ro: Vă rugăm să introduceți adresa de e-mail. Veți primi un e-mail cu instrucțiuni
    pentru resetarea parolei.
  ru: Пожалуйста, введите ваш адрес электронной почты. Вы получите письмо с инструкциями
    по сбросу пароля.
  sk: Zadajte svoju e-mailovú adresu. Dostanete e-mail s pokynmi na obnovenie hesla.
  sl: Vnesite svoj e-poštni naslov. Prejeli boste e-pošto z navodili za ponastavitev
    gesla.
  sq: Ju lutemi shkruani adresën tuaj të emailit. Do të merrni një email me udhëzime
    për rivendosjen e fjalëkalimit tuaj.
  sr: Unesite svoju adresu e-pošte. Dobićete e-poruku sa uputstvima za resetovanje
    lozinke.
  sv: Ange din e-postadress. Du kommer att få ett e-postmeddelande med instruktioner
    för att återställa ditt lösenord.
  uk: Будь ласка, введіть свою адресу електронної пошти. Ви отримаєте електронний
    лист з інструкціями щодо скидання пароля.
