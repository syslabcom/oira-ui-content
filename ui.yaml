message_unlock_or_duplicate:
  en: If you want to continue working on a copy of this assessment, for instance to
    report on a new year, then you can use the option 'Duplicate'. Duplication will
    make a full copy of your assessment which will be unlocked.
  de: Wenn Sie an einer Kopie dieser Bewertung weiterarbeiten möchten, um beispielsweise
    über ein neues Jahr zu berichten, können Sie die Option „Duplizieren“ verwenden.
    Beim Duplizieren wird eine vollständige Kopie Ihrer Bewertung erstellt, die entsperrt
    wird.
  fr: Si vous souhaitez continuer à travailler sur une copie de cette évaluation,
    par exemple pour faire un rapport sur une nouvelle année, vous pouvez utiliser
    l'option 'Dupliquer'. La duplication fera une copie complète de votre évaluation
    qui sera déverrouillée.
  nl: Als je verder wilt werken aan een kopie van deze aanslag, bijvoorbeeld om te
    rapporteren over een nieuw jaar, dan kun je de optie 'Dupliceren' gebruiken. Door
    te dupliceren maakt u een volledige kopie van uw beoordeling die wordt ontgrendeld.
  bg: Ако искате да продължите да работите върху копие на тази оценка, например за
    отчитане на нова година, можете да използвате опцията 'Дублиране'. Дублирането
    ще направи пълно копие на вашата оценка, което ще бъде отключено.
  ca: Si voleu continuar treballant en una còpia d'aquesta avaluació, per exemple
    per informar d'un any nou, podeu utilitzar l'opció 'Duplicar'. La duplicació farà
    una còpia completa de la vostra avaluació que estarà desblocada.
  cs: Pokud chcete pokračovat v práci na kopii tohoto hodnocení, například pro zprávu
    za nový rok, můžete použít možnost 'Duplikovat'. Duplikování vytvoří úplnou kopii
    vašeho hodnocení, která bude odemčena.
  cy: Os hoffech barhau i weithio ar gopi o'r asesiad hwn, er enghraifft i adrodd
    ar flwyddyn newydd, gallwch ddefnyddio'r opsiwn 'Dyblygu'. Bydd dyblygu yn gwneud
    copi llawn o'ch asesiad a fydd wedi'i ddatgloi.
  da: Hvis du vil fortsætte med at arbejde på en kopi af denne vurdering, f.eks. for
    at rapportere om et nyt år, kan du bruge indstillingen 'Dupliker'. Duplikering
    vil lave en fuld kopi af din vurdering, som vil blive låst op.
  el: Εάν θέλετε να συνεχίσετε να εργάζεστε σε ένα αντίγραφο αυτής της αξιολόγησης,
    για παράδειγμα για αναφορά σε νέο έτος, τότε μπορείτε να χρησιμοποιήσετε την επιλογή
    'Αντιγραφή'. Η αντιγραφή θα δημιουργήσει ένα πλήρες αντίγραφο της αξιολόγησής
    σας το οποίο θα είναι ξεκλείδωτο.
  es: Si desea continuar trabajando en una copia de esta evaluación, por ejemplo para
    informar sobre un nuevo año, puede usar la opción 'Duplicar'. La duplicación hará
    una copia completa de su evaluación que estará desbloqueada.
  et: Kui soovite jätkata tööd selle hinnangu koopial, näiteks uue aasta kohta aruandluseks,
    saate kasutada valikut 'Dubleeri'. Dubleerimine loob teie hinnangust täieliku
    koopia, mis on lukustamata.
  fi: Jos haluat jatkaa tämän arvioinnin kopion työstämistä, esimerkiksi raportoidaksesi
    uudesta vuodesta, voit käyttää 'Kopioi'-vaihtoehtoa. Kopiointi luo täydellisen
    kopion arviostasi, joka on lukitsematon.
  ga: Más mian leat leanúint ar aghaidh ag obair ar chóip den mheasúnacht seo, mar
    shampla chun tuairisc a thabhairt ar bhliain nua, is féidir leat an rogha 'Dúblaigh'
    a úsáid. Déanfaidh an dúbláil cóip iomlán de do mheasúnacht a bheidh díghlasáilte.
  he: אם ברצונך להמשיך לעבוד על עותק של הערכה זו, למשל לדווח על שנה חדשה, תוכל להשתמש
    באפשרות 'שכפל'. השכפול ייצור עותק מלא של ההערכה שלך שיהיה פתוח לעריכה.
  hr: Ako želite nastaviti raditi na kopiji ove procjene, primjerice za izvješćivanje
    o novoj godini, možete koristiti opciju 'Dupliciraj'. Dupliciranje će napraviti
    potpunu kopiju vaše procjene koja će biti otključana.
  hu: Ha folytatni szeretné a munkát ennek az értékelésnek egy másolatán, például
    egy új évre vonatkozóan, használhatja a 'Duplikálás' lehetőséget. A duplikálás
    az értékelés teljes másolatát készíti el, amely feloldott állapotban lesz.
  is: Ef þú vilt halda áfram að vinna á afriti af þessu mati, til dæmis til að gera
    skýrslu um nýtt ár, getur þú notað valkostinn 'Tvöfalda'. Tvöföldun mun gera fulla
    afrit af matinu þínu sem verður opið.
  it: Se desideri continuare a lavorare su una copia di questa valutazione, ad esempio
    per riportare un nuovo anno, puoi utilizzare l'opzione 'Duplica'. La duplicazione
    creerà una copia completa della tua valutazione che sarà sbloccata.
  lt: Jei norite toliau dirbti su šio vertinimo kopija, pavyzdžiui, pateikti ataskaitą
    už naujus metus, galite naudoti parinktį „Kopijuoti". Kopijavimas sukurs visą
    jūsų vertinimo kopiją, kuri bus atrakinta.
  lv: Ja vēlaties turpināt strādāt ar šī novērtējuma kopiju, piemēram, ziņot par jaunu
    gadu, varat izmantot opciju 'Dublēt'. Dublēšana izveidos pilnu jūsu novērtējuma
    kopiju, kas tiks atbloķēta.
  mt: Jekk trid tkompli taħdem fuq kopja ta' din il-valutazzjoni, pereżempju biex
    tirrapporta fuq sena ġdida, tista' tuża l-għażla 'Iduplika'. Id-duplikazzjoni
    se tagħmel kopja sħiħa tal-valutazzjoni tiegħek li tkun miftuħa.
  nl_BE: Als u wilt doorgaan met werken aan een kopie van deze beoordeling, bijvoorbeeld
    om over een nieuw jaar te rapporteren, kunt u de optie 'Dupliceren' gebruiken.
    Dupliceren maakt een volledige kopie van uw beoordeling die ontgrendeld zal zijn.
  nl_be: Als u wilt doorgaan met werken aan een kopie van deze beoordeling, bijvoorbeeld
    om over een nieuw jaar te rapporteren, kunt u de optie 'Dupliceren' gebruiken.
    Dupliceren maakt een volledige kopie van uw beoordeling die ontgrendeld zal zijn.
  'no': Hvis du ønsker å fortsette å arbeide med en kopi av denne vurderingen, for
    eksempel for å rapportere for et nytt år, kan du bruke alternativet 'Dupliser'.
    Duplisering vil lage en fullstendig kopi av vurderingen din som vil bli låst opp.
  pl: Jeśli chcesz kontynuować pracę na kopii tej oceny, na przykład aby sporządzić
    raport za nowy rok, możesz skorzystać z opcji 'Duplikuj'. Duplikowanie spowoduje
    utworzenie pełnej kopii oceny, która zostanie odblokowana.
  pt: Se pretender continuar a trabalhar numa cópia desta avaliação, por exemplo para
    reportar um novo ano, pode usar a opção 'Duplicar'. A duplicação criará uma cópia
    completa da sua avaliação que ficará desbloqueada.
  ro: Dacă doriți să continuați să lucrați la o copie a acestei evaluări, de exemplu
    pentru a raporta un nou an, puteți utiliza opțiunea 'Duplicare'. Duplicarea va
    crea o copie completă a evaluării dvs. care va fi deblocată.
  ru: Если вы хотите продолжить работу с копией этой оценки, например для составления
    отчёта за новый год, воспользуйтесь функцией «Дублировать». При дублировании создаётся
    полная копия вашей оценки, которая будет разблокирована.
  sk: Ak chcete pokračovať v práci na kópii tohto hodnotenia, napríklad pre správu
    za nový rok, môžete použiť možnosť 'Duplikovať'. Duplikácia vytvorí úplnú kópiu
    vášho hodnotenia, ktorá bude odomknutá.
  sl: Če želite nadaljevati delo na kopiji te ocene, na primer za poročanje o novem
    letu, lahko uporabite možnost 'Podvoji'. Podvajanje bo ustvarilo popolno kopijo
    vaše ocene, ki bo odklenjena.
  sq: Nëse dëshironi të vazhdoni të punoni në një kopje të këtij vlerësimi, për shembull
    për të raportuar për një vit të ri, atëherë mund të përdorni opsionin 'Dupliko'.
    Duplikimi do të bëjë një kopje të plotë të vlerësimit tuaj e cila do të jetë e
    zhbllokuar.
  sr: Ako želite da nastavite da radite na kopiji ove procene, na primer da izveštavate
    za novu godinu, možete koristiti opciju 'Dupliraj'. Dupliranje će napraviti potpunu
    kopiju vaše procene koja će biti otključana.
  sv: Om du vill fortsätta arbeta med en kopia av denna bedömning, till exempel för
    att rapportera ett nytt år, kan du använda alternativet 'Duplicera'. Duplicering
    skapar en fullständig kopia av din bedömning som kommer att vara olåst.
  uk: Якщо ви хочете продовжити роботу над копією цієї оцінки, наприклад для звіту
    за новий рік, скористайтеся опцією «Дублювати». Дублювання створить повну копію
    вашої оцінки, яка буде розблокована.
message_unlock_ra:
  en: When you unlock this risk assessment, it will loose its validated status. You
    can still request for re-validation at a later time.
  nl: Wanneer u deze risicobeoordeling ontgrendelt, verliest deze zijn gevalideerde
    status. U kunt op een later tijdstip nog steeds een herbevestiging aanvragen.
  fr: Lorsque vous déverrouillez cette évaluation des risques, elle perd son statut
    validé. Vous pouvez toujours demander une reconfirmation à une date ultérieure.
  de: Wenn Sie diese Risikobewertung entsperren, verliert sie ihren validierten Status.
    Sie können zu einem späteren Zeitpunkt immer noch eine Rückbestätigung anfordern.
  bg: Когато отключите тази оценка на риска, тя ще загуби своя валидиран статус. Можете
    все още да поискате повторно валидиране по-късно.
  ca: Quan desbloquegeu aquesta avaluació de riscos, perdrà el seu estat validat.
    Encara podreu sol·licitar una re-validació en un moment posterior.
  cs: Když toto hodnocení rizik odemknete, ztratí svůj ověřený stav. Stále můžete
    požádat o opětovné ověření v pozdějším čase.
  cy: Pan ddatglowch yr asesiad risg hwn, bydd yn colli ei statws dilysiedig. Gallwch
    dal ofyn am ail-ddilysu ar adeg ddiweddarach.
  da: Når du låser denne risikovurdering op, vil den miste sin validerede status.
    Du kan stadig anmode om re-validering på et senere tidspunkt.
  el: Όταν ξεκλειδώσετε αυτή την αξιολόγηση κινδύνου, θα χάσει την επικυρωμένη κατάστασή
    της. Μπορείτε ακόμη να ζητήσετε επανεπικύρωση αργότερα.
  es: Cuando desbloquee esta evaluación de riesgos, perderá su estado validado. Todavía
    puede solicitar una nueva validación en un momento posterior.
  et: Kui avate selle riskihinnangu lukustuse, kaotab see oma kinnitatud staatuse.
    Saate siiski taotleda uuesti kinnitamist hiljem.
  fi: Kun avaat tämän riskiarvioinnin lukituksen, se menettää vahvistetun tilansa.
    Voit silti pyytää uudelleenvalidointia myöhemmin.
  ga: Nuair a dhíghlasálann tú an measúnacht riosca seo, caillfidh sí a stádas bailíochtaithe.
    Is féidir leat fós iarratas a dhéanamh ar athbhailíochtú níos déanaí.
  he: כאשר תבטל את נעילת הערכת הסיכונים הזו, היא תאבד את הסטטוס המאומת שלה. עדיין
    תוכל לבקש אימות מחדש בשלב מאוחר יותר.
  hr: Kada otključate ovu procjenu rizika, izgubiti će status validiranosti. Još uvijek
    možete zatražiti ponovnu validaciju u kasnijem trenutku.
  hu: Amikor feloldja ezt a kockázatértékelést, elveszíti hitelesített állapotát.
    Később még kérheti az újbóli hitelesítést.
  is: Þegar þú opnar þetta áhættumat mun það missa staðfesta stöðu sína. Þú getur
    enn beðið um endurstaðfestingu síðar.
  it: Quando sblocchi questa valutazione del rischio, perderà il suo stato convalidato.
    Puoi comunque richiedere una nuova convalida in un secondo momento.
  lt: Kai atrakinsite šį rizikos vertinimą, jis praras patvirtinto statusą. Vėliau
    vis tiek galite prašyti pakartotinio patvirtinimo.
  lv: Kad atbloķēsiet šo riska novērtējumu, tas zaudēs savu validētā statusu. Jūs
    joprojām varat pieprasīt atkārtotu validāciju vēlāk.
  mt: Meta tiftaħ din il-valutazzjoni tar-riskju, titlef l-istatus ivvalidat tagħha.
    Xorta tista' titlob validazzjoni mill-ġdid f'mument ieħor.
  nl_BE: Wanneer u deze risicobeoordeling ontgrendelt, verliest deze de gevalideerde
    status. U kunt later nog steeds om hervalidatie verzoeken.
  nl_be: Wanneer u deze risicobeoordeling ontgrendelt, verliest deze de gevalideerde
    status. U kunt later nog steeds om hervalidatie verzoeken.
  'no': Når du låser opp denne risikovurderingen, mister den sin validerte status.
    Du kan fortsatt be om ny validering på et senere tidspunkt.
  pl: Po odblokowaniu tej oceny ryzyka utraci ona status zatwierdzonej. Nadal możesz
    złożyć wniosek o ponowne zatwierdzenie w późniejszym czasie.
  pt: Quando desbloquear esta avaliação de risco, ela perderá o seu estado validado.
    Ainda pode solicitar a revalidação num momento posterior.
  ro: Când deblocați această evaluare a riscului, aceasta va pierde statutul de validată.
    Puteți în continuare solicita revalidarea ulterior.
  ru: После разблокировки этой оценки рисков она потеряет статус подтверждённой. Вы
    сможете запросить повторное подтверждение в любое время.
  sk: Keď odomknete toto hodnotenie rizík, stratí svoj overený stav. Môžete stále
    požiadať o opätovné overenie neskôr.
  sl: Ko odklenete to oceno tveganja, bo izgubila potrjen status. Ponovno potrditev
    lahko zahtevate pozneje.
  sq: Kur të zhbllokoni këtë vlerësim rreziku, ai do të humbasë statusin e tij të
    validuar. Ju mund të kërkoni ri-validim në një kohë të mëvonshme.
  sr: Kada otključate ovu procenu rizika, ona će izgubiti validiran status. I dalje
    možete zatražiti ponovnu validaciju u kasnijem trenutku.
  sv: När du låser upp denna riskbedömning kommer den att förlora sin validerade status.
    Du kan fortfarande begära omvalidering vid ett senare tillfälle.
  uk: Коли ви розблокуєте цю оцінку ризиків, вона втратить статус затвердженої. Ви
    зможете надіслати запит на повторне затвердження пізніше.
message_possible_extra_cost:
  nl: Er kunnen extra kosten in rekening gebracht worden door uw adviseur.
  en: Additional costs may be charged by your consultant.
  fr: Des frais supplémentaires peuvent être facturés par votre consultant.
  de: Zusätzliche Kosten können von Ihrem Berater in Rechnung gestellt werden.
  bg: Вашият консултант може да начисли допълнителни разходи.
  ca: El vostre consultor pot cobrar costos addicionals.
  cs: Váš konzultant může účtovat dodatečné náklady.
  cy: Efallai y bydd eich ymgynghorydd yn codi costau ychwanegol.
  da: Din konsulent kan opkræve yderligere omkostninger.
  el: Πρόσθετο κόστος ενδέχεται να χρεωθεί από τον σύμβουλό σας.
  es: Su consultor puede cobrar costos adicionales.
  et: Teie konsultant võib küsida lisatasusid.
  fi: Konsulttisi saattaa veloittaa lisäkustannuksia.
  ga: D'fhéadfadh costais bhreise a ghearradh ag do chomhairleoir.
  he: ייתכן שהיועץ שלך יחייב עלויות נוספות.
  hr: Vaš konzultant može naplatiti dodatne troškove.
  hu: A tanácsadója további díjakat számíthat fel.
  is: Ráðgjafi þinn gæti innheimt viðbótarkostnað.
  it: Il tuo consulente potrebbe addebitare costi aggiuntivi.
  lt: Jūsų konsultantas gali taikyti papildomus mokesčius.
  lv: Jūsu konsultants var piemērot papildu izmaksas.
  mt: Il-konsultant tiegħek jista' jimputa spejjeż addizzjonali.
  nl_BE: Uw consultant kan extra kosten in rekening brengen.
  nl_be: Uw consultant kan extra kosten in rekening brengen.
  'no': Ytterligere kostnader kan bli belastet av din konsulent.
  pl: Twój konsultant może naliczyć dodatkowe opłaty.
  pt: O seu consultor pode cobrar custos adicionais.
  ro: Consultantul dvs. poate percepe costuri suplimentare.
  ru: Ваш консультант может взимать дополнительную плату.
  sk: Váš konzultant môže účtovať dodatočné náklady.
  sl: Vaš svetovalec lahko zaračuna dodatne stroške.
  sq: Konsulenti juaj mund të ngarkojë kosto shtesë.
  sr: Vaš konsultant može naplatiti dodatne troškove.
  sv: Din konsult kan debitera ytterligare kostnader.
  uk: Ваш консультант може стягнути додаткову плату.
message_unlock_and_invalidate_by_consultant:
  de: Sie sind dabei, diese Risikobewertung zu entwerten und zu entsperren. Wenn Sie
    nur einige Korrekturen vornehmen möchten, vergessen Sie nicht, sie erneut zu validieren,
    wenn Sie fertig sind.
  en: You are about to invalidate and unlock this risk assessment. If you only want
    to make some corrections, then don't forget to re-validate when you're ready.
  fr: Vous êtes sur le point d'invalider et de déverrouiller cette évaluation des
    risques. Si vous voulez seulement apporter quelques corrections, n'oubliez pas
    de la revalider lorsque vous êtes prêt.
  he: אתה עומד לבטל ולשחרר את ההערכה הסיכונית הזו. אם אתה רוצה רק לעשות כמה תיקונים,
    אל תשכח לאמת מחדש כאשר אתה מוכן.
  nl: U staat op het punt om deze risicobeoordeling ongeldig te maken en te ontgrendelen.
    Als u slechts enkele correcties wilt aanbrengen, vergeet dan niet opnieuw te valideren
    wanneer u klaar bent.
  bg: Предстои ви да обезсилите и отключите тази оценка на риска. Ако искате само
    да направите някои корекции, не забравяйте да потвърдите отново, когато сте готови.
  ca: Esteu a punt d'invalidar i desbloquejar aquesta avaluació de riscos. Si només
    voleu fer algunes correccions, no oblideu tornar a validar quan estigueu a punt.
  cs: Chystáte se zneplatnit a odemknout toto hodnocení rizik. Pokud chcete pouze
    provést některé opravy, nezapomeňte znovu ověřit, až budete připraveni.
  cy: Rydych ar fin dirymu a datgloi'r asesiad risg hwn. Os mai dim ond gwneud rhai
    cywiriadau yr ydych am ei wneud, peidiwch ag anghofio ail-ddilysu pan fyddwch
    yn barod.
  da: Du er ved at ugyldiggøre og låse denne risikovurdering op. Hvis du kun ønsker
    at foretage nogle rettelser, så glem ikke at genvalidere, når du er klar.
  el: Πρόκειται να ακυρώσετε και να ξεκλειδώσετε αυτήν την αξιολόγηση κινδύνου. Εάν
    θέλετε μόνο να κάνετε ορισμένες διορθώσεις, μην ξεχάσετε να επικυρώσετε εκ νέου
    όταν είστε έτοιμοι.
  es: Está a punto de invalidar y desbloquear esta evaluación de riesgos. Si solo
    desea hacer algunas correcciones, no olvide volver a validar cuando esté listo.
  et: Olete riskihinnangu kehtetuks tunnistamas ja avamas. Kui soovite teha ainult
    mõningaid parandusi, ärge unustage uuesti valideerida, kui olete valmis.
  fi: Olet aikeissa mitätöidä ja avata tämän riskiarvioinnin. Jos haluat vain tehdä
    joitakin korjauksia, muista vahvistaa uudelleen, kun olet valmis.
  ga: Tá tú ar tí an measúnú riosca seo a neamhbhailíú agus a dhíghlasáil. Más mian
    leat roinnt ceartúchán a dhéanamh, ná déan dearmad é a athbhailíú nuair a bheidh
    tú réidh.
  hr: Upravo ćete poništiti i otključati ovu procjenu rizika. Ako samo želite napraviti
    neke ispravke, ne zaboravite ponovo potvrditi kada budete spremni.
  hu: Éppen érvényteleníti és feloldja ezt a kockázatértékelést. Ha csak néhány javítást
    szeretne elvégezni, ne felejtse el újra érvényesíteni, amikor készen áll.
  is: Þú ert að fara að ógilda og opna þessa áhættumat. Ef þú vilt bara gera nokkrar
    leiðréttingar, gleymdu þá ekki að staðfesta aftur þegar þú ert tilbúinn.
  it: Stai per invalidare e sbloccare questa valutazione del rischio. Se vuoi solo
    apportare alcune correzioni, non dimenticare di rivalidare quando sei pronto.
  lt: Jūs ketinate panaikinti ir atrakinti šį rizikos vertinimą. Jei norite tik padaryti
    keletą pataisymų, nepamirškite pakartotinai patvirtinti, kai būsite pasiruošę.
  lv: Jūs gatavojaties anulēt un atbloķēt šo riska novērtējumu. Ja vēlaties tikai
    veikt dažus labojumus, neaizmirstiet atkārtoti validēt, kad būsiet gatavs.
  mt: Inti dalwaqt se tannulla u tiftaħ din il-valutazzjoni tar-riskju. Jekk trid
    biss tagħmel xi korrezzjonijiet, tinsix li terġa' tivvalida meta tkun lest.
  nl_BE: U staat op het punt deze risicobeoordeling ongeldig te maken en te ontgrendelen.
    Als u alleen enkele correcties wilt aanbrengen, vergeet dan niet opnieuw te valideren
    wanneer u klaar bent.
  nl_be: U staat op het punt deze risicobeoordeling ongeldig te maken en te ontgrendelen.
    Als u alleen enkele correcties wilt aanbrengen, vergeet dan niet opnieuw te valideren
    wanneer u klaar bent.
  'no': Du er i ferd med å ugyldiggjøre og låse opp denne risikovurderingen. Hvis
    du bare vil gjøre noen korreksjoner, ikke glem å validere på nytt når du er klar.
  pl: Zamierzasz unieważnić i odblokować tę ocenę ryzyka. Jeśli chcesz tylko wprowadzić
    pewne poprawki, nie zapomnij ponownie zatwierdzić, gdy będziesz gotowy.
  pt: Você está prestes a invalidar e desbloquear esta avaliação de risco. Se desejar
    apenas fazer algumas correções, não se esqueça de revalidar quando estiver pronto.
  ro: Ești pe cale să invalidezi și să deblochezi această evaluare a riscurilor. Dacă
    dorești doar să faci unele corecții, nu uita să revalidezi când ești gata.
  ru: Вы собираетесь аннулировать и разблокировать эту оценку рисков. Если вы хотите
    только внести некоторые исправления, не забудьте повторно подтвердить, когда будете
    готовы.
  sk: Chystáte sa zneplatniť a odomknúť toto hodnotenie rizika. Ak chcete vykonať
    len niektoré opravy, nezabudnite ho znovu overiť, keď budete pripravení.
  sl: Nameravate razveljaviti in odkleniti to oceno tveganja. Če želite le narediti
    nekaj popravkov, ne pozabite znova potrditi, ko boste pripravljeni.
  sq: Jeni duke u përgatitur të pavlefshëm dhe të zhbllokoni këtë vlerësim rreziku.
    Nëse dëshironi të bëni vetëm disa korrigjime, mos harroni të rivalidoni kur të
    jeni gati.
  sr: Nameravate da poništite i otključate ovu procenu rizika. Ako samo želite da
    napravite neke ispravke, ne zaboravite da ponovo potvrdite kada budete spremni.
  sv: Du håller på att ogiltigförklara och låsa upp denna riskbedömning. Om du bara
    vill göra några korrigeringar, glöm inte att omvalidera när du är redo.
  uk: Ви збираєтесь скасувати та розблокувати цю оцінку ризику. Якщо ви хочете лише
    внести деякі виправлення, не забудьте повторно підтвердити, коли будете готові.
message_training:
  fr: 'Note: This is a preview. Please use the power point for training.'
  en: 'Note: This is a preview. Please use the power point for training.'
  nl: 'Opgelet: Dit is een voorvertoning. Gebruik de PowerPoint voor trainingsdoeleinden.'
  de: 'Hinweis: Dies ist eine Vorschau. Zur Unterweisung PowerPoint verwenden.'
  bg: 'Забележка: Това е предварителен преглед. Моля, използвайте PowerPoint за обучение.'
  ca: 'Nota: Aquesta és una vista prèvia. Utilitzeu el PowerPoint per a la formació.'
  cs: 'Poznámka: Toto je náhled. Pro školení prosím použijte PowerPoint.'
  cy: 'Nodyn: Rhagolwg yw hwn. Defnyddiwch y PowerPoint ar gyfer hyfforddiant.'
  da: 'Bemærk: Dette er en forhåndsvisning. Brug venligst PowerPoint til træning.'
  el: 'Σημείωση: Αυτή είναι μια προεπισκόπηση. Παρακαλώ χρησιμοποιήστε το PowerPoint
    για εκπαίδευση.'
  es: 'Nota: Esta es una vista previa. Utilice el PowerPoint para la capacitación.'
  et: 'Märkus: See on eelvaade. Palun kasutage koolituseks PowerPointi.'
  fi: 'Huomio: Tämä on esikatselu. Käytä PowerPointia koulutukseen.'
  ga: 'Nóta: Is réamhamharc é seo. Bain úsáid as an PowerPoint le haghaidh oiliúna.'
  he: 'הערה: זוהי תצוגה מקדימה. אנא השתמש בקובץ PowerPoint להכשרה.'
  hr: 'Napomena: Ovo je pregled. Molimo koristite PowerPoint za obuku.'
  hu: 'Megjegyzés: Ez egy előnézet. Kérjük, a képzéshez használja a PowerPoint fájlt.'
  is: 'Athugasemd: Þetta er forskoðun. Vinsamlegast notaðu PowerPoint fyrir þjálfun.'
  it: 'Nota: questa è un''anteprima. Si prega di utilizzare il PowerPoint per la formazione.'
  lt: 'Pastaba: tai peržiūra. Mokymams naudokite „PowerPoint" pristatymą.'
  lv: 'Piezīme: šis ir priekšskatījums. Lūdzu, izmantojiet PowerPoint prezentāciju
    apmācībai.'
  mt: 'Nota: Din hija previżjoni. Jekk jogħġbok uża l-PowerPoint għat-taħriġ.'
  nl_BE: 'Opmerking: dit is een voorbeeld. Gebruik de PowerPoint-presentatie voor
    de training.'
  nl_be: 'Opmerking: dit is een voorbeeld. Gebruik de PowerPoint-presentatie voor
    de training.'
  'no': 'Merk: Dette er en forhåndsvisning. Bruk PowerPoint til opplæring.'
  pl: 'Uwaga: To jest podgląd. Do szkolenia użyj programu PowerPoint.'
  pt: 'Nota: Esta é uma pré-visualização. Utilize o PowerPoint para formação.'
  ro: 'Notă: Aceasta este o previzualizare. Vă rugăm să utilizați prezentarea PowerPoint
    pentru formare.'
  ru: 'Примечание: это предварительный просмотр. Для обучения используйте файл PowerPoint.'
  sk: 'Poznámka: Toto je náhľad. Prosím, použite PowerPoint na školenie.'
  sl: 'Opomba: To je predogled. Za usposabljanje prosimo uporabite PowerPoint.'
  sq: 'Shënim: Ky është një pamje paraprake. Ju lutemi përdorni PowerPoint për trajnim.'
  sr: 'Napomena: Ovo je pregled. Molimo koristite PowerPoint za obuku.'
  sv: 'Obs: Detta är en förhandsgranskning. Använd PowerPoint för utbildning.'
  uk: 'Примітка: це попередній перегляд. Будь ласка, використовуйте презентацію PowerPoint
    для навчання.'
