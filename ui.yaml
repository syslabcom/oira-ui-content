message_name_is_used_for:
  en: Filling out your names makes for a more personalised user experience for you
    and you co-workers. Your name will appear in automated e-mails and various screens
    throughout the application.
  de: Das Ausfüllen Ihrer Namen sorgt für eine personalisiertere Benutzererfahrung
    für Sie und Ihre Kollegen. Ihr Name erscheint in automatisierten E-Mails und verschiedenen
    Bildschirmen in der gesamten Anwendung.
  fr: Remplir vos noms permet une expérience utilisateur plus personnalisée pour vous
    et vos collègues. Votre nom apparaîtra dans les e-mails automatisés et divers
    écrans tout au long de l'application.
  nl: Het invullen van uw namen zorgt voor een meer gepersonaliseerde gebruikerservaring
    voor u en uw collega's. Uw naam verschijnt in geautomatiseerde e-mails en op verschillende
    schermen in de applicatie.
  bg: Попълването на вашето име прави потребителското изживяване по-персонализирано
    за вас и вашите колеги. Вашето име ще се появява в автоматизирани имейли и на
    различни екрани в приложението.
  ca: Omplir els vostres noms fa que l'experiència d'usuari sigui més personalitzada
    per a vosaltres i els vostres companys de feina. El vostre nom apareixerà en correus
    electrònics automatitzats i a diverses pantalles de l'aplicació.
  cs: Vyplnění vašich jmen zajišťuje personalizovanější uživatelský zážitek pro vás
    a vaše spolupracovníky. Vaše jméno se zobrazí v automatizovaných e-mailech a na
    různých obrazovkách v celé aplikaci.
  cy: Mae llenwi eich enwau yn creu profiad defnyddiwr mwy personol i chi a'ch cydweithwyr.
    Bydd eich enw yn ymddangos mewn e-byst awtomataidd a sgriniau amrywiol drwy'r
    cais.
  da: At udfylde dine navne giver en mere personlig brugeroplevelse for dig og dine
    kolleger. Dit navn vil fremgå af automatiserede e-mails og forskellige skærmbilleder
    i hele applikationen.
  el: Η συμπλήρωση των ονομάτων σας δημιουργεί μια πιο εξατομικευμένη εμπειρία χρήστη
    για εσάς και τους συναδέλφους σας. Το όνομά σας θα εμφανίζεται σε αυτοματοποιημένα
    μηνύματα ηλεκτρονικού ταχυδρομείου και σε διάφορες οθόνες σε όλη την εφαρμογή.
  es: Completar sus nombres crea una experiencia de usuario más personalizada para
    usted y sus compañeros de trabajo. Su nombre aparecerá en correos electrónicos
    automatizados y en varias pantallas de la aplicación.
  et: Nimede sisestamine loob teie ja teie kaastöötajate jaoks personaalsema kasutajakogemuse.
    Teie nimi kuvatakse automaatsetes e-kirjades ja erinevatel ekraanidel kogu rakenduses.
  fi: Nimien täyttäminen luo sinulle ja työtovereillesi henkilökohtaisemman käyttökokemuksen.
    Nimesi näkyy automaattisissa sähköposteissa ja eri näytöissä koko sovelluksessa.
  ga: Trí do chuid ainmneacha a líonadh isteach, cruthaítear taithí níos pearsantaithe
    d'úsáideoir duit féin agus do do chomhghleacaithe. Beidh d'ainm le feiceáil i
    ríomhphoist uathoibrithe agus ar scáileáin éagsúla ar fud an fheidhmchláir.
  he: מילוי שמך יוצר חוויית משתמש מותאמת אישית יותר עבורך ועבור עמיתיך לעבודה. שמך
    יופיע בהודעות דוא"ל אוטומטיות ובמסכים שונים לאורך היישום.
  hr: Ispunjavanje vaših imena stvara personaliziranije korisničko iskustvo za vas
    i vaše kolege. Vaše ime pojavit će se u automatiziranim e-porukama i na raznim
    zaslonima unutar aplikacije.
  hu: A nevek megadása személyre szabottabb felhasználói élményt nyújt Önnek és munkatársainak.
    Az Ön neve megjelenik az automatikus e-mailekben és az alkalmazás különböző képernyőin.
  is: Að fylla út nöfnin þín skapar persónulegra notendaupplifun fyrir þig og vinnufélaga
    þína. Nafnið þitt mun birtast í sjálfvirkum tölvupóstum og á ýmsum skjáum í gegnum
    forritið.
  it: Compilare i propri nomi crea un'esperienza utente più personalizzata per te
    e i tuoi colleghi. Il tuo nome apparirà nelle e-mail automatizzate e in varie
    schermate dell'applicazione.
  'no': Å fylle inn navnene dine gir en mer personlig brukeropplevelse for deg og
    dine medarbeidere. Navnet ditt vil vises i automatiserte e-poster og ulike skjermbilder
    i applikasjonen.
  pl: Wypełnienie swoich danych personalnych zapewnia bardziej spersonalizowane doświadczenie
    użytkownika dla Ciebie i Twoich współpracowników. Twoje imię i nazwisko będzie
    wyświetlane w automatycznych wiadomościach e-mail i na różnych ekranach aplikacji.
  pt: Preencher os seus nomes proporciona uma experiência de utilizador mais personalizada
    para si e para os seus colegas de trabalho. O seu nome aparecerá em e-mails automáticos
    e em vários ecrãs da aplicação.
  ro: Completarea numelor dvs. oferă o experiență de utilizator mai personalizată
    pentru dvs. și colegii dvs. Numele dvs. va apărea în e-mailurile automate și pe
    diverse ecrane din aplicație.
  ru: Заполнение своих имён обеспечивает более персонализированный пользовательский
    опыт для вас и ваших коллег. Ваше имя будет отображаться в автоматических электронных
    письмах и на различных экранах приложения.
  sk: Vyplnenie vašich mien umožňuje personalizovanejší používateľský zážitok pre
    vás a vašich spolupracovníkov. Vaše meno sa bude zobrazovať v automatických e-mailoch
    a na rôznych obrazovkách v celej aplikácii.
  sl: Izpolnitev vaših imen ustvari bolj personalizirano uporabniško izkušnjo za vas
    in vaše sodelavce. Vaše ime bo prikazano v avtomatiziranih e-poštnih sporočilih
    in na različnih zaslonih v celotni aplikaciji.
  sq: Plotësimi i emrave tuaj krijon një përvojë më të personalizuar për ju dhe bashkëpunëtorët
    tuaj. Emri juaj do të shfaqet në e-mailet automatike dhe në ekrane të ndryshme
    në të gjithë aplikacionin.
  sr: Popunjavanje vaših imena omogućava personalizovanije korisničko iskustvo za
    vas i vaše saradnike. Vaše ime će se pojavljivati u automatskim e-porukama i na
    različitim ekranima u celoj aplikaciji.
  sv: Att fylla i dina namn ger en mer personlig användarupplevelse för dig och dina
    medarbetare. Ditt namn visas i automatiska e-postmeddelanden och på olika skärmar
    i hela applikationen.
  uk: Заповнення вашого імені забезпечує більш персоналізований досвід для вас та
    ваших колег. Ваше ім'я буде відображатися в автоматичних електронних листах та
    на різних екранах у програмі.
  lt: Įvedus vardus, jūs ir jūsų kolegos galėsite naudotis labiau suasmeninta vartotojo
    patirtimi. Jūsų vardas bus rodomas automatiniuose el. laiškuose ir įvairiuose
    programos ekranuose.
  lv: Ievadot savus vārdus, jūs un jūsu kolēģi baudīs personalizētāku lietotāja pieredzi.
    Jūsu vārds parādīsies automatizētajos e-pastos un dažādos ekrānos visā lietotnē.
  mt: Il-mili tal-ismijiet tiegħek jagħmel esperjenza ta' utent aktar personalizzata
    għalik u għall-kollegi tiegħek. Ismek jidher fl-e-mails awtomatiċi u f'diversi
    skhermi fl-applikazzjoni.
  nl_BE: Het invullen van uw namen zorgt voor een meer gepersonaliseerde gebruikerservaring
    voor u en uw collega's. Uw naam verschijnt in geautomatiseerde e-mails en op verschillende
    schermen in de applicatie.
  nl_be: Het invullen van uw namen zorgt voor een meer gepersonaliseerde gebruikerservaring
    voor u en uw collega's. Uw naam verschijnt in geautomatiseerde e-mails en op verschillende
    schermen in de applicatie.
