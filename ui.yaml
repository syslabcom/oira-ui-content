message_assessment_state_will_change_to_documents_sent:
  de: Der Status dieser GBU ändert sich von “In Bearbeitung” zu “Einweisung versendet”.
    Die GBU wird dadurch gesperrt, so dass keine Änderungen mehr möglich sind.
  en: The state of the risk assessment will change from "In progress" to “Briefing
    documents sent”. The risk assessment will be locked at this point, to prevent
    any futher changes.
  fr: L'état de l'évaluation des risques passera de "En cours" à "Documents d'information
    envoyés". L'évaluation des risques sera verrouillée à ce stade, afin d'empêcher
    toute modification ultérieure.
  bg: Състоянието на оценката на риска ще се промени от "В процес" на "Брифинг документите
    са изпратени". Оценката на риска ще бъде заключена в този момент, за да се предотвратят
    по-нататъшни промени.
  ca: L'estat de l'avaluació de riscos canviarà de "En curs" a "Documents de briefing
    enviats". L'avaluació de riscos quedarà bloquejada en aquest punt per evitar canvis
    addicionals.
  cs: Stav hodnocení rizik se změní z "Probíhá" na "Dokumenty k briefingu odeslány".
    Hodnocení rizik bude v tomto okamžiku uzamčeno, aby se zabránilo dalším změnám.
  cy: Bydd cyflwr yr asesiad risg yn newid o "Ar y gweill" i "Dogfennau briffio wedi'u
    hanfon". Bydd yr asesiad risg yn cael ei gloi ar y pwynt hwn, i atal unrhyw newidiadau
    pellach.
  da: Risikovurderingens tilstand vil ændre sig fra "I gang" til "Briefingdokumenter
    sendt". Risikovurderingen vil blive låst på dette tidspunkt for at forhindre yderligere
    ændringer.
  el: Η κατάσταση της εκτίμησης κινδύνου θα αλλάξει από "Σε εξέλιξη" σε "Έγγραφα ενημέρωσης
    εστάλησαν". Η εκτίμηση κινδύνου θα κλειδωθεί σε αυτό το σημείο, για να αποφευχθούν
    τυχόν περαιτέρω αλλαγές.
  es: El estado de la evaluación de riesgos cambiará de "En curso" a "Documentos de
    presentación enviados". La evaluación de riesgos se bloqueará en este punto para
    evitar cualquier cambio adicional.
  et: Riskihinnangu olek muutub "Käimasolev" olekust "Brifingudokumendid saadetud"
    olekusse. Riskhinnang lukustatakse sel hetkel, et vältida edasisi muudatusi.
  fi: Riskiarvioinnin tila muuttuu "Käynnissä" tilasta "Tiedotusasiakirjat lähetetty"
    tilaan. Riskiarviointi lukitaan tässä vaiheessa mahdollisten lisämuutosten estämiseksi.
  ga: Athrófar staid na measúnachta riosca ó "Ar siúl" go "Doiciméid achoimre seolta".
    Cuirfear glas ar an measúnacht riosca ag an bpointe seo chun aon athruithe breise
    a chosc.
  he: מצב הערכת הסיכונים ישתנה מ-"בתהליך" ל-"מסמכי תדריך נשלחו". הערכת הסיכונים תינעל
    בשלב זה, למניעת כל שינוי נוסף.
  hr: Stanje procjene rizika promijenit će se s "U tijeku" na "Dokumenti o uvođenju
    poslani". Procjena rizika bit će zaključana u ovoj točki kako bi se spriječile
    daljnje izmjene.
  hu: A kockázatértékelés állapota "Folyamatban" értékről "Tájékoztató dokumentumok
    elküldve" értékre változik. A kockázatértékelés ezen a ponton zárolásra kerül,
    hogy megakadályozza a további módosításokat.
  is: Staða áhættumatssins mun breytast frá "Í gangi" í "Kynningargögn send". Áhættumatið
    verður læst á þessum tímapunkti til að koma í veg fyrir frekari breytingar.
  it: Lo stato della valutazione del rischio cambierà da "In corso" a "Documenti di
    briefing inviati". La valutazione del rischio verrà bloccata in questo momento
    per impedire ulteriori modifiche.
  lt: Rizikos vertinimo būsena pasikeis iš "Vykdoma" į "Informaciniai dokumentai išsiųsti".
    Šiuo momentu rizikos vertinimas bus užrakintas, kad nebūtų galima atlikti jokių
    papildomų pakeitimų.
  lv: Riska novērtējuma statuss mainīsies no "Notiek" uz "Instruktāžas dokumenti nosūtīti".
    Šajā brīdī riska novērtējums tiks bloķēts, lai novērstu turpmākas izmaiņas.
  mt: L-istat tal-valutazzjoni tar-riskju se jinbidel minn "In progress" għal "Dokumenti
    ta' briefing mibgħuta". Il-valutazzjoni tar-riskju se tiġi msakkra f'dan il-punt,
    biex jiġu evitati aktar bidliet.
  nl: De status van de risicobeoordeling verandert van "In uitvoering" naar "Briefingdocumenten
    verzonden". De risicobeoordeling wordt op dit punt vergrendeld om verdere wijzigingen
    te voorkomen.
  nl_BE: De status van de risicobeoordeling verandert van "In uitvoering" naar "Briefingdocumenten
    verzonden". De risicobeoordeling wordt op dit punt vergrendeld om verdere wijzigingen
    te voorkomen.
  nl_be: De status van de risicobeoordeling zal veranderen van "In uitvoering" naar
    "Briefingdocumenten verzonden". De risicobeoordeling wordt op dit punt vergrendeld
    om verdere wijzigingen te voorkomen.
  'no': Statusen til risikovurderingen vil endres fra "Pågående" til "Orienteringsdokumenter
    sendt". Risikovurderingen vil bli låst på dette tidspunktet for å forhindre ytterligere
    endringer.
  pl: Stan oceny ryzyka zmieni się z "W trakcie" na "Dokumenty briefingowe wysłane".
    Ocena ryzyka zostanie zablokowana w tym momencie, aby zapobiec dalszym zmianom.
  pt: O estado da avaliação de risco mudará de "Em progresso" para "Documentos de
    briefing enviados". A avaliação de risco será bloqueada neste ponto para evitar
    quaisquer alterações futuras.
  ro: Starea evaluării riscurilor se va schimba din "În desfășurare" în "Documente
    de informare trimise". Evaluarea riscurilor va fi blocată în acest moment pentru
    a preveni orice modificări ulterioare.
  ru: Статус оценки рисков изменится с "В процессе" на "Инструктивные документы отправлены".
    На этом этапе оценка рисков будет заблокирована, чтобы предотвратить дальнейшие
    изменения.
  sk: Stav hodnotenia rizík sa zmení z "Prebieha" na "Informačné dokumenty odoslané".
    V tomto bode bude hodnotenie rizík uzamknuté, aby sa zabránilo ďalším zmenám.
  sl: Stanje ocene tveganja se bo spremenilo iz "V teku" v "Informativni dokumenti
    poslani". Ocena tveganja bo v tej točki zaklenjena, da se preprečijo nadaljnje
    spremembe.
  sq: Gjendja e vlerësimit të rrezikut do të ndryshojë nga "Në progres" në "Dokumentet
    e orientimit të dërguar". Vlerësimi i rrezikut do të bllokohet në këtë pikë, për
    të parandaluar ndryshime të mëtejshme.
  sr: Status procene rizika će se promeniti sa "U toku" na "Brifing dokumenti poslati".
    Procena rizika će biti zaključana u ovoj tački, kako bi se sprečile dalje promene.
  sv: Statusen för riskbedömningen ändras från "Pågående" till "Informationsdokument
    skickade". Riskbedömningen låses vid detta tillfälle för att förhindra ytterligare
    ändringar.
  uk: Статус оцінки ризиків зміниться з "В процесі" на "Інформаційні документи надіслано".
    На цьому етапі оцінка ризиків буде заблокована, щоб запобігти будь-яким подальшим
    змінам.
