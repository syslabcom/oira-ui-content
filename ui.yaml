  sq: Ky vlerësim rreziku është i bllokuar sepse dokumentet e informimit ishin dërguar
    dhe miratuar tashmë nga kontraktori.
  sr: Ova procena rizika je zaključana jer su dokumenti za brifing već poslati i odobreni
