  lt: 'Jūs ketinate atrakinti rizikos vertinimą <strong>"Einweisung Fremdfirmen: Reinigungskräfte"</strong>.'
  lv: 'Jūs gatavojaties atbloķēt riska novērtējumu <strong>"Einweisung Fremdfirmen: Reinigungskräfte"</strong>.'
  mt: 'Int se tiftaħ il-valutazzjoni tar-riskju <strong>"Einweisung Fremdfirmen: Reinigungskräfte"</strong>.'
  nl: 'U staat op het punt de risicobeoordeling <strong>"Einweisung Fremdfirmen: Reinigungskräfte"</strong> te ontgrendelen.'
  nl_BE: 'U staat op het punt de risicobeoordeling <strong>„Einweisung Fremdfirmen: Reinigungskräfte“</strong> te ontgrendelen.'
  nl_be: 'U staat op het punt de risicobeoordeling <strong>„Einweisung Fremdfirmen: Reinigungskräfte“</strong> te ontgrendelen.'
  'no': 'Du er i ferd med å låse opp risikovurderingen <strong>„Einweisung Fremdfirmen: Reinigungskräfte“</strong>.'
  pl: 'Zamierzasz odblokować ocenę ryzyka <strong>„Einweisung Fremdfirmen: Reinigungskräfte“</strong>.'
