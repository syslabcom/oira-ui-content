  hu: fel kell sorolni a különböző üzletágakat, vagy fiókokat, üzleteket stb. Ezek a kapcsolódó kockázatok minden megadott névnél megismétlődnek.
  is: Teldu upp rekstrareiningar, s.s. útibú eða verslanir o.s.frv. Forritið býr til áhættuflokka, sem verða endurteknir fyrir hverja einingu sem þú hefur valið.
  it: In caso di più attività/siti/unità produttive, elencarli singolarmente utilizzando l’apposito “comando”
  lt: nurodyti padalinius, filialus, parduotuves ar kt. Susijusios rizikos bus kartojamos kiekvienam įvestam pavadinimui.
  lv: Norādīt vairākas uzņēmuma struktūrvienības, filiāles, veikalus u.c. Šie saistītie riski tiks atkārtoti katram jūsu ievadītajam nosaukumam.
  mt: elenka unitajiet kummerċjali, fergħat, ħwienet eċċ. multipli. Dawn ir-riskji relatati jiġu ripetuti għal kull isem li daħħalt.
  nl: meerdere bedrijfseenheden, filialen, winkels in te vullen als u die wilt meenemen in deze inventarisatie. De gerelateerde risico's zullen worden herhaald voor elke naam die u hebt ingevoerd.
  nl_BE: meerdere bedrijfseenheden, filialen, winkels, enz. op te sommen. Deze gerelateerde risico's zullen worden herhaald voor elke naam die u hebt ingevoerd.
  nl_be: meerdere bedrijfsonderdelen, vestigingen, winkels enz. vermelden. De gerelateerde risico's worden herhaald voor elke ingevoerde naam.
  'no': liste opp flere forretningsenheter, filialer, butikker osv. Disse relaterte risikoene vil bli gjentatt for hvert navn du har skrevet inn.
  pl: wymienić wiele jednostek biznesowych, oddziałów, sklepów itp. Te powiązane ryzyka będą powtarzane dla każdej wprowadzonej nazwy.
  pt: listar unidades empresariais múltiplas, ramos ou departamentos, etc. Estes riscos relacionados serão repetidos para cada nome introduzido.
  ro: listați mai multe unități de afaceri, sucursale, magazine etc. Aceste riscuri conexe vor fi repetate pentru fiecare nume introdus.
  ru: перечислить несколько бизнес-единиц, филиалов, магазинов и т. д. Связанные риски будут повторяться для каждого введённого вами названия.
  sk: Uviedli zoznam viacerých obchodných jednotiek alebo pobočiek, prípadne predajní atď. Tieto súvisiace riziká sa zopakujú pre každý názov, ktorý zadáte.
  sl: prikaži več poslovnih enot, panog, trgovin itd. Ta povezana tveganja se bodo ponovila pri vsakem vnesenem imenu.
  sq: listoni njësi të shumta biznesi, ose degë, ose dyqane, etj. Këto rreziqe të lidhura do të përsëriten për çdo emër që keni futur.
  sr: navedite više poslovnih jedinica, ili filijala, ili prodavnica, itd. Ovi povezani rizici biće ponovljeni za svako ime koje ste uneli.
  sv: lista flera affärsenheter, eller filialer, eller butiker, etc. Dessa relaterade risker kommer att upprepas för varje namn du har angett.
  uk: перерахуйте кілька бізнес-одиниць, або філій, або магазинів тощо. Ці пов'язані ризики будуть повторені для кожного введеного вами імені.
explanation_briefing_documents:
