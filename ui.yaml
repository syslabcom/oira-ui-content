describe_new_measure:
  bg: Опишете мярка, която вече е въведена, но все още не е включена тук.
  ca: Descriviu una mesura ja implementada però no inclosa aquí
  cs: Popište opatření, které je již zavedeno, ale ještě zde není uvedeno.
  de: Beschreiben Sie hier eine bereits bestehende Schutzmaßnahme, die noch nicht
    aufgelistet ist.
  el: Περιγράψτε ένα μέτρο που εφαρμόζεται ήδη αλλά δεν αναφέρεται ακόμη εδώ.
  en: Describe a measure that is already in place but not yet listed here.
  es: Describir una medida que ya existe pero que todavía no se ha incluido aquí.
  fi: Kuvaile toimenpide, joka on jo käytössä mutta jota ei vielä ole lueteltu täällä.
  fr: Décrivez une mesure déjà en place qui ne serait pas listé ci-dessus.
  hr: Opišite mjeru koja je već uvedena, no još se ne nalazi na ovom popisu.
  hu: Adja meg az intézkedést ami már érvényben van, de nem tartalmazza a felsorolás.
  is: Lýsið hér ráðstöfun til úrbóta sem þegar er í framkvæmd, en ekki áður talin
    upp
  it: Descrivi una misura che è già stata attuata ma non è presente in elenco
  lt: Aprašyti jau įdiegtą, bet čia nenurodytą priemonę.
  lv: Aprakstiet pasākumu, kas jau tiek īstenots, bet vēl nav norādīts šeit.
  mt: Iddeskrivi miżura li hija diġà fis-seħħ iżda li għadha mhix elenkata hawn.
  nl: Beschrijf een maatregel die reeds van kracht is maar hier nog niet wordt vermeld.
  nl_BE: Beschrijf een maatregel die reeds van kracht is maar hier nog niet wordt
    vermeld.
  'no': Beskriv et tiltak som allerede er på plass, men som ikke er oppført her.
  pt: Descreva uma medida que já esteja em vigor, mas que ainda não conste da lista.
  sk: Opíšte opatrenie, ktoré je už zavedené, ale ešte nie je uvedené v zozname.
  sl: Opiši ukrep, ki je že vzpostavljen, vendar tu še ni naveden.
  cy: Disgrifiwch fesur sydd eisoes ar waith ond heb ei restru yma eto.
  da: Beskriv en foranstaltning, der allerede er på plads, men som endnu ikke er anført
    her.
  et: Kirjeldage meedet, mis on juba olemas, kuid mida siin veel loetletud ei ole.
  ga: Déan cur síos ar bheart atá i bhfeidhm cheana féin ach nach bhfuil liostaithe
    anseo go fóill.
  he: תאר אמצעה שכבר קיימת אך טרם מופיעה כאן.
  nl_be: Beschrijf een maatregel die al van kracht is maar hier nog niet is vermeld.
  pl: Opisz środek, który jest już wdrożony, ale nie jest jeszcze tutaj wymieniony.
  ro: Descrieți o măsură care este deja în vigoare, dar care nu este încă listată
    aici.
  ru: Опишите меру, которая уже действует, но ещё не указана здесь.
  sq: Përshkruani një masë që është tashmë në vend por ende nuk është listuar këtu.
  sr: Opišite meru koja je već na mestu, ali još nije navedena ovde.
  sv: Beskriv en åtgärd som redan är på plats men ännu inte listad här.
  uk: Опишіть захід, який вже застосовується, але ще не вказаний тут.
