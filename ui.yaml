  pt: Esta avaliação de risco está bloqueada porque os documentos de briefing já foram enviados ao empreiteiro.
  ro: Această evaluare de risc este blocată deoarece documentele de informare au fost deja trimise contractantului.
  ru: Эта оценка рисков заблокирована, так как инструктажные документы уже были отправлены подрядчику.
  sk: Toto hodnotenie rizík je uzamknuté, pretože informačné dokumenty boli už odoslané zhotoviteľovi.
  sl: Ta ocena tveganja je zaklenjena, ker so bila informativna gradiva že poslana izvajalcu.
  sq: Ky vlerësim rreziku është i bllokuar sepse dokumentet e informimit ishin dërguar tashmë te kontraktori.
  sr: Ova procena rizika je zaključana jer su dokumenti za brifing već poslati izvođaču.
  sv: Den här riskbedömningen är låst eftersom informationsdokumenten redan har skickats till entreprenören.
  uk: Ця оцінка ризику заблокована, оскільки інструктивні документи вже були надіслані підряднику.
