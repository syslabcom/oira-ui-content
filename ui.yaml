  sl: V to polje vnesite vse morebitne opombe glede zgoraj navedenega, identificiranega tveganja. Te opombe bodo upoštevane v akcijskem načrtu.
  sq: Këto shënime do të jenë të dukshme në raport dhe trajnim. Përdoreni për çdo gjë tjetër që mund të dëshironi të shkruani për këtë rrezik.
  sr: Ove napomene će biti vidljive u izveštaju i obuci. Koristite ih za sve ostalo što biste mogli da napišete o ovom riziku.
