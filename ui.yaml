message_find_consultant:
  en: Find an OSH consultant you want to contact or add to your organisation to provide
    support.
  fr: Trouvez un consultant OSH que vous souhaitez contacter ou ajouter à votre organisation
    pour vous apporter un soutien.
  de: Finden Sie einen OSH-Berater, den Sie kontaktieren oder zu Ihrer Organisation
    hinzufügen möchten, um Unterstützung zu leisten.
  nl: Zoek een OSH-adviseur waarmee u contact wilt opnemen of die u aan uw organisatie
    wilt toevoegen om ondersteuning te bieden.
  'no': Finn en HMS-konsulent du ønsker å kontakte eller legge til i din organisasjon
    for å gi støtte.
  pl: Znajdź konsultanta BHP, z którym chcesz się skontaktować lub dodaj go do swojej
    organizacji, aby udzielał wsparcia.
  pt: Encontre um consultor de SST que deseja contatar ou adicionar à sua organização
    para fornecer suporte.
  ro: Găsiți un consultant SSM pe care doriți să îl contactați sau să îl adăugați
    în organizația dvs. pentru a oferi asistență.
  ru: Найдите консультанта по ОТ, с которым хотите связаться или которого хотите добавить
    в свою организацию для оказания поддержки.
  uk: Знайдіть консультанта з ОП, з яким хочете зв'язатися або якого хочете додати
    до своєї організації для надання підтримки.
  bg: Намерете консултант по OSH, с когото искате да се свържете или да добавите към
    вашата организация, за да осигурите поддръжка.
  ca: Trobeu un consultor d'OSH amb qui vulgueu contactar o afegir a la vostra organització
    per proporcionar suport.
  cs: Najděte konzultanta OSH, se kterým chcete navázat kontakt nebo ho přidat do
    své organizace, aby poskytoval podporu.
  cy: Dewch o hyd i ymgynghorydd OSH yr hoffech gysylltu ag ef neu ei ychwanegu at
    eich sefydliad i ddarparu cymorth.
  da: Find en OSH-konsulent, som du vil kontakte eller tilføje til din organisation
    for at yde support.
  el: Βρείτε έναν σύμβουλο OSH με τον οποίο θέλετε να επικοινωνήσετε ή να τον προσθέσετε
    στον οργανισμό σας για να παρέχει υποστήριξη.
  es: Encuentre un consultor de OSH con el que desee ponerse en contacto o añadir
    a su organización para brindar apoyo.
  et: Leidke OSH-konsultant, kellega soovite ühendust võtta või keda soovite lisada
    oma organisatsiooni toe pakkumiseks.
  fi: Etsi OSH-konsultti, johon haluat ottaa yhteyttä tai lisätä organisaatioosi tuen
    tarjoamiseksi.
  ga: Aimsigh comhairleoir OSH ar mhaith leat teagmháil a dhéanamh leis nó é a chur
    le d'eagraíocht chun tacaíocht a sholáthar.
  he: מצא יועץ בריאות ובטיחות תעסוקתית שברצונך ליצור איתו קשר או להוסיף לארגון שלך
    לצורך מתן תמיכה.
  hr: Pronađite konzultanta za ZNR s kojim želite stupiti u kontakt ili ga dodati
    u svoju organizaciju radi pružanja podrške.
  hu: Keressen munkavédelmi tanácsadót, akivel kapcsolatba szeretne lépni, vagy akit
    hozzá szeretne adni szervezetéhez a támogatás nyújtása érdekében.
  is: Finndu OSH ráðgjafa sem þú vilt hafa samband við eða bæta við stofnunina þína
    til að veita stuðning.
  it: Trova un consulente SSL che desideri contattare o aggiungere alla tua organizzazione
    per fornire supporto.
  lt: Raskite OSH konsultantą, su kuriuo norite susisiekti arba kurį norite pridėti
    prie savo organizacijos pagalbai teikti.
  lv: Atrodiet OSH konsultantu, ar kuru vēlaties sazināties vai pievienot savai organizācijai,
    lai sniegtu atbalstu.
  mt: Sib konsulent OSH li trid tikkuntattja jew żid mal-organizzazzjoni tiegħek biex
    tipprovdi appoġġ.
  nl_BE: Zoek een OSH-consulent die u wilt contacteren of toevoegen aan uw organisatie
    om ondersteuning te bieden.
  nl_be: Zoek een OSH-consulent die u wilt contacteren of toevoegen aan uw organisatie
    om ondersteuning te bieden.
  sk: Nájdite konzultanta BOZP, ktorého chcete kontaktovať alebo pridať do svojej
    organizácie na poskytovanie podpory.
  sl: Poiščite svetovalca za varnost in zdravje pri delu, s katerim se želite stopiti
    v stik ali ga dodati svoji organizaciji za zagotavljanje podpore.
  sq: Gjeni një konsulent të SSP-së me të cilin dëshironi të kontaktoni ose ta shtoni
    në organizatën tuaj për të ofruar mbështetje.
  sr: Pronađite OHS konsultanta kojeg želite kontaktirati ili dodati svojoj organizaciji
    radi pružanja podrške.
  sv: Hitta en OSH-konsult som du vill kontakta eller lägga till i din organisation
    för att erbjuda stöd.
message_member_see_all:
  en: Members can view and edit all risk assessments of the organisation.
  fr: Les membres peuvent afficher et modifier toutes les évaluations des risques
    de l'organisation.
  de: Mitglieder können alle Risikobewertungen der Organisation einsehen und bearbeiten.
  nl: Leden kunnen alle risicobeoordelingen van de organisatie bekijken en bewerken.
  'no': Medlemmer kan se og redigere alle risikovurderinger i organisasjonen.
  pl: Członkowie mogą przeglądać i edytować wszystkie oceny ryzyka w organizacji.
  pt: Os membros podem visualizar e editar todas as avaliações de risco da organização.
  ro: Membrii pot vizualiza și edita toate evaluările de risc ale organizației.
  ru: Участники могут просматривать и редактировать все оценки рисков организации.
  uk: Члени можуть переглядати та редагувати всі оцінки ризиків організації.
  bg: Членовете могат да преглеждат и редактират всички оценки на риска на организацията.
  ca: Els membres poden veure i editar totes les avaluacions de riscos de l'organització.
  cs: Členové mohou zobrazovat a upravovat všechna hodnocení rizik organizace.
  cy: Gall aelodau weld a golygu holl asesiadau risg y sefydliad.
  da: Medlemmer kan se og redigere alle risikovurderinger for organisationen.
  el: Τα μέλη μπορούν να προβάλλουν και να επεξεργάζονται όλες τις εκτιμήσεις κινδύνου
    του οργανισμού.
  es: Los miembros pueden ver y editar todas las evaluaciones de riesgos de la organización.
  et: Liikmed saavad vaadata ja muuta kõiki organisatsiooni riskihinnanguid.
  fi: Jäsenet voivat tarkastella ja muokata kaikkia organisaation riskiarviointeja.
  ga: Is féidir le comhaltaí gach measúnú riosca den eagraíocht a fheiceáil agus a
    chur in eagar.
  he: חברים יכולים לצפות ולערוך את כל הערכות הסיכון של הארגון.
  hr: Članovi mogu pregledavati i uređivati sve procjene rizika organizacije.
  hu: A tagok megtekinthetik és szerkeszthetik a szervezet összes kockázatértékelését.
  is: Meðlimir geta skoðað og breytt öllum áhættumatum stofnunarinnar.
  it: I membri possono visualizzare e modificare tutte le valutazioni dei rischi dell'organizzazione.
  lt: Nariai gali peržiūrėti ir redaguoti visus organizacijos rizikos vertinimus.
  lv: Dalībnieki var skatīt un rediģēt visus organizācijas riska novērtējumus.
  mt: Il-membri jistgħu jara u jeditaw il-valutazzjonijiet tar-riskju kollha tal-organizzazzjoni.
  nl_BE: Leden kunnen alle risicobeoordelingen van de organisatie bekijken en bewerken.
  nl_be: Leden kunnen alle risicobeoordelingen van de organisatie bekijken en bewerken.
  sk: Členovia môžu zobrazovať a upravovať všetky hodnotenia rizík organizácie.
  sl: Člani si lahko ogledajo in urejajo vse ocene tveganja organizacije.
  sq: Anëtarët mund të shikojnë dhe modifikojnë të gjitha vlerësimet e rreziqeve të
    organizatës.
  sr: Članovi mogu pregledati i uređivati sve procene rizika organizacije.
  sv: Medlemmar kan visa och redigera alla riskbedömningar i organisationen.
message_help_system_language:
  en: The system language is the language of buttons, menus and other controls. The
    language of your content or of the tools you use, do not change with this setting.
  nl: De systeemtaal is de taal van knoppen, menu's en andere bedieningselementen.
    De taal van uw inhoud of van de tools die u gebruikt, verandert niet met deze
    instelling.
  fr: La langue du système est la langue des boutons, des menus et des autres commandes.
    La langue de votre contenu ou des outils que vous utilisez ne change pas avec
    ce paramètre.
  de: Die Systemsprache ist die Sprache der Schaltflächen, Menüs und anderer Bedienelemente.
    Die Sprache Ihrer Inhalte oder der von Ihnen verwendeten Tools ändert sich mit
    dieser Einstellung nicht.
  'no': Systemspråket er språket for knapper, menyer og andre kontroller. Språket
    i innholdet ditt eller i verktøyene du bruker, endres ikke med denne innstillingen.
  pl: Język systemowy to język przycisków, menu i innych elementów sterujących. Język
    treści ani narzędzi, których używasz, nie zmienia się wraz z tym ustawieniem.
  pt: O idioma do sistema é o idioma dos botões, menus e outros controles. O idioma
    do seu conteúdo ou das ferramentas que você usa não muda com esta configuração.
  ro: Limba sistemului este limba butoanelor, meniurilor și altor controale. Limba
    conținutului dvs. sau a instrumentelor pe care le utilizați nu se modifică odată
    cu această setare.
  ru: Язык системы — это язык кнопок, меню и других элементов управления. Язык вашего
    контента или используемых инструментов не изменяется вместе с этой настройкой.
  uk: Мова системи — це мова кнопок, меню та інших елементів керування. Мова вашого
    вмісту або інструментів, якими ви користуєтеся, не змінюється з цим налаштуванням.
  bg: Системният език е езикът на бутоните, менютата и другите елементи за управление.
    Езикът на вашето съдържание или на инструментите, които използвате, не се променя
    с тази настройка.
  ca: L'idioma del sistema és l'idioma dels botons, menús i altres controls. L'idioma
    del vostre contingut o de les eines que utilitzeu no canvia amb aquesta configuració.
  cs: Systémový jazyk je jazyk tlačítek, nabídek a dalších ovládacích prvků. Jazyk
    vašeho obsahu nebo nástrojů, které používáte, se tímto nastavením nemění.
  cy: Iaith y system yw iaith botymau, dewislenni a rheolaethau eraill. Nid yw iaith
    eich cynnwys na'r offer a ddefnyddiwch yn newid gyda'r gosodiad hwn.
  da: Systemsproget er sproget for knapper, menuer og andre kontrolelementer. Sproget
    for dit indhold eller de værktøjer, du bruger, ændres ikke med denne indstilling.
  el: Η γλώσσα συστήματος είναι η γλώσσα των κουμπιών, των μενού και άλλων στοιχείων
    ελέγχου. Η γλώσσα του περιεχομένου σας ή των εργαλείων που χρησιμοποιείτε δεν
    αλλάζει με αυτή τη ρύθμιση.
  es: El idioma del sistema es el idioma de los botones, los menús y otros controles.
    El idioma de su contenido o de las herramientas que utiliza no cambia con esta
    configuración.
  et: Süsteemikeel on nuppude, menüüde ja muude juhtelementide keel. Teie sisu või
    kasutatavate tööriistade keel ei muutu selle seadistusega.
  fi: Järjestelmäkieli on painikkeiden, valikkojen ja muiden ohjauselementtien kieli.
    Sisältösi tai käyttämiesi työkalujen kieli ei muutu tällä asetuksella.
  ga: Is é an teanga chórais teanga na gcnaipí, na roghchláir agus rialuithe eile.
    Ní athraíonn teanga do chuid ábhair ná na n-uirlisí a úsáideann tú leis an socrú
    seo.
  he: שפת המערכת היא שפת הכפתורים, התפריטים ופקדים אחרים. שפת התוכן שלך או הכלים שבהם
    אתה משתמש אינה משתנה עם הגדרה זו.
  hr: Jezik sustava je jezik gumba, izbornika i ostalih kontrola. Jezik vašeg sadržaja
    ili alata koje koristite ne mijenja se ovom postavkom.
  hu: A rendszer nyelve a gombok, menük és egyéb vezérlők nyelve. A tartalom nyelve
    vagy az Ön által használt eszközök nyelve ezzel a beállítással nem változik.
  is: Tungumál kerfisins er tungumál takka, valmynda og annarra stýringa. Tungumál
    efnis þíns eða verkfæranna sem þú notar breytist ekki með þessari stillingu.
  it: La lingua del sistema è la lingua dei pulsanti, dei menu e degli altri controlli.
    La lingua dei tuoi contenuti o degli strumenti che utilizzi non cambia con questa
    impostazione.
  lt: Sistemos kalba yra mygtukų, meniu ir kitų valdiklių kalba. Jūsų turinio arba
    naudojamų įrankių kalba šiuo nustatymu nesikeičia.
  lv: Sistēmas valoda ir pogu, izvēlņu un citu vadīklu valoda. Jūsu satura vai izmantoto
    rīku valoda nemainās ar šo iestatījumu.
  mt: Il-lingwa tas-sistema hija l-lingwa tal-buttuni, il-menùs u kontrolli oħra.
    Il-lingwa tal-kontenut tiegħek jew tal-għodod li tuża ma tinbidilx b'dan l-issettjar.
  nl_BE: De systeemtaal is de taal van knoppen, menu's en andere bedieningselementen.
    De taal van uw inhoud of van de tools die u gebruikt, verandert niet met deze
    instelling.
  nl_be: De systeemtaal is de taal van knoppen, menu's en andere bedieningselementen.
    De taal van uw inhoud of van de tools die u gebruikt, verandert niet met deze
    instelling.
  sk: Systémový jazyk je jazyk tlačidiel, ponúk a iných ovládacích prvkov. Jazyk vášho
    obsahu alebo nástrojov, ktoré používate, sa týmto nastavením nemení.
  sl: Sistemski jezik je jezik gumbov, menijev in drugih kontrolnih elementov. Jezik
    vaše vsebine ali orodij, ki jih uporabljate, se s to nastavitvijo ne spremeni.
  sq: Gjuha e sistemit është gjuha e butonave, menuve dhe kontrolleve të tjera. Gjuha
    e përmbajtjes suaj ose e mjeteve që përdorni nuk ndryshon me këtë cilësim.
  sr: Sistemski jezik je jezik dugmića, menija i ostalih kontrola. Jezik vašeg sadržaja
    ili alata koje koristite se ne menja ovim podešavanjem.
  sv: Systemspråket är språket för knappar, menyer och andra kontroller. Språket för
    ditt innehåll eller de verktyg du använder ändras inte med den här inställningen.
message_no_validation_requested:
  en: No validation is requested at this time.
  nl: Op dit moment is er geen validatie vereist.
  de: Derzeit wird keine Validierung angefordert.
  fr: Aucune validation n'est demandée pour le moment.
  'no': Det er ikke bedt om validering på dette tidspunktet.
  pl: W tej chwili nie jest wymagana żadna walidacja.
  pt: Nenhuma validação é solicitada no momento.
  ro: Nu se solicită nicio validare în acest moment.
  ru: В настоящее время проверка не запрашивается.
  uk: Наразі перевірка не запитується.
  bg: В момента не е поискано валидиране.
  ca: No s'ha sol·licitat cap validació en aquest moment.
  cs: V tuto chvíli není vyžadováno žádné ověření.
  cy: Nid oes unrhyw ddilysu yn cael ei ofyn ar hyn o bryd.
  da: Der anmodes ikke om validering på nuværende tidspunkt.
  el: Δεν ζητείται επικύρωση αυτή τη στιγμή.
  es: No se solicita ninguna validación en este momento.
  et: Praegu ei ole kinnitamist nõutud.
  fi: Vahvistusta ei pyydetä tällä hetkellä.
  ga: Níl aon bhailíochtú á iarraidh faoi láthair.
  he: לא נדרש אימות בשלב זה.
  hr: Trenutno nije zatražena provjera valjanosti.
  hu: Jelenleg nem kérnek érvényesítést.
  is: Engin staðfesting er óskað eftir á þessum tíma.
  it: Al momento non è richiesta alcuna validazione.
  lt: Šiuo metu patvirtinimas nėra prašomas.
  lv: Pašlaik validācija netiek pieprasīta.
  mt: Ma tintalabx l-ebda validazzjoni f'dan il-mument.
  nl_BE: Er wordt momenteel geen validatie gevraagd.
  nl_be: Er wordt momenteel geen validatie gevraagd.
  sk: V súčasnosti nie je požadovaná žiadna validácia.
  sl: Trenutno ni zahtevana nobena validacija.
  sq: Nuk kërkohet asnjë vërtetim në këtë moment.
  sr: Trenutno nije zatražena nikakva validacija.
  sv: Ingen validering begärs för tillfället.
message_read_and_reviewd_assessment_and_approve:
  en: I have read and reviewed and where necessary corrected or enhanced this risk
    assessment and I approve of its contents.
  nl: Ik heb deze risicobeoordeling gelezen en beoordeeld en waar nodig gecorrigeerd
    of verbeterd en ik keur de inhoud ervan goed.
  fr: J'ai lu et revu et si nécessaire corrigé ou amélioré cette évaluation des risques
    et j'approuve son contenu.
  de: Ich habe diese Risikobeurteilung gelesen und überprüft und gegebenenfalls korrigiert
    oder ergänzt und stimme ihrem Inhalt zu.
  'no': Jeg har lest og gjennomgått, og der det var nødvendig korrigert eller forbedret
    denne risikovurderingen, og jeg godkjenner innholdet.
  pl: Przeczytałem(-am) i przejrzałem(-am), a tam gdzie było to konieczne, poprawiłem(-am)
    lub uzupełniłem(-am) tę ocenę ryzyka i zatwierdzam jej treść.
  pt: Li e revisei e, onde necessário, corrigi ou aprimorei esta avaliação de risco
    e aprovo seu conteúdo.
  ro: Am citit și revizuit și, acolo unde a fost necesar, am corectat sau îmbunătățit
    această evaluare a riscurilor și aprob conținutul acesteia.
  ru: Я прочитал(а) и проверил(а) данную оценку рисков, при необходимости исправил(а)
    или дополнил(а) её и одобряю её содержание.
  uk: Я прочитав та переглянув, а де необхідно — виправив або вдосконалив цю оцінку
    ризиків, і схвалюю її зміст.
  bg: Прочетох, прегледах и където е необходимо коригирах или подобрих тази оценка
    на риска и одобрявам нейното съдържание.
  ca: He llegit i revisat i on ha estat necessari he corregit o millorat aquesta avaluació
    de riscos i n'aprovo el contingut.
  cs: Přečetl/a jsem si toto hodnocení rizik, zkontroloval/a jsem ho a tam, kde bylo
    nutné, jsem ho opravil/a nebo vylepšil/a, a souhlasím s jeho obsahem.
  cy: Rwyf wedi darllen ac adolygu ac yn ôl yr angen wedi cywiro neu wella'r asesiad
    risg hwn ac rwy'n cymeradwyo ei gynnwys.
  da: Jeg har læst og gennemgået og om nødvendigt korrigeret eller forbedret denne
    risikovurdering, og jeg godkender dens indhold.
  el: Έχω διαβάσει και αναθεωρήσει και όπου κρίθηκε απαραίτητο διόρθωσα ή βελτίωσα
    αυτή την εκτίμηση κινδύνου και εγκρίνω το περιεχόμενό της.
  es: He leído y revisado y, cuando ha sido necesario, corregido o mejorado esta evaluación
    de riesgos, y apruebo su contenido.
  et: Olen selle riskihinnangu läbi lugenud ja üle vaadanud ning vajadusel parandanud
    või täiendanud ning kinnitan selle sisu.
  fi: Olen lukenut ja tarkistanut tämän riskiarvioinnin ja tarvittaessa korjannut
    tai täydentänyt sitä, ja hyväksyn sen sisällön.
  ga: Tá an measúnú riosca seo léite agus athbhreithnithe agam agus, nuair ba ghá,
    ceartaithe nó feabhsaithe agam, agus aontaím lena ábhar.
  he: קראתי ובדקתי ובמידת הצורך תיקנתי או שיפרתי הערכת סיכון זו ואני מאשר את תוכנה.
  hr: Pročitao/la sam i pregledao/la te gdje je potrebno ispravio/la ili poboljšao/la
    ovu procjenu rizika i odobravam njezin sadržaj.
  hu: Elolvastam és átnéztem, és szükség esetén javítottam vagy kiegészítettem ezt
    a kockázatértékelést, és jóváhagyom annak tartalmát.
  is: Ég hef lesið og farið yfir og þar sem þörf krefur leiðrétt eða bætt þetta áhættumat
    og samþykki innihald þess.
  it: Ho letto e revisionato e dove necessario corretto o migliorato questa valutazione
    dei rischi e ne approvo il contenuto.
  lt: Perskaičiau ir peržiūrėjau šį rizikos vertinimą, o kur reikėjo – pataisiau arba
    patobulinau, ir pritariu jo turiniui.
  lv: Esmu izlasījis un pārskatījis šo riska novērtējumu un, kur nepieciešams, to
    labojis vai uzlabojis, un apstiprinu tā saturu.
  mt: Qrajt u rrevidjajt u fejn meħtieġ kkoreġejt jew tejjabt din il-valutazzjoni
    tar-riskju u naqbel mal-kontenut tagħha.
  nl_BE: Ik heb deze risicobeoordeling gelezen en beoordeeld en waar nodig gecorrigeerd
    of verbeterd, en ik keur de inhoud ervan goed.
  nl_be: Ik heb deze risicobeoordeling gelezen en beoordeeld en waar nodig gecorrigeerd
    of verbeterd, en ik keur de inhoud ervan goed.
  sk: Prečítal(a) som a preskúmal(a) a kde bolo potrebné, opravil(a) alebo vylepšil(a)
    toto hodnotenie rizík a schvaľujem jeho obsah.
  sl: Prebral/a sem in pregledal/a to oceno tveganja ter jo po potrebi popravil/a
    ali izboljšal/a in odobrim njeno vsebino.
  sq: Kam lexuar dhe shqyrtuar dhe ku ka qenë e nevojshme korrigjuar ose përmirësuar
    këtë vlerësim të rreziqeve dhe miratoj përmbajtjen e tij.
  sr: Pročitao/la sam i pregledao/la i, gde je bilo potrebno, ispravio/la ili poboljšao/la
    ovu procenu rizika i odobravam njen sadržaj.
  sv: Jag har läst och granskat och vid behov korrigerat eller förbättrat denna riskbedömning
    och jag godkänner dess innehåll.
message_click_to_validate:
  en: Clicking on 'Validate' will lock the risk assessment ‘${assessment}’ and give
    it an official validated status.
  nl: Door op 'Validate' te klikken wordt de risicobeoordeling ‘${assessment}’ vergrendeld
    en krijgt deze een officieel gevalideerde status.
  fr: Cliquer sur 'Valider' verrouillera l'évaluation des risques '${assessment}'
    et lui donnera un statut officiel validé.
  de: Durch Klicken auf „Validieren“ wird die Risikobewertung „${assessment}“ gesperrt
    und erhält einen offiziell validierten Status.
  'no': Å klikke på 'Valider' vil låse risikovurderingen '${assessment}' og gi den
    en offisiell validert status.
  pl: Kliknięcie przycisku 'Zatwierdź' zablokuje ocenę ryzyka '${assessment}' i nada
    jej oficjalny status zatwierdzonej.
  pt: Clicar em 'Validar' bloqueará a avaliação de risco '${assessment}' e lhe dará
    um status oficial de validada.
  ro: Făcând clic pe 'Validați' veți bloca evaluarea riscurilor '${assessment}' și
    îi veți conferi un statut oficial de validată.
  ru: Нажатие кнопки «Проверить» заблокирует оценку рисков «${assessment}» и присвоит
    ей официальный проверенный статус.
  uk: Натискання кнопки «Підтвердити» заблокує оцінку ризиків «${assessment}» і надасть
    їй офіційний підтверджений статус.
  bg: Щракването върху „Валидирай
  cs: Kliknutím na tlačítko 'Ověřit' se hodnocení rizik '${assessment}' uzamkne a
    dostane oficiální ověřený status.
  cy: Bydd clicio ar 'Dilysu' yn cloi'r asesiad risg '${assessment}' ac yn rhoi statws
    dilysu swyddogol iddo.
  da: Ved at klikke på 'Valider' låses risikovurderingen '${assessment}' og gives
    en officiel valideret status.
  el: Κάνοντας κλικ στο 'Επικύρωση' θα κλειδωθεί η εκτίμηση κινδύνου '${assessment}'
    και θα λάβει επίσημη επικυρωμένη κατάσταση.
  es: Al hacer clic en 'Validar' se bloqueará la evaluación de riesgos '${assessment}'
    y se le otorgará un estado oficial de validado.
  et: Klõpsates nupul 'Kinnita' lukustatakse riskihinnang '${assessment}' ja antakse
    sellele ametlik kinnitatud staatus.
  fi: Napsauttamalla 'Vahvista' lukitaan riskiarviointi '${assessment}' ja sille annetaan
    virallinen vahvistettu tila.
  ga: Trí chliceáil ar 'Bailíochtaigh' cuirfear glas ar an measúnú riosca '${assessment}'
    agus tabharfar stádas oifigiúil bailíochtaithe dó.
  he: לחיצה על 'אמת' תנעל את הערכת הסיכון '${assessment}' ותעניק לה סטטוס מאומת רשמי.
  hr: Klikom na 'Potvrdi' zaključat će se procjena rizika '${assessment}' i dobiti
    službeni potvrđeni status.
  hu: A 'Validate' gombra kattintva zárolódik a(z) '${assessment}' kockázatértékelés,
    és hivatalos érvényesített státuszt kap.
  is: Með því að smella á 'Staðfesta' verður áhættumatið '${assessment}' læst og fær
    opinbera staðfesta stöðu.
  it: Facendo clic su 'Convalida' la valutazione del rischio '${assessment}' verrà
    bloccata e riceverà uno stato di convalida ufficiale.
  lt: Paspaudus 'Patvirtinti' rizikos vertinimas '${assessment}' bus užrakintas ir
    jam bus suteiktas oficialus patvirtintas statusas.
  lv: Noklikšķinot uz 'Validēt', riska novērtējums '${assessment}' tiks bloķēts un
    tam tiks piešķirts oficiāls validēts statuss.
  mt: Billi tikklikkja fuq 'Valida' se tillokkja l-valutazzjoni tar-riskju '${assessment}'
    u tagħtiha status validat uffiċjali.
  nl_BE: Door op 'Valideren' te klikken wordt de risicobeoordeling '${assessment}'
    vergrendeld en krijgt deze een officieel gevalideerde status.
  nl_be: Door op 'Valideren' te klikken wordt de risicobeoordeling '${assessment}'
    vergrendeld en krijgt deze een officieel gevalideerde status.
  sk: Kliknutím na 'Validovať' sa hodnotenie rizík '${assessment}' uzamkne a dostane
    oficiálny validovaný stav.
  sl: S klikom na 'Potrdi' boste zaklenili oceno tveganja '${assessment}' in ji dodelili
    uradni potrjeni status.
  sq: Duke klikuar mbi 'Vërtetoni' do të bllokojë vlerësimin e rreziqeve '${assessment}'
    dhe do t'i japë një status zyrtar të vërtetuar.
  sr: Klikom na 'Validiraj' zaključaćete procenu rizika '${assessment}' i dati joj
    zvanični validirani status.
  sv: Genom att klicka på 'Validera' låser du riskbedömningen '${assessment}' och
    ger den en officiell validerad status.
message_assessment_under_review:
  en: This risk assessment is currently under review by ${user}.
  nl: Deze risicobeoordeling wordt momenteel beoordeeld door ${user}.
  fr: Cette évaluation des risques est actuellement en cours d'examen par ${user}.
  de: Diese Risikobewertung wird derzeit von ${user} überprüft.
  'no': Denne risikovurderingen er for øyeblikket under gjennomgang av ${user}.
  pl: Ta ocena ryzyka jest obecnie sprawdzana przez ${user}.
  pt: Esta avaliação de risco está atualmente sendo revisada por ${user}.
  ro: Această evaluare a riscurilor este în prezent în curs de revizuire de către
    ${user}.
  ru: Данная оценка рисков в настоящее время проверяется пользователем ${user}.
  uk: Ця оцінка ризиків наразі перебуває на перевірці у ${user}.
  bg: Тази оценка на риска в момента се преглежда от ${user}.
  ca: Aquesta avaluació de riscos es troba actualment en revisió per ${user}.
  cs: Toto hodnocení rizik je v současné době přezkoumáváno uživatelem ${user}.
  cy: Mae'r asesiad risg hwn ar hyn o bryd yn cael ei adolygu gan ${user}.
  da: Denne risikovurdering er i øjeblikket under gennemgang af ${user}.
  el: Αυτή η εκτίμηση κινδύνου βρίσκεται αυτήν τη στιγμή υπό αναθεώρηση από τον ${user}.
  es: Esta evaluación de riesgos está siendo revisada actualmente por ${user}.
  et: Seda riskihinnangut vaatab praegu üle ${user}.
  fi: Tätä riskiarviointia tarkistaa parhaillaan ${user}.
  ga: Tá an measúnú riosca seo á athbhreithniú faoi láthair ag ${user}.
  he: הערכת סיכון זו נמצאת כרגע בבדיקה על ידי ${user}.
  hr: Ovu procjenu rizika trenutno pregledava ${user}.
  hu: Ezt a kockázatértékelést jelenleg ${user} vizsgálja felül.
  is: Þetta áhættumat er nú til skoðunar hjá ${user}.
  it: Questa valutazione dei rischi è attualmente in revisione da parte di ${user}.
  lt: Šį rizikos vertinimą šiuo metu peržiūri ${user}.
  lv: Šo riska novērtējumu pašlaik pārskata ${user}.
  mt: Din il-valutazzjoni tar-riskju bħalissa qed tiġi rriveduta minn ${user}.
  nl_BE: Deze risicobeoordeling wordt momenteel beoordeeld door ${user}.
  nl_be: Deze risicobeoordeling wordt momenteel beoordeeld door ${user}.
  sk: Toto hodnotenie rizík je momentálne v procese kontroly používateľom ${user}.
  sl: To oceno tveganja trenutno pregleduje ${user}.
  sq: Ky vlerësim i rreziqeve është aktualisht nën shqyrtim nga ${user}.
  sr: Ovu procenu rizika trenutno pregledava ${user}.
  sv: Denna riskbedömning granskas för närvarande av ${user}.
message_you_reviewed_and_validated_risk_assessment:
  en: You have reviewed and validated this risk assessment.
  nl: U heeft deze risicobeoordeling beoordeeld en gevalideerd.
  fr: Vous avez examiné et validé cette évaluation des risques.
  de: Sie haben diese Risikobewertung überprüft und validiert.
  'no': Du har gjennomgått og validert denne risikovurderingen.
  pl: Przejrzałeś(-aś) i zatwierdziłeś(-aś) tę ocenę ryzyka.
  pt: Você revisou e validou esta avaliação de risco.
  ro: Ați revizuit și validat această evaluare a riscurilor.
  ru: Вы проверили и утвердили данную оценку рисков.
  uk: Ви переглянули та підтвердили цю оцінку ризиків.
  bg: Вие прегледахте и валидирахте тази оценка на риска.
  ca: Heu revisat i validat aquesta avaluació de riscos.
  cs: Toto hodnocení rizik jste přezkoumali a ověřili.
  cy: Rydych wedi adolygu a dilysu'r asesiad risg hwn.
  da: Du har gennemgået og valideret denne risikovurdering.
  el: Έχετε αναθεωρήσει και επικυρώσει αυτή την εκτίμηση κινδύνου.
  es: Ha revisado y validado esta evaluación de riesgos.
  et: Olete selle riskihinnangu üle vaadanud ja kinnitanud.
  fi: Olet tarkistanut ja vahvistanut tämän riskiarvioinnin.
  ga: Tá an measúnú riosca seo athbhreithnithe agus bailíochtaithe agat.
  he: בדקת ואימתת הערכת סיכון זו.
  hr: Pregledali ste i potvrdili ovu procjenu rizika.
  hu: Ön felülvizsgálta és érvényesítette ezt a kockázatértékelést.
  is: Þú hefur farið yfir og staðfest þetta áhættumat.
  it: Hai revisionato e convalidato questa valutazione dei rischi.
  lt: Jūs peržiūrėjote ir patvirtinote šį rizikos vertinimą.
  lv: Jūs esat pārskatījis un apstiprinājis šo riska novērtējumu.
  mt: Inti rrevidjajt u validajt din il-valutazzjoni tar-riskju.
  nl_BE: U heeft deze risicobeoordeling beoordeeld en gevalideerd.
  nl_be: U heeft deze risicobeoordeling beoordeeld en gevalideerd.
  sk: Skontrolovali ste a validovali ste toto hodnotenie rizík.
  sl: Pregledali in potrdili ste to oceno tveganja.
  sq: Ju keni shqyrtuar dhe vërtetuar këtë vlerësim të rreziqeve.
  sr: Pregledali ste i validirali ovu procenu rizika.
  sv: Du har granskat och validerat denna riskbedömning.
message_you_are_requested_to_validate_assessment:
  nl: U wordt verzocht deze risicobeoordeling te bekijken en te valideren.
  en: You are requested to review and validate this risk assessment.
  fr: Il vous est demandé d'examiner et de valider cette évaluation des risques.
  de: Sie werden gebeten, diese Risikobewertung zu überprüfen und zu validieren.
  'no': Du er bedt om å gjennomgå og validere denne risikovurderingen.
  pl: Jesteś proszony(-a) o przejrzenie i zatwierdzenie tej oceny ryzyka.
  pt: Você é solicitado a revisar e validar esta avaliação de risco.
  ro: Sunteți rugat(ă) să revizuiți și să validați această evaluare a riscurilor.
  ru: Вас просят проверить и утвердить данную оценку рисков.
  uk: Вас просять переглянути та підтвердити цю оцінку ризиків.
  bg: Молим ви да прегледате и валидирате тази оценка на риска.
  ca: Se us demana que reviseu i valideu aquesta avaluació de riscos.
  cs: Jste požádáni o přezkoumání a ověření tohoto hodnocení rizik.
  cy: Gofynnir i chi adolygu a dilysu'r asesiad risg hwn.
  da: Du anmodes om at gennemgå og validere denne risikovurdering.
  el: Σας ζητείται να αναθεωρήσετε και να επικυρώσετε αυτή την εκτίμηση κινδύνου.
  es: Se le solicita que revise y valide esta evaluación de riesgos.
  et: Palutakse teil see riskihinnang üle vaadata ja kinnitada.
  fi: Sinua pyydetään tarkistamaan ja vahvistamaan tämä riskiarviointi.
  ga: Iarrtar ort an measúnú riosca seo a athbhreithniú agus a bhailíochtú.
  he: אתה מתבקש לבדוק ולאמת הערכת סיכון זו.
  hr: Od vas se zahtijeva da pregledate i potvrdite ovu procjenu rizika.
  hu: Felkérjük, hogy vizsgálja felül és érvényesítse ezt a kockázatértékelést.
  is: Þér er óskað eftir að fara yfir og staðfesta þetta áhættumat.
  it: Ti viene chiesto di rivedere e convalidare questa valutazione dei rischi.
  lt: Jūsų prašoma peržiūrėti ir patvirtinti šį rizikos vertinimą.
  lv: Jums tiek lūgts pārskatīt un validēt šo riska novērtējumu.
  mt: Qed tintalab tirrevedi u tivvalida din il-valutazzjoni tar-riskju.
  nl_BE: U wordt verzocht deze risicobeoordeling te beoordelen en te valideren.
  nl_be: U wordt verzocht deze risicobeoordeling te beoordelen en te valideren.
  sk: Ste požiadaný/á, aby ste skontrolovali a validovali toto hodnotenie rizík.
  sl: Prosimo vas, da pregledate in potrdite to oceno tveganja.
  sq: Ju kërkohet të shqyrtoni dhe vërtetoni këtë vlerësim të rreziqeve.
  sr: Od vas se traži da pregledate i validirate ovu procenu rizika.
  sv: Du uppmanas att granska och validera denna riskbedömning.
message_request_validation:
  en: Click on 'Send validation request' to ask the selected OSH consultant to review
    and validate your risk assessment.
  nl: Klik op 'Verstuur validatieverzoek' om de geselecteerde OSH-consultant te vragen
    uw risicobeoordeling te beoordelen en te valideren.
  fr: Cliquez sur 'Envoyer la demande de validation' pour demander au consultant OSH
    sélectionné d'examiner et de valider votre évaluation des risques.
  de: Klicken Sie auf „Validierungsanfrage senden“, um den ausgewählten OSH-Berater
    zu bitten, Ihre Risikobewertung zu überprüfen und zu validieren.
  'no': Klikk på 'Send valideringsforespørsel' for å be den valgte HMS-konsulenten
    om å gjennomgå og validere risikovurderingen din.
  pl: Kliknij 'Wyślij prośbę o walidację', aby poprosić wybranego konsultanta BHP
    o sprawdzenie i zatwierdzenie twojej oceny ryzyka.
  pt: Clique em 'Enviar solicitação de validação' para pedir ao consultor de SST selecionado
    que revise e valide sua avaliação de risco.
  ro: Faceți clic pe 'Trimiteți cererea de validare' pentru a cere consultantului
    SSM selectat să revizuiască și să valideze evaluarea dvs. de riscuri.
  ru: Нажмите «Отправить запрос на проверку», чтобы попросить выбранного консультанта
    по ОТ проверить и утвердить вашу оценку рисков.
  uk: Натисніть «Надіслати запит на підтвердження», щоб попросити вибраного консультанта
    з ОП переглянути та підтвердити вашу оцінку ризиків.
  bg: Кликнете върху 'Изпрати заявка за валидиране', за да помолите избрания консултант
    по БЗР да прегледа и валидира вашата оценка на риска.
  ca: Feu clic a 'Envia sol·licitud de validació' per demanar al consultor de SST
    seleccionat que revisi i validi la vostra avaluació de riscos.
  cs: Klikněte na 'Odeslat žádost o validaci' a požádejte vybraného poradce BOZP o
    přezkoumání a validaci vašeho hodnocení rizik.
  cy: Cliciwch ar 'Anfon cais am ddilysu' i ofyn i'r ymgynghorydd ISD a ddewiswyd
    adolygu a dilysu eich asesiad risg.
  da: Klik på 'Send valideringsanmodning' for at bede den valgte OSH-konsulent om
    at gennemgå og validere din risikovurdering.
  el: Κάντε κλικ στο 'Αποστολή αιτήματος επικύρωσης' για να ζητήσετε από τον επιλεγμένο
    σύμβουλο ΕΑΥ να αναθεωρήσει και να επικυρώσει την εκτίμηση κινδύνου σας.
  es: Haga clic en 'Enviar solicitud de validación' para pedir al consultor de SST
    seleccionado que revise y valide su evaluación de riesgos.
  et: Klõpsake nupul 'Saada kinnitamistaotlus', et paluda valitud tööohutuse konsultandil
    teie riskihinnang üle vaadata ja kinnitada.
  fi: Napsauta 'Lähetä vahvistuspyyntö' pyytääksesi valittua työturvallisuuskonsulttia
    tarkistamaan ja vahvistamaan riskiarviointisi.
  ga: Cliceáil ar 'Seol iarratas bailíochtaithe' chun iarraidh ar an gcomhairleoir
    OSH roghnaithe d'measúnú riosca a athbhreithniú agus a bhailíochtú.
  he: לחץ על 'שלח בקשת אימות' כדי לבקש מיועץ בטיחות ובריאות תעסוקתית שנבחר לבדוק ולאמת
    את הערכת הסיכונים שלך.
  hr: Kliknite na 'Pošalji zahtjev za validaciju' kako biste zamolili odabranog savjetnika
    za ZNR da pregleda i potvrdi vašu procjenu rizika.
  hu: Kattintson az 'Érvényesítési kérés küldése' gombra, hogy megkérje a kiválasztott
    munkahelyi egészségvédelmi és biztonsági tanácsadót az Ön kockázatértékelésének
    áttekintésére és jóváhagyására.
  is: Smelltu á 'Senda staðfestingarbeiðni' til að biðja valinn ráðgjafa um vinnuvernd
    að fara yfir og staðfesta áhættumat þitt.
  it: Fai clic su 'Invia richiesta di validazione' per chiedere al consulente SSL
    selezionato di esaminare e convalidare la tua valutazione dei rischi.
  lt: Spustelėkite „Siųsti patvirtinimo užklausą
  lv: Noklikšķiniet uz „Sūtīt apstiprināšanas pieprasījumu
  mt: Ikklikkja fuq 'Ibgħat talba ta' validazzjoni' biex titlob lill-konsulent tas-SSO
    magħżul biex jirrevedi u jivvalidja l-valutazzjoni tar-riskju tiegħek.
  nl_BE: Klik op 'Validatieverzoek verzenden' om de geselecteerde preventieadviseur
    te vragen uw risicobeoordeling te beoordelen en te valideren.
  nl_be: Klik op 'Validatieverzoek verzenden' om de geselecteerde preventieadviseur
    te vragen uw risicobeoordeling te beoordelen en te valideren.
  sk: Kliknite na 'Odoslať žiadosť o validáciu' a požiadajte vybraného konzultanta
    BOZP o preskúmanie a validáciu vášho hodnotenia rizík.
  sl: Kliknite na 'Pošlji zahtevo za potrditev', da prosite izbranega svetovalca za
    varnost in zdravje pri delu, da pregleda in potrdi vašo oceno tveganja.
  sq: Klikoni mbi 'Dërgo kërkesën e vërtetimit' për të kërkuar nga konsulenti i zgjedhur
    i OSH-it të shqyrtojë dhe vërtetojë vlerësimin tuaj të riskut.
  sr: Kliknite na 'Pošalji zahtev za validaciju' da zamolite izabranog savetnika za
    zaštitu na radu da pregleda i validuje vašu procenu rizika.
  sv: Klicka på 'Skicka valideringsbegäran' för att be den valda OSH-konsulten att
    granska och validera din riskbedömning.
message_warning_locking_after_validation:
  en: After your consultant has validated this risk assessment, it will be locked.
    Should you want to edit the risk assessment again, then you may always make a
    duplicate of this assessment at a later time.
  nl: Nadat uw adviseur deze risicobeoordeling heeft gevalideerd, wordt deze vergrendeld.
    Mocht u de risicobeoordeling opnieuw willen bewerken, dan kunt u op een later
    tijdstip altijd een duplicaat van deze beoordeling maken.
  fr: Une fois que votre consultant aura validé cette évaluation des risques, elle
    sera verrouillée. Si vous souhaitez modifier à nouveau l'évaluation des risques,
    vous pouvez toujours faire une copie de cette évaluation ultérieurement.
  de: Nachdem Ihr Berater diese Risikobewertung validiert hat, wird sie gesperrt.
    Sollten Sie die Gefährdungsbeurteilung erneut bearbeiten wollen, so können Sie
    diese jederzeit zu einem späteren Zeitpunkt duplizieren.
  'no': Etter at konsulenten din har validert denne risikovurderingen, vil den bli
    låst. Hvis du ønsker å redigere risikovurderingen igjen, kan du alltid lage en
    kopi av denne vurderingen på et senere tidspunkt.
  pl: Po zatwierdzeniu tej oceny ryzyka przez konsultanta zostanie ona zablokowana.
    Jeśli będziesz chciał(-a) ponownie edytować ocenę ryzyka, zawsze możesz wykonać
    duplikat tej oceny w późniejszym czasie.
  pt: Depois que seu consultor validar esta avaliação de risco, ela será bloqueada.
    Caso queira editar a avaliação de risco novamente, você sempre poderá fazer uma
    cópia desta avaliação posteriormente.
  ro: După ce consultantul dvs. a validat această evaluare a riscurilor, aceasta va
    fi blocată. Dacă doriți să editați din nou evaluarea riscurilor, puteți oricând
    să faceți un duplicat al acestei evaluări la un moment ulterior.
  ru: После того как ваш консультант проверит данную оценку рисков, она будет заблокирована.
    Если вы захотите снова отредактировать оценку рисков, вы всегда сможете создать
    её дубликат в более позднее время.
  uk: Після того як ваш консультант підтвердить цю оцінку ризиків, вона буде заблокована.
    Якщо ви захочете знову відредагувати оцінку ризиків, ви завжди зможете створити
    дублікат цієї оцінки пізніше.
  bg: След като вашият консултант валидира тази оценка на риска, тя ще бъде заключена.
    Ако желаете да редактирате оценката на риска отново, винаги можете да направите
    дубликат на тази оценка по-късно.
  ca: Després que el vostre consultor hagi validat aquesta avaluació de riscos, quedarà
    bloquejada. Si voleu tornar a editar l'avaluació de riscos, sempre podeu fer un
    duplicat d'aquesta avaluació en un moment posterior.
  cs: Poté, co váš poradce toto hodnocení rizik validuje, bude uzamčeno. Pokud budete
    chtít hodnocení rizik znovu upravit, můžete si vždy vytvořit duplikát tohoto hodnocení
    v pozdější době.
  cy: Ar ôl i'ch ymgynghorydd ddilysu'r asesiad risg hwn, caiff ei gloi. Os hoffech
    olygu'r asesiad risg eto, gallwch bob amser wneud copi dyblyg o'r asesiad hwn
    yn ddiweddarach.
  da: Når din konsulent har valideret denne risikovurdering, vil den blive låst. Skulle
    du ønske at redigere risikovurderingen igen, kan du altid lave en kopi af denne
    vurdering på et senere tidspunkt.
  el: Αφού ο σύμβουλός σας επικυρώσει αυτή την εκτίμηση κινδύνου, θα κλειδωθεί. Εάν
    θέλετε να επεξεργαστείτε ξανά την εκτίμηση κινδύνου, μπορείτε πάντα να δημιουργήσετε
    ένα αντίγραφο αυτής της εκτίμησης αργότερα.
  es: Una vez que su consultor haya validado esta evaluación de riesgos, quedará bloqueada.
    Si desea editar la evaluación de riesgos nuevamente, siempre puede hacer un duplicado
    de esta evaluación en un momento posterior.
  et: Pärast seda, kui teie konsultant on selle riskihinnangu kinnitanud, lukustatakse
    see. Kui soovite riskihinnangut uuesti muuta, saate alati hiljem sellest hinnangust
    koopia teha.
  fi: Kun konsulttisi on vahvistanut tämän riskiarvioinnin, se lukitaan. Jos haluat
    muokata riskiarviointia uudelleen, voit aina myöhemmin tehdä kopion tästä arvioinnista.
  ga: Tar éis do do chomhairleoir an measúnú riosca seo a bhailíochtú, cuirfear faoi
    ghlas é. Más mian leat an measúnú riosca a chur in eagar arís, is féidir leat
    cóip den mheasúnú seo a dhéanamh am ar bith níos déanaí.
  he: לאחר שהיועץ שלך אימת את הערכת הסיכונים, היא תינעל. אם תרצה לערוך את הערכת הסיכונים
    שוב, תוכל תמיד ליצור העתק של הערכה זו בשלב מאוחר יותר.
  hr: Nakon što vaš savjetnik potvrdi ovu procjenu rizika, bit će zaključana. Ako
    želite ponovo urediti procjenu rizika, uvijek možete napraviti duplikat ove procjene
    u kasnijem trenutku.
  hu: Miután tanácsadója érvényesítette ezt a kockázatértékelést, az zárolva lesz.
    Ha ismét szerkeszteni szeretné a kockázatértékelést, bármikor készíthet egy másolatot
    erről az értékelésről egy későbbi időpontban.
  is: Eftir að ráðgjafi þinn hefur staðfest þetta áhættumat verður það læst. Ef þú
    vilt breyta áhættumatinu aftur geturðu alltaf gert afrit af þessu mati síðar.
  it: Dopo che il tuo consulente ha convalidato questa valutazione dei rischi, verrà
    bloccata. Se desideri modificare nuovamente la valutazione dei rischi, puoi sempre
    creare un duplicato di questa valutazione in un secondo momento.
  lt: Kai jūsų konsultantas patvirtins šį rizikos vertinimą, jis bus užrakintas. Jei
    norėsite vėl redaguoti rizikos vertinimą, visada galėsite vėliau sukurti šio vertinimo
    dublikatą.
  lv: Pēc tam, kad jūsu konsultants apstiprinās šo riska novērtējumu, tas tiks bloķēts.
    Ja vēlēsieties rediģēt riska novērtējumu atkārtoti, jūs vienmēr varēsiet vēlāk
    izveidot šī novērtējuma dublikātu.
  mt: Wara li l-konsulent tiegħek jivvalidja din il-valutazzjoni tar-riskju, hija
    tiġi msakkar. Jekk tixtieq teditja l-valutazzjoni tar-riskju mill-ġdid, dejjem
    tista' tagħmel duplikat ta' din il-valutazzjoni f'mument ieħor.
  nl_BE: Nadat uw preventieadviseur deze risicobeoordeling heeft gevalideerd, wordt
    deze vergrendeld. Als u de risicobeoordeling opnieuw wilt bewerken, kunt u later
    altijd een duplicaat van deze beoordeling maken.
  nl_be: Nadat uw preventieadviseur deze risicobeoordeling heeft gevalideerd, wordt
    deze vergrendeld. Als u de risicobeoordeling opnieuw wilt bewerken, kunt u later
    altijd een duplicaat van deze beoordeling maken.
  sk: Po tom, čo váš konzultant overí toto hodnotenie rizík, bude uzamknuté. Ak budete
    chcieť hodnotenie rizík znovu upraviť, môžete vždy vytvoriť duplikát tohto hodnotenia
    neskôr.
  sl: Ko bo vaš svetovalec potrdil to oceno tveganja, bo zaklenjena. Če boste želeli
    oceno tveganja znova urediti, lahko kadarkoli pozneje ustvarite dvojnik te ocene.
  sq: Pasi konsulenti juaj të ketë vërtetuar këtë vlerësim risku, ai do të bllokohet.
    Nëse dëshironi të redaktoni përsëri vlerësimin e riskut, mund të bëni gjithmonë
    një kopje të këtij vlerësimi në një kohë të mëvonshme.
  sr: Nakon što vaš savetnik potvrdi ovu procenu rizika, ona će biti zaključana. Ako
    želite ponovo da uredite procenu rizika, uvek možete napraviti duplikat ove procene
    u kasnijem trenutku.
  sv: När din konsult har validerat denna riskbedömning kommer den att låsas. Om du
    vill redigera riskbedömningen igen kan du alltid göra en kopia av denna bedömning
    vid ett senare tillfälle.
