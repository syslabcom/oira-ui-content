message_intro_send_briefing_documents:
  de: Wenn Sie forfahren, passiert folgendes.
  en: If you proceed the following will happen.
  bg: Ако продължите, ще се случи следното.
  ca: Si continueu, passarà el següent.
  cs: Pokud budete pokračovat, stane se následující.
  cy: Os byddwch yn parhau, bydd y canlynol yn digwydd.
  da: Hvis du fortsætter, vil følgende ske.
  el: Εάν συνεχίσετε, θα συμβεί το εξής.
  es: Si continúa, ocurrirá lo siguiente.
  et: Kui jätkate, juhtub järgmine.
  fi: Jos jatkat, seuraavaa tapahtuu.
  fr: Si vous continuez, voici ce qui se passera.
  ga: Má leanann tú ar aghaidh, tarlóidh an méid seo a leanas.
  he: אם תמשיך, יקרה הדבר הבא.
  hr: Ako nastavite, dogodit će se sljedeće.
  hu: Ha folytatja, a következők fognak történni.
  is: Ef þú heldur áfram mun eftirfarandi gerast.
  it: Se procedi, accadrà quanto segue.
  lt: Jei tęsite, įvyks šie veiksmai.
  lv: Ja turpināsiet, notiks sekojošais.
  mt: Jekk tkompli, dan li ġej se jiġri.
  nl: Als u verdergaat, zal het volgende gebeuren.
  nl_BE: Als u verdergaat, zal het volgende gebeuren.
  nl_be: Als u verdergaat, zal het volgende gebeuren.
  'no': Hvis du fortsetter, vil følgende skje.
  pl: Jeśli przejdziesz dalej, nastąpi co następuje.
  pt: Se prosseguir, acontecerá o seguinte.
  ro: Dacă continuați, se va întâmpla următoarele.
  ru: Если вы продолжите, произойдёт следующее.
  sk: Ak budete pokračovať, stane sa nasledovné.
  sl: Če nadaljujete, se bo zgodilo naslednje.
  sq: Nëse vazhdoni, do të ndodhë sa vijon.
  sr: Ako nastavite, dogodiće se sledeće.
  sv: Om du fortsätter kommer följande att hända.
  uk: Якщо ви продовжите, відбудеться наступне.
message_involve_workers_how_to:
  bg: Решете по най-добрия начин как да включите персонала си! Можете например да
    проведете среща или фокус група с работниците и заедно да прегледате съответните
    части от оценката на риска. Можете също да изтеглите или отпечатате съдържанието
    на инструмента или части от него и да го споделите с работниците си за информация
    и обратна връзка.
  ca: Decideixi la millor manera d'involucrar al teu personal! Per exemple, podeu
    fer una reunió o crear un grup de discussió amb els treballadors i abordar junts
    les parts respectives de l'avaluació de riscos. També pot descarregar o imprimir
    el contingut de l'eina o parts d'ella i compartir-la per obtenir informació i
    comentaris amb els seus treballadors.
  cs: Zvolte způsob, jak nejlépe zapojit Vaše zaměstnance! Může to být například setkání
    se zaměstnanci nebo zapojení pracovní skupiny či společné posuzování rizik s příslušnými
    subjekty. Můžete si rovněž stáhnout nebo vytisknout obsah nástroje nebo jeho částí
    a podělit se o informace s vašimi zaměstnanci a zajistit zpětnou vazbu.
  de: Entscheiden Sie sich für den besten Weg, Ihre Mitarbeiter einzubeziehen! Sie
    können beispielsweise eine Besprechung oder eine Fokusgruppe mit den Arbeitnehmern
    durchführen und gemeinsam die entsprechenden Teile der Gefährdungsbeurteilung
    durchgehen. Sie können den Inhalt des Tools oder Teile davon auch herunterladen
    oder ausdrucken und ihn Ihren Mitarbeitern zur Information und für Rückmeldungen
    weitergeben.
  el: Αποφασίστε ποιος είναι ο καλύτερος τρόπος συμμετοχής του προσωπικού σας! Για
    παράδειγμα, μπορείτε να διοργανώσετε μια συνεδρίαση ή να δημιουργήσετε μια ομάδα
    εργασίας με τους εργαζόμενους ειδικά για το θέμα της εκπόνησης της μελέτης εκτίμησης
    κινδύνου, για να εξετάσετε από κοινού τις διάφορες φάσεις ή τις διάφορες θεματικές
    ενότητες της μελέτης. Έχετε επίσης τη δυνατότητα λήψης του περιεχομένου του εργαλείου
    ή/και εκτύπωσης  του συνόλου του περιεχομένου ή επιλεγμένων τμημάτων αυτού, προκειμένου
    να το κοινοποιήσετε στους εργαζόμενους με σκοπό την ανταλλαγή πληροφοριών και
    την εκ μέρους τους υποβολή σχολίων και προτάσεων.
  en: Decide on the best way to involve your staff! You can for example conduct a
    meeting or a focus group with workers and go through the respective parts in the
    risk assessment together. You can also download or print the content of the tool
    or parts of it and share it for information and feedback with your workers.
  es: Decida sobre la mejor manera de implicar a su personal. Puede, por ejemplo,
    celebrar una reunión o crear un grupo de discusión con los trabajadores y abordar
    conjuntamente las partes correspondientes en la evaluación de riesgos. También
    puede descargar o imprimir el contenido de la herramienta o de partes de la misma
    y compartirla con sus trabajadores.
  fi: Päätä paras tapa ottaa henkilöstösi mukaan! Voit esimerkiksi järjestää kokouksen
    tai fokusryhmän työntekijöiden kanssa ja käydä yhdessä läpi riskiarvioinnin asiaankuuluvat
    osat. Voit myös ladata tai tulostaa työkalun sisällön tai osia siitä ja jakaa
    sen tiedoksi ja palautteen saamiseksi työntekijöillesi.
  fr: Décidez de la meilleure manière d’associer votre personnel ! Vous pouvez par
    exemple organiser une réunion ou un groupe de réflexion avec les travailleurs
    et passer en revue les différents modules de l’évaluation des risques.<br/>Vous
    pouvez également télécharger ou imprimer le contenu de l’outil ou des parties
    de l’outil et le partager pour information et retour d’information avec vos travailleurs.
  hr: 'Odlučite na koji ćete način najbolje uključiti svoje radnike! Možete, na primjer,
    održati sastanak ili fokus-grupu s radnicima i zajedno proći kroz odgovarajuće
    dijelove procjene rizika. Također možete preuzeti ili ispisati sadržaj alata ili
    njegove dijelove i podijeliti ih radnicima za obavještavanje i povratnu informaciju.  '
  hu: A munkavállalók bevonásához a legjobb mód meghatározása Például szervezhet a
    munkavállalókkal egy megbeszélést vagy egy fókuszcsoportot, ahol együtt áttekintik
    a kockázatértékelés vonatkozó részeit.  Ezen kívül letöltheti vagy kinyomtathatja
    az eszköz tartalmát vagy annak részeit és azokat tájékoztatás és visszajelzés
    céljával megoszthatja a munkavállalóival.
  is: Ákveðið bestu leiðina til að fela starfsfólki þínu! Þú getur til dæmis haldið
    fund eða fókushóp með starfsmönnum og farið saman í gegnum viðeigandi hluta í
    áhættumatinu. Þú getur einnig sótt eða prentað efni tólsins eða hluta af því og
    deilt því með starfsmönnum þínum til upplýsinga og endurgjafar.
  it: La valutazione del rischio è un obbligo non delegabile del datore di lavoro.
    Deve essere effettuata in collaborazione con il RSPP, il MC, ove previsto, e previa
    consultazione del RLS, ove presente. Il presente strumento è strutturato in diversi
    moduli in cui vengono affrontati i rischi relativi alla salute e sicurezza dei
    lavoratori addetti al lavoro di ufficio nonché aspetti che riguardano l'organizzazione
    del lavoro. Lo strumento guida il datore di lavoro nella identificazione dei pericoli
    che possono causare un danno ai lavoratori, nella valutazione dei rischi individuando
    le misure di prevenzione e protezione conformi alla legislazione vigente e nella
    individuazione delle misure ritenute opportune per garantire il miglioramento
    nel tempo dei livelli di sicurezza. Il Datore di lavoro insieme al medico competente
    laddove presente, all'atto della predisposizione del documento dovrà verificare
    la presenza di rischi riguardanti le lavoratrici in stato di gravidanza (D.lgs.
    151/2001) nonché quelli connessi alle differenze di genere, all'età e alla provenienza
    da altri paesi.
  lt: Nuspręskite, kaip geriausiai įtraukti savo darbuotojus! Pavyzdžiui, galite surengti
    susitikimą arba tikslinę grupę su darbuotojais ir kartu peržiūrėti atitinkamas
    rizikos vertinimo dalis. Taip pat galite atsisiųsti arba atspausdinti įrankio
    turinį ar jo dalis ir pasidalyti juo su savo darbuotojais informacijos ir atsiliepimų
    tikslais.
  lv: Izlemiet, kā vislabāk iesaistīt savus darbiniekus! Piemēram, varat organizēt
    sanāksmi vai fokusa grupu ar darbiniekiem un kopīgi izskatīt attiecīgās riska
    novērtējuma daļas. Varat arī lejupielādēt vai izdrukāt rīka saturu vai tā daļas
    un kopīgot tās ar darbiniekiem informācijai un atsauksmēm.
  mt: Iddeċiedi dwar l-aħjar mod biex tinvolvi lill-ħaddiema tiegħek! Tista’ pereżempju
    torganizza laqgħa jew tifforma grupp mal-ħaddiema u tiddiskuti l-partijiet rispettivi
    fl-evalwazzjoni tar-riskju flimkien. Tista’ wkoll tniżżel jew tistampa l-kontenut
    tal-għodda jew partijiet minnha u tqassamha għall-informazzjoni u l-kummenti mill-ħaddiema
    tiegħek.
  nl: Bepaal de beste manier om uw medewerkers te betrekken! U kunt bijvoorbeeld een
    vergadering of een focusgroep met medewerkers houden en de betreffende onderdelen
    van de risicobeoordeling samen doornemen. U kunt de inhoud van het instrument
    of delen ervan ook downloaden of afdrukken en met uw medewerkers delen ter informatie
    en voor feedback.
  nl_BE: Bepaal de beste manier om uw medewerkers te betrekken! U kunt bijvoorbeeld
    een vergadering of een focusgroep met medewerkers houden en de betreffende onderdelen
    van de risicobeoordeling samen doornemen. U kunt de inhoud van het instrument
    of delen ervan ook downloaden of afdrukken en met uw medewerkers delen ter informatie
    en voor feedback.
  'no': Bestem den beste måten å involvere de ansatte på! Du kan for eksempel avholde
    et møte eller en fokusgruppe med arbeidstakere og gå gjennom de aktuelle delene
    av risikovurderingen sammen. Du kan også laste ned eller skrive ut innholdet i
    verktøyet eller deler av det og dele det med de ansatte som informasjon og for
    å innhente tilbakemeldinger.
  pt: Decida sobre a melhor forma de envolver os seus trabalhadores! Pode, por exemplo,
    realizar reuniões com trabalhadores ou criar grupos de trabalho e utilizar os
    contéudos da ferramenta para acompanharem em conjunto a avaliação de riscos. Pode
    também descarregar ou imprimir todo ou parte do conteúdo da ferramenta, partilhá-lo
    como informação a dar aos trabalhadores e utilizá-lo como feedback para a melhoria
    das suas condições de trabalho.
  sk: Rozhodnite sa, ako najlepšie zapojíte svojich zamestnancov. Môžete napríklad
    zvolať poradu alebo osloviť určitú skupinu zamestnancov a prejsť jednotlivé časti
    v hodnotení rizík spoločne. Môžete si tiež stiahnuť alebo vytlačiť obsah nástroja
    alebo jeho časti a odovzdať ho svojim zamestnancom pre informáciu a aby vám poskytli
    spätnú väzbu.
  sl: Sprejmite odločitev, kako najbolje vključititi vaše zaposlene! Na primer z organizacijo
    sestankov ali fokusne skupine z zaposlenimi, kjer boste skupaj obdelali ustrezne
    dele ocene tveganja. Vsebino orodja ali njegovih delov lahko prenesete ali natisnete
    in ga delite z vašimi delavci.
  cy: Penderfynwch ar y ffordd orau i gynnwys eich staff! Gallwch er enghraifft gynnal
    cyfarfod neu grŵp ffocws gyda gweithwyr a mynd drwy'r rhannau perthnasol yn yr
    asesiad risg gyda'ch gilydd. Gallwch hefyd lawrlwytho neu argraffu cynnwys yr
    offeryn neu rannau ohono a'i rannu am wybodaeth ac adborth gyda'ch gweithwyr.
  da: Beslut dig for den bedste måde at involvere dine medarbejdere på! Du kan for
    eksempel afholde et møde eller en fokusgruppe med medarbejderne og gennemgå de
    respektive dele i risikovurderingen sammen. Du kan også downloade eller udskrive
    indholdet af værktøjet eller dele af det og dele det med dine medarbejdere til
    information og feedback.
  et: Otsustage parim viis oma töötajate kaasamiseks! Võite näiteks korraldada töötajatega
    koosoleku või fookusgrupi ning koos läbi vaadata riskihinnangu vastavad osad.
    Samuti saate tööriista sisu või selle osi alla laadida või välja printida ning
    jagada seda oma töötajatega teabe saamiseks ja tagasiside andmiseks.
  ga: Cinntigh an bealach is fearr chun do chuid foirne a chur i gceist! Is féidir
    leat, mar shampla, cruinniú nó grúpa fócais a reáchtáil le hoibrithe agus na codanna
    faoi seach den mheasúnú riosca a dul trína chéile le chéile. Is féidir leat freisin
    ábhar an uirlís nó codanna de a íoslódáil nó a phriontáil agus é a roinnt le d'oibrithe
    le haghaidh faisnéise agus aiseolais.
  he: החליטו על הדרך הטובה ביותר לשתף את הצוות שלכם! לדוגמה, תוכלו לקיים פגישה או
    קבוצת מיקוד עם עובדים ולעבור יחד על החלקים הרלוונטיים בהערכת הסיכונים. תוכלו גם
    להוריד או להדפיס את תוכן הכלי או חלקים ממנו ולשתף אותו עם העובדים שלכם לצורך מידע
    ומשוב.
  nl_be: Bepaal de beste manier om uw medewerkers te betrekken! U kunt bijvoorbeeld
    een vergadering of een focusgroep met medewerkers houden en de betreffende onderdelen
    van de risicobeoordeling samen doornemen. U kunt de inhoud van het instrument
    of delen ervan ook downloaden of afdrukken en met uw medewerkers delen ter informatie
    en voor feedback.
  pl: Zdecyduj, jak najlepiej zaangażować swoich pracowników! Możesz na przykład przeprowadzić
    spotkanie lub grupę fokusową z pracownikami i wspólnie przejść przez odpowiednie
    części oceny ryzyka. Możesz również pobrać lub wydrukować zawartość narzędzia
    lub jego części i udostępnić je pracownikom w celu uzyskania informacji i opinii.
  ro: Decideți care este cel mai bun mod de a implica personalul dvs.! Puteți, de
    exemplu, să organizați o întâlnire sau un grup de discuție cu lucrătorii și să
    parcurgeți împreună părțile respective din evaluarea riscurilor. De asemenea,
    puteți descărca sau tipări conținutul instrumentului sau părți ale acestuia și
    să îl distribuiți lucrătorilor dvs. pentru informare și feedback.
  ru: Выберите наилучший способ привлечения ваших сотрудников! Например, вы можете
    провести совещание или фокус-группу с работниками и вместе рассмотреть соответствующие
    части оценки рисков. Вы также можете загрузить или распечатать содержимое инструмента
    или его части и поделиться ими с работниками для информирования и получения обратной
    связи.
  sq: Vendosni mënyrën më të mirë për të përfshirë stafin tuaj! Mund të organizoni,
    për shembull, një takim ose një grup fokusi me punëtorët dhe të kaloni së bashku
    nëpër pjesët përkatëse të vlerësimit të riskut. Gjithashtu mund të shkarkoni ose
    printoni përmbajtjen e mjetit ose pjesë të tij dhe ta ndani me punëtorët tuaj
    për informacion dhe komente.
  sr: Odlučite koji je najbolji način da uključite vaše osoblje! Možete, na primer,
    organizovati sastanak ili fokus grupu sa radnicima i zajedno proći kroz odgovarajuće
    delove procene rizika. Takođe možete preuzeti ili odštampati sadržaj alata ili
    njegovih delova i podeliti ga sa radnicima radi informisanja i povratnih informacija.
  sv: Bestäm det bästa sättet att involvera din personal! Du kan till exempel hålla
    ett möte eller en fokusgrupp med arbetstagarna och gå igenom de respektive delarna
    i riskbedömningen tillsammans. Du kan också ladda ner eller skriva ut innehållet
    i verktyget eller delar av det och dela det för information och återkoppling med
    dina arbetstagare.
  uk: Вирішіть, який найкращий спосіб залучити ваш персонал! Наприклад, ви можете
    провести нараду або фокус-групу з працівниками та разом розглянути відповідні
    частини оцінки ризиків. Ви також можете завантажити або роздрукувати вміст інструменту
    або його частини та поділитися ним з працівниками для інформування та отримання
    відгуків.
message_involve_workers_requirement:
  bg: Ключов момент за добро управление на безопасността и здравето при работа е да
    привлечете работниците. Работодателите имат задължението да се консултират с работниците
    по въпросите свързани с безопасността и здравето. Но има ползи да се премине отвъд
    минималните законови изисквания. Управлението на БЗР ще има по-голям успех ако
    се насърчава участието на работниците и се създава диалог между работниците и
    ръководството. Решете кой е най-добрият начин да привлечете персонала си! Например,
    можете да проведете среща или да създадете фокусна група с участие на работници
    и да разгледате съответни фрагменти от Оценката на риска заедно. Също може да
    изтеглите или разпечатате съдържанието на инструмента или части от него и да го
    споделите с цел получаване на информация или обратна връзка от работниците Ви.
  ca: Una de les claus per a un bon lideratge en matèria de SST és fer que s'impliquin
    els treballadors. Les empreses tenen el deure legal de consultar als seus empleats
    en matèria de seguretat i salut. Però hi ha beneficis que van més enllà del compliment
    dels requisits mínims. És possible que la gestió de la SST tingui més èxit si
    es promou la participació activa dels treballadors i s’estableix un diàleg entre
    els empleats i la direcció.
  cs: <p>Jedním z klíčových faktorů kvalitního řízení oblasti BOZP je zapojení zaměstnanců.
    Zaměstnavatelé jsou ze zákona povinni projednávat se zaměstnanci otázky BOZP.
    Pokud ale učiníte víc, než jste ze zákona povinni, bude to pro vaši firmu přínosné.
    Pravděpodobnost, že bude řízení BOZP úspěšné, se zvyšuje podněcováním aktivní
    účasti pracovníků a zaváděním dialogu mezi zaměstnanci a vedením firmy.</p><p>Zvolte
    způsob, jak zapojit vaše zaměstnance! Mohou to být například schůzky na pracovištích,
    skupinové diskuze nebo týmové vyhledávání a hodnocení rizik. Můžete si také stáhnout
    nebo vytisknout obsah nástroje, předat ji dotčeným zaměstnancům a vyžádat si od
    nich zpětnou vazbu.</p>
  de: Einer der Schlüssel zu einer guten OSH-Führung ist die Einbeziehung der Arbeitnehmer.
    Arbeitgeber haben eine <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>gesetzliche
    Pflicht</a>, Arbeitnehmer zu Sicherheits- und Gesundheitsfragen zu konsultieren.
    Es gibt jedoch Vorteile, wenn man über die Mindestanforderungen hinausgeht. Das
    OSH-Management wird eher erfolgreich sein, wenn es die aktive Beteiligung der
    Arbeitnehmer fördert und einen Dialog zwischen Mitarbeitern und Management aufbaut.
  el: Ένα από τα βασικά χαρακτηριστικά της αποτελεσματικής άσκησης του επιτελικού
    ρόλου  του εργοδότη ή της διοίκησης της επιχείρησης/οργανισμού σε θέματα ΕΑΥ είναι
    η προαγωγή της ενεργού συμμετοχής των εργαζομένων. Οι εργοδότες έχουν νομική υποχρέωση
    να διαβουλεύονται με τους εργαζόμενους σχετικά με τα θέματα ασφάλειας και υγείας
    (στη βάση των ελάχιστων απαιτήσεων). Είναι γεγονός επίσης ότι η υπέρβαση αυτών
    των ελάχιστων απαιτήσεων συνεπάγεται σημαντικά οφέλη. Η ενθάρρυνση της ενεργού
    συμμετοχής των εργαζομένων και η θεσμοθέτηση του διαλόγου μεταξύ του εργοδότη
    ή της διοίκησης και των εργαζομένων, αυξάνουν τις πιθανότητες επιτυχίας της διαχείρισης
    της ΕΑΥ στην επιχείρηση/οργανισμό.
  en: One of the keys to good OSH leadership is getting workers involved. Employers
    have a <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>legal
    duty</a> to consult employees on safety and health issues. But there are benefits
    to going beyond the minimum requirements. OSH management will be more likely to
    succeed if it encourages the active participation of workers and sets up a dialogue
    between employees and management.
  es: Una de las claves para un buen liderazgo en materia de SST es hacer que se impliquen
    los trabajadores. Las empresas tienen el deber legal de consultar a sus empleados
    en materia de seguridad y salud. Pero hay beneficios que van más allá del cumplimiento
    de los requisitos mínimos. Es posible que la gestión de la SST tenga más éxito
    si se promueve la participación activa de los trabajadores y se establece un diálogo
    entre los empleados y la dirección.
  fi: <p>Hyvän turvallisuusjohtamisen yksi avaintekijä on se, miten hyvin henkilöstö
    saadaan osallistumaan mukaan turvallisuustoimintaan. Myös laki edellyttää työantajan
    ylläpitävän ja parantavan työturvallisuutta yhdessä työntekijöiden kanssa. Kun
    johto kannustaa henkilöstöä osallistumaan ja kuuntelee heidän ajatuksiaan, sitä
    paremmin turvallisuuden hallinnassa todennäköisesti onnistutaan.</p><p>Tunnista,
    mikä olisi teillä paras tapa saada henkilöstö mukaan. Onnistuisiko riskinarvioinnin
    toteutus esimerkiksi osana työyhteisöpalaveria tai kokoamalla henkilöstön edustajista
    arviointiryhmä, joka osallistuu riskinarviointiin? Yhteisen keskustelun pohjaksi
    ja palautteen saamiseksi voit myös ladata tai tulostaa riskinarvioitilomakkeen
    tai sen osioita henkilöstölle.</p>
  fr: <p>L'une des clés d'un bon leadership en matière de Sécurité et santé au travail
    est d'impliquer les travailleurs. Les employeurs ont l'obligation légale de consulter
    les travailleurs sur les questions de sécurité et de santé. Mais il y a des avantages
    à aller au-delà des exigences minimales. La gestion de la SST aura plus de chances
    de réussir si elle encourage la participation active des travailleurs et instaure
    un dialogue entre les travailleurs et la direction.</p><p>Les employeurs ont l’obligation
    juridique de consulter les salariés sur les questions de SST. Il existe toutefois
    des avantages à ne pas se limiter aux exigences minimales. La gestion de la SST
    aura davantage de chances de réussir si elle encourage la participation active
    des travailleurs et qu’elle établit un dialogue entre les salariés et la direction.</p><p>Décidez
    de la meilleure manière d’associer votre personnel ! Vous pouvez par exemple organiser
    une réunion ou un groupe de réflexion avec les travailleurs et passer en revue
    les différents modules de l’évaluation des risques. Vous pouvez également télécharger
    ou imprimer le contenu de l’outil ou des parties de l’outil et le partager pour
    information et retour d’information avec vos travailleurs.</p>
  hr: 'Jedan od ključeva dobrog upravljanja zaštitom na radu je uključivanje radnika.
    Poslodavci imaju zakonsku obvezu <a href=\"https://osha.europa.eu/en/legislation/directives/the-osh-framework-
    directive/the-osh-framework-directive-introduction\">legal duty</a>  obavijestiti
    radnike o pitanjima sigurnosti i zdravlja.  Međutim, nadilaženje minimalnih zahtjeva
    je korisno. Upravljanje zaštitom na radu bit će uspješnije ako se potiče aktivno
    sudjelovanje radnika i uspostavlja dijalog između zaposlenika i uprave.  '
  hu: A munkahelyi biztonság és egészségvédelem területén az egyik kulcs a munkavállalók
    bevonása.  A munkáltatók számára jogszabály írja elő, <a href="https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction">hogy</a>
    konzultáljanak a munkavállalókkal a munkahelyi egészségvédelmi és biztonsági kérdésekről.  Azonban
    a minimumkövetelményeken való túllépésnek vannak előnyei.  A munkahelyi egészségvédelmi
    és biztonsági kérdések kezelése nagyobb valószínűséggel lesz sikeres, ha az a
    munkavállalók aktív részvételére ösztönöz és párbeszédet hoz létre a munkavállalók
    és a vezetőség között.
  is: Einn af lyklunum að góðri forystu í vinnuvernd er að fá starfsmenn til þátttöku.
    Vinnuveitendur hafa <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>lagalegar
    skyldur</a> til að ráðfæra sig við starfsmenn um öryggis- og heilbrigðismál. En
    það eru kostir við að fara lengra en lágmarkskröfurnar. Vinnuverndarstjórnun mun
    líklegra ná árangri ef hún hvetur til virkrar þátttöku starfsmanna og setur upp
    samræður milli starfsmanna og stjórnenda.
  it: Al fine di una corretta rappresentatività delle reali condizioni di lavoro è
    consigliabile procedere preliminarmente ad un'attenta ricognizione di tutte le
    lavorazioni svolte, dei compiti assegnati ai lavoratori, degli ambienti di lavoro
    e delle informazioni disponibili relative alla prevenzione aziendale (documentazione
    aziendale esistente e informazioni assunte).
  lt: Vienas iš gerų darbuotojų saugos ir sveikatos (DSS) lyderystės raktų yra darbuotojų
    įtraukimas. Darbdaviai turi <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>teisinę
    pareigą</a> konsultuotis su darbuotojais saugos ir sveikatos klausimais. Tačiau
    viršijant minimalius reikalavimus galima gauti papildomos naudos. DSS valdymas
    bus sėkmingesnis, jei skatins aktyvų darbuotojų dalyvavimą ir sukurs dialogą tarp
    darbuotojų ir vadovybės.
  lv: <p>Viena no labas darba aizsardzības sistēmas vadības pazīmēm ir darbinieku
    iesaistīšana. Darba devējiem normatīvajos aktos ir noteikts pienākums konsultēties
    ar darbiniekiem par darba aizsardzības jautājumiem. Tomēr tam, ka tiek darīts
    vairāk nekā normatīvie akti prasa, ir pievienotā vērtība. Darba vide kļūst labāka
    un produktīvāka, ja tiek veicināta aktīva darbinieku iesaiste un tiek veidots
    dialogs strap darbiniekiem un vadību.</p><p>Izlemiet, kurš būs labākais veids,
    kā iesaistīt komandu. Jūs varat gan organizēt sanāksmi, gan darbinieku fokusgrupu
    diskusiju, kopā pārskatot darba vides riska novērtējuma daļas. Jūs varat arī lejuplādēt
    vai izdrukāt rīka saturu vai tā daļas, lai dalītos ar informāciju un saņemtu no
    darbiniekiem atgriezenisko saiti.</p>
  mt: Wieħed mill-fatturi ewlenin għal tmexxija tajba tas-saħħa u s-sigurtà fuq il-post
    tax-xogħol hija l-involviment tal-ħaddiema. Min iħaddem għandu dmir legali li
    jikkonsulta mal-impjegati dwar kwistjonijiet ta’ saħħa u sigurtà. Iżda hemm benefiċċji
    li wieħed imur lil hinn mir-rekwiżiti minimi. Ikun iktar probabbli s-suċċess tal-immaniġġjar
    tas-saħħa u s-sigurtà jekk tinkoraġġixxi l-parteċipazzjoni attiva tal-ħaddiema
    u tistabbilixxi djalogu bejn l-impjegati u l-maniġment.
  nl: Een van de sleutels tot goed leiderschap op het gebied van veiligheid en gezondheid
    op het werk (VGW) is het betrekken van werknemers. Werkgevers hebben een <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>wettelijke
    plicht</a> om werknemers te raadplegen over veiligheids- en gezondheidskwesties.
    Maar er zijn voordelen aan het verder gaan dan de minimumvereisten. VGW-management
    zal eerder succesvol zijn als het de actieve deelname van werknemers aanmoedigt
    en een dialoog tot stand brengt tussen werknemers en management.
  nl_BE: Eén van de sleutelelementen voor goed leiderschap op gebied van veiligheid
    en gezondheid op het werk is werknemersparticipatie. Werkgevers zijn wettelijk
    verplicht om werknemers te raadplegen over veiligheids- en gezondheidskwesties.
    Maar er zijn voordelen om verder te gaan dan de minimumbepalingen. Veiligheids-
    en gezondheidsmanagement zal eerder slagen als het de actieve participatie van
    de werknemers aanmoedigt en een dialoog instelt tussen werknemers en het management.
  'no': En av nøklene til godt OSH-lederskap er å involvere arbeidstakerne. Arbeidsgivere
    har en <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>juridisk
    plikt</a> til å konsultere ansatte om sikkerhets- og helsespørsmål. Men det er
    fordeler ved å gå utover minimumskravene. OSH-ledelse vil ha større sjanse for
    å lykkes hvis den oppmuntrer til aktiv deltakelse av arbeidstakere og etablerer
    en dialog mellom ansatte og ledelse.
  pt: Uma das chaves para a liderança forte e eficaz em matéria de Segurança e Saúde
    no Trabalho (SST) é garantir o envolvimento e a participação dos trabalhadores.
    As entidades patronais têm o dever legal de consultar os trabalhadores sobre questões
    de SST. Contudo, ir além dos requisitos mínimos traz benefícios. A gestão da SST
    terá mais probabilidades de ter sucesso se incentivar a participação ativa dos
    trabalhadores e estabelecer um diálogo entre estes e os quadros de chefia.
  sk: Jedným z kľúčov k dobrému vedeniu v oblasti BOZP je zapojenie zamestnancov.
    Preto majú zamestnávatelia <a href="https://osha.europa.eu/en/legislation/directives/the-osh-framework-
    directive/the-osh-framework-directive-introduction">zákonnú povinnosť</a> konzultovať
    otázky bezpečnosti a&nbsp;ochrany zdravia so zamestnancami . Prekročenie rámca
    minimálnych požiadaviek však má svoje výhody. Riadenie BOZP bude s väčšou pravdepodobnosťou
    úspešné, ak podnieti aktívnu účasť zamestnancov a vytvorí dialóg medzi zamestnancami
    a vedením.
  sl: Eden ključnih dejavnikov dobrega vodenja na področju varnosti in zdravja pri
    delu je vključevanje delavcev. Delodajalci imate zakonsko dolžnost, da se s svojimi
    zaposlenimi posvetujete o vprašanjih varnosti in zdravja pri delu. Če pa boste
    presegli minimalne zahteve, boste s tem dosegli še večje koristi. Upravljanje
    varnosti in zdravja pri delu bo še uspešnejše, če boste spodbujali aktivno sodelovanje
    delavcev in vzpostavili dialog med zaposlenimi in vodstvom.
  cy: Un o'r allweddi i arweinyddiaeth OSH dda yw cael gweithwyr yn ymwneud â'r gwaith.
    Mae gan gyflogwyr <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>ddyletswydd
    gyfreithiol</a> i ymgynghori â gweithwyr ar faterion iechyd a diogelwch. Ond mae
    manteision i fynd y tu hwnt i'r gofynion lleiaf. Bydd rheolaeth OSH yn fwy tebygol
    o lwyddo os yw'n annog cyfranogiad gweithgar gweithwyr ac yn sefydlu deialog rhwng
    gweithwyr a rheolwyr.
  da: En af nøglerne til god OSH-ledelse er at involvere medarbejderne. Arbejdsgivere
    har en <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>juridisk
    pligt</a> til at høre medarbejderne om sikkerheds- og sundhedsspørgsmål. Men der
    er fordele ved at gå ud over minimumskravene. OSH-ledelsen vil have større sandsynlighed
    for at lykkes, hvis den tilskynder til aktiv deltagelse af medarbejderne og etablerer
    en dialog mellem medarbejdere og ledelse.
  et: Üks hea tööohutuse ja töötervishoiu juhtimise võtmetegureid on töötajate kaasamine.
    Tööandjatel on <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>seaduslik
    kohustus</a> konsulteerida töötajatega ohutuse ja tervise küsimustes. Kuid miinimumnõuetest
    kaugemale minemisel on omad eelised. OSH-juhtimine õnnestub tõenäolisemalt, kui
    see julgustab töötajate aktiivset osalemist ning loob dialoogi töötajate ja juhtkonna
    vahel.
  ga: Ceann de na príomhrudaí le haghaidh ceannaireachta OSH maith ná oibrithe a chur
    ag glacadh páirt. Tá <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>dualgas
    dlíthiúil</a> ar fhostóirí dul i gcomhairle le fostaithe ar cheisteanna sábháilteachta
    agus sláinte. Ach tá buntáistí ag gabháil le dul thar na híoscheanglais. Beidh
    bainistíocht OSH níos dóchúla go n-éireoidh léi má spreagann sí rannpháirtíocht
    ghníomhach oibrithe agus má bhunaíonn sí idirphlé idir fostaithe agus bainistíocht.
  he: אחד המפתחות למנהיגות טובה בבטיחות ובריאות תעסוקתית (BST) הוא שיתוף העובדים.
    למעסיקים יש <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>חובה
    חוקית</a> להתייעץ עם עובדים בנושאי בטיחות ובריאות. אך יש יתרונות לחרוג מהדרישות
    המינימליות. ניהול BST צפוי להצליח יותר אם הוא מעודד השתתפות פעילה של עובדים ומקיים
    דיאלוג בין העובדים לבין ההנהלה.
  pl: Jednym z kluczy do dobrego przywództwa w zakresie BHP jest angażowanie pracowników.
    Pracodawcy mają <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>prawny
    obowiązek</a> konsultowania z pracownikami kwestii bezpieczeństwa i zdrowia. Jednak
    wychodzenie poza minimalne wymagania przynosi korzyści. Zarządzanie BHP będzie
    miało większe szanse powodzenia, jeśli zachęca do aktywnego uczestnictwa pracowników
    i ustanawia dialog między pracownikami a kierownictwem.
  ro: Una dintre cheile unui bun leadership în domeniul SSM este implicarea lucrătorilor.
    Angajatorii au o <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>obligație
    legală</a> de a consulta angajații cu privire la problemele de securitate și sănătate.
    Dar există beneficii în a depăși cerințele minime. Managementul SSM va avea mai
    multe șanse de succes dacă încurajează participarea activă a lucrătorilor și stabilește
    un dialog între angajați și conducere.
  ru: Один из ключей к эффективному руководству в области охраны труда — вовлечение
    работников. Работодатели несут <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>юридическую
    обязанность</a> консультироваться с сотрудниками по вопросам безопасности и охраны
    здоровья. Однако есть преимущества в том, чтобы выходить за рамки минимальных
    требований. Управление охраной труда будет иметь больше шансов на успех, если
    оно поощряет активное участие работников и налаживает диалог между сотрудниками
    и руководством.
  sq: Një nga çelësat e udhëheqjes së mirë në fushën e OSH-së është përfshirja e punëtorëve.
    Punëdhënësit kanë një <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>detyrim
    ligjor</a> për të konsultuar punonjësit për çështjet e sigurisë dhe shëndetit.
    Por ka përfitime nga tejkalimi i kërkesave minimale. Menaxhimi i OSH-së do të
    ketë më shumë gjasa të ketë sukses nëse nxit pjesëmarrjen aktive të punëtorëve
    dhe vendos një dialog ndërmjet punonjësve dhe menaxhmentit.
  sr: Jedan od ključeva dobrog rukovođenja u oblasti zaštite na radu jeste uključivanje
    radnika. Poslodavci imaju <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>zakonsku
    obavezu</a> da se konsultuju sa zaposlenima o pitanjima bezbednosti i zdravlja.
    Međutim, postoje prednosti u tome što se ide dalje od minimalnih zahteva. Upravljanje
    zaštitom na radu imaće veće šanse za uspeh ako podstiče aktivno učešće radnika
    i uspostavi dijalog između zaposlenih i rukovodstva.
  sv: En av nycklarna till ett bra ledarskap inom arbetsmiljöarbete är att involvera
    arbetstagarna. Arbetsgivare har en <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>lagstadgad
    skyldighet</a> att samråda med anställda om säkerhets- och hälsofrågor. Men det
    finns fördelar med att gå utöver minimikraven. Arbetsmiljöledning kommer att ha
    större chans att lyckas om den uppmuntrar till aktivt deltagande från arbetstagarna
    och skapar en dialog mellan anställda och ledning.
  uk: Одним із ключів до ефективного керівництва в галузі охорони праці є залучення
    працівників. Роботодавці мають <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>юридичний
    обов'язок</a> консультуватися з працівниками щодо питань безпеки та охорони здоров'я.
    Але є переваги в тому, щоб виходити за межі мінімальних вимог. Управління охороною
    праці матиме більше шансів на успіх, якщо воно заохочуватиме активну участь працівників
    та налагоджуватиме діалог між працівниками та керівництвом.
  nl_be: Een van de sleutels tot goed VGW-leiderschap is de betrokkenheid van werknemers.
    Werkgevers hebben een <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>wettelijke
    plicht</a> om werknemers te raadplegen over veiligheids- en gezondheidskwesties.
    Maar er zijn voordelen aan het overstijgen van de minimumvereisten. Het VGW-beheer
    zal meer kans op succes hebben als het de actieve deelname van werknemers aanmoedigt
    en een dialoog tussen werknemers en management tot stand brengt.
