label_training_answer_questions:
  bg: Вече можете да отговорите на няколко въпроса, за да докажете, че владеете тази тема, и да спечелите сертификата си.
  ca: Ara podeu respondre algunes preguntes per demostrar que domineu aquest tema i obtenir el vostre certificat.
  cs: Nyní můžete odpovědět na několik otázek, abyste prokázali, že ovládáte toto téma, a získali svůj certifikát.
  cy: Gallwch nawr ateb ychydig o gwestiynau i brofi eich bod yn meistroli'r pwnc hwn ac ennill eich tystysgrif.
  da: Du kan nu besvare et par spørgsmål for at bevise, at du behersker dette emne og tjene dit certifikat.
  de: Sie können jetzt ein paar Fragen beantworten, die zeigen, dass Sie das Thema beherrschen und das Zertifikat verdient haben.
  el: Μπορείτε τώρα να απαντήσετε σε μερικές ερωτήσεις για να αποδείξετε ότι κατέχετε αυτό το θέμα και να αποκτήσετε το πιστοποιητικό σας.
  en: You can now answer a few questions to prove that you master this topic and earn your certificate.
  es: Ahora puede responder algunas preguntas para demostrar que domina este tema y obtener su certificado.
  et: Nüüd saate vastata mõnele küsimusele, et tõestada, et valdate seda teemat, ja teenida oma sertifikaat.
  fi: Voit nyt vastata muutamaan kysymykseen osoittaaksesi hallitsevasi tämän aiheen ja ansaitaksesi sertifikaattisi.
  fr: Vous pouvez maintenant répondre à quelques questions pour prouver que vous maîtrisez ce sujet et obtenir votre certificat.
  ga: Is féidir leat cúpla ceist a fhreagairt anois chun a chruthú go bhfuil tú máistriúil ar an ábhar seo agus do theastas a thuilleamh.
  he: כעת תוכל לענות על כמה שאלות כדי להוכיח שאתה שולט בנושא זה ולהרוויח את התעודה שלך.
  hr: Sada možete odgovoriti na nekoliko pitanja kako biste dokazali da vladate ovom temom i zaradili svoju potvrdu.
  hu: Most néhány kérdés megválaszolásával bizonyíthatja, hogy jártas ebben a témában, és megszerezheti tanúsítványát.
  is: Þú getur nú svarað nokkrum spurningum til að sanna að þú ráðir yfir þessum efni og fengið vottorðið þitt.
  it: Puoi ora rispondere ad alcune domande per dimostrare che padroneggi questo argomento e ottenere il tuo certificato.
  lt: Dabar galite atsakyti į keletą klausimų, kad įrodytumėte, jog įvaldėte šią temą ir gautumėte sertifikatą.
  lv: Tagad varat atbildēt uz dažiem jautājumiem, lai pierādītu, ka pārzināt šo tēmu un iegūtu sertifikātu.
  mt: Issa tista' twieġeb ftit mistoqsijiet biex tipprova li int tajjeb f'dan is-suġġett u tikseb iċ-ċertifikat tiegħek.
  nl: Je kunt nu een paar vragen beantwoorden om aan te tonen dat je dit onderwerp beheerst en je certificaat te verdienen.
  nl_BE: U kunt nu een paar vragen beantwoorden om aan te tonen dat u dit onderwerp beheerst en uw certificaat te verdienen.
  nl_be: U kunt nu een paar vragen beantwoorden om aan te tonen dat u dit onderwerp beheerst en uw certificaat te verdienen.
  'no': Du kan nå svare på noen spørsmål for å bevise at du behersker dette emnet og tjene sertifikatet ditt.
  pl: Możesz teraz odpowiedzieć na kilka pytań, aby udowodnić, że opanowałeś ten temat i zdobyć swój certyfikat.
  pt: Pode agora responder a algumas perguntas para provar que domina este tópico e ganhar o seu certificado.
  ro: Puteți răspunde acum la câteva întrebări pentru a dovedi că stăpâniți acest subiect și pentru a obține certificatul.
  ru: Теперь вы можете ответить на несколько вопросов, чтобы доказать, что вы освоили эту тему, и получить сертификат.
  sk: Teraz môžete odpovedať na niekoľko otázok, aby ste preukázali, že ovládate túto tému, a získali certifikát.
  sl: Zdaj lahko odgovorite na nekaj vprašanj, da dokažete, da obvladate to temo, in pridobite potrdilo.
  sq: Tani mund të përgjigjeni disa pyetjeve për të provuar se e zotëroni këtë temë dhe për të fituar certifikatën tuaj.
  sr: Sada možete odgovoriti na nekoliko pitanja kako biste dokazali da savladate ovu temu i zaradili vaš sertifikat.
  sv: Du kan nu svara på några frågor för att bevisa att du behärskar det här ämnet och tjäna ditt certifikat.
  uk: Тепер ви можете відповісти на кілька запитань, щоб довести, що ви володієте цією темою, та отримати ваш сертифікат.
label_training_congratulations:
  bg: Поздравления, вече сте спечелили сертификата си за тази тема.
  ca: Enhorabona, ja heu obtingut el vostre certificat per a aquest tema.
  cs: Gratulujeme, nyní jste získali certifikát pro toto téma.
  cy: Llongyfarchiadau, rydych chi nawr wedi ennill eich tystysgrif ar gyfer y pwnc hwn.
  da: Tillykke, du har nu optjent dit certifikat for dette emne.
  de: Herzlichen Glückwunsch, Sie haben jetzt Ihr Zertifikat für dieses Thema verdient.
  el: Συγχαρητήρια, αποκτήσατε πλέον το πιστοποιητικό σας για αυτό το θέμα.
  en: Congratulations, you have now earned your certificate for this topic.
  es: Enhorabuena, ya ha obtenido su certificado para este tema.
  et: Palju õnne, olete nüüd teeninud selle teema sertifikaadi.
  fi: Onnittelut, olet nyt ansainnut sertifikaattisi tästä aiheesta.
  fr: Félicitations, vous avez maintenant obtenu votre certificat pour ce sujet.
  ga: Comhghairdeas, tá do theastas don ábhar seo tuillte agat anois.
  he: מזל טוב, כעת השגת את התעודה שלך בנושא זה.
  hr: Čestitamo, sada ste zaradili svoju potvrdu za ovu temu.
  hu: Gratulálunk, most megszerezte a tanúsítványát ehhez a témához.
  is: Til hamingju, þú hefur nú fengið vottorðið þitt fyrir þetta efni.
