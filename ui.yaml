  'no': Med dette sertifikatet kan du søke om reduksjon på selskapets forsikringspremier.
  pl: Dzięki temu certyfikatowi możesz ubiegać się o obniżkę składek ubezpieczeniowych swojej firmy.
  pt: Com este certificado, pode solicitar uma redução nas taxas de seguro da sua empresa
  ro: Cu acest certificat, puteți solicita o reducere a tarifelor de asigurare ale companiei dvs.
  ru: С этим сертификатом вы можете подать заявку на снижение страховых ставок вашей компании.
  sk: S týmto certifikátom môžete požiadať o zníženie sadzieb poistenia
  sl: S tem certifikatom lahko zaprosite za znižanje zavarovalnih premij vašega podjetja
  sq: Me këtë certifikatë, mund të aplikoni për një ulje të tarifave të sigurimit të kompanisë suaj.
  sr: Sa ovim sertifikatom, možete se prijaviti za smanjenje premija osiguranja vaše kompanije.
  sv: Med detta certifikat kan du ansöka om en minskning av ditt företags försäkringspriser.
  uk: З цим сертифікатом ви можете подати заявку на зниження страхових тарифів вашої компанії.
