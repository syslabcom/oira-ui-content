message_remove_document:
  en: You are about to remove this document. This action is irreversable.
  nl: U staat op het punt dit document te verwijderen. Deze handeling is onomkeerbaar.
  fr: Vous êtes sur le point de supprimer ce document. Cette action est irréversible.
  de: Sie sind dabei, dieses Dokument zu löschen. Diese Aktion ist irreversibel.
  bg: Предстои да премахнете този документ. Това действие е необратимо.
  ca: Esteu a punt d'eliminar aquest document. Aquesta acció és irreversible.
  cs: Chystáte se odebrat tento dokument. Tato akce je nevratná.
  cy: Rydych ar fin dileu'r ddogfen hon. Mae'r weithred hon yn anadferadwy.
  da: Du er ved at fjerne dette dokument. Denne handling er uigenkaldelig.
  el: Πρόκειται να καταργήσετε αυτό το έγγραφο. Αυτή η ενέργεια είναι μη αναστρέψιμη.
  es: Está a punto de eliminar este documento. Esta acción es irreversible.
  et: Olete selle dokumendi eemaldamas. See toiming on pöördumatu.
  fi: Olet poistamassa tämän asiakirjan. Tätä toimintoa ei voi peruuttaa.
  ga: Tá tú ar tí an doiciméad seo a bhaint. Ní féidir an gníomh seo a aisiompú.
  he: אתה עומד להסיר מסמך זה. פעולה זו אינה הפיכה.
  hr: Upravo ćete ukloniti ovaj dokument. Ova radnja je nepovratna.
  hu: Éppen eltávolítja ezt a dokumentumot. Ez a művelet visszafordíthatatlan.
  is: Þú ert að fara að fjarlægja þetta skjal. Þessi aðgerð er óafturkræf.
  it: Stai per rimuovere questo documento. Questa azione è irreversibile.
  'no': Du er i ferd med å fjerne dette dokumentet. Denne handlingen kan ikke angres.
  pl: Zamierzasz usunąć ten dokument. Ta czynność jest nieodwracalna.
  pt: Está prestes a remover este documento. Esta ação é irreversível.
  ro: Urmează să eliminați acest document. Această acțiune este ireversibilă.
  ru: Вы собираетесь удалить этот документ. Это действие необратимо.
  sk: Chystáte sa odstrániť tento dokument. Táto akcia je nezvratná.
  sl: Pravkar boste odstranili ta dokument. To dejanje je nepopravljivo.
  sq: Jeni duke fshirë këtë dokument. Ky veprim është i pakthyeshëm.
  sr: Upravo ćete ukloniti ovaj dokument. Ova radnja je nepovrativa.
  sv: Du håller på att ta bort det här dokumentet. Denna åtgärd kan inte ångras.
  uk: Ви збираєтесь видалити цей документ. Ця дія є незворотною.
  lt: Jūs ketinate pašalinti šį dokumentą. Šio veiksmo negalima atšaukti.
  lv: Jūs gatavojaties noņemt šo dokumentu. Šī darbība ir neatgriezeniska.
  mt: Inti ser tneħħi dan id-dokument. Din l-azzjoni hija irreversibbli.
  nl_BE: U staat op het punt dit document te verwijderen. Deze actie kan niet ongedaan
    worden gemaakt.
  nl_be: U staat op het punt dit document te verwijderen. Deze actie kan niet ongedaan
    worden gemaakt.
