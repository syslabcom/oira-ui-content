  sv: lista flera affärsenheter, eller filialer, eller butiker, etc. Dessa relaterade
    risker kommer att upprepas för varje namn du har angett.
  uk: перерахуйте кілька бізнес-одиниць, або філій, або магазинів тощо. Ці пов'язані
    ризики будуть повторені для кожного введеного вами імені.
explanation_briefing_documents:
