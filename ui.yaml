  de: Fügen Sie Ihrer Organisation einen Arbeitsschutzberater hinzu.
  el: Προσθέστε έναν σύμβουλο ΕΑΥ στον οργανισμό σας.
  en: Add an OSH-consultant to your organisation.
  es: Agregue un consultor de SST a su organización.
  et: Lisage oma organisatsioonile tööohutuse konsultant.
  fi: Lisää työturvallisuuskonsultti organisaatioosi.
  fr: Ajoutez un consultant SST à votre organisation.
  ga: Cuir comhairleoir OSH le do eagraíocht.
  he: הוסף יועץ בטיחות ובריאות תעסוקתית לארגון שלך.
  hr: Dodajte savjetnika za ZNR u svoju organizaciju.
  hu: Adjon hozzá munkahelyi egészségvédelmi és biztonsági tanácsadót szervezetéhez.
  is: Bættu ráðgjafa um vinnuvernd við stofnun þína.
  it: Aggiungi un consulente SSL alla tua organizzazione.
  lt: Pridėkite DSS konsultantą prie savo organizacijos.
  lv: Pievienojiet DSV konsultantu savai organizācijai.
  mt: Żid konsulent tas-SSO mal-organizzazzjoni tiegħek.
  nl: Voeg een OSH-adviseur toe aan uw organisatie.
  nl_BE: Voeg een preventieadviseur toe aan uw organisatie.
  nl_be: Voeg een preventieadviseur toe aan uw organisatie.
  'no': Legg til en HMS-konsulent i organisasjonen din.
  pl: Dodaj konsultanta BHP do swojej organizacji.
  pt: Adicione um consultor de SST à sua organização.
  ro: Adăugați un consultant SSM în organizația dvs.
  ru: Добавьте консультанта по ОТ в свою организацию.
  sk: Pridajte konzultanta BOZP do vašej organizácie.
  sl: Dodajte svetovalca za varnost in zdravje pri delu v svojo organizacijo.
  sq: Shtoni një konsulent OSH në organizatën tuaj.
  sr: Dodajte savetnika za zaštitu na radu u vašu organizaciju.
  sv: Lägg till en OSH-konsult i din organisation.
  uk: Додайте консультанта з ОП до своєї організації.
message_add_questions_to_the_training_from_the_sidebar:
  bg: Можете да добавите въпроси към обучението в раздела за обучение. Разделът за обучение може да бъде достъпен от страничната лента след запазване на настройките.
  ca: Podeu afegir preguntes a la formació a la secció de formació. Es pot accedir a la secció de formació des de la barra lateral després de desar la configuració.
  cs: Můžete přidat otázky do školení v sekci školení. Sekci školení lze přistupovat z postranního panelu po uložení nastavení.
  cy: Gallwch ychwanegu cwestiynau i'r hyfforddiant yn yr adran hyfforddiant. Gellir cyrchu'r adran hyfforddiant o'r bar ochr ar ôl cadw'r gosodiadau.
  da: Du kan tilføje spørgsmål til træningen i træningssektionen. Træningssektionen kan tilgås fra sidepanelet efter at have gemt indstillingerne.
  de: Sie können Fragen zum Training im Trainingsbereich hinzufügen. Der Trainingsbereich kann über die Seitenleiste aufgerufen werden, nachdem die Einstellungen gespeichert wurden.
  el: Μπορείτε να προσθέσετε ερωτήσεις στην εκπαίδευση στην ενότητα εκπαίδευσης. Η ενότητα εκπαίδευσης μπορεί να προσπελαστεί από την πλαϊνή γραμμή μετά την αποθήκευση των ρυθμίσεων.
  en: You may add questions to the training in the training section. The training section can be accessed from the sidebar after saving the settings.
  es: Puede agregar preguntas al entrenamiento en la sección de entrenamiento. La sección de entrenamiento se puede acceder desde la barra lateral después de guardar la configuración.
  et: Saate koolitusele lisada küsimusi koolituse jaotises. Koolituse jaotisele pääseb küljepaneelilt pärast seadete salvestamist.
  fi: Voit lisätä kysymyksiä koulutukseen koulutusosiossa. Koulutusosioon pääsee sivupalkista tallennettuasi asetukset.
  fr: Vous pouvez ajouter des questions à la formation dans la section formation. La section formation est accessible depuis la barre latérale après avoir enregistré les paramètres.
  ga: Is féidir leat ceisteanna a chur leis an traenáil sa rannán traenála. Is féidir rochtain a fháil ar an rannán traenála ón mbarra taoibh tar éis na socruithe a shábháil.
  he: ניתן להוסיף שאלות לאימון בסעיף האימון. סעיף האימון נגיש מסרגל הצד לאחר שמירת ההגדרות.
  hr: Možete dodati pitanja u obuku u odjeljku za obuku. Odjeljak za obuku može se pristupiti s bočne trake nakon spremanja postavki.
  hu: Hozzáadhat kérdéseket a képzéshez a képzési részben. A képzési rész a beállítások mentése után elérhető a sidebarról.
  is: Þú getur bætt spurningum við þjálfunina í þjálfunarhlutanum. Hægt er að nálgast þjálfunarhlutann frá hliðarstikunni eftir að hafa vistað stillingarnar.
  it: Puoi aggiungere domande all'addestramento nella sezione di addestramento. La sezione di addestramento è accessibile dalla barra laterale dopo aver salvato le impostazioni.
  lt: Galite pridėti klausimus į mokymąsi mokymo skyriuje. Mokymo skyrius pasiekiamas iš šoninės juostos po nustatymų išsaugojimo.
  lv: Jūs varat pievienot jautājumus apmācībai apmācības sadaļā. Apmācības sadaļa ir pieejama no sānjoslas pēc iestatījumu saglabāšanas.
  mt: Tista' żżid mistoqsijiet fit-taħriġ fit-taqsima tat-taħriġ. It-taqsima tat-taħriġ tista' tiġi aċċessata mill-barra laterali wara li tissejvjaw l-issettjar.
  nl: U kunt vragen toevoegen aan de training in de trainingssectie. De trainingssectie is toegankelijk vanuit de zijbalk nadat de instellingen zijn opgeslagen.
  nl_BE: U kunt vragen toevoegen aan de training in de trainingssectie. De trainingssectie is toegankelijk via de zijbalk na het opslaan van de instellingen.
  nl_be: U kunt vragen toevoegen aan de training in de trainingssectie. De trainingssectie is toegankelijk via de zijbalk na het opslaan van de instellingen.
  'no': Du kan legge til spørsmål i opplæringen i opplæringsdelen. Opplæringsdelen er tilgjengelig fra sidepanelet etter at innstillingene er lagret.
  pl: Możesz dodawać pytania do szkolenia w sekcji szkolenia. Sekcję szkolenia można uzyskać dostęp z bocznego paska po zapisaniu ustawień.
  pt: Você pode adicionar perguntas ao treinamento na seção de treinamento. A seção de treinamento pode ser acessada na barra lateral após salvar as configurações.
  ro: Puteți adăuga întrebări la instruire în secțiunea de instruire. Secțiunea de instruire poate fi accesată din bara laterală după salvarea setărilor.
  ru: Вы можете добавлять вопросы к обучению в разделе обучения. Раздел обучения доступен через боковую панель после сохранения настроек.
  sk: Môžete pridať otázky do školenia v časti školenia. Sekcia školenia je dostupná z bočnej lišty po uložení nastavení.
  sl: V razdelek za usposabljanje lahko dodate vprašanja v razdelek za usposabljanje. Razdelek za usposabljanje je dostopen s stranske vrstice po shranjevanju nastavitev.
  sq: Mund të shtoni pyetje në trajnim në seksionin e trajnimit. Seksioni i trajnimit mund të aksesohet nga shiriti anësor pasi të ruani cilësimet.
  sr: Možete dodati pitanja obuci u odeljku za obuku. Odeljku za obuku može se pristupiti iz bočne trake nakon čuvanja podešavanja.
  sv: Du kan lägga till frågor i träningen i träningsavsnittet. Träningsavsnittet kan nås från sidofältet efter att ha sparat inställningarna.
  uk: Ви можете додавати запитання до навчання у розділі навчання. До розділу навчання можна отримати доступ із бічної панелі після збереження налаштувань.
message_answer_will_be_randomised:
  bg: По време на обучението редът на отговорите ще бъде произволен за всеки въпрос.
  ca: Durant la formació, l'ordre de les respostes serà aleatori per a cada pregunta.
  cs: Během školení bude pořadí odpovědí pro každou otázku náhodné.
  cy: Yn ystod yr hyfforddiant, bydd trefn yr atebion yn cael ei hap-drefnu ar gyfer pob cwestiwn.
  da: Under træningen vil rækkefølgen af svarene blive tilfældigt for hver spørgsmål.
  de: Während der Schulung wird die Reihenfolge der Antworten für jede Frage randomisiert.
  el: Κατά τη διάρκεια της εκπαίδευσης, η σειρά των απαντήσεων θα είναι τυχαία για κάθε ερώτηση.
  en: During the training, the order of the answers will be randomised for each question.
  es: Durante la capacitación, el orden de las respuestas se aleatorizará para cada pregunta.
  et: Koolituse ajal vastuste järjestus iga küsimuse puhul juhuslikuks.
  fi: Koulutuksen aikana vastausten järjestys satunnaistetaan jokaiselle kysymykselle.
  fr: Pendant la formation, l'ordre des réponses sera randomisé pour chaque question.
  ga: Le linn an oiliúint, beidh ord na bhfreagraí randamach do gach ceist.
  he: במהלך ההכשרה, סדר התשובות יהיה אקראי עבור כל שאלה.
  hr: Tijekom obuke, redoslijed odgovora će biti nasumičan za svako pitanje.
  hu: A képzés során a válaszok sorrendje minden kérdésnél véletlenszerű lesz.
  is: Meðan á þjálfuninni stendur verður röð svaranna slembin fyrir hverja spurningu.
  it: Durante la formazione, l'ordine delle risposte sarà randomizzato per ogni domanda.
  lt: Mokymo metu atsakymų tvarka bus atsitiktinė kiekvienam klausimui.
  lv: Apmācības laikā atbilžu secība katram jautājumam tiks nejauši sajaukta.
  mt: Matul it-taħriġ, l-ordni tal-mistoqsijiet se tkun randomizzata għal kull mistoqsija.
  nl: Tijdens de training zal de volgorde van de antwoorden voor elke vraag worden gerandomiseerd.
  nl_BE: Tijdens de training wordt de volgorde van de antwoorden voor elke vraag willekeurig bepaald.
  nl_be: Tijdens de training wordt de volgorde van de antwoorden voor elke vraag willekeurig bepaald.
  'no': Under opplæringen vil rekkefølgen på svarene bli tilfeldig for hvert spørsmål.
  pl: Podczas szkolenia kolejność odpowiedzi będzie losowa dla każdego pytania.
  pt: Durante o treinamento, a ordem das respostas será randomizada para cada pergunta.
  ro: În timpul instruirii, ordinea răspunsurilor va fi aleatorie pentru fiecare întrebare.
  ru: Во время обучения порядок ответов будет случайным для каждого вопроса.
  sk: Během školení bude pořadí odpovědí pro každou otázku náhodné.
  sl: Med usposabljanjem bo vrstni red odgovorov naključen za vsako vprašanje.
  sq: Gjatë trajnimit, rendi i përgjigjeve do të jetë i rastësishëm për çdo pyetje.
  sr: Tokom obuke, redosled odgovora će biti nasumičan za svako pitanje.
  sv: Under utbildningen kommer ordningen på svaren att slumpas för varje fråga.
  uk: Під час навчання порядок відповідей буде рандомізований для кожного питання.
message_assessment_state_will_change_to_documents_sent:
  bg: Състоянието на оценката на риска ще се промени от "В процес" на "Брифинг документите са изпратени". Оценката на риска ще бъде заключена в този момент, за да се предотвратят по-нататъшни промени.
  ca: L'estat de l'avaluació de riscos canviarà de "En curs" a "Documents de briefing enviats". L'avaluació de riscos quedarà bloquejada en aquest punt per evitar canvis addicionals.
  cs: Stav hodnocení rizik se změní z "Probíhá" na "Dokumenty k briefingu odeslány". Hodnocení rizik bude v tomto okamžiku uzamčeno, aby se zabránilo dalším změnám.
  cy: Bydd cyflwr yr asesiad risg yn newid o "Ar y gweill" i "Dogfennau briffio wedi'u hanfon". Bydd yr asesiad risg yn cael ei gloi ar y pwynt hwn, i atal unrhyw newidiadau pellach.
  da: Risikovurderingens tilstand vil ændre sig fra "I gang" til "Briefingdokumenter sendt". Risikovurderingen vil blive låst på dette tidspunkt for at forhindre yderligere ændringer.
  de: Der Status dieser GBU ändert sich von “In Bearbeitung” zu “Einweisung versendet”. Die GBU wird dadurch gesperrt, so dass keine Änderungen mehr möglich sind.
  el: Η κατάσταση της εκτίμησης κινδύνου θα αλλάξει από "Σε εξέλιξη" σε "Έγγραφα ενημέρωσης εστάλησαν". Η εκτίμηση κινδύνου θα κλειδωθεί σε αυτό το σημείο, για να αποφευχθούν τυχόν περαιτέρω αλλαγές.
  en: The state of the risk assessment will change from "In progress" to “Briefing documents sent”. The risk assessment will be locked at this point, to prevent any futher changes.
  es: El estado de la evaluación de riesgos cambiará de "En curso" a "Documentos de presentación enviados". La evaluación de riesgos se bloqueará en este punto para evitar cualquier cambio adicional.
  et: Riskihinnangu olek muutub "Käimasolev" olekust "Brifingudokumendid saadetud" olekusse. Riskhinnang lukustatakse sel hetkel, et vältida edasisi muudatusi.
  fi: Riskiarvioinnin tila muuttuu "Käynnissä" tilasta "Tiedotusasiakirjat lähetetty" tilaan. Riskiarviointi lukitaan tässä vaiheessa mahdollisten lisämuutosten estämiseksi.
  fr: L'état de l'évaluation des risques passera de "En cours" à "Documents d'information envoyés". L'évaluation des risques sera verrouillée à ce stade, afin d'empêcher toute modification ultérieure.
  ga: Athrófar staid na measúnachta riosca ó "Ar siúl" go "Doiciméid achoimre seolta". Cuirfear glas ar an measúnacht riosca ag an bpointe seo chun aon athruithe breise a chosc.
  he: מצב הערכת הסיכונים ישתנה מ-"בתהליך" ל-"מסמכי תדריך נשלחו". הערכת הסיכונים תינעל בשלב זה, למניעת כל שינוי נוסף.
  hr: Stanje procjene rizika promijenit će se s "U tijeku" na "Dokumenti o uvođenju poslani". Procjena rizika bit će zaključana u ovoj točki kako bi se spriječile daljnje izmjene.
  hu: A kockázatértékelés állapota "Folyamatban" értékről "Tájékoztató dokumentumok elküldve" értékre változik. A kockázatértékelés ezen a ponton zárolásra kerül, hogy megakadályozza a további módosításokat.
  is: Staða áhættumatssins mun breytast frá "Í gangi" í "Kynningargögn send". Áhættumatið verður læst á þessum tímapunkti til að koma í veg fyrir frekari breytingar.
  it: Lo stato della valutazione del rischio cambierà da "In corso" a "Documenti di briefing inviati". La valutazione del rischio verrà bloccata in questo momento per impedire ulteriori modifiche.
  lt: Rizikos vertinimo būsena pasikeis iš "Vykdoma" į "Informaciniai dokumentai išsiųsti". Šiuo momentu rizikos vertinimas bus užrakintas, kad nebūtų galima atlikti jokių papildomų pakeitimų.
  lv: Riska novērtējuma statuss mainīsies no "Notiek" uz "Instruktāžas dokumenti nosūtīti". Šajā brīdī riska novērtējums tiks bloķēts, lai novērstu turpmākas izmaiņas.
  mt: L-istat tal-valutazzjoni tar-riskju se jinbidel minn "In progress" għal "Dokumenti ta' briefing mibgħuta". Il-valutazzjoni tar-riskju se tiġi msakkra f'dan il-punt, biex jiġu evitati aktar bidliet.
  nl: De status van de risicobeoordeling verandert van "In uitvoering" naar "Briefingdocumenten verzonden". De risicobeoordeling wordt op dit punt vergrendeld om verdere wijzigingen te voorkomen.
  nl_BE: De status van de risicobeoordeling verandert van "In uitvoering" naar "Briefingdocumenten verzonden". De risicobeoordeling wordt op dit punt vergrendeld om verdere wijzigingen te voorkomen.
  nl_be: De status van de risicobeoordeling zal veranderen van "In uitvoering" naar "Briefingdocumenten verzonden". De risicobeoordeling wordt op dit punt vergrendeld om verdere wijzigingen te voorkomen.
  'no': Statusen til risikovurderingen vil endres fra "Pågående" til "Orienteringsdokumenter sendt". Risikovurderingen vil bli låst på dette tidspunktet for å forhindre ytterligere endringer.
  pl: Stan oceny ryzyka zmieni się z "W trakcie" na "Dokumenty briefingowe wysłane". Ocena ryzyka zostanie zablokowana w tym momencie, aby zapobiec dalszym zmianom.
  pt: O estado da avaliação de risco mudará de "Em progresso" para "Documentos de briefing enviados". A avaliação de risco será bloqueada neste ponto para evitar quaisquer alterações futuras.
  ro: Starea evaluării riscurilor se va schimba din "În desfășurare" în "Documente de informare trimise". Evaluarea riscurilor va fi blocată în acest moment pentru a preveni orice modificări ulterioare.
  ru: Статус оценки рисков изменится с "В процессе" на "Инструктивные документы отправлены". На этом этапе оценка рисков будет заблокирована, чтобы предотвратить дальнейшие изменения.
  sk: Stav hodnotenia rizík sa zmení z "Prebieha" na "Informačné dokumenty odoslané". V tomto bode bude hodnotenie rizík uzamknuté, aby sa zabránilo ďalším zmenám.
  sl: Stanje ocene tveganja se bo spremenilo iz "V teku" v "Informativni dokumenti poslani". Ocena tveganja bo v tej točki zaklenjena, da se preprečijo nadaljnje spremembe.
  sq: Gjendja e vlerësimit të rrezikut do të ndryshojë nga "Në progres" në "Dokumentet e orientimit të dërguar". Vlerësimi i rrezikut do të bllokohet në këtë pikë, për të parandaluar ndryshime të mëtejshme.
  sr: Status procene rizika će se promeniti sa "U toku" na "Brifing dokumenti poslati". Procena rizika će biti zaključana u ovoj tački, kako bi se sprečile dalje promene.
  sv: Statusen för riskbedömningen ändras från "Pågående" till "Informationsdokument skickade". Riskbedömningen låses vid detta tillfälle för att förhindra ytterligare ändringar.
  uk: Статус оцінки ризиків зміниться з "В процесі" на "Інформаційні документи надіслано". На цьому етапі оцінка ризиків буде заблокована, щоб запобігти будь-яким подальшим змінам.
message_assessment_under_review:
  bg: Тази оценка на риска в момента се преглежда от ${user}.
  ca: Aquesta avaluació de riscos es troba actualment en revisió per ${user}.
  cs: Toto hodnocení rizik je v současné době přezkoumáváno uživatelem ${user}.
  cy: Mae'r asesiad risg hwn ar hyn o bryd yn cael ei adolygu gan ${user}.
  da: Denne risikovurdering er i øjeblikket under gennemgang af ${user}.
  de: Diese Risikobewertung wird derzeit von ${user} überprüft.
  el: Αυτή η εκτίμηση κινδύνου βρίσκεται αυτήν τη στιγμή υπό αναθεώρηση από τον ${user}.
  en: This risk assessment is currently under review by ${user}.
  es: Esta evaluación de riesgos está siendo revisada actualmente por ${user}.
  et: Seda riskihinnangut vaatab praegu üle ${user}.
  fi: Tätä riskiarviointia tarkistaa parhaillaan ${user}.
  fr: Cette évaluation des risques est actuellement en cours d'examen par ${user}.
  ga: Tá an measúnú riosca seo á athbhreithniú faoi láthair ag ${user}.
  he: הערכת סיכון זו נמצאת כרגע בבדיקה על ידי ${user}.
  hr: Ovu procjenu rizika trenutno pregledava ${user}.
  hu: Ezt a kockázatértékelést jelenleg ${user} vizsgálja felül.
  is: Þetta áhættumat er nú til skoðunar hjá ${user}.
  it: Questa valutazione dei rischi è attualmente in revisione da parte di ${user}.
  lt: Šį rizikos vertinimą šiuo metu peržiūri ${user}.
  lv: Šo riska novērtējumu pašlaik pārskata ${user}.
  mt: Din il-valutazzjoni tar-riskju bħalissa qed tiġi rriveduta minn ${user}.
  nl: Deze risicobeoordeling wordt momenteel beoordeeld door ${user}.
  nl_BE: Deze risicobeoordeling wordt momenteel beoordeeld door ${user}.
  nl_be: Deze risicobeoordeling wordt momenteel beoordeeld door ${user}.
  'no': Denne risikovurderingen er for øyeblikket under gjennomgang av ${user}.
  pl: Ta ocena ryzyka jest obecnie sprawdzana przez ${user}.
  pt: Esta avaliação de risco está atualmente sendo revisada por ${user}.
  ro: Această evaluare a riscurilor este în prezent în curs de revizuire de către ${user}.
  ru: Данная оценка рисков в настоящее время проверяется пользователем ${user}.
  sk: Toto hodnotenie rizík je momentálne v procese kontroly používateľom ${user}.
  sl: To oceno tveganja trenutno pregleduje ${user}.
  sq: Ky vlerësim i rreziqeve është aktualisht nën shqyrtim nga ${user}.
  sr: Ovu procenu rizika trenutno pregledava ${user}.
  sv: Denna riskbedömning granskas för närvarande av ${user}.
  uk: Ця оцінка ризиків наразі перебуває на перевірці у ${user}.
message_author_training_question_answer_order_notice:
  bg: По време на обучението въпросите ще бъдат подредени в произволен ред. Освен това, отговорите на всеки въпрос също ще бъдат представени в произволна последователност за подобрено учебно ангажиране.
  ca: Durant la formació, les preguntes s'ordenaran de manera aleatòria. A més, les respostes de cada pregunta també es presentaran en una seqüència aleatòria per a una major implicació en l'aprenentatge.
  cs: Během školení budou otázky uspořádány v náhodném pořadí. Kromě toho budou odpovědi na každou otázku také prezentovány v náhodném pořadí pro lepší zapojení do učení.
  cy: Yn ystod yr hyfforddiant, bydd y cwestiynau'n cael eu trefnu mewn trefn ar hap. Ar ben hynny, bydd yr atebion ar gyfer pob cwestiwn hefyd yn cael eu cyflwyno mewn dilyniant ar hap er mwyn gwella ymgysylltiad dysgu.
  da: Under træningen vil spørgsmålene blive arrangeret i en tilfældig rækkefølge. Desuden vil svarene på hvert spørgsmål også blive præsenteret i en tilfældig sekvens for at forbedre læringsengagementet.
  de: Während des Trainings werden die Fragen in einer zufälligen Reihenfolge angeordnet. Darüber hinaus werden die Antworten auf jede Frage auch in einer zufälligen Sequenz präsentiert, um die Lernbeteiligung zu verbessern.
  el: Κατά τη διάρκεια της εκπαίδευσης, οι ερωτήσεις θα οργανωθούν σε τυχαία σειρά. Επιπλέον, οι απαντήσεις για κάθε ερώτηση θα παρουσιαστούν επίσης σε τυχαία ακολουθία για ενισχυμένη συμμετοχή στη μάθηση.
  en: During the training, the questions will be arranged in a randomised order. Furthermore, the answers for each question will also be presented in a random sequence for enhanced learning engagement.
  es: Durante el entrenamiento, las preguntas se organizarán en un orden aleatorio. Además, las respuestas para cada pregunta también se presentarán en una secuencia aleatoria para mejorar el compromiso con el aprendizaje.
  et: Koolituse ajal paigutatakse küsimused juhuslikku järjekorda. Lisaks esitatakse iga küsimuse vastused samuti juhuslikus järjestuses, et suurendada õppimise kaasatust.
  fi: Koulutuksen aikana kysymykset järjestetään satunnaiseen järjestykseen. Lisäksi kunkin kysymyksen vastaukset esitetään myös satunnaisessa järjestyksessä, mikä lisää oppimisen sitoutumista.
  fr: Pendant la formation, les questions seront organisées dans un ordre aléatoire. De plus, les réponses à chaque question seront également présentées dans une séquence aléatoire pour améliorer l'engagement d'apprentissage.
  ga: Le linn an oiliúna, beidh na ceisteanna eagraithe i ndiaidh a chéile go randamach. Ina theannta sin, cuirfear na freagraí ar gach ceist i láthair i sraith randamach chun rannpháirtíocht foghlama a fheabhsú.
  he: במהלך האימון, השאלות יועברו בסדר כלשהו. בנוסף, התשובות לכל שאלה יוצגו גם בסדר כלשהו על מנת לשפר את ההתמקדות בלמידה.
  hr: Tijekom obuke, pitanja će biti raspoređena u nasumičnom redoslijedu. Nadalje, odgovori na svako pitanje također će biti prikazani u nasumičnom slijedu za poboljšanu uključenost u učenje.
  hu: Az oktatás során a kérdéseket véletlenszerű sorrendben rendezik. Emellett minden kérdésre adott válaszok is véletlenszerű sorrendben lesznek bemutatva a fokozott tanulási elkötelezettség érdekében.
  is: Á meðan á þjálfuninni stendur verða spurningarnar raðaðar í handahófskennda röð. Að auki verða svörin við hverri spurningu einnig sett fram í handahófskenndri röð til að auka námsþátttöku.
  it: Durante la formazione, le domande saranno disposte in un ordine casuale. Inoltre, le risposte per ogni domanda saranno presentate in una sequenza casuale per migliorare l'coinvolgimento nell'apprendimento.
  lt: Mokymo metu klausimai bus išdėstyti atsitiktine tvarka. Be to, kiekvieno klausimo atsakymai taip pat bus pateikti atsitiktine seka, siekiant padidinti mokymosi įtraukimą.
  lv: Apmācības laikā jautājumi tiks sakārtoti nejaušā secībā. Turklāt katras jautājuma atbildes tiks arī izklāstītas nejaušā secībā, lai uzlabotu mācīšanās iesaistīšanos.
  mt: Matul it-taħriġ, il-mistoqsijiet jiġu organizzati f'ordni każwali. Barra minn hekk, it-tweġibiet għal kull mistoqsija se jiġu ppreżentati wkoll f'sekwenza każwali biex jiġi msaħħaħ l-impenn fl-apprendiment.
  nl: Tijdens de training zullen de vragen in willekeurige volgorde worden gerangschikt. Bovendien zullen de antwoorden op elke vraag ook in een willekeurige volgorde worden gepresenteerd om de betrokkenheid bij het leren te verhogen.
  nl_BE: Tijdens de opleiding worden de vragen in een willekeurige volgorde gerangschikt. Bovendien worden de antwoorden op elke vraag ook in een willekeurige volgorde gepresenteerd voor een betere leerervaring.
  nl_be: Tijdens de training worden de vragen in een willekeurige volgorde gerangschikt. Bovendien worden de antwoorden voor elke vraag ook in een willekeurige volgorde gepresenteerd voor een verbeterde leerervaring.
  'no': Under opplæringen vil spørsmålene bli arrangert i tilfeldig rekkefølge. Videre vil svarene for hvert spørsmål også bli presentert i en tilfeldig rekkefølge for økt læringsengasjement.
  pl: Podczas szkolenia pytania będą ułożone w losowej kolejności. Ponadto odpowiedzi na każde pytanie będą również prezentowane w losowej kolejności, co zwiększy zaangażowanie w uczenie się.
  pt: Durante o treinamento, as perguntas serão organizadas em uma ordem aleatória. Além disso, as respostas para cada pergunta também serão apresentadas em uma sequência aleatória para aumentar o engajamento no aprendizado.
  ro: În timpul instruirii, întrebările vor fi aranjate într-o ordine aleatorie. În plus, răspunsurile la fiecare întrebare vor fi prezentate, de asemenea, într-o secvență aleatorie pentru angajamentul sporit în învățare.
  ru: Во время обучения вопросы будут расставлены в случайном порядке. Кроме того, ответы на каждый вопрос также будут представлены в случайной последовательности для повышения вовлечённости в процесс обучения.
  sk: Počas tréningu budú otázky usporiadané v náhodnom poradí. Okrem toho budú odpovede na každú otázku tiež prezentované v náhodnej sekvencii pre zvýšené angažovanie pri učení.
  sl: Med usposabljanjem bodo vprašanja razporejena v naključnem vrstnem redu. Poleg tega bodo odgovori na vsako vprašanje prav tako predstavljeni v naključnem zaporedju za povečano vključevanje v učenje.
  sq: Gjatë trajnimit, pyetjet do të renditen në një rend të rastësishëm. Për më tepër, përgjigjet për çdo pyetje gjithashtu do të paraqiten në një sekuencë të rastësishme për angazhim më të mirë në të nxënë.
  sr: Tokom obuke, pitanja će biti raspoređena nasumičnim redosledom. Pored toga, odgovori za svako pitanje takođe će biti prikazani u nasumičnom nizu radi boljeg angažovanja u učenju.
  sv: Under träningen kommer frågorna att ordnas i en slumpmässig ordning. Dessutom kommer svaren på varje fråga också att presenteras i en slumpmässig sekvens för att öka engagemanget i lärandet.
  uk: Під час навчання питання будуть розташовані у випадковому порядку. Крім того, відповіді на кожне запитання також будуть представлені у випадковій послідовності для підвищення залученості до навчання.
