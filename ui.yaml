  uk: ${user} переглянув, підтвердив та заблокував цю оцінку ризиків.
  bg: ${user} е прегледал, валидирал и заключил тази оценка на риска.
  ca: ${user} ha revisat, validat i bloquejat aquesta avaluació de riscos.
  cs: ${user} přezkoumal, validoval a uzamkl toto hodnocení rizik.
  cy: Mae ${user} wedi adolygu, dilysu a chloi'r asesiad risg hwn.
  da: ${user} har gennemgået, valideret og låst denne risikovurdering.
  el: ${user} έχει αναθεωρήσει, επικυρώσει και κλειδώσει αυτή την εκτίμηση κινδύνου.
  es: ${user} ha revisado, validado y bloqueado esta evaluación de riesgos.
  et: ${user} on selle riskihinnangu üle vaadanud, kinnitanud ja lukustanud.
  fi: ${user} on tarkistanut, vahvistanut ja lukinnut tämän riskiarvioinnin.
