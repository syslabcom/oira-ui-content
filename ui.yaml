are_you_sure_delete:
  bg: Сигурни ли сте, че искате да изтриете тази сесия? Това действие не може да бъде отменено.
  ca: Esteu segur que voleu eliminar aquesta sessió? Aquesta acció no es pot revertir.
  cs: Opravdu chcete odstranit tuto relaci? Tuto akci nelze vrátit zpět.
  cy: Ydych chi'n siŵr eich bod am ddileu'r sesiwn hon? Ni ellir gwrthdroi'r weithred hon.
  da: Er du sikker på, at du vil slette denne session? Denne handling kan ikke fortrydes.
  de: Sind Sie sicher, dass Sie diese Sitzung löschen möchten? Diese Aktion kann nicht rückgängig gemacht werden.
  el: Είστε βέβαιοι ότι θέλετε να διαγράψετε αυτή τη συνεδρία; Αυτή η ενέργεια δεν μπορεί να αναιρεθεί.
  en: Are you sure you want to delete this session? This action can not be reverted.
  es: ¿Está seguro de que desea eliminar esta sesión? Esta acción no se puede revertir.
  et: Kas olete kindel, et soovite selle seansi kustutada? Seda toimingut ei saa tagasi võtta.
  fi: Haluatko varmasti poistaa tämän istunnon? Tätä toimintoa ei voi peruuttaa.
  fr: Êtes-vous sûr de vouloir supprimer cette session ? Cette action ne peut pas être annulée.
  ga: An bhfuil tú cinnte go bhfuil tú ag iarraidh an seisiún seo a scriosadh? Ní féidir an gníomh seo a aisiompú.
  he: האם אתה בטוח שברצונך למחוק את ההפעלה הזו? לא ניתן לבטל פעולה זו.
  hr: Jeste li sigurni da želite izbrisati ovu sesiju? Ova radnja se ne može poništiti.
  hu: Biztosan törölni szeretné ezt a munkamenetet? Ez a művelet nem vonható vissza.
  is: Ertu viss um að þú viljir eyða þessari lotu? Þessa aðgerð er ekki hægt að afturkalla.
  it: Sei sicuro di voler eliminare questa sessione? Questa azione non può essere annullata.
  lt: Ar tikrai norite ištrinti šią sesiją? Šio veiksmo negalima atšaukti.
  lv: Vai esat pārliecināts, ka vēlaties dzēst šo sesiju? Šo darbību nevar atcelt.
  mt: Inti żgur li trid tħassar din is-sessjoni? Din l-azzjoni ma tistax tiġi rrevertita.
  nl: Weet u zeker dat u deze sessie wilt verwijderen? Deze actie kan niet ongedaan worden gemaakt.
  nl_BE: Weet u zeker dat u deze sessie wilt verwijderen? Deze actie kan niet ongedaan worden gemaakt.
  nl_be: Weet u zeker dat u deze sessie wilt verwijderen? Deze actie kan niet ongedaan worden gemaakt.
  'no': Er du sikker på at du vil slette denne økten? Denne handlingen kan ikke angres.
  pl: Czy na pewno chcesz usunąć tę sesję? Tej operacji nie można cofnąć.
  pt: Tem a certeza de que pretende eliminar esta sessão? Esta ação não pode ser revertida.
  ro: Sigur doriți să ștergeți această sesiune? Această acțiune nu poate fi anulată.
  ru: Вы уверены, что хотите удалить эту сессию? Это действие нельзя отменить.
  sk: Ste si istý/á, že chcete odstrániť túto reláciu? Túto akciu nie je možné vrátiť späť.
  sl: Ali ste prepričani, da želite izbrisati to sejo? Tega dejanja ni mogoče razveljaviti.
  sq: Jeni të sigurt që dëshironi të fshini këtë sesion? Ky veprim nuk mund të kthehet.
  sr: Da li ste sigurni da želite da izbrišete ovu sesiju? Ova radnja se ne može poništiti.
  sv: Är du säker på att du vill ta bort denna session? Denna åtgärd kan inte ångras.
