  bg: Регистрирайте вземане на проба за тази оценка на риска.
  ca: Registreu el mostreig d'aquesta avaluació de riscos.
  cs: Zaregistrujte vzorkování tohoto hodnocení rizik.
  cy: Cofrestrwch samplu'r asesiad risg hwn.
  da: Registrer stikprøvetagning af denne risikovurdering.
  el: Καταχωρίστε δειγματοληψία αυτής της εκτίμησης κινδύνου.
  es: Registre el muestreo de esta evaluación de riesgos.
  et: Registreerige selle riskihinnangu proovivõtmine.
  fi: Rekisteröi tämän riskiarvioinnin näytteenotto.
  fr: Enregistrez l'échantillonnage de cette évaluation des risques.
  ga: Cláraigh sampláil an mheasúnaithe riosca seo.
  he: רשום דגימה של הערכת סיכון זו.
  hr: Registrirajte uzorkovanje ove procjene rizika.
  hu: A kockázatbecslés mintavételének rögzítése.
  is: Skráðu sýnatöku á þessari áhættumat.
  it: Registra il campionamento di questa valutazione del rischio.
  lt: Užregistruokite šio rizikos vertinimo ėminį.
  lv: Reģistrēt šī riska novērtējuma paraugu ņemšanu.
  mt: Irreġistra l-kampjunar ta' din il-valutazzjoni tar-riskju.
  nl: Registreer de bemonstering van deze risicobeoordeling.
  nl_BE: Steekproef registreren voor deze risicobeoordeling.
  nl_be: Steekproef registreren voor deze risicobeoordeling.
  'no': Registrer prøvetaking for denne risikovurderingen.
  pl: Zarejestruj pobieranie próbek dla tej oceny ryzyka.
  pt: Registar amostragem desta avaliação de risco.
  ro: Înregistrați eșantionarea acestei evaluări de risc.
  ru: Зарегистрировать выборку этой оценки рисков.
  sk: Zaregistrovať vzorkovanie tohto hodnotenia rizík.
  sl: Registrirajte vzorčenje te ocene tveganja.
  sq: Regjistroni kampionimin e këtij vlerësimi rreziku.
  sr: Registrujte uzorkovanje ove procene rizika.
  sv: Registrera provtagning för den här riskbedömningen.
  uk: Зареєструйте відбір зразків для цієї оцінки ризику.
message_session_locked_v2:
  de: Diese GBU ist gesperrt, weil die Einweisungsunterlagen bereits versendet wurden.
  en: This risk assessment is locked because the briefing documents were already sent
    to the contractor.
  bg: Тази оценка на риска е заключена, тъй като инструктажните документи вече са
    изпратени на изпълнителя.
  ca: Aquesta avaluació de riscos està bloquejada perquè els documents d'informació
    ja s'han enviat al contractista.
  cs: Toto hodnocení rizik je uzamčeno, protože informační dokumenty již byly odeslány
    dodavateli.
  cy: Mae'r asesiad risg hwn wedi'i gloi oherwydd bod y dogfennau briffio eisoes wedi'u
    hanfon at y contractwr.
  da: Denne risikovurdering er låst, fordi briefingdokumenterne allerede er sendt
    til entreprenøren.
  el: Αυτή η εκτίμηση κινδύνου είναι κλειδωμένη επειδή τα έγγραφα ενημέρωσης εστάλησαν
    ήδη στον εργολάβο.
  es: Esta evaluación de riesgos está bloqueada porque los documentos informativos
    ya fueron enviados al contratista.
  et: See riskihinnang on lukustatud, kuna briifingudokumendid saadeti juba töövõtjale.
  fi: Tämä riskiarviointi on lukittu, koska tiedotusasiakirjat on jo lähetetty urakoitsijalle.
  fr: Cette évaluation des risques est verrouillée car les documents d'information
    ont déjà été envoyés au sous-traitant.
  ga: Tá an measúnú riosca seo glasáilte toisc gur seoladh na cáipéisí brífinge cheana
    féin chuig an gconraitheoir.
  he: הערכת סיכון זו נעולה מכיוון שמסמכי הבריפינג כבר נשלחו לקבלן.
  hr: Ova procjena rizika je zaključana jer su dokumenti za informiranje već poslani
    izvođaču.
  hu: Ez a kockázatbecslés zárolva van, mert a tájékoztató dokumentumokat már elküldték
    a vállalkozónak.
  is: Þessi áhættumat er læst vegna þess að kynningargögnin hafa þegar verið send
    til verktakans.
  it: Questa valutazione del rischio è bloccata perché i documenti di briefing sono
    già stati inviati all'appaltatore.
  lt: Šis rizikos vertinimas yra užrakintas, nes instruktavimo dokumentai jau buvo
    išsiųsti rangovui.
  lv: Šis riska novērtējums ir bloķēts, jo instruktāžas dokumenti jau tika nosūtīti
    darbuzņēmējam.
  mt: Din il-valutazzjoni tar-riskju hija mblukkata minħabba li d-dokumenti tal-briefing
    diġà ntbagħtu lill-kuntrattur.
  nl: Deze risicobeoordeling is vergrendeld omdat de briefingdocumenten al naar de
    aannemer zijn verzonden.
  nl_BE: Deze risicobeoordeling is vergrendeld omdat de briefingdocumenten al naar
    de aannemer zijn verzonden.
  nl_be: Deze risicobeoordeling is vergrendeld omdat de briefingdocumenten al naar
    de aannemer zijn verzonden.
  'no': Denne risikovurderingen er låst fordi briefingdokumentene allerede ble sendt
    til entrepr\u00enøren.
  pl: Ta ocena ryzyka jest zablokowana, ponieważ dokumenty briefingowe zostały już
    wysłane do wykonawcy.
  pt: Esta avaliação de risco está bloqueada porque os documentos de briefing já foram
    enviados ao empreiteiro.
  ro: Această evaluare de risc este blocată deoarece documentele de informare au fost
    deja trimise contractantului.
  ru: Эта оценка рисков заблокирована, так как инструктажные документы уже были отправлены
    подрядчику.
  sk: Toto hodnotenie rizík je uzamknuté, pretože informačné dokumenty boli už odoslané
