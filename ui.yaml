label_training_achievement_listed:
  bg: Вашето постижение ще бъде посочено под „Моите обучения" в портлета за обучение на таблото. Оттам можете винаги да преглеждате или отпечатвате сертификата си, ако желаете.
  ca: El vostre assoliment apareixerà a "Les meves formacions" al portlet de formació del tauler. Des d'allà podeu veure o imprimir el vostre certificat quan vulgueu.
  cs: Vaše úspěchy budou uvedeny pod "Moje školení" v portletu školení na řídicím panelu. Odtud si můžete kdykoli prohlédnout nebo vytisknout svůj certifikát.
  cy: Bydd eich cyflawniad wedi'i restru o dan "Fy hyfforddiant" yn y portled hyfforddi ar y dangosfwrdd. O'r fan honno gallwch bob amser weld neu argraffu eich tystysgrif os dymunwch.
  da: Din præstation vil blive vist under "Mine uddannelser" i uddannelsesportletten på dashboardet. Derfra kan du altid se eller udskrive dit certifikat, hvis du ønsker det.
  de: Ihr Erfolg wird unter der Überschrift “Meine Unterweisungen” auf dem Dashboard zu sehen sein. Von dort können Sie jederzeit Ihr Zertifikat betrachten oder ausdrucken.
  el: Το επίτευγμά σας θα καταχωριστεί στην ενότητα «Οι εκπαιδεύσεις μου» στο portlet εκπαίδευσης στον πίνακα ελέγχου. Από εκεί μπορείτε πάντα να προβάλλετε ή να εκτυπώνετε το πιστοποιητικό σας εάν το επιθυμείτε.
  en: Your achievement will be listed under “My trainings” in the training portlet on the dashboard. From there you can always view or print your certificate if you like.
  es: Su logro aparecerá en "Mis formaciones" en el portlet de formación del panel de control. Desde allí siempre podrá ver o imprimir su certificado si lo desea.
  et: Teie saavutus kuvatakse armatuurlaua koolitusportleti jaotises "Minu koolitused". Sealt saate alati vaadata või printida oma sertifikaati, kui soovite.
  fi: Saavutuksesi näkyy kohdassa "Omat koulutukset" koontinäytön koulutusportletissa. Sieltä voit aina tarkastella tai tulostaa sertifikaattisi halutessasi.
  fr: Votre réalisation sera répertoriée sous "Mes formations" dans le portlet de formation du tableau de bord. De là, vous pouvez toujours consulter ou imprimer votre certificat si vous le souhaitez.
  ga: Liostálfar do ghnóthachtáil faoi "Mo chuid oiliúintí" sa phortlet oiliúna ar an deais. As sin is féidir leat do theastas a fheiceáil nó a phriontáil am ar bith más mian leat.
  he: ההישג שלך יוצג תחת "ההדרכות שלי" בחלון ההדרכות בלוח המחוונים. משם תוכל תמיד לצפות בתעודה שלך או להדפיסה אם תרצה.
  hr: Vaše postignuće bit će navedeno pod "Moje obuke" u portletu za obuku na nadzornoj ploči. Odande uvijek možete pregledati ili ispisati svoju potvrdu ako želite.
  hu: Az eredménye a műszerfal képzési portletjének "Képzéseim" menüpontja alatt jelenik meg. Onnan bármikor megtekintheti vagy kinyomtathatja a tanúsítványát.
  is: Árangur þinn verður skráður undir "Þjálfanir mínar" í þjálfunarhlutanum á stjórnborðinu. Þaðan geturðu alltaf skoðað eða prentað út vottorðið þitt ef þú vilt.
  it: Il tuo risultato sarà elencato sotto "I miei corsi" nel portlet di formazione nella dashboard. Da lì puoi sempre visualizzare o stampare il tuo certificato se lo desideri.
  lt: Jūsų pasiekimas bus pateiktas skyriuje „Mano mokymai" mokymo portlete prietaisų skydelyje. Iš ten visada galėsite peržiūrėti arba atsispausdinti sertifikatą, jei norite.
  lv: Jūsu sasniegums tiks uzskaitīts sadaļā "Mani apmācības" apmācību portletā informācijas panelī. No turienes jūs vienmēr varat apskatīt vai izdrukāt sertifikātu, ja vēlaties.
  mt: Il-kisba tiegħek se tkun elenkata taħt "It-taħriġ tiegħi" fil-portlet tat-taħriġ fuq id-dashboard. Minn hemm tista' dejjem tara jew tistampa ċ-ċertifikat tiegħek jekk trid.
  nl: Je prestatie wordt vermeld onder "Mijn trainingen" in het trainingsportlet op het dashboard. Van daaruit kun je altijd je certificaat bekijken of afdrukken als je dat wilt.
  nl_BE: Uw prestatie wordt vermeld onder “Mijn trainingen” in het trainingsportlet op het dashboard. Van daaruit kunt u uw certificaat altijd bekijken of afdrukken als u wilt.
  nl_be: Uw prestatie wordt vermeld onder “Mijn trainingen” in het trainingsportlet op het dashboard. Van daaruit kunt u uw certificaat altijd bekijken of afdrukken als u wilt.
  'no': Din prestasjon vil bli oppført under “Mine opplæringer” i opplæringsportletten på dashbordet. Derfra kan du alltid se eller skrive ut sertifikatet ditt hvis du ønsker det.
  pl: Twoje osiągnięcie zostanie wymienione w sekcji “Moje szkolenia” w portlecie szkoleń na pulpicie nawigacyjnym. Stamtąd zawsze możesz przeglądać lub drukować swój certyfikat.
  pt: A sua conquista será listada em “As minhas formações” no portlet de formação no painel. A partir daí, pode sempre visualizar ou imprimir o seu certificado.
  ro: Realizarea dvs. va fi listată sub „Cursurile mele" în portletul de formare de pe tabloul de bord. De acolo puteți oricând vizualiza sau imprima certificatul, dacă doriți.
  ru: Ваше достижение будет указано в разделе «Мои обучения» в портлете обучения на панели управления. Оттуда вы всегда можете просмотреть или распечатать свой сертификат.
  sk: Vaše úspechy budú uvedené v časti „Moje školenia" v portlete školení na ovládacom paneli. Odtiaľ môžete kedykoľvek zobraziť alebo vytlačiť svoj certifikát.
  sl: Vaša dosežka bo navedena pod „Moja usposabljanja" v portletu za usposabljanje na nadzorni plošči. Od tam si lahko kadarkoli ogledate ali natisnete svoje potrdilo.
  sq: Arritja juaj do të listohet nën "Trajnimet e mia" në portletin e trajnimit në pult. Nga atje mund të shikoni ose printoni certifikatën tuaj kur të dëshironi.
  sr: Vaše dostignuće će biti navedeno pod „Moje obuke" u portletu za obuku na kontrolnoj tabli. Odatle uvek možete pregledati ili odštampati vaš sertifikat ako želite.
  sv: Ditt resultat kommer att listas under “Mina utbildningar” i utbildningsportleten på instrumentpanelen. Därifrån kan du alltid visa eller skriva ut ditt certifikat om du vill.
  uk: Ваше досягнення буде відображено в розділі “Мої навчання” у портлеті навчання на інформаційній панелі. Звідти ви завжди можете переглянути або роздрукувати ваш сертифікат.
