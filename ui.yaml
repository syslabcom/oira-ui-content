message_role_administrator:
  en: Administrators can create, edit and remove user accounts. Administrators can
    also make risk assessments and edit existing ones, lock risk assessments, create
    trainings and take trainings.
  nl: Beheerders kunnen gebruikersaccounts maken, bewerken en verwijderen. Beheerders
    kunnen ook risicobeoordelingen maken en bestaande bewerken, risicobeoordelingen
    vergrendelen, trainingen maken en trainingen volgen.
  fr: Les administrateurs peuvent créer, modifier et supprimer des comptes d'utilisateurs.
    Les administrateurs peuvent également effectuer des évaluations des risques et
    modifier celles qui existent déjà, verrouiller les évaluations des risques, créer
    des formations et suivre des formations.
  de: Administratoren können Benutzerkonten erstellen, bearbeiten und entfernen. Administratoren
    können außerdem Risikobewertungen erstellen und vorhandene bearbeiten, Risikobewertungen
    sperren, Schulungen erstellen und an Schulungen teilnehmen.
  'no': Administratorer kan opprette, redigere og fjerne brukerkontoer. Administratorer
    kan også lage risikovurderinger og redigere eksisterende, låse risikovurderinger,
    opprette opplæringer og delta i opplæringer.
  pl: Administratorzy mogą tworzyć, edytować i usuwać konta użytkowników. Administratorzy
    mogą również tworzyć oceny ryzyka i edytować istniejące, blokować oceny ryzyka,
    tworzyć szkolenia i uczestniczyć w szkoleniach.
  pt: Os administradores podem criar, editar e remover contas de usuários. Os administradores
    também podem elaborar avaliações de risco e editar as existentes, bloquear avaliações
    de risco, criar treinamentos e participar de treinamentos.
  ro: Administratorii pot crea, edita și elimina conturi de utilizatori. Administratorii
    pot, de asemenea, să elaboreze evaluări ale riscurilor și să editeze cele existente,
    să blocheze evaluările de riscuri, să creeze cursuri de formare și să participe
    la acestea.
  ru: Администраторы могут создавать, редактировать и удалять учётные записи пользователей.
    Администраторы также могут создавать оценки рисков и редактировать существующие,
    блокировать оценки рисков, создавать тренинги и проходить тренинги.
  uk: Адміністратори можуть створювати, редагувати та видаляти облікові записи користувачів.
    Адміністратори також можуть проводити оцінки ризиків та редагувати наявні, блокувати
    оцінки ризиків, створювати навчання та проходити їх.
  bg: Администраторите могат да създават, редактират и премахват потребителски акаунти.
    Администраторите могат също да извършват оценки на риска и да редактират съществуващи
    такива, да заключват оценки на риска, да създават обучения и да участват в обучения.
  ca: Els administradors poden crear, editar i eliminar comptes d'usuari. Els administradors
    també poden fer avaluacions de riscos i editar-ne les existents, bloquejar avaluacions
    de riscos, crear formacions i fer formacions.
  cs: Správci mohou vytvářet, upravovat a odstraňovat uživatelské účty. Správci mohou
    také provádět hodnocení rizik a upravovat stávající, uzamykat hodnocení rizik,
    vytvářet školení a absolvovat školení.
  cy: Gall gweinyddwyr greu, golygu a dileu cyfrifon defnyddwyr. Gall gweinyddwyr
    hefyd wneud asesiadau risg a golygu rhai presennol, cloi asesiadau risg, creu
    hyfforddiant a chymryd hyfforddiant.
  da: Administratorer kan oprette, redigere og fjerne brugerkonti. Administratorer
    kan også foretage risikovurderinger og redigere eksisterende, låse risikovurderinger,
    oprette kurser og deltage i kurser.
  el: Οι διαχειριστές μπορούν να δημιουργούν, να επεξεργάζονται και να αφαιρούν λογαριασμούς
    χρηστών. Οι διαχειριστές μπορούν επίσης να πραγματοποιούν εκτιμήσεις κινδύνου
    και να επεξεργάζονται υπάρχουσες, να κλειδώνουν εκτιμήσεις κινδύνου, να δημιουργούν
    εκπαιδεύσεις και να συμμετέχουν σε εκπαιδεύσεις.
  es: Los administradores pueden crear, editar y eliminar cuentas de usuario. Los
    administradores también pueden realizar evaluaciones de riesgos y editar las existentes,
    bloquear evaluaciones de riesgos, crear formaciones y realizarlas.
  et: Administraatorid saavad luua, muuta ja eemaldada kasutajakontosid. Administraatorid
    saavad ka teha riskihinnanguid ja muuta olemasolevaid, lukustada riskihinnanguid,
    luua koolitusi ja koolitustel osaleda.
  fi: Järjestelmänvalvojat voivat luoda, muokata ja poistaa käyttäjätilejä. Järjestelmänvalvojat
    voivat myös tehdä riskiarviointeja ja muokata olemassa olevia, lukita riskiarviointeja,
    luoda koulutuksia ja osallistua koulutuksiin.
  ga: Is féidir le riarthóirí cuntais úsáideoirí a chruthú, a chur in eagar agus a
    bhaint. Is féidir le riarthóirí freisin measúnuithe riosca a dhéanamh agus cinn
    atá ann cheana a chur in eagar, measúnuithe riosca a ghlasáil, oiliúintí a chruthú
    agus oiliúintí a dhéanamh.
  he: מנהלי מערכת יכולים ליצור, לערוך ולהסיר חשבונות משתמשים. מנהלי מערכת יכולים גם
    לבצע הערכות סיכונים ולערוך קיימות, לנעול הערכות סיכונים, ליצור הדרכות ולהשתתף
    בהן.
  hr: Administratori mogu stvarati, uređivati i uklanjati korisničke račune. Administratori
    također mogu izrađivati procjene rizika i uređivati postojeće, zaključavati procjene
    rizika, kreirati obuke i pohađati obuke.
  hu: A rendszergazdák létrehozhatnak, szerkeszthetnek és eltávolíthatnak felhasználói
    fiókokat. A rendszergazdák kockázatértékeléseket is készíthetnek és szerkeszthetnek,
    zárolhatják a kockázatértékeléseket, képzéseket hozhatnak létre és vehetnek részt
    rajtuk.
  is: Stjórnendur geta búið til, breytt og fjarlægt notendareikninga. Stjórnendur
    geta einnig gert áhættumat og breytt þeim sem fyrir eru, læst áhættumatum, búið
    til þjálfanir og tekið þjálfanir.
  it: Gli amministratori possono creare, modificare e rimuovere account utente. Gli
    amministratori possono anche effettuare valutazioni del rischio e modificare quelle
    esistenti, bloccare le valutazioni del rischio, creare formazioni e partecipare
    a formazioni.
  lt: Administratoriai gali kurti, redaguoti ir šalinti vartotojų paskyras. Administratoriai
    taip pat gali atlikti rizikos vertinimus ir redaguoti esamus, užrakinti rizikos
    vertinimus, kurti mokymus ir dalyvauti mokymuose.
  lv: Administratori var izveidot, rediģēt un dzēst lietotāju kontus. Administratori
    var arī veikt riska novērtējumus un rediģēt esošos, bloķēt riska novērtējumus,
    veidot apmācības un apmācīties.
  mt: L-amministraturi jistgħu joħolqu, jeditjaw u jneħħu kontijiet tal-utenti. L-amministraturi
    jistgħu wkoll jagħmlu valutazzjonijiet tar-riskju u jeditjaw dawk eżistenti, jiblokkaw
    valutazzjonijiet tar-riskju, joħolqu taħriġ u jieħdu taħriġ.
  nl_BE: Beheerders kunnen gebruikersaccounts aanmaken, bewerken en verwijderen. Beheerders
    kunnen ook risicobeoordelingen maken en bestaande bewerken, risicobeoordelingen
    vergrendelen, opleidingen aanmaken en opleidingen volgen.
  nl_be: Beheerders kunnen gebruikersaccounts aanmaken, bewerken en verwijderen. Beheerders
    kunnen ook risicobeoordelingen maken en bestaande bewerken, risicobeoordelingen
    vergrendelen, opleidingen aanmaken en opleidingen volgen.
  sk: Správcovia môžu vytvárať, upravovať a odstraňovať používateľské účty. Správcovia
    môžu tiež vykonávať hodnotenia rizík a upravovať existujúce, zamykať hodnotenia
    rizík, vytvárať školenia a absolvovať školenia.
  sl: Skrbniki lahko ustvarjajo, urejajo in odstranjujejo uporabniške račune. Skrbniki
    lahko tudi izvajajo ocene tveganj in urejajo obstoječe, zaklepajo ocene tveganj,
    ustvarjajo usposabljanja in se udeležujejo usposabljanj.
  sq: Administratorët mund të krijojnë, modifikojnë dhe heqin llogaritë e përdoruesve.
    Administratorët mund gjithashtu të bëjnë vlerësime të rrezikut dhe të modifikojnë
    ato ekzistuese, të bllokojnë vlerësimet e rrezikut, të krijojnë trajnime dhe të
    marrin trajnime.
  sr: Administratori mogu da kreiraju, uređuju i uklanjaju korisničke naloge. Administratori
    takođe mogu da vrše procene rizika i uređuju postojeće, zaključavaju procene rizika,
    kreiraju obuke i pohađaju obuke.
  sv: Administratörer kan skapa, redigera och ta bort användarkonton. Administratörer
    kan också göra riskbedömningar och redigera befintliga, låsa riskbedömningar,
    skapa utbildningar och delta i utbildningar.
