message_delete_question:
  en: You are about to delete this question from the training.
  nl: U staat op het punt deze vraag uit de training te verwijderen.
  fr: Vous êtes sur le point de supprimer cette question de la formation.
  de: Sie sind dabei, diese Frage aus dem Training zu löschen.
  it: Stai per eliminare questa domanda dal training.
  es: Estás a punto de eliminar esta pregunta de la capacitación.
  pt: Você está prestes a excluir esta pergunta do treinamento.
  pl: Masz zamiar usunąć to pytanie z szkolenia.
  fi: Olet poistamassa tätä kysymystä koulutuksesta.
  hr: Spremni ste izbrisati ovo pitanje iz obuke.
  cs: Chystáte se smazat tuto otázku ze školení.
  da: Du er ved at slette dette spørgsmål fra træningen.
  mt: Int qed tħassar dan il-mistoqsija mit-taħriġ.
  sl: Sprejemate, da izbrišete to vprašanje iz usposabljanja.
  bg: Вие сте на път да изтриете този въпрос от обучението.
  ro: Ești pe cale să ștergi această întrebare din antrenament.
  et: Olete selle küsimuse kustutamiseks koolitusest.
  lv: Jūs esat gatavs dzēst šo jautājumu no apmācības.
  lt: Jūs ketinate ištrinti šį klausimą iš mokymo.
  sv: Du håller på att ta bort den här frågan från träningen.
  sk: Chystáte sa vymazať túto otázku zo školenia.
  hu: Készülsz törölni ezt a kérdést a képzésből.
  el: Πρόκειται να διαγράψετε αυτήν την ερώτηση από την εκπαίδευση.
  ga: Tá tú ar tí an cheist seo a scriosadh ó an oiliúint.
  he: אתה עומד למחוק את השאלה הזו מההכשרה.
  ca: Esteu a punt d'eliminar aquesta pregunta de la formació.
  cy: Rydych ar fin dileu'r cwestiwn hwn o'r hyfforddiant.
  is: Þú ert að fara að eyða þessari spurningu úr þjálfuninni.
  nl_BE: U staat op het punt deze vraag uit de training te verwijderen.
  nl_be: U staat op het punt deze vraag uit de training te verwijderen.
  'no': Du er i ferd med å slette dette spørsmålet fra opplæringen.
  ru: Вы собираетесь удалить этот вопрос из обучения.
  sq: Jeni duke fshirë këtë pyetje nga trajnimi.
  sr: Upravo ćete obrisati ovo pitanje iz obuke.
  uk: Ви збираєтеся видалити це питання з навчання.
message_answer_will_be_randomised:
  en: During the training, the order of the answers will be randomised for each question.
  nl: Tijdens de training zal de volgorde van de antwoorden voor elke vraag worden
    gerandomiseerd.
  fr: Pendant la formation, l'ordre des réponses sera randomisé pour chaque question.
  de: Während der Schulung wird die Reihenfolge der Antworten für jede Frage randomisiert.
  it: Durante la formazione, l'ordine delle risposte sarà randomizzato per ogni domanda.
  es: Durante la capacitación, el orden de las respuestas se aleatorizará para cada
    pregunta.
  pt: Durante o treinamento, a ordem das respostas será randomizada para cada pergunta.
  pl: Podczas szkolenia kolejność odpowiedzi będzie losowa dla każdego pytania.
  fi: Koulutuksen aikana vastausten järjestys satunnaistetaan jokaiselle kysymykselle.
  hr: Tijekom obuke, redoslijed odgovora će biti nasumičan za svako pitanje.
  cs: Během školení bude pořadí odpovědí pro každou otázku náhodné.
  da: Under træningen vil rækkefølgen af svarene blive tilfældigt for hver spørgsmål.
  mt: Matul it-taħriġ, l-ordni tal-mistoqsijiet se tkun randomizzata għal kull mistoqsija.
  sl: Med usposabljanjem bo vrstni red odgovorov naključen za vsako vprašanje.
  bg: По време на обучението редът на отговорите ще бъде произволен за всеки въпрос.
  ro: În timpul instruirii, ordinea răspunsurilor va fi aleatorie pentru fiecare întrebare.
  et: Koolituse ajal vastuste järjestus iga küsimuse puhul juhuslikuks.
  lv: Apmācības laikā atbilžu secība katram jautājumam tiks nejauši sajaukta.
  lt: Mokymo metu atsakymų tvarka bus atsitiktinė kiekvienam klausimui.
  sv: Under utbildningen kommer ordningen på svaren att slumpas för varje fråga.
  sk: Během školení bude pořadí odpovědí pro každou otázku náhodné.
  hu: A képzés során a válaszok sorrendje minden kérdésnél véletlenszerű lesz.
  el: Κατά τη διάρκεια της εκπαίδευσης, η σειρά των απαντήσεων θα είναι τυχαία για
    κάθε ερώτηση.
  ga: Le linn an oiliúint, beidh ord na bhfreagraí randamach do gach ceist.
  he: במהלך ההכשרה, סדר התשובות יהיה אקראי עבור כל שאלה.
  ca: Durant la formació, l'ordre de les respostes serà aleatori per a cada pregunta.
  cy: Yn ystod yr hyfforddiant, bydd trefn yr atebion yn cael ei hap-drefnu ar gyfer
    pob cwestiwn.
  is: Meðan á þjálfuninni stendur verður röð svaranna slembin fyrir hverja spurningu.
  nl_BE: Tijdens de training wordt de volgorde van de antwoorden voor elke vraag willekeurig
    bepaald.
  nl_be: Tijdens de training wordt de volgorde van de antwoorden voor elke vraag willekeurig
    bepaald.
  'no': Under opplæringen vil rekkefølgen på svarene bli tilfeldig for hvert spørsmål.
  ru: Во время обучения порядок ответов будет случайным для каждого вопроса.
  sq: Gjatë trajnimit, rendi i përgjigjeve do të jetë i rastësishëm për çdo pyetje.
  sr: Tokom obuke, redosled odgovora će biti nasumičan za svako pitanje.
  uk: Під час навчання порядок відповідей буде рандомізований для кожного питання.
