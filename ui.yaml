message_help_oira_tool_name:
  nl: Gebruik een korte en krachtige naam, waarin gebruikers hun omstandigheden zullen
    herkennen. De title wordt getoond in overzichten, zowel aan gebruikers als aan
    redacteuren.
  en: Use a short and powerful name that users will recognize their circumstances
    in. The title is displayed in overviews, both to users and editors.
  bg: Използвайте кратко и силно име, което потребителите ще разпознаят в своите обстоятелства.
    Заглавието се показва в прегледи, както на потребителите, така и на редакторите.
  cs: Použijte krátký a silný název, který uživatelé poznají ve svých okolnostech.
    Název se zobrazuje v přehledech, jak uživatelům, tak editorům.
  da: Brug et kort og kraftfuldt navn, som brugerne vil genkende deres omstændigheder
    i. Titlen vises i oversigter, både til brugere og redaktører.
  de: Verwenden Sie einen kurzen und kraftvollen Namen, den Benutzer in ihren Umständen
    erkennen werden. Der Titel wird in Übersichten sowohl für Benutzer als auch für
    Redakteure angezeigt.
  et: Kasutage lühikest ja võimsat nime, mida kasutajad tunnevad oma olukordades ära.
    Pealkiri kuvatakse ülevaadetes nii kasutajatele kui ka toimetajatele.
  el: Χρησιμοποιήστε ένα σύντομο και ισχυρό όνομα που οι χρήστες θα αναγνωρίσουν τις
    συνθήκες τους. Ο τίτλος εμφανίζεται στις επισκοπήσεις, τόσο στους χρήστες όσο
    και στους επιμελητές.
  es: Utilice un nombre corto y poderoso que los usuarios reconocerán en sus circunstancias.
    El título se muestra en las vistas generales, tanto a los usuarios como a los
    editores.
  fi: Käytä lyhyttä ja voimakasta nimeä, jonka käyttäjät tunnistavat olosuhteissaan.
    Otsikko näkyy yleiskatsauksissa sekä käyttäjille että toimittajille.
  fr: Utilisez un nom court et puissant que les utilisateurs reconnaîtront dans leurs
    circonstances. Le titre est affiché dans les aperçus, à la fois aux utilisateurs
    et aux éditeurs.
  ga: Bain úsáid as ainm gairid agus cumhachtach a aithníonn úsáideoirí a gcúinsí.
    Taispeántar an teideal sna léarscáileanna, do úsáideoirí agus do eagarthóirí.
  hr: Koristite kratko i snažno ime koje će korisnici prepoznati u svojim okolnostima.
    Naslov se prikazuje u pregledima, kako korisnicima, tako i urednicima.
  hu: Használjon rövid és erőteljes nevet, amelyet a felhasználók felismernek a körülményeikben.
    A cím megjelenik az áttekintésekben, mind a felhasználóknak, mind a szerkesztőknek.
  it: Utilizzare un nome breve e potente che gli utenti riconosceranno nelle loro
    circostanze. Il titolo viene visualizzato nelle panoramiche, sia agli utenti che
    agli editori.
  lt: Naudokite trumpą ir galingą pavadinimą, kurį vartotojai atpažins savo aplinkybėse.
    Pavadinimas rodomas apžvalgose, tiek vartotojams, tiek redaktoriams.
  lv: Izmantojiet īsu un spēcīgu nosaukumu, ko lietotāji atpazīs savās apstākļos.
    Nosaukums tiek rādīts pārskatos, gan lietotājiem, gan redaktoriem.
  mt: Uża isem qasir u possibbli li l-utenti jirrikonoxxu fis-sitwazzjonijiet tagħhom.
    It-titlu jidher fis-surveys, kemm lill-utenti kif ukoll lill-edituri.
  pl: Użyj krótkiej i potężnej nazwy, którą użytkownicy rozpoznają w swoich okolicznościach.
    Tytuł jest wyświetlany w przeglądach zarówno dla użytkowników, jak i redaktorów.
  pt: Use um nome curto e poderoso que os usuários reconhecerão em suas circunstâncias.
    O título é exibido nas visualizações, tanto para usuários quanto para editores.
  ro: Utilizați un nume scurt și puternic pe care utilizatorii îl vor recunoaște în
    circumstanțele lor. Titlul este afișat în prezentări generale, atât utilizatorilor,
    cât și editorilor.
  sk: Použite krátky a silný názov, ktorý používatelia rozpoznajú vo svojich okolnostiach.
    Názov sa zobrazuje v prehľadoch, ako pre používateľov, tak pre editorov.
  sl: Uporabite kratko in močno ime, ki ga bodo uporabniki prepoznali v svojih okoliščinah.
    Naslov je prikazan v pregledih, tako uporabnikom kot urednikom.
  sv: Använd ett kort och kraftfullt namn som användarna kommer att känna igen i sina
    omständigheter. Titeln visas i översikter, både för användare och redaktörer.
  he: השתמש בשם קצר ועוצמתי שמשתמשים יכולים לזהות את הנסיבות שלהם. הכותרת מוצגת בסקירות,
    גם למשתמשים וגם לעורכים.
  ca: Utilitzeu un nom curt i potent en el qual els usuaris reconeguin les seves circumstàncies.
    El títol es mostra als resums, tant als usuaris com als editors.
  cy: Defnyddiwch enw byr a phwerus y bydd defnyddwyr yn adnabod eu hamgylchiadau
    ynddo. Mae'r teitl yn cael ei arddangos mewn trosolygon, i ddefnyddwyr ac i olygyddion.
  is: Notaðu stutt og öflugt heiti sem notendur munu þekkja sínar aðstæður í. Titillinn
    er sýndur í yfirlitum, bæði notendum og ritstjórum.
  nl_BE: Gebruik een korte en krachtige naam waarin gebruikers hun omstandigheden
    herkennen. De titel wordt weergegeven in overzichten, zowel aan gebruikers als
    redacteurs.
  nl_be: Gebruik een korte en krachtige naam waarin gebruikers hun omstandigheden
    herkennen. De titel wordt weergegeven in overzichten, zowel aan gebruikers als
    redacteurs.
  'no': Bruk et kort og kraftfullt navn som brukere vil kjenne seg igjen i. Tittelen
    vises i oversikter, både til brukere og redaktører.
  ru: Используйте короткое и выразительное название, в котором пользователи узнают
    свои обстоятельства. Заголовок отображается в обзорах как для пользователей, так
    и для редакторов.
  sq: Përdorni një emër të shkurtër dhe të fuqishëm në të cilin përdoruesit do të
    njohin rrethanat e tyre. Titulli shfaqet në pamjet e përgjithshme, si për përdoruesit
    ashtu edhe për redaktorët.
  sr: Koristite kratko i snažno ime u kome će korisnici prepoznati svoje okolnosti.
    Naslov se prikazuje u pregledima, i korisnicima i urednicima.
  uk: Використовуйте коротку та виразну назву, в якій користувачі впізнають свої обставини.
    Заголовок відображається в оглядах як для користувачів, так і для редакторів.
message_help_oira_tool_description:
  nl: De beschrijving van de tool wordt getoond in overzichten en zoekresultaten.
    Inhoudelijk dient de beschrijving voor de gebruikers te bevestigen dat die de
    juiste tool voor hen is.
  en: The description of the tool is displayed in overviews and search results. In
    content, the description should confirm to the user that it is the right tool
    for them.
  bg: Описанието на инструмента се показва в прегледи и резултати от търсенето. Съдържателно
    описанието трябва да потвърди на потребителя, че това е правилният инструмент
    за него.
  cs: Popis nástroje se zobrazuje v přehledech a výsledcích vyhledávání. Obsahově
    by měl popis potvrdit uživateli, že je to správný nástroj pro něj.
  da: Beskrivelsen af værktøjet vises i oversigter og søgeresultater. Indholdsmæssigt
    skal beskrivelsen bekræfte for brugeren, at det er det rigtige værktøj for dem.
  de: Die Beschreibung des Tools wird in Übersichten und Suchergebnissen angezeigt.
    Inhaltlich sollte die Beschreibung dem Benutzer bestätigen, dass es das richtige
    Tool für ihn ist.
  et: Tööriista kirjeldus kuvatakse ülevaadetes ja otsingutulemustes. Sisu poolest
    peaks kirjeldus kinnitama kasutajale, et see on õige tööriist neile.
  el: Η περιγραφή του εργαλείου εμφανίζεται στις επισκοπήσεις και τα αποτελέσματα
    αναζήτησης. Σε περιεχόμενο, η περιγραφή πρέπει να επιβεβαιώνει στον χρήστη ότι
    είναι το σωστό εργαλείο για αυτόν.
  es: La descripción de la herramienta se muestra en las vistas generales y los resultados
    de búsqueda. En contenido, la descripción debe confirmar al usuario que es la
    herramienta adecuada para él.
  fi: Työkalun kuvaus näkyy yleiskatsauksissa ja hakutuloksissa. Sisällöllisesti kuvaus
    tulisi vahvistaa käyttäjälle, että se on oikea työkalu hänelle.
  fr: La description de l'outil est affichée dans les aperçus et les résultats de
    recherche. Sur le plan du contenu, la description doit confirmer à l'utilisateur
    qu'il s'agit du bon outil pour lui.
  ga: Taispeántar cur síos ar an uirlis sna léarscáileanna agus sna torthaí cuardaigh.
    Ar an ábhar, ba cheart don chur síos a dhearbhú don úsáideoir go bhfuil sé an
    uirlis ceart di.
  hr: Opis alata prikazuje se u pregledima i rezultatima pretraživanja. Sadržajno,
    opis bi trebao potvrditi korisniku da je to pravi alat za njega.
  hu: Az eszköz leírása megjelenik az áttekintésekben és a keresési eredményekben.
    Tartalmilag a leírásnak megerősítést kell adnia a felhasználónak, hogy ez a megfelelő
    eszköz számára.
  it: La descrizione dello strumento viene visualizzata nelle panoramiche e nei risultati
    di ricerca. Sul piano del contenuto, la descrizione dovrebbe confermare all'utente
    che si tratta dello strumento giusto per lui.
  lt: Įrankio aprašas rodomas peržiūrose ir paieškos rezultatuose. Turinio požiūriu
    aprašymas turėtų patvirtinti vartotojui, kad tai tinkamas įrankis jam.
  lv: Rīka apraksts tiek parādīts pārskatos un meklēšanas rezultātos. Satura ziņā
    aprakstam vajadzētu apstiprināt lietotājam, ka tas ir pareizais rīks viņam.
  mt: Id-deskrizzjoni tal-għodda jidher fis-sinjali u r-riżultati tat-tfittxija. F'kuntenut,
    id-deskrizzjoni għandha tikkonferma lill-utent li huwa l-għodda tajba għalih.
  pl: Opis narzędzia jest wyświetlany w przeglądach i wynikach wyszukiwania. Pod względem
    treści, opis powinien potwierdzić użytkownikowi, że jest to odpowiednie narzędzie
    dla niego.
  pt: A descrição da ferramenta é exibida nas visualizações e nos resultados de pesquisa.
    Em termos de conteúdo, a descrição deve confirmar ao usuário que é a ferramenta
    certa para ele.
  ro: Descrierea instrumentului este afișată în prezentări generale și rezultatele
    căutării. Din punct de vedere al conținutului, descrierea ar trebui să confirme
    utilizatorului că este instrumentul potrivit pentru el.
  sk: Popis nástroja sa zobrazuje v prehľadoch a výsledkoch vyhľadávania. Obsahovo
    by mal popis potvrdiť používateľovi, že je to správny nástroj pre neho.
  sl: Opis orodja se prikaže v pregledih in rezultatih iskanja. Vsebinsko naj opis
    potrdi uporabniku, da je to pravo orodje zanj.
  sv: Beskrivningen av verktyget visas i översikter och sökresultat. Innehållsmässigt
    bör beskrivningen bekräfta för användaren att det är rätt verktyg för dem.
  he: תיאור הכלי מוצג בתצוגות כלליות ותוצאות חיפוש. מבחינת תוכן, התיאור צריך לאשר
    למשתמש שזהו הכלי הנכון עבורו.
  ca: La descripció de l'eina es mostra als resums i als resultats de cerca. En el
    contingut, la descripció ha de confirmar a l'usuari que és l'eina adequada per
    a ell.
  cy: Mae disgrifiad yr offeryn yn cael ei arddangos mewn trosolygon a chanlyniadau
    chwilio. Yn y cynnwys, dylai'r disgrifiad gadarnhau i'r defnyddiwr mai dyma'r
    offeryn cywir iddynt.
  is: Lýsing verkfærisins er sýnd í yfirlitum og leitarniðurstöðum. Í efninu ætti
    lýsingin að staðfesta fyrir notandann að þetta sé rétta verkfærið fyrir þá.
  nl_BE: De beschrijving van het hulpmiddel wordt weergegeven in overzichten en zoekresultaten.
    In de inhoud moet de beschrijving aan de gebruiker bevestigen dat het het juiste
    hulpmiddel voor hen is.
  nl_be: De beschrijving van het hulpmiddel wordt weergegeven in overzichten en zoekresultaten.
    In de inhoud moet de beschrijving aan de gebruiker bevestigen dat het het juiste
    hulpmiddel voor hen is.
  'no': Beskrivelsen av verktøyet vises i oversikter og søkeresultater. I innholdet
    bør beskrivelsen bekrefte for brukeren at det er det riktige verktøyet for dem.
  ru: Описание инструмента отображается в обзорах и результатах поиска. В содержании
    описание должно подтверждать пользователю, что это подходящий для него инструмент.
  sq: Përshkrimi i mjetit shfaqet në pamjet e përgjithshme dhe rezultatet e kërkimit.
    Në përmbajtje, përshkrimi duhet t'i konfirmojë përdoruesit se është mjeti i duhur
    për ta.
  sr: Opis alata se prikazuje u pregledima i rezultatima pretrage. U sadržaju, opis
    treba da potvrdi korisniku da je to pravi alat za njega.
  uk: Опис інструменту відображається в оглядах та результатах пошуку. У змісті опис
    повинен підтверджувати користувачу, що це правильний інструмент для нього.
