  de: null
  en: null
  fr: null
  nl: null
message_role_manager:
  bg: Мениджърите/създателите на политики могат да извършват и редактират оценки на риска, да заключват оценки на риска, да създават обучения и да участват в обучения.
  ca: Els responsables/responsables de polítiques poden fer i editar avaluacions de riscos, bloquejar avaluacions de riscos, crear formacions i fer formacions.
  cs: Manažeři/tvůrci politik mohou vytvářet a upravovat hodnocení rizik, uzamykat hodnocení rizik, vytvářet školení a absolvovat školení.
  cy: Gall rheolwyr/gwneuthurwyr polisi wneud a golygu asesiadau risg, cloi asesiadau risg, creu hyfforddiant a chymryd hyfforddiant.
  da: Ledere/politikudformere kan foretage og redigere risikovurderinger, låse risikovurderinger, oprette kurser og deltage i kurser.
  de: Manager/Policymaker können Risikobewertungen erstellen und bearbeiten, Risikobewertungen sperren, Schulungen erstellen und an Schulungen teilnehmen.
  el: Οι διευθυντές/υπεύθυνοι χάραξης πολιτικής μπορούν να πραγματοποιούν και να επεξεργάζονται εκτιμήσεις κινδύνου, να κλειδώνουν εκτιμήσεις κινδύνου, να δημιουργούν εκπαιδεύσεις και να συμμετέχουν σε εκπαιδεύσεις.
  en: Managers/Policy makers can make and edit risk assessments, lock risk assessments, create trainings and take trainings.
  es: Los responsables/elaboradores de políticas pueden realizar y editar evaluaciones de riesgos, bloquear evaluaciones de riesgos, crear formaciones y realizarlas.
  et: Juhid/poliitikakujundajad saavad teha ja muuta riskihinnanguid, lukustada riskihinnanguid, luua koolitusi ja koolitustel osaleda.
  fi: Johtajat/päätöksentekijät voivat tehdä ja muokata riskiarviointeja, lukita riskiarviointeja, luoda koulutuksia ja osallistua koulutuksiin.
  fr: Les gestionnaires/décideurs politiques peuvent effectuer et modifier des évaluations des risques, verrouiller les évaluations des risques, créer des formations et suivre des formations.
  ga: Is féidir le bainisteoirí/déantóirí beartas measúnuithe riosca a dhéanamh agus a chur in eagar, measúnuithe riosca a ghlasáil, oiliúintí a chruthú agus oiliúintí a dhéanamh.
  he: מנהלים/קובעי מדיניות יכולים לבצע ולערוך הערכות סיכונים, לנעול הערכות סיכונים, ליצור הדרכות ולהשתתף בהן.
  hr: Voditelji/kreatori politike mogu izrađivati i uređivati procjene rizika, zaključavati procjene rizika, kreirati obuke i pohađati obuke.
  hu: A vezetők/döntéshozók kockázatértékeléseket készíthetnek és szerkeszthetnek, zárolhatják a kockázatértékeléseket, képzéseket hozhatnak létre és vehetnek részt rajtuk.
  is: Stjórnendur/stefnumótunarfólk getur gert og breytt áhættumatum, læst áhættumatum, búið til þjálfanir og tekið þjálfanir.
  it: I manager/responsabili delle politiche possono effettuare e modificare valutazioni del rischio, bloccare le valutazioni del rischio, creare formazioni e partecipare a formazioni.
  lt: Vadovai / politikos formuotojai gali kurti ir redaguoti rizikos vertinimus, užrakinti rizikos vertinimus, kurti mokymus ir dalyvauti mokymuose.
  lv: Vadītāji / politikas veidotāji var veidot un rediģēt riska novērtējumus, bloķēt riska novērtējumus, veidot apmācības un apmācīties.
  mt: Il-maniġers/formulaturi tal-politika jistgħu jagħmlu u jeditjaw valutazzjonijiet tar-riskju, jiblokkaw valutazzjonijiet tar-riskju, joħolqu taħriġ u jieħdu taħriġ.
  nl: Managers/Beleidsmakers kunnen risicobeoordelingen maken en bewerken, risicobeoordelingen vergrendelen, trainingen maken en trainingen volgen.
  nl_BE: Managers/beleidsmakers kunnen risicobeoordelingen maken en bewerken, risicobeoordelingen vergrendelen, opleidingen aanmaken en opleidingen volgen.
  nl_be: Managers/beleidsmakers kunnen risicobeoordelingen maken en bewerken, risicobeoordelingen vergrendelen, opleidingen aanmaken en opleidingen volgen.
  'no': Ledere/beslutningstakere kan lage og redigere risikovurderinger, låse risikovurderinger, opprette opplæringer og delta i opplæringer.
  pl: Menedżerowie/Decydenci mogą tworzyć i edytować oceny ryzyka, blokować oceny ryzyka, tworzyć szkolenia i uczestniczyć w szkoleniach.
  pt: Gestores/Responsáveis por políticas podem criar e editar avaliações de risco, bloquear avaliações de risco, criar treinamentos e participar de treinamentos.
  ro: Managerii/Factorii de decizie pot elabora și edita evaluări ale riscurilor, bloca evaluări ale riscurilor, crea cursuri de formare și participa la acestea.
  ru: Менеджеры/Лица, принимающие решения, могут создавать и редактировать оценки рисков, блокировать оценки рисков, создавать тренинги и проходить тренинги.
  sk: Manažéri/tvorcovia politík môžu vytvárať a upravovať hodnotenia rizík, zamykať hodnotenia rizík, vytvárať školenia a absolvovať školenia.
  sl: Vodje/oblikovalci politik lahko ustvarjajo in urejajo ocene tveganj, zaklepajo ocene tveganj, ustvarjajo usposabljanja in se udeležujejo usposabljanj.
  sq: Menaxherët/hartuesit e politikave mund të bëjnë dhe modifikojnë vlerësimet e rrezikut, të bllokojnë vlerësimet e rrezikut, të krijojnë trajnime dhe të marrin trajnime.
  sr: Menadžeri/kreatori politike mogu da vrše i uređuju procene rizika, zaključavaju procene rizika, kreiraju obuke i pohađaju obuke.
  sv: Chefer/policyansvariga kan göra och redigera riskbedömningar, låsa riskbedömningar, skapa utbildningar och delta i utbildningar.
  uk: Менеджери/розробники політики можуть проводити та редагувати оцінки ризиків, блокувати оцінки ризиків, створювати навчання та проходити їх.
message_role_member:
  bg: Членовете могат само да четат оценки на риска и да участват в обучения. Членовете не могат да редактират оценки на риска.
  ca: Els membres només poden llegir les avaluacions de riscos i fer formacions. Els membres no poden editar les avaluacions de riscos.
  cs: Členové mohou pouze číst hodnocení rizik a absolvovat školení. Členové nemohou upravovat hodnocení rizik.
  cy: Dim ond darllen asesiadau risg a chymryd hyfforddiant y gall aelodau ei wneud. Ni all aelodau olygu asesiadau risg.
  da: Medlemmer kan kun læse risikovurderinger og deltage i kurser. Medlemmer kan ikke redigere risikovurderinger.
  de: Mitglieder können Risikobewertungen vornehmen und an Schulungen teilnehmen. Mitglieder können Gefährdungsbeurteilungen nicht bearbeiten.
  el: Τα μέλη μπορούν να διαβάζουν μόνο αξιολογήσεις κινδύνου και να παρακολουθούν εκπαιδεύσεις. Τα μέλη δεν μπορούν να επεξεργαστούν αξιολογήσεις κινδύνου.
  en: Members can only read risk assessments and take trainings. Members cannot edit risk assessments.
  es: Los miembros solo pueden leer evaluaciones de riesgos y realizar capacitaciones. Los miembros no pueden editar evaluaciones de riesgos.
  et: Liikmed saavad ainult lugeda riskihinnanguid ja läbida koolitusi. Liikmed ei saa riskihinnanguid muuta.
  fi: Jäsenet voivat vain lukea riskiarviointeja ja osallistua koulutuksiin. Jäsenet eivät voi muokata riskiarviointeja.
  fr: Les membres peuvent faire des évaluations des risques et suivre des formations. Membres ne peuvent pas modifier les évaluations des risques.
  ga: Ní féidir le baill ach measúnachtaí riosca a léamh agus oiliúintí a dhéanamh. Ní féidir le baill measúnachtaí riosca a chur in eagar.
  he: חברים יכולים רק לקרוא הערכות סיכונים ולהשתתף בהכשרות. חברים אינם יכולים לערוך הערכות סיכונים.
  hr: Članovi mogu samo čitati procjene rizika i pohađati obuke. Članovi ne mogu uređivati procjene rizika.
  hu: A tagok csak olvashatják a kockázatértékeléseket és részt vehetnek képzéseken. A tagok nem szerkeszthetik a kockázatértékeléseket.
  is: Meðlimir geta aðeins lesið áhættumat og tekið þátt í þjálfun. Meðlimir geta ekki breytt áhættumati.
  it: I membri possono solo leggere le valutazioni dei rischi e seguire le formazioni. I membri non possono modificare le valutazioni dei rischi.
  lt: Nariai gali tik skaityti rizikos vertinimus ir dalyvauti mokymuose. Nariai negali redaguoti rizikos vertinimų.
  lv: Dalībnieki var tikai lasīt riska novērtējumus un apmeklēt apmācības. Dalībnieki nevar rediģēt riska novērtējumus.
  mt: Il-membri jistgħu jaqraw biss il-valutazzjonijiet tar-riskju u jieħdu taħriġ. Il-membri ma jistgħux jeditjaw il-valutazzjonijiet tar-riskju.
  nl: Leden kunnen risicobeoordelingen inzien en trainingen volgen. Leden kunnen geen risicobeoordelingen bewerken. Basisleden kunnen risicobeoordelingen niet bewerken.
  nl_BE: Leden kunnen risicobeoordelingen alleen lezen en trainingen volgen. Leden kunnen risicobeoordelingen niet bewerken.
  nl_be: Leden kunnen risicobeoordelingen alleen lezen en trainingen volgen. Leden kunnen risicobeoordelingen niet bewerken.
  'no': Medlemmer kan bare lese risikovurderinger og ta opplæring. Medlemmer kan ikke redigere risikovurderinger.
  pl: Członkowie mogą jedynie czytać oceny ryzyka i odbywać szkolenia. Członkowie nie mogą edytować ocen ryzyka.
  pt: Os membros só podem ler avaliações de risco e fazer formações. Os membros não podem editar avaliações de risco.
  ro: Membrii pot doar citi evaluările de risc și pot urma cursuri de formare. Membrii nu pot edita evaluările de risc.
  ru: Участники могут только читать оценки рисков и проходить обучение. Участники не могут редактировать оценки рисков.
  sk: Členovia môžu iba čítať hodnotenia rizík a absolvovať školenia. Členovia nemôžu upravovať hodnotenia rizík.
  sl: Člani lahko samo berejo ocene tveganja in se udeležujejo usposabljanj. Člani ne morejo urejati ocen tveganja.
  sq: Anëtarët mund të lexojnë vetëm vlerësimet e rrezikut dhe të marrin trajnime. Anëtarët nuk mund të redaktojnë vlerësimet e rrezikut.
  sr: Članovi mogu samo čitati procene rizika i pohađati obuke. Članovi ne mogu uređivati procene rizika.
  sv: Medlemmar kan bara läsa riskbedömningar och delta i utbildningar. Medlemmar kan inte redigera riskbedömningar.
  uk: Учасники можуть лише читати оцінки ризиків та проходити навчання. Учасники не можуть редагувати оцінки ризиків.
message_session_locked_v2:
  bg: Тази оценка на риска е заключена, тъй като инструктажните документи вече са изпратени на изпълнителя.
