  el: Οι σύμβουλοι μπορούν να πραγματοποιούν και να επεξεργάζονται εκτιμήσεις κινδύνου,
    να επικυρώνουν και να εγκρίνουν εκτιμήσεις κινδύνου και να δημιουργούν εκπαιδεύσεις.
  es: Los consultores pueden realizar y editar evaluaciones de riesgos, validar y
    aprobar evaluaciones de riesgos y crear formaciones.
  et: Konsultandid saavad teha ja muuta riskihinnanguid, valideerida ja kinnitada
    riskihinnanguid ning luua koolitusi.
  fi: Konsultit voivat tehdä ja muokata riskiarviointeja, validoida ja hyväksyä riskiarviointeja
    sekä luoda koulutuksia.
  ga: Is féidir le comhairleoirí measúnuithe riosca a dhéanamh agus a chur in eagar,
    measúnuithe riosca a bhailíochtú agus a fhaomhadh agus oiliúintí a chruthú.
  he: יועצים יכולים לבצע ולערוך הערכות סיכונים, לאמת ולאשר הערכות סיכונים וליצור הדרכות.
  hr: Konzultanti mogu izrađivati i uređivati procjene rizika, potvrđivati i odobravati
    procjene rizika te kreirati obuke.
  hu: A tanácsadók kockázatértékeléseket készíthetnek és szerkeszthetnek, érvényesíthetik
    és jóváhagyhatják a kockázatértékeléseket, valamint képzéseket hozhatnak létre.
  is: Ráðgjafar geta gert og breytt áhættumatum, staðfest og samþykkt áhættumat og
    búið til þjálfanir.
  it: I consulenti possono effettuare e modificare valutazioni del rischio, convalidare
    e approvare le valutazioni del rischio e creare formazioni.
  lt: Konsultantai gali kurti ir redaguoti rizikos vertinimus, patvirtinti ir aprobuoti
    rizikos vertinimus bei kurti mokymus.
  lv: Konsultanti var veidot un rediģēt riska novērtējumus, validēt un apstiprināt
    riska novērtējumus un veidot apmācības.
  mt: Il-konsulenti jistgħu jagħmlu u jeditjaw valutazzjonijiet tar-riskju, jivvalidaw
    u japprovaw valutazzjonijiet tar-riskju u joħolqu taħriġ.
  nl_BE: Consultants kunnen risicobeoordelingen maken en bewerken, risicobeoordelingen
    valideren en goedkeuren en opleidingen aanmaken.
  nl_be: Consultants kunnen risicobeoordelingen maken en bewerken, risicobeoordelingen
    valideren en goedkeuren en opleidingen aanmaken.
  sk: Konzultanti môžu vytvárať a upravovať hodnotenia rizík, overovať a schvaľovať
    hodnotenia rizík a vytvárať školenia.
  sl: Svetovalci lahko ustvarjajo in urejajo ocene tveganj, potrjujejo in odobravajo
    ocene tveganj ter ustvarjajo usposabljanja.
  sq: Konsulentët mund të bëjnë dhe modifikojnë vlerësimet e rrezikut, të vërtetojnë
    dhe miratojnë vlerësimet e rrezikut dhe të krijojnë trajnime.
  sr: Konsultanti mogu da vrše i uređuju procene rizika, validiraju i odobravaju procene
    rizika i kreiraju obuke.
  sv: Konsulter kan göra och redigera riskbedömningar, validera och godkänna riskbedömningar
    samt skapa utbildningar.
