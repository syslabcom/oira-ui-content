message_help_certificate_completion_threshhold:
  en: After a session completion rate is greater than this limit the user will earn
    a certificate.
  nl: Nadat de voltooiingsgraad van een sessie deze drempel overschrijdt, ontvangt
    de gebruiker een certificaat.
  fr: Une fois que le taux d’achèvement d’une session dépasse ce seuil, l’utilisateur
    recevra un certificat.
  de: Wenn die Abschlussrate einer Sitzung diesen Schwellenwert überschreitet, erhält
    der Benutzer ein Zertifikat.
  it: Dopo che il tasso di completamento di una sessione supera questa soglia, l’utente
    riceverà un certificato.
  es: Una vez que la tasa de finalización de una sesión supere este umbral, el usuario
    obtendrá un certificado.
  pt: Após a taxa de conclusão de uma sessão ultrapassar este limite, o utilizador
    receberá um certificado.
  pl: Gdy wskaźnik ukończenia sesji przekroczy ten próg, użytkownik otrzyma certyfikat.
  fi: Kun istunnon suoritusaste ylittää tämän kynnyksen, käyttäjä saa todistuksen.
  hr: Nakon što stopa završetka sesije premaši ovu granicu, korisnik će dobiti certifikat.
  cs: Po překročení této hodnoty dokončení relace uživatel obdrží certifikát.
  da: Når gennemførelsesgraden for en session overstiger denne grænse, modtager brugeren
    et certifikat.
  mt: Wara li r-rata ta’ tlestija tas-sessjoni tkun ogħla minn dan il-limitu, l-utent
    jirċievi ċertifikat.
  sl: Ko stopnja dokončanja seje preseže ta prag, bo uporabnik prejel potrdilo.
  bg: След като процентът на завършване на сесията надвиши този праг, потребителят
    ще получи сертификат.
  ro: După ce rata de finalizare a unei sesiuni depășește acest prag, utilizatorul
    va primi un certificat.
  et: Kui seansi lõpetamise määr ületab selle piiri, saab kasutaja tunnistuse.
  lv: Kad sesijas pabeigšanas rādītājs pārsniedz šo slieksni, lietotājs saņems sertifikātu.
  lt: Kai sesijos užbaigimo rodiklis viršija šią ribą, vartotojas gaus pažymėjimą.
  sv: När en sessions slutförandegrad överstiger denna gräns, får användaren ett certifikat.
  sk: Keď miera dokončenia relácie presiahne túto hranicu, používateľ získa certifikát.
  hu: Ha az ülés teljesítési aránya meghaladja ezt a küszöbértéket, a felhasználó
    tanúsítványt kap.
  el: Όταν το ποσοστό ολοκλήρωσης μιας συνεδρίας υπερβαίνει αυτό το όριο, ο χρήστης
    θα λάβει πιστοποιητικό.
  ga: Nuair a sháraíonn ráta críochnaithe seisiúin an tairseach seo, gheobhaidh an
    t-úsáideoir teastas.
  he: לאחר ששיעור ההשלמה של ההפעלה יעלה על סף זה, המשתמש יקבל תעודה.
  ca: Quan la taxa de finalització d'una sessió superi aquest límit, l'usuari obtindrà
    un certificat.
  cy: Ar ôl i gyfradd cwblhau sesiwn fod yn fwy na'r terfyn hwn, bydd y defnyddiwr
    yn ennill tystysgrif.
  is: Þegar lokageta lotu er hærri en þessi takmörk mun notandinn fá vottorð.
  nl_BE: Wanneer de voltooiingsgraad van een sessie hoger is dan deze limiet, ontvangt
    de gebruiker een certificaat.
  nl_be: Wanneer de voltooiingsgraad van een sessie hoger is dan deze limiet, ontvangt
    de gebruiker een certificaat.
  'no': Etter at en økts fullføringsrate er større enn denne grensen, vil brukeren
    motta et sertifikat.
  ru: После того как уровень завершения сеанса превысит это ограничение, пользователь
    получит сертификат.
  sq: Pasi shkalla e përfundimit të sesionit të jetë më e madhe se ky kufi, përdoruesi
    do të fitojë një certifikatë.
  sr: Nakon što stopa završenosti sesije bude veća od ovog ograničenja, korisnik će
    dobiti sertifikat.
  uk: Після того як рівень завершення сеансу перевищить це обмеження, користувач отримає
    сертифікат.
message_help_certificate_initial_threshhold:
  en: After a session completion rate is greater than this limit, the user will be
    informed about the possibility to earn a certificate.
  nl: Nadat de voltooiingsgraad van een sessie deze drempel overschrijdt, wordt de
    gebruiker geïnformeerd over de mogelijkheid om een certificaat te behalen.
  fr: Une fois que le taux d’achèvement d’une session dépasse ce seuil, l’utilisateur
    sera informé de la possibilité d’obtenir un certificat.
  de: Wenn die Abschlussrate einer Sitzung diesen Schwellenwert überschreitet, wird
    der Benutzer über die Möglichkeit informiert, ein Zertifikat zu erhalten.
  it: Dopo che il tasso di completamento di una sessione supera questa soglia, l’utente
    verrà informato della possibilità di ottenere un certificato.
  es: Una vez que la tasa de finalización de una sesión supere este umbral, se informará
    al usuario sobre la posibilidad de obtener un certificado.
  pt: Após a taxa de conclusão de uma sessão ultrapassar este limite, o utilizador
    será informado da possibilidade de obter um certificado.
  pl: Gdy wskaźnik ukończenia sesji przekroczy ten próg, użytkownik zostanie poinformowany
    o możliwości uzyskania certyfikatu.
  fi: Kun istunnon suoritusaste ylittää tämän kynnyksen, käyttäjälle ilmoitetaan mahdollisuudesta
    saada todistus.
  hr: Nakon što stopa završetka sesije premaši ovu granicu, korisnik će biti obaviješten
    o mogućnosti stjecanja certifikata.
  cs: Po překročení této hodnoty dokončení relace bude uživatel informován o možnosti
    získání certifikátu.
  da: Når gennemførelsesgraden for en session overstiger denne grænse, informeres
    brugeren om muligheden for at opnå et certifikat.
  mt: Wara li r-rata ta’ tlestija tas-sessjoni tkun ogħla minn dan il-limitu, l-utent
    jiġi informat dwar il-possibbiltà li jikseb ċertifikat.
  sl: Ko stopnja dokončanja seje preseže ta prag, bo uporabnik obveščen o možnosti
    pridobitve potrdila.
  bg: След като процентът на завършване на сесията надвиши този праг, потребителят
    ще бъде информиран за възможността да получи сертификат.
  ro: După ce rata de finalizare a unei sesiuni depășește acest prag, utilizatorul
    va fi informat despre posibilitatea de a obține un certificat.
  et: Kui seansi lõpetamise määr ületab selle piiri, teavitatakse kasutajat võimalusest
    saada tunnistus.
  lv: Kad sesijas pabeigšanas rādītājs pārsniedz šo slieksni, lietotājs tiks informēts
    par iespēju iegūt sertifikātu.
  lt: Kai sesijos užbaigimo rodiklis viršija šią ribą, vartotojas bus informuotas
    apie galimybę gauti pažymėjimą.
  sv: När en sessions slutförandegrad överstiger denna gräns, informeras användaren
    om möjligheten att erhålla ett certifikat.
  sk: Keď miera dokončenia relácie presiahne túto hranicu, používateľ bude informovaný
    o možnosti získať certifikát.
  hu: Ha az ülés teljesítési aránya meghaladja ezt a küszöbértéket, a felhasználó
    tájékoztatást kap a tanúsítvány megszerzésének lehetőségéről.
  el: Όταν το ποσοστό ολοκλήρωσης μιας συνεδρίας υπερβαίνει αυτό το όριο, ο χρήστης
    θα ενημερωθεί για τη δυνατότητα απόκτησης πιστοποιητικού.
  ga: Nuair a sháraíonn ráta críochnaithe seisiúin an tairseach seo, cuirfear an t-úsáideoir
    ar an eolas faoi fhéidearthacht teastas a ghnóthú.
  he: לאחר ששיעור ההשלמה של ההפעלה יעלה על סף זה, המשתמש יקבל הודעה על האפשרות לקבל
    תעודה.
  ca: Quan la taxa de finalització d'una sessió superi aquest límit, s'informarà l'usuari
    de la possibilitat d'obtenir un certificat.
  cy: Ar ôl i gyfradd cwblhau sesiwn fod yn fwy na'r terfyn hwn, bydd y defnyddiwr
    yn cael gwybod am y posibilrwydd o ennill tystysgrif.
  is: Þegar lokageta lotu er hærri en þessi takmörk verður notandinn upplýstur um
    möguleikann á að fá vottorð.
  nl_BE: Wanneer de voltooiingsgraad van een sessie hoger is dan deze limiet, wordt
    de gebruiker geïnformeerd over de mogelijkheid om een certificaat te verdienen.
  nl_be: Wanneer de voltooiingsgraad van een sessie hoger is dan deze limiet, wordt
    de gebruiker geïnformeerd over de mogelijkheid om een certificaat te verdienen.
  'no': Etter at en økts fullføringsrate er større enn denne grensen, vil brukeren
    bli informert om muligheten til å motta et sertifikat.
  ru: После того как уровень завершения сеанса превысит это ограничение, пользователь
    будет уведомлён о возможности получить сертификат.
  sq: Pasi shkalla e përfundimit të sesionit të jetë më e madhe se ky kufi, përdoruesi
    do të informohet për mundësinë e fitimit të një certifikate.
  sr: Nakon što stopa završenosti sesije bude veća od ovog ograničenja, korisnik će
    biti obavešten o mogućnosti da dobije sertifikat.
  uk: Після того як рівень завершення сеансу перевищить це обмеження, користувач буде
    поінформований про можливість отримати сертифікат.
