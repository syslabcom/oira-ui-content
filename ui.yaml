message_outdated_browser:
  bg: Използвате остарял уеб браузър. В резултат на това сайтът може да не функционира както се очаква. Моля, инсталирайте по-нов браузър, за да използвате оптимално този сайт.
  ca: Esteu utilitzant un navegador web obsolet. Com a resultat, és possible que el lloc no funcioni com s'esperava. Instal·leu un navegador més nou per fer un ús òptim d'aquest lloc.
  cs: Používáte zastaralý webový prohlížeč. V důsledku toho nemusí web fungovat podle očekávání. Nainstalujte si prosím novější prohlížeč, abyste mohli tento web využívat optimálně.
  cy: Rydych chi'n defnyddio porwr gwe hen ffasiwn. O ganlyniad, efallai na fydd y wefan yn gweithio fel y disgwylir. Gosodwch borwr newydd er mwyn gwneud defnydd gorau o'r wefan hon.
  da: Du bruger en forældet webbrowser. Som følge heraf fungerer webstedet muligvis ikke som forventet. Installer venligst en nyere browser for at gøre optimal brug af dette websted.
  de: Sie verwenden einen veralteten Webbrowser. Infolgedessen funktioniert die Website möglicherweise nicht wie erwartet. Bitte installieren Sie einen neueren Browser, um diese Seite optimal nutzen zu können.
  el: Χρησιμοποιείτε ένα παλαιό πρόγραμμα περιήγησης ιστού. Ως αποτέλεσμα, ο ιστότοπος ενδέχεται να μη λειτουργεί όπως αναμένεται. Παρακαλώ εγκαταστήστε ένα νεότερο πρόγραμμα περιήγησης για να αξιοποιήσετε βέλτιστα αυτόν τον ιστότοπο.
  en: You are using an outdated web browser. As a result, the site might not function as expected. Please install a newer browser in order to make optimal use of this site.
  es: Está utilizando un navegador web desactualizado. Como resultado, es posible que el sitio no funcione como se espera. Por favor, instale un navegador más reciente para hacer un uso óptimo de este sitio.
  et: Kasutate aegunud veebibrauserit. Selle tulemusena ei pruugi sait toimida ootuspäraselt. Palun installige uuem brauser, et seda saiti optimaalselt kasutada.
  fi: Käytät vanhentunutta verkkoselainta. Tämän seurauksena sivusto ei välttämättä toimi odotetulla tavalla. Asenna uudempi selain käyttääksesi tätä sivustoa parhaalla mahdollisella tavalla.
  fr: Vous utilisez un navigateur web obsolète. Par conséquent, le site pourrait ne pas fonctionner comme prévu. Veuillez installer un navigateur plus récent afin de profiter pleinement de ce site.
  ga: Tá tú ag úsáid brabhsálaí gréasáin as dáta. Dá bharr sin, is féidir nach n-oibreoidh an suíomh mar a bhíothas ag súil leis. Suiteáil brabhsálaí níos nuaí le húsáid is fearr a bhaint as an suíomh seo.
  he: אתה משתמש בדפדפן אינטרנט מיושן. כתוצאה מכך, האתר עשוי שלא לפעול כצפוי. אנא התקן דפדפן חדש יותר כדי להפיק את המרב מאתר זה.
  hr: Koristite zastarjeli web preglednik. Zbog toga stranica možda neće funkcionirati kako se očekuje. Molimo instalirajte noviji preglednik kako biste optimalno koristili ovo mjesto.
  hu: Elavult webböngészőt használ. Ennek eredményeként előfordulhat, hogy az oldal nem működik megfelelően. Kérjük, telepítsen egy újabb böngészőt, hogy a legjobban tudja használni ezt az oldalt.
  is: Þú ert að nota úrelta vafra. Þar af leiðandi gæti síðan ekki virkað eins og búist er við. Vinsamlegast settu upp nýrri vafra til að nýta þessa síðu sem best.
  it: Stai utilizzando un browser web obsoleto. Di conseguenza, il sito potrebbe non funzionare come previsto. Installa un browser più recente per utilizzare al meglio questo sito.
  lt: Naudojate pasenusią naršyklę. Dėl to svetainė gali neveikti taip, kaip tikėtasi. Įdiekite naujesnę naršyklę, kad galėtumėte optimaliai naudotis šia svetaine.
  lv: Jūs izmantojat novecojušu tīmekļa pārlūkprogrammu. Tādēļ vietne var nedarboties, kā paredzēts. Lūdzu, instalējiet jaunāku pārlūkprogrammu, lai optimāli izmantotu šo vietni.
  mt: Qed tuża browser tal-web li hu skadut. Bħala riżultat, is-sit jista' ma jaħdimx kif mistenni. Jekk jogħġbok installa browser aktar ġdid sabiex tagħmel użu ottimali minn dan is-sit.
  nl: U gebruikt een verouderde webbrowser. Hierdoor kan de site mogelijk minder goed functioneren. Installeer een nieuwere browser om optimaal van deze site gebruik te kunnen blijven maken.
  nl_BE: U gebruikt een verouderde webbrowser. Hierdoor werkt de site mogelijk niet zoals verwacht. Installeer een nieuwere browser om optimaal gebruik te maken van deze site.
  nl_be: U gebruikt een verouderde webbrowser. Hierdoor werkt de site mogelijk niet zoals verwacht. Installeer een nieuwere browser om optimaal gebruik te maken van deze site.
  'no': Du bruker en utdatert nettleser. Som et resultat kan nettstedet ikke fungere som forventet. Vennligst installer en nyere nettleser for å gjøre optimal bruk av dette nettstedet.
  pl: Używasz przestarzałej przeglądarki internetowej. W rezultacie witryna może nie działać zgodnie z oczekiwaniami. Zainstaluj nowszą przeglądarkę, aby optymalnie korzystać z tej witryny.
  pt: Está a utilizar um navegador web desatualizado. Como resultado, o site pode não funcionar como esperado. Instale um navegador mais recente para fazer uso ideal deste site.
  ro: Utilizați un browser web învechit. Ca urmare, este posibil ca site-ul să nu funcționeze conform așteptărilor. Vă rugăm să instalați un browser mai nou pentru a utiliza acest site în mod optim.
  ru: Вы используете устаревший веб-браузер. В результате сайт может работать не так, как ожидается. Пожалуйста, установите более новый браузер для оптимального использования этого сайта.
  sk: Používate zastaraný webový prehliadač. V dôsledku toho stránka nemusí fungovať podľa očakávania. Nainštalujte si novší prehliadač, aby ste mohli tento web využívať optimálne.
  sl: Uporabljate zastarel spletni brskalnik. Posledično spletno mesto morda ne bo delovalo, kot je pričakovano. Prosimo, namestite novejši brskalnik za optimalno uporabo tega spletnega mesta.
  sq: Jeni duke përdorur një shfletues interneti të vjetëruar. Si rezultat, faqja mund të mos funksionojë siç pritet. Ju lutemi instaloni një shfletues më të ri për të përdorur këtë faqe në mënyrë optimale.
  sr: Koristite zastareli web pregledač. Kao rezultat toga, sajt možda neće funkcionisati kao što se očekuje. Molimo instalirajte noviji pregledač kako biste na optimalan način koristili ovaj sajt.
  sv: Du använder en föråldrad webbläsare. Som ett resultat kanske webbplatsen inte fungerar som förväntat. Installera en nyare webbläsare för att använda den här webbplatsen på bästa sätt.
  uk: Ви використовуєте застарілий веб-браузер. Як наслідок, сайт може працювати не так, як очікується. Будь ласка, встановіть новіший браузер, щоб оптимально користуватися цим сайтом.
message_password_requirements:
  bg: Паролата трябва да е поне 12 знака и да съдържа поне една малка буква, една главна буква и една цифра.
  ca: La contrasenya ha de tenir almenys 12 caràcters i ha de contenir almenys una lletra minúscula, una lletra majúscula i un dígit.
  cs: Heslo musí mít alespoň 12 znaků a musí obsahovat alespoň jedno malé písmeno, jedno velké písmeno a jednu číslici.
  cy: Mae angen i'r cyfrinair fod o leiaf 12 nod o hyd ac mae angen iddo gynnwys o leiaf un llythyren fach, un llythyren fawr ac un digid.
  da: Adgangskoden skal være mindst 12 tegn lang og skal indeholde mindst ét lille bogstav, ét stort bogstav og ét ciffer.
  de: Das Passwort muss mindestens 12 Zeichen lang sein und mindestens einen Kleinbuchstaben, einen Großbuchstaben und eine Ziffer enthalten.
  el: Ο κωδικός πρόσβασης πρέπει να έχει τουλάχιστον 12 χαρακτήρες και να περιέχει τουλάχιστον ένα πεζό γράμμα, ένα κεφαλαίο γράμμα και έναν αριθμό.
  en: The password needs to be at least 12 characters long and needs to contain at least one lower case letter, one upper case letter and one digit.
  es: La contraseña debe tener al menos 12 caracteres y debe contener al menos una letra minúscula, una letra mayúscula y un dígito.
  et: Parool peab olema vähemalt 12 tähemärki pikk ja sisaldama vähemalt ühte väiketähte, ühte suurtähte ja ühte numbrit.
  fi: Salasanan on oltava vähintään 12 merkkiä pitkä ja sen on sisällettävä vähintään yksi pienaakkonen, yksi suuraakkonen ja yksi numero.
  fr: Le mot de passe doit comporter au moins 12 caractères et contenir au moins une lettre minuscule, une lettre majuscule et un chiffre.
  ga: Ní mór don phasfhocal a bheith ar a laghad 12 carachtar ar fhad agus ní mór dó litir bheag amháin, litir mhór amháin agus uimhir amháin ar a laghad a bheith ann.
  he: הסיסמה חייבת להכיל לפחות 12 תווים ולכלול לפחות אות קטנה אחת, אות גדולה אחת וספרה אחת.
  hr: Lozinka mora imati najmanje 12 znakova i mora sadržavati najmanje jedno malo slovo, jedno veliko slovo i jednu znamenku.
  hu: A jelszónak legalább 12 karakter hosszúnak kell lennie, és tartalmaznia kell legalább egy kisbetűt, egy nagybetűt és egy számjegyet.
  is: Lykilorðið þarf að vera að minnsta kosti 12 stafir að lengd og þarf að innihalda að minnsta kosti einn lágstaf, einn hástaf og eina tölu.
  it: La password deve essere lunga almeno 12 caratteri e deve contenere almeno una lettera minuscola, una lettera maiuscola e una cifra.
  lt: Slaptažodis turi būti bent 12 simbolių ilgio ir turi turėti bent vieną mažąją raidę, vieną didžiąją raidę ir vieną skaitmenį.
  lv: Parolei jābūt vismaz 12 rakstzīmes garai un tai jāsatur vismaz viens mazais burts, viens lielais burts un viens cipars.
  mt: Il-password trid tkun tal-inqas 12-il karattru twila u trid tinkludi tal-inqas ittra żgħira waħda, ittra kbira waħda u ċifra waħda.
  nl: Het wachtwoord moet minimaal 12 tekens lang zijn en moet minimaal één kleine letter, één hoofdletter en één cijfer bevatten.
  nl_BE: Het wachtwoord moet minstens 12 tekens lang zijn en moet minstens één kleine letter, één hoofdletter en één cijfer bevatten.
  nl_be: Het wachtwoord moet minstens 12 tekens lang zijn en moet minstens één kleine letter, één hoofdletter en één cijfer bevatten.
  'no': Passordet må være minst 12 tegn langt og må inneholde minst én liten bokstav, én stor bokstav og ett siffer.
  pl: Hasło musi mieć co najmniej 12 znaków i zawierać co najmniej jedną małą literę, jedną wielką literę i jedną cyfrę.
  pt: A palavra-passe deve ter pelo menos 12 caracteres e deve conter pelo menos uma letra minúscula, uma letra maiúscula e um dígito.
  ro: Parola trebuie să aibă cel puțin 12 caractere și să conțină cel puțin o literă mică, o literă mare și o cifră.
  ru: Пароль должен содержать не менее 12 символов и включать хотя бы одну строчную букву, одну заглавную букву и одну цифру.
  sk: Heslo musí mať aspoň 12 znakov a musí obsahovať aspoň jedno malé písmeno, jedno veľké písmeno a jednu číslicu.
  sl: Geslo mora imeti vsaj 12 znakov in mora vsebovati vsaj eno malo črko, eno veliko črko in eno številko.
  sq: Fjalëkalimi duhet të jetë të paktën 12 karaktere i gjatë dhe duhet të përmbajë të paktën një shkronjë të vogël, një shkronjë të madhe dhe një shifër.
  sr: Lozinka mora imati najmanje 12 karaktera i mora sadržati najmanje jedno malo slovo, jedno veliko slovo i jednu cifru.
  sv: Lösenordet måste vara minst 12 tecken långt och måste innehålla minst en gemen bokstav, en versal bokstav och en siffra.
  uk: Пароль має містити щонайменше 12 символів і включати принаймні одну малу літеру, одну велику літеру та одну цифру.
message_permission_level_basic:
  bg: Потребителят може само да взема обучения.
  ca: L'usuari només pot fer formacions.
  cs: Uživatel může absolvovat pouze školení.
  cy: Dim ond hyfforddiant y gall y defnyddiwr ei gymryd.
  da: Brugeren kan kun deltage i kurser.
  de: Der Benutzer kann nur Schulungen absolvieren.
  el: Ο χρήστης μπορεί να παρακολουθεί μόνο εκπαιδεύσεις.
  en: User can only take trainings.
  es: El usuario solo puede realizar formaciones.
  et: Kasutaja saab ainult koolitusi läbida.
  fi: Käyttäjä voi vain suorittaa koulutuksia.
  fr: L'utilisateur peut uniquement suivre des formations.
  ga: Ní féidir leis an úsáideoir ach oiliúint a dhéanamh.
  he: המשתמש יכול לבצע הכשרות בלבד.
  hr: Korisnik može samo pohađati obuke.
  hu: A felhasználó csak képzéseken vehet részt.
  is: Notandi getur aðeins tekið þátt í þjálfunum.
  it: L'utente può solo seguire le formazioni.
  lt: Vartotojas gali tik dalyvauti mokymuose.
  lv: Lietotājs var tikai apmeklēt apmācības.
  mt: L-utent jista' biss jieħu taħriġ.
  nl: Gebruiker kan alleen trainingen volgen.
  nl_BE: Gebruiker kan enkel trainingen volgen.
  nl_be: Gebruiker kan enkel trainingen volgen.
  'no': Bruker kan bare gjennomføre opplæringer.
  pl: Użytkownik może jedynie uczestniczyć w szkoleniach.
  pt: O utilizador só pode realizar formações.
  ro: Utilizatorul poate efectua doar cursuri de formare.
  ru: Пользователь может только проходить обучение.
  sk: Používateľ môže iba absolvovať školenia.
  sl: Uporabnik lahko samo opravlja usposabljanja.
  sq: Përdoruesi mund të marrë vetëm trajnime.
  sr: Korisnik može samo pohađati obuke.
  sv: Användaren kan endast genomföra utbildningar.
  uk: Користувач може лише проходити навчання.
message_permission_level_edit:
  bg: Потребителят може да взема обучения и да преглежда и редактира всички оценки на риска.
  ca: L'usuari pot fer formacions i visualitzar i editar totes les avaluacions de riscos.
  cs: Uživatel může absolvovat školení a prohlížet a upravovat všechna hodnocení rizik.
  cy: Gall y defnyddiwr gymryd hyfforddiant a gweld a golygu pob asesiad risg.
  da: Brugeren kan deltage i kurser og se og redigere alle risikovurderinger.
  de: Der Benutzer kann Schulungen absolvieren sowie alle Risikobewertungen anzeigen und bearbeiten.
  el: Ο χρήστης μπορεί να παρακολουθεί εκπαιδεύσεις και να προβάλλει και να επεξεργάζεται όλες τις εκτιμήσεις κινδύνου.
  en: User can take trainings and view and edit all risk assessments.
  es: El usuario puede realizar formaciones y ver y editar todas las evaluaciones de riesgos.
  et: Kasutaja saab läbida koolitusi ning vaadata ja muuta kõiki riskihindamisi.
  fi: Käyttäjä voi suorittaa koulutuksia sekä tarkastella ja muokata kaikkia riskiarviointeja.
  fr: L'utilisateur peut suivre des formations et consulter et modifier toutes les évaluations des risques.
  ga: Féadfaidh an t-úsáideoir oiliúint a dhéanamh agus gach measúnú riosca a fheiceáil agus a chur in eagar.
  he: המשתמש יכול לבצע הכשרות ולצפות ולערוך את כל הערכות הסיכון.
  hr: Korisnik može pohađati obuke te pregledavati i uređivati sve procjene rizika.
  hu: A felhasználó képzéseken vehet részt, és megtekintheti, szerkesztheti az összes kockázatértékelést.
  is: Notandi getur tekið þátt í þjálfunum og skoðað og breytt öllum áhættumatsskrám.
  it: L'utente può seguire le formazioni e visualizzare e modificare tutte le valutazioni dei rischi.
  lt: Vartotojas gali dalyvauti mokymuose ir peržiūrėti bei redaguoti visus rizikos vertinimus.
  lv: Lietotājs var apmeklēt apmācības un skatīt un rediģēt visus riska novērtējumus.
  mt: L-utent jista' jieħu taħriġ u jara u jeditja l-valutazzjonijiet tar-riskju kollha.
  nl: Gebruiker kan trainingen volgen en alle risicobeoordelingen bekijken en bewerken.
  nl_BE: Gebruiker kan trainingen volgen en alle risicobeoordelingen bekijken en bewerken.
  nl_be: Gebruiker kan trainingen volgen en alle risicobeoordelingen bekijken en bewerken.
  'no': Bruker kan gjennomføre opplæringer og se og redigere alle risikovurderinger.
  pl: Użytkownik może uczestniczyć w szkoleniach oraz przeglądać i edytować wszystkie oceny ryzyka.
  pt: O utilizador pode realizar formações e visualizar e editar todas as avaliações de risco.
  ro: Utilizatorul poate efectua cursuri de formare și vizualiza și edita toate evaluările de risc.
  ru: Пользователь может проходить обучение, а также просматривать и редактировать все оценки рисков.
  sk: Používateľ môže absolvovať školenia a prezerať a upravovať všetky hodnotenia rizík.
  sl: Uporabnik lahko opravlja usposabljanja ter pregleduje in ureja vse ocene tveganj.
  sq: Përdoruesi mund të marrë trajnime dhe të shikojë dhe modifikojë të gjitha vlerësimet e riskut.
  sr: Korisnik može pohađati obuke i pregledati i uređivati sve procene rizika.
  sv: Användaren kan genomföra utbildningar och visa och redigera alla riskbedömningar.
  uk: Користувач може проходити навчання та переглядати і редагувати всі оцінки ризиків.
message_permission_level_full:
  bg: Потребителят преглежда и редактира цялото съдържание и добавя или премахва потребители от организацията.
  ca: L'usuari visualitza i edita tot el contingut i afegeix o elimina usuaris de l'organització.
  cs: Uživatel prohlíží a upravuje veškerý obsah a přidává nebo odebírá uživatele z organizace.
  cy: Mae'r defnyddiwr yn gweld ac yn golygu pob cynnwys ac yn ychwanegu neu'n tynnu defnyddwyr i'r sefydliad neu ohono.
  da: Brugeren ser og redigerer alt indhold og tilføjer eller fjerner brugere til eller fra organisationen.
  de: Der Benutzer kann alle Inhalte anzeigen und bearbeiten sowie Benutzer zur Organisation hinzufügen oder daraus entfernen.
  el: Ο χρήστης μπορεί να προβάλλει και να επεξεργάζεται όλο το περιεχόμενο και να προσθέτει ή να αφαιρεί χρήστες από τον οργανισμό.
  en: User view and edit all content and add or remove users to or from the organiation.
  es: El usuario puede ver y editar todo el contenido y agregar o eliminar usuarios de la organización.
  et: Kasutaja saab vaadata ja muuta kõiki sisu ning lisada või eemaldada kasutajaid organisatsioonist.
  fi: Käyttäjä voi tarkastella ja muokata kaikkea sisältöä sekä lisätä tai poistaa käyttäjiä organisaatiosta.
  fr: L'utilisateur peut consulter et modifier tout le contenu et ajouter ou supprimer des utilisateurs de l'organisation.
  ga: Féadfaidh an t-úsáideoir gach ábhar a fheiceáil agus a chur in eagar agus úsáideoirí a chur leis an eagraíocht nó a bhaint di.
  he: המשתמש יכול לצפות ולערוך את כל התוכן ולהוסיף או להסיר משתמשים מהארגון.
  hr: Korisnik može pregledavati i uređivati sav sadržaj te dodavati ili uklanjati korisnike iz organizacije.
  hu: A felhasználó megtekintheti és szerkesztheti az összes tartalmat, valamint felhasználókat adhat hozzá vagy távolíthat el a szervezetből.
  is: Notandi skoðar og breytir öllu efni og bætir við eða fjarlægir notendur í eða úr fyrirtækinu.
  it: L'utente visualizza e modifica tutti i contenuti e aggiunge o rimuove utenti dall'organizzazione.
  lt: Vartotojas peržiūri ir redaguoja visą turinį ir prideda arba šalina vartotojus iš organizacijos.
  lv: Lietotājs skata un rediģē visu saturu un pievieno vai noņem lietotājus organizācijai vai no tās.
  mt: L-utent jara u jeditja l-kontenut kollu u jżid jew ineħħi utenti lill-organizzazzjoni jew minnha.
  nl: Gebruiker kan alle inhoud bekijken en bewerken en gebruikers toevoegen aan of verwijderen uit de organisatie.
  nl_BE: Gebruiker kan alle inhoud bekijken en bewerken en gebruikers toevoegen aan of verwijderen uit de organisatie.
  nl_be: Gebruiker kan alle inhoud bekijken en bewerken en gebruikers toevoegen aan of verwijderen uit de organisatie.
  'no': Bruker kan se og redigere alt innhold og legge til eller fjerne brukere fra organisasjonen.
  pl: Użytkownik może przeglądać i edytować całą zawartość oraz dodawać lub usuwać użytkowników z organizacji.
  pt: O utilizador visualiza e edita todo o conteúdo e adiciona ou remove utilizadores da organização.
  ro: Utilizatorul vizualizează și editează tot conținutul și adaugă sau elimină utilizatori din organizație.
  ru: Пользователь просматривает и редактирует весь контент, а также добавляет или удаляет пользователей в организацию или из неё.
  sk: Používateľ prezerá a upravuje všetok obsah a pridáva alebo odstraňuje používateľov z organizácie.
  sl: Uporabnik pregleduje in ureja vso vsebino ter dodaja ali odstranjuje uporabnike v organizacijo ali iz nje.
  sq: Përdoruesi shikon dhe modifikon të gjithë përmbajtjen dhe shton ose heq përdorues nga organizata.
  sr: Korisnik pregledava i uređuje sav sadržaj i dodaje ili uklanja korisnike u ili iz organizacije.
  sv: Användaren visar och redigerar allt innehåll och lägger till eller tar bort användare från organisationen.
  uk: Користувач переглядає і редагує весь вміст та додає або видаляє користувачів з організації.
message_permission_level_manage:
  bg: Потребителят може да взема обучения, да преглежда и редактира всички оценки на риска, да заявява валидации и да заключва оценки на риска.
  ca: L'usuari pot fer formacions, visualitzar i editar totes les avaluacions de riscos, sol·licitar validacions i bloquejar avaluacions de riscos.
  cs: Uživatel může absolvovat školení, prohlížet a upravovat všechna hodnocení rizik, žádat o validace a uzamykat hodnocení rizik.
  cy: Gall y defnyddiwr gymryd hyfforddiant, gweld a golygu pob asesiad risg, gofyn am ddilysnodau a chloi aseisadau risg.
  da: Brugeren kan deltage i kurser, se og redigere alle risikovurderinger, anmode om valideringer og låse risikovurderinger.
  de: Der Benutzer kann Schulungen absolvieren, alle Risikobewertungen anzeigen und bearbeiten, Validierungen anfordern und Risikobewertungen sperren.
  el: Ο χρήστης μπορεί να παρακολουθεί εκπαιδεύσεις, να προβάλλει και να επεξεργάζεται όλες τις εκτιμήσεις κινδύνου, να ζητά επικυρώσεις και να κλειδώνει εκτιμήσεις κινδύνου.
  en: User can take trainings, view and edit all risk assessments, request validations and lock risk assessments.
  es: El usuario puede realizar formaciones, ver y editar todas las evaluaciones de riesgos, solicitar validaciones y bloquear evaluaciones de riesgos.
  et: Kasutaja saab läbida koolitusi, vaadata ja muuta kõiki riskihindamisi, taotleda valideerimisi ja lukustada riskihindamisi.
  fi: Käyttäjä voi suorittaa koulutuksia, tarkastella ja muokata kaikkia riskiarviointeja, pyytää validointeja ja lukita riskiarviointeja.
  fr: L'utilisateur peut suivre des formations, consulter et modifier toutes les évaluations des risques, demander des validations et verrouiller les évaluations des risques.
  ga: Féadfaidh an t-úsáideoir oiliúint a dhéanamh, gach measúnú riosca a fheiceáil agus a chur in eagar, bailíochtuithe a iarraidh agus measúnuithe riosca a ghlasáil.
  he: המשתמש יכול לבצע הכשרות, לצפות ולערוך את כל הערכות הסיכון, לבקש אישורים ולנעול הערכות סיכון.
  hr: Korisnik može pohađati obuke, pregledavati i uređivati sve procjene rizika, zahtijevati validacije i zaključavati procjene rizika.
  hu: A felhasználó képzéseken vehet részt, megtekintheti és szerkesztheti az összes kockázatértékelést, jóváhagyásokat kérhet és zárolhatja a kockázatértékeléseket.
  is: Notandi getur tekið þátt í þjálfunum, skoðað og breytt öllum áhættumatsskrám, óskað eftir staðfestingum og læst áhættumatsskrám.
  it: L'utente può seguire le formazioni, visualizzare e modificare tutte le valutazioni dei rischi, richiedere validazioni e bloccare le valutazioni dei rischi.
  lt: Vartotojas gali dalyvauti mokymuose, peržiūrėti ir redaguoti visus rizikos vertinimus, prašyti patvirtinimų ir užrakinti rizikos vertinimus.
  lv: Lietotājs var apmeklēt apmācības, skatīt un rediģēt visus riska novērtējumus, pieprasīt validācijas un bloķēt riska novērtējumus.
  mt: L-utent jista' jieħu taħriġ, jara u jeditja l-valutazzjonijiet tar-riskju kollha, jitlob validazzjonijiet u jibblokka l-valutazzjonijiet tar-riskju.
  nl: Gebruiker kan trainingen volgen, alle risicobeoordelingen bekijken en bewerken, validaties aanvragen en risicobeoordelingen vergrendelen.
  nl_BE: Gebruiker kan trainingen volgen, alle risicobeoordelingen bekijken en bewerken, validaties aanvragen en risicobeoordelingen vergrendelen.
  nl_be: Gebruiker kan trainingen volgen, alle risicobeoordelingen bekijken en bewerken, validaties aanvragen en risicobeoordelingen vergrendelen.
  'no': Bruker kan gjennomføre opplæringer, se og redigere alle risikovurderinger, be om valideringer og låse risikovurderinger.
  pl: Użytkownik może uczestniczyć w szkoleniach, przeglądać i edytować wszystkie oceny ryzyka, żądać walidacji i blokować oceny ryzyka.
  pt: O utilizador pode realizar formações, visualizar e editar todas as avaliações de risco, solicitar validações e bloquear avaliações de risco.
  ro: Utilizatorul poate efectua cursuri de formare, vizualiza și edita toate evaluările de risc, solicita validări și bloca evaluările de risc.
  ru: Пользователь может проходить обучение, просматривать и редактировать все оценки рисков, запрашивать подтверждения и блокировать оценки рисков.
  sk: Používateľ môže absolvovať školenia, prezerať a upravovať všetky hodnotenia rizík, žiadať o validácie a uzamknúť hodnotenia rizík.
  sl: Uporabnik lahko opravlja usposabljanja, pregleduje in ureja vse ocene tveganj, zahteva validacije in zaklene ocene tveganj.
  sq: Përdoruesi mund të marrë trajnime, të shikojë dhe modifikojë të gjitha vlerësimet e riskut, të kërkojë validime dhe të bllokojë vlerësimet e riskut.
  sr: Korisnik može pohađati obuke, pregledati i uređivati sve procene rizika, tražiti validacije i zaključati procene rizika.
  sv: Användaren kan genomföra utbildningar, visa och redigera alla riskbedömningar, begära valideringar och låsa riskbedömningar.
  uk: Користувач може проходити навчання, переглядати і редагувати всі оцінки ризиків, запитувати підтвердження та блокувати оцінки ризиків.
