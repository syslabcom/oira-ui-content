question_measures_sufficient:
  bg: Достатъчни ли са избраните по-горе мерки?
  ca: Les mesures seleccionades són suficients?
  cs: Jsou opatření, která jsou vybrána výše, dostačující?
  cy: A yw'r mesurau sydd eisoes wedi'u gweithredu yn ddigonol?
