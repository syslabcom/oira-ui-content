  en: If certain risks are not avoidable, how can they be reduced to a level at which the health and safety of those exposed is not compromised?
  es: Si algún riesgo no se puede evitar, ¿cómo se puede reducir hasta un nivel en que no afecte a la seguridad y salud de los implicados?
  et: Kui teatud riske ei ole võimalik vältida, siis kuidas saab neid vähendada tasemeni, millel kokkupuutuvate isikute tervis ja ohutus ei ole ohustatud?
  fi: Jos työssä esiintyvien vaara- ja haittatekijöiden aiheuttamia riskejä ei voida poistaa tai välttää, niin millaisin keinoin ne saadaan sellaiselle tasolle, etteivät ne aiheuta vaaraa terveydelle ja turvallisuudelle?
  fr: 'Si certains risques ne sont pas évitables, comment peuvent-ils être réduits à un niveau tel que la santé et la sécurité des salariés exposés ne soient pas compromises ? '
  ga: Mura féidir rioscaí áirithe a sheachaint, conas is féidir iad a laghdú go leibhéal nach gcuirtear sláinte agus sábháilteacht na ndaoine atá nochta i gcontúirt?
