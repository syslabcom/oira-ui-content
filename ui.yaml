  sr: Nakon otključavanja, moraćete ponovo poslati dokumente za brifing izvođaču radi
    validacije.
  sv: När du har låst upp måste du skicka om informationsdokumenten till entreprenören
    för validering.
  uk: Після розблокування вам потрібно буде повторно надіслати інструктивні документи
    підряднику для перевірки.
message_you_are_about_to_unlock_explanation:
  de: Diese GBU ist gesperrt, weil die Einweisungsunterlagen bereits versendet wurden.
  en: This risk assessment is locked because the briefing documents were already sent
    to the contractor.
  bg: Тази оценка на риска е заключена, защото брифинг документите вече са изпратени
    на изпълнителя.
  ca: Aquesta avaluació de riscos està bloquejada perquè els documents informatius
    ja s'han enviat al contractista.
  cs: Toto hodnocení rizik je uzamčeno, protože informační dokumenty již byly odeslány
    zhotoviteli.
  cy: Mae'r asesiad risg hwn wedi'i gloi oherwydd bod y dogfennau briffio eisoes wedi'u
    hanfon at y contractwr.
  da: Denne risikovurdering er låst, fordi briefingdokumenterne allerede er sendt
    til entreprenøren.
  el: Αυτή η αξιολόγηση κινδύνου είναι κλειδωμένη επειδή τα έγγραφα ενημέρωσης έχουν
    ήδη σταλεί στον εργολάβο.
  es: Esta evaluación de riesgos está bloqueada porque los documentos de informe ya
    fueron enviados al contratista.
  et: See riskihinnang on lukustatud, kuna briifingudokumendid on juba töövõtjale
    saadetud.
  fi: Tämä riskiarviointi on lukittu, koska tiedotusasiakirjat on jo lähetetty urakoitsijalle.
  fr: Cette évaluation des risques est verrouillée car les documents d'information
    ont déjà été envoyés au prestataire.
  ga: Tá an measúnú riosca seo faoi ghlas toisc go raibh na cáipéisí achoimre seolta
    cheana féin chuig an gconraitheoir.
  he: הערכת הסיכון הזו נעולה מכיוון שמסמכי הבריפינג כבר נשלחו לקבלן.
  hr: Ova procjena rizika je zaključana jer su dokumenti za briefing već poslani izvođaču.
  hu: Ez a kockázatértékelés zárolva van, mert a tájékoztató dokumentumokat már elküldték
    a vállalkozónak.
  is: Þetta áhættumat er læst vegna þess að kynningargögnin voru þegar send til verktakans.
  it: Questa valutazione del rischio è bloccata perché i documenti di briefing sono
    stati già inviati all'appaltatore.
  lt: Šis rizikos vertinimas yra užrakintas, nes informaciniai dokumentai jau buvo
    išsiųsti rangovui.
  lv: Šis riska novērtējums ir bloķēts, jo informatīvie dokumenti jau tika nosūtīti
    darbuzņēmējam.
  mt: Din il-valutazzjoni tar-riskju hija msakkar għax id-dokumenti tal-briefing diġà
    ntbagħtu lill-kuntrattur.
  nl: Deze risicobeoordeling is vergrendeld omdat de briefingdocumenten al naar de
    aannemer zijn verzonden.
  nl_BE: Deze risicobeoordeling is vergrendeld omdat de briefingdocumenten al naar
    de aannemer zijn verzonden.
  nl_be: Deze risicobeoordeling is vergrendeld omdat de briefingdocumenten al naar
    de aannemer zijn verzonden.
  'no': Denne risikovurderingen er låst fordi orienteringsdokumentene allerede er
    sendt til entreprenøren.
  pl: Ta ocena ryzyka jest zablokowana, ponieważ dokumenty odprawowe zostały już wysłane
    do wykonawcy.
  pt: Esta avaliação de risco está bloqueada porque os documentos de briefing já foram
    enviados ao empreiteiro.
  ro: Această evaluare a riscurilor este blocată deoarece documentele de informare
    au fost deja trimise contractantului.
  ru: Эта оценка рисков заблокирована, поскольку информационные документы уже были
    отправлены подрядчику.
  sk: Toto hodnotenie rizík je zablokované, pretože informačné dokumenty už boli zaslané
    zhotoviteľovi.
