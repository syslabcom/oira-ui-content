message_insert_module_from_other_tool_instruction:
  nl: Selecteer een module uit een andere tool en voeg een kopie in in deze tool.
  en: Select a module from another tool and insert a copy into this tool.
  bg: Изберете модул от друг инструмент и вмъкнете копие в този инструмент.
  cs: Vyberte modul z jiného nástroje a vložte kopii do tohoto nástroje.
  da: Vælg en modul fra et andet værktøj og indsæt en kopi i dette værktøj.
  de: Wählen Sie ein Modul aus einem anderen Tool aus und fügen Sie eine Kopie in
    dieses Tool ein.
  et: Valige moodul mõnest muust tööriistast ja sisestage koopia sellesse tööriista.
  el: Επιλέξτε ένα πρόσθετο από ένα άλλο εργαλείο και εισαγάγετε ένα αντίγραφο σε
    αυτό το εργαλείο.
  es: Seleccione un módulo de otra herramienta e inserte una copia en esta herramienta.
  fi: Valitse moduuli toisesta työkalusta ja lisää kopio tähän työkaluun.
  fr: Sélectionnez un module à partir d'un autre outil et insérez une copie dans cet
    outil.
  ga: Roghnaigh modúl ó uirlis eile agus cuir cóip isteach sa t-uirlis seo.
  hr: Odaberite modul iz drugog alata i umetnite kopiju u ovaj alat.
  hu: Válasszon egy modult egy másik eszközből, és helyezzen be egy másolatot ebbe
    az eszközbe.
  it: Seleziona un modulo da un altro strumento e inserisci una copia in questo strumento.
  lt: Pasirinkite modulį iš kito įrankio ir įterpkite kopiją į šį įrankį.
  lv: Izvēlieties moduli no citas rīka un ievietojiet kopiju šajā rīkā.
  mt: Agħżel mudell minn għodda oħra u daħħal kopja f'dan l-għodda.
  pl: Wybierz moduł z innego narzędzia i wstaw kopię do tego narzędzia.
  pt: Selecione um módulo de outra ferramenta e insira uma cópia nesta ferramenta.
  ro: Selectați un modul dintr-un alt instrument și inserați o copie în acest instrument.
  sk: Vyberte modul z iného nástroja a vložte kópiu do tohto nástroja.
  sl: Izberite modul iz drugega orodja in vstavite kopijo v to orodje.
  sv: Välj en modul från ett annat verktyg och infoga en kopia i detta verktyg.
  he: בחר מודול מכלי עבודה אחר והכנס עותק לכלי זה.
  ca: Seleccioneu un mòdul d'una altra eina i inseriu-ne una còpia en aquesta eina.
  cy: Dewiswch fodiwl o offeryn arall a mewnosodwch gopi i'r offeryn hwn.
  is: Veldu hluta úr öðru tóli og settu inn afrit í þetta tól.
  nl_BE: Selecteer een module uit een ander instrument en voeg een kopie in dit instrument
    in.
  nl_be: Selecteer een module uit een ander instrument en voeg een kopie in dit instrument
    in.
  'no': Velg en modul fra et annet verktøy og sett inn en kopi i dette verktøyet.
  ru: Выберите модуль из другого инструмента и вставьте его копию в этот инструмент.
  sq: Zgjidhni një modul nga një mjet tjetër dhe futni një kopje në këtë mjet.
  sr: Izaberite modul iz drugog alata i ubacite kopiju u ovaj alat.
  uk: Виберіть модуль з іншого інструменту та вставте його копію в цей інструмент.
