  hr: Jesu li prethodno odabrane mjere dovoljne?
  hu: A fenti intézkedésekkel elfogadható mértékű a fennmaradó kockázat?
  is: Eru valdar úrbótaaðgerðir nægjanlegar til að hafa stjórn á áhættunni?
