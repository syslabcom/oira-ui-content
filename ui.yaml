label_training_achievement_listed:
  de: Ihr Erfolg wird unter der Überschrift “Meine Unterweisungen” auf dem Dashboard
    zu sehen sein. Von dort können Sie jederzeit Ihr Zertifikat betrachten oder ausdrucken.
  en: Your achievement will be listed under “My trainings” in the training portlet
    on the dashboard. From there you can always view or print your certificate if
    you like.
  bg: Вашето постижение ще бъде посочено под „Моите обучения" в портлета за обучение
    на таблото. Оттам можете винаги да преглеждате или отпечатвате сертификата си,
    ако желаете.
  ca: El vostre assoliment apareixerà a "Les meves formacions" al portlet de formació
    del tauler. Des d'allà podeu veure o imprimir el vostre certificat quan vulgueu.
  cs: Vaše úspěchy budou uvedeny pod "Moje školení" v portletu školení na řídicím
    panelu. Odtud si můžete kdykoli prohlédnout nebo vytisknout svůj certifikát.
  cy: Bydd eich cyflawniad wedi'i restru o dan "Fy hyfforddiant" yn y portled hyfforddi
    ar y dangosfwrdd. O'r fan honno gallwch bob amser weld neu argraffu eich tystysgrif
    os dymunwch.
  da: Din præstation vil blive vist under "Mine uddannelser" i uddannelsesportletten
    på dashboardet. Derfra kan du altid se eller udskrive dit certifikat, hvis du
    ønsker det.
  el: Το επίτευγμά σας θα καταχωριστεί στην ενότητα «Οι εκπαιδεύσεις μου» στο portlet
    εκπαίδευσης στον πίνακα ελέγχου. Από εκεί μπορείτε πάντα να προβάλλετε ή να εκτυπώνετε
    το πιστοποιητικό σας εάν το επιθυμείτε.
  es: Su logro aparecerá en "Mis formaciones" en el portlet de formación del panel
    de control. Desde allí siempre podrá ver o imprimir su certificado si lo desea.
  et: Teie saavutus kuvatakse armatuurlaua koolitusportleti jaotises "Minu koolitused".
    Sealt saate alati vaadata või printida oma sertifikaati, kui soovite.
  fi: Saavutuksesi näkyy kohdassa "Omat koulutukset" koontinäytön koulutusportletissa.
    Sieltä voit aina tarkastella tai tulostaa sertifikaattisi halutessasi.
  fr: Votre réalisation sera répertoriée sous "Mes formations" dans le portlet de
    formation du tableau de bord. De là, vous pouvez toujours consulter ou imprimer
    votre certificat si vous le souhaitez.
  ga: Liostálfar do ghnóthachtáil faoi "Mo chuid oiliúintí" sa phortlet oiliúna ar
    an deais. As sin is féidir leat do theastas a fheiceáil nó a phriontáil am ar
    bith más mian leat.
  he: ההישג שלך יוצג תחת "ההדרכות שלי" בחלון ההדרכות בלוח המחוונים. משם תוכל תמיד
    לצפות בתעודה שלך או להדפיסה אם תרצה.
  hr: Vaše postignuće bit će navedeno pod "Moje obuke" u portletu za obuku na nadzornoj
    ploči. Odande uvijek možete pregledati ili ispisati svoju potvrdu ako želite.
  hu: Az eredménye a műszerfal képzési portletjének "Képzéseim" menüpontja alatt jelenik
    meg. Onnan bármikor megtekintheti vagy kinyomtathatja a tanúsítványát.
  is: Árangur þinn verður skráður undir "Þjálfanir mínar" í þjálfunarhlutanum á stjórnborðinu.
    Þaðan geturðu alltaf skoðað eða prentað út vottorðið þitt ef þú vilt.
  it: Il tuo risultato sarà elencato sotto "I miei corsi" nel portlet di formazione
    nella dashboard. Da lì puoi sempre visualizzare o stampare il tuo certificato
    se lo desideri.
  lt: Jūsų pasiekimas bus pateiktas skyriuje „Mano mokymai" mokymo portlete prietaisų
    skydelyje. Iš ten visada galėsite peržiūrėti arba atsispausdinti sertifikatą,
    jei norite.
  lv: Jūsu sasniegums tiks uzskaitīts sadaļā "Mani apmācības" apmācību portletā informācijas
    panelī. No turienes jūs vienmēr varat apskatīt vai izdrukāt sertifikātu, ja vēlaties.
  mt: Il-kisba tiegħek se tkun elenkata taħt "It-taħriġ tiegħi" fil-portlet tat-taħriġ
    fuq id-dashboard. Minn hemm tista' dejjem tara jew tistampa ċ-ċertifikat tiegħek
    jekk trid.
  nl: Je prestatie wordt vermeld onder "Mijn trainingen" in het trainingsportlet op
    het dashboard. Van daaruit kun je altijd je certificaat bekijken of afdrukken
    als je dat wilt.
  nl_BE: Uw prestatie wordt vermeld onder “Mijn trainingen” in het trainingsportlet
    op het dashboard. Van daaruit kunt u uw certificaat altijd bekijken of afdrukken
    als u wilt.
  nl_be: Uw prestatie wordt vermeld onder “Mijn trainingen” in het trainingsportlet
    op het dashboard. Van daaruit kunt u uw certificaat altijd bekijken of afdrukken
    als u wilt.
  'no': Din prestasjon vil bli oppført under “Mine opplæringer” i opplæringsportletten
    på dashbordet. Derfra kan du alltid se eller skrive ut sertifikatet ditt hvis
    du ønsker det.
  pl: Twoje osiągnięcie zostanie wymienione w sekcji “Moje szkolenia” w portlecie
    szkoleń na pulpicie nawigacyjnym. Stamtąd zawsze możesz przeglądać lub drukować
    swój certyfikat.
  pt: A sua conquista será listada em “As minhas formações” no portlet de formação
    no painel. A partir daí, pode sempre visualizar ou imprimir o seu certificado.
  ro: Realizarea dvs. va fi listată sub „Cursurile mele" în portletul de formare de
    pe tabloul de bord. De acolo puteți oricând vizualiza sau imprima certificatul,
    dacă doriți.
  ru: Ваше достижение будет указано в разделе «Мои обучения» в портлете обучения на
    панели управления. Оттуда вы всегда можете просмотреть или распечатать свой сертификат.
  sk: Vaše úspechy budú uvedené v časti „Moje školenia" v portlete školení na ovládacom
    paneli. Odtiaľ môžete kedykoľvek zobraziť alebo vytlačiť svoj certifikát.
  sl: Vaša dosežka bo navedena pod „Moja usposabljanja" v portletu za usposabljanje
    na nadzorni plošči. Od tam si lahko kadarkoli ogledate ali natisnete svoje potrdilo.
  sq: Arritja juaj do të listohet nën "Trajnimet e mia" në portletin e trajnimit në
    pult. Nga atje mund të shikoni ose printoni certifikatën tuaj kur të dëshironi.
  sr: Vaše dostignuće će biti navedeno pod „Moje obuke" u portletu za obuku na kontrolnoj
    tabli. Odatle uvek možete pregledati ili odštampati vaš sertifikat ako želite.
  sv: Ditt resultat kommer att listas under “Mina utbildningar” i utbildningsportleten
    på instrumentpanelen. Därifrån kan du alltid visa eller skriva ut ditt certifikat
    om du vill.
  uk: Ваше досягнення буде відображено в розділі “Мої навчання” у портлеті навчання
    на інформаційній панелі. Звідти ви завжди можете переглянути або роздрукувати
    ваш сертифікат.
label_training_answer_questions:
  de: Sie können jetzt ein paar Fragen beantworten, die zeigen, dass Sie das Thema
    beherrschen und das Zertifikat verdient haben.
  en: You can now answer a few questions to prove that you master this topic and earn
    your certificate.
  bg: Вече можете да отговорите на няколко въпроса, за да докажете, че владеете тази
    тема, и да спечелите сертификата си.
  ca: Ara podeu respondre algunes preguntes per demostrar que domineu aquest tema
    i obtenir el vostre certificat.
  cs: Nyní můžete odpovědět na několik otázek, abyste prokázali, že ovládáte toto
    téma, a získali svůj certifikát.
  cy: Gallwch nawr ateb ychydig o gwestiynau i brofi eich bod yn meistroli'r pwnc
    hwn ac ennill eich tystysgrif.
  da: Du kan nu besvare et par spørgsmål for at bevise, at du behersker dette emne
    og tjene dit certifikat.
  el: Μπορείτε τώρα να απαντήσετε σε μερικές ερωτήσεις για να αποδείξετε ότι κατέχετε
    αυτό το θέμα και να αποκτήσετε το πιστοποιητικό σας.
  es: Ahora puede responder algunas preguntas para demostrar que domina este tema
    y obtener su certificado.
  et: Nüüd saate vastata mõnele küsimusele, et tõestada, et valdate seda teemat, ja
    teenida oma sertifikaat.
  fi: Voit nyt vastata muutamaan kysymykseen osoittaaksesi hallitsevasi tämän aiheen
    ja ansaitaksesi sertifikaattisi.
  fr: Vous pouvez maintenant répondre à quelques questions pour prouver que vous maîtrisez
    ce sujet et obtenir votre certificat.
  ga: Is féidir leat cúpla ceist a fhreagairt anois chun a chruthú go bhfuil tú máistriúil
    ar an ábhar seo agus do theastas a thuilleamh.
  he: כעת תוכל לענות על כמה שאלות כדי להוכיח שאתה שולט בנושא זה ולהרוויח את התעודה
    שלך.
  hr: Sada možete odgovoriti na nekoliko pitanja kako biste dokazali da vladate ovom
    temom i zaradili svoju potvrdu.
  hu: Most néhány kérdés megválaszolásával bizonyíthatja, hogy jártas ebben a témában,
    és megszerezheti tanúsítványát.
  is: Þú getur nú svarað nokkrum spurningum til að sanna að þú ráðir yfir þessum efni
    og fengið vottorðið þitt.
  it: Puoi ora rispondere ad alcune domande per dimostrare che padroneggi questo argomento
    e ottenere il tuo certificato.
  lt: Dabar galite atsakyti į keletą klausimų, kad įrodytumėte, jog įvaldėte šią temą
    ir gautumėte sertifikatą.
  lv: Tagad varat atbildēt uz dažiem jautājumiem, lai pierādītu, ka pārzināt šo tēmu
    un iegūtu sertifikātu.
  mt: Issa tista' twieġeb ftit mistoqsijiet biex tipprova li int tajjeb f'dan is-suġġett
    u tikseb iċ-ċertifikat tiegħek.
  nl: Je kunt nu een paar vragen beantwoorden om aan te tonen dat je dit onderwerp
    beheerst en je certificaat te verdienen.
  nl_BE: U kunt nu een paar vragen beantwoorden om aan te tonen dat u dit onderwerp
    beheerst en uw certificaat te verdienen.
  nl_be: U kunt nu een paar vragen beantwoorden om aan te tonen dat u dit onderwerp
    beheerst en uw certificaat te verdienen.
  'no': Du kan nå svare på noen spørsmål for å bevise at du behersker dette emnet
    og tjene sertifikatet ditt.
  pl: Możesz teraz odpowiedzieć na kilka pytań, aby udowodnić, że opanowałeś ten temat
    i zdobyć swój certyfikat.
  pt: Pode agora responder a algumas perguntas para provar que domina este tópico
    e ganhar o seu certificado.
  ro: Puteți răspunde acum la câteva întrebări pentru a dovedi că stăpâniți acest
    subiect și pentru a obține certificatul.
  ru: Теперь вы можете ответить на несколько вопросов, чтобы доказать, что вы освоили
    эту тему, и получить сертификат.
  sk: Teraz môžete odpovedať na niekoľko otázok, aby ste preukázali, že ovládate túto
    tému, a získali certifikát.
  sl: Zdaj lahko odgovorite na nekaj vprašanj, da dokažete, da obvladate to temo,
    in pridobite potrdilo.
  sq: Tani mund të përgjigjeni disa pyetjeve për të provuar se e zotëroni këtë temë
    dhe për të fituar certifikatën tuaj.
  sr: Sada možete odgovoriti na nekoliko pitanja kako biste dokazali da savladate
    ovu temu i zaradili vaš sertifikat.
  sv: Du kan nu svara på några frågor för att bevisa att du behärskar det här ämnet
    och tjäna ditt certifikat.
  uk: Тепер ви можете відповісти на кілька запитань, щоб довести, що ви володієте
    цією темою, та отримати ваш сертифікат.
label_training_congratulations:
  de: Herzlichen Glückwunsch, Sie haben jetzt Ihr Zertifikat für dieses Thema verdient.
  en: Congratulations, you have now earned your certificate for this topic.
  bg: Поздравления, вече сте спечелили сертификата си за тази тема.
  ca: Enhorabona, ja heu obtingut el vostre certificat per a aquest tema.
  cs: Gratulujeme, nyní jste získali certifikát pro toto téma.
  cy: Llongyfarchiadau, rydych chi nawr wedi ennill eich tystysgrif ar gyfer y pwnc
    hwn.
  da: Tillykke, du har nu optjent dit certifikat for dette emne.
  el: Συγχαρητήρια, αποκτήσατε πλέον το πιστοποιητικό σας για αυτό το θέμα.
  es: Enhorabuena, ya ha obtenido su certificado para este tema.
  et: Palju õnne, olete nüüd teeninud selle teema sertifikaadi.
  fi: Onnittelut, olet nyt ansainnut sertifikaattisi tästä aiheesta.
  fr: Félicitations, vous avez maintenant obtenu votre certificat pour ce sujet.
  ga: Comhghairdeas, tá do theastas don ábhar seo tuillte agat anois.
  he: מזל טוב, כעת השגת את התעודה שלך בנושא זה.
  hr: Čestitamo, sada ste zaradili svoju potvrdu za ovu temu.
  hu: Gratulálunk, most megszerezte a tanúsítványát ehhez a témához.
  is: Til hamingju, þú hefur nú fengið vottorðið þitt fyrir þetta efni.
  it: Congratulazioni, hai ora ottenuto il tuo certificato per questo argomento.
  lt: Sveikiname, dabar gavote sertifikatą šia tema.
  lv: Apsveicam, jūs tagad esat ieguvis sertifikātu par šo tēmu.
  mt: Prosit, issa kisbt iċ-ċertifikat tiegħek għal dan is-suġġett.
  nl: Gefeliciteerd, je hebt nu je certificaat voor dit onderwerp verdiend.
  nl_BE: Gefeliciteerd, u hebt nu uw certificaat voor dit onderwerp verdiend.
  nl_be: Gefeliciteerd, u hebt nu uw certificaat voor dit onderwerp verdiend.
  'no': Gratulerer, du har nå opptjent sertifikatet ditt for dette emnet.
  pl: Gratulacje, zdobyłeś teraz swój certyfikat dla tego tematu.
  pt: Parabéns, ganhou agora o seu certificado para este tópico.
  ro: Felicitări, ați obținut acum certificatul pentru acest subiect.
  ru: Поздравляем, вы теперь получили сертификат по этой теме.
  sk: Gratulujeme, teraz ste získali certifikát pre túto tému.
  sl: Čestitamo, zdaj ste pridobili potrdilo za to temo.
  sq: Urime, tani keni fituar certifikatën tuaj për këtë temë.
  sr: Čestitamo, sada ste zaradili vaš sertifikat za ovu temu.
  sv: Grattis, du har nu tjänat ditt certifikat för det här ämnet.
  uk: Вітаємо, ви тепер отримали ваш сертифікат з цієї теми.
