placeholder_comment:
  bg: Моля, оставете коментарите, които може да имате по горния въпрос, в това поле.
    Тези коментари ще бъдат използвани в плана за действие.
  ca: "Si us plau, deixeu en aquest camp qualsevol comentari que pugueu tenir sobre\
    \ la pregunta de dalt. Aquests comentaris seran utilitzats en el pla d\x92'acció."
  cs: Poznámky budou k dispozici při zpracování akčního plánu.
  de: Bitte hinterlassen Sie mögliche Kommentare, die Sie zu der genannten Gefährdung
    haben. Diese Kommentare werden auch im Aktionsplan und den Berichten angezeigt.
  el: Παρακαλώ υποβάλλετε στο πεδίο αυτό τυχόν σχόλια σχετικά με την παραπάνω ερώτηση.
    Τα σχόλια αυτά θα χρησιμοποιηθούν στο Σχέδιο Δράσης.
  en: These notes will be visible in the report and the training. Use it for anything
    else you might want to write about this risk.
  es: Por favor, deje cualquier comentario que tenga sobre la pregunta anterior en
    este campo. Los comentarios se usarán en el plan de acción.
  fi: Tähän voit lisätä tietoja tai kommentteja yllä olevaan liittyen. Ne näkyvät
    myös toimintasuunnitelmassa.
  fr: Vous pouvez écrire ici tout commentaire se rapportant à cette question. Vous
    retrouverez ce commentaire dans le plan d'action.
  hr: Ovdje možete ostaviti komentar na postavljeno pitanje. Komentar će se koristiti
    u planu mjera.
  hu: Ha megjegyzéseket szeretne hozzáfűzni a fenti kérdéshez, azt ebben a mezőben
    megteheti. Ezeket a megjegyzéseket a cselekvési tervben felhasználjuk.
  is: Settu athugasemdir um spurninguna í þennan reit. Þessar athugasemdir verða notaðar
    í aðgerðaáætluninni.
  it: Inserire eventuali commenti e informazioni aggiuntive (ad esempio gli eventuali
    strumenti di supporto utilizzati per la valutazione). Le informazioni riportate
    in questo campo verranno visualizzate nel Report.
  lt: Šiame laukelyje galite įrašyti norimą komentarą. Šie komentarai bus panaudoti
    prevencinių veiksmų plane.
  lv: Šajā laukā lūdzu norādīt papildus komentārus par augstāk minēto jautājumu. Šie
    komentāri tiks izmantoti pasākumu plānā.
  mt: Tista' tħalli xi kummenti dwar il-mistoqsija t'hawn fuq f'dan il-qasam. Dawn
    il-kummenti jintużaw fil-pjan ta' azzjoni.
  nl: Vul hier eventuele opmerkingen in die moeten worden meegenomen in het rapport
    en de training.
  nl_BE: Gelieve hier al uw opmerkingen met betrekking tot de bovenstaande vraag te
    noteren. Deze opmerkingen zullen gebruikt worden in het actieplan en de training.
  'no': Disse notatene vil være synlige i rapporten og opplæringen. Bruk dem til alt
    annet du måtte ønske å skrive om denne risikoen.
  pt: Queira por favor comentar a questão acima indicada. Estes comentários serão
    considerados no plano de ação.
  sk: V tomto poli uveďte akékoľvek komentáre k vyššie uvedenej otázke. Tieto komentáre
    budú použité v akčnom pláne.
  sl: V to polje vnesite vse morebitne opombe glede zgoraj navedenega, identificiranega
    tveganja. Te opombe bodo upoštevane v akcijskem načrtu.
  nl_be: Deze notities zijn zichtbaar in het rapport en de opleiding. Gebruik ze voor
    alles wat u nog wilt schrijven over dit risico.
  pl: Te notatki będą widoczne w raporcie i szkoleniu. Używaj ich do wszystkiego,
    co chcesz napisać na temat tego ryzyka.
  ro: Aceste note vor fi vizibile în raport și în formare. Folosiți-le pentru orice
    altceva doriți să scrieți despre acest risc.
  ru: Эти заметки будут видны в отчёте и обучении. Используйте их для всего остального,
    что вы хотите написать об этом риске.
  sq: Këto shënime do të jenë të dukshme në raport dhe trajnim. Përdoreni për çdo
    gjë tjetër që mund të dëshironi të shkruani për këtë rrezik.
  sr: Ove napomene će biti vidljive u izveštaju i obuci. Koristite ih za sve ostalo
    što biste mogli da napišete o ovom riziku.
  sv: Dessa anteckningar kommer att vara synliga i rapporten och utbildningen. Använd
    det för allt annat du kanske vill skriva om denna risk.
  uk: Ці нотатки будуть видимі у звіті та навчанні. Використовуйте їх для будь-чого
    іншого, що ви хочете написати про цей ризик.
  cy: Bydd y nodiadau hyn yn weladwy yn yr adroddiad a'r hyfforddiant. Defnyddiwch
    ef ar gyfer unrhyw beth arall yr hoffech ei ysgrifennu am y risg hon.
  da: Disse noter vil være synlige i rapporten og uddannelsen. Brug det til alt andet,
    du måske vil skrive om denne risiko.
  et: Need märkused on aruandes ja koolitusel nähtavad. Kasutage seda kõige muu jaoks,
    mida soovite selle riski kohta kirjutada.
  ga: Beidh na nótaí seo le feiceáil sa tuarascáil agus sa traenáil. Úsáid é d'aon
    rud eile ar mhaith leat a scríobh faoin riosca seo.
  he: הערות אלה יהיו גלויות בדוח ובהדרכה. השתמשו בו לכל דבר אחר שתרצו לכתוב על סיכון
    זה.
