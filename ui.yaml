message_waiting_for_confimation:
  de: These risk assessments are waiting for a confirmation that the contractor has
    received the briefing documents.
  en: These risk assessments are waiting for a confirmation that the contractor has
    received the briefing documents.
  bg: Тези оценки на риска чакат потвърждение, че изпълнителят е получил инструктажните
    документи.
  ca: Aquestes avaluacions de riscos esperen una confirmació que el contractista ha
    rebut els documents d'informació.
  cs: Tato hodnocení rizik čekají na potvrzení, že dodavatel obdržel informační dokumenty.
  cy: Mae'r asesiadau risg hyn yn aros am gadarnhad bod y contractwr wedi derbyn y
    dogfennau briffio.
  da: Disse risikovurderinger afventer en bekræftelse på, at entreprenøren har modtaget
    briefingdokumenterne.
  el: Αυτές οι εκτιμήσεις κινδύνου αναμένουν επιβεβαίωση ότι ο εργολάβος έχει παραλάβει
    τα έγγραφα ενημέρωσης.
  es: Estas evaluaciones de riesgos están esperando una confirmación de que el contratista
    ha recibido los documentos informativos.
  et: Need riskihinnangud ootavad kinnitust, et töövõtja on briifingudokumendid kätte
    saanud.
  fi: Nämä riskiarvioinnit odottavat vahvistusta siitä, että urakoitsija on vastaanottanut
    tiedotusasiakirjat.
  fr: Ces évaluations des risques attendent une confirmation que le sous-traitant
    a bien reçu les documents d'information.
  ga: Tá na measúnuithe riosca seo ag fanacht le deimhniú go bhfuair an conraitheoir
    na cáipéisí brífinge.
  he: הערכות סיכון אלה ממתינות לאישור שהקבלן קיבל את מסמכי הבריפינג.
  hr: Ove procjene rizika čekaju potvrdu da je izvođač primio dokumente za informiranje.
  hu: Ezek a kockázatbecslések arra várnak, hogy megerősítsék, hogy a vállalkozó megkapta
    a tájékoztató dokumentumokat.
  is: Þessar áhættumat bíða eftir staðfestingu þess að verktakinn hafi móttekið kynningargögnin.
  it: Queste valutazioni del rischio sono in attesa di una conferma che l'appaltatore
    abbia ricevuto i documenti di briefing.
  lt: Šie rizikos vertinimai laukia patvirtinimo, kad rangovas gavo instruktavimo
    dokumentus.
  lv: Šie riska novērtējumi gaida apstiprinājumu, ka darbuzņēmējs ir saņēmis instruktāžas
    dokumentus.
  mt: Dawn il-valutazzjonijiet tar-riskju qed jistennew konferma li l-kuntrattur irċieva
    d-dokumenti tal-briefing.
  nl: Deze risicobeoordelingen wachten op een bevestiging dat de aannemer de briefingdocumenten
    heeft ontvangen.
  nl_BE: Deze risicobeoordelingen wachten op een bevestiging dat de aannemer de briefingdocumenten
    heeft ontvangen.
  nl_be: Deze risicobeoordelingen wachten op een bevestiging dat de aannemer de briefingdocumenten
    heeft ontvangen.
  'no': Disse risikovurderingene venter på en bekreftelse på at entrepr\u00enøren
    har mottatt briefingdokumentene.
  pl: Te oceny ryzyka oczekują na potwierdzenie, że wykonawca otrzymał dokumenty briefingowe.
  pt: Estas avaliações de risco aguardam confirmação de que o empreiteiro recebeu
    os documentos de briefing.
  ro: Aceste evaluări de risc așteaptă o confirmare că contractantul a primit documentele
    de informare.
  ru: Эти оценки рисков ожидают подтверждения того, что подрядчик получил инструктажные
    документы.
  sk: Tieto hodnotenia rizík čakajú na potvrdenie, že zhotoviteľ dostal informačné
    dokumenty.
  sl: Te ocene tveganj čakajo na potrditev, da je izvajalec prejel informativna gradiva.
  sq: Këto vlerësime rreziku presin konfirmimin se kontraktori ka marrë dokumentet
    e informimit.
  sr: Ove procene rizika čekaju potvrdu da je izvođač primio dokumente za brifing.
  sv: Dessa riskbedömningar väntar på en bekräftelse att entreprenören har tagit emot
