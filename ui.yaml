  sk: Odoslať žiadosť o overenie
  sl: Pošlji zahtevo za potrditev
  sq: Dërgo kërkesën për validim
  sr: Pošalji zahtev za validaciju
  sv: Skicka valideringsbegäran
  uk: Надіслати запит на затвердження
message_find_consultants:
  en: It is possible to request assistance in completing a risk assessment or to have
    a risk analysis performed by you and validated by an OSH consultant. An OSH consultant
    can give your risk assessment an offical validation mark. A validation can only
    be requested by users with the permission level ‘Manage’ or higher.
  nl: Het is mogelijk om hulp in te roepen bij het invullen van een risicoanalyse
    of een door u uitgevoerde risicoanalyse te laten valideren door een OSH-adviseur.
    Een OSH-adviseur kan uw risicobeoordeling een officieel als gevalideerd markeren.
    Een validatie kan alleen aangevraagd worden door gebruikers met het permissieniveau
    ‘Beheer’ of hoger.
  de: Es besteht die Möglichkeit, Unterstützung bei der Durchführung einer Risikobewertung
    anzufordern oder eine Risikoanalyse von Ihnen durchführen und von einem Arbeitsschutzberater
    validieren zu lassen. Ein Arbeitsschutzberater kann Ihrer Risikobewertung ein
    offizielles Validierungszeichen geben. Eine Validierung kann nur von Benutzern
    mit der Berechtigungsstufe „Verwalten“ oder höher beantragt werden.
  fr: Il est possible de demander de l'aide pour réaliser une analyse de risque ou
    de faire valider une analyse de risque que vous avez réalisée par un consultant
    SST. Un consultant en SST peut donner à votre évaluation des risques une marque
    de validation officielle. Une validation ne peut être demandée que par les utilisateurs
    disposant du niveau d'autorisation ‘Gestion’ ou supérieur.
  bg: Възможно е да се поиска помощ при попълването на оценка на риска или да се извърши
    анализ на риска от вас и да се валидира от консултант по БЗТ. Консултантът по
    БЗТ може да даде на вашата оценка на риска официален знак за валидиране. Валидирането
    може да бъде поискано само от потребители с ниво на разрешение „Управление" или
    по-високо.
  ca: És possible sol·licitar assistència per completar una avaluació de riscos o
    que una anàlisi de riscos sigui realitzada per vosaltres i validada per un consultor
    de SST. Un consultor de SST pot donar a la vostra avaluació de riscos un segell
    oficial de validació. La validació només la poden sol·licitar els usuaris amb
    el nivell de permís 'Gestionar' o superior.
  cs: Je možné požádat o pomoc při vyplňování hodnocení rizik nebo nechat analýzu
    rizik provést vámi a ověřit konzultantem BOZP. Konzultant BOZP může vaší hodnocení
    rizik udělit oficiální ověřovací značku. Ověření může požádat pouze uživatelé
    s úrovní oprávnění 'Spravovat' nebo vyšší.
  cy: Mae'n bosibl gofyn am gymorth i gwblhau asesiad risg neu gael dadansoddiad risg
    wedi'i berfformio gennych chi a'i ddilysu gan ymgynghorydd Iechyd a Diogelwch
    Galwedigaethol. Gall ymgynghorydd IDG roi nod dilysu swyddogol i'ch asesiad risg.
    Dim ond defnyddwyr â lefel caniatâd 'Rheoli' neu uwch all ofyn am ddilysu.
  da: Det er muligt at anmode om assistance til at udfylde en risikovurdering eller
    at få en risikoanalyse udført af dig og valideret af en arbejdsmiljøkonsulent.
    En arbejdsmiljøkonsulent kan give din risikovurdering et officielt valideringsmærke.
    En validering kan kun anmodes af brugere med tilladelsesniveauet 'Administrer'
    eller højere.
  el: Είναι δυνατόν να ζητήσετε βοήθεια για τη συμπλήρωση μιας εκτίμησης κινδύνου
    ή να πραγματοποιηθεί ανάλυση κινδύνου από εσάς και να επικυρωθεί από έναν σύμβουλο
    ΕΑΥ. Ένας σύμβουλος ΕΑΥ μπορεί να δώσει στην εκτίμηση κινδύνου σας επίσημη σφραγίδα
    επικύρωσης. Η επικύρωση μπορεί να ζητηθεί μόνο από χρήστες με επίπεδο δικαιωμάτων
    'Διαχείριση' ή υψηλότερο.
  es: Es posible solicitar asistencia para completar una evaluación de riesgos o que
    un consultor de SST realice un análisis de riesgos y lo valide. Un consultor de
    SST puede otorgar a su evaluación de riesgos un sello oficial de validación. Solo
    los usuarios con nivel de permiso 'Gestionar' o superior pueden solicitar una
    validación.
  et: On võimalik taotleda abi riskihinnangu koostamisel või lasta riskianalüüs teie
    poolt teha ja OHS-i konsultandil kinnitada. OHS-i konsultant saab anda teie riskihinnangule
    ametliku kinnituse märgi. Kinnitust saavad taotleda ainult kasutajad, kellel on
    õigustase 'Haldamine' või kõrgem.
  fi: On mahdollista pyytää apua riskiarvioinnin tekemiseen tai suorittaa riskianalyysi
    itse ja pyytää OHS-konsulttia vahvistamaan se. OHS-konsultti voi antaa riskiarvioinnillesi
    virallisen vahvistusleiman. Vahvistusta voivat pyytää vain käyttäjät, joilla on
    käyttöoikeustaso 'Hallinta' tai korkeampi.
  ga: Is féidir cúnamh a iarraidh chun measúnú riosca a chomhlánú nó anailís riosca
    a dhéanamh agat féin agus a bhailíochtú ag comhairleoir SSO. Is féidir le comhairleoir
    SSO marc bailíochtaithe oifigiúil a thabhairt do do mheasúnú riosca. Ní féidir
    bailíochtú a iarraidh ach ag úsáideoirí le leibhéal ceada 'Bainistigh' nó níos
    airde.
  he: ניתן לבקש סיוע במילוי הערכת סיכונים או לבקש שניתוח סיכונים יבוצע על ידך ויאושר
    על ידי יועץ בטיחות ובריאות תעסוקתית. יועץ בטיחות ובריאות תעסוקתית יכול להעניק
    לך אישור רשמי להערכת הסיכונים שלך. אימות יכול להתבקש רק על ידי משתמשים עם רמת
    הרשאה 'ניהול' ומעלה.
  hr: Moguće je zatražiti pomoć u popunjavanju procjene rizika ili zahtijevati da
    analizu rizika izvrši netko za vas i potvrdi je savjetnik za zaštitu na radu.
    Savjetnik za zaštitu na radu može vašoj procjeni rizika dodijeliti službeni pečat
    validacije. Validaciju mogu zatražiti samo korisnici s razinom dozvole 'Upravljanje'
    ili višom.
  hu: Lehetséges segítséget kérni a kockázatértékelés elvégzéséhez, vagy kockázatelemzést
    végeztetni, amelyet egy munkahelyi egészségvédelmi és biztonsági (OHS) tanácsadó
    érvényesít. Egy OHS tanácsadó hivatalos érvényesítési jelölést adhat a kockázatértékelésnek.
    Az érvényesítést csak 'Kezelés' vagy magasabb jogosultsági szintű felhasználók
    kérhetik.
  is: Hægt er að óska eftir aðstoð við að fylla út áhættumat eða að láta framkvæma
    áhættugreiningu sem staðfest er af vinnuverndarráðgjafa. Vinnuverndarráðgjafi
    getur gefið áhættumatinu þínu opinbera staðfestingarmerki. Aðeins notendur með
    heimildarstigi 'Stjórna' eða hærra geta óskað eftir staðfestingu.
  it: È possibile richiedere assistenza nel completamento di una valutazione dei rischi
    o richiedere che un'analisi dei rischi venga eseguita e convalidata da un consulente
    OSH. Un consulente OSH può fornire alla valutazione dei rischi un marchio ufficiale
    di convalida. La convalida può essere richiesta solo dagli utenti con livello
    di autorizzazione 'Gestisci' o superiore.
  'no': Det er mulig å be om hjelp til å fullføre en risikovurdering eller å få en
    risikoanalyse utført av deg og validert av en HMS-konsulent. En HMS-konsulent
    kan gi risikovurderingen din et offisielt valideringsmerke. En validering kan
    kun anmodes av brukere med tillatelsesnivå 'Administrer' eller høyere.
  pl: Możliwe jest złożenie prośby o pomoc w wypełnieniu oceny ryzyka lub zlecenie
    przeprowadzenia analizy ryzyka przez użytkownika i zwalidowania jej przez konsultanta
    BHP. Konsultant BHP może nadać ocenie ryzyka oficjalną pieczęć walidacji. Walidację
    mogą wnioskować tylko użytkownicy z poziomem uprawnień „Zarządzaj" lub wyższym.
  pt: É possível solicitar assistência no preenchimento de uma avaliação de riscos
    ou ter uma análise de riscos realizada por si e validada por um consultor de SST.
    Um consultor de SST pode atribuir à sua avaliação de riscos uma marca de validação
    oficial. Uma validação só pode ser solicitada por utilizadores com nível de permissão
    'Gerir' ou superior.
  ro: Este posibil să solicitați asistență pentru completarea unei evaluări a riscurilor
    sau să aveți o analiză a riscurilor efectuată de dvs. și validată de un consultant
    SSM. Un consultant SSM poate acorda evaluării dvs. a riscurilor o marcă oficială
    de validare. O validare poate fi solicitată doar de utilizatorii cu nivelul de
    permisiune „Gestionare" sau superior.
  ru: Можно запросить помощь в заполнении оценки рисков или попросить провести анализ
    рисков, выполненный вами и подтверждённый консультантом по охране труда. Консультант
    по охране труда может присвоить вашей оценке рисков официальный знак подтверждения.
    Подтверждение может быть запрошено только пользователями с уровнем разрешений
    «Управление» или выше.
  sk: Je možné požiadať o pomoc pri vypracovaní hodnotenia rizika alebo nechať vykonať
    analýzu rizika a overiť ju poradcom BOZP. Poradca BOZP môže vášmu hodnoteniu rizika
    udeliť oficiálnu overovací pečiatku. Overenie môžu požadovať iba používatelia
    s úrovňou oprávnenia „Správa" alebo vyššou.
  sl: Mogoče je zaprositi za pomoč pri izpolnjevanju ocene tveganja ali pa imeti analizo
    tveganja, ki jo potrdi svetovalec za varnost in zdravje pri delu (VZD). Svetovalec
    VZD lahko vaši oceni tveganja podeli uradno potrditev. Potrditev lahko zahtevajo
    le uporabniki z ravnjo dovoljenja 'Upravljanje' ali višjo.
  sq: Është e mundur të kërkohet ndihmë për plotësimin e një vlerësimi të riskut ose
    të kryhet një analizë risku nga ju dhe të vërtetohet nga një konsulent i sigurisë
    dhe shëndetit në punë (SSHP). Një konsulent SSHP mund t'i japë vlerësimit tuaj
    të riskut një shenjë zyrtare vërtetimi. Vërtetimi mund të kërkohet vetëm nga përdoruesit
    me nivelin e lejes 'Menaxho' ose më të lartë.
  sr: Moguće je zatražiti pomoć u ispunjavanju procene rizika ili da analizu rizika
    potvrdi konsultant za bezbednost i zdravlje na radu (BZR). BZR konsultant može
    dati vašoj proceni rizika zvanični pečat potvrde. Potvrdu mogu tražiti samo korisnici
    sa nivoom dozvola 'Upravljanje' ili višim.
  sv: Det är möjligt att begära hjälp med att genomföra en riskbedömning eller att
    låta en riskanalys utföras och valideras av en arbetsmiljökonsult. En arbetsmiljökonsult
    kan ge din riskbedömning en officiell valideringsstämpel. En validering kan endast
    begäras av användare med behörighetsnivån 'Hantera' eller högre.
  uk: Можливо запросити допомогу у заповненні оцінки ризиків або провести аналіз ризиків,
    який буде виконано вами та підтверджено консультантом з охорони праці. Консультант
    з охорони праці може надати вашій оцінці ризиків офіційну позначку підтвердження.
    Підтвердження може бути запитано лише користувачами з рівнем дозволу 'Управляти'
    або вищим.
  lt: Galima prašyti pagalbos atliekant rizikos vertinimą arba kad rizikos analizę
    atliktumėte jūs ir ją patvirtintų DSS konsultantas. DSS konsultantas gali suteikti
    jūsų rizikos vertinimui oficialų patvirtinimo ženklą. Patvirtinimo gali prašyti
    tik vartotojai, turintys „Valdyti" ar aukštesnio lygio teises.
  lv: Ir iespējams lūgt palīdzību riska novērtējuma aizpildīšanā vai likt veikt riska
    analīzi, ko validē DSV konsultants. DSV konsultants var piešķirt jūsu riska novērtējumam
    oficiālu validācijas zīmi. Validāciju var pieprasīt tikai lietotāji ar tiesību
    līmeni „Pārvaldīt" vai augstāku.
  mt: Huwa possibbli li titlob assistenza biex tlesti valutazzjoni tar-riskju jew
    biex tagħmel analiżi tar-riskju u tiġi vvalidata minn konsulent OSH. Konsulent
    OSH jista' jagħti lill-valutazzjoni tar-riskju tiegħek timbru ta' validazzjoni
    uffiċjali. Validazzjoni tista' tintalab biss minn utenti bil-livell ta' permess
    'Immaniġġja' jew ogħla.
  nl_BE: Het is mogelijk om hulp te vragen bij het invullen van een risicobeoordeling
    of om een risicoanalyse te laten uitvoeren en te laten valideren door een preventieadviseur.
    Een preventieadviseur kan uw risicobeoordeling een officieel validatiestempel
    geven. Een validatie kan alleen worden aangevraagd door gebruikers met het machtigingsniveau
    'Beheren' of hoger.
  nl_be: Het is mogelijk om hulp te vragen bij het invullen van een risicobeoordeling
    of om een risicoanalyse te laten uitvoeren en te laten valideren door een preventieadviseur.
    Een preventieadviseur kan uw risicobeoordeling een officieel validatiestempel
    geven. Een validatie kan alleen worden aangevraagd door gebruikers met het machtigingsniveau
    'Beheren' of hoger.
