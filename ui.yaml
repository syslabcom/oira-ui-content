  ro: Utilizați un browser web învechit. Ca urmare, este posibil ca site-ul să nu
    funcționeze conform așteptărilor. Vă rugăm să instalați un browser mai nou pentru
    a utiliza acest site în mod optim.
  ru: Вы используете устаревший веб-браузер. В результате сайт может работать не так,
    как ожидается. Пожалуйста, установите более новый браузер для оптимального использования
    этого сайта.
  sk: Používate zastaraný webový prehliadač. V dôsledku toho stránka nemusí fungovať
    podľa očakávania. Nainštalujte si novší prehliadač, aby ste mohli tento web využívať
    optimálne.
  sl: Uporabljate zastarel spletni brskalnik. Posledično spletno mesto morda ne bo
    delovalo, kot je pričakovano. Prosimo, namestite novejši brskalnik za optimalno
    uporabo tega spletnega mesta.
  sq: Jeni duke përdorur një shfletues interneti të vjetëruar. Si rezultat, faqja
    mund të mos funksionojë siç pritet. Ju lutemi instaloni një shfletues më të ri
    për të përdorur këtë faqe në mënyrë optimale.
  sr: Koristite zastareli web pregledač. Kao rezultat toga, sajt možda neće funkcionisati
    kao što se očekuje. Molimo instalirajte noviji pregledač kako biste na optimalan
    način koristili ovaj sajt.
  sv: Du använder en föråldrad webbläsare. Som ett resultat kanske webbplatsen inte
    fungerar som förväntat. Installera en nyare webbläsare för att använda den här
    webbplatsen på bästa sätt.
  uk: Ви використовуєте застарілий веб-браузер. Як наслідок, сайт може працювати не
    так, як очікується. Будь ласка, встановіть новіший браузер, щоб оптимально користуватися
    цим сайтом.
message_password_requirements:
  de: Das Passwort muss mindestens 12 Zeichen lang sein und mindestens einen Kleinbuchstaben,
    einen Großbuchstaben und eine Ziffer enthalten.
  en: The password needs to be at least 12 characters long and needs to contain at
    least one lower case letter, one upper case letter and one digit.
  nl: Het wachtwoord moet minimaal 12 tekens lang zijn en moet minimaal één kleine
    letter, één hoofdletter en één cijfer bevatten.
  bg: Паролата трябва да е поне 12 знака и да съдържа поне една малка буква, една
    главна буква и една цифра.
  ca: La contrasenya ha de tenir almenys 12 caràcters i ha de contenir almenys una
    lletra minúscula, una lletra majúscula i un dígit.
  cs: Heslo musí mít alespoň 12 znaků a musí obsahovat alespoň jedno malé písmeno,
    jedno velké písmeno a jednu číslici.
  cy: Mae angen i'r cyfrinair fod o leiaf 12 nod o hyd ac mae angen iddo gynnwys o
    leiaf un llythyren fach, un llythyren fawr ac un digid.
  da: Adgangskoden skal være mindst 12 tegn lang og skal indeholde mindst ét lille
    bogstav, ét stort bogstav og ét ciffer.
  el: Ο κωδικός πρόσβασης πρέπει να έχει τουλάχιστον 12 χαρακτήρες και να περιέχει
    τουλάχιστον ένα πεζό γράμμα, ένα κεφαλαίο γράμμα και έναν αριθμό.
  es: La contraseña debe tener al menos 12 caracteres y debe contener al menos una
    letra minúscula, una letra mayúscula y un dígito.
  et: Parool peab olema vähemalt 12 tähemärki pikk ja sisaldama vähemalt ühte väiketähte,
    ühte suurtähte ja ühte numbrit.
  fi: Salasanan on oltava vähintään 12 merkkiä pitkä ja sen on sisällettävä vähintään
    yksi pienaakkonen, yksi suuraakkonen ja yksi numero.
  fr: Le mot de passe doit comporter au moins 12 caractères et contenir au moins une
    lettre minuscule, une lettre majuscule et un chiffre.
  ga: Ní mór don phasfhocal a bheith ar a laghad 12 carachtar ar fhad agus ní mór
    dó litir bheag amháin, litir mhór amháin agus uimhir amháin ar a laghad a bheith
    ann.
  he: הסיסמה חייבת להכיל לפחות 12 תווים ולכלול לפחות אות קטנה אחת, אות גדולה אחת וספרה
    אחת.
  hr: Lozinka mora imati najmanje 12 znakova i mora sadržavati najmanje jedno malo
    slovo, jedno veliko slovo i jednu znamenku.
  hu: A jelszónak legalább 12 karakter hosszúnak kell lennie, és tartalmaznia kell
    legalább egy kisbetűt, egy nagybetűt és egy számjegyet.
  is: Lykilorðið þarf að vera að minnsta kosti 12 stafir að lengd og þarf að innihalda
    að minnsta kosti einn lágstaf, einn hástaf og eina tölu.
  it: La password deve essere lunga almeno 12 caratteri e deve contenere almeno una
    lettera minuscola, una lettera maiuscola e una cifra.
  lt: Slaptažodis turi būti bent 12 simbolių ilgio ir turi turėti bent vieną mažąją
    raidę, vieną didžiąją raidę ir vieną skaitmenį.
  lv: Parolei jābūt vismaz 12 rakstzīmes garai un tai jāsatur vismaz viens mazais
    burts, viens lielais burts un viens cipars.
  mt: Il-password trid tkun tal-inqas 12-il karattru twila u trid tinkludi tal-inqas
    ittra żgħira waħda, ittra kbira waħda u ċifra waħda.
  nl_BE: Het wachtwoord moet minstens 12 tekens lang zijn en moet minstens één kleine
    letter, één hoofdletter en één cijfer bevatten.
  nl_be: Het wachtwoord moet minstens 12 tekens lang zijn en moet minstens één kleine
    letter, één hoofdletter en één cijfer bevatten.
  'no': Passordet må være minst 12 tegn langt og må inneholde minst én liten bokstav,
    én stor bokstav og ett siffer.
  pl: Hasło musi mieć co najmniej 12 znaków i zawierać co najmniej jedną małą literę,
    jedną wielką literę i jedną cyfrę.
  pt: A palavra-passe deve ter pelo menos 12 caracteres e deve conter pelo menos uma
    letra minúscula, uma letra maiúscula e um dígito.
  ro: Parola trebuie să aibă cel puțin 12 caractere și să conțină cel puțin o literă
    mică, o literă mare și o cifră.
  ru: Пароль должен содержать не менее 12 символов и включать хотя бы одну строчную
    букву, одну заглавную букву и одну цифру.
  sk: Heslo musí mať aspoň 12 znakov a musí obsahovať aspoň jedno malé písmeno, jedno
    veľké písmeno a jednu číslicu.
  sl: Geslo mora imeti vsaj 12 znakov in mora vsebovati vsaj eno malo črko, eno veliko
    črko in eno številko.
  sq: Fjalëkalimi duhet të jetë të paktën 12 karaktere i gjatë dhe duhet të përmbajë
    të paktën një shkronjë të vogël, një shkronjë të madhe dhe një shifër.
  sr: Lozinka mora imati najmanje 12 karaktera i mora sadržati najmanje jedno malo
    slovo, jedno veliko slovo i jednu cifru.
  sv: Lösenordet måste vara minst 12 tecken långt och måste innehålla minst en gemen
    bokstav, en versal bokstav och en siffra.
  uk: Пароль має містити щонайменше 12 символів і включати принаймні одну малу літеру,
    одну велику літеру та одну цифру.
message_register_onsite_inspection:
  de: Einsatzbezogenen Gefährdungsbeurteilung für diese GBU eintragen.
  en: Register an on-site inspection for this risk assessment.
  bg: Регистрирайте проверка на място за тази оценка на риска.
  ca: Registreu una inspecció in situ per a aquesta avaluació de riscos.
  cs: Zaregistrujte kontrolu na místě pro toto hodnocení rizik.
  cy: Cofrestrwch archwiliad ar y safle ar gyfer yr asesiad risg hwn.
  da: Registrer en inspektion på stedet for denne risikovurdering.
  el: Καταχωρίστε μια επιτόπια επιθεώρηση για αυτή την εκτίμηση κινδύνου.
  es: Registre una inspección in situ para esta evaluación de riesgos.
  et: Registreerige selle riskihinnangu kohapealne ülevaatus.
  fi: Rekisteröi tämän riskiarvioinnin paikan päällä tehtävä tarkastus.
  fr: Enregistrez une inspection sur site pour cette évaluation des risques.
  ga: Cláraigh cigireacht ar láthair don mheasúnú riosca seo.
  he: רשום בדיקה באתר עבור הערכת סיכון זו.
  hr: Registrirajte inspekciju na licu mjesta za ovu procjenu rizika.
  hu: Helyszíni ellenőrzés rögzítése ehhez a kockázatbecsléshez.
  is: Skráðu vettvangsskoðun fyrir þessa áhættumat.
  it: Registra un'ispezione in loco per questa valutazione del rischio.
  lt: Užregistruokite patikrinimą vietoje šiam rizikos vertinimui.
  lv: Reģistrēt klātienes pārbaudi šim riska novērtējumam.
  mt: Irreġistra spezzjoni fuq il-post għal din il-valutazzjoni tar-riskju.
  nl: Registreer een plaatselijke inspectie voor deze risicobeoordeling.
  nl_BE: Een plaatselijke inspectie registreren voor deze risicobeoordeling.
  nl_be: Een plaatselijke inspectie registreren voor deze risicobeoordeling.
  'no': Registrer en stedlig inspeksjon for denne risikovurderingen.
  pl: Zarejestruj inspekcję na miejscu dla tej oceny ryzyka.
  pt: Registar uma inspeção no local para esta avaliação de risco.
  ro: Înregistrați o inspecție la fața locului pentru această evaluare de risc.
  ru: Зарегистрировать проверку на месте для этой оценки рисков.
  sk: Zaregistrovať kontrolu na mieste pre toto hodnotenie rizík.
  sl: Registrirajte inšpekcijo na kraju samem za to oceno tveganja.
  sq: Regjistroni një inspektim në vend për këtë vlerësim rreziku.
  sr: Registrujte inspekciju na licu mesta za ovu procenu rizika.
  sv: Registrera en platskontroll för den här riskbedömningen.
  uk: Зареєструйте перевірку на місці для цієї оцінки ризику.
message_register_sample:
  de: Stichprobe für diese GBU eintragen
