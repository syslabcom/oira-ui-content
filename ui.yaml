message_permission_level_full:
  en: User view and edit all content and add or remove users to or from the organiation.
  bg: Потребителят преглежда и редактира цялото съдържание и добавя или премахва потребители
    от организацията.
  ca: L'usuari visualitza i edita tot el contingut i afegeix o elimina usuaris de
    l'organització.
  cs: Uživatel prohlíží a upravuje veškerý obsah a přidává nebo odebírá uživatele
    z organizace.
  cy: Mae'r defnyddiwr yn gweld ac yn golygu pob cynnwys ac yn ychwanegu neu'n tynnu
    defnyddwyr i'r sefydliad neu ohono.
  da: Brugeren ser og redigerer alt indhold og tilføjer eller fjerner brugere til
    eller fra organisationen.
  de: Der Benutzer kann alle Inhalte anzeigen und bearbeiten sowie Benutzer zur Organisation
    hinzufügen oder daraus entfernen.
  el: Ο χρήστης μπορεί να προβάλλει και να επεξεργάζεται όλο το περιεχόμενο και να
    προσθέτει ή να αφαιρεί χρήστες από τον οργανισμό.
  es: El usuario puede ver y editar todo el contenido y agregar o eliminar usuarios
    de la organización.
  et: Kasutaja saab vaadata ja muuta kõiki sisu ning lisada või eemaldada kasutajaid
    organisatsioonist.
  fi: Käyttäjä voi tarkastella ja muokata kaikkea sisältöä sekä lisätä tai poistaa
    käyttäjiä organisaatiosta.
  fr: L'utilisateur peut consulter et modifier tout le contenu et ajouter ou supprimer
    des utilisateurs de l'organisation.
  ga: Féadfaidh an t-úsáideoir gach ábhar a fheiceáil agus a chur in eagar agus úsáideoirí
    a chur leis an eagraíocht nó a bhaint di.
  he: המשתמש יכול לצפות ולערוך את כל התוכן ולהוסיף או להסיר משתמשים מהארגון.
  hr: Korisnik može pregledavati i uređivati sav sadržaj te dodavati ili uklanjati
    korisnike iz organizacije.
  hu: A felhasználó megtekintheti és szerkesztheti az összes tartalmat, valamint felhasználókat
    adhat hozzá vagy távolíthat el a szervezetből.
  is: Notandi skoðar og breytir öllu efni og bætir við eða fjarlægir notendur í eða
    úr fyrirtækinu.
  it: L'utente visualizza e modifica tutti i contenuti e aggiunge o rimuove utenti
    dall'organizzazione.
  lt: Vartotojas peržiūri ir redaguoja visą turinį ir prideda arba šalina vartotojus
    iš organizacijos.
  lv: Lietotājs skata un rediģē visu saturu un pievieno vai noņem lietotājus organizācijai
    vai no tās.
  mt: L-utent jara u jeditja l-kontenut kollu u jżid jew ineħħi utenti lill-organizzazzjoni
    jew minnha.
  nl: Gebruiker kan alle inhoud bekijken en bewerken en gebruikers toevoegen aan of
    verwijderen uit de organisatie.
  nl_BE: Gebruiker kan alle inhoud bekijken en bewerken en gebruikers toevoegen aan
    of verwijderen uit de organisatie.
  nl_be: Gebruiker kan alle inhoud bekijken en bewerken en gebruikers toevoegen aan
    of verwijderen uit de organisatie.
  'no': Bruker kan se og redigere alt innhold og legge til eller fjerne brukere fra
    organisasjonen.
  pl: Użytkownik może przeglądać i edytować całą zawartość oraz dodawać lub usuwać
    użytkowników z organizacji.
  pt: O utilizador visualiza e edita todo o conteúdo e adiciona ou remove utilizadores
    da organização.
  ro: Utilizatorul vizualizează și editează tot conținutul și adaugă sau elimină utilizatori
    din organizație.
  ru: Пользователь просматривает и редактирует весь контент, а также добавляет или
    удаляет пользователей в организацию или из неё.
  sk: Používateľ prezerá a upravuje všetok obsah a pridáva alebo odstraňuje používateľov
    z organizácie.
  sl: Uporabnik pregleduje in ureja vso vsebino ter dodaja ali odstranjuje uporabnike
    v organizacijo ali iz nje.
  sq: Përdoruesi shikon dhe modifikon të gjithë përmbajtjen dhe shton ose heq përdorues
    nga organizata.
  sr: Korisnik pregledava i uređuje sav sadržaj i dodaje ili uklanja korisnike u ili
    iz organizacije.
  sv: Användaren visar och redigerar allt innehåll och lägger till eller tar bort
    användare från organisationen.
  uk: Користувач переглядає і редагує весь вміст та додає або видаляє користувачів
    з організації.
