  ro: 'Sunteți pe cale să deblocați evaluarea de risc <strong>„Einweisung Fremdfirmen: Reinigungskräfte"</strong>.'
  ru: 'Вы собираетесь разблокировать оценку рисков <strong>«Einweisung Fremdfirmen: Reinigungskräfte»</strong>.'
  sk: 'Chystáte sa odomknúť hodnotenie rizík <strong>„Einweisung Fremdfirmen: Reinigungskräfte"</strong>.'
  sl: 'Nameravate odkleniti oceno tveganja <strong>„Einweisung Fremdfirmen: Reinigungskräfte"</strong>.'
  sq: 'Jeni duke u përgatitur të zhbllokoni vlerësimin e rrezikut <strong>"Einweisung Fremdfirmen: Reinigungskräfte"</strong>.'
  sr: 'Spremate se da otključate procenu rizika <strong>„Einweisung Fremdfirmen: Reinigungskräfte"</strong>.'
  sv: 'Du håller på att låsa upp riskbedömningen <strong>„Einweisung Fremdfirmen: Reinigungskräfte“</strong>.'
  uk: 'Ви збираєтеся розблокувати оцінку ризику <strong>«Einweisung Fremdfirmen: Reinigungskräfte»</strong>.'
message_you_are_about_to_unlock_consequences:
  bg: След отключването ще трябва да изпратите отново инструктажните документи на изпълнителя за валидиране.
  ca: Després de desbloquejar, haureu de tornar a enviar els documents d'informació al contractista per a la seva validació.
  cs: Po odemknutí budete muset znovu odeslat informační dokumenty dodavateli k ověření.
  cy: Ar ôl datgloi, bydd rhaid i chi ail-anfon y dogfennau briffio at y contractwr i'w dilysu.
  da: Efter oplåsning skal du sende briefingdokumenterne til entreprenøren igen til validering.
  de: Nach dem Entsperren müssen Sie die Einweisungsunterlagen erneut zur Bestätigung an die Fremdfirma schicken.
  el: Μετά το ξεκλείδωμα, θα πρέπει να αποστείλετε εκ νέου τα έγγραφα ενημέρωσης στον εργολάβο για επικύρωση.
  en: After you unlock, you will have to resend the briefing documents to the contractor for validation.
  es: Después de desbloquear, tendrá que reenviar los documentos informativos al contratista para su validación.
  et: Pärast avamist peate saatma briifingudokumendid töövõtjale kinnitamiseks uuesti.
  fi: Lukituksen avaamisen jälkeen sinun on lähetettävä tiedotusasiakirjat uudelleen urakoitsijalle vahvistusta varten.
  fr: Après le déverrouillage, vous devrez renvoyer les documents d'information au sous-traitant pour validation.
  ga: Tar éis díghlasála, beidh ort na cáipéisí brífinge a athsheoladh chuig an gconraitheoir le haghaidh bailíochtaithe.
  he: לאחר ביטול הנעילה, יהיה עליך לשלוח מחדש את מסמכי הבריפינג לקבלן לאימות.
  hr: Nakon otključavanja, morat ćete ponovno poslati dokumente za informiranje izvođaču radi provjere valjanosti.
  hu: A zárolás feloldása után újra el kell küldenie a tájékoztató dokumentumokat a vállalkozónak érvényesítés céljából.
  is: Eftir að þú opnar, þarftu að endursenda kynningargögnin til verktakans til staðfestingar.
  it: Dopo aver sbloccato, dovrai inviare nuovamente i documenti di briefing all'appaltatore per la validazione.
  lt: Po atrakinimo turėsite iš naujo išsiųsti instruktavimo dokumentus rangovui patvirtinimui.
  lv: Pēc atbloķēšanas jums būs jānosūta instruktāžas dokumenti darbuzņēmējam atkārtoti validācijai.
  mt: Wara li tiftaħ, se jkollok tibgħat mill-ġdid id-dokumenti tal-briefing lill-kuntrattur għall-validazzjoni.
  nl: Na het ontgrendelen moet u de briefingdocumenten opnieuw naar de aannemer sturen ter validatie.
  nl_BE: Na het ontgrendelen moet u de briefingdocumenten opnieuw naar de aannemer sturen ter validatie.
  nl_be: Na het ontgrendelen moet u de briefingdocumenten opnieuw naar de aannemer sturen ter validatie.
  'no': Etter at du låser opp, må du sende briefingdokumentene på nytt til entrepr\u00enøren for validering.
  pl: Po odblokowaniu będziesz musiał ponownie wysłać dokumenty briefingowe do wykonawcy w celu zatwierdzenia.
  pt: Após desbloquear, terá de reenviar os documentos de briefing ao empreiteiro para validação.
  ro: După deblocare, va trebui să retrimiteți documentele de informare contractantului pentru validare.
  ru: После разблокировки вам придётся повторно отправить инструктажные документы подрядчику для проверки.
  sk: Po odomknutí budete musieť znova odoslať informačné dokumenty zhotoviteľovi na overenie.
  sl: Po odklenitvi boste morali znova poslati informativna gradiva izvajalcu v potrditev.
  sq: Pas zhbllokimit, do t'ju duhet të ridërgoni dokumentet e informimit te kontraktori për validim.
  sr: Nakon otključavanja, moraćete ponovo poslati dokumente za brifing izvođaču radi validacije.
  sv: När du har låst upp måste du skicka om informationsdokumenten till entreprenören för validering.
  uk: Після розблокування вам потрібно буде повторно надіслати інструктивні документи підряднику для перевірки.
message_you_are_about_to_unlock_explanation:
  bg: Тази оценка на риска е заключена, защото брифинг документите вече са изпратени на изпълнителя.
  ca: Aquesta avaluació de riscos està bloquejada perquè els documents informatius ja s'han enviat al contractista.
  cs: Toto hodnocení rizik je uzamčeno, protože informační dokumenty již byly odeslány zhotoviteli.
  cy: Mae'r asesiad risg hwn wedi'i gloi oherwydd bod y dogfennau briffio eisoes wedi'u hanfon at y contractwr.
  da: Denne risikovurdering er låst, fordi briefingdokumenterne allerede er sendt til entreprenøren.
  de: Diese GBU ist gesperrt, weil die Einweisungsunterlagen bereits versendet wurden.
  el: Αυτή η αξιολόγηση κινδύνου είναι κλειδωμένη επειδή τα έγγραφα ενημέρωσης έχουν ήδη σταλεί στον εργολάβο.
  en: This risk assessment is locked because the briefing documents were already sent to the contractor.
  es: Esta evaluación de riesgos está bloqueada porque los documentos de informe ya fueron enviados al contratista.
  et: See riskihinnang on lukustatud, kuna briifingudokumendid on juba töövõtjale saadetud.
  fi: Tämä riskiarviointi on lukittu, koska tiedotusasiakirjat on jo lähetetty urakoitsijalle.
  fr: Cette évaluation des risques est verrouillée car les documents d'information ont déjà été envoyés au prestataire.
  ga: Tá an measúnú riosca seo faoi ghlas toisc go raibh na cáipéisí achoimre seolta cheana féin chuig an gconraitheoir.
  he: הערכת הסיכון הזו נעולה מכיוון שמסמכי הבריפינג כבר נשלחו לקבלן.
  hr: Ova procjena rizika je zaključana jer su dokumenti za briefing već poslani izvođaču.
  hu: Ez a kockázatértékelés zárolva van, mert a tájékoztató dokumentumokat már elküldték a vállalkozónak.
  is: Þetta áhættumat er læst vegna þess að kynningargögnin voru þegar send til verktakans.
  it: Questa valutazione del rischio è bloccata perché i documenti di briefing sono stati già inviati all'appaltatore.
  lt: Šis rizikos vertinimas yra užrakintas, nes informaciniai dokumentai jau buvo išsiųsti rangovui.
  lv: Šis riska novērtējums ir bloķēts, jo informatīvie dokumenti jau tika nosūtīti darbuzņēmējam.
  mt: Din il-valutazzjoni tar-riskju hija msakkar għax id-dokumenti tal-briefing diġà ntbagħtu lill-kuntrattur.
  nl: Deze risicobeoordeling is vergrendeld omdat de briefingdocumenten al naar de aannemer zijn verzonden.
  nl_BE: Deze risicobeoordeling is vergrendeld omdat de briefingdocumenten al naar de aannemer zijn verzonden.
  nl_be: Deze risicobeoordeling is vergrendeld omdat de briefingdocumenten al naar de aannemer zijn verzonden.
  'no': Denne risikovurderingen er låst fordi orienteringsdokumentene allerede er sendt til entreprenøren.
  pl: Ta ocena ryzyka jest zablokowana, ponieważ dokumenty odprawowe zostały już wysłane do wykonawcy.
  pt: Esta avaliação de risco está bloqueada porque os documentos de briefing já foram enviados ao empreiteiro.
  ro: Această evaluare a riscurilor este blocată deoarece documentele de informare au fost deja trimise contractantului.
  ru: Эта оценка рисков заблокирована, поскольку информационные документы уже были отправлены подрядчику.
  sk: Toto hodnotenie rizík je zablokované, pretože informačné dokumenty už boli zaslané zhotoviteľovi.
  sl: Ta ocena tveganja je zaklenjena, ker so bili dokumenti z navodili že poslani izvajalcu.
  sq: Ky vlerësim i riskut është i bllokuar sepse dokumentet e njoftimit u dërguan tashmë kontraktorit.
  sr: Ova procena rizika je zaključana jer su dokumenti za brifing već poslati izvođaču.
  sv: Denna riskbedömning är låst eftersom brifingdokumenten redan skickats till entreprenören.
  uk: Ця оцінка ризику заблокована, оскільки документи для інструктажу вже були надіслані підряднику.
message_you_are_requested_to_validate_assessment:
  bg: Молим ви да прегледате и валидирате тази оценка на риска.
  ca: Se us demana que reviseu i valideu aquesta avaluació de riscos.
  cs: Jste požádáni o přezkoumání a ověření tohoto hodnocení rizik.
  cy: Gofynnir i chi adolygu a dilysu'r asesiad risg hwn.
  da: Du anmodes om at gennemgå og validere denne risikovurdering.
  de: Sie werden gebeten, diese Risikobewertung zu überprüfen und zu validieren.
  el: Σας ζητείται να αναθεωρήσετε και να επικυρώσετε αυτή την εκτίμηση κινδύνου.
  en: You are requested to review and validate this risk assessment.
  es: Se le solicita que revise y valide esta evaluación de riesgos.
  et: Palutakse teil see riskihinnang üle vaadata ja kinnitada.
  fi: Sinua pyydetään tarkistamaan ja vahvistamaan tämä riskiarviointi.
  fr: Il vous est demandé d'examiner et de valider cette évaluation des risques.
  ga: Iarrtar ort an measúnú riosca seo a athbhreithniú agus a bhailíochtú.
  he: אתה מתבקש לבדוק ולאמת הערכת סיכון זו.
  hr: Od vas se zahtijeva da pregledate i potvrdite ovu procjenu rizika.
  hu: Felkérjük, hogy vizsgálja felül és érvényesítse ezt a kockázatértékelést.
  is: Þér er óskað eftir að fara yfir og staðfesta þetta áhættumat.
  it: Ti viene chiesto di rivedere e convalidare questa valutazione dei rischi.
  lt: Jūsų prašoma peržiūrėti ir patvirtinti šį rizikos vertinimą.
  lv: Jums tiek lūgts pārskatīt un validēt šo riska novērtējumu.
  mt: Qed tintalab tirrevedi u tivvalida din il-valutazzjoni tar-riskju.
  nl: U wordt verzocht deze risicobeoordeling te bekijken en te valideren.
  nl_BE: U wordt verzocht deze risicobeoordeling te beoordelen en te valideren.
  nl_be: U wordt verzocht deze risicobeoordeling te beoordelen en te valideren.
  'no': Du er bedt om å gjennomgå og validere denne risikovurderingen.
  pl: Jesteś proszony(-a) o przejrzenie i zatwierdzenie tej oceny ryzyka.
  pt: Você é solicitado a revisar e validar esta avaliação de risco.
  ro: Sunteți rugat(ă) să revizuiți și să validați această evaluare a riscurilor.
  ru: Вас просят проверить и утвердить данную оценку рисков.
  sk: Ste požiadaný/á, aby ste skontrolovali a validovali toto hodnotenie rizík.
  sl: Prosimo vas, da pregledate in potrdite to oceno tveganja.
  sq: Ju kërkohet të shqyrtoni dhe vërtetoni këtë vlerësim të rreziqeve.
  sr: Od vas se traži da pregledate i validirate ovu procenu rizika.
  sv: Du uppmanas att granska och validera denna riskbedömning.
  uk: Вас просять переглянути та підтвердити цю оцінку ризиків.
message_you_reviewed_and_validated_risk_assessment:
  bg: Вие прегледахте и валидирахте тази оценка на риска.
  ca: Heu revisat i validat aquesta avaluació de riscos.
  cs: Toto hodnocení rizik jste přezkoumali a ověřili.
  cy: Rydych wedi adolygu a dilysu'r asesiad risg hwn.
  da: Du har gennemgået og valideret denne risikovurdering.
  de: Sie haben diese Risikobewertung überprüft und validiert.
  el: Έχετε αναθεωρήσει και επικυρώσει αυτή την εκτίμηση κινδύνου.
  en: You have reviewed and validated this risk assessment.
  es: Ha revisado y validado esta evaluación de riesgos.
  et: Olete selle riskihinnangu üle vaadanud ja kinnitanud.
  fi: Olet tarkistanut ja vahvistanut tämän riskiarvioinnin.
  fr: Vous avez examiné et validé cette évaluation des risques.
  ga: Tá an measúnú riosca seo athbhreithnithe agus bailíochtaithe agat.
  he: בדקת ואימתת הערכת סיכון זו.
  hr: Pregledali ste i potvrdili ovu procjenu rizika.
  hu: Ön felülvizsgálta és érvényesítette ezt a kockázatértékelést.
  is: Þú hefur farið yfir og staðfest þetta áhættumat.
  it: Hai revisionato e convalidato questa valutazione dei rischi.
  lt: Jūs peržiūrėjote ir patvirtinote šį rizikos vertinimą.
  lv: Jūs esat pārskatījis un apstiprinājis šo riska novērtējumu.
  mt: Inti rrevidjajt u validajt din il-valutazzjoni tar-riskju.
  nl: U heeft deze risicobeoordeling beoordeeld en gevalideerd.
  nl_BE: U heeft deze risicobeoordeling beoordeeld en gevalideerd.
  nl_be: U heeft deze risicobeoordeling beoordeeld en gevalideerd.
  'no': Du har gjennomgått og validert denne risikovurderingen.
  pl: Przejrzałeś(-aś) i zatwierdziłeś(-aś) tę ocenę ryzyka.
  pt: Você revisou e validou esta avaliação de risco.
  ro: Ați revizuit și validat această evaluare a riscurilor.
  ru: Вы проверили и утвердили данную оценку рисков.
  sk: Skontrolovali ste a validovali ste toto hodnotenie rizík.
  sl: Pregledali in potrdili ste to oceno tveganja.
  sq: Ju keni shqyrtuar dhe vërtetuar këtë vlerësim të rreziqeve.
  sr: Pregledali ste i validirali ovu procenu rizika.
  sv: Du har granskat och validerat denna riskbedömning.
  uk: Ви переглянули та підтвердили цю оцінку ризиків.
