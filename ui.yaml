message_email_invite_user_body:
  bg: С настоящото ви каня да се присъедините към нашата организация в OiRA. След като приемете членството си, можем да си сътрудничим при оценките на риска. \n\n Моля, влезте в профила си или се регистрирайте чрез връзката по-долу и приемете членството си. Тази връзка ще остане валидна 5 дни.
  ca: Per la present, us convido a unir-vos a la nostra organització a OiRA. Un cop hàgiu acceptat la vostra adhesió, podrem col·laborar en les avaluacions de riscos. \n\n Si us plau, inicieu sessió o registreu-vos mitjançant l'enllaç a continuació i accepteu la vostra adhesió. Aquest enllaç serà vàlid durant 5 dies.
  cs: Tímto vás zvu, abyste se připojili k naší organizaci na OiRA. Jakmile přijmete své členství, můžeme spolupracovat na hodnoceních rizik. \n\n Přihlaste se nebo se zaregistrujte prostřednictvím odkazu níže a přijměte své členství. Tento odkaz bude platný po dobu 5 dnů.
  cy: Rwy'n eich gwahodd i ymuno â'n sefydliad ar OiRA. Unwaith i chi dderbyn eich aelodaeth, gallwn gydweithio ar aseisadau risg. \n\n Mewngofnodwch neu cofrestrwch drwy'r ddolen isod a derbyniwch eich aelodaeth. Bydd y ddolen hon yn ddilys am 5 diwrnod.
  da: Hermed inviterer jeg dig til at tilslutte dig vores organisation på OiRA. Når du har accepteret dit medlemskab, kan vi samarbejde om risikovurderinger. \n\n Log ind eller registrer dig via linket nedenfor og accepter dit medlemskab. Dette link forbliver gyldigt i 5 dage.
  de: Hiermit lade ich Sie ein, unserer Organisation auf OiRA beizutreten. Sobald Sie Ihre Mitgliedschaft akzeptiert haben, können wir gemeinsam an Risikobewertungen arbeiten. \n\n Bitte melden Sie sich über den untenstehenden Link an oder registrieren Sie sich und akzeptieren Sie Ihre Mitgliedschaft. Dieser Link ist 5 Tage lang gültig.
  el: Με το παρόν σας προσκαλώ να εγγραφείτε στον οργανισμό μας στο OiRA. Μόλις αποδεχτείτε τη συμμετοχή σας, μπορούμε να συνεργαστούμε σε εκτιμήσεις κινδύνου. \n\n Παρακαλούμε συνδεθείτε ή εγγραφείτε μέσω του παρακάτω συνδέσμου και αποδεχτείτε τη συμμετοχή σας. Αυτός ο σύνδεσμος θα παραμείνει έγκυρος για 5 ημέρες.
  en: I hereby invite you to join our organisation on OiRA. Once you’ve accepted your membership, we can collaborate on risk assessments. \n\n Please log in or register via the link below and accept your membership. This link will stay valid for 5 days.
  es: Por medio de la presente le invito a unirse a nuestra organización en OiRA. Una vez que haya aceptado su membresía, podremos colaborar en evaluaciones de riesgos. \n\n Por favor, inicie sesión o regístrese a través del enlace a continuación y acepte su membresía. Este enlace permanecerá válido durante 5 días.
  et: Kutsun teid käesolevaga liituma meie organisatsiooniga OiRA-s. Kui olete oma liikmesuse aktsepteerinud, saame koostöös riskihindamisi teha. \n\n Palun logige sisse või registreeruge alloleva lingi kaudu ja aktsepteerige oma liikmesus. See link on kehtiv 5 päeva.
  fi: Kutsun teidät täten liittymään organisaatioomme OiRA:ssa. Kun olette hyväksynyt jäsenyytenne, voimme tehdä yhteistyötä riskiarvioinneissa. \n\n Ole hyvä ja kirjaudu sisään tai rekisteröidy alla olevan linkin kautta ja hyväksy jäsenyytesi. Tämä linkki pysyy voimassa 5 päivää.
  fr: Je vous invite par la présente à rejoindre notre organisation sur OiRA. Une fois votre adhésion acceptée, nous pourrons collaborer sur les évaluations des risques. \n\n Veuillez vous connecter ou vous inscrire via le lien ci-dessous et accepter votre adhésion. Ce lien restera valide pendant 5 jours.
  ga: Tugaim cuireadh duit anseo ár n-eagraíocht ar OiRA a nascadh. Nuair a bheidh do bhallraíocht glactha agat, is féidir linn comhoibriú ar mheasúnuithe riosca. \n\n Logáil isteach nó cláraigh trí an nasc thíos agus glac le do bhallraíocht. Fanfaidh an nasc seo bailí ar feadh 5 lá.
  he: בזאת אני מזמין אותך להצטרף לארגון שלנו ב-OiRA. לאחר שתקבל את חברותך, נוכל לשתף פעולה בהערכות סיכון. \n\n אנא התחבר או הירשם דרך הקישור למטה וקבל את חברותך. קישור זה יישאר תקף למשך 5 ימים.
  hr: Ovime Vas pozivam da se pridružite našoj organizaciji na OiRA-i. Kada prihvatite članstvo, možemo surađivati na procjenama rizika. \n\n Molimo prijavite se ili se registrirajte putem donje poveznice i prihvatite članstvo. Ova veza ostaje valjana 5 dana.
  hu: Ezúton meghívom Önt, hogy csatlakozzon szervezetünkhöz az OiRA-n. Miután elfogadta tagságát, együttműködhetünk a kockázatértékeléseken. \n\n Kérjük, jelentkezzen be vagy regisztráljon az alábbi linken keresztül, és fogadja el tagságát. Ez a link 5 napig marad érvényes.
  is: Hér með býð ég þér að ganga í fyrirtækið okkar á OiRA. Þegar þú hefur samþykkt aðild þína getum við unnið saman að áhættumatsskrám. \n\n Vinsamlegast skráðu þig inn eða skráðu þig í gegnum tengilinn hér að neðan og samþykktu aðild þína. Þessi tengill verður gildur í 5 daga.
  it: Con la presente ti invito a unirti alla nostra organizzazione su OiRA. Una volta accettata la tua iscrizione, potremo collaborare sulle valutazioni dei rischi. \n\n Accedi o registrati tramite il link sottostante e accetta la tua iscrizione. Questo link rimarrà valido per 5 giorni.
  lt: Šiuo metu kviečiu jus prisijungti prie mūsų organizacijos OiRA. Kai priimsite narystę, galėsime bendradarbiauti rengiant rizikos vertinimus. \n\n Prisijunkite arba užsiregistruokite naudodami žemiau esančią nuorodą ir priimkite narystę. Ši nuoroda bus galiojanti 5 dienas.
  lv: Ar šo es ielūdzu jūs pievienoties mūsu organizācijai OiRA. Kad būsiet akceptējuši dalību, mēs varēsim sadarboties riska novērtējumos. \n\n Lūdzu, piesakieties vai reģistrējieties, izmantojot zemāk esošo saiti, un akceptējiet savu dalību. Šī saite būs derīga 5 dienas.
  mt: B'dan il-mod qed nistiednek tingħaqad mal-organizzazzjoni tagħna fuq OiRA. Ladarba taċċetta l-parteċipazzjoni tiegħek, nistgħu nikkolaboraw fuq il-valutazzjonijiet tar-riskju. \n\n Jekk jogħġbok idħol jew irreġistra permezz tal-link hawn taħt u aċċetta l-parteċipazzjoni tiegħek. Dan il-link jibqa' validu għal 5 ijiem.
  nl: Hierbij nodig ik u uit om lid te worden van onze organisatie op OiRA. Zodra u uw lidmaatschap heeft geaccepteerd, kunnen we samenwerken aan risicobeoordelingen. \n\n Meld u aan of registreer u via de onderstaande link en accepteer uw lidmaatschap. Deze link blijft 5 dagen geldig.
  nl_BE: Hierbij nodig ik u uit om lid te worden van onze organisatie op OiRA. Zodra u uw lidmaatschap heeft geaccepteerd, kunnen we samenwerken aan risicobeoordelingen. \n\n Meld u aan of registreer u via de onderstaande link en accepteer uw lidmaatschap. Deze link blijft 5 dagen geldig.
  nl_be: Hierbij nodig ik u uit om lid te worden van onze organisatie op OiRA. Zodra u uw lidmaatschap heeft geaccepteerd, kunnen we samenwerken aan risicobeoordelingen. \n\n Meld u aan of registreer u via de onderstaande link en accepteer uw lidmaatschap. Deze link blijft 5 dagen geldig.
  'no': Jeg inviterer deg herved til å bli med i vår organisasjon på OiRA. Når du har akseptert medlemskapet ditt, kan vi samarbeide om risikovurderinger. \n\n Vennligst logg inn eller registrer deg via lenken nedenfor og aksepter medlemskapet ditt. Denne lenken vil være gyldig i 5 dager.
  pl: Niniejszym zapraszam Cię do dołączenia do naszej organizacji na OiRA. Po zaakceptowaniu członkostwa będziemy mogli wspólnie pracować nad ocenami ryzyka. \n\n Proszę zalogować się lub zarejestrować za pomocą poniższego linku i zaakceptować członkostwo. Ten link będzie ważny przez 5 dni.
  pt: Convido-o(a) a juntar-se à nossa organização no OiRA. Assim que aceitar a sua adesão, poderemos colaborar nas avaliações de risco. \n\n Por favor, inicie sessão ou registe-se através do link abaixo e aceite a sua adesão. Este link permanecerá válido durante 5 dias.
  ro: Prin prezenta vă invit să vă alăturați organizației noastre pe OiRA. Odată ce ați acceptat calitatea de membru, putem colabora la evaluările de risc. \n\n Vă rugăm să vă conectați sau să vă înregistrați prin linkul de mai jos și să acceptați calitatea de membru. Acest link va rămâne valabil timp de 5 zile.
  ru: Настоящим приглашаю вас присоединиться к нашей организации на OiRA. После того как вы примете членство, мы сможем совместно работать над оценками рисков. \n\n Пожалуйста, войдите или зарегистрируйтесь по ссылке ниже и примите членство. Эта ссылка будет действительна в течение 5 дней.
  sk: Týmto vás pozývam, aby ste sa pripojili k našej organizácii na OiRA. Po prijatí členstva môžeme spolupracovať na hodnoteniach rizík. \n\n Prihláste sa alebo zaregistrujte sa pomocou odkazu nižšie a prijmite svoje členstvo. Tento odkaz bude platný 5 dní.
  sl: Vabim vas, da se pridružite naši organizaciji na OiRA. Ko boste sprejeli članstvo, bomo lahko skupaj delali na ocenah tveganj. \n\n Prijavite se ali se registrirajte prek spodnje povezave in sprejmite svoje članstvo. Ta povezava bo veljavna 5 dni.
  sq: Me anë të kësaj ju ftoj të bashkoheni me organizatën tonë në OiRA. Pasi të keni pranuar anëtarësimin tuaj, mund të bashkëpunojmë për vlerësimet e riskut. \n\n Ju lutem identifikohuni ose regjistrohuni përmes lidhjes më poshtë dhe pranoni anëtarësimin tuaj. Kjo lidhje do të mbetet e vlefshme për 5 ditë.
  sr: Ovim putem vas pozivam da se pridružite našoj organizaciji na OiRA. Kada prihvatite svoje članstvo, možemo sarađivati na procenama rizika. \n\n Molimo vas da se prijavite ili registrujete putem linka ispod i prihvatite svoje članstvo. Ovaj link će ostati važeći 5 dana.
  sv: Härmed bjuder jag in dig att gå med i vår organisation på OiRA. När du har accepterat ditt medlemskap kan vi samarbeta om riskbedömningar. \n\n Vänligen logga in eller registrera dig via länken nedan och acceptera ditt medlemskap. Denna länk är giltig i 5 dagar.
  uk: Цим запрошую вас приєднатися до нашої організації на OiRA. Після того, як ви приймете своє членство, ми зможемо співпрацювати над оцінками ризиків. \n\n Будь ласка, увійдіть або зареєструйтеся за посиланням нижче та прийміть своє членство. Це посилання залишатиметься дійсним протягом 5 днів.
message_find_consultant:
  bg: Намерете консултант по OSH, с когото искате да се свържете или да добавите към вашата организация, за да осигурите поддръжка.
  ca: Trobeu un consultor d'OSH amb qui vulgueu contactar o afegir a la vostra organització per proporcionar suport.
  cs: Najděte konzultanta OSH, se kterým chcete navázat kontakt nebo ho přidat do své organizace, aby poskytoval podporu.
  cy: Dewch o hyd i ymgynghorydd OSH yr hoffech gysylltu ag ef neu ei ychwanegu at eich sefydliad i ddarparu cymorth.
  da: Find en OSH-konsulent, som du vil kontakte eller tilføje til din organisation for at yde support.
  de: Finden Sie einen OSH-Berater, den Sie kontaktieren oder zu Ihrer Organisation hinzufügen möchten, um Unterstützung zu leisten.
  el: Βρείτε έναν σύμβουλο OSH με τον οποίο θέλετε να επικοινωνήσετε ή να τον προσθέσετε στον οργανισμό σας για να παρέχει υποστήριξη.
  en: Find an OSH consultant you want to contact or add to your organisation to provide support.
  es: Encuentre un consultor de OSH con el que desee ponerse en contacto o añadir a su organización para brindar apoyo.
  et: Leidke OSH-konsultant, kellega soovite ühendust võtta või keda soovite lisada oma organisatsiooni toe pakkumiseks.
  fi: Etsi OSH-konsultti, johon haluat ottaa yhteyttä tai lisätä organisaatioosi tuen tarjoamiseksi.
  fr: Trouvez un consultant OSH que vous souhaitez contacter ou ajouter à votre organisation pour vous apporter un soutien.
  ga: Aimsigh comhairleoir OSH ar mhaith leat teagmháil a dhéanamh leis nó é a chur le d'eagraíocht chun tacaíocht a sholáthar.
  he: מצא יועץ בריאות ובטיחות תעסוקתית שברצונך ליצור איתו קשר או להוסיף לארגון שלך לצורך מתן תמיכה.
  hr: Pronađite konzultanta za ZNR s kojim želite stupiti u kontakt ili ga dodati u svoju organizaciju radi pružanja podrške.
  hu: Keressen munkavédelmi tanácsadót, akivel kapcsolatba szeretne lépni, vagy akit hozzá szeretne adni szervezetéhez a támogatás nyújtása érdekében.
  is: Finndu OSH ráðgjafa sem þú vilt hafa samband við eða bæta við stofnunina þína til að veita stuðning.
  it: Trova un consulente SSL che desideri contattare o aggiungere alla tua organizzazione per fornire supporto.
  lt: Raskite OSH konsultantą, su kuriuo norite susisiekti arba kurį norite pridėti prie savo organizacijos pagalbai teikti.
  lv: Atrodiet OSH konsultantu, ar kuru vēlaties sazināties vai pievienot savai organizācijai, lai sniegtu atbalstu.
  mt: Sib konsulent OSH li trid tikkuntattja jew żid mal-organizzazzjoni tiegħek biex tipprovdi appoġġ.
  nl: Zoek een OSH-adviseur waarmee u contact wilt opnemen of die u aan uw organisatie wilt toevoegen om ondersteuning te bieden.
  nl_BE: Zoek een OSH-consulent die u wilt contacteren of toevoegen aan uw organisatie om ondersteuning te bieden.
  nl_be: Zoek een OSH-consulent die u wilt contacteren of toevoegen aan uw organisatie om ondersteuning te bieden.
  'no': Finn en HMS-konsulent du ønsker å kontakte eller legge til i din organisasjon for å gi støtte.
  pl: Znajdź konsultanta BHP, z którym chcesz się skontaktować lub dodaj go do swojej organizacji, aby udzielał wsparcia.
  pt: Encontre um consultor de SST que deseja contatar ou adicionar à sua organização para fornecer suporte.
  ro: Găsiți un consultant SSM pe care doriți să îl contactați sau să îl adăugați în organizația dvs. pentru a oferi asistență.
  ru: Найдите консультанта по ОТ, с которым хотите связаться или которого хотите добавить в свою организацию для оказания поддержки.
  sk: Nájdite konzultanta BOZP, ktorého chcete kontaktovať alebo pridať do svojej organizácie na poskytovanie podpory.
  sl: Poiščite svetovalca za varnost in zdravje pri delu, s katerim se želite stopiti v stik ali ga dodati svoji organizaciji za zagotavljanje podpore.
  sq: Gjeni një konsulent të SSP-së me të cilin dëshironi të kontaktoni ose ta shtoni në organizatën tuaj për të ofruar mbështetje.
  sr: Pronađite OHS konsultanta kojeg želite kontaktirati ili dodati svojoj organizaciji radi pružanja podrške.
  sv: Hitta en OSH-konsult som du vill kontakta eller lägga till i din organisation för att erbjuda stöd.
  uk: Знайдіть консультанта з ОП, з яким хочете зв'язатися або якого хочете додати до своєї організації для надання підтримки.
message_find_consultant_in_country:
  bg: Намерете консултант по БЗТ във вашата страна.
  ca: Trobeu un consultor de SST al vostre país.
  cs: Najděte konzultanta BOZP ve vaší zemi.
  cy: Dewch o hyd i ymgynghorydd IDG yn eich gwlad.
  da: Find en arbejdsmiljøkonsulent i dit land.
  de: Finden Sie einen OSH-Berater in Ihrem Land.
  el: Βρείτε έναν σύμβουλο ΕΑΥ στη χώρα σας.
  en: Find an OSH consultant in your country.
  es: Encuentre un consultor de SST en su país.
  et: Leidke OHS-i konsultant oma riigist.
  fi: Etsi OHS-konsultti maastasi.
  fr: Trouvez un consultant OSH dans votre pays.
  ga: Faigh comhairleoir SSO i do thír.
  he: מצא יועץ בטיחות ובריאות תעסוקתית במדינתך.
  hr: Pronađite savjetnika za zaštitu na radu u vašoj zemlji.
  hu: Keressen OHS tanácsadót az Ön országában.
  is: Finndu vinnuverndarráðgjafa í þínu landi.
  it: Trova un consulente OSH nel tuo paese.
  lt: Raskite DSS konsultantą savo šalyje.
  lv: Atrodiet DSV konsultantu savā valstī.
  mt: Sib konsulent OSH fil-pajjiż tiegħek.
  nl: Vind een OSH-adviseur in uw land.
  nl_BE: Vind een preventieadviseur in uw land.
  nl_be: Vind een preventieadviseur in uw land.
  'no': Finn en HMS-konsulent i ditt land.
  pl: Znajdź konsultanta BHP w swoim kraju.
  pt: Encontre um consultor de SST no seu país.
  ro: Găsiți un consultant SSM în țara dvs.
  ru: Найдите консультанта по охране труда в вашей стране.
  sk: Nájdite poradcu BOZP vo vašej krajine.
  sl: Poiščite svetovalca VZD v svoji državi.
  sq: Gjeni një konsulent SSHP në vendin tuaj.
  sr: Pronađite BZR konsultanta u vašoj zemlji.
  sv: Hitta en arbetsmiljökonsult i ditt land.
  uk: Знайдіть консультанта з охорони праці у вашій країні.
message_find_consultants:
  bg: Възможно е да се поиска помощ при попълването на оценка на риска или да се извърши анализ на риска от вас и да се валидира от консултант по БЗТ. Консултантът по БЗТ може да даде на вашата оценка на риска официален знак за валидиране. Валидирането може да бъде поискано само от потребители с ниво на разрешение „Управление" или по-високо.
  ca: És possible sol·licitar assistència per completar una avaluació de riscos o que una anàlisi de riscos sigui realitzada per vosaltres i validada per un consultor de SST. Un consultor de SST pot donar a la vostra avaluació de riscos un segell oficial de validació. La validació només la poden sol·licitar els usuaris amb el nivell de permís 'Gestionar' o superior.
  cs: Je možné požádat o pomoc při vyplňování hodnocení rizik nebo nechat analýzu rizik provést vámi a ověřit konzultantem BOZP. Konzultant BOZP může vaší hodnocení rizik udělit oficiální ověřovací značku. Ověření může požádat pouze uživatelé s úrovní oprávnění 'Spravovat' nebo vyšší.
  cy: Mae'n bosibl gofyn am gymorth i gwblhau asesiad risg neu gael dadansoddiad risg wedi'i berfformio gennych chi a'i ddilysu gan ymgynghorydd Iechyd a Diogelwch Galwedigaethol. Gall ymgynghorydd IDG roi nod dilysu swyddogol i'ch asesiad risg. Dim ond defnyddwyr â lefel caniatâd 'Rheoli' neu uwch all ofyn am ddilysu.
  da: Det er muligt at anmode om assistance til at udfylde en risikovurdering eller at få en risikoanalyse udført af dig og valideret af en arbejdsmiljøkonsulent. En arbejdsmiljøkonsulent kan give din risikovurdering et officielt valideringsmærke. En validering kan kun anmodes af brugere med tilladelsesniveauet 'Administrer' eller højere.
  de: Es besteht die Möglichkeit, Unterstützung bei der Durchführung einer Risikobewertung anzufordern oder eine Risikoanalyse von Ihnen durchführen und von einem Arbeitsschutzberater validieren zu lassen. Ein Arbeitsschutzberater kann Ihrer Risikobewertung ein offizielles Validierungszeichen geben. Eine Validierung kann nur von Benutzern mit der Berechtigungsstufe „Verwalten“ oder höher beantragt werden.
  el: Είναι δυνατόν να ζητήσετε βοήθεια για τη συμπλήρωση μιας εκτίμησης κινδύνου ή να πραγματοποιηθεί ανάλυση κινδύνου από εσάς και να επικυρωθεί από έναν σύμβουλο ΕΑΥ. Ένας σύμβουλος ΕΑΥ μπορεί να δώσει στην εκτίμηση κινδύνου σας επίσημη σφραγίδα επικύρωσης. Η επικύρωση μπορεί να ζητηθεί μόνο από χρήστες με επίπεδο δικαιωμάτων 'Διαχείριση' ή υψηλότερο.
  en: It is possible to request assistance in completing a risk assessment or to have a risk analysis performed by you and validated by an OSH consultant. An OSH consultant can give your risk assessment an offical validation mark. A validation can only be requested by users with the permission level ‘Manage’ or higher.
  es: Es posible solicitar asistencia para completar una evaluación de riesgos o que un consultor de SST realice un análisis de riesgos y lo valide. Un consultor de SST puede otorgar a su evaluación de riesgos un sello oficial de validación. Solo los usuarios con nivel de permiso 'Gestionar' o superior pueden solicitar una validación.
  et: On võimalik taotleda abi riskihinnangu koostamisel või lasta riskianalüüs teie poolt teha ja OHS-i konsultandil kinnitada. OHS-i konsultant saab anda teie riskihinnangule ametliku kinnituse märgi. Kinnitust saavad taotleda ainult kasutajad, kellel on õigustase 'Haldamine' või kõrgem.
  fi: On mahdollista pyytää apua riskiarvioinnin tekemiseen tai suorittaa riskianalyysi itse ja pyytää OHS-konsulttia vahvistamaan se. OHS-konsultti voi antaa riskiarvioinnillesi virallisen vahvistusleiman. Vahvistusta voivat pyytää vain käyttäjät, joilla on käyttöoikeustaso 'Hallinta' tai korkeampi.
  fr: Il est possible de demander de l'aide pour réaliser une analyse de risque ou de faire valider une analyse de risque que vous avez réalisée par un consultant SST. Un consultant en SST peut donner à votre évaluation des risques une marque de validation officielle. Une validation ne peut être demandée que par les utilisateurs disposant du niveau d'autorisation ‘Gestion’ ou supérieur.
  ga: Is féidir cúnamh a iarraidh chun measúnú riosca a chomhlánú nó anailís riosca a dhéanamh agat féin agus a bhailíochtú ag comhairleoir SSO. Is féidir le comhairleoir SSO marc bailíochtaithe oifigiúil a thabhairt do do mheasúnú riosca. Ní féidir bailíochtú a iarraidh ach ag úsáideoirí le leibhéal ceada 'Bainistigh' nó níos airde.
  he: ניתן לבקש סיוע במילוי הערכת סיכונים או לבקש שניתוח סיכונים יבוצע על ידך ויאושר על ידי יועץ בטיחות ובריאות תעסוקתית. יועץ בטיחות ובריאות תעסוקתית יכול להעניק לך אישור רשמי להערכת הסיכונים שלך. אימות יכול להתבקש רק על ידי משתמשים עם רמת הרשאה 'ניהול' ומעלה.
  hr: Moguće je zatražiti pomoć u popunjavanju procjene rizika ili zahtijevati da analizu rizika izvrši netko za vas i potvrdi je savjetnik za zaštitu na radu. Savjetnik za zaštitu na radu može vašoj procjeni rizika dodijeliti službeni pečat validacije. Validaciju mogu zatražiti samo korisnici s razinom dozvole 'Upravljanje' ili višom.
  hu: Lehetséges segítséget kérni a kockázatértékelés elvégzéséhez, vagy kockázatelemzést végeztetni, amelyet egy munkahelyi egészségvédelmi és biztonsági (OHS) tanácsadó érvényesít. Egy OHS tanácsadó hivatalos érvényesítési jelölést adhat a kockázatértékelésnek. Az érvényesítést csak 'Kezelés' vagy magasabb jogosultsági szintű felhasználók kérhetik.
  is: Hægt er að óska eftir aðstoð við að fylla út áhættumat eða að láta framkvæma áhættugreiningu sem staðfest er af vinnuverndarráðgjafa. Vinnuverndarráðgjafi getur gefið áhættumatinu þínu opinbera staðfestingarmerki. Aðeins notendur með heimildarstigi 'Stjórna' eða hærra geta óskað eftir staðfestingu.
  it: È possibile richiedere assistenza nel completamento di una valutazione dei rischi o richiedere che un'analisi dei rischi venga eseguita e convalidata da un consulente OSH. Un consulente OSH può fornire alla valutazione dei rischi un marchio ufficiale di convalida. La convalida può essere richiesta solo dagli utenti con livello di autorizzazione 'Gestisci' o superiore.
  lt: Galima prašyti pagalbos atliekant rizikos vertinimą arba kad rizikos analizę atliktumėte jūs ir ją patvirtintų DSS konsultantas. DSS konsultantas gali suteikti jūsų rizikos vertinimui oficialų patvirtinimo ženklą. Patvirtinimo gali prašyti tik vartotojai, turintys „Valdyti" ar aukštesnio lygio teises.
  lv: Ir iespējams lūgt palīdzību riska novērtējuma aizpildīšanā vai likt veikt riska analīzi, ko validē DSV konsultants. DSV konsultants var piešķirt jūsu riska novērtējumam oficiālu validācijas zīmi. Validāciju var pieprasīt tikai lietotāji ar tiesību līmeni „Pārvaldīt" vai augstāku.
  mt: Huwa possibbli li titlob assistenza biex tlesti valutazzjoni tar-riskju jew biex tagħmel analiżi tar-riskju u tiġi vvalidata minn konsulent OSH. Konsulent OSH jista' jagħti lill-valutazzjoni tar-riskju tiegħek timbru ta' validazzjoni uffiċjali. Validazzjoni tista' tintalab biss minn utenti bil-livell ta' permess 'Immaniġġja' jew ogħla.
  nl: Het is mogelijk om hulp in te roepen bij het invullen van een risicoanalyse of een door u uitgevoerde risicoanalyse te laten valideren door een OSH-adviseur. Een OSH-adviseur kan uw risicobeoordeling een officieel als gevalideerd markeren. Een validatie kan alleen aangevraagd worden door gebruikers met het permissieniveau ‘Beheer’ of hoger.
  nl_BE: Het is mogelijk om hulp te vragen bij het invullen van een risicobeoordeling of om een risicoanalyse te laten uitvoeren en te laten valideren door een preventieadviseur. Een preventieadviseur kan uw risicobeoordeling een officieel validatiestempel geven. Een validatie kan alleen worden aangevraagd door gebruikers met het machtigingsniveau 'Beheren' of hoger.
  nl_be: Het is mogelijk om hulp te vragen bij het invullen van een risicobeoordeling of om een risicoanalyse te laten uitvoeren en te laten valideren door een preventieadviseur. Een preventieadviseur kan uw risicobeoordeling een officieel validatiestempel geven. Een validatie kan alleen worden aangevraagd door gebruikers met het machtigingsniveau 'Beheren' of hoger.
  'no': Det er mulig å be om hjelp til å fullføre en risikovurdering eller å få en risikoanalyse utført av deg og validert av en HMS-konsulent. En HMS-konsulent kan gi risikovurderingen din et offisielt valideringsmerke. En validering kan kun anmodes av brukere med tillatelsesnivå 'Administrer' eller høyere.
  pl: Możliwe jest złożenie prośby o pomoc w wypełnieniu oceny ryzyka lub zlecenie przeprowadzenia analizy ryzyka przez użytkownika i zwalidowania jej przez konsultanta BHP. Konsultant BHP może nadać ocenie ryzyka oficjalną pieczęć walidacji. Walidację mogą wnioskować tylko użytkownicy z poziomem uprawnień „Zarządzaj" lub wyższym.
  pt: É possível solicitar assistência no preenchimento de uma avaliação de riscos ou ter uma análise de riscos realizada por si e validada por um consultor de SST. Um consultor de SST pode atribuir à sua avaliação de riscos uma marca de validação oficial. Uma validação só pode ser solicitada por utilizadores com nível de permissão 'Gerir' ou superior.
  ro: Este posibil să solicitați asistență pentru completarea unei evaluări a riscurilor sau să aveți o analiză a riscurilor efectuată de dvs. și validată de un consultant SSM. Un consultant SSM poate acorda evaluării dvs. a riscurilor o marcă oficială de validare. O validare poate fi solicitată doar de utilizatorii cu nivelul de permisiune „Gestionare" sau superior.
  ru: Можно запросить помощь в заполнении оценки рисков или попросить провести анализ рисков, выполненный вами и подтверждённый консультантом по охране труда. Консультант по охране труда может присвоить вашей оценке рисков официальный знак подтверждения. Подтверждение может быть запрошено только пользователями с уровнем разрешений «Управление» или выше.
  sk: Je možné požiadať o pomoc pri vypracovaní hodnotenia rizika alebo nechať vykonať analýzu rizika a overiť ju poradcom BOZP. Poradca BOZP môže vášmu hodnoteniu rizika udeliť oficiálnu overovací pečiatku. Overenie môžu požadovať iba používatelia s úrovňou oprávnenia „Správa" alebo vyššou.
  sl: Mogoče je zaprositi za pomoč pri izpolnjevanju ocene tveganja ali pa imeti analizo tveganja, ki jo potrdi svetovalec za varnost in zdravje pri delu (VZD). Svetovalec VZD lahko vaši oceni tveganja podeli uradno potrditev. Potrditev lahko zahtevajo le uporabniki z ravnjo dovoljenja 'Upravljanje' ali višjo.
  sq: Është e mundur të kërkohet ndihmë për plotësimin e një vlerësimi të riskut ose të kryhet një analizë risku nga ju dhe të vërtetohet nga një konsulent i sigurisë dhe shëndetit në punë (SSHP). Një konsulent SSHP mund t'i japë vlerësimit tuaj të riskut një shenjë zyrtare vërtetimi. Vërtetimi mund të kërkohet vetëm nga përdoruesit me nivelin e lejes 'Menaxho' ose më të lartë.
  sr: Moguće je zatražiti pomoć u ispunjavanju procene rizika ili da analizu rizika potvrdi konsultant za bezbednost i zdravlje na radu (BZR). BZR konsultant može dati vašoj proceni rizika zvanični pečat potvrde. Potvrdu mogu tražiti samo korisnici sa nivoom dozvola 'Upravljanje' ili višim.
  sv: Det är möjligt att begära hjälp med att genomföra en riskbedömning eller att låta en riskanalys utföras och valideras av en arbetsmiljökonsult. En arbetsmiljökonsult kan ge din riskbedömning en officiell valideringsstämpel. En validering kan endast begäras av användare med behörighetsnivån 'Hantera' eller högre.
  uk: Можливо запросити допомогу у заповненні оцінки ризиків або провести аналіз ризиків, який буде виконано вами та підтверджено консультантом з охорони праці. Консультант з охорони праці може надати вашій оцінці ризиків офіційну позначку підтвердження. Підтвердження може бути запитано лише користувачами з рівнем дозволу 'Управляти' або вищим.
message_find_osh_consultant:
  bg: Намерете консултант по БЗР.
  ca: Trobeu un consultor de SST.
  cs: Najděte poradce BOZP.
  cy: Dewch o hyd i ymgynghorydd ISD.
  da: Find en OSH-konsulent.
  de: Finden Sie einen OSH-Berater.
  el: Βρείτε έναν σύμβουλο ΕΑΥ.
  en: Find an OSH consultant.
  es: Encuentre un consultor de SST.
  et: Leidke tööohutuse konsultant.
  fi: Etsi työturvallisuuskonsultti.
  fr: Trouvez un consultant en SST.
  ga: Faigh comhairleoir OSH.
  he: מצא יועץ בטיחות ובריאות תעסוקתית.
  hr: Pronađite savjetnika za ZNR.
  hu: Találjon munkahelyi egészségvédelmi és biztonsági tanácsadót.
  is: Finndu ráðgjafa um vinnuvernd.
  it: Trova un consulente SSL.
  lt: Raskite DSS konsultantą.
  lv: Atrodiet DSV konsultantu.
  mt: Sib konsulent tas-SSO.
  nl: Zoek een OSH-consulent.
  nl_BE: Zoek een preventieadviseur.
  nl_be: Zoek een preventieadviseur.
  'no': Finn en HMS-konsulent.
  pl: Znajdź konsultanta BHP.
  pt: Encontre um consultor de SST.
  ro: Găsiți un consultant SSM.
  ru: Найдите консультанта по ОТ.
  sk: Nájdite konzultanta BOZP.
  sl: Poiščite svetovalca za varnost in zdravje pri delu.
  sq: Gjeni një konsulent OSH.
  sr: Pronađite savetnika za zaštitu na radu.
  sv: Hitta en OSH-konsult.
  uk: Знайдіть консультанта з ОП.
message_help_action_plan_budget:
  bg: Въпреки че някои мерки не струват пари, повечето струват. Затова мерките трябва да бъдат включени в бюджета; при необходимост ги включете в годишния бюджетен цикъл.
  ca: Tot i que algunes mesures no costen diners, la majoria sí. Per tant, les mesures s'han de pressupostar; incloeu-les en el cicle pressupostari anual si cal.
  cs: Přestože některá opatření nic nestojí, většina ano. Opatření by proto měla být zahrnuta do rozpočtu; v případě potřeby je zařaďte do každoročního rozpočtového cyklu.
  cy: Er nad yw rhai mesurau'n costio unrhyw arian, mae'r rhan fwyaf yn gwneud. Dylid felly neilltuo cyllideb ar gyfer y mesurau; eu cynnwys yn y rownd gyllideb flynyddol os oes angen.
  da: Selvom nogle foranstaltninger ikke koster noget, gør de fleste. Foranstaltningerne bør derfor budgetteres; medtag dem om nødvendigt i den årlige budgetrunde.
  de: Obwohl einige Maßnahmen kein Geld kosten, tun dies die meisten. Die Maßnahmen sollten daher budgetiert werden; nehmen Sie sie gegebenenfalls in die jährliche Budgetplanung auf.
  el: Αν και ορισμένα μέτρα δεν κοστίζουν χρήματα, τα περισσότερα κοστίζουν. Τα μέτρα θα πρέπει επομένως να προϋπολογίζονται· εάν χρειάζεται, συμπεριλάβετέ τα στον ετήσιο κύκλο προϋπολογισμού.
  en: Although some measures do not cost any money, most do. The measures should therefore be budgeted for; include them in the annual budget round if necessary.
  es: Aunque algunas medidas no cuestan dinero, la mayoría sí. Por lo tanto, las medidas deben presupuestarse; inclúyalas en el ciclo presupuestario anual si es necesario.
  et: Kuigi mõned meetmed ei maksa midagi, maksab enamik. Seetõttu tuleks meetmed eelarvesse planeerida; vajaduse korral lisage need iga-aastasesse eelarveringi.
  fi: Vaikka jotkin toimenpiteet eivät maksa mitään, useimmat maksavat. Toimenpiteet tulisi siksi sisällyttää budjettiin; lisää ne tarvittaessa vuosittaiseen budjettikierrokseen.
  fr: Bien que certaines mesures ne coûtent rien, la plupart en ont un coût. Les mesures doivent donc être budgétisées ; incluez-les si nécessaire dans le cycle budgétaire annuel.
  ga: Cé nach gcosnaíonn roinnt beart aon airgead, cosnaíonn an chuid is mó. Ba chóir na bearta a chur san áireamh sa bhuiséad dá bhrí sin; más gá, cuir san áireamh iad sa timthriall bliantúil buiséadaithe.
  he: אף שחלק מהאמצעים אינם כרוכים בעלות כספית, רובם כן. לכן יש לתקצב את האמצעים; במידת הצורך יש לכלול אותם בסבב התקציב השנתי.
  hr: Iako neke mjere ne zahtijevaju financijska sredstva, većina ih zahtijeva. Stoga mjere treba uključiti u proračun; po potrebi ih uvrstite u godišnji proračunski ciklus.
  hu: Bár egyes intézkedések nem járnak költséggel, a legtöbb igen. Az intézkedéseket ezért be kell tervezni a költségvetésbe; szükség esetén vegye fel őket az éves költségvetési ciklusba.
  is: Þótt sumar ráðstafanir kosti ekkert, gera flestar það. Ráðstafanirnar ættu því að vera í fjárhagsáætlun; settu þær inn í árlegu fjárhagsáætlunarferlið ef þörf krefur.
  it: Sebbene alcune misure non comportino alcun costo, la maggior parte sì. Le misure dovrebbero quindi essere incluse nel budget; se necessario, inseritele nel ciclo annuale di bilancio.
  lt: Nors kai kurios priemonės nieko nekainuoja, dauguma kainuoja. Todėl priemones reikėtų įtraukti į biudžetą; prireikus įtraukite jas į metinį biudžeto planavimo ciklą.
  lv: Lai gan daži pasākumi nemaksā neko, lielākā daļa maksā. Tāpēc pasākumi jāiekļauj budžetā; ja nepieciešams, iekļaujiet tos ikgadējā budžeta plānošanas ciklā.
  mt: Għalkemm xi miżuri ma jiswew l-ebda flus, il-biċċa l-kbira jiswew. Għalhekk il-miżuri għandhom jiġu inklużi fil-baġit; jekk meħtieġ, inkludiha fiċ-ċiklu annwali tal-baġit.
  nl: Hoewel sommige maatregelen geen geld kosten, doen de meeste dat wel. De maatregelen moeten daarom worden begroot; neem ze zo nodig op in de jaarlijkse begrotingsronde.
  nl_BE: Hoewel sommige maatregelen geen geld kosten, doen de meeste dat wel. De maatregelen moeten daarom worden begroot; neem ze indien nodig op in de jaarlijkse begrotingsronde.
  nl_be: Hoewel sommige maatregelen geen geld kosten, doen de meeste dat wel. De maatregelen moeten daarom worden begroot; neem ze indien nodig op in de jaarlijkse begrotingsronde.
  'no': Selv om noen tiltak ikke koster penger, gjør de fleste det. Tiltakene bør derfor budsjetteres; ta dem med i den årlige budsjettrunden om nødvendig.
  pl: Chociaż niektóre środki nie wiążą się z kosztami, większość tak. Dlatego środki te powinny zostać uwzględnione w budżecie; w razie potrzeby należy je włączyć do corocznego cyklu budżetowego.
  pt: Embora algumas medidas não impliquem custos, a maioria implica. Por isso, as medidas devem ser orçamentadas; inclua-as no ciclo orçamental anual, se necessário.
  ro: Deși unele măsuri nu implică costuri, majoritatea implică. Prin urmare, măsurile ar trebui bugetate; includeți-le, dacă este necesar, în ciclul anual de buget.
  ru: Хотя некоторые меры не требуют финансовых затрат, большинство из них требует. Поэтому меры должны быть включены в бюджет; при необходимости включите их в ежегодный бюджетный цикл.
  sk: Hoci niektoré opatrenia nič nestoja, väčšina áno. Opatrenia by preto mali byť zahrnuté do rozpočtu; v prípade potreby ich zahrňte do ročného rozpočtového cyklu.
  sl: Čeprav nekateri ukrepi ne stanejo nič, večina stane. Ukrepe je zato treba vključiti v proračun; po potrebi jih vključite v letni proračunski cikel.
  sq: Megjithëse disa masa nuk kushtojnë asnjë para, shumica e tyre kushtojnë. Prandaj masat duhet të buxhetohen; përfshini ato në raundin vjetor të buxhetit nëse është e nevojshme.
  sr: Iako neke mere ne koštaju ništa, većina ih košta. Stoga mere treba budžetirati; uključite ih u godišnji budžetski krug ako je potrebno.
  sv: Även om vissa åtgärder inte kostar något gör de flesta det. Åtgärderna bör därför budgeteras; inkludera dem vid behov i den årliga budgetprocessen.
  uk: Хоча деякі заходи не потребують грошових витрат, більшість із них потребує. Тому заходи слід включити до бюджету; за необхідності включіть їх до щорічного бюджетного циклу.
message_help_action_plan_responsible:
  bg: Назначете лице във вашата организация, което да отговаря за изпълнението на тази мярка. Това лице ще има правомощията да предприеме стъпките, описани в плана, и/или отговорността да гарантира тяхното изпълнение.
  ca: Designeu algú a la vostra empresa perquè sigui responsable de la implementació d'aquesta mesura. Aquesta persona tindrà l'autoritat per prendre les mesures descrites al Pla i/o la responsabilitat d'assegurar-se que es duguin a terme.
  cs: Určete ve své organizaci osobu odpovědnou za provedení tohoto opatření. Tato osoba bude mít pravomoc podniknout kroky popsané v plánu a/nebo odpovědnost zajistit jejich realizaci.
  cy: Penodwch rywun yn eich cwmni i fod yn gyfrifol am weithredu'r mesur hwn. Bydd gan y person hwn yr awdurdod i gymryd y camau a ddisgrifir yn y Cynllun a/neu'r cyfrifoldeb i sicrhau eu bod yn cael eu cyflawni.
  da: Udpeg en person i din virksomhed, som er ansvarlig for gennemførelsen af denne foranstaltning. Denne person vil have beføjelse til at tage de skridt, der er beskrevet i planen, og/eller ansvaret for at sikre, at de bliver gennemført.
  de: Benennen Sie eine Person in Ihrem Unternehmen, die für die Umsetzung dieser Maßnahme verantwortlich ist. Diese Person hat die Befugnis, die im Plan beschriebenen Schritte einzuleiten und/oder die Verantwortung sicherzustellen, dass sie durchgeführt werden.
  el: Ορίστε ένα άτομο στην εταιρεία σας που θα είναι υπεύθυνο για την εφαρμογή αυτού του μέτρου. Το άτομο αυτό θα έχει την εξουσία να λάβει τα βήματα που περιγράφονται στο Σχέδιο και/ή την ευθύνη να διασφαλίσει ότι θα υλοποιηθούν.
  en: Appoint someone in your company to be responsible for the implementation of this measure. This person will have the authority to take the steps described in the Plan and/or the responsibility to ensure that they are carried out.
  es: Designe a una persona en su empresa responsable de la implementación de esta medida. Esta persona tendrá la autoridad para llevar a cabo los pasos descritos en el plan y/o la responsabilidad de garantizar que se realicen.
  et: Määrake oma ettevõttes isik, kes vastutab selle meetme rakendamise eest. Sellel isikul on volitus teha plaanis kirjeldatud samme ja/või vastutus tagada nende elluviimine.
  fi: Nimeä yrityksestäsi henkilö, joka vastaa tämän toimenpiteen toteuttamisesta. Tällä henkilöllä on valtuudet toteuttaa suunnitelmassa kuvatut vaiheet ja/tai vastuu varmistaa, että ne toteutetaan.
  fr: Désignez une personne dans votre entreprise responsable de la mise en œuvre de cette mesure. Cette personne aura l’autorité de prendre les mesures décrites dans le plan et/ou la responsabilité de veiller à ce qu’elles soient exécutées.
  ga: Ceap duine i do chuideachta a bheidh freagrach as an mbeart seo a chur i bhfeidhm. Beidh údarás ag an duine seo na céimeanna atá leagtha amach sa Phlean a ghlacadh agus/nó an fhreagracht a chinntiú go gcuirtear i gcrích iad.
  he: מנו אדם בארגון שלכם שיהיה אחראי ליישום אמצעי זה. לאדם זה תהיה הסמכות לבצע את הצעדים המתוארים בתכנית ו/או האחריות לוודא שהם מתבצעים.
  hr: Imenujte osobu u svojoj tvrtki odgovornu za provedbu ove mjere. Ta osoba će imati ovlasti poduzeti korake opisane u planu i/ili odgovornost osigurati njihovu provedbu.
  hu: Jelöljön ki a vállalatán belül egy személyt, aki felelős lesz ennek az intézkedésnek a végrehajtásáért. Ennek a személynek felhatalmazása lesz a tervben leírt lépések megtételére és/vagy felelőssége annak biztosítása, hogy azok megvalósuljanak.
  is: Tilnefndu einhvern í fyrirtækinu þínu til að bera ábyrgð á framkvæmd þessarar ráðstöfunar. Þessi einstaklingur mun hafa heimild til að taka skrefin sem lýst er í áætluninni og/eða ábyrgð á að tryggja að þau séu framkvæmd.
  it: Nomina una persona nella tua azienda responsabile dell’attuazione di questa misura. Questa persona avrà l’autorità di intraprendere le azioni descritte nel piano e/o la responsabilità di assicurarsi che vengano eseguite.
  lt: Paskirkite savo įmonėje asmenį, atsakingą už šios priemonės įgyvendinimą. Šis asmuo turės įgaliojimus atlikti plane aprašytus veiksmus ir (arba) atsakomybę užtikrinti, kad jie būtų įvykdyti.
  lv: Norīkojiet savā uzņēmumā personu, kas būs atbildīga par šī pasākuma īstenošanu. Šai personai būs pilnvaras veikt plānā aprakstītos soļus un/vai atbildība nodrošināt, ka tie tiek īstenoti.
  mt: Aħtar persuna fil-kumpanija tiegħek responsabbli għall-implimentazzjoni ta’ din il-miżura. Din il-persuna jkollha l-awtorità biex tieħu l-passi deskritti fil-pjan u/jew ir-responsabbiltà li tiżgura li dawn jitwettqu.
  nl: Wijs iemand in uw organisatie aan die verantwoordelijk is voor de uitvoering van deze maatregel. Deze persoon heeft de bevoegdheid om de in het plan beschreven stappen te nemen en/of de verantwoordelijkheid om erop toe te zien dat zij worden uitgevoerd.
  nl_BE: Wijs iemand in uw bedrijf aan om verantwoordelijk te zijn voor de uitvoering van deze maatregel. Deze persoon zal de bevoegdheid hebben om de in het Plan beschreven stappen te nemen en/of de verantwoordelijkheid om ervoor te zorgen dat ze worden uitgevoerd.
  nl_be: Wijs iemand in uw bedrijf aan om verantwoordelijk te zijn voor de uitvoering van deze maatregel. Deze persoon zal de bevoegdheid hebben om de in het Plan beschreven stappen te nemen en/of de verantwoordelijkheid om ervoor te zorgen dat ze worden uitgevoerd.
  'no': Utpek noen i selskapet ditt til å være ansvarlig for gjennomføringen av dette tiltaket. Denne personen vil ha myndighet til å ta de trinnene som er beskrevet i planen og/eller ansvaret for å sikre at de blir gjennomført.
  pl: Wyznacz w swojej firmie osobę odpowiedzialną za wdrożenie tego środka. Osoba ta będzie miała uprawnienia do podjęcia działań opisanych w planie i/lub odpowiedzialność za dopilnowanie ich realizacji.
  pt: Nomeie alguém na sua empresa responsável pela implementação desta medida. Essa pessoa terá autoridade para executar as etapas descritas no plano e/ou a responsabilidade de garantir que sejam realizadas.
  ro: Numiți o persoană din compania dumneavoastră responsabilă de implementarea acestei măsuri. Această persoană va avea autoritatea de a întreprinde pașii descriși în plan și/sau responsabilitatea de a se asigura că sunt realizați.
  ru: Назначьте в вашей компании ответственного за реализацию этой меры. Это лицо будет иметь полномочия предпринять шаги, описанные в Плане, и/или нести ответственность за их выполнение.
  sk: Určte vo svojej organizácii osobu zodpovednú za realizáciu tohto opatrenia. Táto osoba bude mať právomoc vykonať kroky opísané v pláne a/alebo zodpovednosť zabezpečiť ich vykonanie.
  sl: V svojem podjetju določite osebo, odgovorno za izvajanje tega ukrepa. Ta oseba bo imela pooblastila za izvedbo korakov, opisanih v načrtu, in/ali odgovornost, da zagotovi njihovo izvedbo.
  sq: Emëroni dikë në kompaninë tuaj që të jetë përgjegjës për zbatimin e kësaj mase. Ky person do të ketë autoritetin të ndërmarrë hapat e përshkruar në Plan dhe/ose përgjegjësinë për të siguruar që ato të kryhen.
  sr: Imenujte nekoga u vašoj kompaniji da bude odgovoran za sprovođenje ove mere. Ova osoba će imati ovlašćenje da preduzme korake opisane u Planu i/ili odgovornost da osigura da se oni sprovedu.
  sv: Utse en person i ditt företag som ansvarar för genomförandet av denna åtgärd. Denna person kommer att ha befogenhet att vidta de steg som beskrivs i planen och/eller ansvaret att säkerställa att de genomförs.
  uk: Призначте когось у вашій компанії відповідальним за впровадження цього заходу. Ця особа матиме повноваження вживати заходів, описаних у Плані, та/або нести відповідальність за їх виконання.
message_help_allow_certificates:
  bg: Ако тази опция е активирана, могат да се активират сертификати за инструментите OiRA в тази страна.
  ca: Si aquesta opció s'activa, es poden habilitar certificats en les eines OiRA d'aquest país.
  cs: Pokud je tato možnost aktivována, lze v této zemi povolit certifikáty v nástrojích OiRA.
  cy: Os yw'r opsiwn hwn wedi'i actifadu, gellir galluogi tystysgrifau ar offer OiRA yn y wlad hon.
  da: Hvis denne indstilling er aktiveret, kan certifikater aktiveres på OiRA-værktøjer i dette land.
  de: Wenn diese Option aktiviert ist, können Zertifikate für OiRA-Tools in diesem Land aktiviert werden.
  el: Εάν αυτή η επιλογή είναι ενεργοποιημένη, μπορούν να ενεργοποιηθούν πιστοποιητικά στα εργαλεία OiRA αυτής της χώρας.
  en: If this option is activated, certificates can be enabled on OiRA tools in this country.
  es: Si esta opción está activada, se pueden habilitar certificados en las herramientas OiRA de este país.
  et: Kui see valik on aktiveeritud, saab selle riigi OiRA tööriistades lubada sertifikaadid.
  fi: Jos tämä asetus on käytössä, OiRA-työkaluissa tässä maassa voidaan ottaa käyttöön sertifikaatit.
  fr: Si cette option est activée, des certificats peuvent être activés sur les outils OiRA dans ce pays.
  ga: Má tá an rogha seo gníomhach, is féidir deimhnithe a chumasú ar uirlisí OiRA sa tír seo.
  he: אם אפשרות זו מופעלת, ניתן לאפשר תעודות בכלי OiRA במדינה זו.
  hr: Ako je ova opcija aktivirana, mogu se omogućiti certifikati za OiRA alate u ovoj zemlji.
  hu: Ha ez az opció engedélyezve van, akkor ebben az országban engedélyezhetők a tanúsítványok az OiRA eszközökön.
  is: Ef þessi valkostur er virkjaður er hægt að virkja vottorð í OiRA verkfærum í þessum landi.
  it: Se questa opzione è attivata, i certificati possono essere abilitati sugli strumenti OiRA in questo paese.
  lt: Jei ši parinktis įjungta, šioje šalyje OiRA įrankiuose galima įjungti sertifikatus.
  lv: Ja šī opcija ir aktivēta, šajā valstī var iespējot sertifikātus OiRA rīkos.
  mt: Jekk din l-għażla tkun attivata, iċ-ċertifikati jistgħu jiġu attivati fuq l-għodod OiRA f’dan il-pajjiż.
  nl: Als deze optie is ingeschakeld, kunnen certificaten worden geactiveerd voor OiRA-tools in dit land.
  nl_BE: Als deze optie is geactiveerd, kunnen certificaten worden ingeschakeld op OiRA-tools in dit land.
  nl_be: Als deze optie is geactiveerd, kunnen certificaten worden ingeschakeld op OiRA-tools in dit land.
  'no': Hvis dette alternativet er aktivert, kan sertifikater aktiveres på OiRA-verktøy i dette landet.
  pl: Jeśli ta opcja jest aktywna, można włączyć certyfikaty w narzędziach OiRA w tym kraju.
  pt: Se esta opção estiver ativada, os certificados podem ser ativados nas ferramentas OiRA deste país.
  ro: Dacă această opțiune este activată, certificatele pot fi activate pentru instrumentele OiRA din această țară.
  ru: Если этот параметр активирован, сертификаты можно включить в инструментах OiRA в этой стране.
  sk: Ak je táto možnosť aktivovaná, v nástrojoch OiRA v tejto krajine je možné povoliť certifikáty.
  sl: Če je ta možnost omogočena, je mogoče omogočiti potrdila za orodja OiRA v tej državi.
  sq: Nëse ky opsion aktivizohet, certifikatat mund të aktivizohen në mjetet OiRA në këtë vend.
  sr: Ako je ova opcija aktivirana, sertifikati mogu biti omogućeni na OiRA alatima u ovoj zemlji.
  sv: Om det här alternativet är aktiverat kan certifikat aktiveras i OiRA-verktygen i detta land.
  uk: Якщо цей параметр активовано, сертифікати можна увімкнути в інструментах OiRA у цій країні.
message_help_allow_consultancy:
  bg: Ако тази опция е активирана, може да се активира консултантска дейност за инструментите OiRA в тази страна.
  ca: Si aquesta opció s'activa, es pot habilitar la consultoria en les eines OiRA d'aquest país.
  cs: Pokud je tato možnost aktivována, lze v této zemi povolit konzultace v nástrojích OiRA.
  cy: Os yw'r opsiwn hwn wedi'i actifadu, gellir galluogi ymgynghoriaeth ar offer OiRA yn y wlad hon.
  da: Hvis denne indstilling er aktiveret, kan konsulentbistand aktiveres på OiRA-værktøjer i dette land.
  de: Wenn diese Option aktiviert ist, kann Beratung für OiRA-Tools in diesem Land freigeschaltet werden.
  el: Εάν αυτή η επιλογή είναι ενεργοποιημένη, μπορεί να ενεργοποιηθεί η παροχή συμβουλευτικών υπηρεσιών στα εργαλεία OiRA αυτής της χώρας.
  en: If this option is activated, consultancy can be enabled on OiRA tools in this country.
  es: Si esta opción está activada, se puede habilitar la consultoría en las herramientas OiRA de este país.
  et: Kui see valik on aktiveeritud, saab selle riigi OiRA tööriistades lubada nõustamisteenuse.
  fi: Jos tämä asetus on käytössä, OiRA-työkaluissa tässä maassa voidaan ottaa käyttöön neuvontapalvelut.
  fr: Si cette option est activée, un service de conseil peut être activé sur les outils OiRA dans ce pays.
  ga: Má tá an rogha seo gníomhach, is féidir comhairliúchán a chumasú ar uirlisí OiRA sa tír seo.
  he: אם אפשרות זו מופעלת, ניתן לאפשר ייעוץ בכלי OiRA במדינה זו.
  hr: Ako je ova opcija aktivirana, može se omogućiti savjetovanje za OiRA alate u ovoj zemlji.
  hu: Ha ez az opció engedélyezve van, akkor ebben az országban engedélyezhető a tanácsadási funkció az OiRA eszközökön.
  is: Ef þessi valkostur er virkjaður er hægt að virkja ráðgjöf í OiRA verkfærum í þessum landi.
  it: Se questa opzione è attivata, la consulenza può essere abilitata sugli strumenti OiRA in questo paese.
  lt: Jei ši parinktis įjungta, šioje šalyje OiRA įrankiuose galima įjungti konsultavimo paslaugas.
  lv: Ja šī opcija ir aktivēta, šajā valstī var iespējot konsultāciju pakalpojumus OiRA rīkos.
  mt: Jekk din l-għażla tkun attivata, is-servizzi ta’ konsulenza jistgħu jiġu attivati fuq l-għodod OiRA f’dan il-pajjiż.
  nl: Als deze optie is ingeschakeld, kan adviesverlening worden geactiveerd voor OiRA-tools in dit land.
  nl_BE: Als deze optie is geactiveerd, kan consultancy worden ingeschakeld op OiRA-tools in dit land.
  nl_be: Als deze optie is geactiveerd, kan consultancy worden ingeschakeld op OiRA-tools in dit land.
  'no': Hvis dette alternativet er aktivert, kan konsultasjon aktiveres på OiRA-verktøy i dette landet.
  pl: Jeśli ta opcja jest aktywna, doradztwo może zostać włączone w narzędziach OiRA w tym kraju.
  pt: Se esta opção estiver ativada, a consultoria pode ser ativada nas ferramentas OiRA deste país.
  ro: Dacă această opțiune este activată, consultanța poate fi activată pentru instrumentele OiRA din această țară.
  ru: Если этот параметр активирован, консультации можно включить в инструментах OiRA в этой стране.
  sk: Ak je táto možnosť aktivovaná, v nástrojoch OiRA v tejto krajine je možné povoliť konzultačné služby.
  sl: Če je ta možnost omogočena, je mogoče omogočiti svetovanje za orodja OiRA v tej državi.
  sq: Nëse ky opsion aktivizohet, konsulenca mund të aktivizohet në mjetet OiRA në këtë vend.
  sr: Ako je ova opcija aktivirana, konsalting može biti omogućen na OiRA alatima u ovoj zemlji.
  sv: Om det här alternativet är aktiverat kan konsulttjänster aktiveras i OiRA-verktygen i detta land.
  uk: Якщо цей параметр активовано, консультування можна увімкнути в інструментах OiRA у цій країні.
message_help_allow_training:
  bg: Ако тази опция е активирана, може да се активира онлайн обучение за инструментите OiRA в тази страна.
  ca: Si aquesta opció s'activa, es pot habilitar una formació en línia en les eines OiRA d'aquest país.
  cs: Pokud je tato možnost aktivována, lze v této zemi povolit online školení v nástrojích OiRA.
  cy: Os yw'r opsiwn hwn wedi'i actifadu, gellir galluogi hyfforddiant ar-lein ar offer OiRA yn y wlad hon.
  da: Hvis denne indstilling er aktiveret, kan onlineundervisning aktiveres på OiRA-værktøjer i dette land.
  de: Wenn diese Option aktiviert ist, kann ein Online-Training für OiRA-Tools in diesem Land freigeschaltet werden.
  el: Εάν αυτή η επιλογή είναι ενεργοποιημένη, μπορεί να ενεργοποιηθεί μια διαδικτυακή εκπαίδευση στα εργαλεία OiRA αυτής της χώρας.
  en: If this option is activated, an online training can be enabled on OiRA tools in this country.
  es: Si esta opción está activada, se puede habilitar una formación en línea en las herramientas OiRA de este país.
  et: Kui see valik on aktiveeritud, saab selle riigi OiRA tööriistades lubada veebipõhise koolituse.
  fi: Jos tämä asetus on käytössä, OiRA-työkaluissa tässä maassa voidaan ottaa käyttöön verkkokoulutus.
  fr: Si cette option est activée, une formation en ligne peut être activée sur les outils OiRA dans ce pays.
  ga: Má tá an rogha seo gníomhach, is féidir oiliúint ar líne a chumasú ar uirlisí OiRA sa tír seo.
  he: אם אפשרות זו מופעלת, ניתן לאפשר הכשרה מקוונת בכלי OiRA במדינה זו.
  hr: Ako je ova opcija aktivirana, može se omogućiti online obuka za OiRA alate u ovoj zemlji.
  hu: Ha ez az opció engedélyezve van, akkor ebben az országban engedélyezhető az online képzés az OiRA eszközökön.
  is: Ef þessi valkostur er virkjaður er hægt að virkja netnám í OiRA verkfærum í þessum landi.
  it: Se questa opzione è attivata, è possibile abilitare una formazione online sugli strumenti OiRA in questo paese.
  lt: Jei ši parinktis įjungta, šioje šalyje OiRA įrankiuose galima įjungti internetinį mokymą.
  lv: Ja šī opcija ir aktivēta, šajā valstī var iespējot tiešsaistes apmācību OiRA rīkos.
  mt: Jekk din l-għażla tkun attivata, taħriġ onlajn jistaʼ jiġi attivat fuq l-għodod OiRA f’dan il-pajjiż.
  nl: Als deze optie is ingeschakeld, kan online training worden geactiveerd voor OiRA-tools in dit land.
  nl_BE: Als deze optie is geactiveerd, kan een online training worden ingeschakeld op OiRA-tools in dit land.
  nl_be: Als deze optie is geactiveerd, kan een online training worden ingeschakeld op OiRA-tools in dit land.
  'no': Hvis dette alternativet er aktivert, kan nettbasert opplæring aktiveres på OiRA-verktøy i dette landet.
  pl: Jeśli ta opcja jest aktywna, można włączyć szkolenie online w narzędziach OiRA w tym kraju.
  pt: Se esta opção estiver ativada, pode ser ativada uma formação online nas ferramentas OiRA deste país.
  ro: Dacă această opțiune este activată, poate fi activată o instruire online pentru instrumentele OiRA din această țară.
  ru: Если этот параметр активирован, онлайн-обучение можно включить в инструментах OiRA в этой стране.
  sk: Ak je táto možnosť aktivovaná, v nástrojoch OiRA v tejto krajine je možné povoliť online školenie.
  sl: Če je ta možnost omogočena, je mogoče omogočiti spletno usposabljanje za orodja OiRA v tej državi.
  sq: Nëse ky opsion aktivizohet, një trajnim online mund të aktivizohet në mjetet OiRA në këtë vend.
  sr: Ako je ova opcija aktivirana, online obuka može biti omogućena na OiRA alatima u ovoj zemlji.
  sv: Om det här alternativet är aktiverat kan en onlineträning aktiveras i OiRA-verktygen i detta land.
  uk: Якщо цей параметр активовано, онлайн-навчання можна увімкнути в інструментах OiRA у цій країні.
message_help_available_reports:
  bg: Изберете какви видове отчети ще бъдат достъпни за потребителите.
  ca: Seleccioneu quins tipus d'informes estaran disponibles per als usuaris.
  cs: Vyberte, které typy zpráv budou uživatelům zpřístupněny.
  cy: Dewiswch pa fathau o adroddiadau fydd ar gael i ddefnyddwyr.
  da: Vælg hvilke rapporttyper der skal være tilgængelige for brugerne.
  de: Wählen Sie aus, welche Berichtstypen den Nutzern zur Verfügung gestellt werden.
  el: Επιλέξτε ποιοι τύποι αναφορών θα είναι διαθέσιμοι στους χρήστες.
  en: Select which types of reports will be made available to users.
  es: Selecciona qué tipos de informes estarán disponibles para los usuarios.
  et: Vali, millised aruannetüübid tehakse kasutajatele kättesaadavaks.
  fi: Valitse, mitkä raporttityypit tarjotaan käyttäjille.
  fr: Sélectionnez quels types de rapports seront mis à la disposition des utilisateurs.
  ga: Roghnaigh cé na cineálacha tuarascálacha a chuirfear ar fáil d’úsáideoirí.
  he: בחר אילו סוגי דוחות יהיו זמינים למשתמשים.
  hr: Odaberite koje vrste izvješća će biti dostupne korisnicima.
  hu: Válassza ki, hogy milyen jelentéstípusok legyenek elérhetők a felhasználók számára.
  is: Veldu hvaða tegundir skýrslna verða gerðar notendum aðgengilegar.
  it: Seleziona quali tipi di report saranno messi a disposizione degli utenti.
  lt: Pasirinkite, kokie ataskaitų tipai bus prieinami naudotojams.
  lv: Izvēlies, kuri pārskatu veidi būs pieejami lietotājiem.
  mt: Agħżel liema tipi taʼ rapporti se jkunu disponibbli għall-utenti.
  nl: Selecteer welke rapporttypen beschikbaar gesteld worden aan de gebruikers.
  nl_BE: Selecteer welke soorten rapporten beschikbaar worden gesteld aan gebruikers.
  nl_be: Selecteer welke soorten rapporten beschikbaar worden gesteld aan gebruikers.
  'no': Velg hvilke typer rapporter som skal gjøres tilgjengelige for brukere.
  pl: Wybierz, które typy raportów będą dostępne dla użytkowników.
  pt: Selecione quais tipos de relatórios estarão disponíveis para os utilizadores.
  ro: Selectați ce tipuri de rapoarte vor fi disponibile pentru utilizatori.
  ru: Выберите, какие типы отчётов будут доступны пользователям.
  sk: Vyberte, ktoré typy správ budú k dispozícii používateľom.
  sl: Izberite, katere vrste poročil bodo na voljo uporabnikom.
  sq: Zgjidhni cilat lloje raportesh do të vihen në dispozicion të përdoruesve.
  sr: Odaberite koje vrste izveštaja će biti dostupne korisnicima.
  sv: Välj vilka rapporttyper som ska göras tillgängliga för användarna.
  uk: Виберіть, які типи звітів будуть доступні користувачам.
message_help_certificate_completion_threshhold:
  bg: След като процентът на завършване на сесията надвиши този праг, потребителят ще получи сертификат.
  ca: Quan la taxa de finalització d'una sessió superi aquest límit, l'usuari obtindrà un certificat.
  cs: Po překročení této hodnoty dokončení relace uživatel obdrží certifikát.
  cy: Ar ôl i gyfradd cwblhau sesiwn fod yn fwy na'r terfyn hwn, bydd y defnyddiwr yn ennill tystysgrif.
  da: Når gennemførelsesgraden for en session overstiger denne grænse, modtager brugeren et certifikat.
  de: Wenn die Abschlussrate einer Sitzung diesen Schwellenwert überschreitet, erhält der Benutzer ein Zertifikat.
  el: Όταν το ποσοστό ολοκλήρωσης μιας συνεδρίας υπερβαίνει αυτό το όριο, ο χρήστης θα λάβει πιστοποιητικό.
  en: After a session completion rate is greater than this limit the user will earn a certificate.
  es: Una vez que la tasa de finalización de una sesión supere este umbral, el usuario obtendrá un certificado.
  et: Kui seansi lõpetamise määr ületab selle piiri, saab kasutaja tunnistuse.
  fi: Kun istunnon suoritusaste ylittää tämän kynnyksen, käyttäjä saa todistuksen.
  fr: Une fois que le taux d’achèvement d’une session dépasse ce seuil, l’utilisateur recevra un certificat.
  ga: Nuair a sháraíonn ráta críochnaithe seisiúin an tairseach seo, gheobhaidh an t-úsáideoir teastas.
  he: לאחר ששיעור ההשלמה של ההפעלה יעלה על סף זה, המשתמש יקבל תעודה.
  hr: Nakon što stopa završetka sesije premaši ovu granicu, korisnik će dobiti certifikat.
  hu: Ha az ülés teljesítési aránya meghaladja ezt a küszöbértéket, a felhasználó tanúsítványt kap.
  is: Þegar lokageta lotu er hærri en þessi takmörk mun notandinn fá vottorð.
  it: Dopo che il tasso di completamento di una sessione supera questa soglia, l’utente riceverà un certificato.
  lt: Kai sesijos užbaigimo rodiklis viršija šią ribą, vartotojas gaus pažymėjimą.
  lv: Kad sesijas pabeigšanas rādītājs pārsniedz šo slieksni, lietotājs saņems sertifikātu.
  mt: Wara li r-rata ta’ tlestija tas-sessjoni tkun ogħla minn dan il-limitu, l-utent jirċievi ċertifikat.
  nl: Nadat de voltooiingsgraad van een sessie deze drempel overschrijdt, ontvangt de gebruiker een certificaat.
  nl_BE: Wanneer de voltooiingsgraad van een sessie hoger is dan deze limiet, ontvangt de gebruiker een certificaat.
  nl_be: Wanneer de voltooiingsgraad van een sessie hoger is dan deze limiet, ontvangt de gebruiker een certificaat.
  'no': Etter at en økts fullføringsrate er større enn denne grensen, vil brukeren motta et sertifikat.
  pl: Gdy wskaźnik ukończenia sesji przekroczy ten próg, użytkownik otrzyma certyfikat.
  pt: Após a taxa de conclusão de uma sessão ultrapassar este limite, o utilizador receberá um certificado.
  ro: După ce rata de finalizare a unei sesiuni depășește acest prag, utilizatorul va primi un certificat.
  ru: После того как уровень завершения сеанса превысит это ограничение, пользователь получит сертификат.
  sk: Keď miera dokončenia relácie presiahne túto hranicu, používateľ získa certifikát.
  sl: Ko stopnja dokončanja seje preseže ta prag, bo uporabnik prejel potrdilo.
  sq: Pasi shkalla e përfundimit të sesionit të jetë më e madhe se ky kufi, përdoruesi do të fitojë një certifikatë.
  sr: Nakon što stopa završenosti sesije bude veća od ovog ograničenja, korisnik će dobiti sertifikat.
  sv: När en sessions slutförandegrad överstiger denna gräns, får användaren ett certifikat.
  uk: Після того як рівень завершення сеансу перевищить це обмеження, користувач отримає сертифікат.
message_help_certificate_explanatory_sentence:
  bg: Кратко обяснение, което се показва на потребителя след достигане на началния праг. Може да се използва за насочване към външен уебсайт с допълнителна информация.
  ca: Una breu explicació que es mostra a l'usuari després d'assolir el llindar inicial. Podeu utilitzar-la per apuntar a un lloc web extern que proporcioni més informació.
  cs: Krátké vysvětlení zobrazené uživateli po dosažení počátečního prahu. Můžete jej použít k odkazu na externí web s dalšími informacemi.
  cy: Esboniad byr a ddangosir i'r defnyddiwr ar ôl cyrraedd y trothwy cychwynnol. Gallwch ddefnyddio hwn i gyfeirio at wefan allanol sy'n darparu mwy o wybodaeth.
  da: En kort forklaring, som vises til brugeren efter opnåelse af startgrænsen. Du kan bruge den til at henvise til et eksternt websted med flere oplysninger.
  de: Eine kurze Erklärung, die dem Benutzer nach Erreichen der Anfangsschwelle angezeigt wird. Sie können dies nutzen, um auf eine externe Website mit weiteren Informationen zu verweisen.
  el: Μια σύντομη επεξήγηση που εμφανίζεται στον χρήστη μετά την επίτευξη του αρχικού ορίου. Μπορείτε να τη χρησιμοποιήσετε για να παραπέμψετε σε έναν εξωτερικό ιστότοπο με περισσότερες πληροφορίες.
  en: A short explanation that is shown to the user after reaching the initial threshold. You can use this to point to an external website that provides more information.
  es: Una breve explicación que se muestra al usuario tras alcanzar el umbral inicial. Puede utilizarse para enlazar con un sitio web externo con más información.
  et: Lühike selgitus, mis kuvatakse kasutajale pärast algtaseme saavutamist. Seda saab kasutada viitena välisele veebilehele, kus on rohkem teavet.
  fi: Lyhyt selitys, joka näytetään käyttäjälle, kun alkukynnys on saavutettu. Tämän avulla voit ohjata käyttäjän ulkoiselle verkkosivustolle, josta saa lisätietoja.
  fr: Une brève explication affichée à l’utilisateur après avoir atteint le seuil initial. Vous pouvez l’utiliser pour rediriger vers un site externe fournissant plus d’informations.
  ga: Míniú gairid a thaispeántar don úsáideoir tar éis dóibh an tairseach tosaigh a bhaint amach. Is féidir leat é a úsáid chun nasc a dhéanamh le suíomh gréasáin seachtrach a sholáthraíonn tuilleadh eolais.
  he: הסבר קצר שמוצג למשתמש לאחר שהגיע לסף הראשוני. ניתן להשתמש בו כדי להפנות לאתר חיצוני המספק מידע נוסף.
  hr: Kratko objašnjenje koje se prikazuje korisniku nakon što postigne početni prag. Možete ga koristiti za upućivanje na vanjsku web stranicu s dodatnim informacijama.
  hu: Rövid magyarázat, amely a felhasználónak a kezdeti küszöbérték elérése után jelenik meg. Használható külső weboldalra való hivatkozáshoz, ahol további információ található.
  is: Stutt skýring sem birtist notandanum eftir að upphafslágmarkið er náð. Þú getur notað þetta til að benda á ytri vefsíðu sem veitir frekari upplýsingar.
  it: Una breve spiegazione mostrata all’utente dopo il raggiungimento della soglia iniziale. Puoi usarla per indirizzare a un sito esterno con ulteriori informazioni.
  lt: Trumpas paaiškinimas, kuris rodomas naudotojui pasiekus pradinį slenkstį. Galite jį naudoti norėdami nukreipti į išorinę svetainę su daugiau informacijos.
  lv: Īss paskaidrojums, kas tiek parādīts lietotājam pēc sākotnējā sliekšņa sasniegšanas. To var izmantot, lai norādītu uz ārēju tīmekļa vietni ar papildu informāciju.
  mt: Spjegazzjoni qasira li tintwera lill-utent wara li jintlaħaq il-limitu inizjali. Tistaʼ tużaha biex tipponta lejn websajt esterna li tipprovdi aktar informazzjoni.
  nl: Een korte uitleg die aan de gebruiker wordt getoond nadat de initiële drempel is bereikt. U kunt dit gebruiken om te verwijzen naar een externe website met meer informatie.
  nl_BE: Een korte uitleg die aan de gebruiker wordt getoond nadat de initiële drempelwaarde is bereikt. U kunt dit gebruiken om te verwijzen naar een externe website die meer informatie biedt.
  nl_be: Een korte uitleg die aan de gebruiker wordt getoond nadat de initiële drempelwaarde is bereikt. U kunt dit gebruiken om te verwijzen naar een externe website die meer informatie biedt.
  'no': En kort forklaring som vises til brukeren etter å ha nådd den innledende terskelen. Du kan bruke dette til å peke til et eksternt nettsted som gir mer informasjon.
  pl: Krótkie wyjaśnienie wyświetlane użytkownikowi po osiągnięciu początkowego progu. Można je wykorzystać do wskazania zewnętrznej strony internetowej z dodatkowymi informacjami.
  pt: Uma breve explicação apresentada ao utilizador após atingir o limite inicial. Pode usá-la para apontar para um site externo com mais informações.
  ro: O scurtă explicație afișată utilizatorului după atingerea pragului inițial. Puteți folosi acest text pentru a trimite către un site extern cu mai multe informații.
  ru: Краткое пояснение, которое отображается пользователю после достижения начального порога. Вы можете использовать это для ссылки на внешний веб-сайт с дополнительной информацией.
  sk: Krátke vysvetlenie zobrazené používateľovi po dosiahnutí počiatočného prahu. Môžete ho použiť na odkazovanie na externú webovú stránku s ďalšími informáciami.
  sl: Kratka razlaga, prikazana uporabniku po doseženem začetnem pragu. Uporabite jo lahko za preusmeritev na zunanjo spletno stran z dodatnimi informacijami.
  sq: Një shpjegim i shkurtër që i shfaqet përdoruesit pas arritjes së pragut fillestar. Mund ta përdorni këtë për të treguar drejt një faqeje interneti të jashtme që ofron më shumë informacion.
  sr: Kratko objašnjenje koje se prikazuje korisniku nakon dostizanja početnog praga. Možete ovo koristiti da uputite na spoljni veb-sajt koji pruža više informacija.
  sv: En kort förklaring som visas för användaren efter att ha nått den inledande tröskeln. Den kan användas för att länka till en extern webbplats med mer information.
  uk: Коротке пояснення, яке відображається користувачеві після досягнення початкового порогу. Ви можете використовувати це для посилання на зовнішній веб-сайт з додатковою інформацією.
message_help_certificate_initial_threshhold:
  bg: След като процентът на завършване на сесията надвиши този праг, потребителят ще бъде информиран за възможността да получи сертификат.
  ca: Quan la taxa de finalització d'una sessió superi aquest límit, s'informarà l'usuari de la possibilitat d'obtenir un certificat.
  cs: Po překročení této hodnoty dokončení relace bude uživatel informován o možnosti získání certifikátu.
  cy: Ar ôl i gyfradd cwblhau sesiwn fod yn fwy na'r terfyn hwn, bydd y defnyddiwr yn cael gwybod am y posibilrwydd o ennill tystysgrif.
  da: Når gennemførelsesgraden for en session overstiger denne grænse, informeres brugeren om muligheden for at opnå et certifikat.
  de: Wenn die Abschlussrate einer Sitzung diesen Schwellenwert überschreitet, wird der Benutzer über die Möglichkeit informiert, ein Zertifikat zu erhalten.
  el: Όταν το ποσοστό ολοκλήρωσης μιας συνεδρίας υπερβαίνει αυτό το όριο, ο χρήστης θα ενημερωθεί για τη δυνατότητα απόκτησης πιστοποιητικού.
  en: After a session completion rate is greater than this limit, the user will be informed about the possibility to earn a certificate.
  es: Una vez que la tasa de finalización de una sesión supere este umbral, se informará al usuario sobre la posibilidad de obtener un certificado.
  et: Kui seansi lõpetamise määr ületab selle piiri, teavitatakse kasutajat võimalusest saada tunnistus.
  fi: Kun istunnon suoritusaste ylittää tämän kynnyksen, käyttäjälle ilmoitetaan mahdollisuudesta saada todistus.
  fr: Une fois que le taux d’achèvement d’une session dépasse ce seuil, l’utilisateur sera informé de la possibilité d’obtenir un certificat.
  ga: Nuair a sháraíonn ráta críochnaithe seisiúin an tairseach seo, cuirfear an t-úsáideoir ar an eolas faoi fhéidearthacht teastas a ghnóthú.
  he: לאחר ששיעור ההשלמה של ההפעלה יעלה על סף זה, המשתמש יקבל הודעה על האפשרות לקבל תעודה.
  hr: Nakon što stopa završetka sesije premaši ovu granicu, korisnik će biti obaviješten o mogućnosti stjecanja certifikata.
  hu: Ha az ülés teljesítési aránya meghaladja ezt a küszöbértéket, a felhasználó tájékoztatást kap a tanúsítvány megszerzésének lehetőségéről.
  is: Þegar lokageta lotu er hærri en þessi takmörk verður notandinn upplýstur um möguleikann á að fá vottorð.
  it: Dopo che il tasso di completamento di una sessione supera questa soglia, l’utente verrà informato della possibilità di ottenere un certificato.
  lt: Kai sesijos užbaigimo rodiklis viršija šią ribą, vartotojas bus informuotas apie galimybę gauti pažymėjimą.
  lv: Kad sesijas pabeigšanas rādītājs pārsniedz šo slieksni, lietotājs tiks informēts par iespēju iegūt sertifikātu.
  mt: Wara li r-rata ta’ tlestija tas-sessjoni tkun ogħla minn dan il-limitu, l-utent jiġi informat dwar il-possibbiltà li jikseb ċertifikat.
  nl: Nadat de voltooiingsgraad van een sessie deze drempel overschrijdt, wordt de gebruiker geïnformeerd over de mogelijkheid om een certificaat te behalen.
  nl_BE: Wanneer de voltooiingsgraad van een sessie hoger is dan deze limiet, wordt de gebruiker geïnformeerd over de mogelijkheid om een certificaat te verdienen.
  nl_be: Wanneer de voltooiingsgraad van een sessie hoger is dan deze limiet, wordt de gebruiker geïnformeerd over de mogelijkheid om een certificaat te verdienen.
  'no': Etter at en økts fullføringsrate er større enn denne grensen, vil brukeren bli informert om muligheten til å motta et sertifikat.
  pl: Gdy wskaźnik ukończenia sesji przekroczy ten próg, użytkownik zostanie poinformowany o możliwości uzyskania certyfikatu.
  pt: Após a taxa de conclusão de uma sessão ultrapassar este limite, o utilizador será informado da possibilidade de obter um certificado.
  ro: După ce rata de finalizare a unei sesiuni depășește acest prag, utilizatorul va fi informat despre posibilitatea de a obține un certificat.
  ru: После того как уровень завершения сеанса превысит это ограничение, пользователь будет уведомлён о возможности получить сертификат.
  sk: Keď miera dokončenia relácie presiahne túto hranicu, používateľ bude informovaný o možnosti získať certifikát.
  sl: Ko stopnja dokončanja seje preseže ta prag, bo uporabnik obveščen o možnosti pridobitve potrdila.
  sq: Pasi shkalla e përfundimit të sesionit të jetë më e madhe se ky kufi, përdoruesi do të informohet për mundësinë e fitimit të një certifikate.
  sr: Nakon što stopa završenosti sesije bude veća od ovog ograničenja, korisnik će biti obavešten o mogućnosti da dobije sertifikat.
  sv: När en sessions slutförandegrad överstiger denna gräns, informeras användaren om möjligheten att erhålla ett certifikat.
  uk: Після того як рівень завершення сеансу перевищить це обмеження, користувач буде поінформований про можливість отримати сертифікат.
message_help_compact_report_options:
  bg: Изберете кои незадължителни елементи да бъдат включени в съкратения доклад.
  ca: Seleccioneu quins elements opcionals s'utilitzen en l'informe compacte.
  cs: Vyberte, které volitelné prvky budou použity ve zkrácené zprávě.
  cy: Dewiswch pa elfennau dewisol a ddefnyddir yn yr adroddiad cryno.
  da: Vælg hvilke valgfrie elementer der skal medtages i den kompakte rapport.
  de: Wählen Sie aus, welche optionalen Elemente im kompakten Bericht verwendet werden.
  el: Επιλέξτε ποια προαιρετικά στοιχεία θα συμπεριληφθούν στην συνοπτική αναφορά.
  en: Select which optional elements are used in the compact report.
  es: Selecciona qué elementos opcionales se incluirán en el informe compacto.
  et: Vali, millised valikulised elemendid kaasatakse lühiraportisse.
  fi: Valitse, mitkä valinnaiset osat sisällytetään tiivistettyyn raporttiin.
  fr: Sélectionnez quels éléments optionnels sont inclus dans le rapport compact.
  ga: Roghnaigh cé na heilimintí roghnacha a úsáidfear sa tuarascáil chomhdhlúite.
  he: בחר אילו רכיבים אופציונליים ייכללו בדוח המקוצר.
  hr: Odaberite koji će se opcionalni elementi koristiti u sažetom izvješću.
  hu: Válassza ki, mely választható elemek szerepeljenek a tömör jelentésben.
  is: Veldu hvaða valkvæðar einingar eru notaðar í þéttu skýrslunni.
  it: Seleziona quali elementi opzionali includere nel rapporto compatto.
  lt: Pasirinkite, kurie pasirinktiniai elementai bus naudojami glaustame pranešime.
  lv: Izvēlies, kuri papildu elementi tiks iekļauti kompaktajā ziņojumā.
  mt: Agħżel liema elementi fakultattivi jiġu inklużi fir-rapport kompatt.
  nl: Selecteer welke optionele elementen worden opgenomen in het compacte rapport.
  nl_BE: Selecteer welke optionele elementen worden gebruikt in het compacte rapport.
  nl_be: Selecteer welke optionele elementen worden gebruikt in het compacte rapport.
  'no': Velg hvilke valgfrie elementer som brukes i den kompakte rapporten.
  pl: Wybierz, które opcjonalne elementy mają być uwzględnione w skróconym raporcie.
  pt: Selecione quais elementos opcionais são utilizados no relatório compacto.
  ro: Selectați care elemente opționale vor fi utilizate în raportul compact.
  ru: Выберите, какие дополнительные элементы используются в компактном отчёте.
  sk: Vyberte, ktoré voliteľné prvky budú použité v skrátenej správe.
  sl: Izberite, kateri izbirni elementi bodo vključeni v strnjeno poročilo.
  sq: Zgjidhni cilat elemente opsionale përdoren në raportin kompakt.
  sr: Odaberite koji opcioni elementi se koriste u kompaktnom izveštaju.
  sv: Välj vilka valfria delar som ska användas i den kompakta rapporten.
  uk: Виберіть, які необов'язкові елементи використовуються у компактному звіті.
message_help_duplicate_name:
  bg: Това е името на новата версия на този инструмент. Името е само за редактори и никога няма да се показва на потребителите на инструмента.
  ca: Aquest és el nom de la nova versió d'aquesta eina. El nom és només per als editors i no es mostrarà mai als usuaris de l'eina.
  cs: Toto je název nové verze tohoto nástroje. Název je určen pouze pro editory a nikdy se nezobrazí uživatelům nástroje.
  cy: Dyma enw fersiwn newydd yr offeryn hwn. Dim ond i olygyddion y mae'r enw ac ni chaiff ei ddangos byth i ddefnyddwyr yr offeryn.
  da: Dette er navnet på den nye version af dette værktøj. Navnet er kun til redaktører og vil aldrig blive vist for brugerne af værktøjet.
  de: Dies ist der Name der neuen Version dieses Tools. Der Name ist nur für Redakteure bestimmt und wird den Benutzern des Tools niemals angezeigt.
  el: Αυτό είναι το όνομα της νέας έκδοσης αυτού του εργαλείου. Το όνομα είναι μόνο για επεξεργαστές και δεν θα εμφανιστεί ποτέ στους χρήστες του εργαλείου.
  en: This is the name of the new version of this tool. The name is only for editors and will never be shown to users of the tool.
  es: Este es el nombre de la nueva versión de esta herramienta. El nombre es solo para editores y nunca se mostrará a los usuarios de la herramienta.
  et: See on uue versiooni nimi sellest tööriistast. Nimi on ainult toimetajatele ja seda ei kuvata kunagi tööriista kasutajatele.
  fi: Tämä on uuden version nimi tästä työkalusta. Nimi on vain toimittajille eikä sitä koskaan näytetä työkalun käyttäjille.
  fr: Ceci est le nom de la nouvelle version de cet outil. Le nom est réservé aux éditeurs et ne sera jamais affiché aux utilisateurs de l'outil.
  ga: Is é seo ainm an leagan nua den uirlis seo. Is le h-údair amháin an t-ainm agus ní thaispeánfar do úsáideoirí an uirlis go deo.
  he: זהו שם הגרסה החדשה של הכלי הזה. השם הוא רק לעורכים ולעולם לא יוצג למשתמשי הכלי.
  hr: Ovo je ime nove verzije ovog alata. Ime je samo za urednike i nikada neće biti prikazano korisnicima alata.
  hu: Ez a név az új verzió neve ennek az eszköznek. A név csak szerkesztőknek szól, és soha nem jelenik meg az eszköz felhasználóinak.
  is: Þetta er heiti á nýrri útgáfu þessa verkfæris. Heitið er aðeins fyrir ritstjóra og verður aldrei sýnt notendum verkfærisins.
  it: Questo è il nome della nuova versione di questo strumento. Il nome è solo per gli editori e non verrà mai mostrato agli utenti dello strumento.
  lt: Tai yra šio įrankio naujos versijos pavadinimas. Pavadinimas skirtas tik redaktoriams ir niekada nebus rodomas įrankio naudotojams.
  lv: Tas ir jaunās versijas nosaukums šim rīkam. Nosaukums ir tikai redaktoriem un nekad netiks rādīts rīka lietotājiem.
  mt: Dan hu l-isem tal-verżjoni l-ġdida ta' dan l-għodda. L-isem huwa biss għall-edituri u qatt ma jidher lill-utenti tal-għodda.
  nl: Dit is de naam van de nieuwe versie van deze tool. De naam is alleen voor redacteuren en zal nooit worden getoond aan gebruikers van de tool.
  nl_BE: Dit is de naam van de nieuwe versie van dit hulpmiddel. De naam is alleen voor redacteurs en zal nooit worden getoond aan gebruikers van het hulpmiddel.
  nl_be: Dit is de naam van de nieuwe versie van dit hulpmiddel. De naam is alleen voor redacteurs en zal nooit worden getoond aan gebruikers van het hulpmiddel.
  'no': Dette er navnet på den nye versjonen av dette verktøyet. Navnet er kun for redaktører og vil aldri vises til brukere av verktøyet.
  pl: To jest nazwa nowej wersji tego narzędzia. Nazwa jest przeznaczona tylko dla redaktorów i nigdy nie będzie wyświetlana użytkownikom narzędzia.
  pt: Este é o nome da nova versão desta ferramenta. O nome é apenas para editores e nunca será mostrado aos usuários da ferramenta.
  ro: Acesta este numele noii versiuni a acestei unelte. Numele este doar pentru editori și nu va fi niciodată afișat utilizatorilor uneltei.
  ru: Это название новой версии данного инструмента. Название предназначено только для редакторов и никогда не будет показано пользователям инструмента.
  sk: Toto je názov novej verzie tohto nástroja. Názov je určený iba pre editorov a nikdy sa nezobrazí používateľom nástroja.
  sl: To je ime nove različice tega orodja. Ime je namenjeno samo urednikom in nikoli ne bo prikazano uporabnikom orodja.
  sq: Ky është emri i versionit të ri të këtij mjeti. Emri është vetëm për redaktorët dhe nuk do t'u shfaqet kurrë përdoruesve të mjetit.
  sr: Ovo je naziv nove verzije ovog alata. Naziv je samo za urednike i nikada neće biti prikazan korisnicima alata.
  sv: Detta är namnet på den nya versionen av detta verktyg. Namnet är endast för redaktörer och kommer aldrig att visas för användarna av verktyget.
  uk: Це назва нової версії цього інструменту. Назва призначена лише для редакторів і ніколи не буде показана користувачам інструменту.
message_help_force_open_sections:
  bg: Посочете дали и кои секции трябва да бъдат отворени по подразбиране. Изследвания показват, че потребителите по-вероятно ще завършат оценката на риска, когато секциите са първоначално затворени. Потребителите обикновено сами отварят необходимите им части. Когато потребител отвори или затвори секция, това предпочитание се запазва локално в браузъра. По този начин приложението автоматично се адаптира към поведението на потребителя.
  ca: Indiqueu si les seccions han d'estar obertes per defecte i quines. Les investigacions mostren que els usuaris tenen més probabilitats de completar una avaluació de riscos ràpidament quan les seccions estan inicialment tancades. Els usuaris tendeixen a obrir ells mateixos les parts que necessiten. Quan un usuari obre o tanca una secció, aquesta preferència es desa localment al navegador. D'aquesta manera, l'aplicació s'adapta automàticament al comportament de l'usuari.
  cs: Určete, které sekce by měly být ve výchozím nastavení otevřené. Výzkumy ukazují, že uživatelé mají větší pravděpodobnost dokončení hodnocení rizik, když jsou sekce zpočátku zavřené. Uživatelé obvykle sami otevírají části, které potřebují. Když uživatel otevře nebo zavře sekci, tato preference se uloží lokálně v prohlížeči. Tímto způsobem se aplikace automaticky přizpůsobuje chování uživatele.
  cy: Nodwch a pha adrannau ddylai fod ar agor yn ddiofyn. Mae ymchwil yn dangos bod defnyddwyr yn fwy tebygol o gwblhau asesiad risg yn brydlon pan fo adrannau ar gau i ddechrau. Mae defnyddwyr yn tueddu i agor y rhannau sydd eu hangen arnynt eu hunain. Pan fydd defnyddiwr yn agor neu'n cau adran, caiff y dewis hwn ei gadw'n lleol yn y porwr. Fel hyn, mae'r rhaglen yn addasu'n awtomatig i ymddygiad y defnyddiwr.
  da: Angiv, om og hvilke sektioner der skal være åbne som standard. Forskning viser, at brugere er mere tilbøjelige til at fuldføre en risikovurdering, når sektionerne er lukkede fra starten. Brugere åbner normalt selv de dele, de har brug for. Når en bruger åbner eller lukker en sektion, gemmes denne præference lokalt i browseren. På denne måde tilpasser applikationen sig automatisk til brugerens adfærd.
  de: Geben Sie an, ob und welche Abschnitte zu Beginn geöffnet sein sollen. Untersuchungen zeigen, dass Benutzer eine Gefährdungsbeurteilung eher abschließen, wenn die Abschnitte zunächst geschlossen sind. Nutzer öffnen in der Regel die Abschnitte, die sie benötigen, selbst. Wenn ein Benutzer einen Abschnitt öffnet oder schließt, wird diese Präferenz lokal im Browser gespeichert. So passt sich die Anwendung automatisch dem Verhalten des einzelnen Nutzers an.
  el: Υποδείξτε εάν και ποιες ενότητες πρέπει να είναι ανοιχτές από προεπιλογή. Έρευνες δείχνουν ότι οι χρήστες είναι πιο πιθανό να ολοκληρώσουν μια αξιολόγηση κινδύνου όταν οι ενότητες είναι αρχικά κλειστές. Οι χρήστες τείνουν να ανοίγουν μόνοι τους τα μέρη που χρειάζονται. Όταν ένας χρήστης ανοίγει ή κλείνει μια ενότητα, αυτή η προτίμηση αποθηκεύεται τοπικά στον περιηγητή. Με αυτόν τον τρόπο, η εφαρμογή προσαρμόζεται αυτόματα στη συμπεριφορά του χρήστη.
  en: Indicate whether and which sections should be open by default. Research shows that users are more likely to complete a risk assessment promptly when sections are initially closed. Users tend to open the parts they need themselves. When a user opens or closes a section, this preference is saved locally in the browser. This way, the application automatically adapts to the user’s behaviour.
  es: Indica si y qué secciones deben estar abiertas al iniciar. Las investigaciones muestran que los usuarios son más propensos a completar una evaluación de riesgos si las secciones están inicialmente cerradas. Normalmente los usuarios abren por sí mismos las partes que necesitan. Cuando un usuario abre o cierra una sección, esta preferencia se guarda localmente en el navegador. Así, la aplicación se adapta automáticamente al comportamiento del usuario.
  et: Määrake, kas ja millised jaotised peaksid vaikimisi olema avatud. Uuringud näitavad, et kasutajad on tõenäolisemalt valmis riskihindamise lõpule viima, kui jaotised on algselt suletud. Kasutajad avavad tavaliselt ise vajalikud osad. Kui kasutaja avab või sulgeb jaotise, salvestatakse see eelistus lokaalselt brauseris. Nii kohandub rakendus automaatselt kasutaja käitumisega.
  fi: Määritä, mitkä osiot tulisi avata oletusarvoisesti. Tutkimukset osoittavat, että käyttäjät todennäköisemmin suorittavat riskinarvioinnin loppuun, kun osiot ovat aluksi suljettuina. Käyttäjät avaavat yleensä itse tarvitsemansa osiot. Kun käyttäjä avaa tai sulkee osion, tämä asetus tallennetaan paikallisesti selaimeen. Näin sovellus mukautuu automaattisesti käyttäjän toimintaan.
  fr: Indiquez si et quelles sections doivent être ouvertes par défaut. Des recherches montrent que les utilisateurs sont plus enclins à finaliser une évaluation des risques lorsque les sections sont initialement fermées. Les utilisateurs ouvrent généralement eux-mêmes les parties dont ils ont besoin. Lorsqu’un utilisateur ouvre ou ferme une section, cette préférence est enregistrée localement dans le navigateur. L’application s’adapte ainsi automatiquement à la manière d’utiliser de chaque utilisateur.
  ga: Léirigh cé acu agus cé na rannóga ba chóir a bheith oscailte de réir réamhshocraithe. Léiríonn taighde go bhfuil seans níos mó ann go gcríochnóidh úsáideoirí measúnú riosca nuair a bhíonn na rannóga dúnta ar dtús. Is gnách do na húsáideoirí na codanna a theastaíonn uathu a oscailt iad féin. Nuair a osclaíonn nó a dhúnann úsáideoir rannóg, sábháiltear an rogha seo go háitiúil sa bhrabhsálaí. Ar an mbealach seo, oiriúnóidh an feidhmchlár go huathoibríoch do iompar an úsáideora.
  he: ציין האם ואילו מקטעים צריכים להיות פתוחים כברירת מחדל. מחקרים מראים שמשתמשים נוטים יותר להשלים הערכת סיכונים כאשר המקטעים סגורים בתחילה. המשתמשים פותחים לרוב בעצמם את החלקים הדרושים להם. כאשר משתמש פותח או סוגר מקטע, העדפה זו נשמרת באופן מקומי בדפדפן. כך מתאימה האפליקציה את עצמה אוטומטית להרגלי השימוש של המשתמש.
  hr: Odredite koje sekcije trebaju biti otvorene na početku. Istraživanja pokazuju da su korisnici skloniji dovršiti procjenu rizika kada su sekcije inicijalno zatvorene. Korisnici obično sami otvaraju dijelove koji su im potrebni. Kada korisnik otvori ili zatvori sekciju, ta se postavka lokalno sprema u pregledniku. Na taj način aplikacija se automatski prilagođava ponašanju korisnika.
  hu: Adja meg, hogy mely szakaszok legyenek alapértelmezetten nyitva. Kutatások szerint a felhasználók nagyobb valószínűséggel fejezik be a kockázatértékelést, ha a szakaszok kezdetben zárva vannak. A felhasználók általában maguk nyitják meg a szükséges részeket. Amikor egy felhasználó megnyit vagy bezár egy szakaszt, ez a beállítás helyileg kerül mentésre a böngészőben. Így az alkalmazás automatikusan alkalmazkodik a felhasználó viselkedéséhez.
  is: Tilgreindu hvort og hvaða hlutar eigi að vera opnir sjálfgefið. Rannsóknir sýna að notendur eru líklegri til að ljúka við áhættumat fljótt þegar hlutar eru upphaflega lokaðir. Notendur hafa tilhneigingu til að opna þá hluta sem þeir þurfa sjálfir. Þegar notandi opnar eða lokar hluta, er þessi stilling vistuð staðbundið í vafranum. Þannig aðlagast forritið sjálfkrafa hegðun notandans.
  it: Indica se e quali sezioni devono essere aperte all'avvio. Le ricerche dimostrano che gli utenti sono più propensi a completare una valutazione dei rischi se le sezioni sono inizialmente chiuse. Gli utenti tendono ad aprire autonomamente le sezioni di cui hanno bisogno. Quando un utente apre o chiude una sezione, questa preferenza viene salvata localmente nel browser. In questo modo, l’applicazione si adatta automaticamente al comportamento dell’utente.
  lt: Nurodykite, ar ir kurios skiltys turėtų būti atidarytos pagal numatytuosius nustatymus. Tyrimai rodo, kad vartotojai labiau linkę užbaigti rizikos vertinimą, kai skiltys iš pradžių yra uždarytos. Vartotojai paprastai patys atidaro reikiamas dalis. Kai vartotojas atidaro ar uždaro skiltį, ši nuostata išsaugoma vietoje naršyklėje. Taip programa automatiškai prisitaiko prie vartotojo elgesio.
  lv: Norādiet, vai un kuras sadaļas jābūt atvērtām pēc noklusējuma. Pētījumi liecina, ka lietotāji, visticamāk, pabeigs riska novērtējumu, ja sadaļas sākotnēji ir aizvērtas. Lietotāji parasti paši atver nepieciešamās daļas. Kad lietotājs atver vai aizver sadaļu, šī izvēle tiek lokāli saglabāta pārlūkprogrammā. Tādējādi lietotne automātiski pielāgojas lietotāja uzvedībai.
  mt: Indika jekk u liema sezzjonijiet għandhom ikunu miftuħa b’mod awtomatiku. Riċerka turi li l-utenti huma aktar probabbli li jlestu valutazzjoni tar-riskju meta s-sezzjonijiet ikunu inizjalment magħluqa. L-utenti għandhom it-tendenza li jiftħu huma stess il-partijiet li għandhom bżonn. Meta utent jiftaħ jew jagħlaq sezzjoni, din il-preferenza tinħażen lokalment fil-browser. B’dan il-mod, l-applikazzjoni tadatta awtomatikament għall-imġieba tal-utent.
  nl: Geef aan of en welke secties bij aanvang geopend moeten zijn. Uit onderzoek blijkt dat gebruikers eerder geneigd zijn een risicoanalyse spoedig te voltooien wanneer de secties aanvankelijk gesloten zijn. Gebruikers openen doorgaans zelf de onderdelen die zij op dat moment nodig hebben. Wanneer een gebruiker een sectie opent of sluit, wordt deze voorkeur lokaal in de browser opgeslagen. Zo past het gedrag van de applicatie zich automatisch aan de gebruikswijze van de individuele gebruiker aan.
  nl_BE: Geef aan of en welke secties standaard open moeten zijn. Onderzoek toont aan dat gebruikers een risicobeoordeling sneller afwerken wanneer secties aanvankelijk gesloten zijn. Gebruikers openen zelf de onderdelen die ze nodig hebben. Wanneer een gebruiker een sectie opent of sluit, wordt deze voorkeur lokaal opgeslagen in de browser. Op deze manier past de applicatie zich automatisch aan het gedrag van de gebruiker aan.
  nl_be: Geef aan of en welke secties standaard open moeten zijn. Onderzoek toont aan dat gebruikers een risicobeoordeling sneller afwerken wanneer secties aanvankelijk gesloten zijn. Gebruikers openen zelf de onderdelen die ze nodig hebben. Wanneer een gebruiker een sectie opent of sluit, wordt deze voorkeur lokaal opgeslagen in de browser. Op deze manier past de applicatie zich automatisch aan het gedrag van de gebruiker aan.
  'no': Angi om og hvilke seksjoner som skal være åpne som standard. Forskning viser at brukere er mer tilbøyelige til å fullføre en risikovurdering raskt når seksjoner er lukket som standard. Brukere har en tendens til å åpne de delene de trenger selv. Når en bruker åpner eller lukker en seksjon, lagres denne preferansen lokalt i nettleseren. På denne måten tilpasser applikasjonen seg automatisk til brukerens atferd.
  pl: Określ, czy i które sekcje powinny być otwarte na początku. Badania pokazują, że użytkownicy chętniej kończą ocenę ryzyka, gdy sekcje są początkowo zamknięte. Użytkownicy zwykle sami otwierają potrzebne im części. Gdy użytkownik otworzy lub zamknie sekcję, ta preferencja jest zapisywana lokalnie w przeglądarce. Aplikacja automatycznie dostosowuje się do sposobu korzystania przez użytkownika.
  pt: Indique se e quais secções devem estar abertas no início. Estudos mostram que os utilizadores têm maior probabilidade de concluir uma avaliação de riscos quando as secções estão inicialmente fechadas. Os utilizadores tendem a abrir por si mesmos as partes de que necessitam. Quando um utilizador abre ou fecha uma secção, essa preferência é guardada localmente no navegador. Assim, a aplicação adapta-se automaticamente ao comportamento do utilizador.
  ro: Indicați dacă și care secțiuni ar trebui să fie deschise în mod implicit. Cercetările arată că utilizatorii sunt mai predispuși să finalizeze o evaluare a riscurilor atunci când secțiunile sunt inițial închise. Utilizatorii tind să deschidă singuri părțile de care au nevoie. Când un utilizator deschide sau închide o secțiune, această preferință este salvată local în browser. Astfel, aplicația se adaptează automat comportamentului utilizatorului.
  ru: Укажите, следует ли и какие разделы должны быть открыты по умолчанию. Исследования показывают, что пользователи с большей вероятностью своевременно завершат оценку рисков, когда разделы изначально закрыты. Пользователи, как правило, сами открывают нужные им части. Когда пользователь открывает или закрывает раздел, это предпочтение сохраняется локально в браузере. Таким образом, приложение автоматически адаптируется к поведению пользователя.
  sk: Určite, či a ktoré sekcie by mali byť predvolene otvorené. Výskumy ukazujú, že používatelia sú viac naklonení dokončiť hodnotenie rizík, keď sú sekcie spočiatku zatvorené. Používatelia si zvyčajne sami otvárajú časti, ktoré potrebujú. Keď používateľ otvorí alebo zatvorí sekciu, táto preferencia sa uloží lokálne v prehliadači. Týmto spôsobom sa aplikácia automaticky prispôsobí správaniu používateľa.
  sl: Določite, ali in katere sekcije naj bodo privzeto odprte. Raziskave kažejo, da uporabniki pogosteje dokončajo oceno tveganja, če so sekcije sprva zaprte. Uporabniki običajno sami odprejo dele, ki jih potrebujejo. Ko uporabnik odpre ali zapre sekcijo, se ta nastavitev shrani lokalno v brskalniku. Tako se aplikacija samodejno prilagodi uporabnikovemu vedenju.
  sq: Tregoni nëse dhe cilat seksione duhet të jenë të hapura si parazgjedhje. Hulumtimet tregojnë se përdoruesit kanë më shumë gjasa të plotësojnë një vlerësim rreziku menjëherë kur seksionet janë fillimisht të mbyllura. Përdoruesit priren të hapin vetë pjesët që u nevojiten. Kur një përdorues hap ose mbyll një seksion, kjo preferencë ruhet lokalisht në shfletues. Në këtë mënyrë, aplikacioni përshtatet automatikisht me sjelljen e përdoruesit.
  sr: Naznačite da li i koje sekcije treba da budu otvorene podrazumevano. Istraživanja pokazuju da su korisnici skloniji da brzo završe procenu rizika kada su sekcije inicijalno zatvorene. Korisnici obično sami otvaraju delove koji su im potrebni. Kada korisnik otvori ili zatvori sekciju, ova preferencija se čuva lokalno u pregledaču. Na ovaj način, aplikacija se automatski prilagođava ponašanju korisnika.
  sv: Ange om och vilka sektioner som ska vara öppna som standard. Forskning visar att användare är mer benägna att slutföra en riskbedömning när sektionerna initialt är stängda. Användare öppnar vanligtvis själva de delar de behöver. När en användare öppnar eller stänger en sektion sparas denna inställning lokalt i webbläsaren. På så sätt anpassar sig applikationen automatiskt till användarens beteende.
  uk: Вкажіть, чи і які розділи мають бути відкриті за замовчуванням. Дослідження показують, що користувачі частіше своєчасно завершують оцінку ризиків, коли розділи спочатку закриті. Користувачі, як правило, самі відкривають потрібні їм частини. Коли користувач відкриває або закриває розділ, це налаштування зберігається локально в браузері. Таким чином, додаток автоматично адаптується до поведінки користувача.
message_help_oira_tool_description:
  bg: Описанието на инструмента се показва в прегледи и резултати от търсенето. Съдържателно описанието трябва да потвърди на потребителя, че това е правилният инструмент за него.
  ca: La descripció de l'eina es mostra als resums i als resultats de cerca. En el contingut, la descripció ha de confirmar a l'usuari que és l'eina adequada per a ell.
  cs: Popis nástroje se zobrazuje v přehledech a výsledcích vyhledávání. Obsahově by měl popis potvrdit uživateli, že je to správný nástroj pro něj.
  cy: Mae disgrifiad yr offeryn yn cael ei arddangos mewn trosolygon a chanlyniadau chwilio. Yn y cynnwys, dylai'r disgrifiad gadarnhau i'r defnyddiwr mai dyma'r offeryn cywir iddynt.
  da: Beskrivelsen af værktøjet vises i oversigter og søgeresultater. Indholdsmæssigt skal beskrivelsen bekræfte for brugeren, at det er det rigtige værktøj for dem.
  de: Die Beschreibung des Tools wird in Übersichten und Suchergebnissen angezeigt. Inhaltlich sollte die Beschreibung dem Benutzer bestätigen, dass es das richtige Tool für ihn ist.
  el: Η περιγραφή του εργαλείου εμφανίζεται στις επισκοπήσεις και τα αποτελέσματα αναζήτησης. Σε περιεχόμενο, η περιγραφή πρέπει να επιβεβαιώνει στον χρήστη ότι είναι το σωστό εργαλείο για αυτόν.
  en: The description of the tool is displayed in overviews and search results. In content, the description should confirm to the user that it is the right tool for them.
  es: La descripción de la herramienta se muestra en las vistas generales y los resultados de búsqueda. En contenido, la descripción debe confirmar al usuario que es la herramienta adecuada para él.
  et: Tööriista kirjeldus kuvatakse ülevaadetes ja otsingutulemustes. Sisu poolest peaks kirjeldus kinnitama kasutajale, et see on õige tööriist neile.
  fi: Työkalun kuvaus näkyy yleiskatsauksissa ja hakutuloksissa. Sisällöllisesti kuvaus tulisi vahvistaa käyttäjälle, että se on oikea työkalu hänelle.
  fr: La description de l'outil est affichée dans les aperçus et les résultats de recherche. Sur le plan du contenu, la description doit confirmer à l'utilisateur qu'il s'agit du bon outil pour lui.
  ga: Taispeántar cur síos ar an uirlis sna léarscáileanna agus sna torthaí cuardaigh. Ar an ábhar, ba cheart don chur síos a dhearbhú don úsáideoir go bhfuil sé an uirlis ceart di.
  he: תיאור הכלי מוצג בתצוגות כלליות ותוצאות חיפוש. מבחינת תוכן, התיאור צריך לאשר למשתמש שזהו הכלי הנכון עבורו.
  hr: Opis alata prikazuje se u pregledima i rezultatima pretraživanja. Sadržajno, opis bi trebao potvrditi korisniku da je to pravi alat za njega.
  hu: Az eszköz leírása megjelenik az áttekintésekben és a keresési eredményekben. Tartalmilag a leírásnak megerősítést kell adnia a felhasználónak, hogy ez a megfelelő eszköz számára.
  is: Lýsing verkfærisins er sýnd í yfirlitum og leitarniðurstöðum. Í efninu ætti lýsingin að staðfesta fyrir notandann að þetta sé rétta verkfærið fyrir þá.
  it: La descrizione dello strumento viene visualizzata nelle panoramiche e nei risultati di ricerca. Sul piano del contenuto, la descrizione dovrebbe confermare all'utente che si tratta dello strumento giusto per lui.
  lt: Įrankio aprašas rodomas peržiūrose ir paieškos rezultatuose. Turinio požiūriu aprašymas turėtų patvirtinti vartotojui, kad tai tinkamas įrankis jam.
  lv: Rīka apraksts tiek parādīts pārskatos un meklēšanas rezultātos. Satura ziņā aprakstam vajadzētu apstiprināt lietotājam, ka tas ir pareizais rīks viņam.
  mt: Id-deskrizzjoni tal-għodda jidher fis-sinjali u r-riżultati tat-tfittxija. F'kuntenut, id-deskrizzjoni għandha tikkonferma lill-utent li huwa l-għodda tajba għalih.
  nl: De beschrijving van de tool wordt getoond in overzichten en zoekresultaten. Inhoudelijk dient de beschrijving voor de gebruikers te bevestigen dat die de juiste tool voor hen is.
  nl_BE: De beschrijving van het hulpmiddel wordt weergegeven in overzichten en zoekresultaten. In de inhoud moet de beschrijving aan de gebruiker bevestigen dat het het juiste hulpmiddel voor hen is.
  nl_be: De beschrijving van het hulpmiddel wordt weergegeven in overzichten en zoekresultaten. In de inhoud moet de beschrijving aan de gebruiker bevestigen dat het het juiste hulpmiddel voor hen is.
  'no': Beskrivelsen av verktøyet vises i oversikter og søkeresultater. I innholdet bør beskrivelsen bekrefte for brukeren at det er det riktige verktøyet for dem.
  pl: Opis narzędzia jest wyświetlany w przeglądach i wynikach wyszukiwania. Pod względem treści, opis powinien potwierdzić użytkownikowi, że jest to odpowiednie narzędzie dla niego.
  pt: A descrição da ferramenta é exibida nas visualizações e nos resultados de pesquisa. Em termos de conteúdo, a descrição deve confirmar ao usuário que é a ferramenta certa para ele.
  ro: Descrierea instrumentului este afișată în prezentări generale și rezultatele căutării. Din punct de vedere al conținutului, descrierea ar trebui să confirme utilizatorului că este instrumentul potrivit pentru el.
  ru: Описание инструмента отображается в обзорах и результатах поиска. В содержании описание должно подтверждать пользователю, что это подходящий для него инструмент.
  sk: Popis nástroja sa zobrazuje v prehľadoch a výsledkoch vyhľadávania. Obsahovo by mal popis potvrdiť používateľovi, že je to správny nástroj pre neho.
  sl: Opis orodja se prikaže v pregledih in rezultatih iskanja. Vsebinsko naj opis potrdi uporabniku, da je to pravo orodje zanj.
  sq: Përshkrimi i mjetit shfaqet në pamjet e përgjithshme dhe rezultatet e kërkimit. Në përmbajtje, përshkrimi duhet t'i konfirmojë përdoruesit se është mjeti i duhur për ta.
  sr: Opis alata se prikazuje u pregledima i rezultatima pretrage. U sadržaju, opis treba da potvrdi korisniku da je to pravi alat za njega.
  sv: Beskrivningen av verktyget visas i översikter och sökresultat. Innehållsmässigt bör beskrivningen bekräfta för användaren att det är rätt verktyg för dem.
  uk: Опис інструменту відображається в оглядах та результатах пошуку. У змісті опис повинен підтверджувати користувачу, що це правильний інструмент для нього.
message_help_oira_tool_name:
  bg: Използвайте кратко и силно име, което потребителите ще разпознаят в своите обстоятелства. Заглавието се показва в прегледи, както на потребителите, така и на редакторите.
  ca: Utilitzeu un nom curt i potent en el qual els usuaris reconeguin les seves circumstàncies. El títol es mostra als resums, tant als usuaris com als editors.
  cs: Použijte krátký a silný název, který uživatelé poznají ve svých okolnostech. Název se zobrazuje v přehledech, jak uživatelům, tak editorům.
  cy: Defnyddiwch enw byr a phwerus y bydd defnyddwyr yn adnabod eu hamgylchiadau ynddo. Mae'r teitl yn cael ei arddangos mewn trosolygon, i ddefnyddwyr ac i olygyddion.
  da: Brug et kort og kraftfuldt navn, som brugerne vil genkende deres omstændigheder i. Titlen vises i oversigter, både til brugere og redaktører.
  de: Verwenden Sie einen kurzen und kraftvollen Namen, den Benutzer in ihren Umständen erkennen werden. Der Titel wird in Übersichten sowohl für Benutzer als auch für Redakteure angezeigt.
  el: Χρησιμοποιήστε ένα σύντομο και ισχυρό όνομα που οι χρήστες θα αναγνωρίσουν τις συνθήκες τους. Ο τίτλος εμφανίζεται στις επισκοπήσεις, τόσο στους χρήστες όσο και στους επιμελητές.
  en: Use a short and powerful name that users will recognize their circumstances in. The title is displayed in overviews, both to users and editors.
  es: Utilice un nombre corto y poderoso que los usuarios reconocerán en sus circunstancias. El título se muestra en las vistas generales, tanto a los usuarios como a los editores.
  et: Kasutage lühikest ja võimsat nime, mida kasutajad tunnevad oma olukordades ära. Pealkiri kuvatakse ülevaadetes nii kasutajatele kui ka toimetajatele.
  fi: Käytä lyhyttä ja voimakasta nimeä, jonka käyttäjät tunnistavat olosuhteissaan. Otsikko näkyy yleiskatsauksissa sekä käyttäjille että toimittajille.
  fr: Utilisez un nom court et puissant que les utilisateurs reconnaîtront dans leurs circonstances. Le titre est affiché dans les aperçus, à la fois aux utilisateurs et aux éditeurs.
  ga: Bain úsáid as ainm gairid agus cumhachtach a aithníonn úsáideoirí a gcúinsí. Taispeántar an teideal sna léarscáileanna, do úsáideoirí agus do eagarthóirí.
  he: השתמש בשם קצר ועוצמתי שמשתמשים יכולים לזהות את הנסיבות שלהם. הכותרת מוצגת בסקירות, גם למשתמשים וגם לעורכים.
  hr: Koristite kratko i snažno ime koje će korisnici prepoznati u svojim okolnostima. Naslov se prikazuje u pregledima, kako korisnicima, tako i urednicima.
  hu: Használjon rövid és erőteljes nevet, amelyet a felhasználók felismernek a körülményeikben. A cím megjelenik az áttekintésekben, mind a felhasználóknak, mind a szerkesztőknek.
  is: Notaðu stutt og öflugt heiti sem notendur munu þekkja sínar aðstæður í. Titillinn er sýndur í yfirlitum, bæði notendum og ritstjórum.
  it: Utilizzare un nome breve e potente che gli utenti riconosceranno nelle loro circostanze. Il titolo viene visualizzato nelle panoramiche, sia agli utenti che agli editori.
  lt: Naudokite trumpą ir galingą pavadinimą, kurį vartotojai atpažins savo aplinkybėse. Pavadinimas rodomas apžvalgose, tiek vartotojams, tiek redaktoriams.
  lv: Izmantojiet īsu un spēcīgu nosaukumu, ko lietotāji atpazīs savās apstākļos. Nosaukums tiek rādīts pārskatos, gan lietotājiem, gan redaktoriem.
  mt: Uża isem qasir u possibbli li l-utenti jirrikonoxxu fis-sitwazzjonijiet tagħhom. It-titlu jidher fis-surveys, kemm lill-utenti kif ukoll lill-edituri.
  nl: Gebruik een korte en krachtige naam, waarin gebruikers hun omstandigheden zullen herkennen. De title wordt getoond in overzichten, zowel aan gebruikers als aan redacteuren.
  nl_BE: Gebruik een korte en krachtige naam waarin gebruikers hun omstandigheden herkennen. De titel wordt weergegeven in overzichten, zowel aan gebruikers als redacteurs.
  nl_be: Gebruik een korte en krachtige naam waarin gebruikers hun omstandigheden herkennen. De titel wordt weergegeven in overzichten, zowel aan gebruikers als redacteurs.
  'no': Bruk et kort og kraftfullt navn som brukere vil kjenne seg igjen i. Tittelen vises i oversikter, både til brukere og redaktører.
  pl: Użyj krótkiej i potężnej nazwy, którą użytkownicy rozpoznają w swoich okolicznościach. Tytuł jest wyświetlany w przeglądach zarówno dla użytkowników, jak i redaktorów.
  pt: Use um nome curto e poderoso que os usuários reconhecerão em suas circunstâncias. O título é exibido nas visualizações, tanto para usuários quanto para editores.
  ro: Utilizați un nume scurt și puternic pe care utilizatorii îl vor recunoaște în circumstanțele lor. Titlul este afișat în prezentări generale, atât utilizatorilor, cât și editorilor.
  ru: Используйте короткое и выразительное название, в котором пользователи узнают свои обстоятельства. Заголовок отображается в обзорах как для пользователей, так и для редакторов.
  sk: Použite krátky a silný názov, ktorý používatelia rozpoznajú vo svojich okolnostiach. Názov sa zobrazuje v prehľadoch, ako pre používateľov, tak pre editorov.
  sl: Uporabite kratko in močno ime, ki ga bodo uporabniki prepoznali v svojih okoliščinah. Naslov je prikazan v pregledih, tako uporabnikom kot urednikom.
  sq: Përdorni një emër të shkurtër dhe të fuqishëm në të cilin përdoruesit do të njohin rrethanat e tyre. Titulli shfaqet në pamjet e përgjithshme, si për përdoruesit ashtu edhe për redaktorët.
  sr: Koristite kratko i snažno ime u kome će korisnici prepoznati svoje okolnosti. Naslov se prikazuje u pregledima, i korisnicima i urednicima.
  sv: Använd ett kort och kraftfullt namn som användarna kommer att känna igen i sina omständigheter. Titeln visas i översikter, både för användare och redaktörer.
  uk: Використовуйте коротку та виразну назву, в якій користувачі впізнають свої обставини. Заголовок відображається в оглядах як для користувачів, так і для редакторів.
message_help_standard_measure_description:
  bg: Включете всички съответни информации, които могат да бъдат полезни за крайния потребител.
  ca: Incloeu qualsevol informació rellevant que pugui ser útil per a l'usuari final.
  cs: Zahrňte všechny relevantní informace, které mohou být užitečné pro koncového uživatele.
  cy: Cynhwyswch unrhyw wybodaeth berthnasol a allai fod yn ddefnyddiol i'r defnyddiwr terfynol.
  da: Inkluder alle relevante oplysninger, der kan være nyttige for slutbrugeren.
  de: Fügen Sie alle relevanten Informationen hinzu, die für den Endbenutzer hilfreich sein können.
  el: Συμπεριλάβετε όλες τις σχετικές πληροφορίες που μπορεί να είναι χρήσιμες για τον τελικό χρήστη.
  en: Include any relevant information that may be helpful for the end-user.
  es: Incluya toda la información relevante que pueda ser útil para el usuario final.
  et: Lisage kõik asjakohane teave, mis võib olla lõppkasutajale kasulik.
  fi: Sisällytä kaikki asiaankuuluvat tiedot, jotka voivat olla hyödyllisiä loppukäyttäjälle.
  fr: Incluez toutes les informations pertinentes qui peuvent être utiles pour l'utilisateur final.
  ga: Cuir san áireamh aon fhaisnéis ábhartha a d'fhéadfadh a bheith cabhrach don úsáideoir deiridh.
  he: כלול כל מידע רלוונטי שעשוי להיות מועיל למשתמש הסופי.
  hr: Uključite sve relevantne informacije koje mogu biti korisne za krajnjeg korisnika.
  hu: Tartalmazzon minden releváns információt, amely hasznos lehet a végfelhasználó számára.
  is: Láttu fylgja allar viðeigandi upplýsingar sem gætu verið gagnlegar fyrir endanotandann.
  it: Includere tutte le informazioni rilevanti che possono essere utili per l'utente finale.
  lt: Įtraukite visą reikalingą informaciją, kuri gali būti naudinga galutiniam vartotojui.
  lv: Iekļaujiet visu atbilstošo informāciju, kas var būt noderīga gala lietotājam.
  mt: Ikkonkludi kwalunkwe informazzjoni rilevanti li tista' tkun ta' għajnuna għall-utent finali.
  nl: Voeg alle relevante informatie toe die nuttig kan zijn voor de eindgebruiker.
  nl_BE: Voeg alle relevante informatie toe die nuttig kan zijn voor de eindgebruiker.
  nl_be: Voeg relevante informatie toe die nuttig kan zijn voor de eindgebruiker.
  'no': Ta med relevant informasjon som kan være nyttig for sluttbrukeren.
  pl: Dołącz wszelkie istotne informacje, które mogą być pomocne dla końcowego użytkownika.
  pt: Inclua todas as informações relevantes que possam ser úteis para o usuário final.
  ro: Includeți orice informație relevantă care ar putea fi utilă pentru utilizatorul final.
  ru: Включите любую актуальную информацию, которая может быть полезна конечному пользователю.
  sk: Zahrňte všetky relevantné informácie, ktoré môžu byť užitočné pre koncového používateľa.
  sl: Vključite vse ustrezne informacije, ki bi lahko bile koristne za končnega uporabnika.
  sq: Përfshini çdo informacion të rëndësishëm që mund të jetë i dobishëm për përdoruesin fundor.
  sr: Uključite sve relevantne informacije koje mogu biti korisne krajnjem korisniku.
  sv: Inkludera all relevant information som kan vara till hjälp för slutanvändaren.
  uk: Включіть будь-яку відповідну інформацію, яка може бути корисною для кінцевого користувача.
message_help_standard_measure_general_approach:
  bg: Опишете общия си подход за премахване или (ако риска не може да бъде избегнат) намаляване на риска. + Опишете конкретните действия, необходими за прилагането на този подход (за премахване или намаляване на риска).
  ca: Descriviu el vostre enfocament general per eliminar o (si el risc no és evitable) reduir el risc. + Descriviu les accions específiques necessàries per implementar aquest enfocament (per eliminar o reduir el risc).
  cs: Popište svůj obecný přístup k odstranění nebo (pokud riziko nelze vyhnout) snížení rizika. + Popište konkrétní akci(e), která(e) je(t) potřebná(e) k provedení tohoto přístupu (k odstranění nebo snížení rizika).
  cy: Disgrifiwch eich dull cyffredinol o ddileu neu (os nad yw'r risg yn osgoadwy) leihau'r risg. + Disgrifiwch yr action(au) penodol sy'n ofynnol i weithredu'r dull hwn (i ddileu neu leihau'r risg).
  da: Beskriv din generelle tilgang til at eliminere eller (hvis risikoen ikke kan undgås) reducere risikoen. + Beskriv den (de) specifikke handling(er), der kræves for at implementere denne tilgang (for at eliminere eller reducere risikoen).
  de: Beschreiben Sie Ihren allgemeinen Ansatz, um das Risiko zu beseitigen oder (wenn das Risiko nicht vermeidbar ist) zu reduzieren. + Beschreiben Sie die spezifische(n) Maßnahme(n), die erforderlich sind, um diesen Ansatz umzusetzen (um das Risiko zu beseitigen oder zu reduzieren).
  el: Περιγράψτε τη γενική προσέγγισή σας για την εξάλειψη ή (αν το κίνδυνο δεν είναι αποφευκτό) τη μείωση του κινδύνου. + Περιγράψτε την (τις) συγκεκριμένη (ες) ενέργεια (ες) που απαιτείται (ουν) για την υλοποίηση αυτής της προσέγγισης (για την εξάλειψη ή τη μείωση του κινδύνου).
  en: Describe your general approach to eliminate or (if the risk is not avoidable) reduce the risk. + Describe the specific action(s) required to implement this approach (to eliminate or to reduce the risk).
  es: Describa su enfoque general para eliminar o (si el riesgo no es evitable) reducir el riesgo. + Describa la (s) acción (es) específica (s) requerida (s) para implementar este enfoque (para eliminar o reducir el riesgo).
  et: Kirjeldage oma üldist lähenemist riski kõrvaldamiseks või (kui riski ei saa vältida) riski vähendamiseks. + Kirjeldage konkreetset tegevust (usi), mis on vajalik (ud) selle lähenemisviisi rakendamiseks (riski kõrvaldamiseks või vähendamiseks).
  fi: Kuvaile yleistä lähestymistapaasi riskin poistamiseksi tai (jos riskiä ei voida välttää) vähentämiseksi. + Kuvaile tarkka toimenpide(t), jotka on toteutettava tämän lähestymistavan toteuttamiseksi (riskin poistamiseksi tai vähentämiseksi).
  fr: Décrivez votre approche générale pour éliminer ou (si le risque n'est pas évitable) réduire le risque. + Décrivez l'action (s) spécifique (s) requise (s) pour mettre en œuvre cette approche (pour éliminer ou réduire le risque).
  ga: Déan cur síos ar do chur chuige ginearálta chun an riosca a dhíchur nó (mura féidir an riosca a sheachaint) a laghdú. + Déan cur síos ar na gníomh(artha) sonracha is gá chun an cur chuige seo a chur i bhfeidhm (chun an riosca a dhíchur nó a laghdú).
  he: תיאר את הגישה הכללית שלך להסרת הסיכון או (אם הסיכון אינו נמנע) להפחתת הסיכון. + תיאר את הפעולה (ות) הספציפית (ות) הנדרשת (ות) ליישום גישה זו (להסרת או להפחתת הסיכון).
  hr: Opišite svoj opći pristup uklanjanju ili (ako se rizik ne može izbjeći) smanjenju rizika. + Opišite specifičnu (e) akciju (e) potrebnu (e) za provedbu ovog pristupa (za uklanjanje ili smanjenje rizika).
  hu: Írja le általános megközelítését a kockázat megszüntetésére vagy (ha a kockázat nem elkerülhető) csökkentésére. + Írja le a konkrét intézkedést (eket), amely(ek) szükséges(ek) ennek a megközelítésnek a végrehajtásához (a kockázat megszüntetésére vagy csökkentésére).
  is: Lýstu almennri nálgun þinni til að útrýma eða (ef áhættan er óhjákvæmileg) draga úr áhættu. + Lýstu þeim sérstöku aðgerð(um) sem þarf til að framfylgja þessari nálgun (til að útrýma eða draga úr áhættu).
  it: Descrivi il tuo approccio generale per eliminare o (se il rischio non è evitabile) ridurre il rischio. + Descrivi l'azione (i) specifica (e) richiesta (e) per implementare questo approccio (per eliminare o ridurre il rischio).
  lt: Aprašykite bendrą savo požiūrį į riziką pašalinti arba (jei rizikas neįmanoma išvengti) sumažinti. + Aprašykite konkretų veiksmą (us), reikalingą (us) šio požiūrio įgyvendinimui (riziką pašalinti arba sumažinti).
  lv: Aprakstiet savu vispārējo pieeju riska novēršanai vai (ja risks nav izvairāms) riska samazināšanai. + Aprakstiet konkrēto darbību (as), kas nepieciešama (as) šīs pieejas īstenošanai (riska novēršanai vai samazināšanai).
  mt: Iddeskrivi l-approċċ ġenerali tiegħek biex telimina jew (jekk ir-riskju ma jistax jiġi evitat) tnaqqas ir-riskju. + Iddeskrivi l-azzjoni(jiet) speċifika(jiet) meħtieġa biex jiġi implimentat dan l-approċċ (biex jiġi eliminat jew jitnaqqas ir-riskju).
  nl: Beschrijf uw algemene aanpak om het risico te elimineren of (indien het risico niet te vermijden is) te verminderen. + Beschrijf de specifieke actie(s) die nodig zijn om deze aanpak te implementeren (om het risico te elimineren of te verminderen).
  nl_BE: Beschrijf uw algemene aanpak om het risico te elimineren of (als het risico niet vermijdbaar is) te verminderen. + Beschrijf de specifieke actie(s) die nodig zijn om deze aanpak te implementeren (om het risico te elimineren of te verminderen).
  nl_be: Beschrijf uw algemene aanpak om het risico te elimineren of (als het risico niet vermijdbaar is) te verminderen. + Beschrijf de specifieke actie(s) die nodig zijn om deze aanpak te implementeren (om het risico te elimineren of te verminderen).
  'no': Beskriv din generelle tilnærming for å eliminere eller (hvis risikoen ikke kan unngås) redusere risikoen. + Beskriv de spesifikke tiltakene som kreves for å implementere denne tilnærmingen (for å eliminere eller redusere risikoen).
  pl: Opisz ogólny sposób eliminacji lub (jeśli ryzyko nie jest uniknione) zmniejszenia ryzyka. + Opisz konkretne działanie (a), które należy podjąć, aby wdrożyć ten sposób (aby wyeliminować lub zmniejszyć ryzyko).
  pt: Descreva sua abordagem geral para eliminar ou (se o risco não for evitável) reduzir o risco. + Descreva a (s) ação (ões) específica (s) necessária (s) para implementar essa abordagem (para eliminar ou reduzir o risco).
  ro: Descrieți abordarea generală pentru eliminarea sau (dacă riscul nu poate fi evitat) reducerea riscului. + Descrieți acțiunea (acțiunile) specifică (specifice) necesară (necesare) pentru implementarea acestei abordări (pentru eliminarea sau reducerea riscului).
  ru: Опишите ваш общий подход к устранению или (если риск неизбежен) снижению риска. + Опишите конкретные действия, необходимые для реализации этого подхода (для устранения или снижения риска).
  sk: Popíšte svoj všeobecný prístup k odstráneniu alebo (ak sa riziko nedá vyhnúť) zníženiu rizika. + Popíšte konkrétnu akciu (e), ktorá (é) je (sú) potrebná (é) na vykonanie tohto prístupu (na odstránenie alebo zníženie rizika).
  sl: Opisite svoj splošen pristop k odpravljanju ali (če se tveganja ni mogoče izogniti) zmanjšanju tveganja. + Opisite specifično (e) ukrep (e), ki je (so) potreben (i) za izvedbo tega pristopa (za odpravo ali zmanjšanje tveganja).
  sq: Përshkruani qasjen tuaj të përgjithshme për të eliminuar ose (nëse rreziku nuk është i shmangshëm) për të reduktuar rrezikun. + Përshkruani veprimet specifike të nevojshme për të zbatuar këtë qasje (për të eliminuar ose reduktuar rrezikun).
  sr: Opišite vaš opšti pristup za eliminaciju ili (ako rizik nije izbeživ) smanjenje rizika. + Opišite specifične radnje potrebne za sprovođenje ovog pristupa (za eliminaciju ili smanjenje rizika).
  sv: Beskriv din allmänna strategi för att eliminera eller (om risken inte kan undvikas) minska risken. + Beskriv den specifika åtgärd (erna) som krävs för att genomföra denna strategi (för att eliminera eller minska risken).
  uk: Опишіть ваш загальний підхід до усунення або (якщо ризик є неминучим) зниження ризику. + Опишіть конкретні дії, необхідні для реалізації цього підходу (щодо усунення або зниження ризику).
message_help_standard_measure_level_of_expertise:
  bg: Опишете нивото на познания, необходимо за прилагането на мярката, например "здрав разум (няма нужда от познания в ОББЗ)", "няма нужда от конкретна експертиза в областта на ОББЗ, но се изисква минимална познаване или обучение по ОББЗ и/или консултиране на насоките по ОББЗ", или "експерт по ОББЗ". Можете да опишете и всякакви други допълнителни изисквания тук (ако има такива).
  ca: Descriviu el nivell d'experiència necessari per implementar la mesura, per exemple "sentit comú (no es requereix coneixement en SST)", "cap experiència específica en SST, però es requereix un coneixement mínim en SST o formació i/o consulta de guies de SST", o "expert en SST". També podeu descriure aquí qualsevol altre requisit addicional (si n'hi ha).
  cs: Popište úroveň odborných znalostí potřebnou k provedení opatření, například "zdravý rozum (nevyžaduje se žádné povědomí o BOZP)", "nevyžaduje se žádná konkrétní odbornost v oblasti BOZP, ale je vyžadována minimální znalost BOZP nebo školení a/nebo konzultace BOZP pokynů", nebo "expert na BOZP". Zde můžete také popsat další případné požadavky (pokud existují).
  cy: Disgrifiwch lefel yr arbenigedd sydd ei angen i weithredu'r mesur, er enghraifft "synnwyr cyffredin (dim gwybodaeth IDG ofynnol)", "dim arbenigedd IDG penodol, ond mae angen isafswm o wybodaeth neu hyfforddiant IDG a/neu ymgynghori â chanllawiau IDG", neu "arbenigwr IDG". Gallwch hefyd ddisgrifio unrhyw ofyniad ychwanegol arall yma (os oes rhai).
  da: Beskriv det erfaringsniveau, der er nødvendigt for at implementere foranstaltningen, for eksempel "almindelig sund fornuft (ingen viden om arbejdsmiljø krævet)", "ingen specifik viden om arbejdsmiljø krævet, men minimum viden eller træning inden for arbejdsmiljø krævet og/eller konsultation af arbejdsmiljøvejledning krævet", eller "arbejdsmiljøekspert". Du kan også beskrive eventuelle yderligere krav her (hvis nogen).
  de: Beschreiben Sie das erforderliche Fachwissen zur Umsetzung der Maßnahme, zum Beispiel "gesunder Menschenverstand (kein Arbeitsschutz-Know-how erforderlich)", "keine spezifischen Arbeitsschutzkenntnisse erforderlich, aber mindestens grundlegende Arbeitsschutzkenntnisse oder Schulung und/oder Konsultation von Arbeitsschutzleitlinien erforderlich", oder "Arbeitsschutzexperte". Sie können hier auch etwaige zusätzliche Anforderungen beschreiben (falls vorhanden).
  el: Περιγράψτε το επίπεδο εμπειρογνωμοσύνης που απαιτείται για την εφαρμογή της μέτρησης, για παράδειγμα "κοινή λογική (δεν απαιτείται γνώση ασφάλειας και υγείας στην εργασία)", "δεν απαιτείται συγκεκριμένη ειδίκευση στην ασφάλεια και υγεία στην εργασία, αλλά απαιτείται τουλάχιστον βασική γνώση ή κατάρτιση στην ασφάλεια και υγεία στην εργασία και/ή διαβούλευση των οδηγιών ασφάλειας και υγείας στην εργασία", ή "ειδικός στην ασφάλεια και υγεία στην εργασία". Μπορείτε επίσης να περιγράψετε εδώ οποιαδήποτε άλλη πρόσθετη απαίτηση (εάν υπάρχει).
  en: Describe the level of expertise needed to implement the measure, for instance "common sense (no OSH knowledge required)", "no specific OSH expertise, but minimum OSH knowledge or training and/or consultation of OSH guidance required", or "OSH expert". You can also describe here any other additional requirement (if any).
  es: Describa el nivel de experiencia necesario para implementar la medida, por ejemplo "sentido común (no se requiere conocimiento de seguridad y salud en el trabajo)", "no se requiere experiencia específica en seguridad y salud en el trabajo, pero se requiere un conocimiento mínimo o capacitación en seguridad y salud en el trabajo y/o consulta de orientación en seguridad y salud en el trabajo", o "experto en seguridad y salud en el trabajo". También puede describir aquí cualquier otro requisito adicional (si lo hubiera).
  et: Kirjeldage meetme rakendamiseks vajalikku pädevustaset, näiteks "terve mõistus (töötervishoiu ja tööohutuse tundmine pole vajalik)", "spetsiifilist töötervishoiu ja tööohutuse pädevust pole vaja, kuid vajalik on minimaalne töötervishoiu ja tööohutuse teadmine või koolitus ning/või töötervishoiu ja tööohutuse juhendite konsulteerimine", või "töötervishoiu ja tööohutuse ekspert". Samuti saate siin kirjeldada muid täiendavaid nõudeid (kui need on olemas).
  fi: Kuvaile toimenpiteen toteuttamiseen tarvittavaa osaamisen tasoa, esimerkiksi "terve järki (ei tarvita työterveysosaamista)", "työterveysalan erityisosaamista ei tarvita, mutta vähintään perustiedot työterveydestä tai koulutus ja/tai työterveysohjeiden konsultointi tarvitaan", tai "työterveysasiantuntija". Voit myös kuvata täällä muita lisävaatimuksia (jos sellaisia on).
  fr: Décrivez le niveau d'expertise nécessaire pour mettre en œuvre la mesure, par exemple "sens commun (aucune connaissance en SST requise)", "aucune expertise spécifique en SST requise, mais des connaissances minimales en SST ou une formation et/ou une consultation de la documentation en SST requise", ou "expert en SST". Vous pouvez également décrire ici toute autre exigence supplémentaire (le cas échéant).
  ga: Cur síos ar an leibhéal saineolas a bhfuil ag teastáil leis an meastóireacht a chur i bhfeidhm, mar shampla "críonnacht (nach bhfuil aon eolas ar shláinte agus sábháilteacht saothair de dhíth)", "ní gá saineolas ar bith ar shláinte agus sábháilteacht saothair go speisialta, ach tá ar a laghad beagán eolais ar shláinte agus sábháilteacht saothair nó oiliúint agus/nó comhairliúchán ar threoir shláinte agus sábháilteacht saothair", nó "saineolaí ar shláinte agus sábháilteacht saothair". Is féidir leat tuilleadh riachtanas breise a chur síos anseo (más ann).
  he: תיאר את רמת המומחיות הנדרשת ליישום האמצע, לדוגמה "שכל טוב (אין צורך בידע בבריאות ובטיחות בעבודה)", "אין דרישה להתמחות מסוימת בתחום בריאות ובטיחות בעבודה, אך נדרשת מינימום של ידע בתחום או הכשרה ו/או ייעוץ במדריכים של בריאות ובטיחות בעבודה", או "מומחה בבריאות ובטיחות בעבודה". באפשרותך גם לתאר כאן כל דרישה נוספת (אם קיימת).
  hr: Navedite razinu stručnosti potrebnu za provedbu mjere, na primjer "zdrav razum (nije potrebno poznavanje sigurnosti i zdravlja na radu)", "nema potrebne specifične stručnosti u području sigurnosti i zdravlja na radu, ali je potrebno minimalno znanje ili obuka u području sigurnosti i zdravlja na radu i/ili konzultacija smjernica za sigurnost i zdravlje na radu", ili "stručnjak za sigurnost i zdravlje na radu". Također možete ovdje opisati bilo koje dodatne zahtjeve (ako ih ima).
  hu: Írja le azt a szaktudást, amelyre szükség van az intézkedés végrehajtásához, például "közös érzék (nincs szükség Munkavédelmi és Egészségügyi Tudásra)", "nincs szükség különleges munkavédelmi és egészségügyi tudásra, de minimális munkavédelmi és egészségügyi ismeretek vagy képzés és/vagy munkavédelmi és egészségügyi irányelvek konzultációja szükséges", vagy "munkavédelmi és egészségügyi szakértő". Itt leírhatja az esetleges további követelményeket is (ha vannak).
  is: Lýstu sérfræðiþekkingarstiginu sem þarf til að innleiða ráðstöfunina, til dæmis "heilbrigð skynsemi (engin VHL-þekking nauðsynleg)", "engin sérhæfð VHL-sérfræðiþekking, en lágmarks VHL-þekking eða þjálfun og/eða ráðgjöf við VHL-leiðbeiningar nauðsynleg", eða "VHL-sérfræðingur". Þú getur líka lýst hér öðrum viðbótarkröfum (ef við á).
  it: Descrivi il livello di competenza necessario per attuare la misura, ad esempio "buon senso (nessuna conoscenza della sicurezza sul lavoro richiesta)", "nessuna competenza specifica in materia di sicurezza sul lavoro richiesta, ma è necessaria una conoscenza minima della sicurezza sul lavoro o una formazione e/o una consultazione della documentazione sulla sicurezza sul lavoro", o "esperto di sicurezza sul lavoro". Puoi anche descrivere qui qualsiasi ulteriore requisito aggiuntivo (se presente).
  lt: Aprašykite ekspertų lygį, reikalingą priemonės įgyvendinimui, pavyzdžiui, "sveika nuovokos (nereikia žinių apie darbo saugą ir sveikatą)", "nereikia konkretaus darbo saugos ir sveikatos ekspertų, bet reikalingos bent minimalios darbo saugos ir sveikatos žinios arba mokymai ir/arba darbo saugos ir sveikatos rekomendacijų konsultacijos", arba "darbo saugos ir sveikatos ekspertas". Čia taip pat galite aprašyti bet kokius papildomus reikalavimus (jei tokių yra).
  lv: Aprakstiet zināšanu līmeni, kas nepieciešams pasākuma īstenošanai, piemēram, "vesels saprāts (nav nepieciešamas ZSD zināšanas)", "nav nepieciešama specifiska ZSD ekspertīze, bet nepieciešamas minimālas ZSD zināšanas vai apmācība un/vai ZSD norāžu konsultācija", vai "ZSD eksperts". Šeit jūs varat arī aprakstīt jebkādas papildu prasības (ja tādas ir).
  mt: Deskrivi livell ta' esperjenza meħtieġ għal li jintlaħaq il-miżura, forsi "ħsieb komuni (ebda għarfien dwar is-saħħa u s-sigurtà fis-sit tax-xogħol meħtieġ)", "ebda ekspertiza speċifika dwar is-saħħa u s-sigurtà fis-sit tax-xogħol mhux meħtieġa, iżda jintlaħaq għarfien minimu jew taħriġ fis-saħħa u s-sigurtà fis-sit tax-xogħol u/jew konsultazzjoni ta' għajdilijiet dwar is-saħħa u s-sigurtà fis-sit tax-xogħol", jew "espert fis-saħħa u s-sigurtà fis-sit tax-xogħol". Tista' wkoll tiddeskrivi l-ebda kriżijiet addizzjonali hawn (jekk hemm xi wieħed).
  nl: Beschrijf het deskundigheidsniveau dat nodig is om de maatregel te implementeren, bijvoorbeeld "gezond verstand (geen kennis van OSH vereist)", "geen specifieke OSH-expertise, maar minimale OSH-kennis vereist, of training en/of raadpleging van OSH-richtlijnen vereist", of "OSH-expert". U kunt hier ook eventuele aanvullende vereisten beschrijven (indien van toepassing).
  nl_BE: Beschrijf het niveau van expertise dat nodig is om de maatregel uit te voeren, bijvoorbeeld "gezond verstand (geen VGW-kennis vereist)", "geen specifieke VGW-expertise, maar minimale VGW-kennis of -opleiding en/of raadpleging van VGW-richtlijnen vereist", of "VGW-expert". U kunt hier ook eventuele andere aanvullende vereisten beschrijven (indien van toepassing).
  nl_be: Beschrijf het niveau van expertise dat nodig is om de maatregel uit te voeren, bijvoorbeeld "gezond verstand (geen VGW-kennis vereist)", "geen specifieke VGW-expertise, maar minimale VGW-kennis of -opleiding en/of raadpleging van VGW-richtlijnen vereist", of "VGW-expert". U kunt hier ook eventuele andere aanvullende vereisten beschrijven (indien van toepassing).
  'no': Beskriv nivået av ekspertise som kreves for å implementere tiltaket, for eksempel "sunn fornuft (ingen OSH-kunnskap kreves)", "ingen spesifikk OSH-ekspertise, men minimum OSH-kunnskap eller opplæring og/eller konsultasjon av OSH-veiledning kreves", eller "OSH-ekspert". Du kan også beskrive eventuelle andre tilleggskrav her (hvis noen).
  pl: Opisz poziom wiedzy wymagany do wdrożenia środka, na przykład "zdrowy rozsądek (nie wymaga się wiedzy w zakresie BHP)", "nie wymaga się specjalistycznej wiedzy w zakresie BHP, ale wymagane jest minimum wiedzy lub szkolenie z zakresu BHP i/lub konsultacja dokumentacji dotyczącej BHP", lub "ekspert w dziedzinie BHP". Możesz także opisać tutaj inne dodatkowe wymagania (jeśli istnieją).
  pt: Descreva o nível de experiência necessário para implementar a medida, por exemplo "senso comum (nenhum conhecimento de segurança e saúde ocupacional necessário)", "nenhuma expertise específica em segurança e saúde ocupacional necessária, mas é necessário conhecimento mínimo ou treinamento em segurança e saúde ocupacional e/ou consulta de orientação em segurança e saúde ocupacional", ou "especialista em segurança e saúde ocupacional". Você também pode descrever aqui qualquer outro requisito adicional (se houver).
  ro: Descrieți nivelul de expertiză necesar pentru implementarea măsurii, de exemplu "bun simț (nu este necesară cunoașterea SSM)", "nu este necesară o expertiză specifică în domeniul SSM, dar este necesară o cunoaștere minimă sau o formare în domeniul SSM și/sau consultarea ghidurilor de SSM", sau "expert în SSM". Puteți descrie și alte cerințe suplimentare aici (dacă există).
  ru: Опишите уровень экспертизы, необходимый для реализации меры, например "здравый смысл (знания в области ОТ не требуются)", "специальные знания в области ОТ не требуются, но необходимы минимальные знания или обучение в области ОТ и/или консультация с руководством по ОТ", или "эксперт в области ОТ". Здесь также можно указать любые другие дополнительные требования (если таковые имеются).
  sk: Popíšte úroveň odbornej znalosti potrebnú na realizáciu opatrenia, napríklad "zdravý rozum (nevyžaduje sa žiadna znalosť BOZP)", "žiadna špecifická odbornosť v oblasti BOZP nie je potrebná, ale je potrebné minimálne základné odborné vedomosti alebo školenie v oblasti BOZP a/alebo konzultácia BOZP usmernení", alebo "odborník na BOZP". Tu môžete tiež opísať akékoľvek ďalšie dodatočné požiadavky (ak sú).
  sl: Opisujte raven strokovnosti, potrebno za izvajanje ukrepa, na primer "zdrava pamet (ni potrebno poznavanje varnosti in zdravja pri delu)", "ni potrebna specifična strokovnost na področju varnosti in zdravja pri delu, ampak je potrebno minimalno znanje ali usposabljanje na področju varnosti in zdravja pri delu in/ali posvetovanje s smernicami za varnost in zdravje pri delu", ali "strokovnjak za varnost in zdravje pri delu". Tukaj lahko opišete tudi morebitne dodatne zahteve (če obstajajo).
  sq: Përshkruani nivelin e ekspertizës së nevojshme për të zbatuar masën, për shembull "sens i përbashkët (nuk kërkohen njohuri OSH)", "nuk kërkohet ekspertizë specifike OSH, por kërkohen njohuri minimale OSH ose trajnim dhe/ose konsultim me udhëzimin OSH", ose "ekspert OSH". Gjithashtu mund të përshkruani këtu çdo kërkesë tjetër shtesë (nëse ka).
  sr: Opišite nivo stručnosti potreban za implementaciju mere, na primer "zdrav razum (nije potrebno znanje iz oblasti OSH)", "nije potrebna specifična stručnost iz oblasti OSH, ali je potrebno minimalno znanje ili obuka iz oblasti OSH i/ili konsultacija sa smernicama OSH", ili "stručnjak za OSH". Ovde takođe možete opisati sve ostale dodatne zahteve (ako postoje).
  sv: Beskriv den kunskapsnivå som krävs för att genomföra åtgärden, till exempel "sunt förnuft (ingen kunskap om arbetsmiljö krävs)", "ingen specifik arbetsmiljöexpertis krävs, men grundläggande kunskap eller utbildning inom arbetsmiljö krävs och/eller konsultation av arbetsmiljöriktlinjer krävs", eller "arbetsmiljöexpert". Du kan också beskriva eventuella ytterligare krav här (om det finns några).
  uk: Опишіть рівень експертизи, необхідний для реалізації заходу, наприклад "здоровий глузд (знання в галузі ОП не потрібні)", "спеціальні знання в галузі ОП не потрібні, але необхідні мінімальні знання або навчання в галузі ОП та/або консультація з керівництвом з ОП", або "експерт з ОП". Тут також можна описати будь-які інші додаткові вимоги (якщо є).
message_help_subscriptions:
  bg: Бюлетините могат да се персонализират според вашите предпочитания, инструментите, които използва вашата организация, вашия индустриален сектор и нивото на вашата страна.
  ca: Els butlletins es poden personalitzar segons les vostres preferències, les eines que utilitza la vostra organització, el vostre sector industrial i el nivell del vostre país.
  cs: Zpravodaje lze přizpůsobit podle vašich preferencí, nástrojů, které vaše organizace používá, vašeho průmyslového odvětví a úrovně vaší země.
  cy: Gellir addasu'r cylchlythyrau yn ôl eich dewis, yr offer y mae eich sefydliad yn eu defnyddio, eich sector diwydiant a lefel eich gwlad.
  da: Nyhedsbrevene kan tilpasses i henhold til dine præferencer, de værktøjer din organisation bruger, din industrisektor og dit landsniveau.
  de: Die Newsletter können nach Ihren Präferenzen, den von Ihrer Organisation verwendeten Tools, Ihrem Branchensektor und Ihrem Länderniveau angepasst werden.
  el: Τα ενημερωτικά δελτία μπορούν να προσαρμοστούν σύμφωνα με τις προτιμήσεις σας, τα εργαλεία που χρησιμοποιεί ο οργανισμός σας, τον κλάδο σας και το επίπεδο της χώρας σας.
  en: The newsletters are customisable according to your preference, the tools your organisation uses, your industry sector and your country level.
  es: Los boletines informativos son personalizables según sus preferencias, las herramientas que utiliza su organización, su sector industrial y su nivel de país.
  et: Uudiskirjad on kohandatavad vastavalt teie eelistustele, teie organisatsiooni kasutatavatele tööriistadele, teie tööstussektorile ja teie riigi tasemele.
  fi: Uutiskirjeet ovat muokattavissa mieltymystesi, organisaatiosi käyttämien työkalujen, toimialasi ja maasi tason mukaan.
  fr: Les newsletters sont personnalisables selon vos préférences, les outils utilisés par votre organisation, votre secteur d'activité et votre niveau de pays.
  ga: Is féidir na nuachtlitreacha a shaincheapadh de réir do roghanna, na huirlisí a úsáideann d'eagraíocht, do earnáil thionscail agus leibhéal do thíre.
  he: הידיעונים ניתנים להתאמה אישית בהתאם להעדפותיך, הכלים שבהם משתמשת הארגון שלך, מגזר התעשייה שלך ורמת המדינה שלך.
  hr: Bilteni su prilagodljivi prema vašim preferencijama, alatima koje vaša organizacija koristi, vašem industrijskom sektoru i razini vaše zemlje.
  hu: A hírlevelek testreszabhatók az Ön preferenciái, a szervezete által használt eszközök, az iparági szektor és az ország szintje szerint.
  is: Fréttabréfin eru sérhannaðanleg í samræmi við óskir þínar, þau verkfæri sem fyrirtækið þitt notar, iðnaðarsvið þitt og landsstig þitt.
  it: Le newsletter sono personalizzabili in base alle tue preferenze, agli strumenti utilizzati dalla tua organizzazione, al tuo settore industriale e al livello del tuo paese.
  lt: Naujienlaiškiai yra pritaikomi pagal jūsų pageidavimus, jūsų organizacijos naudojamus įrankius, jūsų pramonės sektorių ir jūsų šalies lygmenį.
  lv: Biļeteni ir pielāgojami atbilstoši jūsu vēlmēm, jūsu organizācijas izmantotajiem rīkiem, jūsu nozares sektoram un jūsu valsts līmenim.
  mt: In-newsletters huma personalizzabbli skont il-preferenza tiegħek, l-għodod li tuża l-organizzazzjoni tiegħek, is-settur industrijali tiegħek u l-livell tal-pajjiż tiegħek.
  nl: De nieuwsbrieven zijn aanpasbaar op basis van uw voorkeur, de tools die uw organisatie gebruikt, uw branchesector en uw landniveau.
  nl_BE: De nieuwsbrieven zijn aanpasbaar op basis van uw voorkeur, de tools die uw organisatie gebruikt, uw branchesector en uw landniveau.
  nl_be: De nieuwsbrieven zijn aanpasbaar op basis van uw voorkeur, de tools die uw organisatie gebruikt, uw branchesector en uw landniveau.
  'no': Nyhetsbrevene kan tilpasses etter dine preferanser, verktøyene organisasjonen din bruker, din bransje og ditt land.
  pl: Biuletyny można dostosować zgodnie z własnymi preferencjami, narzędziami używanymi przez organizację, sektorem branżowym i poziomem kraju.
  pt: Os boletins informativos são personalizáveis de acordo com a sua preferência, as ferramentas que a sua organização utiliza, o seu setor de atividade e o seu país.
  ro: Buletinele informative sunt personalizabile în funcție de preferințele dvs., instrumentele pe care le folosește organizația dvs., sectorul dvs. de activitate și țara dvs.
  ru: Информационные бюллетени можно настроить в соответствии с вашими предпочтениями, инструментами вашей организации, отраслью и уровнем вашей страны.
  sk: Informačné bulletiny sú prispôsobiteľné podľa vašich preferencií, nástrojov, ktoré vaša organizácia používa, vášho odvetvia a vašej krajiny.
  sl: Glasila so prilagodljiva glede na vaše preference, orodja, ki jih uporablja vaša organizacija, vaš industrijski sektor in vašo državo.
  sq: Buletinet informative janë të personalizueshme sipas preferencës suaj, mjeteve që përdor organizata juaj, sektorit tuaj të industrisë dhe nivelit të vendit tuaj.
  sr: Bilteni su prilagodljivi prema vašim preferencijama, alatima koje vaša organizacija koristi, vašem industrijskom sektoru i nivou vaše zemlje.
  sv: Nyhetsbreven kan anpassas efter dina preferenser, de verktyg din organisation använder, din bransch och ditt lands nivå.
  uk: Інформаційні бюлетені можна налаштувати відповідно до ваших уподобань, інструментів, які використовує ваша організація, вашого галузевого сектора та рівня вашої країни.
message_help_system_language:
  bg: Системният език е езикът на бутоните, менютата и другите елементи за управление. Езикът на вашето съдържание или на инструментите, които използвате, не се променя с тази настройка.
  ca: L'idioma del sistema és l'idioma dels botons, menús i altres controls. L'idioma del vostre contingut o de les eines que utilitzeu no canvia amb aquesta configuració.
  cs: Systémový jazyk je jazyk tlačítek, nabídek a dalších ovládacích prvků. Jazyk vašeho obsahu nebo nástrojů, které používáte, se tímto nastavením nemění.
  cy: Iaith y system yw iaith botymau, dewislenni a rheolaethau eraill. Nid yw iaith eich cynnwys na'r offer a ddefnyddiwch yn newid gyda'r gosodiad hwn.
  da: Systemsproget er sproget for knapper, menuer og andre kontrolelementer. Sproget for dit indhold eller de værktøjer, du bruger, ændres ikke med denne indstilling.
  de: Die Systemsprache ist die Sprache der Schaltflächen, Menüs und anderer Bedienelemente. Die Sprache Ihrer Inhalte oder der von Ihnen verwendeten Tools ändert sich mit dieser Einstellung nicht.
  el: Η γλώσσα συστήματος είναι η γλώσσα των κουμπιών, των μενού και άλλων στοιχείων ελέγχου. Η γλώσσα του περιεχομένου σας ή των εργαλείων που χρησιμοποιείτε δεν αλλάζει με αυτή τη ρύθμιση.
  en: The system language is the language of buttons, menus and other controls. The language of your content or of the tools you use, do not change with this setting.
  es: El idioma del sistema es el idioma de los botones, los menús y otros controles. El idioma de su contenido o de las herramientas que utiliza no cambia con esta configuración.
  et: Süsteemikeel on nuppude, menüüde ja muude juhtelementide keel. Teie sisu või kasutatavate tööriistade keel ei muutu selle seadistusega.
  fi: Järjestelmäkieli on painikkeiden, valikkojen ja muiden ohjauselementtien kieli. Sisältösi tai käyttämiesi työkalujen kieli ei muutu tällä asetuksella.
  fr: La langue du système est la langue des boutons, des menus et des autres commandes. La langue de votre contenu ou des outils que vous utilisez ne change pas avec ce paramètre.
  ga: Is é an teanga chórais teanga na gcnaipí, na roghchláir agus rialuithe eile. Ní athraíonn teanga do chuid ábhair ná na n-uirlisí a úsáideann tú leis an socrú seo.
  he: שפת המערכת היא שפת הכפתורים, התפריטים ופקדים אחרים. שפת התוכן שלך או הכלים שבהם אתה משתמש אינה משתנה עם הגדרה זו.
  hr: Jezik sustava je jezik gumba, izbornika i ostalih kontrola. Jezik vašeg sadržaja ili alata koje koristite ne mijenja se ovom postavkom.
  hu: A rendszer nyelve a gombok, menük és egyéb vezérlők nyelve. A tartalom nyelve vagy az Ön által használt eszközök nyelve ezzel a beállítással nem változik.
  is: Tungumál kerfisins er tungumál takka, valmynda og annarra stýringa. Tungumál efnis þíns eða verkfæranna sem þú notar breytist ekki með þessari stillingu.
  it: La lingua del sistema è la lingua dei pulsanti, dei menu e degli altri controlli. La lingua dei tuoi contenuti o degli strumenti che utilizzi non cambia con questa impostazione.
  lt: Sistemos kalba yra mygtukų, meniu ir kitų valdiklių kalba. Jūsų turinio arba naudojamų įrankių kalba šiuo nustatymu nesikeičia.
  lv: Sistēmas valoda ir pogu, izvēlņu un citu vadīklu valoda. Jūsu satura vai izmantoto rīku valoda nemainās ar šo iestatījumu.
  mt: Il-lingwa tas-sistema hija l-lingwa tal-buttuni, il-menùs u kontrolli oħra. Il-lingwa tal-kontenut tiegħek jew tal-għodod li tuża ma tinbidilx b'dan l-issettjar.
  nl: De systeemtaal is de taal van knoppen, menu's en andere bedieningselementen. De taal van uw inhoud of van de tools die u gebruikt, verandert niet met deze instelling.
  nl_BE: De systeemtaal is de taal van knoppen, menu's en andere bedieningselementen. De taal van uw inhoud of van de tools die u gebruikt, verandert niet met deze instelling.
  nl_be: De systeemtaal is de taal van knoppen, menu's en andere bedieningselementen. De taal van uw inhoud of van de tools die u gebruikt, verandert niet met deze instelling.
  'no': Systemspråket er språket for knapper, menyer og andre kontroller. Språket i innholdet ditt eller i verktøyene du bruker, endres ikke med denne innstillingen.
  pl: Język systemowy to język przycisków, menu i innych elementów sterujących. Język treści ani narzędzi, których używasz, nie zmienia się wraz z tym ustawieniem.
  pt: O idioma do sistema é o idioma dos botões, menus e outros controles. O idioma do seu conteúdo ou das ferramentas que você usa não muda com esta configuração.
  ro: Limba sistemului este limba butoanelor, meniurilor și altor controale. Limba conținutului dvs. sau a instrumentelor pe care le utilizați nu se modifică odată cu această setare.
  ru: Язык системы — это язык кнопок, меню и других элементов управления. Язык вашего контента или используемых инструментов не изменяется вместе с этой настройкой.
  sk: Systémový jazyk je jazyk tlačidiel, ponúk a iných ovládacích prvkov. Jazyk vášho obsahu alebo nástrojov, ktoré používate, sa týmto nastavením nemení.
  sl: Sistemski jezik je jezik gumbov, menijev in drugih kontrolnih elementov. Jezik vaše vsebine ali orodij, ki jih uporabljate, se s to nastavitvijo ne spremeni.
  sq: Gjuha e sistemit është gjuha e butonave, menuve dhe kontrolleve të tjera. Gjuha e përmbajtjes suaj ose e mjeteve që përdorni nuk ndryshon me këtë cilësim.
  sr: Sistemski jezik je jezik dugmića, menija i ostalih kontrola. Jezik vašeg sadržaja ili alata koje koristite se ne menja ovim podešavanjem.
  sv: Systemspråket är språket för knappar, menyer och andra kontroller. Språket för ditt innehåll eller de verktyg du använder ändras inte med den här inställningen.
  uk: Мова системи — це мова кнопок, меню та інших елементів керування. Мова вашого вмісту або інструментів, якими ви користуєтеся, не змінюється з цим налаштуванням.
message_help_version_name:
  bg: Това е името на версията на този инструмент. Името на версията е само за редактори и никога няма да се показва на потребителите на инструмента.
  ca: Aquest és el nom de la versió d'aquesta eina. El nom de la versió és només per als editors i no es mostrarà mai als usuaris de l'eina.
  cs: Toto je název verze tohoto nástroje. Název verze je určen pouze pro editory a nikdy se nezobrazí uživatelům nástroje.
  cy: Dyma enw fersiwn yr offeryn hwn. Dim ond i olygyddion y mae enw'r fersiwn ac ni chaiff ei ddangos byth i ddefnyddwyr yr offeryn.
  da: Dette er navnet på versionen af dette værktøj. Versionsnavnet er kun til redaktører og vil aldrig blive vist for brugere af værktøjet.
  de: Dies ist der Name der Version dieses Tools. Der Versionsname ist nur für Editoren bestimmt und wird den Benutzern des Tools niemals angezeigt.
  el: Αυτό είναι το όνομα της έκδοσης αυτού του εργαλείου. Το όνομα της έκδοσης είναι μόνο για επεξεργαστές και δεν θα εμφανιστεί ποτέ στους χρήστες του εργαλείου.
  en: This is the name of the version of this tool. The version name is only for editors and will never be shown to users of the tool.
  es: Este es el nombre de la versión de esta herramienta. El nombre de la versión es solo para editores y nunca se mostrará a los usuarios de la herramienta.
  et: See on selle tööriista versiooni nimi. Versiooninimi on mõeldud ainult toimetajatele ega kuvata kunagi tööriista kasutajatele.
  fi: Tämä on tämän työkalun version nimi. Versio nimi on tarkoitettu vain toimittajille eikä sitä koskaan näytetä työkalun käyttäjille.
  fr: Il s'agit du nom de la version de cet outil. Le nom de la version est réservé aux éditeurs et ne sera jamais affiché aux utilisateurs de l'outil.
  ga: Is é seo ainm an leagan den uirlis seo. Is do eagarthóirí amháin é ainm an leagan agus ní thaispeánfar do úsáideoirí an uirlis go deo.
  he: זהו שם גרסה של הכלי הזה. שם הגרסה מיועד רק לעורכים ולעולם לא יוצג למשתמשים של הכלי.
  hr: Ovo je naziv verzije ovog alata. Naziv verzije namijenjen je samo urednicima i nikada se neće prikazati korisnicima alata.
  hu: Ez a verzió neve ennek az eszköznek. A verzió neve csak szerkesztőknek szól, és soha nem jelenik meg az eszköz felhasználóinak.
  is: Þetta er heiti á útgáfu þessa verkfæris. Útgáfuheitið er aðeins fyrir ritstjóra og verður aldrei sýnt notendum verkfærisins.
  it: Questo è il nome della versione di questo strumento. Il nome della versione è solo per gli editori e non verrà mai mostrato agli utenti dello strumento.
  lt: Tai yra šio įrankio versijos pavadinimas. Versijos pavadinimas skirtas tik redaktoriams ir niekada nebus rodomas įrankio naudotojams.
  lv: Tas ir irīka versijas nosaukums. Versijas nosaukums ir paredzēts tikai redaktoriem un nekad netiks rādīts rīka lietotājiem.
  mt: Dan huwa l-isem tal-verżjoni ta 'dan l-għodda. L-isem tal-verżjoni huwa biss għall-edituri u qatt ma jidher lill-utenti tal-għodda.
  nl: Dit is de naam van de versie van deze tool. De versienaam is alleen voor redacteuren en wordt nooit getoond aan gebruikers van de tool.
  nl_BE: Dit is de naam van de versie van dit hulpmiddel. De versienaam is alleen voor redacteurs en zal nooit worden getoond aan gebruikers van het hulpmiddel.
  nl_be: Dit is de naam van de versie van dit hulpmiddel. De versienaam is alleen voor redacteurs en zal nooit worden getoond aan gebruikers van het hulpmiddel.
  'no': Dette er navnet på versjonen av dette verktøyet. Versjonsnavnet er kun for redaktører og vil aldri vises til brukere av verktøyet.
  pl: To jest nazwa wersji tego narzędzia. Nazwa wersji jest przeznaczona tylko dla redaktorów i nigdy nie będzie wyświetlana użytkownikom narzędzia.
  pt: Este é o nome da versão desta ferramenta. O nome da versão destina-se apenas a editores e nunca será mostrado aos usuários da ferramenta.
  ro: Acesta este numele versiunii acestei unelte. Numele versiunii este doar pentru editori și nu va fi niciodată afișat utilizatorilor uneltei.
  ru: Это название версии данного инструмента. Название версии предназначено только для редакторов и никогда не будет показано пользователям инструмента.
  sk: Toto je názov verzie tohto nástroja. Názov verzie je určený iba pre editorov a nikdy sa nezobrazí používateľom nástroja.
  sl: To je ime različice tega orodja. Ime različice je namenjeno samo urednikom in nikoli ne bo prikazano uporabnikom orodja.
  sq: Ky është emri i versionit të këtij mjeti. Emri i versionit është vetëm për redaktorët dhe nuk do t'u shfaqet kurrë përdoruesve të mjetit.
  sr: Ovo je naziv verzije ovog alata. Naziv verzije je samo za urednike i nikada neće biti prikazan korisnicima alata.
  sv: Detta är namnet på versionen av detta verktyg. Versionsnamnet är endast för redaktörer och kommer aldrig att visas för användare av verktyget.
  uk: Це назва версії цього інструменту. Назва версії призначена лише для редакторів і ніколи не буде показана користувачам інструменту.
message_insert_module_from_other_tool_instruction:
  bg: Изберете модул от друг инструмент и вмъкнете копие в този инструмент.
  ca: Seleccioneu un mòdul d'una altra eina i inseriu-ne una còpia en aquesta eina.
  cs: Vyberte modul z jiného nástroje a vložte kopii do tohoto nástroje.
  cy: Dewiswch fodiwl o offeryn arall a mewnosodwch gopi i'r offeryn hwn.
  da: Vælg en modul fra et andet værktøj og indsæt en kopi i dette værktøj.
  de: Wählen Sie ein Modul aus einem anderen Tool aus und fügen Sie eine Kopie in dieses Tool ein.
  el: Επιλέξτε ένα πρόσθετο από ένα άλλο εργαλείο και εισαγάγετε ένα αντίγραφο σε αυτό το εργαλείο.
  en: Select a module from another tool and insert a copy into this tool.
  es: Seleccione un módulo de otra herramienta e inserte una copia en esta herramienta.
  et: Valige moodul mõnest muust tööriistast ja sisestage koopia sellesse tööriista.
  fi: Valitse moduuli toisesta työkalusta ja lisää kopio tähän työkaluun.
  fr: Sélectionnez un module à partir d'un autre outil et insérez une copie dans cet outil.
  ga: Roghnaigh modúl ó uirlis eile agus cuir cóip isteach sa t-uirlis seo.
  he: בחר מודול מכלי עבודה אחר והכנס עותק לכלי זה.
  hr: Odaberite modul iz drugog alata i umetnite kopiju u ovaj alat.
  hu: Válasszon egy modult egy másik eszközből, és helyezzen be egy másolatot ebbe az eszközbe.
  is: Veldu hluta úr öðru tóli og settu inn afrit í þetta tól.
  it: Seleziona un modulo da un altro strumento e inserisci una copia in questo strumento.
  lt: Pasirinkite modulį iš kito įrankio ir įterpkite kopiją į šį įrankį.
  lv: Izvēlieties moduli no citas rīka un ievietojiet kopiju šajā rīkā.
  mt: Agħżel mudell minn għodda oħra u daħħal kopja f'dan l-għodda.
  nl: Selecteer een module uit een andere tool en voeg een kopie in in deze tool.
  nl_BE: Selecteer een module uit een ander instrument en voeg een kopie in dit instrument in.
  nl_be: Selecteer een module uit een ander instrument en voeg een kopie in dit instrument in.
  'no': Velg en modul fra et annet verktøy og sett inn en kopi i dette verktøyet.
  pl: Wybierz moduł z innego narzędzia i wstaw kopię do tego narzędzia.
  pt: Selecione um módulo de outra ferramenta e insira uma cópia nesta ferramenta.
  ro: Selectați un modul dintr-un alt instrument și inserați o copie în acest instrument.
  ru: Выберите модуль из другого инструмента и вставьте его копию в этот инструмент.
  sk: Vyberte modul z iného nástroja a vložte kópiu do tohto nástroja.
  sl: Izberite modul iz drugega orodja in vstavite kopijo v to orodje.
  sq: Zgjidhni një modul nga një mjet tjetër dhe futni një kopje në këtë mjet.
  sr: Izaberite modul iz drugog alata i ubacite kopiju u ovaj alat.
  sv: Välj en modul från ett annat verktyg och infoga en kopia i detta verktyg.
  uk: Виберіть модуль з іншого інструменту та вставте його копію в цей інструмент.
message_intro_send_briefing_documents:
  bg: Ако продължите, ще се случи следното.
  ca: Si continueu, passarà el següent.
  cs: Pokud budete pokračovat, stane se následující.
  cy: Os byddwch yn parhau, bydd y canlynol yn digwydd.
  da: Hvis du fortsætter, vil følgende ske.
  de: Wenn Sie forfahren, passiert folgendes.
  el: Εάν συνεχίσετε, θα συμβεί το εξής.
  en: If you proceed the following will happen.
  es: Si continúa, ocurrirá lo siguiente.
  et: Kui jätkate, juhtub järgmine.
  fi: Jos jatkat, seuraavaa tapahtuu.
  fr: Si vous continuez, voici ce qui se passera.
  ga: Má leanann tú ar aghaidh, tarlóidh an méid seo a leanas.
  he: אם תמשיך, יקרה הדבר הבא.
  hr: Ako nastavite, dogodit će se sljedeće.
  hu: Ha folytatja, a következők fognak történni.
  is: Ef þú heldur áfram mun eftirfarandi gerast.
  it: Se procedi, accadrà quanto segue.
  lt: Jei tęsite, įvyks šie veiksmai.
  lv: Ja turpināsiet, notiks sekojošais.
  mt: Jekk tkompli, dan li ġej se jiġri.
  nl: Als u verdergaat, zal het volgende gebeuren.
  nl_BE: Als u verdergaat, zal het volgende gebeuren.
  nl_be: Als u verdergaat, zal het volgende gebeuren.
  'no': Hvis du fortsetter, vil følgende skje.
  pl: Jeśli przejdziesz dalej, nastąpi co następuje.
  pt: Se prosseguir, acontecerá o seguinte.
  ro: Dacă continuați, se va întâmpla următoarele.
  ru: Если вы продолжите, произойдёт следующее.
  sk: Ak budete pokračovať, stane sa nasledovné.
  sl: Če nadaljujete, se bo zgodilo naslednje.
  sq: Nëse vazhdoni, do të ndodhë sa vijon.
  sr: Ako nastavite, dogodiće se sledeće.
  sv: Om du fortsätter kommer följande att hända.
  uk: Якщо ви продовжите, відбудеться наступне.
message_invite_user:
  bg: Когато щракнете върху 'Покани по имейл', вашият имейл клиент ще се отвори с нов имейл с връзка, която хората могат да използват, за да се присъединят към вашата организация. Връзката е валидна пет дни и можете да я изпратите на толкова хора, колкото желаете да се присъединят към вашата организация.
  ca: Quan feu clic a 'Convidar per correu electrònic', el vostre client de correu electrònic s'obrirà amb un nou correu electrònic que conté un enllaç que la gent pot utilitzar per unir-se a la vostra organització. L'enllaç és vàlid durant cinc dies i podeu enviar-lo a tantes persones com vulgueu que s'uneixin a la vostra organització.
  cs: Když kliknete na 'Pozvat e-mailem', váš e-mailový klient se otevře s novým e-mailem obsahujícím odkaz, který mohou lidé použít k připojení k vaší organizaci. Odkaz je platný pět dní a můžete jej poslat tolika lidem, kolik chcete, aby se připojilo k vaší organizaci.
  cy: Pan gliciwch ar 'Gwahodd trwy e-bost', bydd eich cleient e-bost yn agor gydag e-bost newydd sy'n cynnwys dolen y gall pobl ei defnyddio i ymuno â'ch sefydliad. Mae'r ddolen yn ddilys am bum diwrnod a gallwch ei hanfon at gynifer o bobl ag y dymunwch ymuno â'ch sefydliad.
  da: Når du klikker på 'Inviter via e-mail', åbner din e-mail-klient med en ny e-mail med et link, som folk kan bruge til at tilmelde sig din organisation. Linket er gyldigt i fem dage, og du kan sende det til så mange personer, du ønsker skal tilmelde sig din organisation.
  de: Wenn Sie auf „Einladen per E-Mail“ klicken, öffnet sich Ihr E-Mail-Client mit einer neuen E-Mail mit einem darin enthaltenen Link, über den Personen Ihrer Organisation beitreten können. Der Link ist fünf Tage lang gültig und Sie können ihn an so viele Personen senden, wie Sie Ihrer Organisation beitreten möchten.
  el: Όταν κάνετε κλικ στο 'Πρόσκληση μέσω e-mail', ο πελάτης e-mail σας θα ανοίξει με ένα νέο e-mail που περιέχει έναν σύνδεσμο τον οποίο οι άνθρωποι μπορούν να χρησιμοποιήσουν για να εγγραφούν στον οργανισμό σας. Ο σύνδεσμος ισχύει για πέντε ημέρες και μπορείτε να τον στείλετε σε όσους ανθρώπους θέλετε να εγγραφούν στον οργανισμό σας.
  en: When you click ‘Invite by e-mail’, your e-mail client will open with a new e-mail with a link in it that people can use to join your organisation. The link is valid for five days and you may send it to as many people as you would like to join your organisation.
  es: Cuando haga clic en 'Invitar por correo electrónico', su cliente de correo electrónico se abrirá con un nuevo correo electrónico que contiene un enlace que las personas pueden usar para unirse a su organización. El enlace es válido por cinco días y puede enviarlo a tantas personas como desee que se unan a su organización.
  et: Kui klõpsate 'Kutsu e-postiga', avab teie e-posti klient uue e-kirja lingiga, mida inimesed saavad kasutada teie organisatsiooniga liitumiseks. Link kehtib viis päeva ja võite selle saata nii paljudele inimestele kui soovite teie organisatsiooniga liituda.
  fi: Kun napsautat 'Kutsu sähköpostitse', sähköpostiohjelmasi avautuu uudella sähköpostiviestillä, jossa on linkki, jota ihmiset voivat käyttää liittyäkseen organisaatioosi. Linkki on voimassa viisi päivää ja voit lähettää sen niin monelle henkilölle kuin haluat liittyvän organisaatioosi.
  fr: Lorsque vous cliquez sur "Inviter par e-mail", votre client de messagerie s'ouvre avec un nouvel e-mail contenant un lien que les personnes peuvent utiliser pour rejoindre votre organisation. Le lien est valable cinq jours et vous pouvez l'envoyer à autant de personnes que vous souhaitez rejoindre votre organisation.
  ga: Nuair a chliceálann tú 'Cuir cuireadh trí ríomhphost', osclóidh do chliant ríomhphoist ríomhphost nua le nasc ann is féidir le daoine a úsáid chun páirt a ghlacadh i d'eagraíocht. Tá an nasc bailí ar feadh cúig lá agus féadfaidh tú é a sheoladh chuig an oiread daoine agus is mian leat a bheith páirteach in d'eagraíocht.
  he: כאשר תלחץ על 'הזמן בדוא"ל', לקוח הדוא"ל שלך ייפתח עם הודעה חדשה עם קישור שאנשים יכולים להשתמש בו כדי להצטרף לארגון שלך. הקישור תקף לחמישה ימים ותוכל לשלוח אותו לכמה אנשים שתרצה שיצטרפו לארגונך.
  hr: Kada kliknete 'Pozovi e-poštom', vaš klijent e-pošte otvorit će se s novom e-poštom s vezom koju ljudi mogu koristiti za pridruživanje vašoj organizaciji. Veza vrijedi pet dana i možete je poslati onoliko ljudi koliko želite da se pridruže vašoj organizaciji.
  hu: Amikor az 'E-mailben meghív' gombra kattint, az e-mail kliense megnyílik egy új e-maillel, amely tartalmaz egy linket, amelyet az emberek felhasználhatnak a szervezetéhez való csatlakozáshoz. A link öt napig érvényes, és elküldheti annyi embernek, amennyit szeretne, hogy csatlakozzanak a szervezetéhez.
  is: Þegar þú smellir á 'Bjóða með tölvupósti' mun tölvupóstforritið þitt opnast með nýjum tölvupósti með tengli sem fólk getur notað til að ganga í samtökin þín. Tengillinn er gildur í fimm daga og þú getur sent hann til eins margra og þú vilt ganga í samtökin þín.
  it: Quando fai clic su 'Invita tramite e-mail', il tuo client di posta elettronica si aprirà con una nuova e-mail contenente un link che le persone possono usare per unirsi alla tua organizzazione. Il link è valido per cinque giorni e puoi inviarlo a quante persone desideri che si uniscano alla tua organizzazione.
  lt: Kai spustelėsite „Pakviesti el. paštu
  lv: Kad noklikšķināsiet uz 'Uzaicināt pa e-pastu', jūsu e-pasta klients atvērsies ar jaunu e-pastu, kurā būs saite, ko cilvēki var izmantot, lai pievienotos jūsu organizācijai. Saite ir derīga piecas dienas, un jūs varat to nosūtīt tik daudziem cilvēkiem, cik vēlaties, lai pievienotos jūsu organizācijai.
  mt: Meta tikklikkja fuq 'Stieden bl-e-mail', il-klijent tal-e-mail tiegħek jinfetaħ b'e-mail ġdid b'link fih li n-nies jistgħu jużaw biex jingħaqdu mal-organizzazzjoni tiegħek. Il-link huwa validu għal ħamest ijiem u tista' tibgħatu lil kemm-il persuna tixtieq li tingħaqad mal-organizzazzjoni tiegħek.
  nl: Als je op ‘Uitnodigen per e-mail’ klikt, opent je e-mailclient met een nieuwe e-mail met daarin een link waarmee mensen lid kunnen worden van je organisatie. De link is vijf dagen geldig en u kunt hem naar zoveel mensen sturen als u wilt om lid te worden van uw organisatie.
  nl_BE: Wanneer u op 'Uitnodigen per e-mail' klikt, wordt uw e-mailclient geopend met een nieuw e-mailbericht met een link waarmee mensen lid kunnen worden van uw organisatie. De link is vijf dagen geldig en u kunt hem naar zoveel mensen sturen als u wilt dat zij lid worden van uw organisatie.
  nl_be: Wanneer u op 'Uitnodigen per e-mail' klikt, wordt uw e-mailclient geopend met een nieuw e-mailbericht met een link waarmee mensen lid kunnen worden van uw organisatie. De link is vijf dagen geldig en u kunt hem naar zoveel mensen sturen als u wilt dat zij lid worden van uw organisatie.
  'no': Når du klikker på 'Inviter via e-post', åpnes e-postklienten din med en ny e-post med en lenke som folk kan bruke til å bli med i organisasjonen din. Lenken er gyldig i fem dager, og du kan sende den til så mange du vil ha med i organisasjonen din.
  pl: Po kliknięciu przycisku 'Zaproś e-mailem' otworzy się klient poczty e-mail z nową wiadomością zawierającą link, który można wykorzystać do dołączenia do Twojej organizacji. Link jest ważny przez pięć dni i możesz go wysłać do tylu osób, ile chcesz zaprosić do swojej organizacji.
  pt: Quando clicar em 'Convidar por e-mail', o seu cliente de e-mail abrirá com um novo e-mail com um link que as pessoas podem usar para aderir à sua organização. O link é válido por cinco dias e pode enviá-lo a tantas pessoas quantas desejar que se juntem à sua organização.
  ro: Când faceți clic pe 'Invitați prin e-mail', clientul dvs. de e-mail se va deschide cu un e-mail nou care conține un link pe care oamenii îl pot folosi pentru a se alătura organizației dvs. Linkul este valabil timp de cinci zile și îl puteți trimite oricâtor persoane doriți să se alăture organizației dvs.
  ru: Когда вы нажмёте «Пригласить по электронной почте», откроется ваш почтовый клиент с новым письмом, содержащим ссылку, которую люди могут использовать для вступления в вашу организацию. Ссылка действительна в течение пяти дней, и вы можете отправить её любому количеству людей, которых хотите пригласить в вашу организацию.
  sk: Keď kliknete na 'Pozvať e-mailom', váš e-mailový klient sa otvorí s novým e-mailom, ktorý obsahuje odkaz, ktorý môžu ľudia použiť na vstup do vašej organizácie. Odkaz je platný päť dní a môžete ho poslať toľkým ľuďom, koľkých chcete pozvať do vašej organizácie.
  sl: Ko kliknete 'Povabi po e-pošti', se bo vaš e-poštni odjemalec odprl z novim e-poštnim sporočilom s povezavo, ki jo lahko ljudje uporabijo za pridružitev vaši organizaciji. Povezava je veljavna pet dni in jo lahko pošljete toliko ljudem, kolikor jih želite povabiti v svojo organizacijo.
  sq: Kur klikoni 'Fto me e-mail', klienti juaj i e-mailit do të hapet me një e-mail të ri me një lidhje që njerëzit mund ta përdorin për t'u bashkuar me organizatën tuaj. Lidhja është e vlefshme për pesë ditë dhe mund ta dërgoni tek aq shumë njerëz sa dëshironi të bashkohen me organizatën tuaj.
  sr: Kada kliknete na 'Pozovi e-mailom', vaš e-mail klijent će se otvoriti sa novom porukom koja sadrži link koji ljudi mogu koristiti za pridruživanje vašoj organizaciji. Link je važeći pet dana i možete ga poslati koliko god ljudi želite da se pridruže vašoj organizaciji.
  sv: När du klickar på 'Bjud in via e-post' öppnas din e-postklient med ett nytt e-postmeddelande med en länk som folk kan använda för att gå med i din organisation. Länken är giltig i fem dagar och du kan skicka den till så många personer du vill ska gå med i din organisation.
  uk: Коли ви натиснете «Запросити електронною поштою», ваш поштовий клієнт відкриється з новим листом, що містить посилання для вступу до вашої організації. Посилання дійсне протягом п'яти днів, і ви можете надіслати його стільком людям, скільки бажаєте.
message_involve_workers_how_to:
  bg: Решете по най-добрия начин как да включите персонала си! Можете например да проведете среща или фокус група с работниците и заедно да прегледате съответните части от оценката на риска. Можете също да изтеглите или отпечатате съдържанието на инструмента или части от него и да го споделите с работниците си за информация и обратна връзка.
  ca: Decideixi la millor manera d'involucrar al teu personal! Per exemple, podeu fer una reunió o crear un grup de discussió amb els treballadors i abordar junts les parts respectives de l'avaluació de riscos. També pot descarregar o imprimir el contingut de l'eina o parts d'ella i compartir-la per obtenir informació i comentaris amb els seus treballadors.
  cs: Zvolte způsob, jak nejlépe zapojit Vaše zaměstnance! Může to být například setkání se zaměstnanci nebo zapojení pracovní skupiny či společné posuzování rizik s příslušnými subjekty. Můžete si rovněž stáhnout nebo vytisknout obsah nástroje nebo jeho částí a podělit se o informace s vašimi zaměstnanci a zajistit zpětnou vazbu.
  cy: Penderfynwch ar y ffordd orau i gynnwys eich staff! Gallwch er enghraifft gynnal cyfarfod neu grŵp ffocws gyda gweithwyr a mynd drwy'r rhannau perthnasol yn yr asesiad risg gyda'ch gilydd. Gallwch hefyd lawrlwytho neu argraffu cynnwys yr offeryn neu rannau ohono a'i rannu am wybodaeth ac adborth gyda'ch gweithwyr.
  da: Beslut dig for den bedste måde at involvere dine medarbejdere på! Du kan for eksempel afholde et møde eller en fokusgruppe med medarbejderne og gennemgå de respektive dele i risikovurderingen sammen. Du kan også downloade eller udskrive indholdet af værktøjet eller dele af det og dele det med dine medarbejdere til information og feedback.
  de: Entscheiden Sie sich für den besten Weg, Ihre Mitarbeiter einzubeziehen! Sie können beispielsweise eine Besprechung oder eine Fokusgruppe mit den Arbeitnehmern durchführen und gemeinsam die entsprechenden Teile der Gefährdungsbeurteilung durchgehen. Sie können den Inhalt des Tools oder Teile davon auch herunterladen oder ausdrucken und ihn Ihren Mitarbeitern zur Information und für Rückmeldungen weitergeben.
  el: Αποφασίστε ποιος είναι ο καλύτερος τρόπος συμμετοχής του προσωπικού σας! Για παράδειγμα, μπορείτε να διοργανώσετε μια συνεδρίαση ή να δημιουργήσετε μια ομάδα εργασίας με τους εργαζόμενους ειδικά για το θέμα της εκπόνησης της μελέτης εκτίμησης κινδύνου, για να εξετάσετε από κοινού τις διάφορες φάσεις ή τις διάφορες θεματικές ενότητες της μελέτης. Έχετε επίσης τη δυνατότητα λήψης του περιεχομένου του εργαλείου ή/και εκτύπωσης  του συνόλου του περιεχομένου ή επιλεγμένων τμημάτων αυτού, προκειμένου να το κοινοποιήσετε στους εργαζόμενους με σκοπό την ανταλλαγή πληροφοριών και την εκ μέρους τους υποβολή σχολίων και προτάσεων.
  en: Decide on the best way to involve your staff! You can for example conduct a meeting or a focus group with workers and go through the respective parts in the risk assessment together. You can also download or print the content of the tool or parts of it and share it for information and feedback with your workers.
  es: Decida sobre la mejor manera de implicar a su personal. Puede, por ejemplo, celebrar una reunión o crear un grupo de discusión con los trabajadores y abordar conjuntamente las partes correspondientes en la evaluación de riesgos. También puede descargar o imprimir el contenido de la herramienta o de partes de la misma y compartirla con sus trabajadores.
  et: Otsustage parim viis oma töötajate kaasamiseks! Võite näiteks korraldada töötajatega koosoleku või fookusgrupi ning koos läbi vaadata riskihinnangu vastavad osad. Samuti saate tööriista sisu või selle osi alla laadida või välja printida ning jagada seda oma töötajatega teabe saamiseks ja tagasiside andmiseks.
  fi: Päätä paras tapa ottaa henkilöstösi mukaan! Voit esimerkiksi järjestää kokouksen tai fokusryhmän työntekijöiden kanssa ja käydä yhdessä läpi riskiarvioinnin asiaankuuluvat osat. Voit myös ladata tai tulostaa työkalun sisällön tai osia siitä ja jakaa sen tiedoksi ja palautteen saamiseksi työntekijöillesi.
  fr: Décidez de la meilleure manière d’associer votre personnel ! Vous pouvez par exemple organiser une réunion ou un groupe de réflexion avec les travailleurs et passer en revue les différents modules de l’évaluation des risques.<br/>Vous pouvez également télécharger ou imprimer le contenu de l’outil ou des parties de l’outil et le partager pour information et retour d’information avec vos travailleurs.
  ga: Cinntigh an bealach is fearr chun do chuid foirne a chur i gceist! Is féidir leat, mar shampla, cruinniú nó grúpa fócais a reáchtáil le hoibrithe agus na codanna faoi seach den mheasúnú riosca a dul trína chéile le chéile. Is féidir leat freisin ábhar an uirlís nó codanna de a íoslódáil nó a phriontáil agus é a roinnt le d'oibrithe le haghaidh faisnéise agus aiseolais.
  he: החליטו על הדרך הטובה ביותר לשתף את הצוות שלכם! לדוגמה, תוכלו לקיים פגישה או קבוצת מיקוד עם עובדים ולעבור יחד על החלקים הרלוונטיים בהערכת הסיכונים. תוכלו גם להוריד או להדפיס את תוכן הכלי או חלקים ממנו ולשתף אותו עם העובדים שלכם לצורך מידע ומשוב.
  hr: 'Odlučite na koji ćete način najbolje uključiti svoje radnike! Možete, na primjer, održati sastanak ili fokus-grupu s radnicima i zajedno proći kroz odgovarajuće dijelove procjene rizika. Također možete preuzeti ili ispisati sadržaj alata ili njegove dijelove i podijeliti ih radnicima za obavještavanje i povratnu informaciju.  '
  hu: A munkavállalók bevonásához a legjobb mód meghatározása Például szervezhet a munkavállalókkal egy megbeszélést vagy egy fókuszcsoportot, ahol együtt áttekintik a kockázatértékelés vonatkozó részeit.  Ezen kívül letöltheti vagy kinyomtathatja az eszköz tartalmát vagy annak részeit és azokat tájékoztatás és visszajelzés céljával megoszthatja a munkavállalóival.
  is: Ákveðið bestu leiðina til að fela starfsfólki þínu! Þú getur til dæmis haldið fund eða fókushóp með starfsmönnum og farið saman í gegnum viðeigandi hluta í áhættumatinu. Þú getur einnig sótt eða prentað efni tólsins eða hluta af því og deilt því með starfsmönnum þínum til upplýsinga og endurgjafar.
  it: La valutazione del rischio è un obbligo non delegabile del datore di lavoro. Deve essere effettuata in collaborazione con il RSPP, il MC, ove previsto, e previa consultazione del RLS, ove presente. Il presente strumento è strutturato in diversi moduli in cui vengono affrontati i rischi relativi alla salute e sicurezza dei lavoratori addetti al lavoro di ufficio nonché aspetti che riguardano l'organizzazione del lavoro. Lo strumento guida il datore di lavoro nella identificazione dei pericoli che possono causare un danno ai lavoratori, nella valutazione dei rischi individuando le misure di prevenzione e protezione conformi alla legislazione vigente e nella individuazione delle misure ritenute opportune per garantire il miglioramento nel tempo dei livelli di sicurezza. Il Datore di lavoro insieme al medico competente laddove presente, all'atto della predisposizione del documento dovrà verificare la presenza di rischi riguardanti le lavoratrici in stato di gravidanza (D.lgs. 151/2001) nonché quelli connessi alle differenze di genere, all'età e alla provenienza da altri paesi.
  lt: Nuspręskite, kaip geriausiai įtraukti savo darbuotojus! Pavyzdžiui, galite surengti susitikimą arba tikslinę grupę su darbuotojais ir kartu peržiūrėti atitinkamas rizikos vertinimo dalis. Taip pat galite atsisiųsti arba atspausdinti įrankio turinį ar jo dalis ir pasidalyti juo su savo darbuotojais informacijos ir atsiliepimų tikslais.
  lv: Izlemiet, kā vislabāk iesaistīt savus darbiniekus! Piemēram, varat organizēt sanāksmi vai fokusa grupu ar darbiniekiem un kopīgi izskatīt attiecīgās riska novērtējuma daļas. Varat arī lejupielādēt vai izdrukāt rīka saturu vai tā daļas un kopīgot tās ar darbiniekiem informācijai un atsauksmēm.
  mt: Iddeċiedi dwar l-aħjar mod biex tinvolvi lill-ħaddiema tiegħek! Tista’ pereżempju torganizza laqgħa jew tifforma grupp mal-ħaddiema u tiddiskuti l-partijiet rispettivi fl-evalwazzjoni tar-riskju flimkien. Tista’ wkoll tniżżel jew tistampa l-kontenut tal-għodda jew partijiet minnha u tqassamha għall-informazzjoni u l-kummenti mill-ħaddiema tiegħek.
  nl: Bepaal de beste manier om uw medewerkers te betrekken! U kunt bijvoorbeeld een vergadering of een focusgroep met medewerkers houden en de betreffende onderdelen van de risicobeoordeling samen doornemen. U kunt de inhoud van het instrument of delen ervan ook downloaden of afdrukken en met uw medewerkers delen ter informatie en voor feedback.
  nl_BE: Bepaal de beste manier om uw medewerkers te betrekken! U kunt bijvoorbeeld een vergadering of een focusgroep met medewerkers houden en de betreffende onderdelen van de risicobeoordeling samen doornemen. U kunt de inhoud van het instrument of delen ervan ook downloaden of afdrukken en met uw medewerkers delen ter informatie en voor feedback.
  nl_be: Bepaal de beste manier om uw medewerkers te betrekken! U kunt bijvoorbeeld een vergadering of een focusgroep met medewerkers houden en de betreffende onderdelen van de risicobeoordeling samen doornemen. U kunt de inhoud van het instrument of delen ervan ook downloaden of afdrukken en met uw medewerkers delen ter informatie en voor feedback.
  'no': Bestem den beste måten å involvere de ansatte på! Du kan for eksempel avholde et møte eller en fokusgruppe med arbeidstakere og gå gjennom de aktuelle delene av risikovurderingen sammen. Du kan også laste ned eller skrive ut innholdet i verktøyet eller deler av det og dele det med de ansatte som informasjon og for å innhente tilbakemeldinger.
  pl: Zdecyduj, jak najlepiej zaangażować swoich pracowników! Możesz na przykład przeprowadzić spotkanie lub grupę fokusową z pracownikami i wspólnie przejść przez odpowiednie części oceny ryzyka. Możesz również pobrać lub wydrukować zawartość narzędzia lub jego części i udostępnić je pracownikom w celu uzyskania informacji i opinii.
  pt: Decida sobre a melhor forma de envolver os seus trabalhadores! Pode, por exemplo, realizar reuniões com trabalhadores ou criar grupos de trabalho e utilizar os contéudos da ferramenta para acompanharem em conjunto a avaliação de riscos. Pode também descarregar ou imprimir todo ou parte do conteúdo da ferramenta, partilhá-lo como informação a dar aos trabalhadores e utilizá-lo como feedback para a melhoria das suas condições de trabalho.
  ro: Decideți care este cel mai bun mod de a implica personalul dvs.! Puteți, de exemplu, să organizați o întâlnire sau un grup de discuție cu lucrătorii și să parcurgeți împreună părțile respective din evaluarea riscurilor. De asemenea, puteți descărca sau tipări conținutul instrumentului sau părți ale acestuia și să îl distribuiți lucrătorilor dvs. pentru informare și feedback.
  ru: Выберите наилучший способ привлечения ваших сотрудников! Например, вы можете провести совещание или фокус-группу с работниками и вместе рассмотреть соответствующие части оценки рисков. Вы также можете загрузить или распечатать содержимое инструмента или его части и поделиться ими с работниками для информирования и получения обратной связи.
  sk: Rozhodnite sa, ako najlepšie zapojíte svojich zamestnancov. Môžete napríklad zvolať poradu alebo osloviť určitú skupinu zamestnancov a prejsť jednotlivé časti v hodnotení rizík spoločne. Môžete si tiež stiahnuť alebo vytlačiť obsah nástroja alebo jeho časti a odovzdať ho svojim zamestnancom pre informáciu a aby vám poskytli spätnú väzbu.
  sl: Sprejmite odločitev, kako najbolje vključititi vaše zaposlene! Na primer z organizacijo sestankov ali fokusne skupine z zaposlenimi, kjer boste skupaj obdelali ustrezne dele ocene tveganja. Vsebino orodja ali njegovih delov lahko prenesete ali natisnete in ga delite z vašimi delavci.
  sq: Vendosni mënyrën më të mirë për të përfshirë stafin tuaj! Mund të organizoni, për shembull, një takim ose një grup fokusi me punëtorët dhe të kaloni së bashku nëpër pjesët përkatëse të vlerësimit të riskut. Gjithashtu mund të shkarkoni ose printoni përmbajtjen e mjetit ose pjesë të tij dhe ta ndani me punëtorët tuaj për informacion dhe komente.
  sr: Odlučite koji je najbolji način da uključite vaše osoblje! Možete, na primer, organizovati sastanak ili fokus grupu sa radnicima i zajedno proći kroz odgovarajuće delove procene rizika. Takođe možete preuzeti ili odštampati sadržaj alata ili njegovih delova i podeliti ga sa radnicima radi informisanja i povratnih informacija.
  sv: Bestäm det bästa sättet att involvera din personal! Du kan till exempel hålla ett möte eller en fokusgrupp med arbetstagarna och gå igenom de respektive delarna i riskbedömningen tillsammans. Du kan också ladda ner eller skriva ut innehållet i verktyget eller delar av det och dela det för information och återkoppling med dina arbetstagare.
  uk: Вирішіть, який найкращий спосіб залучити ваш персонал! Наприклад, ви можете провести нараду або фокус-групу з працівниками та разом розглянути відповідні частини оцінки ризиків. Ви також можете завантажити або роздрукувати вміст інструменту або його частини та поділитися ним з працівниками для інформування та отримання відгуків.
message_involve_workers_requirement:
  bg: Ключов момент за добро управление на безопасността и здравето при работа е да привлечете работниците. Работодателите имат задължението да се консултират с работниците по въпросите свързани с безопасността и здравето. Но има ползи да се премине отвъд минималните законови изисквания. Управлението на БЗР ще има по-голям успех ако се насърчава участието на работниците и се създава диалог между работниците и ръководството. Решете кой е най-добрият начин да привлечете персонала си! Например, можете да проведете среща или да създадете фокусна група с участие на работници и да разгледате съответни фрагменти от Оценката на риска заедно. Също може да изтеглите или разпечатате съдържанието на инструмента или части от него и да го споделите с цел получаване на информация или обратна връзка от работниците Ви.
  ca: Una de les claus per a un bon lideratge en matèria de SST és fer que s'impliquin els treballadors. Les empreses tenen el deure legal de consultar als seus empleats en matèria de seguretat i salut. Però hi ha beneficis que van més enllà del compliment dels requisits mínims. És possible que la gestió de la SST tingui més èxit si es promou la participació activa dels treballadors i s’estableix un diàleg entre els empleats i la direcció.
  cs: <p>Jedním z klíčových faktorů kvalitního řízení oblasti BOZP je zapojení zaměstnanců. Zaměstnavatelé jsou ze zákona povinni projednávat se zaměstnanci otázky BOZP. Pokud ale učiníte víc, než jste ze zákona povinni, bude to pro vaši firmu přínosné. Pravděpodobnost, že bude řízení BOZP úspěšné, se zvyšuje podněcováním aktivní účasti pracovníků a zaváděním dialogu mezi zaměstnanci a vedením firmy.</p><p>Zvolte způsob, jak zapojit vaše zaměstnance! Mohou to být například schůzky na pracovištích, skupinové diskuze nebo týmové vyhledávání a hodnocení rizik. Můžete si také stáhnout nebo vytisknout obsah nástroje, předat ji dotčeným zaměstnancům a vyžádat si od nich zpětnou vazbu.</p>
  cy: Un o'r allweddi i arweinyddiaeth OSH dda yw cael gweithwyr yn ymwneud â'r gwaith. Mae gan gyflogwyr <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>ddyletswydd gyfreithiol</a> i ymgynghori â gweithwyr ar faterion iechyd a diogelwch. Ond mae manteision i fynd y tu hwnt i'r gofynion lleiaf. Bydd rheolaeth OSH yn fwy tebygol o lwyddo os yw'n annog cyfranogiad gweithgar gweithwyr ac yn sefydlu deialog rhwng gweithwyr a rheolwyr.
  da: En af nøglerne til god OSH-ledelse er at involvere medarbejderne. Arbejdsgivere har en <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>juridisk pligt</a> til at høre medarbejderne om sikkerheds- og sundhedsspørgsmål. Men der er fordele ved at gå ud over minimumskravene. OSH-ledelsen vil have større sandsynlighed for at lykkes, hvis den tilskynder til aktiv deltagelse af medarbejderne og etablerer en dialog mellem medarbejdere og ledelse.
  de: Einer der Schlüssel zu einer guten OSH-Führung ist die Einbeziehung der Arbeitnehmer. Arbeitgeber haben eine <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>gesetzliche Pflicht</a>, Arbeitnehmer zu Sicherheits- und Gesundheitsfragen zu konsultieren. Es gibt jedoch Vorteile, wenn man über die Mindestanforderungen hinausgeht. Das OSH-Management wird eher erfolgreich sein, wenn es die aktive Beteiligung der Arbeitnehmer fördert und einen Dialog zwischen Mitarbeitern und Management aufbaut.
  el: Ένα από τα βασικά χαρακτηριστικά της αποτελεσματικής άσκησης του επιτελικού ρόλου  του εργοδότη ή της διοίκησης της επιχείρησης/οργανισμού σε θέματα ΕΑΥ είναι η προαγωγή της ενεργού συμμετοχής των εργαζομένων. Οι εργοδότες έχουν νομική υποχρέωση να διαβουλεύονται με τους εργαζόμενους σχετικά με τα θέματα ασφάλειας και υγείας (στη βάση των ελάχιστων απαιτήσεων). Είναι γεγονός επίσης ότι η υπέρβαση αυτών των ελάχιστων απαιτήσεων συνεπάγεται σημαντικά οφέλη. Η ενθάρρυνση της ενεργού συμμετοχής των εργαζομένων και η θεσμοθέτηση του διαλόγου μεταξύ του εργοδότη ή της διοίκησης και των εργαζομένων, αυξάνουν τις πιθανότητες επιτυχίας της διαχείρισης της ΕΑΥ στην επιχείρηση/οργανισμό.
  en: One of the keys to good OSH leadership is getting workers involved. Employers have a <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>legal duty</a> to consult employees on safety and health issues. But there are benefits to going beyond the minimum requirements. OSH management will be more likely to succeed if it encourages the active participation of workers and sets up a dialogue between employees and management.
  es: Una de las claves para un buen liderazgo en materia de SST es hacer que se impliquen los trabajadores. Las empresas tienen el deber legal de consultar a sus empleados en materia de seguridad y salud. Pero hay beneficios que van más allá del cumplimiento de los requisitos mínimos. Es posible que la gestión de la SST tenga más éxito si se promueve la participación activa de los trabajadores y se establece un diálogo entre los empleados y la dirección.
  et: Üks hea tööohutuse ja töötervishoiu juhtimise võtmetegureid on töötajate kaasamine. Tööandjatel on <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>seaduslik kohustus</a> konsulteerida töötajatega ohutuse ja tervise küsimustes. Kuid miinimumnõuetest kaugemale minemisel on omad eelised. OSH-juhtimine õnnestub tõenäolisemalt, kui see julgustab töötajate aktiivset osalemist ning loob dialoogi töötajate ja juhtkonna vahel.
  fi: <p>Hyvän turvallisuusjohtamisen yksi avaintekijä on se, miten hyvin henkilöstö saadaan osallistumaan mukaan turvallisuustoimintaan. Myös laki edellyttää työantajan ylläpitävän ja parantavan työturvallisuutta yhdessä työntekijöiden kanssa. Kun johto kannustaa henkilöstöä osallistumaan ja kuuntelee heidän ajatuksiaan, sitä paremmin turvallisuuden hallinnassa todennäköisesti onnistutaan.</p><p>Tunnista, mikä olisi teillä paras tapa saada henkilöstö mukaan. Onnistuisiko riskinarvioinnin toteutus esimerkiksi osana työyhteisöpalaveria tai kokoamalla henkilöstön edustajista arviointiryhmä, joka osallistuu riskinarviointiin? Yhteisen keskustelun pohjaksi ja palautteen saamiseksi voit myös ladata tai tulostaa riskinarvioitilomakkeen tai sen osioita henkilöstölle.</p>
  fr: <p>L'une des clés d'un bon leadership en matière de Sécurité et santé au travail est d'impliquer les travailleurs. Les employeurs ont l'obligation légale de consulter les travailleurs sur les questions de sécurité et de santé. Mais il y a des avantages à aller au-delà des exigences minimales. La gestion de la SST aura plus de chances de réussir si elle encourage la participation active des travailleurs et instaure un dialogue entre les travailleurs et la direction.</p><p>Les employeurs ont l’obligation juridique de consulter les salariés sur les questions de SST. Il existe toutefois des avantages à ne pas se limiter aux exigences minimales. La gestion de la SST aura davantage de chances de réussir si elle encourage la participation active des travailleurs et qu’elle établit un dialogue entre les salariés et la direction.</p><p>Décidez de la meilleure manière d’associer votre personnel ! Vous pouvez par exemple organiser une réunion ou un groupe de réflexion avec les travailleurs et passer en revue les différents modules de l’évaluation des risques. Vous pouvez également télécharger ou imprimer le contenu de l’outil ou des parties de l’outil et le partager pour information et retour d’information avec vos travailleurs.</p>
  ga: Ceann de na príomhrudaí le haghaidh ceannaireachta OSH maith ná oibrithe a chur ag glacadh páirt. Tá <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>dualgas dlíthiúil</a> ar fhostóirí dul i gcomhairle le fostaithe ar cheisteanna sábháilteachta agus sláinte. Ach tá buntáistí ag gabháil le dul thar na híoscheanglais. Beidh bainistíocht OSH níos dóchúla go n-éireoidh léi má spreagann sí rannpháirtíocht ghníomhach oibrithe agus má bhunaíonn sí idirphlé idir fostaithe agus bainistíocht.
  he: אחד המפתחות למנהיגות טובה בבטיחות ובריאות תעסוקתית (BST) הוא שיתוף העובדים. למעסיקים יש <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>חובה חוקית</a> להתייעץ עם עובדים בנושאי בטיחות ובריאות. אך יש יתרונות לחרוג מהדרישות המינימליות. ניהול BST צפוי להצליח יותר אם הוא מעודד השתתפות פעילה של עובדים ומקיים דיאלוג בין העובדים לבין ההנהלה.
  hr: 'Jedan od ključeva dobrog upravljanja zaštitom na radu je uključivanje radnika. Poslodavci imaju zakonsku obvezu <a href=\"https://osha.europa.eu/en/legislation/directives/the-osh-framework- directive/the-osh-framework-directive-introduction\">legal duty</a>  obavijestiti radnike o pitanjima sigurnosti i zdravlja.  Međutim, nadilaženje minimalnih zahtjeva je korisno. Upravljanje zaštitom na radu bit će uspješnije ako se potiče aktivno sudjelovanje radnika i uspostavlja dijalog između zaposlenika i uprave.  '
  hu: A munkahelyi biztonság és egészségvédelem területén az egyik kulcs a munkavállalók bevonása.  A munkáltatók számára jogszabály írja elő, <a href="https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction">hogy</a> konzultáljanak a munkavállalókkal a munkahelyi egészségvédelmi és biztonsági kérdésekről.  Azonban a minimumkövetelményeken való túllépésnek vannak előnyei.  A munkahelyi egészségvédelmi és biztonsági kérdések kezelése nagyobb valószínűséggel lesz sikeres, ha az a munkavállalók aktív részvételére ösztönöz és párbeszédet hoz létre a munkavállalók és a vezetőség között.
  is: Einn af lyklunum að góðri forystu í vinnuvernd er að fá starfsmenn til þátttöku. Vinnuveitendur hafa <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>lagalegar skyldur</a> til að ráðfæra sig við starfsmenn um öryggis- og heilbrigðismál. En það eru kostir við að fara lengra en lágmarkskröfurnar. Vinnuverndarstjórnun mun líklegra ná árangri ef hún hvetur til virkrar þátttöku starfsmanna og setur upp samræður milli starfsmanna og stjórnenda.
  it: Al fine di una corretta rappresentatività delle reali condizioni di lavoro è consigliabile procedere preliminarmente ad un'attenta ricognizione di tutte le lavorazioni svolte, dei compiti assegnati ai lavoratori, degli ambienti di lavoro e delle informazioni disponibili relative alla prevenzione aziendale (documentazione aziendale esistente e informazioni assunte).
  lt: Vienas iš gerų darbuotojų saugos ir sveikatos (DSS) lyderystės raktų yra darbuotojų įtraukimas. Darbdaviai turi <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>teisinę pareigą</a> konsultuotis su darbuotojais saugos ir sveikatos klausimais. Tačiau viršijant minimalius reikalavimus galima gauti papildomos naudos. DSS valdymas bus sėkmingesnis, jei skatins aktyvų darbuotojų dalyvavimą ir sukurs dialogą tarp darbuotojų ir vadovybės.
  lv: <p>Viena no labas darba aizsardzības sistēmas vadības pazīmēm ir darbinieku iesaistīšana. Darba devējiem normatīvajos aktos ir noteikts pienākums konsultēties ar darbiniekiem par darba aizsardzības jautājumiem. Tomēr tam, ka tiek darīts vairāk nekā normatīvie akti prasa, ir pievienotā vērtība. Darba vide kļūst labāka un produktīvāka, ja tiek veicināta aktīva darbinieku iesaiste un tiek veidots dialogs strap darbiniekiem un vadību.</p><p>Izlemiet, kurš būs labākais veids, kā iesaistīt komandu. Jūs varat gan organizēt sanāksmi, gan darbinieku fokusgrupu diskusiju, kopā pārskatot darba vides riska novērtējuma daļas. Jūs varat arī lejuplādēt vai izdrukāt rīka saturu vai tā daļas, lai dalītos ar informāciju un saņemtu no darbiniekiem atgriezenisko saiti.</p>
  mt: Wieħed mill-fatturi ewlenin għal tmexxija tajba tas-saħħa u s-sigurtà fuq il-post tax-xogħol hija l-involviment tal-ħaddiema. Min iħaddem għandu dmir legali li jikkonsulta mal-impjegati dwar kwistjonijiet ta’ saħħa u sigurtà. Iżda hemm benefiċċji li wieħed imur lil hinn mir-rekwiżiti minimi. Ikun iktar probabbli s-suċċess tal-immaniġġjar tas-saħħa u s-sigurtà jekk tinkoraġġixxi l-parteċipazzjoni attiva tal-ħaddiema u tistabbilixxi djalogu bejn l-impjegati u l-maniġment.
  nl: Een van de sleutels tot goed leiderschap op het gebied van veiligheid en gezondheid op het werk (VGW) is het betrekken van werknemers. Werkgevers hebben een <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>wettelijke plicht</a> om werknemers te raadplegen over veiligheids- en gezondheidskwesties. Maar er zijn voordelen aan het verder gaan dan de minimumvereisten. VGW-management zal eerder succesvol zijn als het de actieve deelname van werknemers aanmoedigt en een dialoog tot stand brengt tussen werknemers en management.
  nl_BE: Eén van de sleutelelementen voor goed leiderschap op gebied van veiligheid en gezondheid op het werk is werknemersparticipatie. Werkgevers zijn wettelijk verplicht om werknemers te raadplegen over veiligheids- en gezondheidskwesties. Maar er zijn voordelen om verder te gaan dan de minimumbepalingen. Veiligheids- en gezondheidsmanagement zal eerder slagen als het de actieve participatie van de werknemers aanmoedigt en een dialoog instelt tussen werknemers en het management.
  nl_be: Een van de sleutels tot goed VGW-leiderschap is de betrokkenheid van werknemers. Werkgevers hebben een <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>wettelijke plicht</a> om werknemers te raadplegen over veiligheids- en gezondheidskwesties. Maar er zijn voordelen aan het overstijgen van de minimumvereisten. Het VGW-beheer zal meer kans op succes hebben als het de actieve deelname van werknemers aanmoedigt en een dialoog tussen werknemers en management tot stand brengt.
  'no': En av nøklene til godt OSH-lederskap er å involvere arbeidstakerne. Arbeidsgivere har en <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>juridisk plikt</a> til å konsultere ansatte om sikkerhets- og helsespørsmål. Men det er fordeler ved å gå utover minimumskravene. OSH-ledelse vil ha større sjanse for å lykkes hvis den oppmuntrer til aktiv deltakelse av arbeidstakere og etablerer en dialog mellom ansatte og ledelse.
  pl: Jednym z kluczy do dobrego przywództwa w zakresie BHP jest angażowanie pracowników. Pracodawcy mają <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>prawny obowiązek</a> konsultowania z pracownikami kwestii bezpieczeństwa i zdrowia. Jednak wychodzenie poza minimalne wymagania przynosi korzyści. Zarządzanie BHP będzie miało większe szanse powodzenia, jeśli zachęca do aktywnego uczestnictwa pracowników i ustanawia dialog między pracownikami a kierownictwem.
  pt: Uma das chaves para a liderança forte e eficaz em matéria de Segurança e Saúde no Trabalho (SST) é garantir o envolvimento e a participação dos trabalhadores. As entidades patronais têm o dever legal de consultar os trabalhadores sobre questões de SST. Contudo, ir além dos requisitos mínimos traz benefícios. A gestão da SST terá mais probabilidades de ter sucesso se incentivar a participação ativa dos trabalhadores e estabelecer um diálogo entre estes e os quadros de chefia.
  ro: Una dintre cheile unui bun leadership în domeniul SSM este implicarea lucrătorilor. Angajatorii au o <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>obligație legală</a> de a consulta angajații cu privire la problemele de securitate și sănătate. Dar există beneficii în a depăși cerințele minime. Managementul SSM va avea mai multe șanse de succes dacă încurajează participarea activă a lucrătorilor și stabilește un dialog între angajați și conducere.
  ru: Один из ключей к эффективному руководству в области охраны труда — вовлечение работников. Работодатели несут <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>юридическую обязанность</a> консультироваться с сотрудниками по вопросам безопасности и охраны здоровья. Однако есть преимущества в том, чтобы выходить за рамки минимальных требований. Управление охраной труда будет иметь больше шансов на успех, если оно поощряет активное участие работников и налаживает диалог между сотрудниками и руководством.
  sk: Jedným z kľúčov k dobrému vedeniu v oblasti BOZP je zapojenie zamestnancov. Preto majú zamestnávatelia <a href="https://osha.europa.eu/en/legislation/directives/the-osh-framework- directive/the-osh-framework-directive-introduction">zákonnú povinnosť</a> konzultovať otázky bezpečnosti a&nbsp;ochrany zdravia so zamestnancami . Prekročenie rámca minimálnych požiadaviek však má svoje výhody. Riadenie BOZP bude s väčšou pravdepodobnosťou úspešné, ak podnieti aktívnu účasť zamestnancov a vytvorí dialóg medzi zamestnancami a vedením.
  sl: Eden ključnih dejavnikov dobrega vodenja na področju varnosti in zdravja pri delu je vključevanje delavcev. Delodajalci imate zakonsko dolžnost, da se s svojimi zaposlenimi posvetujete o vprašanjih varnosti in zdravja pri delu. Če pa boste presegli minimalne zahteve, boste s tem dosegli še večje koristi. Upravljanje varnosti in zdravja pri delu bo še uspešnejše, če boste spodbujali aktivno sodelovanje delavcev in vzpostavili dialog med zaposlenimi in vodstvom.
  sq: Një nga çelësat e udhëheqjes së mirë në fushën e OSH-së është përfshirja e punëtorëve. Punëdhënësit kanë një <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>detyrim ligjor</a> për të konsultuar punonjësit për çështjet e sigurisë dhe shëndetit. Por ka përfitime nga tejkalimi i kërkesave minimale. Menaxhimi i OSH-së do të ketë më shumë gjasa të ketë sukses nëse nxit pjesëmarrjen aktive të punëtorëve dhe vendos një dialog ndërmjet punonjësve dhe menaxhmentit.
  sr: Jedan od ključeva dobrog rukovođenja u oblasti zaštite na radu jeste uključivanje radnika. Poslodavci imaju <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>zakonsku obavezu</a> da se konsultuju sa zaposlenima o pitanjima bezbednosti i zdravlja. Međutim, postoje prednosti u tome što se ide dalje od minimalnih zahteva. Upravljanje zaštitom na radu imaće veće šanse za uspeh ako podstiče aktivno učešće radnika i uspostavi dijalog između zaposlenih i rukovodstva.
  sv: En av nycklarna till ett bra ledarskap inom arbetsmiljöarbete är att involvera arbetstagarna. Arbetsgivare har en <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>lagstadgad skyldighet</a> att samråda med anställda om säkerhets- och hälsofrågor. Men det finns fördelar med att gå utöver minimikraven. Arbetsmiljöledning kommer att ha större chans att lyckas om den uppmuntrar till aktivt deltagande från arbetstagarna och skapar en dialog mellan anställda och ledning.
  uk: Одним із ключів до ефективного керівництва в галузі охорони праці є залучення працівників. Роботодавці мають <a href='https://osha.europa.eu/en/legislation/directives/the-osh-framework-directive/the-osh-framework-directive-introduction'>юридичний обов'язок</a> консультуватися з працівниками щодо питань безпеки та охорони здоров'я. Але є переваги в тому, щоб виходити за межі мінімальних вимог. Управління охороною праці матиме більше шансів на успіх, якщо воно заохочуватиме активну участь працівників та налагоджуватиме діалог між працівниками та керівництвом.
