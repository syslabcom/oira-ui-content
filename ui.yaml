message_update_oira_tool:
  en: Are you sure you want to update the published OiRA Tool? This will update the
    published version with all your changes.
  nl: Weet u zeker dat u het gepubliceerde OiRA-instrument wilt bijwerken? Dit zal
    de gepubliceerde versie bijwerken met al uw wijzigingen.
  fr: Êtes-vous sûr de vouloir mettre à jour l’outil OiRA publié ? Cela mettra à jour
    la version publiée avec toutes vos modifications.
  de: Sind Sie sicher, dass Sie das veröffentlichte OiRA-Tool aktualisieren möchten?
    Dadurch wird die veröffentlichte Version mit allen Änderungen aktualisiert.
  it: Sei sicuro di voler aggiornare lo strumento OiRA pubblicato? Questo aggiornerà
    la versione pubblicata con tutte le tue modifiche.
  es: ¿Está seguro de que desea actualizar la herramienta OiRA publicada? Esto actualizará
    la versión publicada con todos sus cambios.
  pt: Tem a certeza de que pretende atualizar a ferramenta OiRA publicada? Isto irá
    atualizar a versão publicada com todas as suas alterações.
  pl: Czy na pewno chcesz zaktualizować opublikowane narzędzie OiRA? Spowoduje to
    zaktualizowanie opublikowanej wersji wszystkimi zmianami.
  fi: Haluatko varmasti päivittää julkaistun OiRA-työkalun? Tämä päivittää julkaistun
    version kaikilla tekemilläsi muutoksilla.
  hr: Jeste li sigurni da želite ažurirati objavljeni OiRA alat? Ovo će ažurirati
    objavljenu verziju sa svim vašim izmjenama.
  cs: Opravdu chcete aktualizovat zveřejněný nástroj OiRA? Tím aktualizujete zveřejněnou
    verzi o všechny vaše změny.
  da: Er du sikker på, at du vil opdatere det offentliggjorte OiRA-værktøj? Dette
    opdaterer den offentliggjorte version med alle dine ændringer.
  mt: Int żgur li trid taġġorna l-għodda OiRA ppubblikata? Dan jaġġorna l-verżjoni
    ppubblikata bl-bidliet kollha tiegħek.
  sl: Ste prepričani, da želite posodobiti objavljeno orodje OiRA? S tem bo objavljena
    različica posodobljena z vsemi vašimi spremembami.
  bg: Сигурни ли сте, че искате да актуализирате публикувания инструмент OiRA? Това
    ще актуализира публикуваната версия с всички ваши промени.
  ro: Sunteți sigur că doriți să actualizați instrumentul OiRA publicat? Acest lucru
    va actualiza versiunea publicată cu toate modificările dumneavoastră.
  et: Kas olete kindel, et soovite avaldatud OiRA-tööriista värskendada? See värskendab
    avaldatud versiooni kõigi teie muudatustega.
  lv: Vai tiešām vēlaties atjaunināt publicēto OiRA rīku? Tas atjauninās publicēto
    versiju ar visām jūsu izmaiņām.
  lt: Ar tikrai norite atnaujinti paskelbtą OiRA priemonę? Tai atnaujins paskelbtą
    versiją su visais jūsų pakeitimais.
  sv: Är du säker på att du vill uppdatera det publicerade OiRA-verktyget? Detta uppdaterar
    den publicerade versionen med alla dina ändringar.
  sk: Naozaj chcete aktualizovať zverejnený nástroj OiRA? Tým sa aktualizuje zverejnená
    verzia so všetkými vašimi zmenami.
  hu: Biztosan frissíteni szeretnéd a közzétett OiRA eszközt? Ez frissíti a közzétett
    verziót az összes módosításoddal.
  el: Είστε βέβαιοι ότι θέλετε να ενημερώσετε το δημοσιευμένο εργαλείο OiRA; Αυτό
    θα ενημερώσει την δημοσιευμένη έκδοση με όλες τις αλλαγές σας.
  ga: An bhfuil tú cinnte gur mian leat an uirlis OiRA fhoilsithe a nuashonrú? Nuashonróidh
    sé seo an leagan foilsithe le do chuid athruithe ar fad.
  he: האם אתה בטוח שברצונך לעדכן את כלי OiRA שפורסם? פעולה זו תעדכן את הגרסה שפורסמה
    עם כל השינויים שביצעת.
  ca: Esteu segur que voleu actualitzar l'eina OiRA publicada? Això actualitzarà la
    versió publicada amb tots els vostres canvis.
  cy: Ydych chi'n siŵr eich bod am ddiweddaru'r Offeryn OiRA a gyhoeddwyd? Bydd hyn
    yn diweddaru'r fersiwn a gyhoeddwyd gyda'ch holl newidiadau.
  is: Ertu viss um að þú viljir uppfæra birta OiRA tólið? Þetta mun uppfæra birtu
    útgáfuna með öllum breytingum þínum.
  nl_BE: Weet u zeker dat u het gepubliceerde OiRA-hulpmiddel wilt bijwerken? Dit
    zal de gepubliceerde versie bijwerken met al uw wijzigingen.
  nl_be: Weet u zeker dat u het gepubliceerde OiRA-hulpmiddel wilt bijwerken? Dit
    zal de gepubliceerde versie bijwerken met al uw wijzigingen.
  'no': Er du sikker på at du vil oppdatere det publiserte OiRA-verktøyet? Dette vil
    oppdatere den publiserte versjonen med alle endringene dine.
  ru: Вы уверены, что хотите обновить опубликованный инструмент OiRA? Это обновит
    опубликованную версию со всеми вашими изменениями.
  sq: Jeni i sigurt që dëshironi të përditësoni mjetin OiRA të publikuar? Kjo do të
    përditësojë versionin e publikuar me të gjitha ndryshimet tuaja.
  sr: Da li ste sigurni da želite da ažurirate objavljeni OiRA alat? Ovo će ažurirati
    objavljenu verziju sa svim vašim izmenama.
  uk: Ви впевнені, що хочете оновити опублікований інструмент OiRA? Це оновить опубліковану
    версію з усіма вашими змінами.
