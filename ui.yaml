  nl_be: situatie(s) die wel of niet relevant zijn voor uw bedrijfsactiviteit selecteren of overslaan en de vakje(s) aanvinken indien van toepassing
  'no': velge eller hoppe over situasjon(er) som er relevante eller ikke for din forretningsaktivitet, og krysse av i boksen(e) hvis det er aktuelt
  pl: wybrać lub pominąć sytuację(-e) istotną(-e) lub nieistotną(-e) dla Twojej działalności i zaznaczyć pole(-a) wyboru, jeśli ma to zastosowanie
  pt: selecionar ou ignorar a(s) situação(ões) relevante(s) ou não à sua atividade empresarial e selecionar a(s) caixa(s) se adequado
  ro: selectați sau omiteți situația(-iile) relevantă(-e) sau nu pentru activitatea dvs. și bifați caseta(-ele) dacă este cazul
  ru: выбрать или пропустить ситуацию(-и), относящуюся(-иеся) или не относящуюся(-иеся) к вашей деятельности, и отметить соответствующий(-е) флажок(-и), если необходимо
  sk: ste si vybrali alebo vynechali situácie, ktoré sú alebo nie sú relevantné pre vašu obchodnú činnosť a označili políčka, ak je to vhodné
  sl: izberite ali preskočite situacije, bistvene ali ne za vašo poslovno dejavnost in označite polje/a, če je smiselno
  sq: zgjidhni ose kaloni situata(t) relevante ose jo për aktivitetin tuaj të biznesit dhe shënoni kutinë(kutitë) nëse është e përshtatshme
  sr: izaberite ili preskočite situaciju(e) relevantnu(e) ili ne za vašu poslovnu aktivnost i označite polje(a) ako je prikladno
  sv: välj eller hoppa över situation(er) som är relevanta eller inte för din affärsverksamhet och markera rutan/rutorna om det är lämpligt
  uk: виберіть або пропустіть ситуацію(ї), що стосується(ються) або не стосується(ються) вашої підприємницької діяльності, та поставте позначку(и) у відповідному полі(ях)
expl_profile_bullet2:
  bg: избройте множество бизнес звена, или клонове, или магазини, и т.н. Тези свързани рискове ще бъдат повторени за всяко име, което сте въвели.
