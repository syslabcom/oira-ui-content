  ro: Aceste note vor fi vizibile în raport și în formare. Folosiți-le pentru orice altceva doriți să scrieți despre acest risc.
  ru: Эти заметки будут видны в отчёте и обучении. Используйте их для всего остального, что вы хотите написать об этом риске.
