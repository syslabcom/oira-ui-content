  hr: ${user} je pregledao, potvrdio i zaključao ovu procjenu rizika.
  hu: ${user} áttekintette, érvényesítette és zárolta ezt a kockázatértékelést.
  is: ${user} hefur farið yfir, staðfest og læst þetta áhættumat.
  it: ${user} ha esaminato, convalidato e bloccato questa valutazione dei rischi.
  lt: ${user} peržiūrėjo, patvirtino ir užrakino šį rizikos vertinimą.
  lv: ${user} ir pārskatījis, apstiprinājis un bloķējis šo riska novērtējumu.
  mt: ${user} irreveda, ivvalidja u sakkar din il-valutazzjoni tar-riskju.
