label_message_warning_force_open:
  en: Bear in mind that forcibly opening the information section may reduce the likelihood
    that users will notice the other sections and may also decrease the chances of
    them completing the risk assessment.
  nl: Houd er rekening mee dat het geforceerd openen van de informatiesectie de kans
    verkleint dat gebruikers de andere secties opmerken, en ook de kans verkleint
    dat zij de risicoanalyse afronden.
  fr: Gardez à l’esprit que forcer l’ouverture de la section d’information peut réduire
    la probabilité que les utilisateurs remarquent les autres sections et peut également
    diminuer les chances qu’ils terminent l’évaluation des risques.
  de: Bedenken Sie, dass das erzwungene Öffnen des Informationsabschnitts die Wahrscheinlichkeit
    verringern kann, dass Benutzer die anderen Abschnitte bemerken, und auch die Wahrscheinlichkeit
    verringern kann, dass sie die Risikobewertung abschließen.
  it: Tieni presente che l’apertura forzata della sezione informativa può ridurre
    la probabilità che gli utenti notino le altre sezioni e può anche diminuire la
    probabilità che completino la valutazione dei rischi.
  es: Tenga en cuenta que forzar la apertura de la sección de información puede reducir
    la probabilidad de que los usuarios noten las demás secciones y también puede
    disminuir las probabilidades de que completen la evaluación de riesgos.
  pt: Tenha em mente que forçar a abertura da secção de informação pode reduzir a
    probabilidade de os utilizadores notarem as outras secções e também pode diminuir
    as hipóteses de completarem a avaliação de riscos.
  pl: Pamiętaj, że wymuszone otwarcie sekcji informacyjnej może zmniejszyć prawdopodobieństwo,
    że użytkownicy zauważą inne sekcje, a także może zmniejszyć szanse na ukończenie
    oceny ryzyka.
  fi: Muista, että tietosivun pakotettu avaaminen voi vähentää todennäköisyyttä, että
    käyttäjät huomaavat muut osiot, ja se voi myös vähentää riskiarvion loppuun saattamisen
    todennäköisyyttä.
  hr: Imajte na umu da prisilno otvaranje informativnog odjeljka može smanjiti vjerojatnost
    da korisnici primijete ostale odjeljke i također može smanjiti šanse da dovrše
    procjenu rizika.
  cs: Mějte na paměti, že vynucené otevření informační sekce může snížit pravděpodobnost,
    že si uživatelé všimnou ostatních sekcí, a také může snížit šanci na dokončení
    hodnocení rizik.
  da: Husk, at tvungen åbning af informationsafsnittet kan mindske sandsynligheden
    for, at brugerne bemærker de andre afsnit, og det kan også mindske chancen for,
    at de gennemfører risikovurderingen.
  mt: Żomm f’moħħok li l-ftuħ sfurzat tat-taqsima tal-informazzjoni jistaʼ jnaqqas
    il-probabbiltà li l-utenti jinnotaw it-taqsimiet l-oħra u jistaʼ wkoll inaqqas
    iċ-ċansijiet li jlestu l-valutazzjoni tar-riskju.
  sl: Ne pozabite, da lahko prisilno odpiranje informacijskega razdelka zmanjša verjetnost,
    da bodo uporabniki opazili druge razdelke, in tudi zmanjša možnost, da zaključijo
    oceno tveganja.
  bg: Имайте предвид, че принудителното отваряне на информационния раздел може да
    намали вероятността потребителите да забележат останалите раздели, както и шансовете
    им да завършат оценката на риска.
  ro: Rețineți că deschiderea forțată a secțiunii de informații poate reduce probabilitatea
    ca utilizatorii să observe celelalte secțiuni și poate, de asemenea, reduce șansele
    de a finaliza evaluarea riscurilor.
  et: Pea meeles, et teabeosa sunniviisiline avamine võib vähendada tõenäosust, et
    kasutajad märkavad teisi sektsioone, ja võib samuti vähendada võimalust, et nad
    viivad riskihindamise lõpule.
  lv: Ņemiet vērā, ka piespiedu informācijas sadaļas atvēršana var samazināt iespēju,
    ka lietotāji pamanīs citas sadaļas, kā arī samazināt iespēju, ka viņi pabeigs
    riska novērtējumu.
  lt: Atminkite, kad priverstinis informacijos skyriaus atidarymas gali sumažinti
    tikimybę, kad naudotojai pastebės kitus skyrius, ir taip pat gali sumažinti tikimybę,
    kad jie baigs rizikos vertinimą.
  sv: Tänk på att tvångsöppning av informationsavsnittet kan minska sannolikheten
    att användare märker de andra avsnitten och även minska sannolikheten att de slutför
    riskbedömningen.
  sk: Majte na pamäti, že vynútené otvorenie informačnej sekcie môže znížiť pravdepodobnosť,
    že si používatelia všimnú ostatné sekcie, a tiež môže znížiť šancu na dokončenie
    hodnotenia rizík.
  hu: Ne feledje, hogy ha az információs szakaszt kényszerítetten megnyitjuk, az csökkentheti
    annak valószínűségét, hogy a felhasználók észreveszik a többi részt, és ezzel
    együtt csökkenhet annak esélye is, hogy befejezik a kockázatértékelést.
  el: Λάβετε υπόψη ότι το υποχρεωτικό άνοιγμα της ενότητας πληροφοριών ενδέχεται να
    μειώσει την πιθανότητα να παρατηρήσουν οι χρήστες τις άλλες ενότητες και να μειώσει
    τις πιθανότητες να ολοκληρώσουν την εκτίμηση κινδύνου.
  ga: Coinnigh i gcuimhne go bhféadfadh sé go laghdódh oscailt éigeantach na rannóige
    faisnéise an seans go dtabharfaidh úsáideoirí faoi deara na rannóga eile agus
    an seans go gcríochnóidh siad an measúnú riosca.
  he: יש לזכור כי פתיחה כפויה של מקטע המידע עשויה להפחית את הסיכוי שהמשתמשים ישימו
    לב לקטעים האחרים ואף תפחית את הסיכוי שישלימו את הערכת הסיכונים.
  ca: Tingueu en compte que obrir forçosament la secció d'informació pot reduir la
    probabilitat que els usuaris notin les altres seccions i també pot disminuir les
    possibilitats que completin l'avaluació de riscos.
  cy: Cofiwch y gall agor yr adran wybodaeth yn orfodol leihau'r tebygolrwydd y bydd
    defnyddwyr yn sylwi ar yr adrannau eraill a hefyd gallai leihau'r siawns y byddant
    yn cwblhau'r asesiad risg.
  is: Hafðu í huga að nauðungaropnun upplýsingahlutans getur minnkað líkurnar á því
    að notendur taki eftir öðrum hlutum og getur einnig minnkað líkurnar á því að
    þeir ljúki við áhættumatið.
  nl_BE: Houd er rekening mee dat het verplicht openen van de informatiesectie de
    kans kan verkleinen dat gebruikers de andere secties opmerken en ook de kans kan
    verkleinen dat ze de risicobeoordeling voltooien.
  nl_be: Houd er rekening mee dat het verplicht openen van de informatiesectie de
    kans kan verkleinen dat gebruikers de andere secties opmerken en ook de kans kan
    verkleinen dat ze de risicobeoordeling voltooien.
  'no': Husk at tvungen åpning av informasjonsdelen kan redusere sannsynligheten for
    at brukerne legger merke til de andre delene, og kan også redusere sjansene for
    at de fullfører risikovurderingen.
  ru: Имейте в виду, что принудительное открытие информационного раздела может снизить
    вероятность того, что пользователи заметят другие разделы, а также уменьшить шансы
    на завершение оценки рисков.
  sq: Keni parasysh se hapja e detyruar e seksionit të informacionit mund të ulë gjasat
    që përdoruesit të vërejnë seksionet e tjera dhe gjithashtu mund të ulë shanset
    e tyre për të përfunduar vlerësimin e riskut.
  sr: Imajte na umu da prisilno otvaranje informacionog odeljka može smanjiti verovatnoću
    da će korisnici primetiti ostale odeljke i može takođe smanjiti šanse da završe
    procenu rizika.
  uk: Майте на увазі, що примусове відкриття інформаційного розділу може знизити ймовірність
    того, що користувачі помітять інші розділи, а також зменшити шанси на завершення
    оцінки ризиків.
message_help_certificate_explanatory_sentence:
  en: A short explanation that is shown to the user after reaching the initial threshold.
    You can use this to point to an external website that provides more information.
  nl: Een korte uitleg die aan de gebruiker wordt getoond nadat de initiële drempel
    is bereikt. U kunt dit gebruiken om te verwijzen naar een externe website met
    meer informatie.
  fr: Une brève explication affichée à l’utilisateur après avoir atteint le seuil
    initial. Vous pouvez l’utiliser pour rediriger vers un site externe fournissant
    plus d’informations.
  de: Eine kurze Erklärung, die dem Benutzer nach Erreichen der Anfangsschwelle angezeigt
    wird. Sie können dies nutzen, um auf eine externe Website mit weiteren Informationen
    zu verweisen.
  it: Una breve spiegazione mostrata all’utente dopo il raggiungimento della soglia
    iniziale. Puoi usarla per indirizzare a un sito esterno con ulteriori informazioni.
  es: Una breve explicación que se muestra al usuario tras alcanzar el umbral inicial.
    Puede utilizarse para enlazar con un sitio web externo con más información.
  pt: Uma breve explicação apresentada ao utilizador após atingir o limite inicial.
    Pode usá-la para apontar para um site externo com mais informações.
  pl: Krótkie wyjaśnienie wyświetlane użytkownikowi po osiągnięciu początkowego progu.
    Można je wykorzystać do wskazania zewnętrznej strony internetowej z dodatkowymi
    informacjami.
  fi: Lyhyt selitys, joka näytetään käyttäjälle, kun alkukynnys on saavutettu. Tämän
    avulla voit ohjata käyttäjän ulkoiselle verkkosivustolle, josta saa lisätietoja.
  hr: Kratko objašnjenje koje se prikazuje korisniku nakon što postigne početni prag.
    Možete ga koristiti za upućivanje na vanjsku web stranicu s dodatnim informacijama.
  cs: Krátké vysvětlení zobrazené uživateli po dosažení počátečního prahu. Můžete
    jej použít k odkazu na externí web s dalšími informacemi.
  da: En kort forklaring, som vises til brugeren efter opnåelse af startgrænsen. Du
    kan bruge den til at henvise til et eksternt websted med flere oplysninger.
  mt: Spjegazzjoni qasira li tintwera lill-utent wara li jintlaħaq il-limitu inizjali.
    Tistaʼ tużaha biex tipponta lejn websajt esterna li tipprovdi aktar informazzjoni.
  sl: Kratka razlaga, prikazana uporabniku po doseženem začetnem pragu. Uporabite
    jo lahko za preusmeritev na zunanjo spletno stran z dodatnimi informacijami.
  bg: Кратко обяснение, което се показва на потребителя след достигане на началния
    праг. Може да се използва за насочване към външен уебсайт с допълнителна информация.
  ro: O scurtă explicație afișată utilizatorului după atingerea pragului inițial.
    Puteți folosi acest text pentru a trimite către un site extern cu mai multe informații.
  et: Lühike selgitus, mis kuvatakse kasutajale pärast algtaseme saavutamist. Seda
    saab kasutada viitena välisele veebilehele, kus on rohkem teavet.
  lv: Īss paskaidrojums, kas tiek parādīts lietotājam pēc sākotnējā sliekšņa sasniegšanas.
    To var izmantot, lai norādītu uz ārēju tīmekļa vietni ar papildu informāciju.
  lt: Trumpas paaiškinimas, kuris rodomas naudotojui pasiekus pradinį slenkstį. Galite
    jį naudoti norėdami nukreipti į išorinę svetainę su daugiau informacijos.
  sv: En kort förklaring som visas för användaren efter att ha nått den inledande
    tröskeln. Den kan användas för att länka till en extern webbplats med mer information.
  sk: Krátke vysvetlenie zobrazené používateľovi po dosiahnutí počiatočného prahu.
    Môžete ho použiť na odkazovanie na externú webovú stránku s ďalšími informáciami.
  hu: Rövid magyarázat, amely a felhasználónak a kezdeti küszöbérték elérése után
    jelenik meg. Használható külső weboldalra való hivatkozáshoz, ahol további információ
    található.
  el: Μια σύντομη επεξήγηση που εμφανίζεται στον χρήστη μετά την επίτευξη του αρχικού
    ορίου. Μπορείτε να τη χρησιμοποιήσετε για να παραπέμψετε σε έναν εξωτερικό ιστότοπο
    με περισσότερες πληροφορίες.
  ga: Míniú gairid a thaispeántar don úsáideoir tar éis dóibh an tairseach tosaigh
    a bhaint amach. Is féidir leat é a úsáid chun nasc a dhéanamh le suíomh gréasáin
    seachtrach a sholáthraíonn tuilleadh eolais.
  he: הסבר קצר שמוצג למשתמש לאחר שהגיע לסף הראשוני. ניתן להשתמש בו כדי להפנות לאתר
    חיצוני המספק מידע נוסף.
  ca: Una breu explicació que es mostra a l'usuari després d'assolir el llindar inicial.
    Podeu utilitzar-la per apuntar a un lloc web extern que proporcioni més informació.
  cy: Esboniad byr a ddangosir i'r defnyddiwr ar ôl cyrraedd y trothwy cychwynnol.
    Gallwch ddefnyddio hwn i gyfeirio at wefan allanol sy'n darparu mwy o wybodaeth.
  is: Stutt skýring sem birtist notandanum eftir að upphafslágmarkið er náð. Þú getur
    notað þetta til að benda á ytri vefsíðu sem veitir frekari upplýsingar.
  nl_BE: Een korte uitleg die aan de gebruiker wordt getoond nadat de initiële drempelwaarde
    is bereikt. U kunt dit gebruiken om te verwijzen naar een externe website die
    meer informatie biedt.
  nl_be: Een korte uitleg die aan de gebruiker wordt getoond nadat de initiële drempelwaarde
    is bereikt. U kunt dit gebruiken om te verwijzen naar een externe website die
    meer informatie biedt.
  'no': En kort forklaring som vises til brukeren etter å ha nådd den innledende terskelen.
    Du kan bruke dette til å peke til et eksternt nettsted som gir mer informasjon.
  ru: Краткое пояснение, которое отображается пользователю после достижения начального
    порога. Вы можете использовать это для ссылки на внешний веб-сайт с дополнительной
    информацией.
  sq: Një shpjegim i shkurtër që i shfaqet përdoruesit pas arritjes së pragut fillestar.
    Mund ta përdorni këtë për të treguar drejt një faqeje interneti të jashtme që
    ofron më shumë informacion.
  sr: Kratko objašnjenje koje se prikazuje korisniku nakon dostizanja početnog praga.
    Možete ovo koristiti da uputite na spoljni veb-sajt koji pruža više informacija.
  uk: Коротке пояснення, яке відображається користувачеві після досягнення початкового
    порогу. Ви можете використовувати це для посилання на зовнішній веб-сайт з додатковою
    інформацією.
