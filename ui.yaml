message_role_member:
  en: Members can only read risk assessments and take trainings. Members cannot edit
    risk assessments.
  nl: Leden kunnen risicobeoordelingen inzien en trainingen volgen. Leden kunnen geen
    risicobeoordelingen bewerken. Basisleden kunnen risicobeoordelingen niet bewerken.
  de: Mitglieder können Risikobewertungen vornehmen und an Schulungen teilnehmen.
    Mitglieder können Gefährdungsbeurteilungen nicht bearbeiten.
  fr: Les membres peuvent faire des évaluations des risques et suivre des formations.
    Membres ne peuvent pas modifier les évaluations des risques.
  bg: Членовете могат само да четат оценки на риска и да участват в обучения. Членовете
    не могат да редактират оценки на риска.
  ca: Els membres només poden llegir les avaluacions de riscos i fer formacions. Els
    membres no poden editar les avaluacions de riscos.
  cs: Členové mohou pouze číst hodnocení rizik a absolvovat školení. Členové nemohou
    upravovat hodnocení rizik.
  cy: Dim ond darllen asesiadau risg a chymryd hyfforddiant y gall aelodau ei wneud.
    Ni all aelodau olygu asesiadau risg.
  da: Medlemmer kan kun læse risikovurderinger og deltage i kurser. Medlemmer kan
    ikke redigere risikovurderinger.
  el: Τα μέλη μπορούν να διαβάζουν μόνο αξιολογήσεις κινδύνου και να παρακολουθούν
    εκπαιδεύσεις. Τα μέλη δεν μπορούν να επεξεργαστούν αξιολογήσεις κινδύνου.
  es: Los miembros solo pueden leer evaluaciones de riesgos y realizar capacitaciones.
    Los miembros no pueden editar evaluaciones de riesgos.
  et: Liikmed saavad ainult lugeda riskihinnanguid ja läbida koolitusi. Liikmed ei
    saa riskihinnanguid muuta.
  fi: Jäsenet voivat vain lukea riskiarviointeja ja osallistua koulutuksiin. Jäsenet
    eivät voi muokata riskiarviointeja.
  ga: Ní féidir le baill ach measúnachtaí riosca a léamh agus oiliúintí a dhéanamh.
    Ní féidir le baill measúnachtaí riosca a chur in eagar.
  he: חברים יכולים רק לקרוא הערכות סיכונים ולהשתתף בהכשרות. חברים אינם יכולים לערוך
    הערכות סיכונים.
  hr: Članovi mogu samo čitati procjene rizika i pohađati obuke. Članovi ne mogu uređivati
    procjene rizika.
  hu: A tagok csak olvashatják a kockázatértékeléseket és részt vehetnek képzéseken.
    A tagok nem szerkeszthetik a kockázatértékeléseket.
  is: Meðlimir geta aðeins lesið áhættumat og tekið þátt í þjálfun. Meðlimir geta
    ekki breytt áhættumati.
  it: I membri possono solo leggere le valutazioni dei rischi e seguire le formazioni.
    I membri non possono modificare le valutazioni dei rischi.
  lt: Nariai gali tik skaityti rizikos vertinimus ir dalyvauti mokymuose. Nariai negali
    redaguoti rizikos vertinimų.
  lv: Dalībnieki var tikai lasīt riska novērtējumus un apmeklēt apmācības. Dalībnieki
    nevar rediģēt riska novērtējumus.
  mt: Il-membri jistgħu jaqraw biss il-valutazzjonijiet tar-riskju u jieħdu taħriġ.
    Il-membri ma jistgħux jeditjaw il-valutazzjonijiet tar-riskju.
  nl_BE: Leden kunnen risicobeoordelingen alleen lezen en trainingen volgen. Leden
    kunnen risicobeoordelingen niet bewerken.
  nl_be: Leden kunnen risicobeoordelingen alleen lezen en trainingen volgen. Leden
    kunnen risicobeoordelingen niet bewerken.
  'no': Medlemmer kan bare lese risikovurderinger og ta opplæring. Medlemmer kan ikke
    redigere risikovurderinger.
  pl: Członkowie mogą jedynie czytać oceny ryzyka i odbywać szkolenia. Członkowie
    nie mogą edytować ocen ryzyka.
  pt: Os membros só podem ler avaliações de risco e fazer formações. Os membros não
    podem editar avaliações de risco.
  ro: Membrii pot doar citi evaluările de risc și pot urma cursuri de formare. Membrii
    nu pot edita evaluările de risc.
  ru: Участники могут только читать оценки рисков и проходить обучение. Участники
    не могут редактировать оценки рисков.
  sk: Členovia môžu iba čítať hodnotenia rizík a absolvovať školenia. Členovia nemôžu
    upravovať hodnotenia rizík.
  sl: Člani lahko samo berejo ocene tveganja in se udeležujejo usposabljanj. Člani
    ne morejo urejati ocen tveganja.
  sq: Anëtarët mund të lexojnë vetëm vlerësimet e rrezikut dhe të marrin trajnime.
    Anëtarët nuk mund të redaktojnë vlerësimet e rrezikut.
  sr: Članovi mogu samo čitati procene rizika i pohađati obuke. Članovi ne mogu uređivati
    procene rizika.
  sv: Medlemmar kan bara läsa riskbedömningar och delta i utbildningar. Medlemmar
    kan inte redigera riskbedömningar.
  uk: Учасники можуть лише читати оцінки ризиків та проходити навчання. Учасники не
    можуть редагувати оцінки ризиків.
