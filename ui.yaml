label_certificate_is_private:
  bg: е лично, освен ако не решите да го направите публично. Ако кликнете върху бутона „Публикувай“ по-долу, вашият сертификат ще бъде публикуван на официалния
  ca: és privat tret que trieu fer-lo públic. Si feu clic al botó "Publica" a continuació, el vostre certificat es publicarà a l'oficial
  cs: je soukromý, pokud si nevyberete jeho zveřejnění. Pokud kliknete na tlačítko „Publikovat“ níže, váš certifikát bude zveřejněn na oficiálním
  de: ist privat, es sei denn, Sie entscheiden sich dafür, es öffentlich zu machen. Wenn Sie unten auf den „Veröffentlichen“-Knopf klicken, wird Ihr Zertifikat auf der offiziellen
  el: είναι ιδιωτικό, εκτός εάν επιλέξετε να το κάνετε δημόσιο. Αν κάνετε κλικ στο κουμπί "Δημοσίευση" παρακάτω, το πιστοποιητικό σας θα δημοσιευτεί στον επίσημο
  es: es privado a menos que decidas hacerlo público. Si haces clic en el botón "Publicar" a continuación, tu certificado será publicado en el oficial
  fi: on yksityinen, ellet päätä tehdä siitä julkista. Jos klikkaat alla olevaa "Julkaise"-painiketta, sertifikaattisi julkaistaan virallisella
  fr: est privé à moins que vous choisissiez de le rendre public. Si vous cliquez sur le bouton "Publier" ci-dessous, votre certificat sera publié sur l'officiel
  hr: je privat osim ako se odlučite učiniti ga javnim. Ako kliknete na gumb "Objavi" ispod, vaš certifikat bit će objavljen na službenom
  hu: privát, hacsak nem dönt úgy, hogy nyilvánossá teszi. Ha az alábbi "Közzététel" gombra kattint, a tanúsítványa a hivatalos oldalon lesz közzétéve
  is: er einkaaðila nema þú ákveður að gera það opinbert. Ef þú smellir á „Birta“ hnappinn hér að neðan verður vottorðið þitt birt á opinbera
  it: è privato a meno che non si scelga di renderlo pubblico. Se fai clic sul pulsante "Pubblica" qui sotto, il tuo certificato sarà pubblicato sull'ufficiale
  lt: yra privatus, nebent nuspręsite jį padaryti viešu. Jei paspausite žemiau esantį „Publikuoti“ mygtuką, jūsų sertifikatas bus paskelbtas oficialiame
  lv: ir privāts, ja vien neizlemjat to padarīt publisku. Ja noklikšķināsiet zemāk esošo “Publicēt” pogu, jūsu sertifikāts tiks publicēts oficiālajā
  mt: huwa privat sakemm ma tagħżilx li tagħmlu pubbliku. Jekk tagħfas il-buttuna "Ippubblika" hawn taħt, iċ-ċertifikat tie
