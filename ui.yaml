description_automatic_evaluation:
  bg: Оценката на риска е  извършена автоматично от инструмента. Ще имате възможност
    да промените приоритета на този риск (ако смятате, че е необходимо) в плана за
    действие.
  ca: L'avaluació de riscos ha estat efectuada automàticament per l'eina. Podreu canviar
    la prioritat d'aquest risc –si ho considereu necessari– al pla d'acció.
  cs: Nástroj provedl hodnocení rizika automaticky. Hodnotu tohoto rizika budete moci
    změnit v akčním plánu, pokud to budete považovat za nutné.
  de: Die Bewertung der Priorität wurde für diese Gefährdung automatisch durchgeführt.
    Sie können diese Priorität später im Aktionsplan anpassen, falls nötig.
  el: Η αξιολόγηση του κινδύνου (εκτίμηση επικινδυνότητας) πραγματοποιήθηκε αυτόματα
    από το εργαλείο. Θα μπορείτε να τροποποιήσετε την εκτίμηση επικινδυνότητας –εάν
    το κρίνετε σκόπιμο– στο σχέδιο δράσης.
  en: The risk evaluation has been automatically done by the tool. You will be able
    to change the priority for this risk – if you consider it necessary – in the action
    plan.
  es: La herramienta ha evaluado de forma automática el riesgo. Podrá modificar la
    prioridad para este riesgo –si lo considera necesario– en el plan de acción.
  fi: Sovellus määrittää riskin suuruuden automaattisesti. Voit tarvittaessa muuttaa
    tätä riskitasoa toimintasuunnitelmavaiheessa.
  fr: L'évaluation du risque a été effectuée automatiquement par l'outil.   Vous pourrez
    modifier la priorité de ce risque - si vous considérez que cela est nécessaire
    - dans le plan d'action.
  hr: Alat je automatski procijenio rizik. U Planu mjera razina rizika može se promijeniti.
  hu: Ezt a kockázatértékelést az OiRA automatikusan elvégezte. Meg tudja változtatni
    a kockázatok prioritását ndash; ha úgy gondolja, hogy szükséges ndash; az intézkedési
    tervben.
  is: Verkfærið metur áhættuna sjálkrafa. Hægt er að breyta forgangi áhættunar í aðgerðaáætluninni.
  it: Il livello di rischio per la sicurezza e la salute correlato ai pericoli identificati
    è stato individuato automaticamente dallo strumento. Sarà possibile modificare
    il livello di rischio in fase di aggiornamento della valutazione a seguito dell’implementazione
    delle misure di miglioramento.
  lt: Priemonė automatiškai atliko rizikos vertinimą. Veiksmų plane, jeigu manysite,
    kad tai reikalinga, galėsite pakeisti šios rizikos dydį.
  lv: Riska novērtējumu automātiski ir veicis rīks. Jūs varēsiet mainīt šim riska
    pakāpi rīcības plānā (ja jūs to uzskatīsiet par vajadzīgu).
  mt: L-evalwazzjoni tar-riskju saret b'mod awtomatiku mill-għodda. Ser tkun tista'
    tibdel il-prijorità għal dan ir-riskju - jekk tħoss il-ħtieġa - fil-pjan ta' azzjoni.
  nl: De tool heeft automatisch een risico-evaluatie uitgevoerd. U kunt de prioriteit
    van dit risico – als u dit nodig acht– nog aanpassen in het actieplan.
  nl_BE: De tool heeft automatisch een risico-evaluatie uitgevoerd. U kunt de prioriteit
    van dit risico – als u dit nodig acht– nog aanpassen in het actieplan.
  'no': Risikoevalueringen er automatisk utført av verktøyet. Du vil kunne endre prioriteten
    for denne risikoen – hvis du anser det som nødvendig – i handlingsplanen.
  pt: A avaliação do risco foi efetuada automaticamente pela ferramenta. Poderá alterar
    a prioridade deste risco no plano de ação – caso o considere necessário.
  sk: Nástroj automaticky vykonal hodnotenie rizík. Ak to považujete za nevyhnutné,
    pri tomto riziku budete môcť zmeniť prioritu v akčnom pláne.
  sl: Orodje je samodejno izvedlo oceno tveganja. Prednostno razvrstitev za to tveganje
    boste lahko spremenili – če menite, da je to potrebno – v akcijskem načrtu.
  cy: Mae'r gwerthusiad risg wedi'i wneud yn awtomatig gan yr offeryn. Byddwch yn
    gallu newid y flaenoriaeth ar gyfer y risg hon – os ystyriwch ei bod yn angenrheidiol
    – yn y cynllun gweithredu.
  da: Risikoevalueringen er automatisk udført af værktøjet. Du vil kunne ændre prioriteten
    for denne risiko – hvis du anser det for nødvendigt – i handlingsplanen.
  et: Riskihindamine on tööriista poolt automaatselt teostatud. Saate muuta selle
    riski prioriteeti – kui peate seda vajalikuks – tegevuskavas.
  ga: Rinneadh an meastóireacht riosca go huathoibríoch ag an uirlis. Beidh tú in
    ann tosaíocht na riosca seo a athrú – má mheasann tú gur gá – sa phlean gníomhaíochta.
  he: הערכת הסיכון בוצעה באופן אוטומטי על ידי הכלי. תוכל לשנות את העדיפות לסיכון זה
    – אם תמצא לנכון – בתוכנית הפעולה.
  nl_be: De risicobeoordeling is automatisch door het hulpmiddel uitgevoerd. U kunt
    de prioriteit voor dit risico – indien u dat nodig acht – in het actieplan wijzigen.
  pl: Ocena ryzyka została wykonana automatycznie przez narzędzie. Będziesz mógł zmienić
    priorytet tego ryzyka – jeśli uznasz to za konieczne – w planie działania.
  ro: Evaluarea riscului a fost efectuată automat de instrument. Veți putea modifica
    prioritatea pentru acest risc – dacă considerați necesar – în planul de acțiune.
  ru: Оценка риска была выполнена автоматически инструментом. Вы сможете изменить
    приоритет этого риска – если сочтёте это необходимым – в плане действий.
  sq: Vlerësimi i rrezikut është kryer automatikisht nga mjeti. Do të jeni në gjendje
    të ndryshoni prioritetin për këtë rrezik – nëse e konsideroni të nevojshme – në
    planin e veprimit.
  sr: Procena rizika je automatski obavljena od strane alata. Moći ćete da promenite
    prioritet za ovaj rizik – ako smatrate da je potrebno – u planu akcije.
  sv: Riskbedömningen har automatiskt gjorts av verktyget. Du kommer att kunna ändra
    prioriteten för denna risk – om du anser det nödvändigt – i åtgärdsplanen.
  uk: Оцінку ризику автоматично виконано інструментом. Ви зможете змінити пріоритет
    для цього ризику – якщо вважаєте за необхідне – у плані дій.
description_calculated_evaluation:
  bg: Попълнете отговорите на следните въпроси. Въз основа на вашите отговори системата
    ще изчисли нивото на приоритет на  риска. На по-късен етап ще имате възможност
    да го промените.
  ca: Si us plau, contesteu les preguntes següents. A partir de les vostres respostes,
    el sistema calcularà la prioritat del risc. Més endavant podreu canviar la prioritat.
  cs: Vyberte vyhovující možnost. Systém vypočítá hodnotu rizika.
  de: Bitte beantworten Sie die folgenden Fragen. Aufgrund Ihrer Antworten wird die
    Priorität der Gefährdung berechnet. Sie können diese Priorität später im Aktionsplan
    anpassen, falls nötig.
  el: Παρακαλούμε απαντήστε στις ακόλουθες ερωτήσεις. Με βάση τις απαντήσεις σας το
    εργαλείο αυτόματα και για κάθε περίπτωση κινδύνου, θα υπολογίσει την “εκτίμηση
    επικινδυνότητας”. Στη συνέχεια, μπορείτε αν θέλετε να τροποποιήσετε την εκτίμηση
    επικινδυνότητας.
  en: Please answer the following questions. As a result of your answers the system
    will calculate the priority of the risk. You will be able to modify the priority
    later.
  es: Responda a las siguientes preguntas. Como resultado de sus respuestas, el sistema
    calculará la prioridad del riesgo. Podrá modificar la prioridad más tarde.
  fi: 'Vastaa seuraaviin kysymyksiin: Sovellus määrittelee vastaustesi perusteella
    riskin suuruuden. Riskitaso on muutettavissa myöhemmin.'
  fr: Veuillez répondre aux questions suivantes.  En fonction de vos réponses, le
    système calculera la priorité du risque. Vous pourrez modifier la priorité ultérieurement.
  hr: Odgovorite na sljedeća pitanja. Na temelju vaših odgovora sustav će izračunati
    prioritet rizika. Kasnije ćete moći preinačiti prioritet.
  hu: Kérem válaszoljon a következő kérdésekre. Válaszai alapján a rendszer kiszámolja
    a kockázat prioritását. Később ezt a prioritást tudja módosítani.
  is: Vinsamlegast svaraðu eftirfarandi spurningum. Verkfærið metur áhættuna, eftir
    því hvernig þú svarar spurningunum. Það er hægt að breyta þessu mati síðar.
  it: Rispondere alle seguenti domande. Sulla base delle risposte date, il sistema
    calcolerà la priorità del rischio. Sarà possibile modificare la priorità successivamente.
  lt: Atsakykite į toliau pateiktus klausimus. Atsižvelgiant į jūsų atsakymus, sistemoje
    bus atlikti su rizikos dydžiu susiję skaičiavimai. Vėliau rizikos dydį galėsite
    pakeisti
  lv: Lūdzu, atbildiet uz zemāk norādītajiem jautājumiem. Balstoties uz jūsu atbildēm,
    sistēma aprēķinās riska pakāpi. Jūs vēlāk varēsiet to mainīt.
  mt: Jekk jogħġbok wieġeb il-mistoqsijiet li ġejjin. Bħala riżultat tal-mistoqsijiet
    tiegħek, is-sistema ser tikkalkula l-prijorità tar-riskju. Ser tkun tista' timmodifika
    l-prijorità aktar tard.
  nl: Beantwoord de volgende vragen. Het systeem zal op grond van uw antwoorden de
    prioriteit van het risico berekenen. U kunt de prioriteit later nog aanpassen.
  nl_BE: Beantwoord de volgende vragen. Het systeem zal op grond van uw antwoorden
    de prioriteit van het risico berekenen. U kunt de prioriteit later nog aanpassen.
  'no': Vennligst svar på følgende spørsmål. Som et resultat av svarene dine vil systemet
    beregne prioriteten til risikoen. Du vil kunne endre prioriteten senere.
  pt: Queira responder às perguntas que se seguem. Em função das suas respostas, o
    sistema calculará a prioridade do risco. Poderá alterar a prioridade posteriormente.
  sk: Odpovedzte na nasledujúce otázky. Na základe vašich odpovedí systém vypočíta
    prioritu rizika. Prioritu budete môcť upraviť neskôr.
  sl: Odgovorite na naslednja vprašanja. Sistem bo na podlagi vaših odgovorov določil
    prednostno razvrstitev tveganja. Prednostno razvrstitev boste lahko pozneje spremenili.
  cy: Atebwch y cwestiynau canlynol, os gwelwch yn dda. O ganlyniad i'ch atebion bydd
    y system yn cyfrifo blaenoriaeth y risg. Byddwch yn gallu addasu'r flaenoriaeth
    yn ddiweddarach.
  da: Besvar venligst følgende spørgsmål. Som et resultat af dine svar vil systemet
    beregne prioriteten for risikoen. Du vil kunne ændre prioriteten senere.
  et: Palun vastake järgmistele küsimustele. Teie vastuste põhjal arvutab süsteem
    riski prioriteedi. Saate prioriteeti hiljem muuta.
  ga: Freagair na ceisteanna seo a leanas le do thoil. Mar thoradh ar do chuid freagraí
    ríomhfaidh an córas tosaíocht na riosca. Beidh tú in ann an tosaíocht a mhodhnú
    níos déanaí.
  he: אנא ענה על השאלות הבאות. כתוצאה מתשובותיך המערכת תחשב את עדיפות הסיכון. תוכל
    לשנות את העדיפות בהמשך.
  nl_be: Beantwoord de volgende vragen. Op basis van uw antwoorden berekent het systeem
    de prioriteit van het risico. U kunt de prioriteit later wijzigen.
  pl: Proszę odpowiedzieć na poniższe pytania. Na podstawie Twoich odpowiedzi system
    obliczy priorytet ryzyka. Będziesz mógł później zmodyfikować priorytet.
  ro: Vă rugăm să răspundeți la următoarele întrebări. Ca urmare a răspunsurilor dvs.,
    sistemul va calcula prioritatea riscului. Veți putea modifica prioritatea ulterior.
  ru: Пожалуйста, ответьте на следующие вопросы. На основе ваших ответов система рассчитает
    приоритет риска. Вы сможете изменить приоритет позже.
  sq: Ju lutemi përgjigjuni pyetjeve të mëposhtme. Si rezultat i përgjigjeve tuaja,
    sistemi do të llogarisë prioritetin e rrezikut. Do të jeni në gjendje të modifikoni
    prioritetin më vonë.
  sr: Molimo odgovorite na sledeća pitanja. Kao rezultat vaših odgovora, sistem će
    izračunati prioritet rizika. Moći ćete da izmenite prioritet kasnije.
  sv: Vänligen svara på följande frågor. Som ett resultat av dina svar kommer systemet
    att beräkna prioriteten för risken. Du kommer att kunna ändra prioriteten senare.
  uk: Будь ласка, дайте відповіді на наступні запитання. За результатами ваших відповідей
    система розрахує пріоритет ризику. Ви зможете змінити пріоритет пізніше.
description_other_risks:
  bg: 'Ако сте идентифицирали рискове, които не са включени в инструмента, можете
    да ги добавите на този етап:'
  ca: 'Si heu identificat riscos no inclosos a l''eina, els podeu afegir ara:'
  cs: 'Pokud jste zjistili rizika, která nástroj neobsahuje, můžete je nyní přidat:'
  de: Falls Sie weitere Gefährdungen identifiziert haben, die in diesem Tool nicht
    vorkommen, können Sie diese hier eingeben.
  el: 'Εάν αναγνωρίσατε κινδύνους που δεν έχουν συμπεριληφθεί στο εργαλείο, μπορείτε
    να τους προσθέσετε τώρα:'
  en: 'In case you didn''t find a risk that you have identified in your company, you
    are able to add it to your own risk assessment now:'
  es: 'En caso de que haya identificado riesgos no incluidos en la herramienta, puede
    añadirlos ahora:'
  fi: Jos työpaikallasi esiintyy sellaisia riskitekijöitä, joita ei aiemmissa osioissa
    mainittu, niin lisää ne tähän riskinarviointiin valitsemalla ”Kyllä”.
  fr: Si vous avez identifié des risques qui ne sont pas abordés par l’outil, vous
    pouvez les ajouter ici.
  hr: U slučaju da na vašim mjestima rada identificirate opasnost, štetnost ili napor
    koji ovim alatom već nisu obuhvaćeni, možete ih proanalizirati ovdje.
  hu: Amennyiben Ön olyan kockázatokat azonosított, amelyeket az eszköz nem tartalmaz,
    itt hozzáadhatja azokat.
  is: 'Hættum sem ekki er fjallað um í verkfærinu er hægt að bæta við hér:'
  it: 'Qualora siano stati identificati rischi non inclusi in questo strumento, è
    possibile aggiungerli ora:'
  lt: 'Jeigu nustatėte riziką, kurios nėra priemonėje, ją galite pridėti dabar:'
  lv: 'Gadījumā, ja esat identificējis(-usi) riskus, kuri nav iekļauti rīkā, varat
    tos pievienot tagad:'
  mt: 'F''każ li għandek riskji identifikati mhux inklużi fl-għodda, dawn tista''
    żżidhom issa:'
  nl: 'Indien u risico''s hebt vastgesteld die niet in de tool zijn opgenomen, kunt
    u deze nu toevoegen:'
  nl_BE: 'Indien u risico''s hebt vastgesteld die niet in de tool zijn opgenomen,
    kunt u deze nu toevoegen:'
  'no': 'Hvis du ikke fant en risiko du har identifisert i din bedrift, kan du legge
    den til din egen risikovurdering nå:'
  pt: 'No caso de considerar outros riscos não contidos na ferramenta, tem apossibilidade
    de adicioná-los agora:'
  sk: 'Ak ste identifikovali riziká, ktoré nie sú uvedené v nástroji, teraz máte možnosť
    ich pridať:'
  sl: 'Če ste opredelili tveganja, ki niso vključena v orodje, jih lahko dodate zdaj:'
  cy: 'Rhag ofn na ddaethoch o hyd i risg yr ydych wedi''i nodi yn eich cwmni, gallwch
    ei ychwanegu at eich asesiad risg eich hun nawr:'
  da: 'Hvis du ikke fandt en risiko, som du har identificeret i din virksomhed, kan
    du tilføje den til din egen risikovurdering nu:'
  et: 'Juhul, kui te ei leidnud riski, mille olete oma ettevõttes tuvastanud, saate
    selle nüüd oma riskihinnangusse lisada:'
  ga: 'Sa chás nár aimsigh tú riosca a d''aimsigh tú i do chuideachta, is féidir leat
    é a chur le do mheasúnú riosca féin anois:'
  he: 'במקרה שלא מצאת סיכון שזיהית בחברתך, תוכל להוסיפו להערכת הסיכונים שלך עכשיו:'
  nl_be: 'Als u een risico dat u in uw bedrijf hebt geïdentificeerd niet hebt gevonden,
    kunt u het nu aan uw eigen risicobeoordeling toevoegen:'
  pl: 'Jeśli nie znalazłeś ryzyka, które zidentyfikowałeś w swojej firmie, możesz
    je teraz dodać do własnej oceny ryzyka:'
  ro: 'În cazul în care nu ați găsit un risc pe care l-ați identificat în compania
    dvs., îl puteți adăuga acum la propria evaluare a riscurilor:'
  ru: 'Если вы не нашли риск, который вы выявили в своей компании, вы можете добавить
    его в свою оценку рисков сейчас:'
  sq: 'Në rast se nuk keni gjetur një rrezik që keni identifikuar në kompaninë tuaj,
    mund ta shtoni tani në vlerësimin tuaj të rrezikut:'
  sr: 'U slučaju da niste pronašli rizik koji ste identifikovali u vašoj kompaniji,
    možete ga sada dodati u sopstvenu procenu rizika:'
  sv: 'Om du inte hittade en risk som du har identifierat i ditt företag kan du lägga
    till den i din egen riskbedömning nu:'
  uk: 'Якщо ви не знайшли ризик, який ви визначили у своїй компанії, ви можете додати
    його до власної оцінки ризику зараз:'
