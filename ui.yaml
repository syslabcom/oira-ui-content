  lt: Šis rizikos vertinimas yra užrakintas, nes instruktavimo dokumentai jau buvo išsiųsti rangovui.
  lv: Šis riska novērtējums ir bloķēts, jo instruktāžas dokumenti jau tika nosūtīti darbuzņēmējam.
  mt: Din il-valutazzjoni tar-riskju hija mblukkata minħabba li d-dokumenti tal-briefing diġà ntbagħtu lill-kuntrattur.
  nl: Deze risicobeoordeling is vergrendeld omdat de briefingdocumenten al naar de aannemer zijn verzonden.
