  es: Por favor, deje cualquier comentario que tenga sobre la pregunta anterior en este campo
  et: Palun jätke siia väljale kõik lisakommentaarid, mis tuleks aruandesse lisada.
  fi: Lisää tähän tietoja tai kommentteja, jotka haluat näkyviin raportille.
  fr: Vous pouvez écrire ici tout commentaire se rapportant à cette question
  ga: Fág aon tuairimí breise ba cheart a chur san áireamh sa tuarascáil sa réimse seo.
  he: אנא השאר כאן כל הערה נוספת שיש לכלול בדוח.
  hr: U ovom polju ostavite dodatni komentar koji bi trebalo uključiti u izvješće.
  hu: Kérjük, ebben a mezőben adja meg azokat a kiegészítő megjegyzéseket, amelyeket a jelentésbe be szeretne venni.
  is: Bætið við athugasemdum í skýrsluna hér.
  it: Inserisci in questo campo ulteriori dettagli o commenti che desideri vengano inclusi nel Report.
  lt: Šiame laukelyje įrašykite norimus komentarus
  lv: Šajā laukā lūdzu norādīt papildus komentārus par augstāk minēto jautājumu
  mt: Ħalli l-kummenti addizzjonali li għandhom jiġu inklużi fir-rapport f'dan il-qasam.
  nl: Vul hier eventuele opmerkingen in die moeten worden meegenomen in het rapport.
  nl_BE: Gelieve hier al uw opmerkingen met betrekking tot de bovenstaande vraag te noteren.
  nl_be: Laat eventuele extra opmerkingen die in het rapport opgenomen moeten worden achter in dit veld.
  'no': Legg igjen eventuelle ekstra kommentarer som skal inkluderes i rapporten i dette feltet.
  pl: Wpisz wszelkie dodatkowe komentarze, które powinny być zawarte w raporcie.
