message_help_force_open_sections:
  en: Indicate whether and which sections should be open by default. Research shows
    that users are more likely to complete a risk assessment promptly when sections
    are initially closed. Users tend to open the parts they need themselves. When
    a user opens or closes a section, this preference is saved locally in the browser.
    This way, the application automatically adapts to the user’s behaviour.
  nl: Geef aan of en welke secties bij aanvang geopend moeten zijn. Uit onderzoek
    blijkt dat gebruikers eerder geneigd zijn een risicoanalyse spoedig te voltooien
    wanneer de secties aanvankelijk gesloten zijn. Gebruikers openen doorgaans zelf
    de onderdelen die zij op dat moment nodig hebben. Wanneer een gebruiker een sectie
    opent of sluit, wordt deze voorkeur lokaal in de browser opgeslagen. Zo past het
    gedrag van de applicatie zich automatisch aan de gebruikswijze van de individuele
    gebruiker aan.
  fr: Indiquez si et quelles sections doivent être ouvertes par défaut. Des recherches
    montrent que les utilisateurs sont plus enclins à finaliser une évaluation des
    risques lorsque les sections sont initialement fermées. Les utilisateurs ouvrent
    généralement eux-mêmes les parties dont ils ont besoin. Lorsqu’un utilisateur
    ouvre ou ferme une section, cette préférence est enregistrée localement dans le
    navigateur. L’application s’adapte ainsi automatiquement à la manière d’utiliser
    de chaque utilisateur.
  de: Geben Sie an, ob und welche Abschnitte zu Beginn geöffnet sein sollen. Untersuchungen
    zeigen, dass Benutzer eine Gefährdungsbeurteilung eher abschließen, wenn die Abschnitte
    zunächst geschlossen sind. Nutzer öffnen in der Regel die Abschnitte, die sie
    benötigen, selbst. Wenn ein Benutzer einen Abschnitt öffnet oder schließt, wird
    diese Präferenz lokal im Browser gespeichert. So passt sich die Anwendung automatisch
    dem Verhalten des einzelnen Nutzers an.
  it: Indica se e quali sezioni devono essere aperte all'avvio. Le ricerche dimostrano
    che gli utenti sono più propensi a completare una valutazione dei rischi se le
    sezioni sono inizialmente chiuse. Gli utenti tendono ad aprire autonomamente le
    sezioni di cui hanno bisogno. Quando un utente apre o chiude una sezione, questa
    preferenza viene salvata localmente nel browser. In questo modo, l’applicazione
    si adatta automaticamente al comportamento dell’utente.
  es: Indica si y qué secciones deben estar abiertas al iniciar. Las investigaciones
    muestran que los usuarios son más propensos a completar una evaluación de riesgos
    si las secciones están inicialmente cerradas. Normalmente los usuarios abren por
    sí mismos las partes que necesitan. Cuando un usuario abre o cierra una sección,
    esta preferencia se guarda localmente en el navegador. Así, la aplicación se adapta
    automáticamente al comportamiento del usuario.
  pt: Indique se e quais secções devem estar abertas no início. Estudos mostram que
    os utilizadores têm maior probabilidade de concluir uma avaliação de riscos quando
    as secções estão inicialmente fechadas. Os utilizadores tendem a abrir por si
    mesmos as partes de que necessitam. Quando um utilizador abre ou fecha uma secção,
    essa preferência é guardada localmente no navegador. Assim, a aplicação adapta-se
    automaticamente ao comportamento do utilizador.
  pl: Określ, czy i które sekcje powinny być otwarte na początku. Badania pokazują,
    że użytkownicy chętniej kończą ocenę ryzyka, gdy sekcje są początkowo zamknięte.
    Użytkownicy zwykle sami otwierają potrzebne im części. Gdy użytkownik otworzy
    lub zamknie sekcję, ta preferencja jest zapisywana lokalnie w przeglądarce. Aplikacja
    automatycznie dostosowuje się do sposobu korzystania przez użytkownika.
  fi: Määritä, mitkä osiot tulisi avata oletusarvoisesti. Tutkimukset osoittavat,
    että käyttäjät todennäköisemmin suorittavat riskinarvioinnin loppuun, kun osiot
    ovat aluksi suljettuina. Käyttäjät avaavat yleensä itse tarvitsemansa osiot. Kun
    käyttäjä avaa tai sulkee osion, tämä asetus tallennetaan paikallisesti selaimeen.
    Näin sovellus mukautuu automaattisesti käyttäjän toimintaan.
  hr: Odredite koje sekcije trebaju biti otvorene na početku. Istraživanja pokazuju
    da su korisnici skloniji dovršiti procjenu rizika kada su sekcije inicijalno zatvorene.
    Korisnici obično sami otvaraju dijelove koji su im potrebni. Kada korisnik otvori
    ili zatvori sekciju, ta se postavka lokalno sprema u pregledniku. Na taj način
    aplikacija se automatski prilagođava ponašanju korisnika.
  cs: Určete, které sekce by měly být ve výchozím nastavení otevřené. Výzkumy ukazují,
    že uživatelé mají větší pravděpodobnost dokončení hodnocení rizik, když jsou sekce
    zpočátku zavřené. Uživatelé obvykle sami otevírají části, které potřebují. Když
    uživatel otevře nebo zavře sekci, tato preference se uloží lokálně v prohlížeči.
    Tímto způsobem se aplikace automaticky přizpůsobuje chování uživatele.
  da: Angiv, om og hvilke sektioner der skal være åbne som standard. Forskning viser,
    at brugere er mere tilbøjelige til at fuldføre en risikovurdering, når sektionerne
    er lukkede fra starten. Brugere åbner normalt selv de dele, de har brug for. Når
    en bruger åbner eller lukker en sektion, gemmes denne præference lokalt i browseren.
    På denne måde tilpasser applikationen sig automatisk til brugerens adfærd.
  mt: Indika jekk u liema sezzjonijiet għandhom ikunu miftuħa b’mod awtomatiku. Riċerka
    turi li l-utenti huma aktar probabbli li jlestu valutazzjoni tar-riskju meta s-sezzjonijiet
    ikunu inizjalment magħluqa. L-utenti għandhom it-tendenza li jiftħu huma stess
    il-partijiet li għandhom bżonn. Meta utent jiftaħ jew jagħlaq sezzjoni, din il-preferenza
    tinħażen lokalment fil-browser. B’dan il-mod, l-applikazzjoni tadatta awtomatikament
    għall-imġieba tal-utent.
  sl: Določite, ali in katere sekcije naj bodo privzeto odprte. Raziskave kažejo,
    da uporabniki pogosteje dokončajo oceno tveganja, če so sekcije sprva zaprte.
    Uporabniki običajno sami odprejo dele, ki jih potrebujejo. Ko uporabnik odpre
    ali zapre sekcijo, se ta nastavitev shrani lokalno v brskalniku. Tako se aplikacija
    samodejno prilagodi uporabnikovemu vedenju.
  bg: Посочете дали и кои секции трябва да бъдат отворени по подразбиране. Изследвания
    показват, че потребителите по-вероятно ще завършат оценката на риска, когато секциите
    са първоначално затворени. Потребителите обикновено сами отварят необходимите
    им части. Когато потребител отвори или затвори секция, това предпочитание се запазва
    локално в браузъра. По този начин приложението автоматично се адаптира към поведението
    на потребителя.
  ro: Indicați dacă și care secțiuni ar trebui să fie deschise în mod implicit. Cercetările
    arată că utilizatorii sunt mai predispuși să finalizeze o evaluare a riscurilor
    atunci când secțiunile sunt inițial închise. Utilizatorii tind să deschidă singuri
    părțile de care au nevoie. Când un utilizator deschide sau închide o secțiune,
    această preferință este salvată local în browser. Astfel, aplicația se adaptează
    automat comportamentului utilizatorului.
  et: Määrake, kas ja millised jaotised peaksid vaikimisi olema avatud. Uuringud näitavad,
    et kasutajad on tõenäolisemalt valmis riskihindamise lõpule viima, kui jaotised
    on algselt suletud. Kasutajad avavad tavaliselt ise vajalikud osad. Kui kasutaja
    avab või sulgeb jaotise, salvestatakse see eelistus lokaalselt brauseris. Nii
    kohandub rakendus automaatselt kasutaja käitumisega.
  lv: Norādiet, vai un kuras sadaļas jābūt atvērtām pēc noklusējuma. Pētījumi liecina,
    ka lietotāji, visticamāk, pabeigs riska novērtējumu, ja sadaļas sākotnēji ir aizvērtas.
    Lietotāji parasti paši atver nepieciešamās daļas. Kad lietotājs atver vai aizver
    sadaļu, šī izvēle tiek lokāli saglabāta pārlūkprogrammā. Tādējādi lietotne automātiski
    pielāgojas lietotāja uzvedībai.
  lt: Nurodykite, ar ir kurios skiltys turėtų būti atidarytos pagal numatytuosius
    nustatymus. Tyrimai rodo, kad vartotojai labiau linkę užbaigti rizikos vertinimą,
    kai skiltys iš pradžių yra uždarytos. Vartotojai paprastai patys atidaro reikiamas
    dalis. Kai vartotojas atidaro ar uždaro skiltį, ši nuostata išsaugoma vietoje
    naršyklėje. Taip programa automatiškai prisitaiko prie vartotojo elgesio.
  sv: Ange om och vilka sektioner som ska vara öppna som standard. Forskning visar
    att användare är mer benägna att slutföra en riskbedömning när sektionerna initialt
    är stängda. Användare öppnar vanligtvis själva de delar de behöver. När en användare
    öppnar eller stänger en sektion sparas denna inställning lokalt i webbläsaren.
    På så sätt anpassar sig applikationen automatiskt till användarens beteende.
  sk: Určite, či a ktoré sekcie by mali byť predvolene otvorené. Výskumy ukazujú,
    že používatelia sú viac naklonení dokončiť hodnotenie rizík, keď sú sekcie spočiatku
    zatvorené. Používatelia si zvyčajne sami otvárajú časti, ktoré potrebujú. Keď
    používateľ otvorí alebo zatvorí sekciu, táto preferencia sa uloží lokálne v prehliadači.
    Týmto spôsobom sa aplikácia automaticky prispôsobí správaniu používateľa.
  hu: Adja meg, hogy mely szakaszok legyenek alapértelmezetten nyitva. Kutatások szerint
    a felhasználók nagyobb valószínűséggel fejezik be a kockázatértékelést, ha a szakaszok
    kezdetben zárva vannak. A felhasználók általában maguk nyitják meg a szükséges
    részeket. Amikor egy felhasználó megnyit vagy bezár egy szakaszt, ez a beállítás
    helyileg kerül mentésre a böngészőben. Így az alkalmazás automatikusan alkalmazkodik
    a felhasználó viselkedéséhez.
  el: Υποδείξτε εάν και ποιες ενότητες πρέπει να είναι ανοιχτές από προεπιλογή. Έρευνες
    δείχνουν ότι οι χρήστες είναι πιο πιθανό να ολοκληρώσουν μια αξιολόγηση κινδύνου
    όταν οι ενότητες είναι αρχικά κλειστές. Οι χρήστες τείνουν να ανοίγουν μόνοι τους
    τα μέρη που χρειάζονται. Όταν ένας χρήστης ανοίγει ή κλείνει μια ενότητα, αυτή
    η προτίμηση αποθηκεύεται τοπικά στον περιηγητή. Με αυτόν τον τρόπο, η εφαρμογή
    προσαρμόζεται αυτόματα στη συμπεριφορά του χρήστη.
  ga: Léirigh cé acu agus cé na rannóga ba chóir a bheith oscailte de réir réamhshocraithe.
    Léiríonn taighde go bhfuil seans níos mó ann go gcríochnóidh úsáideoirí measúnú
    riosca nuair a bhíonn na rannóga dúnta ar dtús. Is gnách do na húsáideoirí na
    codanna a theastaíonn uathu a oscailt iad féin. Nuair a osclaíonn nó a dhúnann
    úsáideoir rannóg, sábháiltear an rogha seo go háitiúil sa bhrabhsálaí. Ar an mbealach
    seo, oiriúnóidh an feidhmchlár go huathoibríoch do iompar an úsáideora.
  he: ציין האם ואילו מקטעים צריכים להיות פתוחים כברירת מחדל. מחקרים מראים שמשתמשים
    נוטים יותר להשלים הערכת סיכונים כאשר המקטעים סגורים בתחילה. המשתמשים פותחים לרוב
    בעצמם את החלקים הדרושים להם. כאשר משתמש פותח או סוגר מקטע, העדפה זו נשמרת באופן
    מקומי בדפדפן. כך מתאימה האפליקציה את עצמה אוטומטית להרגלי השימוש של המשתמש.
  ca: Indiqueu si les seccions han d'estar obertes per defecte i quines. Les investigacions
    mostren que els usuaris tenen més probabilitats de completar una avaluació de
    riscos ràpidament quan les seccions estan inicialment tancades. Els usuaris tendeixen
    a obrir ells mateixos les parts que necessiten. Quan un usuari obre o tanca una
    secció, aquesta preferència es desa localment al navegador. D'aquesta manera,
    l'aplicació s'adapta automàticament al comportament de l'usuari.
  cy: Nodwch a pha adrannau ddylai fod ar agor yn ddiofyn. Mae ymchwil yn dangos bod
    defnyddwyr yn fwy tebygol o gwblhau asesiad risg yn brydlon pan fo adrannau ar
    gau i ddechrau. Mae defnyddwyr yn tueddu i agor y rhannau sydd eu hangen arnynt
    eu hunain. Pan fydd defnyddiwr yn agor neu'n cau adran, caiff y dewis hwn ei gadw'n
    lleol yn y porwr. Fel hyn, mae'r rhaglen yn addasu'n awtomatig i ymddygiad y defnyddiwr.
  is: Tilgreindu hvort og hvaða hlutar eigi að vera opnir sjálfgefið. Rannsóknir sýna
    að notendur eru líklegri til að ljúka við áhættumat fljótt þegar hlutar eru upphaflega
    lokaðir. Notendur hafa tilhneigingu til að opna þá hluta sem þeir þurfa sjálfir.
    Þegar notandi opnar eða lokar hluta, er þessi stilling vistuð staðbundið í vafranum.
    Þannig aðlagast forritið sjálfkrafa hegðun notandans.
  nl_BE: Geef aan of en welke secties standaard open moeten zijn. Onderzoek toont
    aan dat gebruikers een risicobeoordeling sneller afwerken wanneer secties aanvankelijk
    gesloten zijn. Gebruikers openen zelf de onderdelen die ze nodig hebben. Wanneer
    een gebruiker een sectie opent of sluit, wordt deze voorkeur lokaal opgeslagen
    in de browser. Op deze manier past de applicatie zich automatisch aan het gedrag
    van de gebruiker aan.
  nl_be: Geef aan of en welke secties standaard open moeten zijn. Onderzoek toont
    aan dat gebruikers een risicobeoordeling sneller afwerken wanneer secties aanvankelijk
    gesloten zijn. Gebruikers openen zelf de onderdelen die ze nodig hebben. Wanneer
    een gebruiker een sectie opent of sluit, wordt deze voorkeur lokaal opgeslagen
    in de browser. Op deze manier past de applicatie zich automatisch aan het gedrag
    van de gebruiker aan.
  'no': Angi om og hvilke seksjoner som skal være åpne som standard. Forskning viser
    at brukere er mer tilbøyelige til å fullføre en risikovurdering raskt når seksjoner
    er lukket som standard. Brukere har en tendens til å åpne de delene de trenger
    selv. Når en bruker åpner eller lukker en seksjon, lagres denne preferansen lokalt
    i nettleseren. På denne måten tilpasser applikasjonen seg automatisk til brukerens
    atferd.
  ru: Укажите, следует ли и какие разделы должны быть открыты по умолчанию. Исследования
    показывают, что пользователи с большей вероятностью своевременно завершат оценку
    рисков, когда разделы изначально закрыты. Пользователи, как правило, сами открывают
    нужные им части. Когда пользователь открывает или закрывает раздел, это предпочтение
    сохраняется локально в браузере. Таким образом, приложение автоматически адаптируется
    к поведению пользователя.
  sq: Tregoni nëse dhe cilat seksione duhet të jenë të hapura si parazgjedhje. Hulumtimet
    tregojnë se përdoruesit kanë më shumë gjasa të plotësojnë një vlerësim rreziku
    menjëherë kur seksionet janë fillimisht të mbyllura. Përdoruesit priren të hapin
    vetë pjesët që u nevojiten. Kur një përdorues hap ose mbyll një seksion, kjo preferencë
    ruhet lokalisht në shfletues. Në këtë mënyrë, aplikacioni përshtatet automatikisht
    me sjelljen e përdoruesit.
  sr: Naznačite da li i koje sekcije treba da budu otvorene podrazumevano. Istraživanja
    pokazuju da su korisnici skloniji da brzo završe procenu rizika kada su sekcije
    inicijalno zatvorene. Korisnici obično sami otvaraju delove koji su im potrebni.
    Kada korisnik otvori ili zatvori sekciju, ova preferencija se čuva lokalno u pregledaču.
    Na ovaj način, aplikacija se automatski prilagođava ponašanju korisnika.
  uk: Вкажіть, чи і які розділи мають бути відкриті за замовчуванням. Дослідження
    показують, що користувачі частіше своєчасно завершують оцінку ризиків, коли розділи
    спочатку закриті. Користувачі, як правило, самі відкривають потрібні їм частини.
    Коли користувач відкриває або закриває розділ, це налаштування зберігається локально
    в браузері. Таким чином, додаток автоматично адаптується до поведінки користувача.
