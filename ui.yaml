message_help_available_reports:
  en: Select which types of reports will be made available to users.
  nl: Selecteer welke rapporttypen beschikbaar gesteld worden aan de gebruikers.
  fr: Sélectionnez quels types de rapports seront mis à la disposition des utilisateurs.
  de: Wählen Sie aus, welche Berichtstypen den Nutzern zur Verfügung gestellt werden.
  it: Seleziona quali tipi di report saranno messi a disposizione degli utenti.
  es: Selecciona qué tipos de informes estarán disponibles para los usuarios.
  pt: Selecione quais tipos de relatórios estarão disponíveis para os utilizadores.
  pl: Wybierz, które typy raportów będą dostępne dla użytkowników.
  fi: Valitse, mitkä raporttityypit tarjotaan käyttäjille.
  hr: Odaberite koje vrste izvješća će biti dostupne korisnicima.
