message_permission_level_manage:
  en: User can take trainings, view and edit all risk assessments, request validations
    and lock risk assessments.
  bg: Потребителят може да взема обучения, да преглежда и редактира всички оценки
    на риска, да заявява валидации и да заключва оценки на риска.
  ca: L'usuari pot fer formacions, visualitzar i editar totes les avaluacions de riscos,
    sol·licitar validacions i bloquejar avaluacions de riscos.
  cs: Uživatel může absolvovat školení, prohlížet a upravovat všechna hodnocení rizik,
    žádat o validace a uzamykat hodnocení rizik.
  cy: Gall y defnyddiwr gymryd hyfforddiant, gweld a golygu pob asesiad risg, gofyn
    am ddilysnodau a chloi aseisadau risg.
  da: Brugeren kan deltage i kurser, se og redigere alle risikovurderinger, anmode
    om valideringer og låse risikovurderinger.
  de: Der Benutzer kann Schulungen absolvieren, alle Risikobewertungen anzeigen und
    bearbeiten, Validierungen anfordern und Risikobewertungen sperren.
  el: Ο χρήστης μπορεί να παρακολουθεί εκπαιδεύσεις, να προβάλλει και να επεξεργάζεται
    όλες τις εκτιμήσεις κινδύνου, να ζητά επικυρώσεις και να κλειδώνει εκτιμήσεις
    κινδύνου.
  es: El usuario puede realizar formaciones, ver y editar todas las evaluaciones de
    riesgos, solicitar validaciones y bloquear evaluaciones de riesgos.
  et: Kasutaja saab läbida koolitusi, vaadata ja muuta kõiki riskihindamisi, taotleda
    valideerimisi ja lukustada riskihindamisi.
  fi: Käyttäjä voi suorittaa koulutuksia, tarkastella ja muokata kaikkia riskiarviointeja,
    pyytää validointeja ja lukita riskiarviointeja.
  fr: L'utilisateur peut suivre des formations, consulter et modifier toutes les évaluations
    des risques, demander des validations et verrouiller les évaluations des risques.
  ga: Féadfaidh an t-úsáideoir oiliúint a dhéanamh, gach measúnú riosca a fheiceáil
    agus a chur in eagar, bailíochtuithe a iarraidh agus measúnuithe riosca a ghlasáil.
  he: המשתמש יכול לבצע הכשרות, לצפות ולערוך את כל הערכות הסיכון, לבקש אישורים ולנעול
    הערכות סיכון.
  hr: Korisnik može pohađati obuke, pregledavati i uređivati sve procjene rizika,
    zahtijevati validacije i zaključavati procjene rizika.
  hu: A felhasználó képzéseken vehet részt, megtekintheti és szerkesztheti az összes
    kockázatértékelést, jóváhagyásokat kérhet és zárolhatja a kockázatértékeléseket.
  is: Notandi getur tekið þátt í þjálfunum, skoðað og breytt öllum áhættumatsskrám,
    óskað eftir staðfestingum og læst áhættumatsskrám.
  it: L'utente può seguire le formazioni, visualizzare e modificare tutte le valutazioni
    dei rischi, richiedere validazioni e bloccare le valutazioni dei rischi.
  lt: Vartotojas gali dalyvauti mokymuose, peržiūrėti ir redaguoti visus rizikos vertinimus,
    prašyti patvirtinimų ir užrakinti rizikos vertinimus.
  lv: Lietotājs var apmeklēt apmācības, skatīt un rediģēt visus riska novērtējumus,
    pieprasīt validācijas un bloķēt riska novērtējumus.
  mt: L-utent jista' jieħu taħriġ, jara u jeditja l-valutazzjonijiet tar-riskju kollha,
    jitlob validazzjonijiet u jibblokka l-valutazzjonijiet tar-riskju.
  nl: Gebruiker kan trainingen volgen, alle risicobeoordelingen bekijken en bewerken,
    validaties aanvragen en risicobeoordelingen vergrendelen.
  nl_BE: Gebruiker kan trainingen volgen, alle risicobeoordelingen bekijken en bewerken,
    validaties aanvragen en risicobeoordelingen vergrendelen.
  nl_be: Gebruiker kan trainingen volgen, alle risicobeoordelingen bekijken en bewerken,
    validaties aanvragen en risicobeoordelingen vergrendelen.
  'no': Bruker kan gjennomføre opplæringer, se og redigere alle risikovurderinger,
    be om valideringer og låse risikovurderinger.
  pl: Użytkownik może uczestniczyć w szkoleniach, przeglądać i edytować wszystkie
    oceny ryzyka, żądać walidacji i blokować oceny ryzyka.
  pt: O utilizador pode realizar formações, visualizar e editar todas as avaliações
    de risco, solicitar validações e bloquear avaliações de risco.
  ro: Utilizatorul poate efectua cursuri de formare, vizualiza și edita toate evaluările
    de risc, solicita validări și bloca evaluările de risc.
  ru: Пользователь может проходить обучение, просматривать и редактировать все оценки
    рисков, запрашивать подтверждения и блокировать оценки рисков.
  sk: Používateľ môže absolvovať školenia, prezerať a upravovať všetky hodnotenia
    rizík, žiadať o validácie a uzamknúť hodnotenia rizík.
  sl: Uporabnik lahko opravlja usposabljanja, pregleduje in ureja vse ocene tveganj,
    zahteva validacije in zaklene ocene tveganj.
  sq: Përdoruesi mund të marrë trajnime, të shikojë dhe modifikojë të gjitha vlerësimet
    e riskut, të kërkojë validime dhe të bllokojë vlerësimet e riskut.
  sr: Korisnik može pohađati obuke, pregledati i uređivati sve procene rizika, tražiti
    validacije i zaključati procene rizika.
  sv: Användaren kan genomföra utbildningar, visa och redigera alla riskbedömningar,
    begära valideringar och låsa riskbedömningar.
  uk: Користувач може проходити навчання, переглядати і редагувати всі оцінки ризиків,
    запитувати підтвердження та блокувати оцінки ризиків.
