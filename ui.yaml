message_add_questions_to_the_training_from_the_sidebar:
  en: You may add questions to the training in the training section. The training
    section can be accessed from the sidebar after saving the settings.
  nl: U kunt vragen toevoegen aan de training in de trainingssectie. De trainingssectie
    is toegankelijk vanuit de zijbalk nadat de instellingen zijn opgeslagen.
  fr: Vous pouvez ajouter des questions à la formation dans la section formation.
    La section formation est accessible depuis la barre latérale après avoir enregistré
    les paramètres.
  de: Sie können Fragen zum Training im Trainingsbereich hinzufügen. Der Trainingsbereich
    kann über die Seitenleiste aufgerufen werden, nachdem die Einstellungen gespeichert
    wurden.
  es: Puede agregar preguntas al entrenamiento en la sección de entrenamiento. La
    sección de entrenamiento se puede acceder desde la barra lateral después de guardar
    la configuración.
  it: Puoi aggiungere domande all'addestramento nella sezione di addestramento. La
    sezione di addestramento è accessibile dalla barra laterale dopo aver salvato
    le impostazioni.
  pt: Você pode adicionar perguntas ao treinamento na seção de treinamento. A seção
    de treinamento pode ser acessada na barra lateral após salvar as configurações.
  pl: Możesz dodawać pytania do szkolenia w sekcji szkolenia. Sekcję szkolenia można
    uzyskać dostęp z bocznego paska po zapisaniu ustawień.
  sv: Du kan lägga till frågor i träningen i träningsavsnittet. Träningsavsnittet
    kan nås från sidofältet efter att ha sparat inställningarna.
  da: Du kan tilføje spørgsmål til træningen i træningssektionen. Træningssektionen
    kan tilgås fra sidepanelet efter at have gemt indstillingerne.
  fi: Voit lisätä kysymyksiä koulutukseen koulutusosiossa. Koulutusosioon pääsee sivupalkista
    tallennettuasi asetukset.
  el: Μπορείτε να προσθέσετε ερωτήσεις στην εκπαίδευση στην ενότητα εκπαίδευσης. Η
    ενότητα εκπαίδευσης μπορεί να προσπελαστεί από την πλαϊνή γραμμή μετά την αποθήκευση
    των ρυθμίσεων.
  hu: Hozzáadhat kérdéseket a képzéshez a képzési részben. A képzési rész a beállítások
    mentése után elérhető a sidebarról.
  cs: Můžete přidat otázky do školení v sekci školení. Sekci školení lze přistupovat
    z postranního panelu po uložení nastavení.
  et: Saate koolitusele lisada küsimusi koolituse jaotises. Koolituse jaotisele pääseb
    küljepaneelilt pärast seadete salvestamist.
  lv: Jūs varat pievienot jautājumus apmācībai apmācības sadaļā. Apmācības sadaļa
    ir pieejama no sānjoslas pēc iestatījumu saglabāšanas.
  lt: Galite pridėti klausimus į mokymąsi mokymo skyriuje. Mokymo skyrius pasiekiamas
    iš šoninės juostos po nustatymų išsaugojimo.
  bg: Можете да добавите въпроси към обучението в раздела за обучение. Разделът за
    обучение може да бъде достъпен от страничната лента след запазване на настройките.
  ro: Puteți adăuga întrebări la instruire în secțiunea de instruire. Secțiunea de
    instruire poate fi accesată din bara laterală după salvarea setărilor.
  hr: Možete dodati pitanja u obuku u odjeljku za obuku. Odjeljak za obuku može se
    pristupiti s bočne trake nakon spremanja postavki.
  sk: Môžete pridať otázky do školenia v časti školenia. Sekcia školenia je dostupná
    z bočnej lišty po uložení nastavení.
  sl: V razdelek za usposabljanje lahko dodate vprašanja v razdelek za usposabljanje.
    Razdelek za usposabljanje je dostopen s stranske vrstice po shranjevanju nastavitev.
  he: ניתן להוסיף שאלות לאימון בסעיף האימון. סעיף האימון נגיש מסרגל הצד לאחר שמירת
    ההגדרות.
  ca: Podeu afegir preguntes a la formació a la secció de formació. Es pot accedir
    a la secció de formació des de la barra lateral després de desar la configuració.
  cy: Gallwch ychwanegu cwestiynau i'r hyfforddiant yn yr adran hyfforddiant. Gellir
    cyrchu'r adran hyfforddiant o'r bar ochr ar ôl cadw'r gosodiadau.
  ga: Is féidir leat ceisteanna a chur leis an traenáil sa rannán traenála. Is féidir
    rochtain a fháil ar an rannán traenála ón mbarra taoibh tar éis na socruithe a
    shábháil.
  is: Þú getur bætt spurningum við þjálfunina í þjálfunarhlutanum. Hægt er að nálgast
    þjálfunarhlutann frá hliðarstikunni eftir að hafa vistað stillingarnar.
  mt: Tista' żżid mistoqsijiet fit-taħriġ fit-taqsima tat-taħriġ. It-taqsima tat-taħriġ
    tista' tiġi aċċessata mill-barra laterali wara li tissejvjaw l-issettjar.
  nl_BE: U kunt vragen toevoegen aan de training in de trainingssectie. De trainingssectie
    is toegankelijk via de zijbalk na het opslaan van de instellingen.
  nl_be: U kunt vragen toevoegen aan de training in de trainingssectie. De trainingssectie
    is toegankelijk via de zijbalk na het opslaan van de instellingen.
  'no': Du kan legge til spørsmål i opplæringen i opplæringsdelen. Opplæringsdelen
    er tilgjengelig fra sidepanelet etter at innstillingene er lagret.
  ru: Вы можете добавлять вопросы к обучению в разделе обучения. Раздел обучения доступен
    через боковую панель после сохранения настроек.
  sq: Mund të shtoni pyetje në trajnim në seksionin e trajnimit. Seksioni i trajnimit
    mund të aksesohet nga shiriti anësor pasi të ruani cilësimet.
  sr: Možete dodati pitanja obuci u odeljku za obuku. Odeljku za obuku može se pristupiti
    iz bočne trake nakon čuvanja podešavanja.
  uk: Ви можете додавати запитання до навчання у розділі навчання. До розділу навчання
    можна отримати доступ із бічної панелі після збереження налаштувань.
