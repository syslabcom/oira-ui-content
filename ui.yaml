message_click_to_validate:
  bg: Щракването върху „Валидирай
  cs: Kliknutím na tlačítko 'Ověřit' se hodnocení rizik '${assessment}' uzamkne a dostane oficiální ověřený status.
  cy: Bydd clicio ar 'Dilysu' yn cloi'r asesiad risg '${assessment}' ac yn rhoi statws dilysu swyddogol iddo.
  da: Ved at klikke på 'Valider' låses risikovurderingen '${assessment}' og gives en officiel valideret status.
  de: Durch Klicken auf „Validieren“ wird die Risikobewertung „${assessment}“ gesperrt und erhält einen offiziell validierten Status.
  el: Κάνοντας κλικ στο 'Επικύρωση' θα κλειδωθεί η εκτίμηση κινδύνου '${assessment}' και θα λάβει επίσημη επικυρωμένη κατάσταση.
  en: Clicking on 'Validate' will lock the risk assessment ‘${assessment}’ and give it an official validated status.
  es: Al hacer clic en 'Validar' se bloqueará la evaluación de riesgos '${assessment}' y se le otorgará un estado oficial de validado.
  et: Klõpsates nupul 'Kinnita' lukustatakse riskihinnang '${assessment}' ja antakse sellele ametlik kinnitatud staatus.
  fi: Napsauttamalla 'Vahvista' lukitaan riskiarviointi '${assessment}' ja sille annetaan virallinen vahvistettu tila.
  fr: Cliquer sur 'Valider' verrouillera l'évaluation des risques '${assessment}' et lui donnera un statut officiel validé.
  ga: Trí chliceáil ar 'Bailíochtaigh' cuirfear glas ar an measúnú riosca '${assessment}' agus tabharfar stádas oifigiúil bailíochtaithe dó.
  he: לחיצה על 'אמת' תנעל את הערכת הסיכון '${assessment}' ותעניק לה סטטוס מאומת רשמי.
  hr: Klikom na 'Potvrdi' zaključat će se procjena rizika '${assessment}' i dobiti službeni potvrđeni status.
  hu: A 'Validate' gombra kattintva zárolódik a(z) '${assessment}' kockázatértékelés, és hivatalos érvényesített státuszt kap.
  is: Með því að smella á 'Staðfesta' verður áhættumatið '${assessment}' læst og fær opinbera staðfesta stöðu.
  it: Facendo clic su 'Convalida' la valutazione del rischio '${assessment}' verrà bloccata e riceverà uno stato di convalida ufficiale.
  lt: Paspaudus 'Patvirtinti' rizikos vertinimas '${assessment}' bus užrakintas ir jam bus suteiktas oficialus patvirtintas statusas.
  lv: Noklikšķinot uz 'Validēt', riska novērtējums '${assessment}' tiks bloķēts un tam tiks piešķirts oficiāls validēts statuss.
  mt: Billi tikklikkja fuq 'Valida' se tillokkja l-valutazzjoni tar-riskju '${assessment}' u tagħtiha status validat uffiċjali.
  nl: Door op 'Validate' te klikken wordt de risicobeoordeling ‘${assessment}’ vergrendeld en krijgt deze een officieel gevalideerde status.
  nl_BE: Door op 'Valideren' te klikken wordt de risicobeoordeling '${assessment}' vergrendeld en krijgt deze een officieel gevalideerde status.
  nl_be: Door op 'Valideren' te klikken wordt de risicobeoordeling '${assessment}' vergrendeld en krijgt deze een officieel gevalideerde status.
  'no': Å klikke på 'Valider' vil låse risikovurderingen '${assessment}' og gi den en offisiell validert status.
  pl: Kliknięcie przycisku 'Zatwierdź' zablokuje ocenę ryzyka '${assessment}' i nada jej oficjalny status zatwierdzonej.
  pt: Clicar em 'Validar' bloqueará a avaliação de risco '${assessment}' e lhe dará um status oficial de validada.
  ro: Făcând clic pe 'Validați' veți bloca evaluarea riscurilor '${assessment}' și îi veți conferi un statut oficial de validată.
  ru: Нажатие кнопки «Проверить» заблокирует оценку рисков «${assessment}» и присвоит ей официальный проверенный статус.
  sk: Kliknutím na 'Validovať' sa hodnotenie rizík '${assessment}' uzamkne a dostane oficiálny validovaný stav.
  sl: S klikom na 'Potrdi' boste zaklenili oceno tveganja '${assessment}' in ji dodelili uradni potrjeni status.
  sq: Duke klikuar mbi 'Vërtetoni' do të bllokojë vlerësimin e rreziqeve '${assessment}' dhe do t'i japë një status zyrtar të vërtetuar.
  sr: Klikom na 'Validiraj' zaključaćete procenu rizika '${assessment}' i dati joj zvanični validirani status.
  sv: Genom att klicka på 'Validera' låser du riskbedömningen '${assessment}' och ger den en officiell validerad status.
  uk: Натискання кнопки «Підтвердити» заблокує оцінку ризиків «${assessment}» і надасть їй офіційний підтверджений статус.
message_consultant_has_reviewed:
