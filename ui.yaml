message_help_subscriptions:
  en: The newsletters are customisable according to your preference, the tools your
    organisation uses, your industry sector and your country level.
  bg: Бюлетините могат да се персонализират според вашите предпочитания, инструментите,
    които използва вашата организация, вашия индустриален сектор и нивото на вашата
    страна.
  ca: Els butlletins es poden personalitzar segons les vostres preferències, les eines
    que utilitza la vostra organització, el vostre sector industrial i el nivell del
    vostre país.
  cs: Zpravodaje lze přizpůsobit podle vašich preferencí, nástrojů, které vaše organizace
    používá, vašeho průmyslového odvětví a úrovně vaší země.
  cy: Gellir addasu'r cylchlythyrau yn ôl eich dewis, yr offer y mae eich sefydliad
    yn eu defnyddio, eich sector diwydiant a lefel eich gwlad.
  da: Nyhedsbrevene kan tilpasses i henhold til dine præferencer, de værktøjer din
    organisation bruger, din industrisektor og dit landsniveau.
  de: Die Newsletter können nach Ihren Präferenzen, den von Ihrer Organisation verwendeten
    Tools, Ihrem Branchensektor und Ihrem Länderniveau angepasst werden.
  el: Τα ενημερωτικά δελτία μπορούν να προσαρμοστούν σύμφωνα με τις προτιμήσεις σας,
    τα εργαλεία που χρησιμοποιεί ο οργανισμός σας, τον κλάδο σας και το επίπεδο της
    χώρας σας.
  es: Los boletines informativos son personalizables según sus preferencias, las herramientas
    que utiliza su organización, su sector industrial y su nivel de país.
  et: Uudiskirjad on kohandatavad vastavalt teie eelistustele, teie organisatsiooni
    kasutatavatele tööriistadele, teie tööstussektorile ja teie riigi tasemele.
  fi: Uutiskirjeet ovat muokattavissa mieltymystesi, organisaatiosi käyttämien työkalujen,
    toimialasi ja maasi tason mukaan.
  fr: Les newsletters sont personnalisables selon vos préférences, les outils utilisés
    par votre organisation, votre secteur d'activité et votre niveau de pays.
  ga: Is féidir na nuachtlitreacha a shaincheapadh de réir do roghanna, na huirlisí
    a úsáideann d'eagraíocht, do earnáil thionscail agus leibhéal do thíre.
  he: הידיעונים ניתנים להתאמה אישית בהתאם להעדפותיך, הכלים שבהם משתמשת הארגון שלך,
    מגזר התעשייה שלך ורמת המדינה שלך.
  hr: Bilteni su prilagodljivi prema vašim preferencijama, alatima koje vaša organizacija
    koristi, vašem industrijskom sektoru i razini vaše zemlje.
  hu: A hírlevelek testreszabhatók az Ön preferenciái, a szervezete által használt
    eszközök, az iparági szektor és az ország szintje szerint.
  is: Fréttabréfin eru sérhannaðanleg í samræmi við óskir þínar, þau verkfæri sem
    fyrirtækið þitt notar, iðnaðarsvið þitt og landsstig þitt.
  it: Le newsletter sono personalizzabili in base alle tue preferenze, agli strumenti
    utilizzati dalla tua organizzazione, al tuo settore industriale e al livello del
    tuo paese.
  lt: Naujienlaiškiai yra pritaikomi pagal jūsų pageidavimus, jūsų organizacijos naudojamus
    įrankius, jūsų pramonės sektorių ir jūsų šalies lygmenį.
  lv: Biļeteni ir pielāgojami atbilstoši jūsu vēlmēm, jūsu organizācijas izmantotajiem
    rīkiem, jūsu nozares sektoram un jūsu valsts līmenim.
  mt: In-newsletters huma personalizzabbli skont il-preferenza tiegħek, l-għodod li
    tuża l-organizzazzjoni tiegħek, is-settur industrijali tiegħek u l-livell tal-pajjiż
    tiegħek.
  nl: De nieuwsbrieven zijn aanpasbaar op basis van uw voorkeur, de tools die uw organisatie
    gebruikt, uw branchesector en uw landniveau.
  nl_BE: De nieuwsbrieven zijn aanpasbaar op basis van uw voorkeur, de tools die uw
    organisatie gebruikt, uw branchesector en uw landniveau.
  nl_be: De nieuwsbrieven zijn aanpasbaar op basis van uw voorkeur, de tools die uw
    organisatie gebruikt, uw branchesector en uw landniveau.
  'no': Nyhetsbrevene kan tilpasses etter dine preferanser, verktøyene organisasjonen
    din bruker, din bransje og ditt land.
  pl: Biuletyny można dostosować zgodnie z własnymi preferencjami, narzędziami używanymi
    przez organizację, sektorem branżowym i poziomem kraju.
  pt: Os boletins informativos são personalizáveis de acordo com a sua preferência,
    as ferramentas que a sua organização utiliza, o seu setor de atividade e o seu
    país.
  ro: Buletinele informative sunt personalizabile în funcție de preferințele dvs.,
    instrumentele pe care le folosește organizația dvs., sectorul dvs. de activitate
    și țara dvs.
  ru: Информационные бюллетени можно настроить в соответствии с вашими предпочтениями,
    инструментами вашей организации, отраслью и уровнем вашей страны.
  sk: Informačné bulletiny sú prispôsobiteľné podľa vašich preferencií, nástrojov,
    ktoré vaša organizácia používa, vášho odvetvia a vašej krajiny.
  sl: Glasila so prilagodljiva glede na vaše preference, orodja, ki jih uporablja
    vaša organizacija, vaš industrijski sektor in vašo državo.
  sq: Buletinet informative janë të personalizueshme sipas preferencës suaj, mjeteve
    që përdor organizata juaj, sektorit tuaj të industrisë dhe nivelit të vendit tuaj.
  sr: Bilteni su prilagodljivi prema vašim preferencijama, alatima koje vaša organizacija
    koristi, vašem industrijskom sektoru i nivou vaše zemlje.
  sv: Nyhetsbreven kan anpassas efter dina preferenser, de verktyg din organisation
    använder, din bransch och ditt lands nivå.
  uk: Інформаційні бюлетені можна налаштувати відповідно до ваших уподобань, інструментів,
    які використовує ваша організація, вашого галузевого сектора та рівня вашої країни.
